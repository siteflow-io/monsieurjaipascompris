// MJPC-CORE v1.1.0 (2026-07-14) — socle commun de l'écosystème MJPC
// Bloc versionné, IDENTIQUE dans chaque app. Ne jamais le modifier localement :
// toute évolution passe par une nouvelle version diffusée partout.
// Seul le bloc « DÉCLARATION DE L'APP » (MJPC_APP / MJPC_MANIFESTE / MJPC_PURGE)
// est propre à chaque app — il se remplit, il ne se réécrit pas.
// Dépendances : firebase 8.x (db = firebase.database()) déjà initialisé par l'app.
// ═══════════════════════════════════════════════════════════════════════════

// ── DÉCLARATION DE L'APP (à remplir par app — exemple ci-dessous) ──
// var MJPC_APP = {
//   id: "correction_dictee",          // identifiant technique (anglais/ascii)
//   nom: "Correction de dictée",      // libellé lisible
//   contenant: "aucun"                // "aucun" | "binome" | "groupe" | "classe"
// };                                  // = l'élève travaille seul / à 2-3 / en groupe / classe entière
// var MJPC_MANIFESTE = { notions: [], noeuds: [] };   // vocabulaire + nœuds Firebase de l'app (vue projetée)
// var MJPC_PURGE = { preserver: [], purger: [] };     // contrat de purge : chemins à garder / à effacer au reset

// ── 1. Identité élève : clé canonique ──
// "CLÉMENT Noé" → "clement_noe". Déterministe, recalculable, lisible.
function sanMJPC(s){
  return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
}

// ── 2. Identité classe : la clé du hub EST l'identifiant ──
// Décision du 14/07/2026 : aucune app ne transforme le nom de classe.
// La clé de /classes (ex. "4E BANKSY") est l'unique étiquette de rangement.
function cleClasse(nom){ return String(nom||"").trim(); }

// ── 3. Classes de test (bac à sable) : convention unique "_test_<app>" ──
// Préfixe "_" = classe interne : jamais montrée aux élèves, jamais archivée
// dans les profils, nettoyable sans risque. "CLASSE TEST" et "_TEST" sont
// reconnues comme héritage le temps de leur nettoyage (dette B).
function classeTestId(){ return "_test_"+MJPC_APP.id; }
function estClasseInterne(nom){ return !!nom && String(nom).charAt(0)==="_"; }
function estClasseTest(nom){
  return estClasseInterne(nom) || nom==="CLASSE TEST"; // héritage toléré en lecture
}

// ── 4. Lecture robuste d'un roster : extractEleves ──
// Tolère les 3 formats rencontrés dans les données réelles :
//   liste ["NOM Prénom", …] · objet indexé {0:…, archivee:…} ·
//   objet {nom, eleves:[{nomComplet}|{nom,prenom}|{name}|"…"]}
function extractEleves(fbClasse, cfgEleves){
  cfgEleves = cfgEleves || [];
  var META={niveau:1,annee:1,id:1,title:1,nom:1,archivee:1,couleur:1,cree_le:1,published:1,eleves:1};
  function clean(a){return (a||[]).filter(function(x){return x&&typeof x==="string"&&x.trim();});}
  function nomDe(v){
    if(typeof v==="string") return v;
    if(v&&typeof v==="object"){
      if(v.nomComplet) return v.nomComplet;
      if(v.nom&&v.prenom) return String(v.nom).toUpperCase()+" "+v.prenom;
      if(v.name) return v.name;
    }
    return null;
  }
  if(Array.isArray(fbClasse)){ var a=clean(fbClasse.map(nomDe)); if(a.length) return a; }
  if(fbClasse&&typeof fbClasse==="object"&&!Array.isArray(fbClasse)){
    if(Array.isArray(fbClasse.eleves)){ var e=clean(fbClasse.eleves.map(nomDe)); if(e.length) return e; }
    var names=clean(Object.keys(fbClasse).filter(function(k){return !META[k]&&k.charAt(0)!=="_";}).map(function(k){return nomDe(fbClasse[k]);}));
    if(names.length) return names;
  }
  return clean(cfgEleves.map(nomDe));
}

// ── 5. Écriture NON destructive d'une classe : ecrireClasse ──
// Remplace UNIQUEMENT la liste d'élèves ; préserve toute métadonnée existante
// (archivee, niveau, couleur, …) ; normalise au format canonique
// {eleves:["NOM Prénom",…], …métadonnées} : les élèves-objets ({nomComplet},
// {nom,prenom}, {name}) sont ramenés à la chaîne, les résidus indexés {0:…} purgés.
// meta (optionnel) : métadonnées à poser/mettre à jour (ex. {niveau:"4e"}) —
// appliquées PAR-DESSUS l'existant, jamais en le remplaçant.
// Transaction Firebase : atomique, idempotente, sûre en concurrence.
function ecrireClasse(db, nomClasse, eleves, meta, cb){
  if(typeof meta==="function"){ cb=meta; meta=null; }
  var nom=cleClasse(nomClasse);
  if(!nom){ if(cb) cb(new Error("Nom de classe vide")); return; }
  function nomDe(v){
    if(typeof v==="string") return v.trim();
    if(v&&typeof v==="object"){
      if(v.nomComplet) return String(v.nomComplet).trim();
      if(v.nom&&v.prenom) return String(v.nom).toUpperCase()+" "+String(v.prenom).trim();
      if(v.name) return String(v.name).trim();
    }
    return null;
  }
  var propres=(eleves||[]).map(nomDe).filter(function(e){return e&&typeof e==="string";});
  db.ref("classes/"+nom).transaction(function(cur){
    var out={eleves:propres};
    if(cur&&typeof cur==="object"&&!Array.isArray(cur)){
      for(var k in cur){
        if(k==="eleves") continue;          // remplacée
        if(/^\d+$/.test(k)) continue;       // résidu indexé : purgé (les élèves vivent dans .eleves)
        out[k]=cur[k];                      // métadonnée : préservée
      }
    }
    if(meta&&typeof meta==="object"){ for(var m in meta){ if(meta[m]!==undefined) out[m]=meta[m]; } }
    if(out.archivee===undefined) out.archivee=false;
    return out;
  }, function(err, committed){ if(cb) cb(err||null, committed); });
}

// ── 6. Suppression d'élève : INTERDITE hors MJPC ──
// Une seule logique de suppression, dans la console MJPC (archive avant tout).
// Les apps remplacent leurs boutons de suppression par ce renvoi.
var MJPC_URL="https://siteflow-io.github.io/monsieurjaipascompris/index.html";
function renvoyerVersMJPC(motif){
  var msg="La gestion des \u00e9l\u00e8ves (ajout, retrait, archivage) se fait dans MJPC, pour que rien ne se perde."
        +(motif?"\n\n("+motif+")":"");
  if(typeof window!=="undefined"&&window.confirm(msg+"\n\nOuvrir MJPC ?")){ window.open(MJPC_URL,"_blank"); }
}

// ── 7. Identification nominative : le portail commun (logique) ──
// Toute identification produit des élèves SINGULIERS (clé canonique), que le
// travail soit individuel ou en groupe. Le groupe est un contenant, pas une identité.
// resolveEleves(roster, saisies) → [{nom, cle}] ou {erreur}
//   roster  : liste des noms de la classe (extractEleves)
//   saisies : ["DUPONT Marie", …] (chips) ou [{nom:"DUPONT",prenom:"Marie"}] (champs)
function resolveEleves(roster, saisies){
  var res=[], vus={};
  for(var i=0;i<(saisies||[]).length;i++){
    var s=saisies[i], trouve=null;
    if(typeof s==="string"){
      for(var j=0;j<roster.length;j++){ if(roster[j]===s){trouve=roster[j];break;} }
      if(!trouve){ var k=sanMJPC(s); for(j=0;j<roster.length;j++){ if(sanMJPC(roster[j])===k){trouve=roster[j];break;} } }
    } else if(s&&s.nom&&s.prenom){
      var nomU=String(s.nom).trim().toUpperCase(), preL=String(s.prenom).trim().toLowerCase();
      for(j=0;j<roster.length;j++){
        var parts=roster[j].split(" ");
        var rNom=parts.slice(0,-1).join(" ").toUpperCase(), rPre=(parts[parts.length-1]||"").toLowerCase();
        if(rNom===nomU&&rPre===preL){trouve=roster[j];break;}
      }
    }
    if(!trouve) return {erreur:"\u00c9l\u00e8ve introuvable : "+(typeof s==="string"?s:(s.nom+" "+s.prenom))+". V\u00e9rifie l'orthographe."};
    var cle=sanMJPC(trouve);
    if(vus[cle]) return {erreur:"\u00c9l\u00e8ve s\u00e9lectionn\u00e9 deux fois : "+trouve};
    vus[cle]=1; res.push({nom:trouve, cle:cle});
  }
  if(!res.length) return {erreur:"Aucun \u00e9l\u00e8ve identifi\u00e9."};
  return res;
}

// ── 8. Manifeste (vue projetée, ADDITIVE) ──
// Les constantes en dur dans l'app restent la source de vérité ; le manifeste
// n'est qu'une photographie publiée pour MJPC. Incapable de diverger : republiée
// à chaque chargement prof.
function publierManifeste(db){
  try{
    db.ref("manifestes/"+MJPC_APP.id).set({
      version: MJPC_CORE_VERSION,
      app: MJPC_APP,
      manifeste: MJPC_MANIFESTE||{},
      purge: MJPC_PURGE||{preserver:[],purger:[]},
      publie_le: Date.now()
    });
  }catch(e){ /* le manifeste ne doit jamais casser l'app */ }
}

var MJPC_CORE_VERSION="1.1.0";

// ── 8. Session partagée MJPC : l'app reconnaît qui est déjà connecté au site ──
// Le site MJPC écrit 'mjpc_eleve' (sessionStorage + localStorage, même origine).
// L'app la LIT ; elle ne l'écrit jamais. Validité : 12 h par défaut (une journée
// de cours). Une session invalide ou périmée → null → portail natif de l'app.
function lireSessionMJPC(ttlMs){
  var ttl = ttlMs || 12*3600*1000;

// Export: télécharge un JSON avec toutes les données Firebase
// Import: réinjecte un snapshot dans Firebase
// Intégrable dans n'importe quelle app via un bouton prof

function snapshotExport(dbRef, filename) {
  // dbRef = Firebase ref path string, e.g. "correction_dictee" or "reecriture_bb4e"
  var ref = firebase.database().ref(dbRef);
  ref.once("value", function(snap) {
    var data = snap.val();
    if (!data) { alert("Aucune donnée à exporter."); return; }
    var payload = {
      _meta: {
        source: dbRef,
        exportedAt: new Date().toISOString(),
        exportedBy: "snapshot_tool",
        version: 1
      },
      data: data
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = (filename || dbRef.replace(/\//g, "_")) + "_" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  });
}

function snapshotImport(dbRef, file, onDone) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var payload = JSON.parse(e.target.result);
      var data = payload.data || payload; // Support both wrapped and raw
      if (!confirm("⚠️ Écraser toutes les données de '" + dbRef + "' avec le snapshot du " + (payload._meta ? payload._meta.exportedAt : "?") + " ?")) return;
      firebase.database().ref(dbRef).set(data, function(err) {
        if (err) { alert("Erreur: " + err.message); }
        else { alert("✅ Snapshot importé avec succès."); if (onDone) onDone(); }
      });
    } catch (ex) { alert("Fichier invalide: " + ex.message); }
  };
  reader.readAsText(file);
}

// Render a snapshot panel (React h() compatible)
function renderSnapshotPanel(h, dbRef, label) {
  var fileInputId = "snapshot-import-" + dbRef.replace(/\//g, "-");
  return h("div", { style: { display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" } },
    h("button", { className: "btn-sm btn-ghost", onClick: function() { snapshotExport(dbRef, label); } }, "📥 Exporter snapshot"),
    h("button", { className: "btn-sm btn-ghost", onClick: function() { document.getElementById(fileInputId).click(); } }, "📤 Importer snapshot"),
    h("input", { id: fileInputId, type: "file", accept: ".json", style: { display: "none" }, onChange: function(e) {
      if (e.target.files[0]) snapshotImport(dbRef, e.target.files[0], function() { window.location.reload(); });
      e.target.value = "";
    }})
  );
}

                  good:["note","chiffre","indicat","suffit pas","raconte","thermom","tout","pas tout","rien dire","reflet","niveau","juste"],
                  bad:["je sais pas","oui","non","rien","idk","jsp","j'en sais rien","je ne sais pas","lol","mdr"]},
                {key:"b2",label:"Ce que cette exp\u00e9rience m\u2019a appris",val:b.b2||"",
                  good:["appris","compris","r\u00e9alis\u00e9","d\u00e9couvert","\u00e9motion","surprise","frustr","soulage","injuste","fier","d\u00e9\u00e7u","ressenti","diff\u00e9rent","chang\u00e9"],
                  bad:["je sais pas","oui","non","rien","idk","jsp","j'en sais rien","je ne sais pas"]},
                {key:"b3",label:"Les erreurs que je dois retravailler",val:b.b3||"",
                  good:["accord","pluriel","verbe","conjug","sujet","pronom","d\u00e9termin","pass\u00e9","femme","elles","contour","travers","compos","participe","terminais"],
                  bad:["je sais pas","oui","non","rien","idk","jsp","tout","aucune","je ne sais pas"]},
                {key:"b4",label:"Ce que je vais faire diff\u00e9remment",val:b.b4||"",
                  good:["relire","v\u00e9rifier","attention","accord","r\u00e8gle","appliquer","concentr","sujet","verbe","r\u00e9fl\u00e9chir","prendre le temps","m\u00e9moriser"],
                  bad:["je sais pas","oui","non","rien","idk","jsp","je ne sais pas"]}
              ];
              // Analyse par champ
              var totalLen=0,nGoodFields=0,nBadFields=0,nEmpty=0,details=[];
              fields.forEach(function(f){
                var v=(f.val||"").trim().toLowerCase();
                totalLen+=v.length;
                if(!v||v.length<3){nEmpty++;details.push({field:f.key,status:"empty"});return}
                // Check bad patterns
                var isBad=false;
                f.bad.forEach(function(bw){if(v===bw||v===bw+"."||v===bw+"!"){isBad=true}});
                if(v.length<6&&!/[aeiou\u00e9\u00e8\u00ea\u00e0]/i.test(v)){isBad=true}// gibberish
                // Check if answer is just "oui"/"non" regardless of question
                if(/^(oui|non|ok|bof|mouais|nan|nope|yep|ouais|pas vraiment)\.?!?$/i.test(v)){isBad=true}
                // Check repetition (same answer for all)
                if(isBad){nBadFields++;details.push({field:f.key,status:"bad",reason:"R\u00e9ponse hors-sujet ou vide de sens"});return}
                // Check good keywords
                var nGood=0;
                f.good.forEach(function(gw){if(v.indexOf(gw)>=0)nGood++});
                if(nGood>=2&&v.length>=15){nGoodFields++;details.push({field:f.key,status:"good",nKw:nGood})}
                else if(nGood>=1||v.length>=20){details.push({field:f.key,status:"ok",nKw:nGood})}
                else{details.push({field:f.key,status:"weak"})}
              });
              // Check if all answers are identical
              var allSame=b.b1&&b.b2&&b.b1.trim().toLowerCase()===b.b2.trim().toLowerCase();
              if(allSame)nBadFields++;

              var avgLen=Math.round(totalLen/4);
              var bilanComment="",bilanLevel="";
              if(nEmpty>=2){bilanComment="\u26a0\ufe0f Bilan largement incomplet ("+nEmpty+" champ"+(nEmpty>1?"s":"")+" vide"+(nEmpty>1?"s":"")+").";bilanLevel="faible"}
              else if(nBadFields>=2){bilanComment="\u26a0\ufe0f R\u00e9ponses hors-sujet ou sans effort ("+(allSame?"r\u00e9ponses identiques, ":"")+"l\u2019\u00e9l\u00e8ve n\u2019a pas jou\u00e9 le jeu).";bilanLevel="faible"}
              else if(nBadFields>=1){bilanComment="\ud83d\udfe0 Au moins une r\u00e9ponse hors-sujet. Investissement partiel.";bilanLevel="fragile"}
              else if(nGoodFields>=3&&avgLen>=25){bilanComment="\u2b50 R\u00e9ponses d\u00e9taill\u00e9es et pertinentes ("+avgLen+" car. moy., mots-cl\u00e9s pr\u00e9sents).";bilanLevel="parfait"}
              else if(nGoodFields>=2){bilanComment="\ud83d\udfe2 R\u00e9ponses correctes et r\u00e9fl\u00e9chies.";bilanLevel="bien"}
              else if(avgLen>=15){bilanComment="\ud83d\udfe1 R\u00e9ponses pr\u00e9sentes mais peu approfondies ("+avgLen+" car. moy.).";bilanLevel="plutot_bien"}
              else{bilanComment="\ud83d\udfe0 R\u00e9ponses minimales ("+avgLen+" car. moy.).";bilanLevel="fragile"}

              return h("div",{style:{background:"#fff",borderRadius:12,padding:20}},
                h("div",{style:{fontSize:".75rem",color:"#999",marginBottom:10,fontWeight:700,textTransform:"uppercase"}},d2.bilanSubmitted?"\u2705 Bilan soumis":"Bilan en cours"),
                fields.map(function(f,fi){
                  var det=details[fi]||{};
                  var borderColor=det.status==="good"?"#276749":det.status==="bad"||det.status==="empty"?"#c53030":det.status==="ok"?"#975a16":"#999";
                  return h("div",{key:f.key,style:{marginBottom:8}},
                    h("div",{style:{fontSize:".78rem",color:"#999",marginBottom:2}},f.label),
                    h("div",{style:{display:"flex",alignItems:"flex-start",gap:6}},
                      h("div",{style:{flex:1,fontSize:".9rem",padding:"4px 8px",background:det.status==="bad"?"rgba(197,48,48,.06)":det.status==="good"?"rgba(39,103,73,.04)":"transparent",borderRadius:6,borderLeft:"3px solid "+borderColor}},
                        f.val||h("em",{style:{color:"#999"}},"Non rempli")
                      ),
                      det.status==="bad"&&h("span",{style:{fontSize:".75rem",color:"#c53030",whiteSpace:"nowrap"}},"\u26a0\ufe0f "+det.reason),
                      det.status==="good"&&h("span",{style:{fontSize:".75rem",color:"#276749",whiteSpace:"nowrap"}},"\u2705 "+det.nKw+" mot"+(det.nKw>1?"s":"")+"-cl\u00e9"+(det.nKw>1?"s":""))
                    )
                  )
                }),
                h("div",{style:{marginTop:10,padding:"8px 12px",borderRadius:8,fontSize:".85rem",fontWeight:600,
                  background:bilanLevel==="parfait"?"rgba(39,103,73,.06)":bilanLevel==="bien"?"rgba(39,103,73,.04)":bilanLevel==="plutot_bien"?"rgba(151,90,22,.06)":"rgba(197,48,48,.06)",
                  color:bilanLevel==="parfait"||bilanLevel==="bien"?"#276749":bilanLevel==="plutot_bien"?"#975a16":"#c53030"
                }},bilanComment)
              );
            })(),
            // Synthèse globale
            (d2.bilanAnswers||d2.bilan)&&(function(){
              var answers=toArr(d2.bilanAnswers||[]);
              var b=d2.bilan||{};
              // Parcours
              var pNon=0,pFast=0;
              for(var si=0;si<answers.length;si++){
                var sa=answers[si];var sAns=typeof sa==="object"?sa.answer:sa;
                if(sAns&&sAns.indexOf("non")===0)pNon++;
                if(si>0){
                  var sPrev=answers[si-1];
                  var sT0=typeof sPrev==="object"?sPrev.time:0;
                  var sT1=typeof sa==="object"?sa.time:0;
                  if(sT0&&sT1&&(sT1-sT0)<5000)pFast++;
                }
              }
              // Bilan
              var bLen=((b.b1||"")+(b.b2||"")+(b.b3||"")+(b.b4||"")).length;
              var bFilled=!!(b.b1&&b.b2&&b.b3&&b.b4);
              var bShort=[b.b1,b.b2,b.b3,b.b4].filter(function(x){return(x||"").length<10}).length;

              // Score global
              var score=0;
              if(pFast>=3)score-=3;
              if(pNon>=4)score-=2;else if(pNon>=2)score-=1;
              if(!bFilled)score-=2;
              if(bShort>=3)score-=1;
              if(bLen>=100)score+=2;else if(bLen>=50)score+=1;
              if(pFast===0&&pNon<=1)score+=2;

              var nom=r?r.name.split(" ").pop()+" "+r.name.split(" ")[0]:"L\u2019\u00e9l\u00e8ve";
              var verdict="";
              if(score>=3)verdict="\u2b50 "+nom+" semble avoir parfaitement compris le principe de l\u2019exercice.";
              else if(score>=1)verdict="\ud83d\udfe2 "+nom+" semble avoir bien compris le principe de l\u2019exercice.";
              else if(score>=0)verdict="\ud83d\udfe1 "+nom+" semble avoir plut\u00f4t bien compris, mais des doutes subsistent.";
              else if(score>=-2)verdict="\ud83d\udfe0 "+nom+" ne semble pas avoir vraiment compris le principe de l\u2019exercice.";
              else verdict="\ud83d\udfe0 "+nom+" n\u2019a pas compris le principe de l\u2019exercice ou n\u2019a pas jou\u00e9 le jeu.";

              return h("div",{style:{background:"#fff",borderRadius:12,padding:16,marginTop:16,border:"2px solid "+(score>=1?"#276749":score>=0?"#975a16":"#c53030")}},
                h("div",{style:{fontSize:".75rem",color:"#999",marginBottom:6,fontWeight:700,textTransform:"uppercase"}},"Synth\u00e8se"),
                h("p",{style:{fontSize:".95rem",fontWeight:700,lineHeight:1.6,color:score>=1?"#276749":score>=0?"#975a16":"#c53030"}},verdict)
              );
            })(),
          )
        )
      )
    })()
  );
}

// ═══ ÉVALUATION DU BILAN ═══
function evaluateBilanField(text, fieldNum) {
  if (!text || text.trim().length === 0) return { level: "vide", comment: "\u26a0\ufe0f Ce champ est vide." };
  var t = text.trim().toLowerCase();
  var len = t.length;
  
  // Detect hors-sujet / minimal effort
  var minimal = ["oui", "non", "je sais pas", "jsp", "rien", "ok", "idk", ".", "...", "bof", "nn", "ouais"];
  if (minimal.indexOf(t) >= 0 || len < 5) return { level: "insuffisant", comment: "\ud83d\udfe0 R\u00e9ponse trop courte. Essaie d\u2019expliquer davantage avec tes propres mots." };
  
  // Detect copy between fields (will be checked externally)
  
  if (len < 15) return { level: "fragile", comment: "\ud83d\udfe1 C\u2019est un d\u00e9but, mais essaie de d\u00e9velopper un peu plus." };
  
  // Field-specific keywords
  var keywords = {
    1: { // Ce que dit/ne dit pas la note
      bon: ["note", "chiffre", "thermom\u00e8tre", "reflet", "moment", "pas tout", "ne dit pas", "ne montre pas", "surface", "travail", "erreur", "mesure", "juge"],
      mots_stereo: ["nulle", "intelligent", "bon \u00e9l\u00e8ve", "mauvais \u00e9l\u00e8ve", "je suis nul"]
    },
    2: { // Ce que l'expérience m'a appris
      bon: ["exp\u00e9rience", "surpris", "compris", "r\u00e9alis\u00e9", "pens\u00e9", "cru", "avant", "maintenant", "chang\u00e9", "\u00e9motion", "ressenti", "stress", "injuste", "fausse", "fictive"],
      mots_stereo: ["rien", "sais pas"]
    },
    3: { // Erreurs à retravailler
      bon: ["accord", "pluriel", "singulier", "verbe", "sujet", "conjugaison", "orthographe", "grammaire", "accent", "terminaison", "\u00e9", "er", "ait", "aient", "majuscule", "ponctuation", "homonyme", "homophone", "imparfait", "pass\u00e9"],
      mots_stereo: ["tout", "je sais pas"]
    },
    4: { // Ce que je vais faire différemment
      bon: ["relire", "v\u00e9rifier", "attention", "concentrer", "r\u00e9viser", "apprendre", "r\u00e8gle", "le\u00e7on", "s\u2019entra\u00eener", "effort", "appliquer", "prochaine", "dictionnaire", "fiche", "correction", "temps"],
      mots_stereo: ["rien", "sais pas"]
    }
  };
  
  var kw = keywords[fieldNum] || keywords[1];
  var hits = 0;
  if (kw.bon) kw.bon.forEach(function(k) { if (t.indexOf(k) >= 0) hits++; });
  var stereo = false;
  if (kw.mots_stereo) kw.mots_stereo.forEach(function(k) { if (t.indexOf(k) >= 0) stereo = true; });
  
  if (stereo && hits === 0) return { level: "fragile", comment: "\ud83d\udfe1 Tu restes dans les st\u00e9r\u00e9otypes. Essaie de reformuler avec ce que tu as compris du parcours." };
  
  if (len >= 40 && hits >= 2) return { level: "bien", comment: "\ud83d\udfe2 Bonne analyse. Tu as bien compris." };
  if (len >= 25 && hits >= 1) return { level: "correct", comment: "\ud83d\udfe2 C\u2019est bien. Tu peux encore pr\u00e9ciser si tu veux." };
  if (hits >= 1) return { level: "correct", comment: "\ud83d\udfe1 Pas mal. Essaie de d\u00e9velopper un peu plus." };
  
  // Long enough but no keywords
  if (len >= 30) return { level: "correct", comment: "\ud83d\udfe1 Tu as fait un effort, mais essaie d\u2019utiliser les id\u00e9es du parcours." };
  
  return { level: "fragile", comment: "\ud83d\udfe1 Essaie d\u2019\u00e9crire une r\u00e9ponse plus compl\u00e8te." };
}

  useEffect(function(){
    /* M10 — Shunt MJPC (socle \u00a78) : l'\u00e9l\u00e8ve d\u00e9j\u00e0 connect\u00e9 au site n'a rien \u00e0 ressaisir.
       Patron de correction_dictee : garde anti-double, prof exclu, validation contre /classes. */

  function doLogin(){

       nom et prénom (même vides) — patron du site (M8-IDENTITÉ). La branche
       MENEY/monsieur (porte sans code) est retirée : Paul entre comme prof. */
    var nom=nomInput.trim().toUpperCase();var prenom=prenomInput.trim();var code=codeInput.trim();
    if(code&&PROF_CODES.indexOf(parseInt(code,10))>=0){if(p.onProf)p.onProf();return;}
    if(!nom||!prenom||!code){setErrMsg("\u00c9cris ton nom, ton pr\u00e9nom et ton code personnel.");return}
    var searchList=forcedId?reecritures.filter(function(r){return r.id===forcedId}):reecritures;

    _entrerEleve(full,key,lots);
  }
  function _entrerEleve(full,key,lots){

        h("button",{className:"btn-sm btn-ghost",style:{marginTop:12,minHeight:44},onClick:function(){setMesLots(null);setScreen("login")}},"\u2190 Retour")));
    if(screen==="login") return h("div",{className:"container fade-up",style:{paddingTop:40}},
    h("div",{className:"card",style:{textAlign:"center"}},

      h("div",{style:{maxWidth:340,margin:"0 auto"}},
        h("div",{className:"config-field"},h("label",null,"Nom"),h("input",{value:nomInput,onChange:function(e){setNomInput(e.target.value)},placeholder:"DUPONT",style:{textTransform:"uppercase"}})),
        h("div",{className:"config-field"},h("label",null,"Pr\u00e9nom"),h("input",{value:prenomInput,onChange:function(e){setPrenomInput(e.target.value)},placeholder:"Marie",onKeyDown:function(e){if(e.key==="Enter")doLogin()}})),
        h("div",{className:"config-field",style:{position:"relative"}},h("label",null,"Code personnel"),

          h("button",{type:"button","aria-label":codeVisible?"Masquer le code":"Afficher le code",onClick:function(){setCodeVisible(!codeVisible)},style:{position:"absolute",right:4,bottom:2,minHeight:44,minWidth:44,padding:"0 10px",background:"transparent",border:"none",color:"var(--muted)",fontStyle:"italic",cursor:"pointer"}},codeVisible?"Masquer":"Afficher")),
        errMsg&&h("p",{style:{color:"var(--coral)",fontSize:".88rem",marginBottom:8}},errMsg),

  );

function EleveSaisie(p){
  var d=p.data,ree=d.reecriture,modifs=ree.modifs;
  var acRef="reecriture_bb4e/"+ree.id+"/autocorrection/"+d.key;
  var verifyingRef=React.useRef(false);

  var s_cfg2=useState({showNote:true,peerHelp:false}),liveConfig=s_cfg2[0],setLiveConfig=s_cfg2[1];
  useEffect(function(){
    var reeId=acRef.split("/")[1];if(!reeId)return;
    var cfgRef=db.ref("reecriture_bb4e/"+reeId+"/config");
    function onCfg(snap){var val=snap.val();if(val)setLiveConfig({showNote:val.showNote!==false,peerHelp:!!val.peerHelp})}
    cfgRef.on("value",onCfg);
    return function(){cfgRef.off("value",onCfg)};
  },[]);

  var s_peer2=useState(null),peerTarget=s_peer2[0],setPeerTarget=s_peer2[1];
  useEffect(function(){
    if(!liveConfig.peerHelp||!bilanSubmitted)return;
    db.ref("reecriture_bb4e").once("value",function(snap){
      var all=snap.val()||{};var reeId=acRef.split("/")[1];
      var reeData=all[reeId];if(!reeData||!reeData.autocorrection)return;
      var acAll=reeData.autocorrection;var myKey=acRef.split("/").pop();
      var maxRemaining=0;var target=null;
      Object.keys(acAll).forEach(function(ek){
        if(ek===myKey)return;
        var a2=acAll[ek];if(!a2||typeof a2!=="object")return;
        if(a2.bilanSubmitted)return;
        if(!a2.score&&a2.score!==0){maxRemaining=999;target=ek;return}
        var remaining=a2.nCorrect!=null?(10-a2.nCorrect):10;
        if(remaining>maxRemaining){maxRemaining=remaining;target=ek}
      });
      if(target){
        var eleves=reeData.config?reeData.config.eleves||[]:[];
        var fullName=target;
        for(var ei=0;ei<eleves.length;ei++){if(san(eleves[ei])===target){fullName=eleves[ei].split(" ").pop();break}}
