.btn-help{position:relative;background:linear-gradient(135deg,var(--jaune),#FF8C42);color:var(--noir);border:none;padding:.5rem 1rem;border-radius:50px;font-weight:900;cursor:pointer;font-family:inherit;font-size:.85rem;box-shadow:0 4px 12px rgba(255,210,63,.4);display:inline-flex;align-items:center;gap:.4rem}
.btn-help:hover{transform:translateY(-2px)}

.btn-test{position:relative;background:linear-gradient(135deg,var(--turquoise),var(--bleu));color:#fff;border:none;padding:.5rem 1rem;border-radius:50px;font-weight:900;cursor:pointer;font-family:inherit;font-size:.85rem;box-shadow:0 4px 12px rgba(0,191,166,.4);display:inline-flex;align-items:center;gap:.4rem}

// MJPC-CORE v1.1.0 (2026-07-14) — socle commun de l'écosystème MJPC
// v1.1.0 : + §8 session partagée MJPC (lireSessionMJPC, validerEleveMJPC) —
//          l'app reconnaît l'élève ou le prof déjà connecté au site MJPC
//          et saute son écran de connexion. Sans session : portail natif inchangé.
// Bloc versionné, IDENTIQUE dans chaque app. Ne jamais le modifier localement :
// toute évolution passe par une nouvelle version diffusée partout.
// Seul le bloc « DÉCLARATION DE L'APP » (MJPC_APP / MJPC_MANIFESTE / MJPC_PURGE)
// est propre à chaque app — il se remplit, il ne se réécrit pas.
// Dépendances : firebase 8.x (db = firebase.database()) déjà initialisé par l'app.
// ═══════════════════════════════════════════════════════════════════════════

// ── DÉCLARATION DE L'APP (à remplir par app — exemple ci-dessous) ──
// var MJPC_APP = {
//   id: "correction_dictee",          // identifiant technique (anglais/ascii)
//   nom: "Correction de dictée",      // libellé lisible
//   contenant: "aucun"                // "aucun" | "binome" | "groupe" | "classe"
// };                                  // = l'élève travaille seul / à 2-3 / en groupe / classe entière
// var MJPC_MANIFESTE = { notions: [], noeuds: [] };   // vocabulaire + nœuds Firebase de l'app (vue projetée)
// var MJPC_PURGE = { preserver: [], purger: [] };     // contrat de purge : chemins à garder / à effacer au reset

// ── 1. Identité élève : clé canonique ──
// "CLÉMENT Noé" → "clement_noe". Déterministe, recalculable, lisible.
function sanMJPC(s){
  return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
}

// ── 2. Identité classe : la clé du hub EST l'identifiant ──
// Décision du 14/07/2026 : aucune app ne transforme le nom de classe.
// La clé de /classes (ex. "4E BANKSY") est l'unique étiquette de rangement.
function cleClasse(nom){ return String(nom||"").trim(); }

// ── 3. Classes de test (bac à sable) : convention unique "_test_<app>" ──
// Préfixe "_" = classe interne : jamais montrée aux élèves, jamais archivée
// dans les profils, nettoyable sans risque. "CLASSE TEST" et "_TEST" sont
// reconnues comme héritage le temps de leur nettoyage (dette B).
function classeTestId(){ return "_test_"+MJPC_APP.id; }
function estClasseInterne(nom){ return !!nom && String(nom).charAt(0)==="_"; }
function estClasseTest(nom){
  return estClasseInterne(nom) || nom==="CLASSE TEST"; // héritage toléré en lecture
}

// ── 4. Lecture robuste d'un roster : extractEleves ──
// Tolère les 3 formats rencontrés dans les données réelles :
//   liste ["NOM Prénom", …] · objet indexé {0:…, archivee:…} ·
//   objet {nom, eleves:[{nomComplet}|{nom,prenom}|{name}|"…"]}
function extractEleves(fbClasse, cfgEleves){
  cfgEleves = cfgEleves || [];
  var META={niveau:1,annee:1,id:1,title:1,nom:1,archivee:1,couleur:1,cree_le:1,published:1,eleves:1};
  function clean(a){return (a||[]).filter(function(x){return x&&typeof x==="string"&&x.trim();});}
  function nomDe(v){
    if(typeof v==="string") return v;
    if(v&&typeof v==="object"){
      if(v.nomComplet) return v.nomComplet;
      if(v.nom&&v.prenom) return String(v.nom).toUpperCase()+" "+v.prenom;
      if(v.name) return v.name;
    }
    return null;
  }
  if(Array.isArray(fbClasse)){ var a=clean(fbClasse.map(nomDe)); if(a.length) return a; }
  if(fbClasse&&typeof fbClasse==="object"&&!Array.isArray(fbClasse)){
    if(Array.isArray(fbClasse.eleves)){ var e=clean(fbClasse.eleves.map(nomDe)); if(e.length) return e; }
    var names=clean(Object.keys(fbClasse).filter(function(k){return !META[k]&&k.charAt(0)!=="_";}).map(function(k){return nomDe(fbClasse[k]);}));
    if(names.length) return names;
  }
  return clean(cfgEleves.map(nomDe));
}

// ── 5. Écriture NON destructive d'une classe : ecrireClasse ──
// Remplace UNIQUEMENT la liste d'élèves ; préserve toute métadonnée existante
// (archivee, niveau, couleur, …) ; normalise au format canonique
// {eleves:["NOM Prénom",…], …métadonnées} : les élèves-objets ({nomComplet},
// {nom,prenom}, {name}) sont ramenés à la chaîne, les résidus indexés {0:…} purgés.
// meta (optionnel) : métadonnées à poser/mettre à jour (ex. {niveau:"4e"}) —
// appliquées PAR-DESSUS l'existant, jamais en le remplaçant.
// Transaction Firebase : atomique, idempotente, sûre en concurrence.
function ecrireClasse(db, nomClasse, eleves, meta, cb){
  if(typeof meta==="function"){ cb=meta; meta=null; }
  var nom=cleClasse(nomClasse);
  if(!nom){ if(cb) cb(new Error("Nom de classe vide")); return; }
  function nomDe(v){
    if(typeof v==="string") return v.trim();
    if(v&&typeof v==="object"){
      if(v.nomComplet) return String(v.nomComplet).trim();
      if(v.nom&&v.prenom) return String(v.nom).toUpperCase()+" "+String(v.prenom).trim();
      if(v.name) return String(v.name).trim();
    }
    return null;
  }
  var propres=(eleves||[]).map(nomDe).filter(function(e){return e&&typeof e==="string";});
  db.ref("classes/"+nom).transaction(function(cur){
    var out={eleves:propres};
    if(cur&&typeof cur==="object"&&!Array.isArray(cur)){
      for(var k in cur){
        if(k==="eleves") continue;          // remplacée
        if(/^\d+$/.test(k)) continue;       // résidu indexé : purgé (les élèves vivent dans .eleves)
        out[k]=cur[k];                      // métadonnée : préservée
      }
    }
    if(meta&&typeof meta==="object"){ for(var m in meta){ if(meta[m]!==undefined) out[m]=meta[m]; } }
    if(out.archivee===undefined) out.archivee=false;
    return out;
  }, function(err, committed){ if(cb) cb(err||null, committed); });
}

// ── 6. Suppression d'élève : INTERDITE hors MJPC ──
// Une seule logique de suppression, dans la console MJPC (archive avant tout).
// Les apps remplacent leurs boutons de suppression par ce renvoi.
var MJPC_URL="https://siteflow-io.github.io/monsieurjaipascompris/index.html";
function renvoyerVersMJPC(motif){
  var msg="La gestion des \u00e9l\u00e8ves (ajout, retrait, archivage) se fait dans MJPC, pour que rien ne se perde."
        +(motif?"\n\n("+motif+")":"");
  if(typeof window!=="undefined"&&window.confirm(msg+"\n\nOuvrir MJPC ?")){ window.open(MJPC_URL,"_blank"); }
}

// ── 7. Identification nominative : le portail commun (logique) ──
// Toute identification produit des élèves SINGULIERS (clé canonique), que le
// travail soit individuel ou en groupe. Le groupe est un contenant, pas une identité.
// resolveEleves(roster, saisies) → [{nom, cle}] ou {erreur}
//   roster  : liste des noms de la classe (extractEleves)
//   saisies : ["DUPONT Marie", …] (chips) ou [{nom:"DUPONT",prenom:"Marie"}] (champs)
function resolveEleves(roster, saisies){
  var res=[], vus={};
  for(var i=0;i<(saisies||[]).length;i++){
    var s=saisies[i], trouve=null;
    if(typeof s==="string"){
      for(var j=0;j<roster.length;j++){ if(roster[j]===s){trouve=roster[j];break;} }
      if(!trouve){ var k=sanMJPC(s); for(j=0;j<roster.length;j++){ if(sanMJPC(roster[j])===k){trouve=roster[j];break;} } }
    } else if(s&&s.nom&&s.prenom){
      var nomU=String(s.nom).trim().toUpperCase(), preL=String(s.prenom).trim().toLowerCase();
      for(j=0;j<roster.length;j++){
        var parts=roster[j].split(" ");
        var rNom=parts.slice(0,-1).join(" ").toUpperCase(), rPre=(parts[parts.length-1]||"").toLowerCase();
        if(rNom===nomU&&rPre===preL){trouve=roster[j];break;}
      }
    }
    if(!trouve) return {erreur:"\u00c9l\u00e8ve introuvable : "+(typeof s==="string"?s:(s.nom+" "+s.prenom))+". V\u00e9rifie l'orthographe."};
    var cle=sanMJPC(trouve);
    if(vus[cle]) return {erreur:"\u00c9l\u00e8ve s\u00e9lectionn\u00e9 deux fois : "+trouve};
    vus[cle]=1; res.push({nom:trouve, cle:cle});
  }
  if(!res.length) return {erreur:"Aucun \u00e9l\u00e8ve identifi\u00e9."};
  return res;
}

// ── 8. Manifeste (vue projetée, ADDITIVE) ──
// Les constantes en dur dans l'app restent la source de vérité ; le manifeste
// n'est qu'une photographie publiée pour MJPC. Incapable de diverger : republiée
// à chaque chargement prof.
function publierManifeste(db){
  try{
    db.ref("manifestes/"+MJPC_APP.id).set({
      version: MJPC_CORE_VERSION,
      app: MJPC_APP,
      manifeste: MJPC_MANIFESTE||{},
      purge: MJPC_PURGE||{preserver:[],purger:[]},
      publie_le: Date.now()
    });
  }catch(e){ /* le manifeste ne doit jamais casser l'app */ }
}

// ── 8. Session partagée MJPC : l'app reconnaît qui est déjà connecté au site ──
// Le site MJPC écrit 'mjpc_eleve' (sessionStorage + localStorage, même origine).
// L'app la LIT ; elle ne l'écrit jamais. Validité : 12 h par défaut (une journée
// de cours). Une session invalide ou périmée → null → portail natif de l'app.
function lireSessionMJPC(ttlMs){
  var ttl = ttlMs || 12*3600*1000;
  var brut = null;
  try{ brut = sessionStorage.getItem("mjpc_eleve") || localStorage.getItem("mjpc_eleve"); }catch(e){}
  if(!brut) return null;
  var s; try{ s = JSON.parse(brut); }catch(e){ return null; }
  if(!s || typeof s!=="object") return null;
  if(!s.ts || (Date.now()-s.ts) > ttl) return null;          /* périmée */
  if(s.is_prof===true) return {is_prof:true, display:s.display||"Professeur", ts:s.ts};
  var nom = s.display || ((s.nom||"")+" "+(s.prenom||"")).trim();
  if(!nom || !s.classe) return null;
  return {is_prof:false, nom:nom, classe:s.classe, ts:s.ts};
}
// La session dit « CLÉMENT Noé, 4e Hugo » — l'app VÉRIFIE contre le registre
// officiel (/classes) avant d'ouvrir : classe existante, élève au registre.
// Rend l'identité résolue {nom (celui du registre), classe, cle} ou null.
function validerEleveMJPC(session, classesData){
  if(!session || session.is_prof) return null;
  var cl = (classesData||{})[session.classe];
  if(!cl || (cl&&cl.archivee)) return null;
  var roster = extractEleves(cl, []);
  var cible = sanMJPC(session.nom);
  for(var i=0;i<roster.length;i++){
    if(sanMJPC(roster[i])===cible) return {nom:roster[i], classe:session.classe, cle:cible};
  }
  return null;
}

// ════════════════════════════════════════════════════════════════════
// SCORING — mode strict ou partiel (configuré au niveau de l'éval)
// ════════════════════════════════════════════════════════════════════
// Une éval a un champ `mode` :
//   - "strict"  (défaut) : tout ou rien. Chaque question vaut 1 point ; score=1 si
//                          réponse parfaite (toutes les bonnes, aucune mauvaise),
//                          0 sinon. Total max éval = nb de questions.
//                          → identique au comportement historique : rétro-compat.
//   - "partiel" : chaque question vaut autant de points qu'elle a de bonnes cases.
//                 Score par question = max(0, nb_bonnes_cochées − nb_mauvaises_cochées),
//                 plafonné au max. Total max éval = somme des nb_bonnes.
// Helpers utilisés partout dans le code pour homogénéiser le calcul.

// ════════════════════════════════════════════════════════════════════
// P2 — L'INSTRUMENT DE MESURE EST VERSIONNÉ (M7, décision de Paul du 18/07)
// ════════════════════════════════════════════════════════════════════
// « Lorsque je crée un QCM et qu'une éval est faite dessus, les résultats sont
//   figés avec ces questions telles qu'elles étaient. Si je modifie ensuite et
//   que je recommence l'éval, ça compte comme une NOUVELLE éval. On ne mélange
//   pas les résultats de deux QCM différents, même s'ils ont une base commune. »
//
// Conséquences codées ici :
//   ① À LA CLÔTURE, la session fige l'énoncé + le barème (sess.evalSnapshot).
//   ② MODIFIER une éval qui a déjà des résultats crée une VERSION nouvelle
//      (ev.version incrémentée) : c'est une identité, pas une mise à jour.
//   ③ On n'agrège JAMAIS deux versions — ni dans les stats par question,
//      ni dans le profil longitudinal (la clé porte la version).
//   ④ Côté prof, l'historique montre les versions distinctement.
//
// Règle d'accès : TOUT calcul de score sur une session passe par
// evalDeSession(). Aucun autre point d'accès, sinon le piège renaît.

// Identité versionnée d'une évaluation : "eval_123" + version 2 → "eval_123@v2".
function versionEval(ev){ return (ev && typeof ev.version === "number") ? ev.version : 1; }
function identiteEval(evId, version){ return String(evId) + "@v" + (version || 1); }

// L'énoncé qui fait foi pour UNE session : son snapshot s'il existe, l'éval
// courante sinon (sessions closes avant M7 — repli assumé, signalé côté prof).
function evalDeSession(sess, evals){
  if(sess && sess.evalSnapshot) return sess.evalSnapshot;
  return (evals && sess) ? evals[sess.evalId] : null;
}
function sessionEstFigee(sess){ return !!(sess && sess.evalSnapshot); }

// Ce qu'on fige : tout ce dont dépend un score. Rien d'autre (pas de titre
// décoratif, pas de métadonnées mouvantes) — un snapshot doit rester lisible.
function construireEvalSnapshot(ev){
  if(!ev) return null;
  return {
    titre: ev.titre || "",
    mode: modeEval(ev),
    version: versionEval(ev),
    questions: JSON.parse(JSON.stringify(ev.questions || [])),
    figeLe: Date.now()
  };
}

// Une évaluation a-t-elle déjà servi ? (sessions closes OU réponses enregistrées)
function evalADesResultats(evId, sessions){
  if(!evId || !sessions) return false;
  var ks = Object.keys(sessions);
  for(var i=0;i<ks.length;i++){
    var sx = sessions[ks[i]];
    if(!sx || sx.evalId !== evId) continue;
    if(sx.etat === "terminee") return true;
    if(sx.reponses && Object.keys(sx.reponses).length > 0) return true;
  }
  return false;
}

// Clôture UNIQUE de session (il y en avait deux, plus une écriture directe :
// le snapshot aurait manqué par l'un des chemins).
function cloturerSession(sess, ev, cb){
  if(!sess || !sess.id) return;
  var maj = {};
  maj["/sessions/"+sess.id+"/etat"] = "terminee";

function modeEval(ev){
  return (ev && ev.mode === "partiel") ? "partiel" : "strict";
}

function scoreMaxQuestion(question, mode){
  if(!question) return 0;
  if(mode === "partiel") return ((question.bonnes||[]).length);
  return 1; // mode strict : tout ou rien sur 1 point
}

function scoreMaxEval(ev){
  if(!ev || !ev.questions) return 0;
  var mode = modeEval(ev);
  return ev.questions.reduce(function(acc, q){ return acc + scoreMaxQuestion(q, mode); }, 0);
}

// Calcule le score d'une réponse pour une question.
// Retourne { score, max, ok, partiel }
//   ok      = vrai si la réponse est parfaite (toutes les bonnes, aucune mauvaise)
//   partiel = vrai en mode partiel si score > 0 mais imparfait (état intermédiaire)
function calculerScoreQuestion(choixEleve, bonnes, mode){
  var bn = (bonnes || []);
  var ch = (choixEleve || []);
  var maxStrict = 1;
  var maxPartiel = bn.length;
  if(ch.length === 0){
    return {score: 0, max: (mode === "partiel") ? maxPartiel : maxStrict, ok: false, partiel: false};
  }
  var chSorted = ch.slice().sort(function(a,b){return a-b});
  var bnSorted = bn.slice().sort(function(a,b){return a-b});
  var parfait = (chSorted.length === bnSorted.length) &&
                JSON.stringify(chSorted) === JSON.stringify(bnSorted);
  if(mode === "partiel"){
    var nbBon = 0, nbMauv = 0;
    ch.forEach(function(c){
      if(bn.indexOf(c) >= 0) nbBon++;
      else nbMauv++;
    });
    var score = Math.max(0, nbBon - nbMauv);
    if(score > maxPartiel) score = maxPartiel; // sécurité
    return {score: score, max: maxPartiel, ok: parfait, partiel: !parfait && score > 0};
  }
  // Mode strict (défaut)
  return {score: parfait ? maxStrict : 0, max: maxStrict, ok: parfait, partiel: false};
}

// Lit les paramètres d'URL en priorité depuis le hash (#mode=prof&view=phone),
// fallback sur le query string (?mode=prof). Le hash est nécessaire car le
// service worker du site MJPC (PWA) intercepte les URLs avec query string
// inconnues et sert l'accueil à la place de l'app. Le hash, jamais transmis
// au service worker, contourne ce problème pour les URLs internes (QR, board).
function getURLParams(){
  var hash = window.location.hash.replace(/^#/, "");
  var search = window.location.search.replace(/^\?/, "");
  var fused = (search ? search + (hash ? "&" : "") : "") + hash;
  return new URLSearchParams(fused);
}

// Normalise les élèves au format interne QCM : [{nomComplet, sexe}, ...]
// (le sexe peut être absent si la classe a été créée par une autre app).
function normaliserElevesQCM(elevesBrut){
  return (elevesBrut || []).map(function(e){
    if(typeof e === "string") return {nomComplet: e};
    if(e && typeof e === "object"){
      if(e.nomComplet) return {nomComplet: e.nomComplet, sexe: e.sexe || ""};
      if(e.nom && e.prenom) return {nomComplet: String(e.nom).toUpperCase()+" "+e.prenom, sexe: e.sexe || ""};
    }
    return null;
  }).filter(function(x){ return x && x.nomComplet; });
}

// Transforme le snapshot /classes racine (clés = noms complets) en l'objet
// indexé par slug interne {slug: {nom, eleves}} que QCM consomme.
function normaliserClassesQCM(snapVal){
  var out = {};
  if(!snapVal || typeof snapVal !== "object") return out;
  Object.keys(snapVal).forEach(function(nomComplet){
    var slug = slugClasse(nomComplet);
    if(!slug) return;
    var fb = snapVal[nomComplet];
    var elevesNormalises = normaliserElevesQCM(extractEleves(fb, []));
    var niveau = (fb && typeof fb === "object" && !Array.isArray(fb)) ? (fb.niveau || "") : "";
    out[slug] = { slug: slug, nom: nomComplet, eleves: elevesNormalises, niveau: niveau };
  });
  return out;
}

// Détecte si une classe est "interne" (test, archive, etc.) : convention nom préfixé par "_".
// Utilisé pour filtrer ces classes des listes affichées au prof et à l'élève.
// IMPORTANT : on regarde le NOM COMPLET, pas le slug, car slugify() retire les "_" préfixes.
// C1 (M7) — cette fonction prend un OBJET classe, le socle prend une CHAÎNE.
// Portant le même nom, elle écrasait celle du socle pour tout le fichier :
// estClasseTest("_test_evaluation-qcm") renvoyait false et seule l'égalité
// littérale sauvait les filtres. Renommée, jamais supprimée.
function estClasseInterneObj(classe){
  if(!classe || !classe.nom) return false;
  return estClasseInterne(classe.nom);
}

// Surveille à la fois /classes (mutualisé) et qcm/eleveSexes (propre à QCM),
// fusionne les sexes par élève sur les classes, et appelle onUpdate(classesObj)
// dès que l'un ou l'autre change. Retourne une fonction de détachement.
// Les sexes vivent dans un nœud séparé pour que correction_dictee ou d'autres
// apps qui font des .set() complets sur /classes/{nom} ne puissent pas les écraser.
function surveillerClassesAvecSexes(onUpdate){
  var classesData = null;
  var sexesData = {};
  function combine(){
    if(classesData === null) return; // pas encore chargé
    var out = normaliserClassesQCM(classesData);
    Object.keys(out).forEach(function(slug){
      var sexesClasse = sexesData[out[slug].nom] || {};
      out[slug].eleves = out[slug].eleves.map(function(el){
        var slugEl = slugify(el.nomComplet);
        var sex = sexesClasse[slugEl];
        if(sex) return Object.assign({}, el, {sexe: sex});
        // Si pas de sexe dans le nœud séparé mais un sexe legacy dans /classes,
        // on le conserve (sera migré la 1re fois qu'on l'édite via setSexeEleve).
        return el;
      });
    });
    onUpdate(out);
  }
  function onC(snap){ classesData = snap.val() || {}; combine(); }
  function onS(snap){ sexesData = snap.val() || {}; combine(); }
  db.ref("classes").on("value", onC);
  db.ref("qcm/eleveSexes").on("value", onS);
  return function(){
    db.ref("classes").off("value", onC);
    db.ref("qcm/eleveSexes").off("value", onS);
  };
}

// Migration silencieuse au démarrage : copie qcm/classes/{slug} vers
// /classes/{nomComplet} pour toutes les classes absentes de la racine.
// Idempotent (rien à faire si tout est déjà migré). Migre aussi les sexes legacy
// stockés dans /classes/{nom}/eleves[i].sexe vers /qcm/eleveSexes/{nom}/{slugEl}.
// Appelle onDone(nbCopiees, nbSexesMigres) une fois terminé.
function migrerClassesUneFois(onDone){
  Promise.all([
    db.ref("qcm/classes").once("value"),
    db.ref("classes").once("value"),
    db.ref("qcm/eleveSexes").once("value")
  ]).then(function(snaps){
    var anciennes = snaps[0].val() || {};
    var dejaRacine = snaps[1].val() || {};
    var sexesExistants = snaps[2].val() || {};
    var existantsParNom = {};
    Object.keys(dejaRacine).forEach(function(k){ existantsParNom[k.toLowerCase()] = true; });
    var nbCopiees = 0, nbSexesMigres = 0;
    var promises = [];

    // 1) Pour CHAQUE classe ancienne sous qcm/classes/{slug}, on migre :
    //    - La classe elle-même vers /classes/{nom} SI elle n'existe pas déjà à la racine
    //    - Les sexes M/F (eleves[i].sexe) vers qcm/eleveSexes (TOUJOURS, même si la classe
    //      existe déjà à la racine — sinon on perdrait les sexes en restant sur la version
    //      ancienne qui les avait sauvegardés).
    Object.keys(anciennes).forEach(function(slug){
      var c = anciennes[slug];
      if(!c || !c.nom) return;
      var dejaPresente = !!existantsParNom[c.nom.toLowerCase()];
      // Migration des sexes (toujours, indépendamment de la présence à la racine)
      (c.eleves||[]).forEach(function(e){
        if(typeof e === "object" && e && e.nomComplet && e.sexe){
          var slugEl = slugify(e.nomComplet);
          var sexClasse = sexesExistants[c.nom] || {};
          if(!sexClasse[slugEl]){
            promises.push(db.ref("qcm/eleveSexes/"+c.nom+"/"+slugEl).set(e.sexe));
            nbSexesMigres++;
          }
        }
      });
      // Si la classe existe déjà à la racine, on ne re-copie pas (évite l'écrasement
      // d'une éventuelle version mise à jour par une autre app).
      if(dejaPresente) return;
      // Copie de la classe vers /classes/{nom} SANS les sexes (les sexes vivent
      // désormais dans qcm/eleveSexes, séparément, pour éviter qu'une autre app les écrase).
      // MJPC-CORE : la classe absente est créée via ecrireClasse — format
      // canonique {eleves:[chaînes], nom, niveau?, archivee:false} d'emblée.
      var metaCl = c.niveau ? {nom:c.nom, niveau:c.niveau} : {nom:c.nom};
      promises.push(new Promise(function(resolve){
        ecrireClasse(db, c.nom, c.eleves||[], metaCl, function(){ resolve(); });
      }));
      nbCopiees++;
    });

    // 2) Pour les classes déjà à la racine, migrer les sexes legacy qui pourraient
    //    y être encore stockés (eleves[i].sexe), vers qcm/eleveSexes
    Object.keys(dejaRacine).forEach(function(nom){
      var fb = dejaRacine[nom];
      if(!fb || typeof fb !== "object" || Array.isArray(fb)) return;
      if(!Array.isArray(fb.eleves)) return;
      fb.eleves.forEach(function(e){
        if(typeof e === "object" && e && e.nomComplet && e.sexe){
          var slugEl = slugify(e.nomComplet);
          var sexClasse = sexesExistants[nom] || {};
          if(!sexClasse[slugEl]){
            promises.push(db.ref("qcm/eleveSexes/"+nom+"/"+slugEl).set(e.sexe));
            nbSexesMigres++;
          }
        }
      });
    });

    Promise.all(promises).then(function(){
      onDone(nbCopiees, nbSexesMigres);
    }).catch(function(err){
      console.warn("Migration classes : écriture partielle échouée", err);
      onDone(nbCopiees, nbSexesMigres);
    });
  }).catch(function(err){
    console.warn("Migration classes : lecture échouée", err);
    onDone(0, 0);
  });
}

function parseListe(texte){
  var lignes = texte.split("\n").map(function(l){return l.replace(/\s+$/,"")}).filter(function(l){return l.trim()});
  var eleves = [];
  for(var i=0;i<lignes.length;i++){
    var ligne = lignes[i];
    var nomComplet, lien = "", sexe = "";

    // Format 1 : "NOM Prénom\tF" (export École Directe, tabulation entre nom et sexe)
    // Tolérant : tabulations multiples ou plusieurs espaces
    var mEd = ligne.match(/^(.+?)[\t]+([MFmf])(?:\s|$|\t)/);
    if(mEd){
      nomComplet = mEd[1].trim();
      sexe = mEd[2].toLowerCase();
    } else {
      // Format 2 : "Prénom NOM: lien"
      var mLien = ligne.match(/^(.+?)\s*:\s*(https?:\/\/\S+)\s*$/);
      if(mLien){
        nomComplet = mLien[1].trim();
        lien = mLien[2].trim();
      } else {
        // Format 3 : juste "Prénom NOM"
        nomComplet = ligne.trim();
      }
    }

    var eleve = {nomComplet:nomComplet};
    if(lien) eleve.lien = lien;
    // Si sexe pas explicite, on tente la déduction
    if(!sexe){
      var mots = nomComplet.split(/\s+/);
      sexe = deduireSexe(mots[0]) || deduireSexe(mots[mots.length-1]);
    }
    if(sexe) eleve.sexe = sexe;
    eleves.push(eleve);
  }
  return eleves;
}
function eleveToString(e){
  return e.lien ? (e.nomComplet+": "+e.lien) : e.nomComplet;
}

var SET_M = {}; PRENOMS_M.forEach(function(p){SET_M[p]=true});
var SET_F = {}; PRENOMS_F.forEach(function(p){SET_F[p]=true});
function deduireSexe(nomComplet){
  if(!nomComplet) return "";
  // Premier mot = prénom (lowercase, sans accent simplifié pour matching)
  var prenom = nomComplet.trim().split(/\s+/)[0].toLowerCase()
    .replace(/[àâä]/g,"a").replace(/[éèêë]/g,"e").replace(/[îï]/g,"i").replace(/[ôö]/g,"o").replace(/[ùûü]/g,"u").replace(/ç/g,"c").replace(/ÿ/g,"y");
  // Recherche directe puis avec accents
  if(SET_M[nomComplet.trim().split(/\s+/)[0].toLowerCase()]) return "m";
  if(SET_F[nomComplet.trim().split(/\s+/)[0].toLowerCase()]) return "f";
  if(SET_M[prenom]) return "m";
  if(SET_F[prenom]) return "f";
  return "";
}

// PARSER ÉVALUATION (JSON)
// ════════════════════════════════════════════════════════════════════
function parseEvaluation(texte){
  if(!texte || !texte.trim()) return {error:"Aucun texte fourni"};
  var raw;
  try{
    raw = JSON.parse(texte);
  }catch(e){
    return {error:"JSON invalide : "+e.message};
  }
  if(!raw || typeof raw !== "object") return {error:"Le JSON doit être un objet"};
  if(!raw.titre || typeof raw.titre !== "string") return {error:"Champ 'titre' manquant ou invalide"};
  if(!Array.isArray(raw.questions) || raw.questions.length === 0) return {error:"Champ 'questions' manquant ou vide"};

  var questions = [];
  for(var i=0;i<raw.questions.length;i++){
    var q = raw.questions[i];
    if(!q || typeof q !== "object") return {error:"Question "+(i+1)+" : format invalide"};
    if(!q.enonce || typeof q.enonce !== "string") return {error:"Question "+(i+1)+" : énoncé manquant"};
    if(!Array.isArray(q.choix) || q.choix.length < 2) return {error:"Question "+(i+1)+" : il faut au moins 2 choix"};
    if(!Array.isArray(q.bonnes) || q.bonnes.length === 0) return {error:"Question "+(i+1)+" : aucune bonne réponse définie"};
    // Vérification index valides
    for(var j=0;j<q.bonnes.length;j++){
      var idx = q.bonnes[j];
      if(typeof idx !== "number" || idx < 0 || idx >= q.choix.length){
        return {error:"Question "+(i+1)+" : index de bonne réponse invalide ("+idx+")"};
      }
    }
    var niv = q.niveau ? getNiveau(q.niveau).id : "standard";
    questions.push({
      enonce: q.enonce.trim(),
      choix: q.choix.map(function(c){return String(c).trim()}),
      bonnes: q.bonnes.slice(),
      niveau: niv,
      explication: q.explication ? String(q.explication).trim() : ""
    });
  }
  return {
    titre: raw.titre.trim(),
    // Mode de scoring : "strict" (défaut, tout ou rien) ou "partiel" (1 pt/bonne case,
    // -1 pt/mauvaise case, plancher 0). Tolérance sur le champ : si absent ou invalide,
    // on retombe sur "strict" (rétro-compat avec toutes les évals existantes).
    mode: (raw.mode === "partiel") ? "partiel" : "strict",
    questions: questions
  };
}

// SNAPSHOT
// ════════════════════════════════════════════════════════════════════
function snapshotExport(){
  // Depuis juin 2026, les classes vivent à /classes racine (partagé entre apps MJPC)
  // et les sexes M/F dans qcm/eleveSexes. Le snapshot doit inclure les deux en plus
  // du contenu de qcm/ pour être un vrai "snapshot complet de QCM".
  Promise.all([
    db.ref(DB_ROOT).once("value"),
    db.ref("classes").once("value")
  ]).then(function(snaps){
    var dataQcm = snaps[0].val() || {};
    var dataClasses = snaps[1].val() || {};
    var payload = {
      _meta:{source:DB_ROOT, exportedAt:new Date().toISOString(), version:2,
             note:"version 2 (juin 2026) : inclut les classes mutualisées /classes racine"},
      data:dataQcm,
      classes:dataClasses
    };
    var blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "qcm_"+new Date().toISOString().slice(0,10)+".json";
    a.click();
    URL.revokeObjectURL(url);
  });
}
function snapshotImport(file, onDone){
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var payload = JSON.parse(e.target.result);
      // Compat snapshots v1 (avant mutualisation) : pas de payload.classes,
      // les classes étaient sous payload.data.classes (sous qcm/classes).
      var dataQcm = payload.data || payload;
      var dataClasses = payload.classes || null;
      var aPayloadClasses = !!dataClasses;
      var dateSnap = (payload._meta && payload._meta.exportedAt) || "?";
      var version = (payload._meta && payload._meta.version) || 1;
      var msg = "⚠️ Écraser toutes les données QCM avec le snapshot du "+dateSnap+" ?\n\n";
      if(aPayloadClasses){
        msg += "Ce snapshot (v"+version+") contient AUSSI les classes partagées /classes. Leurs LISTES D'ÉLÈVES seront restaurées classe par classe (écriture non destructive : métadonnées préservées, aucune classe existante supprimée).\n";
      } else {
        msg += "Ce snapshot est ancien (v1, avant juin 2026) et ne contient PAS les classes mutualisées. Les classes actuelles à /classes seront conservées telles quelles.\n";
      }
      if(!confirm(msg+"\nContinuer ?")) return;
      var promises = [db.ref(DB_ROOT).set(dataQcm)];
      if(aPayloadClasses){
        // MJPC-CORE 14/07/2026 : fini le .set() sur la racine /classes (dette A.1).
        // Restauration classe par classe via ecrireClasse : la liste d'élèves du
        // snapshot remplace la liste courante ; archivee/niveau/… sont préservés ;
        // les classes absentes du snapshot ne sont PAS touchées (jamais de
        // suppression silencieuse).
        Object.keys(dataClasses).forEach(function(nomCl){
          promises.push(new Promise(function(resolve){
            ecrireClasse(db, nomCl, extractEleves(dataClasses[nomCl], []), function(){ resolve(); });
          }));
        });
      }
      Promise.all(promises).then(function(){
        alert("✅ Snapshot importé.");
        if(onDone) onDone();
      }).catch(function(err){ alert("Erreur: "+err.message); });
    }catch(ex){ alert("Fichier invalide: "+ex.message); }
  };
  reader.readAsText(file);
}

    var classesArr = Object.keys(classes).filter(function(k){
      return p.bacASable ? true : !estClasseInterneObj(classes[k]);
    }).map(function(k){return Object.assign({slug:k}, classes[k])});
    return h("div", {className:"eleve-page"},
      ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
      h("div", {className:"eleve-card"},
        h("h1", null, "🎓 Choisis ta classe"),
        classesArr.length === 0
          ? h("p", {style:{color:"var(--gris)"}}, "Aucune classe disponible.")
          : h("div", {className:"eleves-grid"},
              classesArr.map(function(c){
                return h("button", {key:c.slug, className:"eleve-btn", onClick:function(){setClasseSlug(c.slug)}}, c.nom);
              })
            ),
        h("div", {style:{marginTop:"1.5rem"}},
          h("button", {className:"btn btn-ghost btn-sm", onClick:p.onBack}, "← Retour")
        )
      )
    );
  }

  if(!eleve){
    return h(EleveLogin, {classe:classes[classeSlug], classeSlug:classeSlug, onLogin:setEleve, onBack:function(){setClasseSlug("")}});
  }

  if(voirMesEvals){
    return h(MesEvaluations, {classeSlug:classeSlug, eleve:eleve, onBack:function(){setVoirMesEvals(false)}});
  }

  return h("div", null,
    h(EleveSession, {classe:classes[classeSlug], classeSlug:classeSlug, eleve:eleve, onBack:function(){setEleve(null)}}),
    // Point 8 — « Mes évaluations » : le lieu des travaux antérieurs de l'élève.
    h("div", {style:{textAlign:"center", padding:"0 1rem 1.5rem"}},
      h("button", {className:"btn btn-ghost btn-sm", onClick:function(){setVoirMesEvals(true)}}, "📊 Mes évaluations")
    )
  );
}

// ════════════════════════════════════════════════════════════════════
// M7 — « MES ÉVALUATIONS » (point 8)
// ════════════════════════════════════════════════════════════════════
// Assemblé à partir des briques existantes : le profil longitudinal écrit par
// archiverDansProfilsMJPC (mjpcProfils/<classe>/<élève>/sessions) est déjà le
// modèle de tous les « Mes… » de l'écosystème. On ne le réécrit pas : on lui
// donne un lieu. Lecture seule, aucun recalcul, aucune écriture.
function MesEvaluations(p){
  var s1 = useState(null), hist = s1[0], setHist = s1[1];
  var s2 = useState(null), ouverte = s2[0], setOuverte = s2[1];
  var classeSlug = p.classeSlug;
  var slug = p.eleve.slug;

  useEffect(function(){
    db.ref("mjpcProfils/"+classeSlug+"/"+slug+"/sessions").once("value", function(snap){
      var v = snap.val() || {};
      var arr = Object.keys(v).map(function(k){ return Object.assign({sid:k}, v[k]); });
      arr.sort(function(a,b){ return (b.date||0) - (a.date||0); });
      setHist(arr);
    }, function(){ setHist([]); });
  }, [classeSlug, slug]);

  if(hist === null) return h("div", {className:"eleve-page"},
    h("div", {className:"eleve-card"}, h("h1", null, "Chargement…")));

  if(ouverte){
    // Le bilan détaillé est déjà produit à l'archivage : on le montre tel quel,
    // sans recalculer un score (P2 : on ne recompte jamais après coup).
    return h("div", {className:"eleve-page"},
      h("div", {className:"eleve-card", style:{maxWidth:"860px"}},
        h("button", {className:"btn btn-ghost btn-sm", onClick:function(){setOuverte(null)}}, "← Mes évaluations"),
        h("h1", null, ouverte.titre || "Évaluation"),
        h("p", {style:{opacity:.75}}, new Date(ouverte.date).toLocaleDateString("fr-FR")),
        ouverte.bilanHTML
          ? h("div", {dangerouslySetInnerHTML:{__html: ouverte.bilanHTML}})
          : h("p", null, "Le détail de cette évaluation n'a pas été conservé.")
      )
    );
  }

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-card", style:{maxWidth:"640px"}},
      h("h1", null, "📊 Mes évaluations"),
      h("p", {style:{opacity:.8}}, p.eleve.nomComplet),
      hist.length === 0
        ? h("p", {style:{opacity:.8}}, "Tu n'as pas encore d'évaluation ici. Celles de ta classe apparaîtront après la correction.")
        : h("div", {className:"eleves-grid"},
            hist.map(function(x){
              var pct = (x.maxP && x.scorePondere != null) ? Math.round((x.scorePondere / x.maxP) * 100) : null;
              return h("button", {key:x.sid, className:"eleve-btn", style:{textAlign:"left"},
                onClick:function(){ setOuverte(x); }},
                h("div", {style:{fontWeight:700}}, x.titre || "Évaluation",
                  // P2 : deux versions d'une même évaluation ne se confondent pas.
                  (x.evalVersion && x.evalVersion > 1)
                    ? h("span", {style:{marginLeft:".4rem", fontSize:".72rem", opacity:.8}}, "v" + x.evalVersion) : null),
                h("div", {style:{fontSize:".82rem", opacity:.75}},
                  new Date(x.date).toLocaleDateString("fr-FR"),
                  (pct !== null ? " · " + pct + "%" : ""))
              );
            })
          ),
      h("div", {style:{marginTop:"1.5rem"}},
        h("button", {className:"btn btn-ghost btn-sm", onClick:p.onBack}, "← Retour")
      )
    )
  );
}

// ─────────── Login élève ───────────
// ═══ M7 — PORTAIL D'IDENTITÉ ÉLÈVE (point 7) ═══
// Avant : prénom + nom en texte libre, comparés au roster. N'importe qui
// entrait en tant que n'importe qui. Désormais : code personnel MJPC + nom +
// prénom, vérifiés contre /codes ; ou shunt si l'élève est déjà connecté au
// site MJPC (socle §8). L'app reste autonome si MJPC tombe.
function EleveLogin(p){
  var s1 = useState(""), prenom = s1[0], setPrenom = s1[1];
  var s2 = useState(""), nom = s2[0], setNom = s2[1];
  var s3 = useState(""), err = s3[0], setErr = s3[1];
  var s4 = useState(""), code = s4[0], setCode = s4[1];
  var s5 = useState(null), codesData = s5[0], setCodesData = s5[1];
  var s6 = useState(false), shuntFait = s6[0], setShuntFait = s6[1];

  useEffect(function(){
    db.ref("codes").once("value", function(snap){ setCodesData(snap.val() || {}) }, function(){ setCodesData({}) });
  }, []);

  // Shunt : l'élève déjà connecté au site n'a rien à ressaisir.
  useEffect(function(){
    if(shuntFait) return;
    setShuntFait(true);
    var sess = lireSessionMJPC();
    if(!sess || sess.is_prof) return;
    var eleves = p.classe.eleves || [];
    for(var i=0;i<eleves.length;i++){
      if(slugify(eleves[i].nomComplet) === sanMJPC((sess.prenom||"")+" "+(sess.nom||"")) ||
         slugify(eleves[i].nomComplet) === sanMJPC((sess.nom||"")+" "+(sess.prenom||""))){
        p.onLogin({nomComplet:eleves[i].nomComplet, slug:slugify(eleves[i].nomComplet)});
        return;
      }
    }
  }, [shuntFait, p.classe]);

  // Le code attendu, tolérant aux clés dégradées du registre (dette connue) :
  // si la clé canonique manque, on retrouve l'élève par son champ `name`.
  function codeAttendu(cle){
    if(!codesData) return null;
    var e = codesData[cle];
    if(typeof e === "string") return e;
    if(e && e.code) return String(e.code);
    var ks = Object.keys(codesData);
    for(var i=0;i<ks.length;i++){
      var v = codesData[ks[i]];
      if(v && v.name && sanMJPC(v.name) === cle) return v.code ? String(v.code) : null;
      if(sanMJPC(ks[i]) === cle) return (typeof v === "string") ? v : (v && v.code ? String(v.code) : null);
    }
    return null;
  }

  function valider(){
    var saisie = (prenom+" "+nom).trim().toLowerCase();
    if(!prenom.trim() || !nom.trim()){ setErr("Renseigne ton prénom et ton nom."); return; }
    if(!code.trim()){ setErr("Entre ton code personnel (4 chiffres)."); return; }
    var eleves = p.classe.eleves || [];
    var saisieSlug = slugify(saisie);
    var found = null;
    for(var i=0;i<eleves.length;i++){
      var nc = (eleves[i].nomComplet||"").toLowerCase();
      var ncSlug = slugify(nc);
      // Match strict (slug identique) ou ordre inversé
      var inv = slugify(nom+" "+prenom);
      if(ncSlug === saisieSlug || ncSlug === inv){ found = eleves[i]; break; }
    }
    if(!found){
      setErr("Élève introuvable dans la classe. Vérifie l'orthographe.");
      return;
    }
    var cle = slugify(found.nomComplet);
    var attendu = codeAttendu(cle);
    if(!attendu){ setErr("Ton code n'est pas encore enregistré. Viens me voir pour qu'on le mette en place."); return; }
    if(String(code.trim()) !== String(attendu)){ setErr("Ce code ne correspond pas. Vérifie tes 4 chiffres."); return; }
    setErr("");
    p.onLogin({nomComplet:found.nomComplet, slug:cle});
  }

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-card"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom),
      h("h1", null, "👋 Identifie-toi"),
      h("div", {className:"eleve-form"},
        h("input", {value:code, inputMode:"numeric", maxLength:6, onChange:function(e){setCode(e.target.value)}, placeholder:"Mon code (4 chiffres)", autoFocus:true, style:{textAlign:"center", letterSpacing:".3em", fontWeight:700}}),
        h("input", {value:prenom, onChange:function(e){setPrenom(e.target.value)}, placeholder:"Prénom"}),
        h("input", {value:nom, onChange:function(e){setNom(e.target.value)}, placeholder:"Nom", onKeyDown:function(e){if(e.key==="Enter")valider()}}),
        err && h("div", {className:"err"}, "❌ "+err),
        h("button", {className:"btn-accueil", onClick:valider}, "Entrer →"),
        h("button", {className:"btn btn-ghost btn-sm", onClick:p.onBack, style:{marginTop:".5rem"}}, "← Changer de classe")
      )
    )
  );
}

// ─────────── Session élève (lit la session en cours OU propose les passées) ───────────
function EleveSession(p){
  var s1 = useState(null), session = s1[0], setSession = s1[1];
  var s2 = useState(null), evaluation = s2[0], setEvaluation = s2[1];
  var s3 = useState([]), passees = s3[0], setPassees = s3[1];
  var s4 = useState(null), consultEval = s4[0], setConsultEval = s4[1];

  // Annonce de présence
  useEffect(function(){
    var ref = db.ref(DB_ROOT+"/presence/"+p.classeSlug+"/"+p.eleve.slug);
    ref.set({nomComplet:p.eleve.nomComplet, last:Date.now()});
    var iv = setInterval(function(){ ref.update({last:Date.now()}); }, 8000);
    ref.onDisconnect().remove();
    return function(){ clearInterval(iv); ref.remove(); };
  }, [p.eleve.slug, p.classeSlug]);

  // Surveille la session active
  useEffect(function(){
    db.ref(DB_ROOT+"/sessionActive/"+p.classeSlug).on("value", function(snap){
      var sid = snap.val();
      if(!sid){ setSession(null); setEvaluation(null); return; }
      db.ref(DB_ROOT+"/sessions/"+sid).on("value", function(snap2){
        var sess = snap2.val();
        if(!sess) return;
        sess.id = sid;
        setSession(sess);
        if(sess.evalId){
          if(sess.evalSnapshot){ setEvaluation(sess.evalSnapshot); }   // P2 : l'énoncé figé prime
          db.ref(DB_ROOT+"/evaluations/"+sess.evalId).once("value", function(snap3){
            if(!sess.evalSnapshot) setEvaluation(snap3.val());   // P2 : ne pas écraser l'énoncé figé
          });
        }
      });
    });
    return function(){ db.ref(DB_ROOT+"/sessionActive/"+p.classeSlug).off(); };
  }, [p.classeSlug]);

  // Charge les sessions passées de la classe
  useEffect(function(){
    db.ref(DB_ROOT+"/sessions").on("value", function(snap){
      var all = snap.val() || {};
      var arr = [];
      Object.keys(all).forEach(function(sid){
        var s = all[sid];
        if(s.classeSlug === p.classeSlug && s.etat === "terminee"){
          arr.push(Object.assign({id:sid}, s));
        }
      });
      arr.sort(function(a,b){return (b.date||0)-(a.date||0)});
      setPassees(arr);
    });
    return function(){ db.ref(DB_ROOT+"/sessions").off(); };
  }, [p.classeSlug]);

  // Si session active : afficher la session
  if(session && evaluation){
    if(session.phase === "finie"){
      return h(EleveBilan, {session:session, evaluation:evaluation, eleve:p.eleve, classe:p.classe});
    }
    if(session.phase === "correction"){
      return h(EleveCorrection, {session:session, evaluation:evaluation, eleve:p.eleve, classe:p.classe});
    }
    if(session.phase === "autoeval"){
      return h(EleveAutoeval, {session:session, evaluation:evaluation, eleve:p.eleve, classe:p.classe});
    }
    return h(EleveEval, {session:session, evaluation:evaluation, eleve:p.eleve, classe:p.classe, onBack:p.onBack});
  }

  // Si l'élève consulte une session passée
  if(consultEval){
    return h(EleveResultats, {sessionId:consultEval, eleve:p.eleve, classe:p.classe, onBack:function(){setConsultEval(null)}});
  }

  // Page d'accueil élève : pas de session active + liste des sessions passées
  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-card"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom),
      h("h1", null, "👋 Salut "+p.eleve.nomComplet+" !"),
      h("p", {className:"eleve-nom"}, "Tu es bien connecté."),
      h("div", {className:"etat-attente"}, "⏳ En attente d'une évaluation..."),
      passees.length > 0 && h("div", {style:{marginTop:"1.5rem", textAlign:"left"}},
        h("h3", {style:{color:"var(--violet)",fontWeight:900,marginBottom:".6rem"}}, "📊 Tes évaluations passées",
          h(InfoI, null, "Pour voir tes résultats détaillés, tu dois d'abord saisir tes réponses papier. Cela te permet de retravailler ta correction et te montre les écarts éventuels avec ce que tu avais cliqué.")
        ),
        h("div", {className:"results-eval-list"},
          passees.map(function(s){
            return h(EleveSessionPasseeRow, {key:s.id, sess:s, eleve:p.eleve, onConsulter:function(){setConsultEval(s.id)}});
          })
        )
      ),
      h("div", {style:{marginTop:"1.5rem"}},
        h("button", {className:"btn btn-ghost btn-sm", onClick:p.onBack}, "← Retour")
      )
    )
  );
}

// ─────────── Ligne de session passée pour l'élève ───────────
function EleveSessionPasseeRow(p){
  var s1 = useState(null), titre = s1[0], setTitre = s1[1];
  var s2 = useState(false), saisieFaite = s2[0], setSaisieFaite = s2[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/evaluations/"+p.sess.evalId).once("value", function(snap){
      var ev = snap.val();
      if(ev) setTitre(ev.titre);

    db.ref(DB_ROOT+"/sessions/"+p.sess.id+"/papier/"+p.eleve.slug).once("value", function(snap){
      var v = snap.val();
      setSaisieFaite(!!(v && v.choix));

  return h("div", {className:"results-eval-row", onClick:p.onConsulter},
    h("div", null,
      h("div", {className:"titre"}, titre || "(chargement...)"),
      h("div", {className:"meta"},
        new Date(p.sess.date||0).toLocaleDateString("fr-FR")+" · ",
        saisieFaite ? "✅ Saisie papier faite" : "📝 Saisie papier à faire"
      )
    ),
    h("div", null, "→")
  );
}

// ─────────── Page de résultats élève (consultation maison) ───────────
function EleveResultats(p){
  var s1 = useState(null), session = s1[0], setSession = s1[1];
  var s2 = useState(null), evaluation = s2[0], setEvaluation = s2[1];
  var s3 = useState({}), reponsesApp = s3[0], setReponsesApp = s3[1];
  var s4 = useState(null), papier = s4[0], setPapier = s4[1];
  var s5 = useState(null), scan = s5[0], setScan = s5[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+p.sessionId).once("value", function(snap){
      var s = snap.val();
      if(!s) return;
      setSession(Object.assign({id:p.sessionId}, s));
      if(s.evalSnapshot){ setEvaluation(s.evalSnapshot); }   // P2 : l'énoncé du jour de la session
      db.ref(DB_ROOT+"/evaluations/"+s.evalId).once("value", function(s2){
        if(!s.evalSnapshot) setEvaluation(s2.val());   // P2 : ne pas écraser l'énoncé figé
      });
    });
    // Réponses app de l'élève
    db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/reponses").on("value", function(snap){
      var all = snap.val() || {};
      var monMap = {};
      Object.keys(all).forEach(function(qi){
        if(all[qi][p.eleve.slug]) monMap[qi] = all[qi][p.eleve.slug];
      });
      setReponsesApp(monMap);
    });
    db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/papier/"+p.eleve.slug).on("value", function(snap){
      setPapier(snap.val());
    });
    db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/scans/"+p.eleve.slug).on("value", function(snap){
      setScan(snap.val());
    });
    return function(){
      db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/reponses").off();
      db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/papier/"+p.eleve.slug).off();
      db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/scans/"+p.eleve.slug).off();
    };
  }, [p.sessionId, p.eleve.slug]);

  if(!session || !evaluation){
    return h("div", {className:"eleve-page"},
      ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
      h("div", {className:"eleve-card"}, h("h1", null, "Chargement..."))
    );
  }

  // Si pas de saisie papier → écran de saisie β
  if(!papier || !papier.choix){
    return h(EleveSaisieBeta, {
      session:session, evaluation:evaluation, eleve:p.eleve, classe:p.classe, onBack:p.onBack
    });
  }

  // Calcul scores (compatibles strict ET partiel)
  var modeEv = modeEval(evaluation);
  var maxBrutEv = scoreMaxEval(evaluation);
  function scoreQ(qi, choix){
    var bonnes = (evaluation.questions[qi]||{}).bonnes||[];
    return calculerScoreQuestion(choix, bonnes, modeEv);
  }
  var scoreApp = 0, scorePapier = 0;
  evaluation.questions.forEach(function(q, qi){
    var ra = reponsesApp[qi];
    if(ra) scoreApp += scoreQ(qi, ra.choix).score;
    var cp = papier.choix[qi];
    if(cp) scorePapier += scoreQ(qi, cp).score;
  });
  // Bonus écart isolé favorable : on prend pour chaque question le MEILLEUR
  // entre le score app et le score papier — cohérent strict et partiel.
  var scoreFinal = 0;
  evaluation.questions.forEach(function(q, qi){
    var ra = reponsesApp[qi];
    var cp = papier.choix[qi];
    var sApp = ra ? scoreQ(qi, ra.choix).score : 0;
    var sPap = cp ? scoreQ(qi, cp).score : 0;
    scoreFinal += Math.max(sApp, sPap);
  });
  if(scoreFinal > maxBrutEv) scoreFinal = maxBrutEv;

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-results"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom + " · " + p.eleve.nomComplet),
      h("h2", null, "📊 "+evaluation.titre),
      h("p", {style:{color:"var(--gris)",fontSize:".9rem",marginBottom:"1rem"}}, "Évaluation du "+new Date(session.date||0).toLocaleDateString("fr-FR")),

      h("div", {className:"eleve-results-scores"},
        h("div", {className:"score-card officiel"},
          h("div", {className:"l"}, "Score officiel"),
          h("div", {className:"v"}, scoreFinal, h("small", null, " / "+evaluation.questions.length)),
          h(InfoI, null, "Score retenu pour la note : score papier + bonus si tu avais juste sur l'app et faux sur le papier de manière isolée. Ta note finale prend en compte ce qui te favorise.")
        ),
        h("div", {className:"score-card"},
          h("div", {className:"l"}, "Score papier"),
          h("div", {className:"v"}, scorePapier, h("small", null, " / "+evaluation.questions.length))
        ),
        h("div", {className:"score-card"},
          h("div", {className:"l"}, "Score app"),
          h("div", {className:"v"}, scoreApp, h("small", null, " / "+evaluation.questions.length))
        )
      ),

      scan && h("div", {style:{marginBottom:"1rem"}},
        h("h3", {style:{color:"var(--violet)",marginBottom:".5rem"}}, "📷 Ta copie scannée"),
        h("img", {src:scan, alt:"Scan de la copie", style:{maxWidth:"100%",borderRadius:"12px",border:"2px solid var(--bordure)"}})
      ),

      h("h3", {style:{color:"var(--violet)",marginBottom:".5rem"}}, "📋 Détail des questions"),
      evaluation.questions.map(function(q, qi){
        var ra = reponsesApp[qi];
        var cp = papier.choix[qi];
        var bonnes = (q.bonnes||[]).slice().sort();
        function lettres(arr){ return arr && arr.length ? arr.slice().sort().map(lettreFromIndex).join("") : "—"; }
        var scApp = ra ? scoreQ(qi, ra.choix) : null;
        var scPap = cp ? scoreQ(qi, cp) : null;
        var appJuste = scApp && scApp.ok;
        var papJuste = scPap && scPap.ok;
        var ecartApp = ra && cp && JSON.stringify((ra.choix||[]).slice().sort()) !== JSON.stringify((cp||[]).slice().sort());
        var clsLi = "eleve-q-recap";
        if(appJuste && papJuste) clsLi += " juste-tout";
        else if(!appJuste && !papJuste) clsLi += " faux-tout";
        return h("div", {key:qi, className:clsLi},
          h("div", {className:"titre"},
            h("span", {className:"num"}, "Q"+(qi+1)+" — "+q.enonce),
            h("span", {className:"eleve-q-pastille", style:{background:getNiveau(q.niveau).color, color:q.niveau==="facile"?"#5C4500":"#fff"}}, getNiveau(q.niveau).label)
          ),
          h("div", {className:"reps"},
            h("div", {className:"rep-bloc bonne"},
              h("div", {className:"rl"}, "Bonne réponse"),
              h("div", {className:"rv"}, lettres(bonnes))
            ),
            h("div", {className:"rep-bloc "+(cp ? (papJuste?"juste":"faux") : "")},
              h("div", {className:"rl"}, "Ma copie papier"),
              h("div", {className:"rv"}, lettres(cp))
            ),
            h("div", {className:"rep-bloc "+(ra ? (appJuste?"juste":"faux") : "")},
              h("div", {className:"rl"}, "Mes choix app"),

            )
          ),
          ecartApp && h("div", {className:"ecart-warn"}, "ℹ️ Tu as cliqué sur l'app un choix différent de ce que tu avais écrit sur ta copie.")
        );

      h("div", {style:{marginTop:"1.5rem"}},
        h("button", {className:"btn btn-ghost btn-sm", onClick:p.onBack}, "← Retour")
      )
    )
  );
}

// ─────────── Saisie β élève (recopiage de la copie papier) ───────────
function EleveSaisieBeta(p){
  var ev = p.evaluation;
  var s1 = useState(p.evaluation.questions.map(function(){return []})), saisies = s1[0], setSaisies = s1[1];
  var s2 = useState(false), envoyé = s2[0], setEnvoyé = s2[1];
  var s3 = useState(Date.now()), debut = s3[0], setDebut = s3[1];
  var s4 = useState({changes:0, time:0}), tracking = s4[0], setTracking = s4[1];

  function toggleLettre(qi, idx){
    setSaisies(function(prev){
      var copy = prev.slice();
      var arr = copy[qi].slice();
      var p = arr.indexOf(idx);
      if(p >= 0) arr.splice(p, 1);
      else arr.push(idx);
      arr.sort();
      copy[qi] = arr;
      // Tracking
      setTracking(function(t){return Object.assign({}, t, {changes:t.changes+1})});
      return copy;
    });
  }

  function envoyer(){
    var nbVides = 0;
    saisies.forEach(function(s){ if(!s || s.length === 0) nbVides++; });
    if(nbVides > 0){
      if(!confirm("Tu n'as pas saisi de réponse pour "+nbVides+" question(s). Envoyer quand même ?")) return;
    }
    var data = {
      choix:saisies,
      ts:Date.now(),
      tracking:{
        durationMs:Date.now() - debut,
        changes:tracking.changes
      }
    };
    db.ref(DB_ROOT+"/sessions/"+p.session.id+"/papier/"+p.eleve.slug).set(data, function(err){
      if(err){ alert("Erreur: "+err.message); return; }
      setEnvoyé(true);
      setTimeout(function(){
        // Recharger pour afficher la page de résultats
        window.location.reload();
      }, 1200);
    });
  }

  if(envoyé){
    return h("div", {className:"eleve-page"},
      ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
      h("div", {className:"eleve-card"},
        h("h1", null, "✅ Saisie envoyée !"),
        h("p", null, "Tu vas voir tes résultats détaillés.")
      )
    );
  }

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-results"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom + " · " + p.eleve.nomComplet),
      h("h2", null, "📝 Saisis tes réponses papier",
        h(InfoI, null, "Tu as passé cette évaluation sur papier en classe ? Saisis ici les lettres que tu avais cochées question par question. C'est utile pour avoir ton bilan personnel (combien de bonnes réponses, comparaison à la classe) même si l'éval n'a pas été passée sur ton téléphone.")
      ),
      h("p", {style:{color:"var(--noir)",marginBottom:"1rem",lineHeight:1.5}},
        "Pour chaque question, indique la (ou les) lettre(s) que tu as choisie(s) ",
        h("strong", null, "sur ta copie papier"),
        ". C'est cette saisie qui débloque tes résultats détaillés.",
        h(InfoI, null, "Pourquoi ? Cette étape te permet de refaire activement ta correction et de vérifier que ce que tu as cliqué dans l'app correspondait bien à ce que tu avais écrit. Tu retravailles ainsi tes notions et tu comprends mieux tes éventuelles erreurs.")
      ),
      ev.questions.map(function(q, qi){
        return h("div", {key:qi, className:"beta-q"},
          h("div", {className:"num"}, "Q"+(qi+1)),
          h("div", {className:"enonce"}, q.enonce),
          h("div", {className:"lettres-row"},
            q.choix.map(function(_, j){
              var sel = saisies[qi].indexOf(j) >= 0;
              return h("button", {
                key:j,
                className:"lettre-pick"+(sel?" selected":""),
                onClick:function(){toggleLettre(qi, j)}
              }, lettreFromIndex(j));
            })
          )
        );
      }),
      h("button", {className:"btn-accueil", style:{marginTop:"1.5rem"}, onClick:envoyer}, "Envoyer →"),
      h("div", {style:{marginTop:".8rem"}},
        h("button", {className:"btn btn-ghost btn-sm", onClick:p.onBack}, "← Retour")
      )
    )
  );
}

// ─────────── Élève — Phase évaluation ───────────
function EleveEval(p){
  var sess = p.session, ev = p.evaluation;
  var qIdx = sess.qIdx;
  var phase = sess.phase; // "idle" | "reflexion" | "reponse" | "attente"
  var question = (qIdx != null && ev.questions[qIdx]) ? ev.questions[qIdx] : null;
  var s1 = useState([]), selection = s1[0], setSelection = s1[1];
  var s2 = useState(false), valide = s2[0], setValide = s2[1];
  var s3 = useState(0), tick = s3[0], setTick = s3[1];
  var s4 = useState([]), notifs = s4[0], setNotifs = s4[1];
  var s5 = useState(null), bandeau = s5[0], setBandeau = s5[1];
  var s6 = useState(false), histoOpen = s6[0], setHistoOpen = s6[1];
  var s7 = useState(0), seenCount = s7[0], setSeenCount = s7[1];

  // Écoute des notifications du prof
  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/notifs").on("value", function(snap){
      var v = snap.val() || {};
      var arr = Object.keys(v).map(function(k){return Object.assign({id:k}, v[k])});
      arr.sort(function(a,b){return (b.ts||0)-(a.ts||0)});
      setNotifs(function(prev){
        // Si une nouvelle notif est apparue, on l'affiche en bandeau
        if(arr.length > prev.length){
          var newest = arr[0];
          if(newest && newest.ts && (Date.now() - newest.ts) < 4000){
            setBandeau(newest);
            setTimeout(function(){
              setBandeau(function(cur){return (cur && cur.id === newest.id) ? null : cur});
            }, 3500);
          }
        }
        return arr;
      });
    });
    return function(){ db.ref(DB_ROOT+"/sessions/"+sess.id+"/notifs").off(); };
  }, [sess.id]);
  var nbNonLues = Math.max(0, notifs.length - seenCount);

  // Reset à chaque question / phase
  useEffect(function(){
    setSelection([]);
    setValide(false);
  }, [qIdx, phase]);

  // Tick chrono
  useEffect(function(){
    if(phase !== "reflexion" && phase !== "reponse") return;
    var iv = setInterval(function(){ setTick(function(t){return t+1}); }, 250);
    return function(){ clearInterval(iv); };
  }, [phase, qIdx]);

  // Vérifie réouverture (l'élève peut être autorisé à répondre alors que la phase est "attente")
  var reouvert = sess.reouverts && sess.reouverts[p.eleve.slug] === qIdx;

  // Calcul chrono restant (basé sur startedAt + état pause)
  // Doit être calculé AVANT peutRepondre pour pouvoir intégrer le chrono dans le calcul.
  var chronoRestant = null;
  if((phase === "reflexion" || phase === "reponse") && sess.phaseStart){
    var duree = phase === "reflexion" ? (question ? getNiveau(question.niveau).chrono : 10) : (sess.chronoReponse || 5);
    if(sess.paused){
      chronoRestant = sess.paused.remaining;
    } else {
      var elapsed = Math.floor((Date.now() - sess.phaseStart)/1000);
      chronoRestant = Math.max(0, duree - elapsed);
    }
  }

  // peutRepondre : intègre le chrono pour bloquer les clics dès que le temps est écoulé
  // côté tablette, sans attendre que la phase Firebase bascule en "attente" (race condition).
  // - reouvert : pas de chrono pour les réouvertures individuelles → toujours possible
  // - phase reponse : possible uniquement si chrono > 0 (ou pas encore calculé)
  var peutRepondre = reouvert || (phase === "reponse" && (chronoRestant == null || chronoRestant > 0));

  function toggleChoix(idx){
    if(!peutRepondre) return;
    // Garde-fou supplémentaire : si entre le rendu et le clic le chrono est passé à 0,
    // re-vérifier avant de poursuivre (cas tablette lente / clic juste à la fin).
    if(phase === "reponse" && !reouvert && chronoRestant != null && chronoRestant <= 0) return;
    setSelection(function(prev){
      var newSel;
      if(prev.indexOf(idx) >= 0) newSel = prev.filter(function(x){return x !== idx});
      else newSel = prev.concat([idx]).sort();
      // Sauvegarde immédiate (auto-validation)
      var rep = {choix:newSel, ts:Date.now()};
      if(newSel.length > 0){
        db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses/"+qIdx+"/"+p.eleve.slug).set(rep);
        try{
          var key = "qcm_local_"+sess.id+"_"+qIdx+"_"+p.eleve.slug;
          localStorage.setItem(key, JSON.stringify(rep));
        }catch(e){}
        setValide(true);
      } else {
        // Plus aucune case cochée → on supprime la réponse
        db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses/"+qIdx+"/"+p.eleve.slug).remove();
        setValide(false);
      }
      return newSel;
    });
  }

  // Charger réponse existante (cas reload après valid)
  useEffect(function(){
    if(qIdx == null) return;
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses/"+qIdx+"/"+p.eleve.slug).once("value", function(snap){
      var rep = snap.val();
      if(rep && rep.choix){ setSelection(rep.choix); setValide(true); }
    });
  }, [qIdx, sess.id]);

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-card"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom + " · " + p.eleve.nomComplet),
      h("h1", null, ev.titre),
      // État
      phase === "idle" && h(React.Fragment, null,
        h("div", {className:"etat-attente"}, "⏳ En attente du démarrage..."),
        // Encadré explicatif du mode (visible avant la 1re question)
        (function(){
          var mode = modeEval(ev);
          var maxBrut = scoreMaxEval(ev);
          var nbQ = ev.questions.length;
          if(mode === "partiel"){
            return h("div", {className:"eleve-mode-info partiel"},
              h("div", {className:"mode-titre"}, "📋 Comment ça marche pour cette évaluation"),
              h("ul", {className:"mode-regles"},
                h("li", null, "Cette éval contient ", h("strong", null, nbQ+" question"+(nbQ>1?"s":"")), " pour un total de ", h("strong", null, maxBrut+" points"), "."),
                h("li", null, "Chaque question rapporte autant de points qu'il y a de bonnes cases à trouver."),
                h("li", null, h("strong", null, "Chaque bonne case cochée"), " te rapporte ", h("strong", null, "1 point"), "."),
                h("li", null, "Attention : ", h("strong", null, "chaque case en trop"), " (mauvaise réponse cochée) ", h("strong", null, "t'enlève 1 point"), "."),
                h("li", null, "Tu ne peux pas descendre en dessous de 0 sur une question.")
              ),
              h("div", {className:"mode-exemple"},
                h("strong", null, "Exemple : "), "une question avec ", h("strong", null, "3 bonnes cases"), ". Tu coches 2 bonnes + 1 mauvaise → ", h("strong", null, "1 point"), " (2 − 1). Tu coches les 3 bonnes sans erreur → ", h("strong", null, "3 points"), "."
              )
            );
          }
          return h("div", {className:"eleve-mode-info strict"},
            h("div", {className:"mode-titre"}, "📋 Comment ça marche pour cette évaluation"),
            h("ul", {className:"mode-regles"},
              h("li", null, "Cette éval contient ", h("strong", null, nbQ+" question"+(nbQ>1?"s":"")), " pour un total de ", h("strong", null, maxBrut+" point"+(maxBrut>1?"s":"")), "."),
              h("li", null, "Chaque question rapporte ", h("strong", null, "1 point"), " si la réponse est ", h("strong", null, "exacte"), "."),
              h("li", null, "Tu dois cocher ", h("strong", null, "toutes les bonnes cases"), ", et ", h("strong", null, "seulement celles-là"), "."),
              h("li", null, "Un oubli, une case en trop, et la question entière vaut ", h("strong", null, "0"), ".")
            ),
            h("div", {className:"mode-exemple"},
              h("strong", null, "Exemple : "), "une question avec 3 bonnes cases à trouver. Tu en trouves 2 → ", h("strong", null, "0 point"), ". Tu trouves les 3 sans erreur → ", h("strong", null, "1 point"), "."
            )
          );
        })()
      ),

      // Phase reflexion
      phase === "reflexion" && question && h("div", {className:"eleve-q-zone"},
        h("div", {className:"eleve-q-header"},
          h("span", {className:"eleve-q-num"}, "Question "+(qIdx+1)+" / "+ev.questions.length),
          h("span", {className:"eleve-q-pastille", style:{background:getNiveau(question.niveau).color, color:question.niveau==="facile"?"#5C4500":"#fff"}}, getNiveau(question.niveau).label),
          (function(){
            var maxQ = scoreMaxQuestion(question, modeEval(ev));
            return h("span", {className:"eleve-q-points-badge", title:"Nombre de points que vaut cette question"}, maxQ+" pt"+(maxQ>1?"s":""));
          })()
        ),
        h("div", {className:"eleve-q-enonce"}, question.enonce),
        h("div", {className:"eleve-q-consigne"}, "✍️ RÉDIGE TA RÉPONSE EN ENTIER SUR TA FEUILLE"),
        chronoRestant !== null && h("div", {className:"eleve-chrono"+(chronoRestant <= 3 ? " urgent":"")},
          h("div", {className:"label"}, "Temps de réflexion"),
          h("div", {className:"v"}, chronoRestant)
        )
      ),

      // Phase réponse
      (phase === "reponse" || reouvert) && question && h("div", {className:"eleve-q-zone"},
        h("div", {className:"eleve-q-header"},
          h("span", {className:"eleve-q-num"}, "Question "+(qIdx+1)+" / "+ev.questions.length+(reouvert?" — RÉOUVERTE":"")),
          h("span", {className:"eleve-q-pastille", style:{background:getNiveau(question.niveau).color, color:question.niveau==="facile"?"#5C4500":"#fff"}}, getNiveau(question.niveau).label),
          (function(){
            var maxQ = scoreMaxQuestion(question, modeEval(ev));
            return h("span", {className:"eleve-q-points-badge", title:"Nombre de points que vaut cette question"}, maxQ+" pt"+(maxQ>1?"s":""));
          })()
        ),
        h("div", {className:"eleve-q-enonce"}, question.enonce),
        h("div", {className:"eleve-pose-stylo"},
          h("span", {className:"ic"}, "📕"),
          h("span", null, "POSE TON STYLO. Sélectionne maintenant ta réponse.")
        ),
        !reouvert && chronoRestant !== null && h("div", {className:"eleve-chrono"+(chronoRestant <= 2 ? " urgent":"")},
          h("div", {className:"label"}, "Temps de réponse"),
          h("div", {className:"v"}, chronoRestant)
        ),
        h("div", {className:"eleve-choix"},
          question.choix.map(function(c, i){
            var sel = selection.indexOf(i) >= 0;
            return h("button", {
              key:i,
              className:"eleve-choix-btn"+(sel?" selected":""),
              disabled: !peutRepondre,
              onClick:function(){toggleChoix(i)}
            },
              h("span", {className:"lettre"}, lettreFromIndex(i)),
              h("span", null, c)
            );
          })
        ),
        h("div", {
          className:"eleve-feedback"+(valide?" valide":""),
          title:"Ta réponse est enregistrée automatiquement dès que tu cliques sur une lettre. Tu peux changer d'avis tant que le chrono tourne."
        }, (!peutRepondre && phase === "reponse")
            ? (valide
                ? "✅ Ta réponse est enregistrée — le temps est écoulé, tu ne peux plus la changer"
                : "⏰ Chrono terminé — tu n'as pas répondu à temps")
            : (valide
                ? "✅ Réponse enregistrée — tu peux encore la changer"
                : "💡 Clique sur la (ou les) lettre(s) qui correspond(ent) à ta réponse")
        )
      ),

      // Phase attente entre questions
      phase === "attente" && !reouvert && h("div", {className:"etat-attente"}, "⏳ Attends la prochaine question..."),

      // Mode dégradé
      sess._degraded && h("div", {className:"degraded-banner"}, "⚠️ Mode local — synchro auto au retour réseau"),

      // Bandeau pause (si chrono figé par le prof)
      sess.paused && h("div", {className:"eleve-pause-banner"},
        "⏸️ J'ai mis le chrono en pause"
      ),

      // Bandeau notification temporaire
      bandeau && h("div", {className:"eleve-notif-bandeau"+(bandeau.type === "pause" ? " pause" : "")},
        bandeau.msg
      ),

      // Cloche notifs (en haut à droite, fixe)
      notifs.length > 0 && h("button", {
        className:"eleve-notif-cloche",
        onClick:function(){setHistoOpen(true);setSeenCount(notifs.length)},
        title:"Voir l'historique de mes messages"
      },
        "🔔",
        nbNonLues > 0 && h("span", {className:"eleve-notif-badge"}, nbNonLues)
      ),

      // Modale historique
      histoOpen && h("div", {className:"eleve-notif-back", onClick:function(e){if(e.target.className==="eleve-notif-back")setHistoOpen(false)}},
        h("div", {className:"eleve-notif-modal"},
          h("button", {className:"modal-close", onClick:function(){setHistoOpen(false)}}, "✕"),
          h("h2", null, "🔔 Mes messages",
            h(InfoI, null, "Le prof peut t'envoyer des messages pendant l'évaluation : il a ajouté du temps, mis en pause, ou rouvert une question. Tu les retrouves ici et au moment de leur arrivée en haut de l'écran.")
          ),
          notifs.length === 0
            ? h("p", {style:{color:"var(--gris)",fontStyle:"italic"}}, "Aucun message.")
            : h("div", {className:"eleve-notif-liste"},
                notifs.map(function(n){
                  return h("div", {key:n.id, className:"eleve-notif-item"+(n.type === "pause" ? " pause":"")},
                    h("div", {className:"msg"}, n.msg),
                    h("div", {className:"ts"}, new Date(n.ts).toLocaleTimeString("fr-FR"))
                  );
                })
              )
        )
      )
    )
  );
}

// ─────────── Élève — Phase correction ───────────
// Pondération difficulté (Lot 4) — défaut, écrasable via Firebase settings/poidsNiveau
var POIDS_NIVEAU = {facile:1, standard:2, approfondi:3, expert:4};
var POIDS_NIVEAU_DEFAUT = {facile:1, standard:2, approfondi:3, expert:4};
function calculerMaxPondere(questions){
  return (questions||[]).reduce(function(acc, q){
    return acc + (POIDS_NIVEAU[q.niveau] || 1);
  }, 0);
}

/*
 * ════════════════════════════════════════════════════════════════════
 * API PROFIL LONGITUDINAL MJPC (Lot 6)
 * ════════════════════════════════════════════════════════════════════
 *
 * Cette API est conçue pour être branchée ultérieurement sur le site
 * monsieurjaipascompris (MJPC). Elle écrit dans une racine Firebase
 * séparée (`mjpcProfils/`), distincte de `qcm/` (DB_ROOT).
 *
 * STRUCTURE :
 *   mjpcProfils/
 *     {classeSlug}/
 *       {eleveSlug}/
 *         sessions/
 *           {sessId}/
 *             date           : timestamp (ms)
 *             sessId         : id de la session
 *             evalId         : id de l'éval
 *             titre          : titre de l'éval
 *             scoreBrut      : nb questions justes
 *             totalQ         : nb total de questions
 *             scorePondere   : score pondéré par niveau (F=1,S=2,A=3,E=4)
 *             maxP           : score pondéré max possible
 *             fourchetteEstimee : "vert"|"bleu"|"orange"|"rouge"|null
 *             fourchetteReelle  : idem
 *             calibration    : "ok"|"sous"|"sur"|null
 *             details[]      : {idx, niveau, poids, juste}
 *
 * USAGE CÔTÉ MJPC :
 *   db.ref("mjpcProfils/" + classeSlug + "/" + eleveSlug + "/sessions")
 *     .on("value", ...)  → renvoie l'historique complet
 *
 * DÉCLENCHEMENT : appel automatique de archiverDansProfilsMJPC()
 * quand la phase de la session passe à "finie" (clic "Question suivante"
 * en correction sur la dernière Q).
 */
