          // Question suivante : aperçu détaillé + préparamétrage
          question && qIdx + 1 < ev.questions.length && h("div", {className:"pilot-q-next-detail"},
            h("div", {className:"label"}, "🔮 À venir — Q "+(qIdx+2)+" / "+ev.questions.length,
              h(InfoI, null, "Aperçu détaillé de la question suivante. Tu peux préparamétrer son niveau dès maintenant en cliquant sur une pastille — pratique si tu sens que les élèves vont avoir besoin de plus (ou moins) de temps.")
            ),
            h("div", {className:"enonce-next"}, ev.questions[qIdx+1].enonce),
            h("div", {className:"niv-row", title:"Préparamètre le niveau de la question suivante. Le changement est sauvegardé immédiatement."},
              NIVEAUX.map(function(n){
                var actif = ev.questions[qIdx+1].niveau === n.id;
                return h("button", {
                  key:n.id,
                  className:"niv-pastille niv-"+n.id+(actif?"":" inactif"),
                  onClick:function(){changerNiveauEnDirect(qIdx+1, n.id)},
                  title:"Préparamétrer la question suivante en niveau "+n.label+" ("+n.chrono+"s)"
                }, n.label, " ", n.chrono+"s");
              })
            ),
            h("div", {style:{fontSize:".7rem",color:"var(--gris)",marginTop:".3rem",fontStyle:"italic"}},
              (ev.questions[qIdx+1].bonnes||[]).length+" bonne(s) réponse(s)"
            )
          ),

          // Navigation libre entre questions
          qIdx != null && h("div", {className:"row", style:{marginTop:".5rem",justifyContent:"center"}},
            h("button", {className:"btn btn-ghost btn-sm", onClick:questionPrecedente, disabled:qIdx <= 0, title:"Revenir à la question précédente. La phase actuelle sera coupée."}, "← Q préc."),
            h("button", {className:"btn btn-ghost btn-sm", onClick:function(){allerAQuestion(qIdx+1)}, disabled:qIdx >= ev.questions.length - 1, title:"Avancer à la question suivante (saut direct)."}, "Q suiv. →")
          )
        ),

        // ════════════ COLONNE 2 : ÉLÈVES ════════════
        h("div", null,
          h("h3", null, "👥 Élèves",
            h(InfoI, null, "Affiche tous les élèves de la classe. Le code couleur indique en temps réel à quel point la réponse est proche de la bonne. Vert = exact, jaune = a tout bon mais en a coché trop, orange = a au moins une bonne lettre mais en manque, rouge = aucune bonne lettre. Clique sur un nom non-répondu pour rouvrir la question pour cet élève (1 seule réouverture par élève par question).")
          ),
          h("div", {className:"pilot-eleves"},
            eleves.map(function(e){
              var slug = slugify(e.nomComplet);
              var connecte = !!presence[slug];
              var r = repsQ[slug];
              var reouvert = sess.reouverts && sess.reouverts[slug] === qIdx;
              var nbReouvUtilisees = (sess.reouvertHistorique && sess.reouvertHistorique[slug] && sess.reouvertHistorique[slug][qIdx]) || 0;
              // Élève déclaré absent (au check-in initial OU départ en cours de session)
              var absentDeclare = (sess.absents || []).indexOf(slug) >= 0;
              var cls = "pilot-eleve";
              var etatTxt = "";
              var actionTxt = "";

              // Cas absent déclaré : prend le dessus sur le reste, sauf si l'élève a déjà répondu (ses réponses comptent)
              if(absentDeclare){
                cls += " absent-declare";
                etatTxt = "🚫 Élève DÉCLARÉ ABSENT (au check-in ou en cours de session). Pour le faire revenir, utilise « ↩️ Retour d'un élève ».";
                if(r){
                  etatTxt += " A répondu avant son départ — ses réponses sont conservées.";
                }
                return h("button", {key:slug, className:cls, onClick:function(){}, title:e.nomComplet+" — "+etatTxt},
                  e.nomComplet,
                  h("span", {className:"absent-badge", title:"Élève déclaré absent"}, "🚫")
                );
              }

              if(r && question){
                // Évaluer la proximité de la réponse
                var bonnes = (question.bonnes||[]).slice().sort();
                var c = (r.choix||[]).slice().sort();
                var nbBonnesCochees = c.filter(function(x){return bonnes.indexOf(x)>=0}).length;
                var nbFaussesCochees = c.length - nbBonnesCochees;
                var nbBonnesManquantes = bonnes.length - nbBonnesCochees;
                var lettresJoint = c.map(lettreFromIndex).join("");

                if(nbBonnesCochees === bonnes.length && nbFaussesCochees === 0){
                  cls += " repondu-juste";
                  etatTxt = "✅ A répondu "+lettresJoint+" — JUSTE.";
                } else if(nbBonnesCochees === bonnes.length && nbFaussesCochees > 0){
                  cls += " repondu-jaune";
                  etatTxt = "🟡 A répondu "+lettresJoint+" — A toutes les bonnes mais a coché en trop.";
                } else if(nbBonnesCochees > 0){
                  cls += " repondu-orange";
                  etatTxt = "🟠 A répondu "+lettresJoint+" — A au moins une bonne lettre, mais en manque ou a coché du faux.";
                } else {
                  cls += " repondu-faux";
                  etatTxt = "🔴 A répondu "+lettresJoint+" — Aucune bonne lettre.";
                }
                actionTxt = " (Plus modifiable.)";
              }

              if(reouvert){
                cls += " reouvert";
                etatTxt = (etatTxt ? etatTxt + " " : "") + "🔓 Question RÉOUVERTE.";
                actionTxt = " Clique pour fermer la réouverture (avant qu'il ait répondu).";
              }
              if(connecte && !r) cls += " connecte";
              if(!connecte){
                cls += " absent";
                etatTxt = "⏳ Élève pas encore connecté à l'app. S'il est physiquement absent, marque-le via « 🚫 Départ d'un élève » pour que sa présence soit tracée.";
              } else if(connecte && !r && !reouvert){
                if(!etatTxt) etatTxt = "Connecté, n'a pas encore répondu.";
                if(qIdx != null && (sess.phase === "attente" || sess.phase === "reponse")){
                  if(nbReouvUtilisees >= 1){
                    actionTxt = " ⚠️ Réouverture déjà utilisée pour cette question.";
                  } else {
                    actionTxt = " Clique pour lui rouvrir la question.";
                  }
                }
              }

              return h("button", {key:slug, className:cls, onClick:function(){
                if(qIdx == null) return;
                if(!r) toggleReouvert(slug);
              }, title:e.nomComplet+" — "+etatTxt+actionTxt},
                e.nomComplet,
                nbReouvUtilisees > 0 && h("span", {className:"reouv-badge", title:"Réouverture utilisée"}, "🔓")
              );
            })
          ),
          // Légende dépliable
          h("details", {className:"pilot-legende", style:{marginTop:".7rem"}},
            h("summary", {style:{cursor:"pointer",fontSize:".82rem",color:"var(--violet)",fontWeight:700}}, "🔍 Légende des couleurs"),
            h("div", {style:{marginTop:".5rem",display:"flex",flexDirection:"column",gap:".3rem",fontSize:".82rem"}},
              h("div", null, h("span", {className:"pilot-eleve connecte", style:{display:"inline-block",marginRight:".4rem"}}, "Nom"), " — Connecté, pas encore répondu (pulse vert)"),
              h("div", null, h("span", {className:"pilot-eleve repondu-juste", style:{display:"inline-block",marginRight:".4rem"}}, "Nom"), " — ✅ Réponse exacte"),
              h("div", null, h("span", {className:"pilot-eleve repondu-jaune", style:{display:"inline-block",marginRight:".4rem"}}, "Nom"), " — 🟡 Toutes les bonnes mais a coché en trop"),
              h("div", null, h("span", {className:"pilot-eleve repondu-orange", style:{display:"inline-block",marginRight:".4rem"}}, "Nom"), " — 🟠 Au moins une bonne lettre"),
              h("div", null, h("span", {className:"pilot-eleve repondu-faux", style:{display:"inline-block",marginRight:".4rem"}}, "Nom"), " — 🔴 Aucune bonne lettre"),
              h("div", null, h("span", {className:"pilot-eleve connecte reouvert", style:{display:"inline-block",marginRight:".4rem"}}, "Nom"), " — 🔓 Question rouverte (cerclé jaune)"),
              h("div", null, h("span", {className:"pilot-eleve absent", style:{display:"inline-block",marginRight:".4rem"}}, "Nom"), " — ⏳ Pas encore connecté à l'app"),
              h("div", null, h("span", {className:"pilot-eleve absent-declare", style:{display:"inline-block",marginRight:".4rem"}}, "Nom", h("span",{className:"absent-badge"},"🚫")), " — 🚫 Déclaré absent (check-in ou départ)")
            )
          ),
          h("div", {className:"pilot-eleve-help"}, "💡 1 réouverture max par élève par question. Clique sur un élève non-répondu pour lui rouvrir.")
        ),

        // ════════════ COLONNE 3 : OVERVIEW DES QUESTIONS ════════════
        h("div", {className:"pilot-overview"},
          h("h3", null,
            h("span", null, "📋 Toutes les questions",
              h(InfoI, null, "Vue d'ensemble de toutes les questions avec leur niveau, la bonne réponse et — pour les questions passées — le score classe (X/N réussies). Clique sur une question pour y sauter directement.")
            )
          ),
          ev.questions.map(function(q, qi){
            var current = qi === qIdx;
            var passee = qIdx != null && qi < qIdx;
            var cls = "pilot-q-mini" + (current ? " current" : "") + (passee ? " passee" : "");
            var bonnesQ = (q.bonnes||[]).slice().sort();
            // Calcul du score classe pour cette question
            var repsQi = reponses[qi] || {};
            var nbRep = 0, nbJusteQ = 0;
            Object.keys(repsQi).forEach(function(slug){
              nbRep++;
              var c = (repsQi[slug].choix||[]).slice().sort();
              if(JSON.stringify(c) === JSON.stringify(bonnesQ)) nbJusteQ++;
            });
            var totalEleves = eleves.length;
            // Code couleur selon taux de réussite
            var pct = totalEleves > 0 ? Math.round(nbJusteQ * 100 / totalEleves) : 0;
            var scoreCls = "score-pct";
            if(passee || current){
              if(pct >= 70) scoreCls += " score-vert";
              else if(pct >= 50) scoreCls += " score-orange";
              else scoreCls += " score-rouge";
            }
            return h("div", {
              key:qi,
              className:cls,
              onClick:function(){
                if(current) return;
                if(confirm("Aller directement à la question "+(qi+1)+" ?")) allerAQuestion(qi);
              },
              title:current ? "Question en cours — "+nbJusteQ+"/"+totalEleves+" justes pour le moment" : (passee ? "Question passée — "+nbJusteQ+"/"+totalEleves+" justes" : "Cliquer pour sauter à la question "+(qi+1))
            },
              h("div", {className:"pilot-q-mini-head"},
                h("span", {className:"pilot-q-mini-num"}, "Q"+(qi+1)),
                h("span", {className:"pilot-q-mini-niv niv-"+q.niveau}, getNiveau(q.niveau).label)
              ),
              h("div", {className:"pilot-q-mini-enonce"}, q.enonce),
              h("div", {className:"pilot-q-mini-bonnes"},
                q.choix.map(function(c, ci){
                  var bon = bonnesQ.indexOf(ci) >= 0;
                  return h("span", {key:ci, className:"pilot-q-mini-choix"+(bon?" bon":""), title:c}, lettreFromIndex(ci)+(bon?" ✓":""));
                })
              ),
              // Status + score classe
              (current || passee) && h("div", {className:"pilot-q-mini-status"},
                current ? h("span", null, "▶ EN COURS — ", h("span", {className:scoreCls}, nbJusteQ+"/"+totalEleves+" justes"))
                : h("span", null, "✓ Passée — ", h("span", {className:scoreCls}, nbJusteQ+"/"+totalEleves+" justes"+(nbRep > 0 ? " ("+pct+"%)" : "")))
              )
            );
          })
        )
      )
    )
  );
}

// ─────────── Onglet Résultats (scoresheet) ───────────
function OngletResultats(){
  var s1 = useState({}), evals = s1[0], setEvals = s1[1];
  var s2 = useState({}), classes = s2[0], setClasses = s2[1];
  var s3 = useState({}), sessions = s3[0], setSessions = s3[1];
  var s4 = useState(null), sel = s4[0], setSel = s4[1]; // {sessionId}

  useEffect(function(){
    db.ref(DB_ROOT+"/evaluations").on("value", function(s){ setEvals(s.val()||{}) });
    db.ref(DB_ROOT+"/classes").on("value", function(s){ setClasses(s.val()||{}) });
    db.ref(DB_ROOT+"/sessions").on("value", function(s){ setSessions(s.val()||{}) });
    return function(){
      db.ref(DB_ROOT+"/evaluations").off();
      db.ref(DB_ROOT+"/classes").off();
      db.ref(DB_ROOT+"/sessions").off();
    };
  }, []);

  // Efface une session de l'historique : suppression réelle, comme si elle n'avait jamais existé.
  // Snapshot auto téléchargé AVANT pour récupération si erreur.
  function effacerSession(sid){
    var s = sessions[sid];
    if(!s) return;
    var ev = evals[s.evalId];
    var cl = classes[s.classeSlug];
    var titre = (ev ? ev.titre : "(éval supprimée)") + " — " + (cl ? cl.nom : "(classe supprimée)") + " — " + new Date(s.date||0).toLocaleString("fr-FR");

    if(!confirm("Tu vas effacer définitivement cette session de l'historique :\n\n"+titre+"\n\nUn snapshot complet de la base va d'abord être téléchargé pour pouvoir récupérer les données si besoin (cherche le fichier qcm_AVANT-effacement_*.json dans tes téléchargements).\n\nAprès effacement :\n- L'évaluation ne sera plus considérée comme « déjà passée » par cette classe (s'il s'agissait de la dernière session)\n- Aucun tableau de résultats ne sera généré pour cette session\n- Le suivi longitudinal n'en tiendra pas compte\n\nCette action est IRRÉVERSIBLE (sauf via le snapshot). Continuer ?")) return;

    // Snapshot AVANT effacement
    db.ref(DB_ROOT).once("value", function(snap){
      var payload = {
        _meta:{source:DB_ROOT, exportedAt:new Date().toISOString(), version:1, contexte:"snapshot AVANT effacement de session "+sid},
        data:snap.val() || {}
      };
      var blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "qcm_AVANT-effacement_"+new Date().toISOString().slice(0,16).replace(/[:T]/g,"-")+".json";
      a.click();
      URL.revokeObjectURL(url);

      // Suppression effective de la session ET de sessionActive si la session pointée est celle-ci
      var updates = {};
      updates["/sessions/"+sid] = null;
      // Si sessionActive pointe vers cette session, la libérer
      if(s.classeSlug){
        db.ref(DB_ROOT+"/sessionActive/"+s.classeSlug).once("value", function(snapSA){
          if(snapSA.val() === sid){
            db.ref(DB_ROOT+"/sessionActive/"+s.classeSlug).remove();
          }
        });
      }
      db.ref(DB_ROOT).update(updates, function(err){
        if(err){ alert("Erreur : "+err.message); return; }
        alert("✅ Session effacée. Snapshot téléchargé pour récupération éventuelle.");
      });
    });
  }

  if(sel){
    var sess = sessions[sel];
    if(!sess) return h("div", {className:"card"}, h("p", null, "Session introuvable"));
    var ev = evals[sess.evalId];
    var cl = classes[sess.classeSlug];
    if(!ev || !cl) return h("div", {className:"card"}, h("p", null, "Données manquantes"));
    return h(Scoresheet, {session:Object.assign({id:sel}, sess), evaluation:ev, classe:cl, onBack:function(){setSel(null)}});
  }

  var sessArr = Object.keys(sessions).filter(function(k){
    var s = sessions[k];
    if(s.classeSlug && s.classeSlug.charAt(0) === "_") return false;
    if(s.evalId && s.evalId.charAt(0) === "_") return false;
    return true;
  }).map(function(k){return Object.assign({id:k}, sessions[k])});
  sessArr.sort(function(a,b){return (b.date||0)-(a.date||0)});

  return h("div", {className:"card"},
    h("h2", null, "📊 Résultats — Sessions",
      h(InfoI, null, "Liste de toutes les sessions passées et en cours, classes confondues. Clique sur une ligne pour ouvrir le scoresheet détaillé : tableau classe × questions, tri, drill-down par élève, upload des scans, export CSV.")
    ),
    sessArr.length === 0
      ? h("p", {style:{color:"var(--gris)",fontStyle:"italic"}}, "Aucune session.")
      : h("div", {className:"results-eval-list"},
          sessArr.map(function(s){
            var ev = evals[s.evalId];
            var cl = classes[s.classeSlug];
            return h("div", {key:s.id, className:"results-eval-row", onClick:function(){setSel(s.id)}},
              h("div", {style:{flex:1}},
                h("div", {className:"titre"}, ev ? ev.titre : "(évaluation supprimée)"),
                h("div", {className:"meta"},
                  (cl ? cl.nom : "(classe supprimée)") + " · " +
                  new Date(s.date||0).toLocaleString("fr-FR") + " · " +
                  (s.etat || "?")
                )
              ),
              h("button", {
                className:"btn btn-sm btn-rouge",
                style:{marginRight:".4rem"},
                onClick:function(e){ e.stopPropagation(); effacerSession(s.id); },
                title:"Efface définitivement cette session de l'historique. Un snapshot complet de la base est téléchargé AVANT effacement (fichier qcm_AVANT-effacement_*.json) pour permettre une récupération si besoin. Après effacement : l'évaluation n'est plus marquée comme « déjà passée » pour cette classe (s'il s'agissait de la dernière session), aucun tableau de résultats n'est généré, et le suivi longitudinal n'en tient pas compte. Action IRRÉVERSIBLE (sauf via le snapshot)."
              }, "🗑️"),
              h("div", null, "→")
            );
          })
        )
  );
}

// ─────────── Scoresheet ───────────
function Scoresheet(p){
  var sess = p.session, ev = p.evaluation, cl = p.classe;
  var s1 = useState({}), reponses = s1[0], setReponses = s1[1];
  var s2 = useState("nom"), tri = s2[0], setTri = s2[1];
  var s3 = useState(false), sens = s3[0], setSens = s3[1]; // false=asc, true=desc
  var s4 = useState(null), drillEleve = s4[0], setDrillEleve = s4[1];
  var s5 = useState({}), reponsesPapier = s5[0], setReponsesPapier = s5[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses").on("value", function(s){
      setReponses(s.val()||{});
    });
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/papier").on("value", function(s){
      setReponsesPapier(s.val()||{});
    });
    return function(){
      db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses").off();
      db.ref(DB_ROOT+"/sessions/"+sess.id+"/papier").off();
    };
  }, [sess.id]);

  function bonnesArr(qi){ return ((ev.questions[qi]||{}).bonnes||[]).slice().sort(); }
  function isJuste(qi, choix){
    var b = bonnesArr(qi);
    var c = (choix||[]).slice().sort();
    return JSON.stringify(b) === JSON.stringify(c);
  }
  function lettresFromIdx(arr){
    if(!arr || arr.length === 0) return "—";
    return arr.slice().sort().map(function(i){return lettreFromIndex(i)}).join("");
  }
  function scoreEleveApp(slug){
    var nb = 0;
    ev.questions.forEach(function(q, qi){
      var r = (reponses[qi]||{})[slug];
      if(r && isJuste(qi, r.choix)) nb++;
    });
    return nb;
  }
  function scoreElevePapier(slug){
    var p = reponsesPapier[slug];
    if(!p || !p.choix) return null;
    var nb = 0;
    ev.questions.forEach(function(q, qi){
      var c = p.choix[qi];
      if(c && isJuste(qi, c)) nb++;
    });
    return nb;
  }
  function ecart(slug){
    var p = reponsesPapier[slug];
    if(!p || !p.choix) return null;
    var n = 0;
    ev.questions.forEach(function(q, qi){
      var ra = (reponses[qi]||{})[slug];
      var ca = ra && ra.choix ? ra.choix.slice().sort() : null;
      var cp = p.choix[qi] ? p.choix[qi].slice().sort() : null;
      if(JSON.stringify(ca) !== JSON.stringify(cp)) n++;
    });
    return n;
  }

  var eleves = (cl.eleves||[]).map(function(e){
    var slug = slugify(e.nomComplet);
    return {nomComplet:e.nomComplet, slug:slug, scoreApp:scoreEleveApp(slug), scorePapier:scoreElevePapier(slug), ecart:ecart(slug)};
  });

  // Tri
  eleves.sort(function(a,b){
    var v = 0;
    if(tri === "nom") v = a.nomComplet.localeCompare(b.nomComplet);
    else if(tri === "app") v = a.scoreApp - b.scoreApp;
    else if(tri === "papier") v = (a.scorePapier||-1) - (b.scorePapier||-1);
    else if(tri === "ecart") v = (a.ecart||0) - (b.ecart||0);
    return sens ? -v : v;
  });

  function clickTri(t){
    if(tri === t) setSens(!sens);
    else { setTri(t); setSens(false); }
  }

  // Moyennes par question
  var moyennes = ev.questions.map(function(_, qi){
    var n = 0, ok = 0;
    (cl.eleves||[]).forEach(function(e){
      var slug = slugify(e.nomComplet);
      var r = (reponses[qi]||{})[slug];
      if(r){ n++; if(isJuste(qi, r.choix)) ok++; }
    });
    return {n:n, ok:ok, pct:n?Math.round(ok*100/n):null};
  });

  function exportCSV(){
    var lignes = [];
    var head = ["Élève"];
    ev.questions.forEach(function(_, qi){ head.push("Q"+(qi+1)+" app"); });
    head.push("Score app /"+ev.questions.length);
    ev.questions.forEach(function(_, qi){ head.push("Q"+(qi+1)+" papier"); });
    head.push("Score papier /"+ev.questions.length);
    head.push("Écart");
    lignes.push(head.join(";"));
    eleves.forEach(function(e){
      var l = [e.nomComplet];
      ev.questions.forEach(function(_, qi){
        var r = (reponses[qi]||{})[e.slug];
        l.push(r ? lettresFromIdx(r.choix) : "");
      });
      l.push(e.scoreApp);
      var pap = reponsesPapier[e.slug];
      ev.questions.forEach(function(_, qi){
        var c = pap && pap.choix ? pap.choix[qi] : null;
        l.push(c ? lettresFromIdx(c) : "");
      });
      l.push(e.scorePapier == null ? "" : e.scorePapier);
      l.push(e.ecart == null ? "" : e.ecart);
      lignes.push(l.join(";"));
    });
    var blob = new Blob([lignes.join("\n")], {type:"text/csv"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = (ev.titre.replace(/[^a-z0-9]+/gi,"_"))+"_"+cl.nom.replace(/[^a-z0-9]+/gi,"_")+".csv";
    a.click();
    URL.revokeObjectURL(url);
  }

  return h("div", null,
    h("div", {className:"card"},
      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:".5rem"}},
        h("h2", {style:{margin:0}}, "📊 "+ev.titre+" — "+cl.nom),
        h("div", {className:"row"},

// ─────────── Student report (drill-down élève) ───────────
function StudentReport(p){
  if(!p.eleve) return null;
  var ev = p.evaluation;
  var s1 = useState(null), scan = s1[0], setScan = s1[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/scans/"+p.slug).on("value", function(snap){
      setScan(snap.val());
    });
    return function(){ db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/scans/"+p.slug).off(); };
  }, [p.sessionId, p.slug]);

  function uploadScan(file){
    if(!file) return;
    if(file.size > 2 * 1024 * 1024){
      alert("Image trop grande (>2 Mo). Compresse-la avant upload.");
      return;
    }
    var reader = new FileReader();
    reader.onload = function(e){
      db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/scans/"+p.slug).set(e.target.result);
    };
    reader.readAsDataURL(file);
  }
  function supprimerScan(){
    if(!confirm("Supprimer le scan ?")) return;
    db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/scans/"+p.slug).remove();
  }

  return h("div", {className:"student-report"},
    h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap"}},
      h("h3", null, "👤 "+p.eleve.nomComplet,
        h(InfoI, null, "Vue détaillée de l'élève sur cette session : ses réponses cliquées dans l'app, ses réponses saisies depuis sa copie papier (s'il l'a fait à la maison), la bonne réponse, et le scan de sa copie.")
      ),
      h("button", {className:"btn btn-ghost btn-sm", onClick:p.onClose, title:"Fermer le Student Report et retourner au scoresheet."}, "✕ Fermer")
    ),
    ev.questions.map(function(q, qi){
      var r = (p.reponses[qi]||{})[p.slug];
      var bonnes = (q.bonnes||[]).slice().sort();
      var monApp = r && r.choix ? r.choix.slice().sort() : null;
      var pap = p.reponsesPapier && p.reponsesPapier.choix ? p.reponsesPapier.choix[qi] : null;
      var monPap = pap ? pap.slice().sort() : null;
      var appJuste = monApp && JSON.stringify(monApp) === JSON.stringify(bonnes);
      var papJuste = monPap && JSON.stringify(monPap) === JSON.stringify(bonnes);
      function lettres(arr){ return arr && arr.length ? arr.map(lettreFromIndex).join("") : "—"; }
      return h("div", {key:qi, className:"ligne-q"},
        h("span", {className:"num", title:"Question "+(qi+1)}, "Q"+(qi+1)),
        h("span", {className:"enonce-court", title:q.enonce}, q.enonce),
        h("span", {className:"pill "+(monApp ? (appJuste?"juste":"faux") : "vide"), title:"Réponse cliquée dans l'app : "+(monApp?lettres(monApp)+(appJuste?" — juste":" — faux"):"non répondue")}, lettres(monApp)),
        h("span", {className:"pill "+(monPap ? (papJuste?"juste":"faux") : "vide"), title:"Réponse saisie depuis la copie papier : "+(monPap?lettres(monPap)+(papJuste?" — juste":" — faux"):"saisie non faite par l'élève")}, lettres(monPap)),
        h("span", {className:"pill bonne", title:"Bonne réponse définie"}, lettres(bonnes))
      );
    }),
    h("div", {style:{marginTop:"1rem"}},
      h("h4", {style:{color:"var(--violet)",marginBottom:".4rem",fontWeight:900}}, "📷 Scan de la copie papier",
        h(InfoI, null, "Upload ici la photo (ou le scan) de la copie papier de l'élève. C'est cette image qui fait foi en cas de litige et qui est consultable par l'élève + ses parents quand ils regardent leurs résultats détaillés à la maison.")
      ),
      h("div", {className:"scan-zone"},
        scan
          ? h(React.Fragment, null,
              h("img", {src:scan, alt:"Scan"}),
              h("div", {style:{marginTop:".6rem"}},
                h("button", {className:"btn btn-rouge btn-sm", onClick:supprimerScan, title:"Supprime le scan actuel. Tu pourras en uploader un nouveau ensuite."}, "🗑️ Supprimer")
              )
            )
          : h(React.Fragment, null,
              h("p", {style:{marginBottom:".5rem",color:"var(--gris)",fontSize:".85rem"}}, "Aucun scan uploadé. JPG/PNG, max 2 Mo."),
              h("input", {type:"file", accept:"image/*", onChange:function(e){
                if(e.target.files[0]) uploadScan(e.target.files[0]);
                e.target.value="";
              }})
            )
      )
    )
  );
}

// Éditeur de pondération (dette technique)
function PonderationEditor(){
  var s1 = useState({facile:POIDS_NIVEAU.facile, standard:POIDS_NIVEAU.standard, approfondi:POIDS_NIVEAU.approfondi, expert:POIDS_NIVEAU.expert}), draft = s1[0], setDraft = s1[1];
  var s2 = useState(""), msg = s2[0], setMsg = s2[1];

  function modif(niv, val){
    var v = parseInt(val, 10);
    if(isNaN(v) || v < 0) v = 0;
    var copy = Object.assign({}, draft);
    copy[niv] = v;
    setDraft(copy);
  }
  function enregistrer(){
    db.ref(DB_ROOT+"/settings/poidsNiveau").set(draft, function(err){
      if(err){ setMsg("❌ Erreur: "+err.message); return; }
      POIDS_NIVEAU.facile = draft.facile;
      POIDS_NIVEAU.standard = draft.standard;
      POIDS_NIVEAU.approfondi = draft.approfondi;
      POIDS_NIVEAU.expert = draft.expert;
      setMsg("✅ Pondération enregistrée. Les nouveaux calculs en tiendront compte.");
      setTimeout(function(){setMsg("")}, 3000);
    });
  }
  function restaurer(){
    if(!confirm("Restaurer la pondération par défaut (1, 2, 3, 4) ?")) return;
    setDraft(Object.assign({}, POIDS_NIVEAU_DEFAUT));
  }

  return h("div", {style:{padding:".7rem 0"}},
    h("div", {style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:".5rem",marginBottom:".7rem"}},
      h("div", {className:"autoeval-poids-grid", style:{flexDirection:"column",alignItems:"stretch"}},
        h("label", {style:{fontSize:".8rem",fontWeight:700,color:"var(--noir)",display:"block",marginBottom:".25rem"}}, "🟡 Facile"),
        h("input", {type:"number", min:0, value:draft.facile, onChange:function(e){modif("facile", e.target.value)}, style:{width:"100%",padding:".4rem",border:"2px solid #FFD23F",borderRadius:"6px",fontFamily:"inherit",fontSize:".95rem"}, title:"Nombre de points qu'une question de niveau facile rapportera dans le calcul du score pondéré."})
      ),
      h("div", null,
        h("label", {style:{fontSize:".8rem",fontWeight:700,color:"var(--noir)",display:"block",marginBottom:".25rem"}}, "🟠 Standard"),
        h("input", {type:"number", min:0, value:draft.standard, onChange:function(e){modif("standard", e.target.value)}, style:{width:"100%",padding:".4rem",border:"2px solid #FF8C42",borderRadius:"6px",fontFamily:"inherit",fontSize:".95rem"}, title:"Nombre de points qu'une question de niveau standard rapportera dans le calcul du score pondéré."})
      ),
      h("div", null,
        h("label", {style:{fontSize:".8rem",fontWeight:700,color:"var(--noir)",display:"block",marginBottom:".25rem"}}, "🌸 Approfondi"),
        h("input", {type:"number", min:0, value:draft.approfondi, onChange:function(e){modif("approfondi", e.target.value)}, style:{width:"100%",padding:".4rem",border:"2px solid #EC4899",borderRadius:"6px",fontFamily:"inherit",fontSize:".95rem"}, title:"Nombre de points qu'une question de niveau approfondi rapportera dans le calcul du score pondéré."})
      ),
      h("div", null,
        h("label", {style:{fontSize:".8rem",fontWeight:700,color:"var(--noir)",display:"block",marginBottom:".25rem"}}, "🟣 Expert"),
        h("input", {type:"number", min:0, value:draft.expert, onChange:function(e){modif("expert", e.target.value)}, style:{width:"100%",padding:".4rem",border:"2px solid #6A4CE0",borderRadius:"6px",fontFamily:"inherit",fontSize:".95rem"}, title:"Nombre de points qu'une question de niveau expert rapportera dans le calcul du score pondéré."})
      )
    ),
    h("div", {className:"row", style:{gap:".5rem",flexWrap:"wrap"}},
      h("button", {className:"btn btn-primary btn-sm", onClick:enregistrer, title:"Enregistre la nouvelle pondération dans Firebase. Elle sera utilisée pour tous les futurs calculs de score pondéré."}, "💾 Enregistrer"),
      h("button", {className:"btn btn-ghost btn-sm", onClick:restaurer, title:"Restaure la pondération par défaut (1, 2, 3, 4)."}, "🔄 Restaurer par défaut")
    ),
    msg && h("div", {style:{marginTop:".5rem",padding:".4rem .7rem",borderRadius:"6px",background:msg.startsWith("✅")?"#E8F6EE":"#FFF4F4",fontSize:".85rem",fontWeight:"600"}}, msg)
  );
}

// ─────────── Onglet Snapshot ───────────
function OngletSnapshot(){
  function purgerClasses(){
    if(!confirm("⚠️ Tu vas supprimer TOUTES les classes (et les présences). Les évaluations et les sessions ne seront pas touchées.\n\nCette action est IRRÉVERSIBLE.\n\nIl est conseillé d'avoir exporté un snapshot avant. Continuer ?")) return;
    if(!confirm("Dernière confirmation. Toutes les classes seront supprimées. Continuer ?")) return;
    Promise.all([
      db.ref(DB_ROOT+"/classes").remove(),
      db.ref(DB_ROOT+"/presence").remove()
    ]).then(function(){
      alert("✅ Toutes les classes ont été purgées.");
      window.location.reload();
    }).catch(function(err){ alert("Erreur : "+err.message); });
  }
  function purgerEvaluations(){
    if(!confirm("⚠️ Tu vas supprimer TOUTES les évaluations. Les classes et les sessions ne seront pas touchées (mais les sessions passées ne pourront plus afficher leur évaluation).\n\nCette action est IRRÉVERSIBLE.\n\nIl est conseillé d'avoir exporté un snapshot avant. Continuer ?")) return;
    if(!confirm("Dernière confirmation. Toutes les évaluations seront supprimées. Continuer ?")) return;
    db.ref(DB_ROOT+"/evaluations").remove(function(err){
      if(err){ alert("Erreur : "+err.message); return; }
      alert("✅ Toutes les évaluations ont été purgées.");
      window.location.reload();
    });
  }
  function purgerTout(){
    if(!confirm("⚠️ ATTENTION : tu vas supprimer TOUTES les données QCM (classes, évaluations, sessions, réponses, scans, paramètres).\n\nCette action est IRRÉVERSIBLE.\n\nIl est conseillé d'avoir exporté un snapshot avant. Continuer ?")) return;
    if(!confirm("Dernière confirmation. Tout sera supprimé. Continuer ?")) return;
    db.ref(DB_ROOT).remove(function(err){
      if(err){ alert("Erreur : "+err.message); return; }
      alert("✅ Toutes les données QCM ont été purgées.");
      window.location.reload();
    });
  }

  function nettoyerSessionsZombies(){
    // Charge tout le nécessaire pour identifier les zombies
    Promise.all([
      db.ref(DB_ROOT+"/sessionActive").once("value"),
      db.ref(DB_ROOT+"/sessions").once("value"),
      db.ref(DB_ROOT+"/classes").once("value")
    ]).then(function(results){
      var actives = results[0].val() || {};
      var sessions = results[1].val() || {};
      var classes = results[2].val() || {};
      var maintenant = Date.now();
      var SEUIL_24H = 24 * 60 * 60 * 1000;

      // Identifie ce qui doit être nettoyé
      var rapport = {
        sessionActiveASupprimer: [], // entrées de sessionActive à supprimer
        sessionsAFermer: []          // sessions à passer de "en_cours" à "termine"
      };

      // 1. Parcours sessionActive
      Object.keys(actives).forEach(function(slug){
        var sid = actives[slug];
        var sess = sessions[sid];
        if(!sess){
          // La session pointée n'existe plus → entrée orpheline
          rapport.sessionActiveASupprimer.push({slug:slug, raison:"session pointée inexistante"});
        } else if(!classes[slug]){
          // La classe n'existe plus
          rapport.sessionActiveASupprimer.push({slug:slug, raison:"classe inexistante"});
        } else if(sess.etat === "termine"){
          // Session déjà terminée mais l'entrée traîne
          rapport.sessionActiveASupprimer.push({slug:slug, raison:"session déjà terminée"});
        } else if(sess.etat === "en_cours" && sess.date && (maintenant - sess.date) > SEUIL_24H){
          // Session "en_cours" mais ancienne de plus de 24h → zombie
          rapport.sessionActiveASupprimer.push({slug:slug, raison:"session de plus de 24h"});
          rapport.sessionsAFermer.push({sid:sid, date:sess.date});
        }
      });

      // 2. Parcours indépendant des sessions: cherche les "en_cours" anciennes même sans entrée sessionActive
      Object.keys(sessions).forEach(function(sid){
        var sess = sessions[sid];
        if(sess.etat === "en_cours" && sess.date && (maintenant - sess.date) > SEUIL_24H){
          // Évite doublons
          if(!rapport.sessionsAFermer.some(function(s){return s.sid === sid})){
            rapport.sessionsAFermer.push({sid:sid, date:sess.date});
          }
        }
      });

      // Résumé pour confirmation
      if(rapport.sessionActiveASupprimer.length === 0 && rapport.sessionsAFermer.length === 0){
        alert("✅ Aucune session zombie détectée. Tout est propre.");
        return;
      }

      var msg = "Nettoyage à effectuer :\n\n";
      if(rapport.sessionActiveASupprimer.length > 0){
        msg += "• "+rapport.sessionActiveASupprimer.length+" entrée(s) sessionActive à supprimer :\n"+
          rapport.sessionActiveASupprimer.map(function(e){return "    - "+e.slug+" ("+e.raison+")"}).join("\n")+"\n";
      }
      if(rapport.sessionsAFermer.length > 0){
        msg += "\n• "+rapport.sessionsAFermer.length+" session(s) à marquer comme terminée(s) (>24h, encore \"en_cours\") :\n"+
          rapport.sessionsAFermer.map(function(s){var d=new Date(s.date);var hh=String(d.getHours()).padStart(2,'0');var mm=String(d.getMinutes()).padStart(2,'0');return "    - "+s.sid+" (lancée le "+d.toLocaleDateString()+" à "+hh+":"+mm+")"}).join("\n")+"\n";
      }
      msg += "\nLes données des sessions et leurs réponses sont CONSERVÉES. Seules les marqueurs « en cours » sont nettoyés.\n\nContinuer ?";

      if(!confirm(msg)) return;

      // Exécution
      var promesses = [];
      rapport.sessionActiveASupprimer.forEach(function(e){
        promesses.push(db.ref(DB_ROOT+"/sessionActive/"+e.slug).remove());
      });
      rapport.sessionsAFermer.forEach(function(s){
        promesses.push(db.ref(DB_ROOT+"/sessions/"+s.sid+"/etat").set("termine"));
      });

      Promise.all(promesses).then(function(){
        alert("✅ Nettoyage effectué :\n• "+rapport.sessionActiveASupprimer.length+" entrée(s) sessionActive supprimée(s)\n• "+rapport.sessionsAFermer.length+" session(s) marquée(s) terminée(s)");
      }).catch(function(err){
        alert("Erreur pendant le nettoyage : "+err.message);
      });
    });
  }

  return h("div", {className:"card"},
    h("h2", null, "💾 Sauvegarde",
      h(InfoI, null, "Snapshot = copie complète de toutes les données de l'app à un instant T (classes, évaluations, sessions, réponses, scans). Pratique pour faire un export régulier au cas où, ou pour revenir en arrière en cas de fausse manip.")
    ),
    h("p", {style:{marginBottom:".8rem",color:"var(--gris)",fontSize:".9rem"}},
      "Exporte ou importe l'ensemble de la base QCM (classes, évaluations, sessions)."
    ),
    h("div", {className:"snapshot-row"},
      h("button", {className:"btn btn-primary", onClick:snapshotExport, title:"Télécharge un fichier JSON contenant l'intégralité des données. À garder précieusement."}, "📥 Exporter snapshot"),
      h("button", {className:"btn btn-ghost", onClick:function(){document.getElementById("imp").click()}, title:"Restaure les données depuis un fichier JSON exporté précédemment. ATTENTION : écrase tout l'existant. Une confirmation te sera demandée."}, "📤 Importer snapshot"),
      h("input", {id:"imp", type:"file", accept:".json", style:{display:"none"}, onChange:function(e){
        if(e.target.files[0]) snapshotImport(e.target.files[0], function(){window.location.reload()});
        e.target.value="";
      }})
    ),

    // Zone maintenance
    h("div", {style:{marginTop:"1.5rem",paddingTop:"1rem",borderTop:"1px solid var(--bordure)"}},
      h("h3", {style:{color:"var(--violet)",fontWeight:900,marginBottom:".4rem",fontSize:"1rem"}}, "🧹 Maintenance",
        h(InfoI, null, "Outils de maintenance pour nettoyer les données techniques de l'app sans toucher au contenu pédagogique. Ces nettoyages préservent les classes, les évaluations, les réponses et les scans — seules les références de pilotage (« sessions encore en cours ») sont rectifiées.")
      ),
      h("p", {style:{fontSize:".82rem",color:"var(--gris)",marginBottom:".6rem",fontStyle:"italic"}},
        "Si la vue tableau ou le pilotage te montrent des sessions fantômes (anciennes évaluations qui n'auraient pas dû rester actives), utilise le nettoyage ci-dessous."
      ),
      h("button", {className:"btn btn-ghost btn-sm", onClick:nettoyerSessionsZombies, title:"Détecte et nettoie les sessions « zombies » : entrées sessionActive qui pointent vers une session inexistante, classe disparue, ou session encore marquée « en_cours » alors qu'elle date de plus de 24h. Un rapport détaillé te sera affiché AVANT exécution, et tu pourras annuler. Les données des sessions (réponses, scans) sont préservées : seul l'état « en_cours » est corrigé en « termine »."}, "🧹 Nettoyer les sessions zombies",
        h(InfoI, null, "Détecte les sessions \"zombies\" et propose un rapport avant nettoyage : (1) entrées de sessionActive qui pointent vers une session inexistante ou une classe disparue, (2) sessions marquées \"en_cours\" alors qu'elles datent de plus de 24h. Aucune donnée de réponse ou de scan n'est supprimée — seulement les marqueurs techniques. Tu vois le rapport AVANT et peux annuler.")
      )
    ),

    // Zone purge — séparée et visuellement distincte
    h("div", {style:{marginTop:"1.5rem",paddingTop:"1rem",borderTop:"2px dashed var(--bordure)"}},
      h("h3", {style:{color:"var(--violet)",fontWeight:900,marginBottom:".4rem",fontSize:"1rem"}}, "⚖️ Pondération des niveaux",
        h(InfoI, null, "Détermine combien de points rapporte une question selon son niveau de difficulté. Utilisé pour le score pondéré (bilan élève + bilan classe + autoévaluation). Par défaut : Facile = 1 pt, Standard = 2 pts, Approfondi = 3 pts, Expert = 4 pts. Tu peux ajuster selon ta progression pédagogique.")
      ),
      h(PonderationEditor)
    ),
    h("div", {style:{marginTop:"1.5rem",paddingTop:"1rem",borderTop:"2px dashed var(--bordure)"}},
      h("h3", {style:{color:"var(--rouge)",fontWeight:900,marginBottom:".4rem",fontSize:"1rem"}}, "🗑️ Zone dangereuse",
        h(InfoI, null, "Cette zone permet d'effacer des données dans la base de données QCM. À utiliser pour repartir propre (par exemple en début de chantier de tests, ou en début d'année après archivage). Toujours exporter un snapshot avant de purger.")
      ),
      h("p", {style:{fontSize:".82rem",color:"var(--gris)",marginBottom:".6rem",fontStyle:"italic"}},
        "Choisis ce que tu veux purger. Pense à exporter un snapshot d'abord si tu veux pouvoir restaurer."
      ),
      h("div", {className:"row", style:{flexWrap:"wrap",gap:".5rem"}},
        h("button", {className:"btn btn-rouge btn-sm", onClick:purgerClasses, title:"Supprime DÉFINITIVEMENT toutes les classes (et les présences). Les évaluations et sessions ne sont pas touchées. Double confirmation demandée."}, "🗑️ Purger les classes"),
        h("button", {className:"btn btn-rouge btn-sm", onClick:purgerEvaluations, title:"Supprime DÉFINITIVEMENT toutes les évaluations. Les classes et sessions ne sont pas touchées (mais les sessions passées ne pourront plus afficher leur éval). Double confirmation demandée."}, "🗑️ Purger les évaluations"),
        h("button", {className:"btn btn-rouge btn-sm", onClick:purgerTout, title:"Supprime DÉFINITIVEMENT toutes les données QCM (classes, évaluations, sessions, réponses, scans, paramètres). Double confirmation demandée."}, "🗑️ Tout purger")
      )
    )
  );
}

// Empêcher la molette de modifier la valeur des inputs number
// (très pénible pendant le pilotage en classe)
document.addEventListener("wheel", function(e){
  if(document.activeElement && document.activeElement.type === "number"){
    document.activeElement.blur();
  }
}, {passive:true});

// Charger les pondérations personnalisées si présentes (avant le rendu pour avoir les bons calculs)
db.ref(DB_ROOT+"/settings/poidsNiveau").once("value", function(snap){
  var v = snap.val();
  if(v && typeof v === "object"){
    if(typeof v.facile === "number") POIDS_NIVEAU.facile = v.facile;
    if(typeof v.standard === "number") POIDS_NIVEAU.standard = v.standard;
    if(typeof v.approfondi === "number") POIDS_NIVEAU.approfondi = v.approfondi;
    if(typeof v.expert === "number") POIDS_NIVEAU.expert = v.expert;
  }
});

// Démarrage
ReactDOM.render(h(App), document.getElementById("root"));
</script>
</body>
</html>
