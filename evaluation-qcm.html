// ─────────── Page de résultats élève (consultation maison) ───────────
function EleveResultats(p){
  var s1 = useState(null), session = s1[0], setSession = s1[1];
  var s2 = useState(null), evaluation = s2[0], setEvaluation = s2[1];
  var s3 = useState({}), reponsesApp = s3[0], setReponsesApp = s3[1];
  var s4 = useState(null), papier = s4[0], setPapier = s4[1];
  var s5 = useState(null), scan = s5[0], setScan = s5[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+p.sessionId).once("value", function(snap){
      var s = snap.val();
      if(!s) return;
      setSession(Object.assign({id:p.sessionId}, s));
      db.ref(DB_ROOT+"/evaluations/"+s.evalId).once("value", function(s2){
        setEvaluation(s2.val());
      });
    });
    // Réponses app de l'élève
    db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/reponses").on("value", function(snap){
      var all = snap.val() || {};
      var monMap = {};
      Object.keys(all).forEach(function(qi){
        if(all[qi][p.eleve.slug]) monMap[qi] = all[qi][p.eleve.slug];
      });
      setReponsesApp(monMap);
    });
    db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/papier/"+p.eleve.slug).on("value", function(snap){
      setPapier(snap.val());
    });
    db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/scans/"+p.eleve.slug).on("value", function(snap){
      setScan(snap.val());
    });
    return function(){
      db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/reponses").off();
      db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/papier/"+p.eleve.slug).off();
      db.ref(DB_ROOT+"/sessions/"+p.sessionId+"/scans/"+p.eleve.slug).off();
    };
  }, [p.sessionId, p.eleve.slug]);

  if(!session || !evaluation){
    return h("div", {className:"eleve-page"},
      ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
      h("div", {className:"eleve-card"}, h("h1", null, "Chargement..."))
    );
  }

  // Si pas de saisie papier → écran de saisie β
  if(!papier || !papier.choix){
    return h(EleveSaisieBeta, {
      session:session, evaluation:evaluation, eleve:p.eleve, classe:p.classe, onBack:p.onBack
    });
  }

  // Calcul scores
  function isJuste(qi, choix){
    var b = ((evaluation.questions[qi]||{}).bonnes||[]).slice().sort();
    var c = (choix||[]).slice().sort();
    return JSON.stringify(b) === JSON.stringify(c);
  }
  var scoreApp = 0, scorePapier = 0;
  evaluation.questions.forEach(function(q, qi){
    var ra = reponsesApp[qi];
    if(ra && isJuste(qi, ra.choix)) scoreApp++;
    var cp = papier.choix[qi];
    if(cp && isJuste(qi, cp)) scorePapier++;
  });
  // Bonus écart isolé favorable : si une question est juste app + faux papier, on garde le point
  var scoreFinal = scorePapier;
  evaluation.questions.forEach(function(q, qi){
    var ra = reponsesApp[qi];
    var cp = papier.choix[qi];
    var appJuste = ra && isJuste(qi, ra.choix);
    var papJuste = cp && isJuste(qi, cp);
    if(appJuste && !papJuste) scoreFinal++;
  });
  if(scoreFinal > evaluation.questions.length) scoreFinal = evaluation.questions.length;

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-results"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom + " · " + p.eleve.nomComplet),
      h("h2", null, "📊 "+evaluation.titre),
      h("p", {style:{color:"var(--gris)",fontSize:".9rem",marginBottom:"1rem"}}, "Évaluation du "+new Date(session.date||0).toLocaleDateString("fr-FR")),

      h("div", {className:"eleve-results-scores"},
        h("div", {className:"score-card officiel"},
          h("div", {className:"l"}, "Score officiel"),
          h("div", {className:"v"}, scoreFinal, h("small", null, " / "+evaluation.questions.length)),
          h(InfoI, null, "Score retenu pour la note : score papier + bonus si tu avais juste sur l'app et faux sur le papier de manière isolée. Ta note finale prend en compte ce qui te favorise.")
        ),
        h("div", {className:"score-card"},
          h("div", {className:"l"}, "Score papier"),
          h("div", {className:"v"}, scorePapier, h("small", null, " / "+evaluation.questions.length))
        ),
        h("div", {className:"score-card"},
          h("div", {className:"l"}, "Score app"),
          h("div", {className:"v"}, scoreApp, h("small", null, " / "+evaluation.questions.length))
        )
      ),

      scan && h("div", {style:{marginBottom:"1rem"}},
        h("h3", {style:{color:"var(--violet)",marginBottom:".5rem"}}, "📷 Ta copie scannée"),
        h("img", {src:scan, alt:"Scan de la copie", style:{maxWidth:"100%",borderRadius:"12px",border:"2px solid var(--bordure)"}})
      ),

      h("h3", {style:{color:"var(--violet)",marginBottom:".5rem"}}, "📋 Détail des questions"),
      evaluation.questions.map(function(q, qi){
        var ra = reponsesApp[qi];
        var cp = papier.choix[qi];
        var bonnes = (q.bonnes||[]).slice().sort();
        function lettres(arr){ return arr && arr.length ? arr.slice().sort().map(lettreFromIndex).join("") : "—"; }
        var appJuste = ra && isJuste(qi, ra.choix);
        var papJuste = cp && isJuste(qi, cp);
        var ecartApp = ra && cp && JSON.stringify((ra.choix||[]).slice().sort()) !== JSON.stringify((cp||[]).slice().sort());
        var clsLi = "eleve-q-recap";
        if(appJuste && papJuste) clsLi += " juste-tout";
        else if(!appJuste && !papJuste) clsLi += " faux-tout";
        return h("div", {key:qi, className:clsLi},
          h("div", {className:"titre"},
            h("span", {className:"num"}, "Q"+(qi+1)+" — "+q.enonce),
            h("span", {className:"eleve-q-pastille", style:{background:getNiveau(q.niveau).color, color:q.niveau==="facile"?"#5C4500":"#fff"}}, getNiveau(q.niveau).label)
          ),
          h("div", {className:"reps"},
            h("div", {className:"rep-bloc bonne"},
              h("div", {className:"rl"}, "Bonne réponse"),
              h("div", {className:"rv"}, lettres(bonnes))
            ),
            h("div", {className:"rep-bloc "+(cp ? (papJuste?"juste":"faux") : "")},
              h("div", {className:"rl"}, "Ma copie papier"),
              h("div", {className:"rv"}, lettres(cp))
            ),
            h("div", {className:"rep-bloc "+(ra ? (appJuste?"juste":"faux") : "")},
              h("div", {className:"rl"}, "Mes choix app"),
              h("div", {className:"rv"}, lettres(ra && ra.choix))
            )
          ),
          ecartApp && h("div", {className:"ecart-warn"}, "ℹ️ Tu as cliqué sur l'app un choix différent de ce que tu avais écrit sur ta copie.")
        );
      }),

      h("div", {style:{marginTop:"1.5rem"}},
        h("button", {className:"btn btn-ghost btn-sm", onClick:p.onBack}, "← Retour")
      )
    )
  );
}

// ─────────── Saisie β élève (recopiage de la copie papier) ───────────
function EleveSaisieBeta(p){
  var ev = p.evaluation;
  var s1 = useState(p.evaluation.questions.map(function(){return []})), saisies = s1[0], setSaisies = s1[1];
  var s2 = useState(false), envoyé = s2[0], setEnvoyé = s2[1];
  var s3 = useState(Date.now()), debut = s3[0], setDebut = s3[1];
  var s4 = useState({changes:0, time:0}), tracking = s4[0], setTracking = s4[1];

  function toggleLettre(qi, idx){
    setSaisies(function(prev){
      var copy = prev.slice();
      var arr = copy[qi].slice();
      var p = arr.indexOf(idx);
      if(p >= 0) arr.splice(p, 1);
      else arr.push(idx);
      arr.sort();
      copy[qi] = arr;
      // Tracking
      setTracking(function(t){return Object.assign({}, t, {changes:t.changes+1})});
      return copy;
    });
  }

  function envoyer(){
    var nbVides = 0;
    saisies.forEach(function(s){ if(!s || s.length === 0) nbVides++; });
    if(nbVides > 0){
      if(!confirm("Tu n'as pas saisi de réponse pour "+nbVides+" question(s). Envoyer quand même ?")) return;
    }
    var data = {
      choix:saisies,
      ts:Date.now(),
      tracking:{
        durationMs:Date.now() - debut,
        changes:tracking.changes
      }
    };
    db.ref(DB_ROOT+"/sessions/"+p.session.id+"/papier/"+p.eleve.slug).set(data, function(err){
      if(err){ alert("Erreur: "+err.message); return; }
      setEnvoyé(true);
      setTimeout(function(){
        // Recharger pour afficher la page de résultats
        window.location.reload();
      }, 1200);
    });
  }

  if(envoyé){
    return h("div", {className:"eleve-page"},
      ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
      h("div", {className:"eleve-card"},
        h("h1", null, "✅ Saisie envoyée !"),
        h("p", null, "Tu vas voir tes résultats détaillés.")
      )
    );
  }

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-results"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom + " · " + p.eleve.nomComplet),
      h("h2", null, "📝 Saisis tes réponses papier",
        h(InfoI, null, "Tu as passé cette évaluation sur papier en classe ? Saisis ici les lettres que tu avais cochées question par question. C'est utile pour avoir ton bilan personnel (combien de bonnes réponses, comparaison à la classe) même si l'éval n'a pas été passée sur ton téléphone.")
      ),
      h("p", {style:{color:"var(--noir)",marginBottom:"1rem",lineHeight:1.5}},
        "Pour chaque question, indique la (ou les) lettre(s) que tu as choisie(s) ",
        h("strong", null, "sur ta copie papier"),
        ". C'est cette saisie qui débloque tes résultats détaillés.",
        h(InfoI, null, "Pourquoi ? Cette étape te permet de refaire activement ta correction et de vérifier que ce que tu as cliqué dans l'app correspondait bien à ce que tu avais écrit. Tu retravailles ainsi tes notions et tu comprends mieux tes éventuelles erreurs.")
      ),
      ev.questions.map(function(q, qi){
        return h("div", {key:qi, className:"beta-q"},
          h("div", {className:"num"}, "Q"+(qi+1)),
          h("div", {className:"enonce"}, q.enonce),
          h("div", {className:"lettres-row"},
            q.choix.map(function(_, j){
              var sel = saisies[qi].indexOf(j) >= 0;
              return h("button", {
                key:j,
                className:"lettre-pick"+(sel?" selected":""),
                onClick:function(){toggleLettre(qi, j)}
              }, lettreFromIndex(j));
            })
          )
        );
      }),
      h("button", {className:"btn-accueil", style:{marginTop:"1.5rem"}, onClick:envoyer}, "Envoyer →"),
      h("div", {style:{marginTop:".8rem"}},
        h("button", {className:"btn btn-ghost btn-sm", onClick:p.onBack}, "← Retour")
      )
    )
  );
}

// ─────────── Élève — Phase évaluation ───────────
function EleveEval(p){
  var sess = p.session, ev = p.evaluation;
  var qIdx = sess.qIdx;
  var phase = sess.phase; // "idle" | "reflexion" | "reponse" | "attente"
  var question = (qIdx != null && ev.questions[qIdx]) ? ev.questions[qIdx] : null;
  var s1 = useState([]), selection = s1[0], setSelection = s1[1];
  var s2 = useState(false), valide = s2[0], setValide = s2[1];
  var s3 = useState(0), tick = s3[0], setTick = s3[1];
  var s4 = useState([]), notifs = s4[0], setNotifs = s4[1];
  var s5 = useState(null), bandeau = s5[0], setBandeau = s5[1];
  var s6 = useState(false), histoOpen = s6[0], setHistoOpen = s6[1];
  var s7 = useState(0), seenCount = s7[0], setSeenCount = s7[1];

  // Écoute des notifications du prof
  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/notifs").on("value", function(snap){
      var v = snap.val() || {};
      var arr = Object.keys(v).map(function(k){return Object.assign({id:k}, v[k])});
      arr.sort(function(a,b){return (b.ts||0)-(a.ts||0)});
      setNotifs(function(prev){
        // Si une nouvelle notif est apparue, on l'affiche en bandeau
        if(arr.length > prev.length){
          var newest = arr[0];
          if(newest && newest.ts && (Date.now() - newest.ts) < 4000){
            setBandeau(newest);
            setTimeout(function(){
              setBandeau(function(cur){return (cur && cur.id === newest.id) ? null : cur});
            }, 3500);
          }
        }
        return arr;
      });
    });
    return function(){ db.ref(DB_ROOT+"/sessions/"+sess.id+"/notifs").off(); };
  }, [sess.id]);
  var nbNonLues = Math.max(0, notifs.length - seenCount);

  // Reset à chaque question / phase
  useEffect(function(){
    setSelection([]);
    setValide(false);
  }, [qIdx, phase]);

  // Tick chrono
  useEffect(function(){
    if(phase !== "reflexion" && phase !== "reponse") return;
    var iv = setInterval(function(){ setTick(function(t){return t+1}); }, 250);
    return function(){ clearInterval(iv); };
  }, [phase, qIdx]);

  // Vérifie réouverture (l'élève peut être autorisé à répondre alors que la phase est "attente")
  var reouvert = sess.reouverts && sess.reouverts[p.eleve.slug] === qIdx;
  var peutRepondre = phase === "reponse" || reouvert;

  // Calcul chrono restant (basé sur startedAt + état pause)
  var chronoRestant = null;
  if((phase === "reflexion" || phase === "reponse") && sess.phaseStart){
    var duree = phase === "reflexion" ? (question ? getNiveau(question.niveau).chrono : 10) : (sess.chronoReponse || 5);
    if(sess.paused){
      chronoRestant = sess.paused.remaining;
    } else {
      var elapsed = Math.floor((Date.now() - sess.phaseStart)/1000);
      chronoRestant = Math.max(0, duree - elapsed);
    }
  }

  function toggleChoix(idx){
    if(!peutRepondre) return;
    setSelection(function(prev){
      var newSel;
      if(prev.indexOf(idx) >= 0) newSel = prev.filter(function(x){return x !== idx});
      else newSel = prev.concat([idx]).sort();
      // Sauvegarde immédiate (auto-validation)
      var rep = {choix:newSel, ts:Date.now()};
      if(newSel.length > 0){
        db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses/"+qIdx+"/"+p.eleve.slug).set(rep);
        try{
          var key = "qcm_local_"+sess.id+"_"+qIdx+"_"+p.eleve.slug;
          localStorage.setItem(key, JSON.stringify(rep));
        }catch(e){}
        setValide(true);
      } else {
        // Plus aucune case cochée → on supprime la réponse
        db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses/"+qIdx+"/"+p.eleve.slug).remove();
        setValide(false);
      }
      return newSel;
    });
  }

  // Charger réponse existante (cas reload après valid)
  useEffect(function(){
    if(qIdx == null) return;
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses/"+qIdx+"/"+p.eleve.slug).once("value", function(snap){
      var rep = snap.val();
      if(rep && rep.choix){ setSelection(rep.choix); setValide(true); }
    });
  }, [qIdx, sess.id]);

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-card"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom + " · " + p.eleve.nomComplet),
      h("h1", null, ev.titre),
      // État
      phase === "idle" && h("div", {className:"etat-attente"}, "⏳ En attente du démarrage..."),

      // Phase reflexion
      phase === "reflexion" && question && h("div", {className:"eleve-q-zone"},
        h("div", {className:"eleve-q-header"},
          h("span", {className:"eleve-q-num"}, "Question "+(qIdx+1)+" / "+ev.questions.length),
          h("span", {className:"eleve-q-pastille", style:{background:getNiveau(question.niveau).color, color:question.niveau==="facile"?"#5C4500":"#fff"}}, getNiveau(question.niveau).label)
        ),
        h("div", {className:"eleve-q-enonce"}, question.enonce),
        h("div", {className:"eleve-q-consigne"}, "✍️ RÉDIGE TA RÉPONSE EN ENTIER SUR TA FEUILLE"),
        chronoRestant !== null && h("div", {className:"eleve-chrono"+(chronoRestant <= 3 ? " urgent":"")},
          h("div", {className:"label"}, "Temps de réflexion"),
          h("div", {className:"v"}, chronoRestant)
        )
      ),

      // Phase réponse
      (phase === "reponse" || reouvert) && question && h("div", {className:"eleve-q-zone"},
        h("div", {className:"eleve-q-header"},
          h("span", {className:"eleve-q-num"}, "Question "+(qIdx+1)+" / "+ev.questions.length+(reouvert?" — RÉOUVERTE":"")),
          h("span", {className:"eleve-q-pastille", style:{background:getNiveau(question.niveau).color, color:question.niveau==="facile"?"#5C4500":"#fff"}}, getNiveau(question.niveau).label)
        ),
        h("div", {className:"eleve-q-enonce"}, question.enonce),
        h("div", {className:"eleve-pose-stylo"},
          h("span", {className:"ic"}, "📕"),
          h("span", null, "POSE TON STYLO. Sélectionne maintenant ta réponse.")
        ),
        !reouvert && chronoRestant !== null && h("div", {className:"eleve-chrono"+(chronoRestant <= 2 ? " urgent":"")},
          h("div", {className:"label"}, "Temps de réponse"),
          h("div", {className:"v"}, chronoRestant)
        ),
        h("div", {className:"eleve-choix"},
          question.choix.map(function(c, i){
            var sel = selection.indexOf(i) >= 0;
            return h("button", {
              key:i,
              className:"eleve-choix-btn"+(sel?" selected":""),
              onClick:function(){toggleChoix(i)}
            },
              h("span", {className:"lettre"}, lettreFromIndex(i)),
              h("span", null, c)
            );
          })
        ),
        h("div", {
          className:"eleve-feedback"+(valide?" valide":""),
          title:"Ta réponse est enregistrée automatiquement dès que tu cliques sur une lettre. Tu peux changer d'avis tant que le chrono tourne."
        }, valide
            ? "✅ Réponse enregistrée — tu peux encore la changer"
            : "💡 Clique sur la (ou les) lettre(s) qui correspond(ent) à ta réponse"
        )
      ),

      // Phase attente entre questions
      phase === "attente" && !reouvert && h("div", {className:"etat-attente"}, "⏳ Attends la prochaine question..."),

      // Mode dégradé
      sess._degraded && h("div", {className:"degraded-banner"}, "⚠️ Mode local — synchro auto au retour réseau"),

      // Bandeau pause (si chrono figé par le prof)
      sess.paused && h("div", {className:"eleve-pause-banner"},
        "⏸️ Le professeur a mis le chrono en pause"
      ),

      // Bandeau notification temporaire
      bandeau && h("div", {className:"eleve-notif-bandeau"+(bandeau.type === "pause" ? " pause" : "")},
        bandeau.msg
      ),

      // Cloche notifs (en haut à droite, fixe)
      notifs.length > 0 && h("button", {
        className:"eleve-notif-cloche",
        onClick:function(){setHistoOpen(true);setSeenCount(notifs.length)},
        title:"Voir l'historique des messages du professeur"
      },
        "🔔",
        nbNonLues > 0 && h("span", {className:"eleve-notif-badge"}, nbNonLues)
      ),

      // Modale historique
      histoOpen && h("div", {className:"eleve-notif-back", onClick:function(e){if(e.target.className==="eleve-notif-back")setHistoOpen(false)}},
        h("div", {className:"eleve-notif-modal"},
          h("button", {className:"modal-close", onClick:function(){setHistoOpen(false)}}, "✕"),
          h("h2", null, "🔔 Messages du professeur",
            h(InfoI, null, "Le prof peut t'envoyer des messages pendant l'évaluation : il a ajouté du temps, mis en pause, ou rouvert une question. Tu les retrouves ici et au moment de leur arrivée en haut de l'écran.")
          ),
          notifs.length === 0
            ? h("p", {style:{color:"var(--gris)",fontStyle:"italic"}}, "Aucun message.")
            : h("div", {className:"eleve-notif-liste"},

}

// ─────────── Élève — Phase correction ───────────
// Pondération difficulté (Lot 4) — défaut, écrasable via Firebase settings/poidsNiveau
var POIDS_NIVEAU = {facile:1, standard:2, approfondi:3, expert:4};
var POIDS_NIVEAU_DEFAUT = {facile:1, standard:2, approfondi:3, expert:4};
function calculerMaxPondere(questions){
  return (questions||[]).reduce(function(acc, q){
    return acc + (POIDS_NIVEAU[q.niveau] || 1);
  }, 0);
}

/*
 * ════════════════════════════════════════════════════════════════════
 * API PROFIL LONGITUDINAL MJPC (Lot 6)
 * ════════════════════════════════════════════════════════════════════
 *
 * Cette API est conçue pour être branchée ultérieurement sur le site
 * monsieurjaipascompris (MJPC). Elle écrit dans une racine Firebase
 * séparée (`mjpcProfils/`), distincte de `qcm/` (DB_ROOT).
 *
 * STRUCTURE :
 *   mjpcProfils/
 *     {classeSlug}/
 *       {eleveSlug}/
 *         sessions/
 *           {sessId}/
 *             date           : timestamp (ms)
 *             sessId         : id de la session
 *             evalId         : id de l'éval
 *             titre          : titre de l'éval
 *             scoreBrut      : nb questions justes
 *             totalQ         : nb total de questions
 *             scorePondere   : score pondéré par niveau (F=1,S=2,A=3,E=4)
 *             maxP           : score pondéré max possible
 *             fourchetteEstimee : "vert"|"bleu"|"orange"|"rouge"|null
 *             fourchetteReelle  : idem
 *             calibration    : "ok"|"sous"|"sur"|null
 *             details[]      : {idx, niveau, poids, juste}
 *
 * USAGE CÔTÉ MJPC :
 *   db.ref("mjpcProfils/" + classeSlug + "/" + eleveSlug + "/sessions")
 *     .on("value", ...)  → renvoie l'historique complet
 *
 * DÉCLENCHEMENT : appel automatique de archiverDansProfilsMJPC()
 * quand la phase de la session passe à "finie" (clic "Question suivante"
 * en correction sur la dernière Q).
 */
function archiverDansProfilsMJPC(sess, ev, classe, reponses){
  if(!sess || !ev || !classe || !reponses) return;
  var classeSlug = classe.slug || sess.classeSlug || "_inconnu";
  // Ne pas archiver les sessions de test pour ne pas polluer le profil longitudinal
  if(classeSlug === TEST_CLASSE_SLUG) return;
  var maxP = calculerMaxPondere(ev.questions);
  var autoevals = sess.autoevals || {};
  var date = sess.date || Date.now();
  (classe.eleves || []).forEach(function(e){
    var slug = e.slug || slugify(e.nomComplet);
    var scoreBrut = 0, scorePondere = 0;
    var details = ev.questions.map(function(q, i){
      var rep = reponses[i] && reponses[i][slug];
      var mine = rep && rep.choix ? rep.choix.slice().sort() : null;
      var bonnes = (q.bonnes||[]).slice().sort();
      var juste = !!(mine && mine.length > 0 && JSON.stringify(mine) === JSON.stringify(bonnes));
      var poids = POIDS_NIVEAU[q.niveau] || 1;
      if(juste){ scoreBrut++; scorePondere += poids; }
      return {idx:i, niveau:q.niveau || "facile", poids:poids, juste:juste};
    });
    var fReelleObj = fourchetteDuScore(scoreBrut, ev.questions.length);
    var fReelle = fReelleObj.key;
    var fEstimee = autoevals[slug] || null;
    var calibration = null;
    if(fEstimee && IDX_FOURCHETTE[fEstimee] && IDX_FOURCHETTE[fReelle]){
      var iE = IDX_FOURCHETTE[fEstimee], iR = IDX_FOURCHETTE[fReelle];
      calibration = (iE === iR) ? "ok" : (iE > iR ? "sur" : "sous");
    }
    var payload = {
      date: date,
      sessId: sess.id,
      evalId: sess.evalId || null,
      titre: ev.titre || "Évaluation",
      scoreBrut: scoreBrut,
      totalQ: ev.questions.length,
      scorePondere: scorePondere,
      maxP: maxP,
      fourchetteEstimee: fEstimee,
      fourchetteReelle: fReelle,
      calibration: calibration,
      details: details
    };
    db.ref("mjpcProfils/"+classeSlug+"/"+slug+"/sessions/"+sess.id).set(payload);
  });
}

// ════════════════════════════════════════════════════════════════════
// SESSACTIONS — actions partagées sur une session, utilisées par VuePhone.
// SessionLive a son propre code équivalent (scope local, paramètres
// d'instance) qui n'utilise pas ce module pour minimiser le risque sur le
// pilotage prof. Toute modif ici doit rester cohérente avec SessionLive.
// ════════════════════════════════════════════════════════════════════
var sessActions = {
  notifier: function(sess, msg, type){
    var nid = "n_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/notifs/"+nid).set({msg:msg, type:type||"info", ts:Date.now()});
  },
  lancerQ: function(sess, ev, optIdx){
    var newIdx = (optIdx != null) ? optIdx : ((sess.qIdx == null) ? 0 : sess.qIdx + 1);
    if(newIdx >= ev.questions.length){
      alert("Toutes les questions ont été posées.");
      return false;
    }
    db.ref(DB_ROOT+"/sessions/"+sess.id).update({
      qIdx:newIdx, phase:"reflexion", phaseStart:Date.now(), reouverts:null, paused:null
    });
    return true;
  },
  autoriser: function(sess, optChronoRep){
    db.ref(DB_ROOT+"/sessions/"+sess.id).update({
      phase:"reponse", phaseStart:Date.now(), chronoReponse: (optChronoRep != null) ? optChronoRep : (sess.chronoReponse || 5)
    });
  },
  clore: function(sess, askConfirmReflexion){
    if(askConfirmReflexion && sess.phase === "reflexion"){
      if(!confirm("Clore la réflexion ? Les élèves n'auront pas eu le temps de répondre.")) return false;
    }
    db.ref(DB_ROOT+"/sessions/"+sess.id).update({phase:"attente"});
    return true;
  },
  togglePause: function(sess, ev, question){
    if(sess.paused){
      var rest = sess.paused.remaining, dur = sess.paused.duree;
      var newStart = Date.now() - (dur - rest)*1000;
      db.ref(DB_ROOT+"/sessions/"+sess.id).update({phaseStart:newStart, paused:null});
      sessActions.notifier(sess, "Le chrono reprend.", "info");
    } else {
      if(sess.phase !== "reflexion" && sess.phase !== "reponse") return;
      var d = sess.phase === "reflexion"
        ? (question ? getNiveau(question.niveau).chrono : 10)
        : (sess.chronoReponse || 5);
      var elapsed = Math.floor((Date.now() - sess.phaseStart)/1000);
      var r = Math.max(0, d - elapsed);
      db.ref(DB_ROOT+"/sessions/"+sess.id+"/paused").set({remaining:r, duree:d, at:Date.now()});
      sessActions.notifier(sess, "⏸️ Pause demandée par le professeur.", "pause");
    }
  },
  ajouterTemps: function(sess, secondes){
    if(sess.paused){
      db.ref(DB_ROOT+"/sessions/"+sess.id+"/paused/remaining").set((sess.paused.remaining||0) + secondes);
    } else if(sess.phase === "reflexion" || sess.phase === "reponse"){
      db.ref(DB_ROOT+"/sessions/"+sess.id+"/phaseStart").set(sess.phaseStart + secondes*1000);
    } else { return; }
    sessActions.notifier(sess, "⏱️ Le professeur a ajouté "+secondes+" seconde"+(secondes>1?"s":"")+".", "info");
  },
  revealer: function(sess){
    var u = {corrRevealed:true};
    u["revealedHistory/"+sess.correctionIdx] = true;
    db.ref(DB_ROOT+"/sessions/"+sess.id).update(u);
  },
  lancerCorrection: function(sess, ev){
    // Calcul de l'ordre : tri par taux d'erreur décroissant
    var reponses = sess.reponses || {};
    var ordres = ev.questions.map(function(q, i){
      var reps = reponses[i] || {};
      var nbTotal = 0, nbFaux = 0;
      var bonnes = (q.bonnes||[]).slice().sort();
      Object.keys(reps).forEach(function(k){
        nbTotal++;
        var c = (reps[k].choix||[]).slice().sort();
        if(JSON.stringify(c) !== JSON.stringify(bonnes)) nbFaux++;
      });
      var tx = nbTotal === 0 ? 0 : nbFaux/nbTotal;
      return {idx:i, taux:tx};
    });
    ordres.sort(function(a,b){return b.taux - a.taux});
    var ordreIdx = ordres.map(function(o){return o.idx});
    db.ref(DB_ROOT+"/sessions/"+sess.id).update({
      phase:"correction",
      correctionIdx:ordreIdx[0],
      correctionOrdre:ordreIdx,
      corrRevealed:false,
      revealedHistory:null
    });
  }
};

function EleveAutoeval(p){
  var sess = p.session, ev = p.evaluation;
  var slug = p.eleve.slug;
  var s1 = useState(null), monVote = s1[0], setMonVote = s1[1];

  useEffect(function(){
    var ref = db.ref(DB_ROOT+"/sessions/"+sess.id+"/autoevals/"+slug);
    ref.once("value", function(snap){ setMonVote(snap.val()); });
  }, [sess.id, slug]);

  // Fourchettes calculées en NOMBRE DE BONNES RÉPONSES BRUTES (pas en score pondéré)
  // Les seuils internes restent en % pour cohérence avec FOURCHETTES_DEF
  var nbTotal = ev.questions.length;
  function borneInfBrut(pct){ return Math.ceil(nbTotal * pct / 100); }
  function borneSupBrut(pct){ return Math.floor(nbTotal * pct / 100); }
  var fourchettes = [
    {key:"vert",   emoji:"🟢", inf:borneInfBrut(76), sup:nbTotal,          color:"vert"},
    {key:"bleu",   emoji:"🔵", inf:borneInfBrut(51), sup:borneSupBrut(75), color:"bleu"},
    {key:"orange", emoji:"🟠", inf:borneInfBrut(26), sup:borneSupBrut(50), color:"orange"},
    {key:"rouge",  emoji:"🔴", inf:0,                sup:borneSupBrut(25), color:"rouge"}
  ];

  function voter(key){
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/autoevals/"+slug).set(key);
    setMonVote(key);
  }

  function libelle(f){
    if(f.inf === f.sup) return f.inf + " bonne" + (f.inf>1?"s":"") + " réponse" + (f.inf>1?"s":"") + " sur " + nbTotal;
    return "Entre " + f.inf + " et " + f.sup + " bonnes réponses sur " + nbTotal;
  }

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-card"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom + " · " + p.eleve.nomComplet),
      h("h1", null, "🎯 Ton estimation"),
      h("p", {className:"autoeval-intro"}, "Combien de bonnes réponses penses-tu avoir données ? Choisis la fourchette qui correspond à ton estimation.",
        h(InfoI, null, "C'est ton estimation, pas ton vrai score. À la fin de la correction, tu compareras ce que tu pensais avec ce que tu as vraiment obtenu. C'est utile pour apprendre à mieux te connaître : sais-tu juger ton propre travail avant de voir la correction ?")
      ),
      !monVote && h("div", {className:"autoeval-fourchettes"},
        fourchettes.map(function(f){
          return h("button", {key:f.key, className:"autoeval-fourchette fourchette-"+f.color, onClick:function(){voter(f.key)}},
            h("div", {className:"autoeval-fourchette-emoji"}, f.emoji),
            h("div", {className:"autoeval-fourchette-bornes-big"}, libelle(f))
          );
        })
      ),
      monVote && (function(){
        var sel = fourchettes.find(function(f){return f.key===monVote});
        return h("div", {className:"autoeval-confirme"},
          h("div", {className:"autoeval-confirme-titre"}, "Ton estimation est enregistrée"),
          h("div", {className:"autoeval-confirme-choix fourchette-"+sel.color},
            h("span", {style:{fontSize:"2rem"}}, sel.emoji),
            h("span", null, libelle(sel))
          ),
          h("div", {className:"autoeval-confirme-attente"}, "⏳ Attends que le professeur lance la correction…")
        );
      })()
    )
  );
}

var FOURCHETTES_DEF = [
  {key:"vert", emoji:"🟢", color:"vert", min:76, max:100},
  {key:"bleu", emoji:"🔵", color:"bleu", min:51, max:75},
  {key:"orange", emoji:"🟠", color:"orange", min:26, max:50},
  {key:"rouge", emoji:"🔴", color:"rouge", min:0, max:25}
];
var IDX_FOURCHETTE = {rouge:1, orange:2, bleu:3, vert:4};

// Bornes en NOMBRE DE BONNES RÉPONSES pour une fourchette donnée et un total de questions
function bornesFourchette(fkey, total){
  var f = FOURCHETTES_DEF.find(function(x){return x.key===fkey});
  if(!f) return {inf:0, sup:0};
  if(fkey === "vert")  return {inf:Math.ceil(total*0.76), sup:total};
  if(fkey === "bleu")  return {inf:Math.ceil(total*0.51), sup:Math.floor(total*0.75)};
  if(fkey === "orange")return {inf:Math.ceil(total*0.26), sup:Math.floor(total*0.50)};
  return {inf:0, sup:Math.floor(total*0.25)};
}
function libelleFourchette(fkey, total){
  var b = bornesFourchette(fkey, total);
  if(b.inf === b.sup) return b.inf + " bonne" + (b.inf>1?"s":"") + " réponse" + (b.inf>1?"s":"");
  return "entre " + b.inf + " et " + b.sup + " bonnes réponses";
}

function fourchetteDuScore(score, max){
  if(max <= 0) return FOURCHETTES_DEF[3];
  var pct = (score / max) * 100;
  if(pct > 75) return FOURCHETTES_DEF[0];
  if(pct > 50) return FOURCHETTES_DEF[1];
  if(pct > 25) return FOURCHETTES_DEF[2];
  return FOURCHETTES_DEF[3];
}

function EleveBilan(p){
  var sess = p.session, ev = p.evaluation;
  var slug = p.eleve.slug;
  var classeSlug = p.classe.slug;
  var s1 = useState(null), allReps = s1[0], setAllReps = s1[1];
  var s2 = useState({}), allAutoevals = s2[0], setAllAutoevals = s2[1];
  var s3 = useState({}), historique = s3[0], setHistorique = s3[1]; // Lot 6 : profil longitudinal

  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses").once("value", function(snap){
      setAllReps(snap.val() || {});
    });
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/autoevals").once("value", function(snap){
      setAllAutoevals(snap.val() || {});
    });
    // Lot 6 : écoute du profil longitudinal MJPC (sessions passées)
    var refH = db.ref("mjpcProfils/"+classeSlug+"/"+slug+"/sessions");
    var cb = refH.on("value", function(snap){ setHistorique(snap.val() || {}); });
    return function(){ refH.off("value", cb); };
  }, [sess.id, classeSlug, slug]);

  if(allReps === null) return h("div", {className:"eleve-page"}, h("div", {className:"eleve-card"}, h("p", null, "Chargement du bilan…")));

  var maxP = calculerMaxPondere(ev.questions);
  var nbTotal = ev.questions.length;
  // Score pondéré + brut de l'élève
  var monScore = 0; // pondéré
  var monScoreBrut = 0; // nb de Q justes
  var mesResultats = ev.questions.map(function(q, i){
    var rep = allReps[i] && allReps[i][slug];
    var mine = rep && rep.choix ? rep.choix.slice().sort() : null;
    var bonnes = (q.bonnes||[]).slice().sort();
    var juste = mine && mine.length > 0 && JSON.stringify(mine) === JSON.stringify(bonnes);
    var nonRep = !mine || mine.length === 0;
    if(juste){ monScore += POIDS_NIVEAU[q.niveau] || 1; monScoreBrut++; }
    // taux classe
    var totalClasse = 0, bonClasse = 0;
    Object.keys(allReps[i] || {}).forEach(function(s){
      var c = (allReps[i][s].choix||[]).slice().sort();
      if(c.length > 0){
        totalClasse++;
        if(JSON.stringify(c) === JSON.stringify(bonnes)) bonClasse++;
      }
    });
    var tauxClasse = totalClasse > 0 ? (bonClasse / totalClasse) * 100 : 0;
    return {idx:i, q:q, juste:juste, nonRep:nonRep, tauxClasse:tauxClasse, poids:POIDS_NIVEAU[q.niveau]||1};
  });

  // Fourchette RÉELLE basée sur le NB BRUT de bonnes réponses (cohérent avec autoeval)
  var maFourchette = fourchetteDuScore(monScoreBrut, nbTotal);

  // Distribution classe pour comparaison (en brut)
  var scoresClasse = []; // scores BRUTS de chaque élève
  var scoresClassePondere = []; // pondérés pour info complémentaire
  var elevesClasse = new Set();
  Object.keys(allReps).forEach(function(qi){
    Object.keys(allReps[qi]).forEach(function(s){ elevesClasse.add(s); });
  });
  elevesClasse.forEach(function(s){
    var scB = 0, scP = 0;
    ev.questions.forEach(function(q, i){
      var r = allReps[i] && allReps[i][s];
      var mn = r && r.choix ? r.choix.slice().sort() : null;
      var bn = (q.bonnes||[]).slice().sort();
      if(mn && mn.length > 0 && JSON.stringify(mn) === JSON.stringify(bn)){
        scB++;
        scP += POIDS_NIVEAU[q.niveau] || 1;
      }
    });
    scoresClasse.push(scB);
    scoresClassePondere.push(scP);
  });
  scoresClasse.sort(function(a,b){return a-b});
  scoresClassePondere.sort(function(a,b){return a-b});
  var mediane = scoresClasse.length === 0 ? 0
    : (scoresClasse.length % 2 ? scoresClasse[Math.floor(scoresClasse.length/2)]
       : (scoresClasse[scoresClasse.length/2-1] + scoresClasse[scoresClasse.length/2]) / 2);

  // Position vs médiane
  var posClasse = monScoreBrut > mediane ? "au-dessus" : (monScoreBrut < mediane ? "en-dessous" : "à la médiane");

  // Calibration autoeval
  var monAutoeval = allAutoevals[slug];
  var calibration = null;
  if(monAutoeval && IDX_FOURCHETTE[monAutoeval]){
    var idxEstime = IDX_FOURCHETTE[monAutoeval];
    var idxReel = IDX_FOURCHETTE[maFourchette.key];
    var fEstime = FOURCHETTES_DEF.find(function(f){return f.key===monAutoeval});
    var libEstime = libelleFourchette(monAutoeval, nbTotal);
    var libReel = libelleFourchette(maFourchette.key, nbTotal);
    if(idxEstime === idxReel) calibration = {type:"ok", msg:"✅ Tu te connais bien !", detail:"Tu pensais avoir "+libEstime+" "+fEstime.emoji+" et tu en as effectivement obtenu "+monScoreBrut+" sur "+nbTotal+". Ton estimation correspond à ton vrai résultat."};
    else if(idxEstime > idxReel) calibration = {type:"sur", msg:"⚠️ Tu pensais avoir mieux fait", detail:"Tu pensais avoir "+libEstime+" "+fEstime.emoji+" mais tu en as eu "+monScoreBrut+" sur "+nbTotal+" ("+libReel+" "+maFourchette.emoji+"). Tu as un peu surestimé ce que tu avais réussi."};
    else calibration = {type:"sous", msg:"🌟 Tu te sous-estimais !", detail:"Tu pensais avoir "+libEstime+" "+fEstime.emoji+" mais tu en as eu "+monScoreBrut+" sur "+nbTotal+" ("+libReel+" "+maFourchette.emoji+") ! Tu as fait mieux que ce que tu croyais."};
  }

  // Q faciles ratées (taux classe ≥ 50% OU niveau facile, et l'élève a faux)
  var faciles_ratees = mesResultats.filter(function(r){
    if(r.juste || r.nonRep) return false;
    return r.tauxClasse >= 50 || r.q.niveau === "facile";
  });
  // Q difficiles réussies (niveau approfondi/expert et juste)
  var difficiles_reussies = mesResultats.filter(function(r){
    return r.juste && (r.q.niveau === "approfondi" || r.q.niveau === "expert");
  });

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-card"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom + " · " + p.eleve.nomComplet),
      h("h1", null, "🎯 Bilan personnel"),
      // Score
      h("div", {className:"bilan-score fourchette-"+maFourchette.color},
        h("div", {className:"bilan-score-emoji"}, maFourchette.emoji),
        h("div", {className:"bilan-score-num"}, monScoreBrut + " / " + nbTotal + " bonnes réponses",
          h(InfoI, null, "Tu as donné "+monScoreBrut+" bonne(s) réponse(s) sur "+nbTotal+". La couleur dépend de ce nombre : 🟢 si tu en as beaucoup, 🔵 si tu en as un bon nombre, 🟠 si tu en as un peu moins, 🔴 si tu en as peu.")
        ),
        h("div", {className:"bilan-score-pct"}, Math.round((monScoreBrut/Math.max(nbTotal,1))*100) + " %"),
        h("div", {className:"bilan-score-pondere"}, "Points pour la note : ", h("strong", null, monScore + " / " + maxP),
          h(InfoI, null, "Pour calculer ta note, certaines questions valent plus que d'autres : une question facile rapporte 1 point, une question standard 2 points, une question approfondie 3 points et une question expert 4 points. Si tu as bien répondu à beaucoup de questions difficiles, tu as plus de points pour la note.")
        )
      ),
      // Comparaison classe
      scoresClasse.length > 1 && h("div", {className:"bilan-classe"},
        h("h3", null, "📊 Par rapport à la classe",
          h(InfoI, null, "Te comparer à la classe te dit où tu te situes parmi les autres. Si tu fais mieux que la moitié de la classe, tu peux être fier de toi. Si tu fais moins bien, c'est l'occasion de retravailler.")
        ),
        h("div", null, "La moitié de la classe a fait ", h("strong", null, mediane + " bonne" + (mediane>1?"s":"") + " réponse" + (mediane>1?"s":"") + " ou moins"), " sur " + nbTotal + "."),
        h("div", null, "Le résultat le plus bas dans la classe : ", h("strong", null, scoresClasse[0] + " bonne" + (scoresClasse[0]>1?"s":"") + " réponse" + (scoresClasse[0]>1?"s":""))),
        h("div", null, "Le résultat le plus haut : ", h("strong", null, scoresClasse[scoresClasse.length-1] + " bonne" + (scoresClasse[scoresClasse.length-1]>1?"s":"") + " réponse" + (scoresClasse[scoresClasse.length-1]>1?"s":""))),
        h("div", {className:"bilan-classe-pos"},
          posClasse === "au-dessus" ? h(React.Fragment, null, "👍 Tu fais ", h("strong", null, "mieux que la moitié de la classe"), ".") :
          posClasse === "en-dessous" ? h(React.Fragment, null, "💪 Tu fais ", h("strong", null, "moins bien que la moitié de la classe"), ". L'occasion de retravailler !") :
          h(React.Fragment, null, "🎯 Tu es ", h("strong", null, "pile au milieu"), " de la classe.")
        )
      ),
      // Calibration autoeval (= "ton estimation")
      calibration && h("div", {className:"bilan-calibration bilan-calib-"+calibration.type},
        h("h3", null, "🎯 Ton estimation",
          h(InfoI, null, "Avant la correction, tu as estimé combien de bonnes réponses tu pensais avoir données. Ici, tu compares cette estimation avec ton vrai résultat. Apprendre à bien estimer son propre travail est important : ça veut dire que tu sais où tu en es.")
        ),
        h("div", {className:"bilan-calib-msg"}, calibration.msg),
        h("div", {className:"bilan-calib-detail"}, calibration.detail)
      ),
      // Q faciles ratées
      faciles_ratees.length > 0 && h("div", {className:"bilan-bloc bilan-bloc-attention"},
        h("h3", null, "🔍 À revoir en priorité",
          h(InfoI, null, "Ces questions, soit elles étaient faciles, soit la plupart des élèves de ta classe y ont bien répondu. Comme tu les as ratées, c'est sans doute là qu'il faut retravailler. Commence par celles-là avant de t'attaquer aux questions plus difficiles.")
        ),
        h("p", {className:"bilan-bloc-intro"}, "Tu as raté ces questions alors qu'elles étaient soit faciles, soit majoritairement réussies en classe :"),
        faciles_ratees.map(function(r){
          return h("div", {key:r.idx, className:"bilan-q-item"},
            h("span", {className:"bilan-q-niveau niveau-"+r.q.niveau}, getNiveau(r.q.niveau).label),
            h("span", {className:"bilan-q-enonce"}, r.q.enonce),
            h("span", {className:"bilan-q-taux"}, Math.round(r.tauxClasse)+"% de la classe a réussi")
          );
        })
      ),
      // Q difficiles réussies
      difficiles_reussies.length > 0 && h("div", {className:"bilan-bloc bilan-bloc-felicitations"},
        h("h3", null, "🌟 Bravo pour ces questions difficiles"),
        difficiles_reussies.map(function(r){
          return h("div", {key:r.idx, className:"bilan-q-item"},
            h("span", {className:"bilan-q-niveau niveau-"+r.q.niveau}, getNiveau(r.q.niveau).label),
            h("span", {className:"bilan-q-enonce"}, r.q.enonce)
          );
        })
      ),
      // Lot 6 : historique des évaluations précédentes
      (function(){
        var liste = Object.keys(historique).map(function(k){ return historique[k]; })
          .filter(function(s){ return s && s.sessId !== sess.id; })
          .sort(function(a,b){ return (b.date||0) - (a.date||0); });
        if(liste.length === 0) return null;
        return h("div", {className:"bilan-bloc bilan-historique"},
          h("h3", null, "📈 Tes évaluations précédentes",
            h(InfoI, null, "Tes 5 dernières évaluations enregistrées. Pour chacune, tu vois ta date, ton nombre de bonnes réponses, ta fourchette (couleur) et un emoji qui rappelle si tu t'étais bien évalué (✅), sous-évalué (🌟) ou sur-évalué (⚠️). C'est ton suivi longitudinal : tu peux voir ta progression au fil du temps.")
          ),
          h("div", {className:"bilan-historique-liste"},
            liste.slice(0, 5).map(function(s){
              var f = FOURCHETTES_DEF.find(function(x){return x.key===s.fourchetteReelle}) || FOURCHETTES_DEF[3];
              var d = new Date(s.date);
              var dateFr = d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();
              return h("div", {key:s.sessId, className:"bilan-historique-item"},
                h("div", {className:"bilan-historique-date"}, dateFr),
                h("div", {className:"bilan-historique-titre"}, s.titre),
                h("div", {className:"bilan-historique-score fourchette-"+f.color},
                  f.emoji+" "+(s.scoreBrut != null ? s.scoreBrut : "?")+"/"+(s.totalQ || "?")
                ),
                s.calibration && h("div", {className:"bilan-historique-calib calib-"+s.calibration},
                  s.calibration === "ok" ? "✅" : s.calibration === "sous" ? "🌟" : "⚠️"
                )
              );
            })
          )
        );
      })()
    )
  );
}

function EleveCorrection(p){
  var sess = p.session, ev = p.evaluation;
  var qIdx = sess.correctionIdx != null ? sess.correctionIdx : 0;
  var question = ev.questions[qIdx];
  var s1 = useState(null), maRep = s1[0], setMaRep = s1[1];
  var s2 = useState({}), mesReps = s2[0], setMesReps = s2[1]; // toutes mes réponses, pour le compteur (Lot 3)

  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses/"+qIdx+"/"+p.eleve.slug).once("value", function(snap){
      setMaRep(snap.val());
    });
  }, [qIdx, sess.id]);

  // Toutes les réponses de l'élève sur la session (Lot 3, compteur)
  useEffect(function(){
    var ref = db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses");
    var cb = ref.on("value", function(snap){
      var all = snap.val() || {};
      var mine = {};
      Object.keys(all).forEach(function(qi){
        if(all[qi] && all[qi][p.eleve.slug]) mine[qi] = all[qi][p.eleve.slug];
      });
      setMesReps(mine);
    });
    return function(){ ref.off("value", cb); };
  }, [sess.id, p.eleve.slug]);

  if(!question){
    return h("div", {className:"eleve-page"},
      ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
      h("div", {className:"eleve-card"},
        h("h1", null, "🎉 Correction terminée"),
        h("p", null, "Tu peux retrouver tes résultats détaillés à la maison.")
      )
    );
  }

  // Calcul juste/faux
  var monChoix = maRep && maRep.choix ? maRep.choix.slice().sort() : null;
  var bonnes = (question.bonnes||[]).slice().sort();
  var nonRepondue = !monChoix || monChoix.length === 0;
  var juste = !nonRepondue && JSON.stringify(monChoix) === JSON.stringify(bonnes);
  var revealed = sess.corrRevealed === true;

  // Compteur progressif (Lot 3)
  var histo = sess.revealedHistory || {};
  var pastilles = ev.questions.map(function(q, i){
    if(!histo[i]) return "—"; // pas encore révélée
    var mr = mesReps[i];
    var mch = mr && mr.choix ? mr.choix.slice().sort() : null;
    var bn = (q.bonnes||[]).slice().sort();
    if(!mch || mch.length===0) return "⚪";
    return JSON.stringify(mch) === JSON.stringify(bn) ? "✅" : "❌";
  });
  var nbRevealed = pastilles.filter(function(x){return x!=="—"}).length;
  var nbJustes = pastilles.filter(function(x){return x==="✅"}).length;

  return h("div", {className:"eleve-page"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"eleve-card"},
      h("div", {className:"eleve-classe-badge"}, p.classe.nom + " · " + p.eleve.nomComplet),
      h("h1", null, "📝 Correction"),
      h("div", {className:"correction-banner-peda"}, "💡 On corrige d'abord les questions les plus ratées par la classe."),
      h("div", {className:"correction-compteur"},
        h("div", {className:"correction-compteur-score"},
          h("span", {className:"correction-compteur-num"}, nbJustes),
          h("span", {className:"correction-compteur-lbl"}, nbJustes>1 ? " bonnes réponses" : " bonne réponse"),
          h("span", {className:"correction-compteur-sep-text"}, " sur "),
          h("span", {className:"correction-compteur-tot"}, nbRevealed),
          h("span", {className:"correction-compteur-lbl"}, nbRevealed>1 ? " questions déjà corrigées" : " question déjà corrigée"),
          h(InfoI, null, "Ton compteur se complète au fur et à mesure que le prof révèle la correction de chaque question. Chaque pastille correspond à une question : verte ✅ si tu avais juste, rouge ❌ si tu avais faux, grise ⚪ si tu n'avais pas répondu. La pastille reste sur le numéro tant que le prof n'a pas révélé la réponse.")
        ),
        h("div", {className:"correction-compteur-pastilles"},
          pastilles.map(function(em, i){
            return h("span", {key:i, className:"correction-compteur-pastille "+(em==="—"?"vide":em==="✅"?"juste":em==="❌"?"faux":"nonrep"), title:"Q"+(i+1)},
              em==="—" ? (i+1) : em
            );
          })
        )
      ),
      h("div", {className:"eleve-q-zone"},
        h("div", {className:"eleve-q-header"},
          h("span", {className:"eleve-q-num"}, "Question "+(qIdx+1)),
          h("span", {className:"eleve-q-pastille", style:{background:getNiveau(question.niveau).color, color:question.niveau==="facile"?"#5C4500":"#fff"}}, getNiveau(question.niveau).label)
        ),
        h("div", {className:"eleve-q-enonce"}, question.enonce),
        revealed && h("div", {className:"correction-resultat "+(nonRepondue?"non-rep":(juste?"juste":"faux"))},
          nonRepondue ? "⚠️ Tu n'as pas répondu à cette question."
            : (juste ? "✅ Tu avais juste !" : "❌ Tu avais faux.")
        ),
        !revealed && h("div", {className:"correction-resultat non-rep", style:{background:"rgba(106,76,224,.08)",color:"var(--violet)",borderColor:"var(--violet)"}}, "👀 Écoute le prof — la correction sera révélée."),
        h("div", {className:"correction-choix"},
          question.choix.map(function(c, i){
            var bon = bonnes.indexOf(i) >= 0;
            var moi = monChoix && monChoix.indexOf(i) >= 0;
            var cls = "correction-choix-item";
            if(revealed){
              if(bon) cls += " bonne";
              else if(moi) cls += " eleve-faux";
              if(moi && bon) cls = "correction-choix-item eleve-juste";
            } else if(moi){
              cls += " eleve-faux"; // neutre : juste pour marquer son choix
            }
            return h("div", {key:i, className:cls},
              h("span", {className:"lettre"}, lettreFromIndex(i)+"."),
              h("span", null,
                c,
                revealed && bon && h("span", {className:"correction-tag tag-bonne"}, "Bonne réponse"),
                moi && (!revealed || !bon) && h("span", {className:"correction-tag tag-tienne"}, "Ta réponse")
              )
            );
          })
        ),
        revealed && h("div", {className:"correction-consigne "+(juste?"juste":"faux")},
          juste
            ? h(React.Fragment, null,
                h("strong", null, "✅ Bravo ! "), "Sur ta feuille, mets simplement un ",
                h("span", {className:"stylo-vert"}, "V vert"),
                " dans la marge à côté de ta réponse."
              )
            : nonRepondue
              ? h(React.Fragment, null,
                  h("strong", null, "Tu n'avais pas répondu. "),
                  "Sur ta feuille, écris la bonne réponse en entier en ",
                  h("span", {className:"stylo-vert"}, "vert"), "."
                )
              : h(React.Fragment, null,
                  h("strong", null, "❌ Tu avais faux. "),
                  h("span", {className:"stylo-rouge"}, "Barre ta réponse en rouge"),
                  " et écris la bonne réponse en entier en ",
                  h("span", {className:"stylo-vert"}, "vert"),
                  " à côté."
                )
        ),
        revealed && question.explication && h("div", {className:"correction-explication"},
          h("div", {className:"correction-explication-titre"}, "💡 Explication"),
          h("div", {className:"correction-explication-texte"}, question.explication)
        )
      )
    )
  );
}

// ─────────── App Test (mode test intégré) ───────────
function AppTest(p){
  var s1 = useState("init"), etat = s1[0], setEtat = s1[1]; // init | ready | exiting
  var s2 = useState(""), erreur = s2[0], setErreur = s2[1];
  var s3 = useState(null), sessionId = s3[0], setSessionId = s3[1];
  var s4 = useState({}), evalsCache = s4[0], setEvalsCache = s4[1]; // pour simulation des réponses
  var s5 = useState(false), qrOpen = s5[0], setQrOpen = s5[1];

  // Cache des évals pour la simulation
  useEffect(function(){
    db.ref(DB_ROOT+"/evaluations").on("value", function(s){ setEvalsCache(s.val()||{}) });
    return function(){ db.ref(DB_ROOT+"/evaluations").off(); };
  }, []);

  // Au montage : nettoyer les sessions test zombies, créer classe test + éval test + lancer la session
  useEffect(function(){
    var sid = "_sess_test_"+Date.now();
    var classeData = {nom:"_TEST", eleves:TEST_ELEVES};
    var evalData = Object.assign({createdAt:Date.now()}, TEST_EVAL);
    var sessData = {classeSlug:TEST_CLASSE_SLUG, evalId:TEST_EVAL_ID, date:Date.now(), phase:"idle", qIdx:null, etat:"en_cours"};

    // 1) Nettoyer toutes les sessions test orphelines accumulées (crashes/reloads précédents)
    db.ref(DB_ROOT+"/sessions").once("value").then(function(snap){
      var sessions = snap.val() || {};
      var cleanups = [];
      Object.keys(sessions).forEach(function(oldSid){
        var os = sessions[oldSid];
        if(os && (os.classeSlug === TEST_CLASSE_SLUG || os.evalId === TEST_EVAL_ID)){
          cleanups.push(db.ref(DB_ROOT+"/sessions/"+oldSid).remove());
        }
      });
      return Promise.all(cleanups);
    }).then(function(){
      // 2) Créer classe + éval + nouvelle session en parallèle
      return Promise.all([
        db.ref(DB_ROOT+"/classes/"+TEST_CLASSE_SLUG).set(classeData),
        db.ref(DB_ROOT+"/evaluations/"+TEST_EVAL_ID).set(evalData),
        db.ref(DB_ROOT+"/sessions/"+sid).set(sessData)
      ]);
    }).then(function(){
      return db.ref(DB_ROOT+"/sessionActive/"+TEST_CLASSE_SLUG).set(sid);
    }).then(function(){
      setSessionId(sid);
      setEtat("ready");
    }).catch(function(err){
      setErreur("Erreur d'initialisation : "+err.message);
    });
  }, []);

  function purgerEtSortir(){
    setEtat("exiting");
    // Supprimer toutes les sessions liées à _test, la classe _test et l'éval _test
    db.ref(DB_ROOT+"/sessions").once("value").then(function(snap){
      var sessions = snap.val() || {};
      var promises = [];
      Object.keys(sessions).forEach(function(sid){
        if(sessions[sid].classeSlug === TEST_CLASSE_SLUG || sessions[sid].evalId === TEST_EVAL_ID){
          promises.push(db.ref(DB_ROOT+"/sessions/"+sid).remove());
        }
      });
      promises.push(db.ref(DB_ROOT+"/sessionActive/"+TEST_CLASSE_SLUG).remove());
      promises.push(db.ref(DB_ROOT+"/classes/"+TEST_CLASSE_SLUG).remove());
      promises.push(db.ref(DB_ROOT+"/evaluations/"+TEST_EVAL_ID).remove());
      promises.push(db.ref(DB_ROOT+"/presence/"+TEST_CLASSE_SLUG).remove());
      return Promise.all(promises);
    }).then(function(){
      p.onExit();
    }).catch(function(err){
      alert("Erreur lors de la purge : "+err.message);
      p.onExit();
    });
  }

  if(etat === "init"){
    return h("div", {className:"prof-wrap"},
      h("div", {className:"prof", style:{textAlign:"center"}},
        h("h2", {style:{color:"var(--violet)"}}, "🧪 Préparation du mode test..."),
        erreur && h("p", {style:{color:"var(--rouge)",fontWeight:700}}, "❌ "+erreur)
      )
    );
  }

  // Simulation : tous les élèves répondent avec un délai aléatoire entre chaque
  // Utile pour reproduire une vraie situation de classe (réponses échelonnées 200-1500ms)
  function simulerReponses(){
    db.ref(DB_ROOT+"/sessionActive/"+TEST_CLASSE_SLUG).once("value", function(snap){
      var sid = snap.val();
      if(!sid){ alert("Aucune session active. Lance d'abord une question."); return; }
      db.ref(DB_ROOT+"/sessions/"+sid).once("value", function(s){
        var sess = s.val();
        if(!sess){ alert("Session introuvable."); return; }

        // Phase AUTOEVAL : chaque élève vote aléatoirement pour une fourchette
        if(sess.phase === "autoeval"){
          var FOURCH = ["vert","bleu","orange","rouge"];
          TEST_ELEVES.forEach(function(e){
            var slug = slugify(e.nomComplet);
            if(sess.autoevals && sess.autoevals[slug]) return; // déjà voté
            var delai = 200 + Math.random()*1300;
            setTimeout(function(){
              db.ref(DB_ROOT+"/sessions/"+sid+"/phase").once("value", function(p){
                if(p.val() !== "autoeval") return;
                var f = FOURCH[Math.floor(Math.random()*FOURCH.length)];
                db.ref(DB_ROOT+"/sessions/"+sid+"/autoevals/"+slug).set(f);
              });
            }, delai);
          });
          return;
        }

        // Phase RÉPONSE : chaque élève répond aléatoirement
        if(sess.phase !== "reponse"){
          alert("La phase doit être « réponse » ou « autoeval » pour simuler. Phase actuelle : "+sess.phase);
          return;
        }
        var qIdx = sess.qIdx;
        if(qIdx == null){ alert("Aucune question en cours."); return; }
        var question = (sess.evalId && evalsCache[sess.evalId] && evalsCache[sess.evalId].questions) ? evalsCache[sess.evalId].questions[qIdx] : null;
        if(!question){ alert("Question introuvable."); return; }
        var nbChoix = (question.choix || []).length;
        TEST_ELEVES.forEach(function(e){
          var slug = slugify(e.nomComplet);
          if(sess.reponses && sess.reponses[qIdx] && sess.reponses[qIdx][slug]) return;
          var delai = 200 + Math.random()*1300;
          setTimeout(function(){
            db.ref(DB_ROOT+"/sessions/"+sid+"/phase").once("value", function(p){
              if(p.val() !== "reponse") return;
              var choixIdx = Math.floor(Math.random()*nbChoix);
              db.ref(DB_ROOT+"/sessions/"+sid+"/reponses/"+qIdx+"/"+slug).set({
                choix:[choixIdx], ts:Date.now()
              });
            });
          }, delai);
        });
      });
    });
  }

  if(etat === "exiting"){
    return h("div", {className:"prof-wrap"},
      h("div", {className:"prof", style:{textAlign:"center"}},
        h("h2", {style:{color:"var(--violet)"}}, "🧹 Purge des données de test...")
      )
    );
  }

  return h("div", {className:"prof-wrap"},
    ["⭐","🎯","✨","💡","🎲","🔥"].map(function(em,i){return h("span",{key:i,className:"deco"},em)}),
    h("div", {className:"prof full"},
      h("div", {className:"prof-header"},
        h("h1", null,
          "🧪 Évaluation QCM",
          h("span", {className:"badge", style:{background:"var(--rose)",color:"#fff"}}, "MODE TEST")
        ),
        h("div", {className:"row"},
          h("button", {className:"btn btn-ghost btn-sm", onClick:function(){
            // Export snapshot complet pour debug : capture l'état Firebase à l'instant T
            db.ref(DB_ROOT).once("value", function(snap){
              var payload = {
                _meta:{source:DB_ROOT, exportedAt:new Date().toISOString(), version:1, contexte:"snapshot mode test (debug)"},
                data:snap.val() || {}
              };
              var blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
              var url = URL.createObjectURL(blob);
              var a = document.createElement("a");
              a.href = url;
              a.download = "qcm_TEST_"+new Date().toISOString().slice(0,16).replace(/[:T]/g,"-")+".json";
              a.click();
              URL.revokeObjectURL(url);
            });
          }, title:"Exporte un snapshot complet de la base de données (incluant la session de test) au format JSON. Utile pour partager l'état exact en cas de bug à investiguer."}, "📥 Exporter snapshot test"),
          h("button", {className:"btn btn-ghost btn-sm", onClick:function(){setQrOpen(true)}, title:"Affiche un QR code à scanner avec ton téléphone pour piloter la session de test à distance. Pour vérifier que la VuePhone fonctionne en mode test."}, "📱 QR pilotage"),
          h("button", {className:"btn btn-rouge btn-sm", onClick:purgerEtSortir, title:"Termine le mode test : supprime la classe _TEST, l'éval test et toutes les sessions associées. Aucune donnée réelle n'est affectée."}, "🗑️ Sortir et purger")
        )
      ),
      h("div", {className:"test-info"},
        h("strong", null, "Environnement de test isolé. "),
        "Classe fictive ("+TEST_ELEVES.length+" élèves simulés), éval test (capitales). Pilote en haut, vois les élèves répondre en bas. Bouton « Tous les élèves répondent » pour simuler une classe réelle. À la sortie, tout est purgé automatiquement."
      ),
      // Pilotage prof en haut
      h("div", {className:"test-prof-zone"},
        h("h2", {className:"test-section-title"}, "🎯 Panneau prof",
          h(InfoI, null, "Le panneau prof complet, exactement comme en classe. Tous les boutons et fonctions sont disponibles : lancer la question, autoriser la réponse, pause, ajuster les chronos, niveaux, etc.")
        ),
        h(OngletPilotageTest)
      ),
      // Bandeau au-dessus des panneaux élèves : titre + bouton de simulation
      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:".5rem",marginTop:".8rem"}},
        h("h2", {className:"test-section-title", style:{margin:0}}, "👥 Panneaux élèves simulés",
          h(InfoI, null, "Les "+TEST_ELEVES.length+" élèves fictifs en simulation. Tu peux cliquer librement dans chaque panneau pour répondre comme si tu étais l'élève. Le pilotage en haut réagit en temps réel.")
        ),
        h("button", {
          className:"btn btn-primary btn-sm",
          onClick:simulerReponses,
          title:"Simule les réponses de TOUS les élèves restants (qui n'ont pas encore répondu ou voté) avec un délai aléatoire entre chaque (200-1500ms), pour reproduire une vraie situation de classe. Fonctionne en phase « réponse » (vote aléatoire parmi les choix de la question) ET en phase « autoeval » (vote aléatoire parmi les 4 fourchettes)."
        }, "🎲 Tous les élèves répondent")
      ),
      h("div", {className:"test-eleves-grid"},
        TEST_ELEVES.map(function(e){
          return h(EleveSimule, {key:e.nomComplet, eleve:{nomComplet:e.nomComplet, slug:slugify(e.nomComplet)}});
        })

    qrOpen && h(OverlayQRPhone, {onClose:function(){setQrOpen(false)}})

}

// ─────────── Variante OngletPilotage qui ne montre que la classe _TEST ───────────
function OngletPilotageTest(){
  var s1 = useState({}), classes = s1[0], setClasses = s1[1];
  var s2 = useState({}), evals = s2[0], setEvals = s2[1];
  var s3 = useState(null), session = s3[0], setSession = s3[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/classes").on("value", function(s){ setClasses(s.val()||{}) });
    db.ref(DB_ROOT+"/evaluations").on("value", function(s){ setEvals(s.val()||{}) });
    db.ref(DB_ROOT+"/sessionActive/"+TEST_CLASSE_SLUG).on("value", function(snap){
      var sid = snap.val();
      if(!sid){ setSession(null); return; }
      db.ref(DB_ROOT+"/sessions/"+sid).on("value", function(s2){
        var sess = s2.val();
        if(sess){ sess.id = sid; setSession(sess); }
      });
    });
    return function(){
      db.ref(DB_ROOT+"/classes").off();
      db.ref(DB_ROOT+"/evaluations").off();
      db.ref(DB_ROOT+"/sessionActive/"+TEST_CLASSE_SLUG).off();
    };
  }, []);

  function terminer(){
    if(!session) return;
    if(!confirm("Recommencer le test ? La session actuelle sera réinitialisée.")) return;
    // Recréer une nouvelle session vierge sur la classe test
    db.ref(DB_ROOT+"/sessions/"+session.id).remove();
    db.ref(DB_ROOT+"/sessionActive/"+TEST_CLASSE_SLUG).remove();
    var sid = "_sess_test_"+Date.now();
    var sessData = {classeSlug:TEST_CLASSE_SLUG, evalId:TEST_EVAL_ID, date:Date.now(), phase:"idle", qIdx:null, etat:"en_cours"};
    db.ref(DB_ROOT+"/sessions/"+sid).set(sessData).then(function(){
      db.ref(DB_ROOT+"/sessionActive/"+TEST_CLASSE_SLUG).set(sid);
    });
  }

  if(!session){
    return h("div", {className:"card"}, h("p", null, "Initialisation de la session test..."));
  }
  var classe = classes[TEST_CLASSE_SLUG];
  var evaluation = evals[TEST_EVAL_ID];
  if(!classe || !evaluation){
    return h("div", {className:"card"}, h("p", null, "Chargement des données test..."));
  }
  return h(SessionLive, {session:session, classe:classe, evaluation:evaluation, onTerminer:terminer});
}

// ─────────── Élève simulé (panneau dans le mode test) ───────────
function EleveSimule(p){
  var s1 = useState(null), session = s1[0], setSession = s1[1];
  var s2 = useState(null), evaluation = s2[0], setEvaluation = s2[1];
  var s3 = useState(null), classe = s3[0], setClasse = s3[1];

  // Annonce de présence (comme un vrai élève connecté)
  useEffect(function(){
    var ref = db.ref(DB_ROOT+"/presence/"+TEST_CLASSE_SLUG+"/"+p.eleve.slug);
    ref.set({nomComplet:p.eleve.nomComplet, last:Date.now()});
    var iv = setInterval(function(){ ref.update({last:Date.now()}); }, 8000);
    ref.onDisconnect().remove();
    return function(){ clearInterval(iv); ref.remove(); };
  }, [p.eleve.slug]);

  // Surveille la session active de la classe test
  useEffect(function(){
    db.ref(DB_ROOT+"/sessionActive/"+TEST_CLASSE_SLUG).on("value", function(snap){
      var sid = snap.val();
      if(!sid){ setSession(null); setEvaluation(null); return; }
      db.ref(DB_ROOT+"/sessions/"+sid).on("value", function(snap2){
        var sess = snap2.val();
        if(!sess) return;
        sess.id = sid;
        setSession(sess);
        if(sess.evalId){
          db.ref(DB_ROOT+"/evaluations/"+sess.evalId).once("value", function(snap3){
            setEvaluation(snap3.val());
          });
        }
      });
    });
    db.ref(DB_ROOT+"/classes/"+TEST_CLASSE_SLUG).once("value").then(function(s){
      setClasse(s.val());
    });
    return function(){ db.ref(DB_ROOT+"/sessionActive/"+TEST_CLASSE_SLUG).off(); };
  }, []);

  if(!session || !evaluation || !classe){
    return h("div", {className:"test-eleve-panel"},
      h("div", {className:"test-eleve-header"}, "👤 "+p.eleve.nomComplet),
      h("div", {style:{padding:"1rem",color:"var(--gris)",textAlign:"center",fontStyle:"italic"}}, "En attente...")
    );
  }

  return h("div", {className:"test-eleve-panel"},
    h("div", {className:"test-eleve-header"}, "👤 "+p.eleve.nomComplet),
    h("div", {className:"test-eleve-content"},
      session.phase === "finie"
        ? h(EleveBilan, {session:session, evaluation:evaluation, eleve:p.eleve, classe:classe})
        : session.phase === "correction"
          ? h(EleveCorrection, {session:session, evaluation:evaluation, eleve:p.eleve, classe:classe})
          : session.phase === "autoeval"
            ? h(EleveAutoeval, {session:session, evaluation:evaluation, eleve:p.eleve, classe:classe})
            : h(EleveEval, {session:session, evaluation:evaluation, eleve:p.eleve, classe:classe, onBack:function(){}})
    )
  );
}

// Garantit qu'aucun contrôle ne peut s'afficher dans cette vue.
// Auto-détecte la session active unique (Paul n'a jamais 2 sessions en parallèle).

// ════════════════════════════════════════════════════════════════════
// VUE TABLEAU (board) — affichage uniquement, pas de pilotage possible.
// Garantit qu'aucun contrôle ne peut s'afficher dans cette vue.
// Auto-détecte la session active unique (Paul n'a jamais 2 sessions en parallèle).

// Aside : liste des élèves côté droit du tableau
// Pour chaque élève : nom en blanc qui clignote brièvement quand il vient de répondre,
// gris s'il n'a pas répondu, gris foncé barré s'il est absent.
function BoardEleves(p){
  var classe = p.classe;
  var session = p.session;
  var qIdx = p.qIdx;
  var repsQ = (session && session.reponses && qIdx != null) ? (session.reponses[qIdx] || {}) : {};
  var absents = (session && session.absents) || [];
  var eleves = (classe && classe.eleves) || [];
  // Tri : ordre alphabétique sur nomComplet
  var elevesTries = eleves.slice().sort(function(a,b){
    return a.nomComplet.localeCompare(b.nomComplet, "fr");
  });
  return h("aside", {className:"board-aside-eleves"},
    h("div", {className:"board-aside-titre"}, "👥 Classe ("+eleves.length+")"),
    h("div", {className:"board-aside-liste"},
      elevesTries.map(function(e){
        var slug = slugify(e.nomComplet);
        var aRepondu = !!repsQ[slug];
        var estAbsent = absents.indexOf(slug) >= 0;
        // Récupère le prénom (premier mot après le NOM en majuscules typiquement, mais on prend tout)
        // Format ED = "NOM Prénom" → on veut le prénom (dernier mot) en gras + nom en plus petit
        var mots = e.nomComplet.split(/\s+/);
        var prenom = mots[mots.length-1];
        var nom = mots.slice(0, -1).join(" ");
        var cls = "board-aside-eleve";
        if(estAbsent) cls += " absent";
        else if(aRepondu) cls += " repondu";
        else cls += " enattente";
        // Clé qui change quand l'élève répond → relance l'animation
        var animKey = aRepondu ? (repsQ[slug].ts || "x") : "0";
        return h("div", {key:slug+"-"+animKey, className:cls},
          h("span", {className:"prenom"}, prenom),
          nom && h("span", {className:"nom"}, nom)
        );
      })
    )
  );
}

function VueBoard(p){
  var s1 = useState(null), session = s1[0], setSession = s1[1];
  var s2 = useState(null), classe = s2[0], setClasse = s2[1];
  var s3 = useState(null), evaluation = s3[0], setEvaluation = s3[1];
  var s4 = useState(0), tick = s4[0], setTick = s4[1];

  // Tick pour rafraîchir le chrono toutes les 250ms
  useEffect(function(){
    var iv = setInterval(function(){ setTick(function(t){return t+1}); }, 250);
    return function(){ clearInterval(iv); };
  }, []);

  // Surveille la session active unique en temps réel
  useEffect(function(){
    var refSessActive = db.ref(DB_ROOT+"/sessionActive");
    var currentSid = null;
    var currentClasseSlug = null;
    var currentEvalId = null;

    function detacherSession(){
      if(currentSid){
        db.ref(DB_ROOT+"/sessions/"+currentSid).off();
        currentSid = null;
      }
      if(currentClasseSlug){
        db.ref(DB_ROOT+"/classes/"+currentClasseSlug).off();
        currentClasseSlug = null;
      }
      if(currentEvalId){
        db.ref(DB_ROOT+"/evaluations/"+currentEvalId).off();
        currentEvalId = null;
      }
    }

    refSessActive.on("value", function(snap){
      var actives = snap.val() || {};
      var slugs = Object.keys(actives);
      // Filtre : on garde seulement les classes pour lesquelles la session existe vraiment et est en cours
      // Comme c'est asynchrone, on doit chercher en parallèle puis sélectionner
      if(slugs.length === 0){
        detacherSession();
        setSession(null); setClasse(null); setEvaluation(null);
        return;
      }
      // Cherche la première session qui existe vraiment et est en cours
      Promise.all(slugs.map(function(slug){
        return db.ref(DB_ROOT+"/sessions/"+actives[slug]).once("value").then(function(s){
          var sess = s.val();
          return (sess && sess.etat === "en_cours") ? {slug:slug, sid:actives[slug], sess:sess} : null;
        }).catch(function(){return null;});
      })).then(function(results){
        var valides = results.filter(function(r){return r});
        if(valides.length === 0){
          detacherSession();
          setSession(null); setClasse(null); setEvaluation(null);
          return;
        }
        // Prend la session la plus récente parmi les valides (au cas où il y en aurait plusieurs)
        valides.sort(function(a,b){return (b.sess.date||0) - (a.sess.date||0);});
        var elu = valides[0];
        var classeSlug = elu.slug;
        var sid = elu.sid;

        if(currentSid !== sid){
          detacherSession();
          currentSid = sid;
          currentClasseSlug = classeSlug;
          // Listener live sur la session
          db.ref(DB_ROOT+"/sessions/"+sid).on("value", function(s){
            var sess = s.val();
            if(!sess){ setSession(null); return; }
            var copy = Object.assign({}, sess, {id: sid});
            setSession(copy);
            if(currentEvalId !== sess.evalId){
              if(currentEvalId) db.ref(DB_ROOT+"/evaluations/"+currentEvalId).off();
              currentEvalId = sess.evalId;
              db.ref(DB_ROOT+"/evaluations/"+sess.evalId).on("value", function(e){
                var v = e.val();
                setEvaluation(v ? Object.assign({}, v) : null);
              });
            }
          });
          // Listener sur la classe
          db.ref(DB_ROOT+"/classes/"+classeSlug).on("value", function(c){
            var v = c.val();
            setClasse(v ? Object.assign({}, v) : null);
          });
        }
      });
    });
    return function(){
      refSessActive.off();
      detacherSession();
    };
  }, []);

  if(!session || !classe || !evaluation){
    return h("div", {className:"board-attente"},
      h("div", {className:"board-titre"}, "📺 Vue tableau"),
      h("div", {className:"board-msg"}, "En attente d'une session active…"),
      h("div", {className:"board-sub"}, "Cette vue se met à jour automatiquement dès qu'une session est lancée depuis le pilotage.")
    );
  }

  var phase = session.phase || "idle";
  var qIdx = session.qIdx;
  var question = (qIdx != null && evaluation.questions) ? evaluation.questions[qIdx] : null;

  // Calcul du chrono restant (commun aux phases reflexion/reponse)
  var resteSec = null;
  if((phase === "reflexion" || phase === "reponse") && session.phaseStart && question){
    var duree = phase === "reflexion"
      ? (getNiveau(question.niveau).chrono || 10)
      : (session.chronoReponse || 5);
    var elapsed = Math.floor((Date.now() - session.phaseStart) / 1000);
    resteSec = Math.max(0, duree - elapsed);
  }

  // Helper : enrobe le contenu principal avec l'aside des élèves (sauf phase idle)
  function withEleves(contenu){
    return h("div", {className:"board-with-aside"},
      h("div", {className:"board-main"}, contenu),
      h(BoardEleves, {classe:classe, session:session, qIdx:qIdx})
    );
  }

  // ─── Phase IDLE / état non couvert : message d'attente sobre ───
  if(phase === "idle" || !question){
    return h("div", {className:"board-active board-idle"},
      h("div", {className:"board-classe"}, classe.nom),
      h("div", {className:"board-titre-eval"}, evaluation.titre),
      h("div", {className:"board-attente-msg"}, "📋 Préparation… La première question va arriver.")
    );
  }

  // ─── Phase RÉFLEXION : énoncé seul, jamais les choix ───
  if(phase === "reflexion"){
    var niv = getNiveau(question.niveau);
    var nbQuestions = evaluation.questions.length;
    return withEleves(h("div", {className:"board-active board-reflexion"},
      h("div", {className:"board-bandeau-haut"},
        h("span", {className:"board-classe-mini"}, classe.nom),
        h("span", {className:"board-niveau-pastille", style:{background:niv.color}}, niv.label),
        h("span", {className:"board-q-count"}, "Question "+(qIdx+1)+" / "+nbQuestions)
      ),
      h("div", {className:"board-enonce-bloc"},
        h("div", {className:"board-enonce"}, question.enonce)
      ),
      h("div", {className:"board-chrono-zone"},
        h("div", {className:"board-chrono-label"},
          h("span", {className:"board-main-anim"}, "✍️"),
          " RÉDIGE TA RÉPONSE EN ENTIER SUR TA FEUILLE"
        ),
        h("div", {className:"board-chrono-cercle"},
          h("svg", {viewBox:"0 0 100 100", className:"board-chrono-svg"},
            h("circle", {cx:50, cy:50, r:46, fill:"none", stroke:"#1E293B", strokeWidth:"6"}),
            h("circle", {cx:50, cy:50, r:46, fill:"none", stroke:niv.color, strokeWidth:"6",
              strokeDasharray:"289",
              strokeDashoffset: 289 * (1 - (resteSec / (niv.chrono || 10))),
              transform:"rotate(-90 50 50)",
              style:{transition:"stroke-dashoffset .25s linear"}})
          ),
          h("div", {className:"board-chrono-texte"}, resteSec != null ? resteSec+"s" : "—")
        ),
        h("div", {className:"board-chrono-sub"}, "Les choix de réponse n'apparaîtront qu'après la réflexion. Note ta réponse en toutes lettres sur ta copie.")
      )
    ));
  }

  // ─── Phase RÉPONSE : énoncé compact + 4 choix lisibles + chrono ───
  if(phase === "reponse"){
    var nivR = getNiveau(question.niveau);
    var nbQuestionsR = evaluation.questions.length;
    // Compteur d'élèves ayant répondu
    var nbEleves = (classe.eleves || []).length;
    var nbAbsents = (session.absents || []).length;
    var nbAttendu = Math.max(0, nbEleves - nbAbsents);
    var repsQ = (session.reponses && session.reponses[qIdx]) || {};
    var nbReponses = Object.keys(repsQ).length;
    var dureeR = session.chronoReponse || 5;
    return withEleves(h("div", {className:"board-active board-reponse"},
      h("div", {className:"board-bandeau-haut"},
        h("span", {className:"board-classe-mini"}, classe.nom),
        h("span", {className:"board-niveau-pastille", style:{background:nivR.color}}, nivR.label),
        h("span", {className:"board-q-count"}, "Question "+(qIdx+1)+" / "+nbQuestionsR),
        h("span", {className:"board-progress"}, "✋ "+nbReponses+" / "+nbAttendu+" ont répondu")
      ),

      h("div", {className:"board-choix-grille"},
        (question.choix || []).map(function(c, i){
          return h("div", {key:i, className:"board-choix-item"},
            h("span", {className:"board-choix-lettre"}, lettreFromIndex(i)),
            h("span", {className:"board-choix-texte"}, c)
          );
        })
      ),
      h("div", {className:"board-reponse-chrono"},
        h("svg", {viewBox:"0 0 100 100", className:"board-chrono-svg-petit"},
          h("circle", {cx:50, cy:50, r:46, fill:"none", stroke:"#1E293B", strokeWidth:"6"}),
          h("circle", {cx:50, cy:50, r:46, fill:"none", stroke:"#EC4899", strokeWidth:"6",
            strokeDasharray:"289",
            strokeDashoffset: 289 * (1 - (resteSec / dureeR)),

        ),

      )

  }

  // ─── Phase ATTENTE : animation ASMR calme + message neutre ───
  if(phase === "attente"){
    var nivA = getNiveau(question.niveau);
    var nbQuestionsA = evaluation.questions.length;
    var nbElevesA = (classe.eleves || []).length;
    var nbAbsentsA = (session.absents || []).length;
    var nbAttenduA = Math.max(0, nbElevesA - nbAbsentsA);

          h("path", {d:"M0,100 Q300,160 600,100 T1200,100", fill:"none", stroke:"rgba(236,72,153,.14)", strokeWidth:"2"})
        ),

          [0,1,2,3,4,5,6,7].map(function(i){
            return h("span", {key:i, className:"board-particule particule-"+i});
          })
        ),
        // Bande lumineuse qui glisse
        h("div", {className:"board-bande"}),
        // Orbe central qui pulse
        h("div", {className:"board-orbe-wrap"},
          h("div", {className:"board-orbe board-orbe-3"}),
          h("div", {className:"board-orbe board-orbe-2"}),
          h("div", {className:"board-orbe board-orbe-1"})
        )
      ),
      // Message en bas
      h("div", {className:"board-attente-bas"},
        h("div", {className:"board-attente-titre"}, "📋 Question close"),
        h("div", {className:"board-attente-sub"}, "Les réponses sont enregistrées — la suite arrive.")
      )
    ));
  }

  // ─── Phase CORRECTION : énoncé + choix avec bonnes réponses mises en évidence ───
  // Note : le revealing animé sera développé en Lot 2. Ici, affichage statique.
  if(phase === "correction"){
    var nivC = getNiveau(question.niveau);
    var nbQuestionsC = evaluation.questions.length;
    var bonnes = (question.bonnes || []);
    var revealedB = session.corrRevealed === true;
    return withEleves(h("div", {className:"board-active board-correction"},
      h("div", {className:"board-bandeau-haut"},

      ),

      ),
      h("div", {className:"board-reponse-enonce"}, question.enonce),
      h("div", {className:"board-choix-grille"},
        (question.choix || []).map(function(c, i){
