          );
        })
      ),
      h("div", {className:"board-correction-bas"},
        revealedB
          ? h("span", null, "✅ Bonne"+(bonnes.length>1?"s":"")+" réponse"+(bonnes.length>1?"s":"")+" : "+bonnes.map(function(i){return lettreFromIndex(i)}).join(", "))
          : h("span", {style:{color:"#FFD23F"}}, "💡 Écoute l'explication — la réponse va être révélée.")
      ),
      revealedB && question.explication && h("div", {className:"board-explication"},
        h("div", {className:"board-explication-titre"}, "💡 Explication"),
        h("div", {className:"board-explication-texte"}, question.explication)
      )
    ));
  }

  // Phase AUTOEVAL : grand écran de prompt pour les élèves + compteur de votes
  if(phase === "autoeval"){
    var aevB = session.autoevals || {};
    var nbAuto = Object.keys(aevB).length;
    var nbTotB = evaluation.questions.length;
    var maxPB = calculerMaxPondere(evaluation.questions);
    var distribB = {vert:0, bleu:0, orange:0, rouge:0};
    Object.values(aevB).forEach(function(v){ if(distribB[v]!=null) distribB[v]++; });
    var bV = bornesFourchette("vert", nbTotB);
    var bBl = bornesFourchette("bleu", nbTotB);
    var bOr = bornesFourchette("orange", nbTotB);
    var bRo = bornesFourchette("rouge", nbTotB);
    function fmtBornes(b){
      if(b.inf === b.sup) return b.inf+"";
      return b.inf+"–"+b.sup;
    }
    return withEleves(h("div", {className:"board-active board-autoeval"},
      h("div", {className:"board-autoeval-titre"}, "🎯 Votre estimation"),
      h("div", {className:"board-autoeval-consigne"}, "Combien de bonnes réponses pensez-vous avoir données sur "+nbTotB+" ?"),
      h("div", {className:"board-autoeval-compteur"}, "✋ ", h("strong", null, nbAuto), " élève"+(nbAuto>1?"s ont":" a")+" voté"),
      h("div", {className:"board-autoeval-distrib"},
        h("div", {className:"board-autoeval-cell fourchette-vert"}, h("div", {className:"board-autoeval-emoji"}, "🟢"), h("strong", null, distribB.vert), h("span", null, fmtBornes(bV)+" bonnes")),
        h("div", {className:"board-autoeval-cell fourchette-bleu"}, h("div", {className:"board-autoeval-emoji"}, "🔵"), h("strong", null, distribB.bleu), h("span", null, fmtBornes(bBl)+" bonnes")),
        h("div", {className:"board-autoeval-cell fourchette-orange"}, h("div", {className:"board-autoeval-emoji"}, "🟠"), h("strong", null, distribB.orange), h("span", null, fmtBornes(bOr)+" bonnes")),
        h("div", {className:"board-autoeval-cell fourchette-rouge"}, h("div", {className:"board-autoeval-emoji"}, "🔴"), h("strong", null, distribB.rouge), h("span", null, fmtBornes(bRo)+" bonnes"))
      )
    ));
  }

  // Phase FINIE : récap classe pour projection
  if(phase === "finie"){
    return withEleves(h("div", {className:"board-active board-finie"},
      h("div", {className:"board-finie-emoji"}, "🏁"),
      h("div", {className:"board-finie-titre"}, "Session terminée"),
      h("div", {className:"board-finie-sub"}, classe.nom + " — " + evaluation.titre),
      h("div", {className:"board-finie-msg"}, "Les élèves consultent leur bilan personnel sur leur téléphone.")
    ));
  }

  // Placeholder pour phase non couverte (sécurité)
  return h("div", {className:"board-active"},
    h("div", {className:"board-classe"}, classe.nom+" — "+evaluation.titre),
    h("div", {className:"board-phase"}, "Phase : "+phase+" — Q"+(qIdx != null ? (qIdx+1) : "—")),
    h("div", {style:{marginTop:"2rem",fontSize:"1.2rem",color:"#94A3B8"}}, "(En cours de développement — phase non encore implémentée pour la vue tableau)")
  );
}

// OVERLAY QR PHONE — modale avec QR code, fermeture auto au scan
// ════════════════════════════════════════════════════════════════════
function OverlayQRPhone(p){
  var s1 = useState(function(){
    return "qr_"+Date.now()+"_"+Math.random().toString(36).substr(2,6);
  }), nonce = s1[0];
  var url = window.location.origin + window.location.pathname + "?mode=prof&view=phone&qr=" + nonce;
  var qrImgUrl = "https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=10&data=" + encodeURIComponent(url);

  useEffect(function(){
    // Écoute du scan : VuePhone écrira dans qrScans/{nonce} à son montage
    var ref = db.ref(DB_ROOT+"/qrScans/"+nonce);
    ref.on("value", function(snap){
      if(snap.val()){
        ref.off();
        ref.remove();
        p.onClose();
      }
    });
    return function(){ ref.off(); ref.remove(); };
  }, []);

  return h("div", {className:"modal-back", onClick:function(e){if(e.target.className==="modal-back")p.onClose()}},
    h("div", {className:"modal", style:{maxWidth:"420px",textAlign:"center"}},
      h("button", {className:"modal-close", onClick:p.onClose}, "✕"),
      h("h2", null, "📱 Pilotage mobile"),
      h("p", {style:{marginBottom:"1rem",fontSize:".9rem",color:"var(--gris)"}}, "Scanne avec ton téléphone. La fenêtre se ferme automatiquement."),
      h("img", {src:qrImgUrl, alt:"QR code", style:{display:"block",margin:"0 auto",borderRadius:"8px",width:"280px",height:"280px",background:"#fff"}}),
      h("div", {style:{marginTop:"1rem",fontSize:".7rem",color:"var(--gris)",wordBreak:"break-all",fontFamily:"monospace"}}, url)
    )
  );
}

function VuePhone(p){
  // Au montage : si l'URL contient ?qr=NONCE, écrire dans Firebase pour fermer la modale côté ordi
  useEffect(function(){
    var params = new URLSearchParams(window.location.search);
    var qr = params.get("qr");
    if(qr){
      db.ref(DB_ROOT+"/qrScans/"+qr).set(firebase.database.ServerValue.TIMESTAMP);
    }
  }, []);

  // Lire toutes les données nécessaires depuis Firebase
  var s1 = useState({}), classes = s1[0], setClasses = s1[1];
  var s2 = useState({}), evals = s2[0], setEvals = s2[1];
  var s3 = useState({}), sessions = s3[0], setSessions = s3[1];
  var s4 = useState({}), sessionActive = s4[0], setSessionActive = s4[1];
  var st = useState(0), tick = st[0], setTick = st[1]; // tick chrono (B-ii)

  useEffect(function(){
    db.ref(DB_ROOT+"/classes").on("value", function(s){ setClasses(s.val()||{}); });
    db.ref(DB_ROOT+"/evaluations").on("value", function(s){ setEvals(s.val()||{}); });
    db.ref(DB_ROOT+"/sessions").on("value", function(s){ setSessions(s.val()||{}); });
    db.ref(DB_ROOT+"/sessionActive").on("value", function(s){ setSessionActive(s.val()||{}); });
    return function(){
      db.ref(DB_ROOT+"/classes").off();
      db.ref(DB_ROOT+"/evaluations").off();
      db.ref(DB_ROOT+"/sessions").off();
      db.ref(DB_ROOT+"/sessionActive").off();
    };
  }, []);

  // Tick chaque seconde pour rafraîchir l'affichage du chrono (B-ii)
  useEffect(function(){
    var id = setInterval(function(){ setTick(function(t){ return t+1; }); }, 1000);
    return function(){ clearInterval(id); };
  }, []);

  // Trouver la session active (la plus récente s'il y en a plusieurs)
  var activeSession = null;
  var activeClasseSlug = null;
  Object.keys(sessionActive).forEach(function(slug){
    var sid = sessionActive[slug];
    if(!sid || !sessions[sid]) return;
    var sess = Object.assign({id:sid}, sessions[sid]);
    if(sess.lastDisconnect && !sess.repriseConfirmee) return; // ignorer interrompue
    if(!activeSession || (sess.phaseStart||0) > (activeSession.phaseStart||0)){

      h("div", {style:{fontSize:"3rem",marginBottom:"1rem"}}, "📱"),

      (classe.eleves||[]).slice().sort(function(a,b){return (a.nomComplet||"").localeCompare(b.nomComplet||"")}).map(function(el){

          h("span", {style:{textDecoration:absent?"line-through":"none"}}, el.nomComplet),

// ─────────── Onglet Classes ───────────
function OngletClasses(){
  var s1 = useState({}), classes = s1[0], setClasses = s1[1];
  var s2 = useState(""), nomClasse = s2[0], setNomClasse = s2[1];
  var s3 = useState(""), texteListe = s3[0], setTexteListe = s3[1];
  var s4 = useState(""), classeEdit = s4[0], setClasseEdit = s4[1];
  var s5 = useState(""), niveauClasse = s5[0], setNiveauClasse = s5[1];
  var s6 = useState(""), expandSexe = s6[0], setExpandSexe = s6[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/classes").on("value", function(snap){
      setClasses(snap.val() || {});
    });
    return function(){ db.ref(DB_ROOT+"/classes").off(); };
  }, []);

  // Pré-remplissage automatique du niveau à partir du nom (regex sur 6e/5e/4e/3e)
  function deduireNiveauDuNom(nom){
    var m = nom.match(/\b([3-6])\s*[eèEÈ]\b/);
    if(m) return m[1]+"e";
    return "";
  }
  function onChangeNomClasse(v){
    setNomClasse(v);
    if(!niveauClasse){
      var n = deduireNiveauDuNom(v);
      if(n) setNiveauClasse(n);
    }
  }

  // Mise à jour du sexe d'un élève sur place dans Firebase
  function setSexeEleve(slug, eleveIdx, nouveauSexe){
    var classe = classes[slug];
    if(!classe || !classe.eleves || !classe.eleves[eleveIdx]) return;
    var path = DB_ROOT+"/classes/"+slug+"/eleves/"+eleveIdx+"/sexe";
    if(nouveauSexe === "" || nouveauSexe == null){
      db.ref(path).remove();
    } else {
      db.ref(path).set(nouveauSexe);
    }
  }

  function ajouterClasse(){
    var nom = nomClasse.trim();
    var elevesNouveaux = parseListe(texteListe);
    if(!nom){ alert("Nom de classe requis"); return; }
    if(!elevesNouveaux.length){ alert("Au moins un élève requis"); return; }
    if(!niveauClasse){ alert("Niveau de classe requis (6e, 5e, 4e ou 3e)"); return; }
    var slug = slugify(nom);
    // Si édition, préserver les sexes déjà saisis pour les élèves dont le nomComplet correspond
    var ancienne = classes[slug];
    if(ancienne && ancienne.eleves){
      var indexAncienne = {};
      ancienne.eleves.forEach(function(e){
        if(e.sexe) indexAncienne[e.nomComplet] = e.sexe;
      });
      elevesNouveaux.forEach(function(e){
        // Priorité à l'ancienne valeur (saisie manuelle), pré-remplissage seulement si rien
        if(indexAncienne[e.nomComplet]) e.sexe = indexAncienne[e.nomComplet];
      });
    }
    db.ref(DB_ROOT+"/classes/"+slug).set({nom:nom, eleves:elevesNouveaux, niveau:niveauClasse}, function(err){
      if(err){ alert("Erreur: "+err.message); return; }
      setNomClasse(""); setTexteListe(""); setClasseEdit(""); setNiveauClasse("");
    });
  }

  function supprimer(slug){
    if(!confirm("Supprimer la classe « "+classes[slug].nom+" » ?")) return;
    db.ref(DB_ROOT+"/classes/"+slug).remove();
  }

  function chargerPourEdition(slug){
    var c = classes[slug];
    if(!c) return;
    setClasseEdit(slug);
    setNomClasse(c.nom);
    setNiveauClasse(c.niveau || deduireNiveauDuNom(c.nom) || "");
    setTexteListe((c.eleves||[]).map(eleveToString).join("\n"));
    window.scrollTo({top:document.body.scrollHeight, behavior:"smooth"});
  }

  var arr = Object.keys(classes).filter(function(k){return k.charAt(0) !== "_"}).map(function(k){return Object.assign({slug:k}, classes[k])});

  return h("div", null,
    h("div", {className:"card"},
      h("h2", null, "Classes existantes",
        h(InfoI, null, "Les classes sont la base de tout. Une classe regroupe les élèves qui passeront ensemble les évaluations. Les noms saisis ici servent à identifier l'élève (par fuzzy matching) quand il se connecte côté élève.")
      ),
      arr.length === 0
        ? h("p", {style:{color:"var(--gris)",fontStyle:"italic"}}, "Aucune classe pour l'instant.")
        : arr.map(function(c){
            var nbSansSexe = (c.eleves||[]).filter(function(e){return !e.sexe}).length;
            return h("div", {key:c.slug, className:"classe-block"},
              h("div", {className:"classe-row"},
                h("div", {className:"classe-info"},
                  h("strong", null, c.nom),
                  c.niveau && h("a", {
                    className:"classe-niveau-badge",
                    href:urlProfilClasseMJPC(c.slug),
                    target:"_blank",
                    rel:"noopener noreferrer",
                    title:"Niveau "+c.niveau+". Clique pour ouvrir le profil longitudinal de la classe sur monsieurjaipascompris (suivi des résultats sur toute l'année, agrégation des évaluations QCM passées, comparaison aux autres classes du même niveau). Cette page n'est pas encore créée — le branchement est préparé."
                  }, c.niveau),

function OngletEvals(){
  var s1 = useState({}), evals = s1[0], setEvals = s1[1];
  var s2 = useState(false), showCreate = s2[0], setShowCreate = s2[1];
  var s3 = useState(null), editId = s3[0], setEditId = s3[1];
  var s4 = useState(false), showPrompt = s4[0], setShowPrompt = s4[1];
  var s5 = useState(null), printEval = s5[0], setPrintEval = s5[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/evaluations").on("value", function(snap){
      setEvals(snap.val() || {});
    });
    return function(){ db.ref(DB_ROOT+"/evaluations").off(); };
  }, []);

  function dupliquer(id){
    var src = evals[id];
    if(!src) return;
    var newId = "eval_" + Date.now();
    var copy = Object.assign({}, src);
    copy.titre = src.titre + " (copie)";
    copy.createdAt = Date.now();
    db.ref(DB_ROOT+"/evaluations/"+newId).set(copy);
  }

  function supprimer(id){
    if(!confirm("Supprimer l'évaluation « "+evals[id].titre+" » ?")) return;
    db.ref(DB_ROOT+"/evaluations/"+id).remove();
  }

  function copyPrompt(){
    // Méthode robuste compatible tous navigateurs et contextes HTTP/HTTPS
    var ta = document.createElement("textarea");
    ta.value = PROMPT_IA;
    ta.style.position = "fixed";
    ta.style.top = "0";
    ta.style.left = "0";
    ta.style.opacity = "0";
    ta.style.pointerEvents = "none";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    var ok = false;
    try{
      ok = document.execCommand("copy");
    }catch(e){ ok = false; }
    document.body.removeChild(ta);
    // Tenter aussi navigator.clipboard si dispo (en parallèle, pas bloquant)
    if(navigator.clipboard && navigator.clipboard.writeText){
      try{ navigator.clipboard.writeText(PROMPT_IA); }catch(e){}
    }
    if(ok){
      alert("✅ Prompt copié. Colle-le dans une nouvelle conversation Claude.");
    } else {
      alert("⚠️ Copie automatique impossible. Sélectionne le texte du prompt ci-dessous et copie-le manuellement (Ctrl+C).");
    }

        ),
        h("div", {className:"row"},
          h("button", {className:"btn btn-or btn-sm", onClick:function(){setShowPrompt(true)}}, "🤖 Prompt IA",
            h(InfoI, null, "Ouvre la modale du prompt IA. Tu peux copier ce prompt (prêt à coller dans Claude ou une autre IA pour qu'elle te génère ton QCM au format JSON attendu) ou modifier le prompt selon tes besoins (tes modifications sont enregistrées et réutilisées). Le prompt par défaut demande à l'IA combien de questions, combien à réponses multiples, des énoncés autonomes et une explication par question.")
          ),
          h("button", {className:"btn btn-primary btn-sm", onClick:function(){setEditId(null);setShowCreate(true)}, title:"Créer une nouvelle évaluation. Tu colles un JSON (généré par l'IA via le bouton Prompt IA) et l'app parse automatiquement les questions, choix, bonnes réponses et niveaux."}, "➕ Nouvelle évaluation")
        )
      ),
      arr.length === 0
        ? h("p", {style:{color:"var(--gris)",fontStyle:"italic",marginTop:".8rem"}}, "Aucune évaluation pour l'instant.")
        : h("div", {style:{marginTop:".8rem"}},
            arr.map(function(e){
              return h("div", {key:e.id, className:"eval-row"},
                h("div", null,
                  h("div", {className:"eval-titre"}, e.titre),
                  h("div", {className:"eval-meta"},
                    h("span", null, (e.questions||[]).length+" question"+((e.questions||[]).length>1?"s":"")),
                    h("span", null, "Créée le "+new Date(e.createdAt||0).toLocaleDateString("fr-FR"))
                  )
                ),
                h("div", {className:"eval-actions"},
                  h("button", {className:"btn btn-sm btn-ghost", onClick:function(){setEditId(e.id);setShowCreate(true)}, title:"Modifier le titre, les questions, les choix ou le niveau de difficulté."}, "✏️ Modifier"),
                  h("button", {className:"btn btn-sm btn-ghost", onClick:function(){setPrintEval(e)}, title:"Générer la feuille A4 papier (énoncés + cadres de rédaction + lettres des choix sans contenu, à compléter à la main par l'élève)."}, "🖨️ Imprimer"),
                  h("button", {className:"btn btn-sm btn-ghost", onClick:function(){dupliquer(e.id)}, title:"Créer une copie modifiable. Pratique pour adapter une éval à un autre niveau ou faire des variantes."}, "📋 Dupliquer"),
                  h("button", {className:"btn btn-sm btn-rouge", onClick:function(){supprimer(e.id)}, title:"Supprimer définitivement l'évaluation. Les sessions passées qui l'utilisaient ne pourront plus être consultées."}, "🗑️")
                )
              );
            })
          )
    ),
    showCreate && h(ModalCreerEval, {
      editId:editId,
      evaluation:editId ? evals[editId] : null,
      onClose:function(){setShowCreate(false);setEditId(null)}
    }),
    showPrompt && h(ModalPromptIA, {onClose:function(){setShowPrompt(false)}, onCopy:copyPrompt})
  );

// ─────────── Modal Prompt IA ───────────
function ModalPromptIA(p){
  var s1 = useState(PROMPT_IA), prompt = s1[0], setPrompt = s1[1];
  var s2 = useState(false), editing = s2[0], setEditing = s2[1];
  var s3 = useState(PROMPT_IA), draft = s3[0], setDraft = s3[1];
  var s4 = useState(""), msg = s4[0], setMsg = s4[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/settings/promptIa").once("value", function(snap){
      var v = snap.val();
      if(v){ setPrompt(v); setDraft(v); PROMPT_IA = v; }
    });
  }, []);

  function copier(){
    try{
      navigator.clipboard.writeText(prompt);
      setMsg("✅ Prompt copié dans le presse-papiers");
      setTimeout(function(){setMsg("")}, 2500);
    }catch(e){
      setMsg("⚠️ Copie automatique impossible. Sélectionne le texte et copie manuellement.");
    }
  }
  function ouvrirEdition(){
    setDraft(prompt);
    setEditing(true);
    setMsg("");
  }
  function enregistrer(){
    db.ref(DB_ROOT+"/settings/promptIa").set(draft, function(err){
      if(err){ setMsg("❌ Erreur: "+err.message); return; }
      setPrompt(draft);
      PROMPT_IA = draft;
      setEditing(false);
      setMsg("✅ Prompt enregistré. Il sera réutilisé la prochaine fois.");
      setTimeout(function(){setMsg("")}, 3000);
    });
  }
  function restaurerDefaut(){
    if(!confirm("Restaurer le prompt par défaut ? Tes modifications actuelles seront perdues (le prompt enregistré dans Firebase sera écrasé après ton clic sur « Enregistrer »).")) return;
    setDraft(PROMPT_IA_DEFAUT);
  }
  function annuler(){
    setDraft(prompt);
    setEditing(false);
    setMsg("");
  }

  return h("div", {className:"modal-back", onClick:function(e){if(e.target.className==="modal-back")p.onClose()}},
    h("div", {className:"modal", style:{maxWidth:"720px"}},
      h("button", {className:"modal-close", onClick:p.onClose}, "✕"),
      h("h2", null, "🤖 Prompt à coller dans une IA",
        h(InfoI, null, "Ce prompt guide l'IA pour qu'elle te génère un QCM dans le format attendu par l'app. Tu peux le modifier (bouton « ✏️ Modifier ») pour l'adapter à tes besoins. Tes modifications sont enregistrées dans Firebase et réutilisées à chaque ouverture.")
      ),
      h("p", {style:{fontSize:".9rem",color:"var(--gris)",marginBottom:".8rem"}},
        "Copie ce prompt et colle-le dans une nouvelle conversation Claude. L'IA te générera un QCM au format JSON que tu pourras coller directement dans le champ « Nouvelle évaluation »."
      ),
      !editing && h("div", {className:"row", style:{gap:".5rem",flexWrap:"wrap"}},
        h("button", {className:"btn btn-primary", onClick:copier, title:"Copie le prompt actuel dans le presse-papiers."}, "📋 Copier le prompt"),
        h("button", {className:"btn btn-ghost", onClick:ouvrirEdition, title:"Ouvre l'éditeur pour modifier le prompt. Les modifications sont enregistrées dans Firebase et réutilisées la prochaine fois."}, "✏️ Modifier le prompt")
      ),
      editing && h("div", null,
        h("textarea", {value:draft, onChange:function(e){setDraft(e.target.value)}, style:{width:"100%",minHeight:"320px",fontFamily:"ui-monospace,monospace",fontSize:".85rem",padding:".7rem",border:"2px solid var(--violet)",borderRadius:"8px"}}),
        h("div", {className:"row", style:{gap:".5rem",flexWrap:"wrap",marginTop:".7rem"}},
          h("button", {className:"btn btn-primary", onClick:enregistrer, title:"Enregistre ce prompt dans Firebase. Il sera réutilisé à chaque ouverture du modal, sur tous les appareils."}, "💾 Enregistrer"),
          h("button", {className:"btn btn-ghost", onClick:annuler, title:"Annule les modifications et revient au prompt enregistré."}, "↩️ Annuler"),
          h("button", {className:"btn btn-ghost", onClick:restaurerDefaut, title:"Remplace le brouillon par le prompt fourni par défaut avec l'app. Tu pourras ensuite cliquer sur « Enregistrer » pour le rendre actif."}, "🔄 Restaurer le prompt par défaut")
        )
      ),
      msg && h("div", {style:{marginTop:".7rem",padding:".5rem .8rem",borderRadius:"8px",background:msg.startsWith("✅")?"#E8F6EE":msg.startsWith("❌")?"#FFF4F4":"#FFF4EC",color:"var(--noir)",fontSize:".9rem",fontWeight:"600"}}, msg),
      !editing && h("div", {className:"codeblock", style:{marginTop:".8rem"}}, prompt)
    )
  );
}

// ─────────── Modal Création / Édition d'évaluation ───────────
function ModalCreerEval(p){
  var s1 = useState(p.evaluation ? JSON.stringify({titre:p.evaluation.titre, questions:p.evaluation.questions}, null, 2) : ""), texte = s1[0], setTexte = s1[1];
  var s2 = useState(p.evaluation ? {titre:p.evaluation.titre, questions:p.evaluation.questions} : null), parsed = s2[0], setParsed = s2[1];
  var s3 = useState(""), parseErr = s3[0], setParseErr = s3[1];

  function tryParse(){
    setParseErr("");
    var r = parseEvaluation(texte);
    if(r.error){ setParseErr(r.error); setParsed(null); return; }
    setParsed(r);
  }

  // Auto-parse à l'ouverture si on édite
  useEffect(function(){
    if(texte && !parsed) tryParse();
  }, []);

  function changerNiveau(qIndex, nivId){
    if(!parsed) return;
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    copy.questions[qIndex] = Object.assign({}, copy.questions[qIndex], {niveau:nivId});
    setParsed(copy);
    setTexte(JSON.stringify({titre:copy.titre, questions:copy.questions}, null, 2));
  }
  function mettreAJour(newParsed){
    setParsed(newParsed);
    setTexte(JSON.stringify({titre:newParsed.titre, questions:newParsed.questions}, null, 2));
    setParseErr("");
  }

  function enregistrer(){
    if(!parsed){ alert("Aucune évaluation valide à enregistrer. Clique sur 'Vérifier le format' d'abord."); return; }
    var id = p.editId || ("eval_" + Date.now());
    var data = {
      titre: parsed.titre,
      questions: parsed.questions,
      createdAt: p.evaluation && p.evaluation.createdAt ? p.evaluation.createdAt : Date.now(),
      updatedAt: Date.now()
    };
    db.ref(DB_ROOT+"/evaluations/"+id).set(data, function(err){
      if(err){ alert("Erreur: "+err.message); return; }
      p.onClose();
    });
  }

  return h("div", {className:"modal-back", onClick:function(e){if(e.target.className==="modal-back")p.onClose()}},
    h("div", {className:"modal"},
      h("button", {className:"modal-close", onClick:p.onClose}, "✕"),
      h("h2", null, p.editId ? "✏️ Modifier l'évaluation" : "➕ Nouvelle évaluation"),
      h("div", {className:"field"},
        h("label", null,
          "Coller le JSON de l'évaluation",
          h(InfoI, null, "Colle ici le JSON généré par l'IA (utilise le bouton « Prompt IA » pour obtenir le format attendu). Tu peux aussi écrire le JSON à la main.")
        ),
        h("textarea", {className:"json", value:texte, onChange:function(e){setTexte(e.target.value)}, placeholder:'{\n  "titre": "Mon évaluation",\n  "questions": [\n    {"enonce":"...","choix":[...],"bonnes":[0],"niveau":"standard"}\n  ]\n}'})
      ),
      h("div", {className:"row"},
        h("button", {className:"btn btn-ghost", onClick:tryParse, title:"Parse le JSON ci-dessus et l'affiche en mode éditable ci-dessous."}, "🔍 Vérifier le format"),
        !parsed && h("button", {className:"btn btn-ghost", onClick:function(){
          var blank = {titre:"Nouvelle évaluation", questions:[{enonce:"", choix:["", ""], bonnes:[], niveau:"standard", explication:""}]};
          mettreAJour(blank);
        }, title:"Crée une évaluation vide pour la construire directement dans l'éditeur visuel ci-dessous (sans passer par l'IA)."}, "✨ Démarrer à blanc")
      ),
      parseErr && h("div", {className:"preview-error"}, "❌ "+parseErr),
      parsed && h(PreviewEval, {parsed:parsed, onChangerNiveau:changerNiveau, onUpdate:mettreAJour}),
      parsed && h("div", {className:"row", style:{marginTop:"1rem"}},
        h("button", {className:"btn btn-primary", onClick:enregistrer}, "💾 Enregistrer l'évaluation")
      )
    )
  );
}

// ─────────── Preview évaluation (éditable in-place) ───────────
function PreviewEval(p){
  var parsed = p.parsed;
  function commit(copy){ p.onUpdate ? p.onUpdate(copy) : null; }
  function modifTitre(v){ commit(Object.assign({}, parsed, {titre:v})); }
  function modifQ(qi, modif){
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    copy.questions[qi] = Object.assign({}, copy.questions[qi], modif);
    commit(copy);
  }
  function modifChoix(qi, ci, val){
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var q = Object.assign({}, copy.questions[qi]);
    q.choix = q.choix.slice();
    q.choix[ci] = val;
    copy.questions[qi] = q;
    commit(copy);
  }
  function toggleBonne(qi, ci){
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var q = Object.assign({}, copy.questions[qi]);
    var bonnes = (q.bonnes || []).slice();
    var idx = bonnes.indexOf(ci);
    if(idx >= 0) bonnes.splice(idx, 1);
    else bonnes.push(ci);
    bonnes.sort(function(a,b){return a-b});
    q.bonnes = bonnes;
    copy.questions[qi] = q;
    commit(copy);
  }
  function ajouterChoix(qi){
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var q = Object.assign({}, copy.questions[qi]);
    q.choix = (q.choix || []).slice();
    q.choix.push("");
    copy.questions[qi] = q;
    commit(copy);
  }
  function suppChoix(qi, ci){
    if((parsed.questions[qi].choix || []).length <= 2){ alert("Au moins 2 choix obligatoires par question."); return; }
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var q = Object.assign({}, copy.questions[qi]);
    q.choix = q.choix.slice();
    q.choix.splice(ci, 1);
    q.bonnes = (q.bonnes || []).filter(function(x){return x !== ci}).map(function(x){return x > ci ? x-1 : x});
    copy.questions[qi] = q;
    commit(copy);
  }
  function suppQ(qi){
    if(!confirm("Supprimer la question Q"+(qi+1)+" ? Cette action ne peut pas être annulée (sauf si tu n'enregistres pas l'évaluation).")) return;
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    copy.questions.splice(qi, 1);
    commit(copy);
  }
  function ajouterQ(){
    var copy = Object.assign({}, parsed);
    copy.questions = (copy.questions || []).slice();
    copy.questions.push({enonce:"", choix:["", ""], bonnes:[], niveau:"standard", explication:""});
    commit(copy);
  }
  function deplacerQ(qi, dir){
    var nv = qi + dir;
    if(nv < 0 || nv >= parsed.questions.length) return;
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var tmp = copy.questions[nv];
    copy.questions[nv] = copy.questions[qi];
    copy.questions[qi] = tmp;
    commit(copy);
  }

  return h("div", {className:"preview"},
    h("div", {className:"preview-titre-row"},
      h("input", {className:"preview-titre-input", value:parsed.titre || "", onChange:function(e){modifTitre(e.target.value)}, placeholder:"Titre de l'évaluation"}),
      h("span", {className:"preview-titre-meta"}, parsed.questions.length+" question"+(parsed.questions.length>1?"s":""))
    ),
    h("p", {style:{fontSize:".85rem",color:"var(--gris)",marginBottom:".8rem"}}, "Édite directement chaque champ. Coche les bonnes réponses. La pastille de niveau définit la durée de réflexion.",
      h(InfoI, null, "Édition in-place : tu modifies chaque question directement dans cette zone (énoncé, choix, bonnes réponses, niveau, explication). Le JSON ci-dessus est mis à jour automatiquement. Tu peux aussi modifier le JSON directement et cliquer sur « Vérifier le format » pour rebasculer en mode visuel.")
    ),
    parsed.questions.map(function(q, i){
      var multi = (q.bonnes || []).length > 1;
      return h("div", {key:i, className:"preview-q editable"},
        h("div", {className:"preview-q-header"},
          h("div", {className:"preview-q-titre-row"},
            h("span", {className:"preview-q-num"}, "Q"+(i+1), multi && h("span", {className:"multi-tag", title:"Plusieurs bonnes réponses définies. L'élève devra cocher exactement les bonnes lettres."}, "RÉPONSES MULTIPLES")),
            h("div", {className:"preview-q-actions"},

          ),

        )

// ─────────── Feuille d'impression ───────────
function FeuilleImpression(p){
  var ev = p.evaluation;
  useEffect(function(){
    // Activer le mode impression : masque le panneau prof, ne laisse que la feuille visible
    document.body.classList.add("impression-active");
    // Lancer l'impression après render
    var t = setTimeout(function(){
      window.print();
    }, 300);
    return function(){
      clearTimeout(t);
      document.body.classList.remove("impression-active");
    };
  }, []);

  var contenu = h(React.Fragment, null,
    h("button", {className:"btn-fermer-impression no-print", onClick:p.onClose}, "✕ Fermer"),
    h("div", {className:"feuille-impression visible"},
      h("div", {className:"feuille-header"},
        h("h1", null, ev.titre),
        h("div", {className:"ligne-info"},
          h("div", {className:"champ"},
            h("strong", null, "Nom :"),
            h("div", {className:"blanc"})
          ),
          h("div", {className:"champ"},
            h("strong", null, "Classe :"),
            h("div", {className:"blanc"})
          ),
          h("div", {className:"champ"},
            h("strong", null, "Date :"),
            h("div", {className:"blanc"})
          )
        )
      ),
      ev.questions.map(function(q, i){
        var niv = getNiveau(q.niveau);
        return h("div", {key:i, className:"feuille-q"},
          h("div", {className:"feuille-q-top"},
            h("div", {className:"feuille-q-num"}, "Question "+(i+1)),
            h("div", {className:"feuille-q-niv", style:{background:niv.color}, title:niv.label})
          ),
          h("div", {className:"feuille-q-enonce"}, q.enonce),
          h("div", {className:"feuille-cadre"}, "Rédige ta réponse en entier ici."),
          h("div", {className:"feuille-lettres"},
            q.choix.map(function(_, j){
              return h("span", {key:j}, lettreFromIndex(j));

      })
    )
  );
  // Rendu via Portal pour sortir du panneau prof
  return ReactDOM.createPortal(contenu, document.body);
}

// ─────────── Onglet Pilotage classe ───────────
function OngletPilotage(){
  var s1 = useState({}), classes = s1[0], setClasses = s1[1];
  var s2 = useState({}), evals = s2[0], setEvals = s2[1];
  var s3 = useState(""), classeSlug = s3[0], setClasseSlug = s3[1];
  var s4 = useState(""), evalId = s4[0], setEvalId = s4[1];
  var s5 = useState(null), session = s5[0], setSession = s5[1];
  var s6 = useState({}), allSessions = s6[0], setAllSessions = s6[1];
  var s7 = useState(false), checkinOpen = s7[0], setCheckinOpen = s7[1];
  var s8 = useState({}), absentsCheck = s8[0], setAbsentsCheck = s8[1]; // {slug: true} pour absents
  var s9 = useState(null), sessionInterrompue = s9[0], setSessionInterrompue = s9[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/classes").on("value", function(s){ setClasses(s.val()||{}) });
    db.ref(DB_ROOT+"/evaluations").on("value", function(s){ setEvals(s.val()||{}) });
    db.ref(DB_ROOT+"/sessions").on("value", function(s){ setAllSessions(s.val()||{}) });
    return function(){
      db.ref(DB_ROOT+"/classes").off();
      db.ref(DB_ROOT+"/evaluations").off();
      db.ref(DB_ROOT+"/sessions").off();
    };
  }, []);

  // Surveille la session active de la classe
  useEffect(function(){
    if(!classeSlug){ setSession(null); setSessionInterrompue(null); return; }
    db.ref(DB_ROOT+"/sessionActive/"+classeSlug).on("value", function(snap){
      var sid = snap.val();
      if(!sid){ setSession(null); setSessionInterrompue(null); return; }
      db.ref(DB_ROOT+"/sessions/"+sid).on("value", function(s2){
        var sess = s2.val();
        if(!sess) return;
        sess.id = sid;
        // Si la session a un lastDisconnect ET n'est pas déjà reprise, c'est une session interrompue
        // On affiche la modale de choix au lieu d'ouvrir directement la session
        if(sess.lastDisconnect && !sess.repriseConfirmee){
          setSessionInterrompue(sess);
          setSession(null); // on n'entre PAS dans le pilotage actif tant que choix pas fait
        } else {
          setSessionInterrompue(null);
          setSession(sess);
        }
      });
    });
    return function(){
      db.ref(DB_ROOT+"/sessionActive/"+classeSlug).off();
    };
  }, [classeSlug]);

  // Reprendre une session interrompue : on efface lastDisconnect et on marque repriseConfirmee
  function reprendreSession(){
    if(!sessionInterrompue) return;
    var sid = sessionInterrompue.id;
    var updates = {};
    updates["/sessions/"+sid+"/lastDisconnect"] = null; // efface
    updates["/sessions/"+sid+"/repriseConfirmee"] = Date.now();
    db.ref(DB_ROOT).update(updates, function(err){
      if(err){ alert("Erreur : "+err.message); return; }
      // setSessionInterrompue(null) sera fait par le listener qui détecte la disparition de lastDisconnect
    });
  }

  // Terminer définitivement une session interrompue
  function terminerDefinitivement(){
    if(!sessionInterrompue) return;
    if(!confirm("Terminer définitivement la session ?\n\nLes réponses déjà données restent enregistrées et consultables dans Résultats. Cette action est irréversible.")) return;
    var sid = sessionInterrompue.id;
    var updates = {};
    updates["/sessions/"+sid+"/etat"] = "termine";
    updates["/sessions/"+sid+"/lastDisconnect"] = null;
    updates["/sessionActive/"+classeSlug] = null; // libère la classe
    db.ref(DB_ROOT).update(updates, function(err){
      if(err){ alert("Erreur : "+err.message); return; }
      setSessionInterrompue(null);
      setSession(null);
    });
  }

  // Calcule les sessions passées par classe et par évaluation
  function sessionsPourClasse(slug){
    return Object.keys(allSessions)
      .map(function(k){return Object.assign({id:k}, allSessions[k])})
      .filter(function(s){return s.classeSlug === slug});
  }
  function evalDejaPassee(evalSlug, classeSlug){
    return sessionsPourClasse(classeSlug).some(function(s){return s.evalId === evalSlug});
  }

  function lancerSession(){
    if(!classeSlug || !evalId){ alert("Choisis une classe et une évaluation"); return; }
    if(evalDejaPassee(evalId, classeSlug)){
      if(!confirm("⚠️ Cette évaluation a déjà été passée par cette classe.\n\nLancer quand même une nouvelle session ?")) return;
    }
    // Ouvrir la modale de check-in obligatoire avant lancement effectif
    setAbsentsCheck({});
    setCheckinOpen(true);
  }

  function lancerSessionApresCheckin(){
    var sid = "sess_"+Date.now();
    var classe = classes[classeSlug];
    var eleves = (classe && classe.eleves) || [];
    // Liste des slugs absents cochés (filtre pour ne garder que ceux de la classe)
    var absentsList = eleves.map(function(e){return slugify(e.nomComplet)}).filter(function(s){return absentsCheck[s]});
    // Historique de présence : entrée initiale par élève absent
    var presenceHistory = {};
    var now = Date.now();
    absentsList.forEach(function(slug){
      // Clé Firebase friendly avec timestamp
      var k = "h_"+now+"_"+Math.random().toString(36).slice(2,7);
      presenceHistory[slug] = {};
      presenceHistory[slug][k] = {ts:now, etat:"absent"};
    });
    var sess = {
      classeSlug:classeSlug,
      evalId:evalId,
      date:now,
      phase:"idle",
      qIdx:null,
      etat:"en_cours"
    };
    if(absentsList.length > 0){
      sess.absents = absentsList;
      sess.presence_history = presenceHistory;
    }
    db.ref(DB_ROOT+"/sessions/"+sid).set(sess, function(err){
      if(err){ alert("Erreur: "+err.message); return; }
      db.ref(DB_ROOT+"/sessionActive/"+classeSlug).set(sid);
      setCheckinOpen(false);
      setAbsentsCheck({});
    });
  }

  function terminerSession(){
    if(!session) return;
    if(!confirm("Terminer la session ? Les élèves verront un écran de fin.")) return;
    db.ref(DB_ROOT+"/sessions/"+session.id+"/etat").set("terminee");
    db.ref(DB_ROOT+"/sessionActive/"+classeSlug).remove();
  }

  // Modale prioritaire : session interrompue détectée → choix obligatoire avant de continuer
  if(sessionInterrompue){
    var classeSI = classes[classeSlug];
    var evSI = evals[sessionInterrompue.evalId];
    var nbReponsesPartielles = 0;
    if(sessionInterrompue.reponses){
      Object.values(sessionInterrompue.reponses).forEach(function(repsQ){
        nbReponsesPartielles += Object.keys(repsQ || {}).length;
      });
    }
    var dateDebut = new Date(sessionInterrompue.date);
    var dateDeco = new Date(sessionInterrompue.lastDisconnect);
    var fmt = function(d){
      var hh = String(d.getHours()).padStart(2,'0');
      var mm = String(d.getMinutes()).padStart(2,'0');
      return d.toLocaleDateString()+" à "+hh+":"+mm;
    };
    return h("div", {className:"checkin-overlay"},
      h("div", {className:"checkin-modal", style:{maxWidth:"600px"}},
        h("div", {className:"checkin-header"},
          h("h3", null, "⚠️ Session interrompue détectée",
            h(InfoI, null, "Cette session a été interrompue brutalement (fermeture d'onglet, plantage navigateur, perte réseau). Tu peux soit la reprendre exactement où elle en était, soit la terminer définitivement. Dans les deux cas, les réponses déjà enregistrées sont conservées.")
          ),
          h("div", {className:"checkin-sub"},
            (classeSI ? classeSI.nom : classeSlug) + (evSI ? " — "+evSI.titre : "")
          )
        ),
        h("div", {style:{padding:"1rem 1.2rem",fontSize:".9rem",color:"var(--noir)"}},
          h("div", {style:{marginBottom:".4rem"}}, "📅 Démarrée le "+fmt(dateDebut)),
          h("div", {style:{marginBottom:".4rem"}}, "🔌 Dernière déconnexion : "+fmt(dateDeco)),
          h("div", {style:{marginBottom:".8rem"}}, "📝 État : phase « "+(sessionInterrompue.phase || "idle")+" »"+(sessionInterrompue.qIdx != null ? " sur Q"+(sessionInterrompue.qIdx+1) : "")+", "+nbReponsesPartielles+" réponse"+(nbReponsesPartielles>1?"s":"")+" enregistrée"+(nbReponsesPartielles>1?"s":"")),
          h("div", {style:{padding:".7rem",background:"#FEF3C7",borderRadius:"8px",fontSize:".85rem",color:"#78350F",marginTop:".5rem"}},
            h("strong", null, "🔄 Reprendre"), " : tu retrouves la session telle quelle, le pilotage reprend là où il s'était arrêté. Les élèves peuvent se reconnecter et retrouver l'état."
          ),
          h("div", {style:{padding:".7rem",background:"#FEE2E2",borderRadius:"8px",fontSize:".85rem",color:"#7F1D1D",marginTop:".5rem"}},
            h("strong", null, "🛑 Terminer définitivement"), " : la session est close. Les "+nbReponsesPartielles+" réponse"+(nbReponsesPartielles>1?"s":"")+" reste"+(nbReponsesPartielles===1?"":"nt")+" enregistrée"+(nbReponsesPartielles>1?"s":"")+" et consultable"+(nbReponsesPartielles>1?"s":"")+" dans Résultats. Tu pourras lancer une nouvelle session ensuite. Action irréversible."
          )
        ),
        h("div", {className:"checkin-actions"},
          h("button", {className:"btn btn-rouge btn-sm", onClick:terminerDefinitivement, title:"Marque la session comme terminée. Les réponses partielles restent enregistrées dans Résultats. Tu pourras lancer une nouvelle session pour cette classe ensuite."}, "🛑 Terminer définitivement"),
          h("button", {className:"btn btn-primary", onClick:reprendreSession, title:"Reprend la session là où elle s'était arrêtée. Toutes les réponses enregistrées sont conservées. Le pilotage reprend immédiatement."}, "🔄 Reprendre la session")
        )
      )
    );
  }

  if(!session){
    var sessionsClasse = classeSlug ? sessionsPourClasse(classeSlug) : [];
    sessionsClasse.sort(function(a,b){return (b.date||0)-(a.date||0)});
    return h("div", null,
      h("div", {className:"card"},
        h("h2", null, "🎯 Lancer une nouvelle session",
          h(InfoI, null, "Une session = une instance d'évaluation pour une classe à une date donnée. Tu choisis la classe et l'évaluation, puis tu démarres. Les élèves connectés à cette classe basculent automatiquement sur l'éval lancée.")
        ),
        h("div", {className:"field"},
          h("label", null, "Classe",
            h(InfoI, null, "Choisis la classe qui va passer l'évaluation. Tu peux passer la même évaluation à plusieurs classes différentes (Banksy puis Pythagore par exemple).")
          ),
          h("select", {value:classeSlug, onChange:function(e){setClasseSlug(e.target.value);setEvalId("")}},
            h("option", {value:""}, "— Choisir —"),
            Object.keys(classes).filter(function(k){return k.charAt(0) !== "_"}).map(function(k){
              return h("option", {key:k, value:k}, classes[k].nom + " ("+(classes[k].eleves||[]).length+" élèves)");
            })
          )
        ),
        h("div", {className:"field"},
          h("label", null, "Évaluation",
            classeSlug && h(InfoI, null, "Les évaluations marquées 🔁 ont déjà été passées par cette classe. Tu peux quand même la relancer (par exemple pour rattraper des absents) — un avertissement te sera demandé.")
          ),
          h("select", {value:evalId, onChange:function(e){setEvalId(e.target.value)}},
            h("option", {value:""}, "— Choisir —"),
            Object.keys(evals).filter(function(k){return k.charAt(0) !== "_"}).map(function(k){
              var deja = classeSlug ? evalDejaPassee(k, classeSlug) : false;
              return h("option", {key:k, value:k},
                (deja ? "🔁 " : "") + evals[k].titre + " ("+(evals[k].questions||[]).length+" questions)"
              );
            })
          )
        ),
        evalId && classeSlug && evalDejaPassee(evalId, classeSlug) && h("div", {style:{padding:".7rem 1rem",background:"#FEF7E0",border:"2px solid #F4D77E",borderRadius:"10px",fontSize:".88rem",marginBottom:".8rem",color:"var(--noir)"}},
          "⚠️ Cette évaluation a déjà été passée par cette classe."
        ),
        h("button", {className:"btn btn-primary", onClick:lancerSession, disabled:!classeSlug || !evalId}, "🚀 Lancer la session"),

        // Modale de check-in obligatoire avant lancement
        checkinOpen && (function(){
          var classe = classes[classeSlug];
          var eleves = (classe && classe.eleves) || [];
          var nbAbsents = Object.keys(absentsCheck).filter(function(k){return absentsCheck[k]}).length;
          return h("div", {className:"checkin-overlay"},
            h("div", {className:"checkin-modal"},
              h("div", {className:"checkin-header"},
                h("h3", null, "📋 Check-in : qui est absent aujourd'hui ?",
                  h(InfoI, null, "Coche les élèves absents avant de lancer la session. Les absences sont enregistrées avec la date pour permettre le suivi longitudinal des présences (compté dans le profil MJPC). Si tout le monde est là, clique « Tout le monde présent »."),
                ),
                h("div", {className:"checkin-sub"}, classe.nom+" — "+eleves.length+" élèves")
              ),
              h("div", {className:"checkin-list"},
                eleves.map(function(e){
                  var slug = slugify(e.nomComplet);
                  var coche = !!absentsCheck[slug];
                  return h("div", {
                    key:slug,
                    className:"checkin-item"+(coche ? " coche" : ""),
                    onClick:function(){
                      var n = Object.assign({}, absentsCheck);
                      if(coche) delete n[slug]; else n[slug] = true;
                      setAbsentsCheck(n);
                    }
                  },
                    h("span", {className:"checkin-checkbox"}, coche ? "🚫" : "✓"),
                    h("span", {className:"checkin-nom"}, e.nomComplet)
                  );
                })
              ),
              h("div", {className:"checkin-summary"},
                nbAbsents === 0
                  ? "✅ Tout le monde présent"
                  : "🚫 "+nbAbsents+" absent"+(nbAbsents>1?"s":"")+" sur "+eleves.length
              ),
              h("div", {className:"checkin-actions"},
                h("button", {className:"btn btn-ghost", onClick:function(){setCheckinOpen(false);setAbsentsCheck({})}}, "Annuler"),
                h("button", {className:"btn btn-ghost", onClick:function(){setAbsentsCheck({})}, title:"Décocher tout : aucun absent"}, "Tout le monde présent"),
                h("button", {className:"btn btn-primary", onClick:lancerSessionApresCheckin, title:"Démarrer la session avec les absents marqués"}, "🚀 Lancer la session")
              )
            )
          );
        })()
      ),
      classeSlug && sessionsClasse.length > 0 && h("div", {className:"card"},
        h("h2", null, "📚 Sessions précédentes — "+(classes[classeSlug] ? classes[classeSlug].nom : ""),
          h(InfoI, null, "Liste de toutes les sessions déjà passées par cette classe. Tu peux relancer une évaluation déjà passée (utile pour faire un rattrapage avec un élève absent, par exemple) ou consulter le bilan classe d'une session terminée.")
        ),
        h("div", {className:"results-eval-list"},
          sessionsClasse.map(function(s){
            var ev = evals[s.evalId];
            return h("div", {key:s.id, className:"results-eval-row", style:{cursor:"default"}},
              h("div", null,
                h("div", {className:"titre"}, ev ? ev.titre : "(évaluation supprimée)"),
                h("div", {className:"meta"},
                  new Date(s.date||0).toLocaleString("fr-FR") + " · " +
                  (s.etat === "terminee" ? "✅ terminée" : (s.etat === "en_cours" ? "🟢 en cours" : s.etat))
                )
              ),
              h("div", null, s.etat === "terminee" ? "" : "🟢")
            );
          })
        )
      )
    );
  }

  var classe = classes[session.classeSlug];
  var evaluation = evals[session.evalId];
  if(!classe || !evaluation){
    return h("div", {className:"card"}, h("p", null, "Chargement..."));
  }

  return h(SessionLive, {session:session, classe:classe, evaluation:evaluation, onTerminer:terminerSession});
}

// ─────────── Session live (pilotage) ───────────
// ─────────── Éditeur des durées des niveaux (settings globaux) ───────────
function NiveauxEditor(){
  var s1 = useState(NIVEAUX.map(function(n){return n.chrono})), durees = s1[0], setDurees = s1[1];
  var s2 = useState(false), saved = s2[0], setSaved = s2[1];

  function setDuree(i, v){
    var newD = durees.slice();
    if(v === "") newD[i] = "";
    else newD[i] = parseInt(v) || "";
    setDurees(newD);
    setSaved(false);
  }
  function blurDuree(i){
    var v = parseInt(durees[i]);
    if(!v || v < 1) {
      var newD = durees.slice();
      newD[i] = 1;
      setDurees(newD);
    } else if(v > 120){
      var newD = durees.slice();
      newD[i] = 120;
      setDurees(newD);
    }
  }
  function sauvegarder(){
    // Sauvegarde dans Firebase
    var data = NIVEAUX.map(function(n, i){
      return {id:n.id, chrono:durees[i]};
    });
    db.ref(DB_ROOT+"/settings/niveaux").set(data, function(err){
      if(err){ alert("Erreur : "+err.message); return; }
      // MAJ NIVEAUX en mémoire
      durees.forEach(function(d, i){ NIVEAUX[i].chrono = d; });
      setSaved(true);
      setTimeout(function(){setSaved(false)}, 2000);
    });
  }
  function reinitialiser(){
    if(!confirm("Réinitialiser les durées par défaut (5/10/15/20s) ?")) return;
    var defaults = NIVEAUX_DEFAULT.map(function(n){return n.chrono});
    setDurees(defaults);
    var data = NIVEAUX_DEFAULT.map(function(n){
      return {id:n.id, chrono:n.chrono};
    });
    db.ref(DB_ROOT+"/settings/niveaux").set(data, function(){
      defaults.forEach(function(d, i){ NIVEAUX[i].chrono = d; });
      setSaved(true);
      setTimeout(function(){setSaved(false)}, 2000);
    });
  }
  var modifie = NIVEAUX.some(function(n, i){return durees[i] !== n.chrono});

  return h("details", {className:"niveaux-editor"},
    h("summary", null,
      "⚙️ Durées des niveaux ",

// ─────────── Session live (pilotage) ───────────
function BilanClasse(p){
  var sess = p.sess, ev = p.evaluation, classe = p.classe;
  var s1 = useState(null), allReps = s1[0], setAllReps = s1[1];
  var s2 = useState({}), autoevals = s2[0], setAutoevals = s2[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses").once("value", function(s){ setAllReps(s.val() || {}); });
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/autoevals").once("value", function(s){ setAutoevals(s.val() || {}); });
  }, [sess.id]);

  if(allReps === null) return h("div", {className:"card"}, h("h2", null, "🏁 Bilan classe"), h("p", null, "Chargement…"));

  var maxP = calculerMaxPondere(ev.questions);
  var nbTotal = ev.questions.length;
  var eleves = (classe.eleves || []).map(function(e){
    var slug = e.slug || slugify(e.nomComplet);
    var scoreP = 0; // pondéré
    var scoreB = 0; // brut
    ev.questions.forEach(function(q, i){
      var rep = allReps[i] && allReps[i][slug];
      var mine = rep && rep.choix ? rep.choix.slice().sort() : null;
      var bonnes = (q.bonnes||[]).slice().sort();
      if(mine && mine.length > 0 && JSON.stringify(mine) === JSON.stringify(bonnes)){
        scoreP += POIDS_NIVEAU[q.niveau] || 1;
        scoreB++;
      }
    });
    var fReelle = fourchetteDuScore(scoreB, nbTotal); // basé sur le brut
    var auto = autoevals[slug];
    var fEst = auto ? FOURCHETTES_DEF.find(function(f){return f.key===auto}) : null;
    var calib = null;
    if(fEst){
      var iE = IDX_FOURCHETTE[auto], iR = IDX_FOURCHETTE[fReelle.key];
      calib = (iE === iR) ? "ok" : (iE > iR ? "sur" : "sous");
    }
    return {slug:slug, nom:e.nomComplet, scoreB:scoreB, scoreP:scoreP, fReelle:fReelle, fEst:fEst, calib:calib};
  });

  // Stats sur le score BRUT (cohérent avec l'autoeval)
  var scoresB = eleves.map(function(e){return e.scoreB}).sort(function(a,b){return a-b});
  var scoresP = eleves.map(function(e){return e.scoreP}).sort(function(a,b){return a-b});
  var mediane = scoresB.length === 0 ? 0
    : (scoresB.length % 2 ? scoresB[Math.floor(scoresB.length/2)]
       : (scoresB[scoresB.length/2-1] + scoresB[scoresB.length/2])/2);
  var moyenne = scoresB.length === 0 ? 0 : scoresB.reduce(function(a,b){return a+b},0) / scoresB.length;
  var medianeP = scoresP.length === 0 ? 0
    : (scoresP.length % 2 ? scoresP[Math.floor(scoresP.length/2)]
       : (scoresP[scoresP.length/2-1] + scoresP[scoresP.length/2])/2);
  var moyenneP = scoresP.length === 0 ? 0 : scoresP.reduce(function(a,b){return a+b},0) / scoresP.length;
  var distribC = {vert:0, bleu:0, orange:0, rouge:0};
  eleves.forEach(function(e){ distribC[e.fReelle.key]++; });
  var calibStats = {ok:0, sur:0, sous:0, none:0};
  eleves.forEach(function(e){ calibStats[e.calib || "none"]++; });

  var qStats = ev.questions.map(function(q, i){
    var totalRep = 0, bonRep = 0;
    Object.keys(allReps[i] || {}).forEach(function(s){
      var c = (allReps[i][s].choix || []).slice().sort();
      if(c.length > 0){
        totalRep++;
        var bn = (q.bonnes||[]).slice().sort();
        if(JSON.stringify(c) === JSON.stringify(bn)) bonRep++;
      }
    });
    return {idx:i, q:q, totalRep:totalRep, bonRep:bonRep, taux:totalRep > 0 ? (bonRep/totalRep)*100 : 0};
  });
  var qPlusRatee = qStats.slice().sort(function(a,b){return a.taux - b.taux})[0];
  var qPlusReussie = qStats.slice().sort(function(a,b){return b.taux - a.taux})[0];
  var elevesTris = eleves.slice().sort(function(a,b){return b.scoreB - a.scoreB});

  return h("div", null,
    h("div", {className:"card"},
      h("div", {style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:".5rem"}},
        h("h2", {style:{margin:0}}, "🏁 Bilan classe — "+ev.titre+" — "+classe.nom,
          h(InfoI, null, "Synthèse complète à la fin de la session : statistiques agrégées (moyenne, médiane, plage), distribution des élèves dans les 4 fourchettes, calibration des autoévaluations, questions remarquables et détail par élève. Les statistiques principales sont exprimées en nombre de bonnes réponses (comme pour l'autoévaluation). Le score pondéré (Facile×1, Standard×2, Approfondi×3, Expert×4) est affiché en complément.")
        ),
        h("button", {className:"btn btn-rouge btn-sm", onClick:p.onTerminer, title:"Termine la session définitivement."}, "🛑 Terminer la session")
      ),
      h("div", {className:"bilan-classe-synthese"},
        h("div", {className:"bilan-classe-stat"}, h("div", {className:"bilan-classe-stat-label"}, "Moyenne"), h("div", {className:"bilan-classe-stat-num"}, moyenne.toFixed(1)+" / "+nbTotal), h("div", {className:"bilan-classe-stat-sub"}, "pondérée : "+moyenneP.toFixed(1)+" / "+maxP)),
        h("div", {className:"bilan-classe-stat"}, h("div", {className:"bilan-classe-stat-label"}, "Médiane"), h("div", {className:"bilan-classe-stat-num"}, mediane+" / "+nbTotal), h("div", {className:"bilan-classe-stat-sub"}, "pondérée : "+medianeP+" / "+maxP)),
        h("div", {className:"bilan-classe-stat"}, h("div", {className:"bilan-classe-stat-label"}, "Plage"), h("div", {className:"bilan-classe-stat-num"}, scoresB.length > 0 ? scoresB[0]+"—"+scoresB[scoresB.length-1] : "—"), h("div", {className:"bilan-classe-stat-sub"}, "pondérée : "+(scoresP.length > 0 ? scoresP[0]+"—"+scoresP[scoresP.length-1] : "—")))
      ),
      h("h3", {style:{marginTop:"1.2rem"}}, "📊 Distribution",
        h(InfoI, null, "Nombre d'élèves dans chaque fourchette de résultat. Permet de voir d'un coup si la classe a globalement bien ou mal réussi cette évaluation.")
      ),
      h("div", {className:"bilan-classe-distrib"},
        h("div", {className:"bilan-classe-distrib-cell fourchette-vert"}, h("strong", null, distribC.vert), h("span", null, "🟢 Très bien")),
        h("div", {className:"bilan-classe-distrib-cell fourchette-bleu"}, h("strong", null, distribC.bleu), h("span", null, "🔵 Bien")),
        h("div", {className:"bilan-classe-distrib-cell fourchette-orange"}, h("strong", null, distribC.orange), h("span", null, "🟠 Moyen")),
        h("div", {className:"bilan-classe-distrib-cell fourchette-rouge"}, h("strong", null, distribC.rouge), h("span", null, "🔴 Faible"))
      ),
      h("h3", null, "🎯 Calibration de l'autoévaluation",
        h(InfoI, null, "Comparaison entre l'estimation des élèves et leur résultat réel. Bien évalués = ils se connaissent. Sous-évalués = manque de confiance. Sur-évalués = surestiment leur travail. Donne une indication précieuse sur la métacognition de chaque élève.")
      ),
      h("div", {className:"bilan-classe-calib"},
        h("div", {className:"bilan-classe-calib-cell calib-ok"}, h("strong", null, calibStats.ok), h("span", null, "✅ Bien évalués")),
        h("div", {className:"bilan-classe-calib-cell calib-sous"}, h("strong", null, calibStats.sous), h("span", null, "🌟 Sous-évalués")),
        h("div", {className:"bilan-classe-calib-cell calib-sur"}, h("strong", null, calibStats.sur), h("span", null, "⚠️ Sur-évalués")),
        calibStats.none > 0 && h("div", {className:"bilan-classe-calib-cell calib-none"}, h("strong", null, calibStats.none), h("span", null, "— Pas d'autoeval"))
      ),
      h("h3", null, "💡 Questions remarquables",
        h(InfoI, null, "La plus ratée à retravailler en priorité avec la classe. La mieux réussie à valoriser. Le pourcentage est le taux de réussite parmi les élèves qui ont répondu.")
      ),
      h("div", {className:"bilan-classe-insights"},
        qPlusRatee && h("div", {className:"bilan-classe-insight insight-attention"},
          h("div", {className:"bilan-classe-insight-titre"}, "🔴 La plus ratée — Q"+(qPlusRatee.idx+1)+" ("+Math.round(qPlusRatee.taux)+"% de réussite)"),
          h("div", {className:"bilan-classe-insight-enonce"}, qPlusRatee.q.enonce)
        ),
        qPlusReussie && qPlusReussie.idx !== qPlusRatee.idx && h("div", {className:"bilan-classe-insight insight-felicitations"},
          h("div", {className:"bilan-classe-insight-titre"}, "🟢 La mieux réussie — Q"+(qPlusReussie.idx+1)+" ("+Math.round(qPlusReussie.taux)+"% de réussite)"),
          h("div", {className:"bilan-classe-insight-enonce"}, qPlusReussie.q.enonce)
        )
      ),
      h("h3", null, "👥 Détail par élève (trié par score)",
        h(InfoI, null, "Trié par nombre de bonnes réponses décroissant. Bonnes = nombre brut sur "+nbTotal+". Pondéré = score pondéré selon le niveau des questions. Estimé = fourchette d'autoévaluation choisie par l'élève. Réel = sa fourchette de score réel (calculée sur le brut). Calibration = comparaison des deux.")
      ),
      h("div", {className:"bilan-classe-table-wrap"},
        h("table", {className:"bilan-classe-table"},
          h("thead", null,
            h("tr", null,
              h("th", null, "Élève"),
              h("th", null, "Bonnes"),
              h("th", null, "Pondéré"),
              h("th", {style:{textAlign:"center"}}, "Estimé"),
              h("th", {style:{textAlign:"center"}}, "Réel"),
              h("th", null, "Calibration")
            )
          ),
          h("tbody", null,
            elevesTris.map(function(e){
              return h("tr", {key:e.slug},
                h("td", null, e.nom),
                h("td", null, e.scoreB+" / "+nbTotal),
                h("td", null, e.scoreP+" / "+maxP),
                h("td", {style:{textAlign:"center"}}, e.fEst ? e.fEst.emoji : "—"),
                h("td", {style:{textAlign:"center"}}, e.fReelle.emoji),
                h("td", {className:"calib-cell calib-"+(e.calib||"none")},
                  e.calib === "ok" ? "✅ Juste" :
                  e.calib === "sous" ? "🌟 Sous-éval." :
                  e.calib === "sur" ? "⚠️ Sur-éval." : "—"
                )
              );
            })
          )
        )
      )
    )
  );
}

function SessionLive(p){
  var sess = p.session, classe = p.classe, ev = p.evaluation;
  var qIdx = sess.qIdx;
  var question = (qIdx != null && qIdx >= 0) ? ev.questions[qIdx] : null;
  var s1 = useState({}), reponses = s1[0], setReponses = s1[1];
  var s2 = useState({}), presence = s2[0], setPresence = s2[1];
  var s3 = useState(0), tick = s3[0], setTick = s3[1];
  var s4 = useState(sess.chronoReponse || 5), chronoRep = s4[0], setChronoRep = s4[1];
  var s5 = useState(false), departDialogOpen = s5[0], setDepartDialogOpen = s5[1];
  var s6 = useState(false), retourDialogOpen = s6[0], setRetourDialogOpen = s6[1];

  // Surveille les réponses
  useEffect(function(){
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses").on("value", function(s){
      setReponses(s.val()||{});
    });
    return function(){ db.ref(DB_ROOT+"/sessions/"+sess.id+"/reponses").off(); };
  }, [sess.id]);

  // Surveille la présence
  useEffect(function(){
    db.ref(DB_ROOT+"/presence/"+classe.nom).off();
    var slug = sess.classeSlug;
    db.ref(DB_ROOT+"/presence/"+slug).on("value", function(s){
      setPresence(s.val()||{});
    });
    return function(){ db.ref(DB_ROOT+"/presence/"+slug).off(); };
  }, [sess.classeSlug]);

  // Tick pour rafraîchir le chrono
  useEffect(function(){
    var iv = setInterval(function(){ setTick(function(t){return t+1}); }, 500);
    return function(){ clearInterval(iv); };
  }, []);

  // onDisconnect : si la connexion saute (fermeture onglet, plantage, perte réseau),
  // Firebase écrira automatiquement côté serveur un timestamp lastDisconnect.
  // La session N'EST PAS automatiquement terminée — l'utilisateur pourra la reprendre
  // ou la terminer définitivement à la prochaine ouverture du pilotage.
  useEffect(function(){
    var refDisc = db.ref(DB_ROOT+"/sessions/"+sess.id+"/lastDisconnect");
    refDisc.onDisconnect().set(firebase.database.ServerValue.TIMESTAMP);
    return function(){
      // Au démontage propre (changement de page, reload contrôlé), annuler le déclencheur
      refDisc.onDisconnect().cancel();
    };
  }, [sess.id]);

  // beforeunload : avertit avant fermeture/rechargement de la fenêtre quand une session est active.
  // Le navigateur affiche son message générique (texte non personnalisable depuis ~2017).
  // Si l'utilisateur confirme la fermeture, onDisconnect (ci-dessus) écrira lastDisconnect côté serveur,
  // et la prochaine ouverture proposera de reprendre ou de terminer.
  useEffect(function(){
    function handler(e){
      e.preventDefault();
      e.returnValue = ""; // requis par certains navigateurs pour déclencher le dialogue
      return "";
    }
    window.addEventListener("beforeunload", handler);
    return function(){ window.removeEventListener("beforeunload", handler); };
  }, []);

  // Quand un élève répond pendant une réouverture, incrémenter le compteur
  useEffect(function(){
    if(!sess.reouverts || qIdx == null) return;
    Object.keys(sess.reouverts).forEach(function(slug){
      if(sess.reouverts[slug] !== qIdx) return;
      var rep = (reponses[qIdx] || {})[slug];
      if(!rep) return;
      // L'élève a répondu pendant sa réouverture
      var dejaCompte = sess.reouvertHistorique && sess.reouvertHistorique[slug] && sess.reouvertHistorique[slug][qIdx];
      if(dejaCompte) return;
      // Incrémenter
      db.ref(DB_ROOT+"/sessions/"+sess.id+"/reouvertHistorique/"+slug+"/"+qIdx).set(1);
    });
  }, [reponses, sess.reouverts, qIdx]);

  // Auto-fin chrono : passer en attente
  useEffect(function(){
    if((sess.phase !== "reflexion" && sess.phase !== "reponse") || !sess.phaseStart) return;
    if(sess.paused) return; // chrono figé
    var duree = sess.phase === "reflexion"
      ? (question ? getNiveau(question.niveau).chrono : 10)
      : (sess.chronoReponse || 5);
    var elapsed = Math.floor((Date.now() - sess.phaseStart)/1000);
    var restant = duree - elapsed;
    if(restant <= 0){
      // Passer auto à la phase suivante
      if(sess.phase === "reflexion"){
        db.ref(DB_ROOT+"/sessions/"+sess.id).update({phase:"reponse", phaseStart:Date.now()});
      } else if(sess.phase === "reponse"){
        db.ref(DB_ROOT+"/sessions/"+sess.id).update({phase:"attente"});
      }
    }
  }, [tick, sess.phase, sess.phaseStart, sess.paused]);

  // Calcul chrono restant
  var chronoRestant = null;
  if((sess.phase === "reflexion" || sess.phase === "reponse") && sess.phaseStart){
    var duree = sess.phase === "reflexion"
      ? (question ? getNiveau(question.niveau).chrono : 10)
      : (sess.chronoReponse || 5);
    if(sess.paused){
      chronoRestant = sess.paused.remaining;
    } else {
      var elapsed = Math.floor((Date.now() - sess.phaseStart)/1000);
      chronoRestant = Math.max(0, duree - elapsed);
    }
  }

  // Actions prof
  // Actions session — délégation à sessActions (refacto polish). On garde rouvrirPourTous,
  // marquerDepart et l'action "Suivante/Précédente correction" en local car logique métier
  // spécifique au pilotage prof.
  function lancerQuestion(idx){ sessActions.lancerQ(sess, ev, idx); }
  function autoriserReponse(){ sessActions.autoriser(sess, chronoRep); }
  function clore(){ sessActions.clore(sess, false); }
  function rouvrirPourTous(){
    // Rebascule en phase "reponse" : les élèves qui n'ont pas encore répondu retrouvent les choix
    // Ceux qui ont déjà répondu ne sont pas affectés (leur réponse reste figée)
    // On remet aussi à zéro les compteurs de réouverture individuelle pour cette question :
    // après "Rouvrir pour tous", chaque élève retrouve une chance de réouverture si le prof
    // veut ensuite rouvrir individuellement après une nouvelle clôture.
    var updates = {};
    updates["/sessions/"+sess.id+"/phase"] = "reponse";
    updates["/sessions/"+sess.id+"/phaseStart"] = Date.now();
    updates["/sessions/"+sess.id+"/chronoReponse"] = chronoRep;
    // Effacer le compteur d'utilisations pour cette question (tous élèves)
    if(sess.reouvertHistorique && qIdx != null){
      Object.keys(sess.reouvertHistorique).forEach(function(slug){
        if(sess.reouvertHistorique[slug] && sess.reouvertHistorique[slug][qIdx] != null){
          updates["/sessions/"+sess.id+"/reouvertHistorique/"+slug+"/"+qIdx] = null;
        }
      });
    }
    // Effacer aussi les marqueurs reouverts individuels pour cette question (cohérence)
    if(sess.reouverts){
      Object.keys(sess.reouverts).forEach(function(slug){
        if(sess.reouverts[slug] === qIdx){
          updates["/sessions/"+sess.id+"/reouverts/"+slug] = null;
        }
      });
    }
    db.ref(DB_ROOT).update(updates);
    notifierEleves("La question est rouverte. Tu peux encore répondre.", "info");
  }

  function marquerDepart(eleveSlug){
    // Marque un élève comme parti en cours de session.
    // Les réponses déjà données restent enregistrées (la note finale sera prorata).
    var now = Date.now();
    var absentsAct = (sess.absents || []).slice();
    if(absentsAct.indexOf(eleveSlug) < 0) absentsAct.push(eleveSlug);
    var k = "h_"+now+"_"+Math.random().toString(36).slice(2,7);
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/absents").set(absentsAct);
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/presence_history/"+eleveSlug+"/"+k).set({ts:now, etat:"absent"});
    setDepartDialogOpen(false);
  }

  function marquerRetour(eleveSlug){
    // Marque un élève comme revenu (retour de retard ou réintégré après départ).
    // L'élève rejoint la session normalement, peut répondre aux questions à venir.
    var now = Date.now();
    var absentsAct = (sess.absents || []).filter(function(s){return s !== eleveSlug});
    var k = "h_"+now+"_"+Math.random().toString(36).slice(2,7);
    if(absentsAct.length > 0){
      db.ref(DB_ROOT+"/sessions/"+sess.id+"/absents").set(absentsAct);
    } else {
      // Plus d'absents : on supprime le champ
      db.ref(DB_ROOT+"/sessions/"+sess.id+"/absents").remove();
    }
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/presence_history/"+eleveSlug+"/"+k).set({ts:now, etat:"present"});
    setRetourDialogOpen(false);
  }
  function questionSuivante(){
    lancerQuestion();
  }
  function relancerMaintenant(){
    db.ref(DB_ROOT+"/sessions/"+sess.id).update({phaseStart:Date.now(), paused:null});
    notifierEleves("Le chrono a été relancé.", "info");
  }
  function basculePause(){ sessActions.togglePause(sess, ev, question); }
  function notifierEleves(msg, type){
    // Ajoute une notification horodatée à la session
    var nid = "n_"+Date.now()+"_"+Math.random().toString(36).slice(2,7);
    db.ref(DB_ROOT+"/sessions/"+sess.id+"/notifs/"+nid).set({
      msg:msg, type:type||"info", ts:Date.now()
    });
  }
  function ajouterTemps(secondes){ sessActions.ajouterTemps(sess, secondes); }
  function allerAQuestion(idx){
    if(idx < 0 || idx >= ev.questions.length) return;
    if(idx === qIdx) return;
    // On bascule directement la question, avec phase réflexion
    db.ref(DB_ROOT+"/sessions/"+sess.id).update({
      qIdx:idx,
      phase:"reflexion",
      phaseStart:Date.now(),
      reouverts:null,
      paused:null
    });
  }
  function questionPrecedente(){
    if(qIdx == null || qIdx <= 0) return;
    allerAQuestion(qIdx - 1);
  }
  function changerNiveauEnDirect(qi, nivId){
    // Modifie le niveau de la question dans l'évaluation source
    var ancienChrono = getNiveau(ev.questions[qi].niveau).chrono;
    var nouveauChrono = getNiveau(nivId).chrono;
    db.ref(DB_ROOT+"/evaluations/"+sess.evalId+"/questions/"+qi+"/niveau").set(nivId);
    // Si on est en phase réflexion sur cette question, on relance le chrono
    if(sess.phase === "reflexion" && qi === qIdx){
      db.ref(DB_ROOT+"/sessions/"+sess.id).update({phaseStart:Date.now(), paused:null});
