// VUE TABLEAU (board) — affichage uniquement, pas de pilotage possible.
// Garantit qu'aucun contrôle ne peut s'afficher dans cette vue.
// Auto-détecte la session active unique (Paul n'a jamais 2 sessions en parallèle).
// ════════════════════════════════════════════════════════════════════
// ════════════════════════════════════════════════════════════════════
// VUE TABLEAU (board) — affichage uniquement, pas de pilotage possible.
// Garantit qu'aucun contrôle ne peut s'afficher dans cette vue.
// Auto-détecte la session active unique (Paul n'a jamais 2 sessions en parallèle).
// ════════════════════════════════════════════════════════════════════
// Aside : liste des élèves côté droit du tableau
// Pour chaque élève : nom en blanc qui clignote brièvement quand il vient de répondre,
// gris s'il n'a pas répondu, gris foncé barré s'il est absent.
function BoardEleves(p){
  var classe = p.classe;
  var session = p.session;
  var qIdx = p.qIdx;
  var repsQ = (session && session.reponses && qIdx != null) ? (session.reponses[qIdx] || {}) : {};
  var absents = (session && session.absents) || [];
  var eleves = (classe && classe.eleves) || [];
  // Tri : ordre alphabétique sur nomComplet
  var elevesTries = eleves.slice().sort(function(a,b){
    return a.nomComplet.localeCompare(b.nomComplet, "fr");
  });
  return h("aside", {className:"board-aside-eleves"},
    h("div", {className:"board-aside-titre"}, "👥 Classe ("+eleves.length+")"),
    h("div", {className:"board-aside-liste"},
      elevesTries.map(function(e){
        var slug = slugify(e.nomComplet);
        var aRepondu = !!repsQ[slug];
        var estAbsent = absents.indexOf(slug) >= 0;
        // Récupère le prénom (premier mot après le NOM en majuscules typiquement, mais on prend tout)
        // Format ED = "NOM Prénom" → on veut le prénom (dernier mot) en gras + nom en plus petit
        var mots = e.nomComplet.split(/\s+/);
        var prenom = mots[mots.length-1];
        var nom = mots.slice(0, -1).join(" ");
        var cls = "board-aside-eleve";
        if(estAbsent) cls += " absent";
        else if(aRepondu) cls += " repondu";
        else cls += " enattente";
        // Clé qui change quand l'élève répond → relance l'animation
        var animKey = aRepondu ? (repsQ[slug].ts || "x") : "0";
        return h("div", {key:slug+"-"+animKey, className:cls},
          h("span", {className:"prenom"}, prenom),
          nom && h("span", {className:"nom"}, nom)
        );
      })
    )
  );
}

function VueBoard(p){
  var s1 = useState(null), session = s1[0], setSession = s1[1];
  var s2 = useState(null), classe = s2[0], setClasse = s2[1];
  var s3 = useState(null), evaluation = s3[0], setEvaluation = s3[1];
  var s4 = useState(0), tick = s4[0], setTick = s4[1];

  // Tick pour rafraîchir le chrono toutes les 250ms
  useEffect(function(){
    var iv = setInterval(function(){ setTick(function(t){return t+1}); }, 250);
    return function(){ clearInterval(iv); };
  }, []);

  // Surveille la session active unique en temps réel
  useEffect(function(){
    var refSessActive = db.ref(DB_ROOT+"/sessionActive");
    var currentSid = null;
    var currentClasseSlug = null;
    var currentEvalId = null;
    var detacherClasseListener = null;

    function detacherSession(){
      if(currentSid){
        db.ref(DB_ROOT+"/sessions/"+currentSid).off();
        currentSid = null;
      }
      if(detacherClasseListener){
        detacherClasseListener();
        detacherClasseListener = null;
        currentClasseSlug = null;
      }
      if(currentEvalId){
        db.ref(DB_ROOT+"/evaluations/"+currentEvalId).off();
        currentEvalId = null;
      }
    }

    refSessActive.on("value", function(snap){
      var actives = snap.val() || {};
      var slugs = Object.keys(actives);
      // Filtre : on garde seulement les classes pour lesquelles la session existe vraiment et est en cours
      // Comme c'est asynchrone, on doit chercher en parallèle puis sélectionner
      if(slugs.length === 0){
        detacherSession();
        setSession(null); setClasse(null); setEvaluation(null);
        return;
      }
      // Cherche la première session qui existe vraiment et est en cours
      Promise.all(slugs.map(function(slug){
        return db.ref(DB_ROOT+"/sessions/"+actives[slug]).once("value").then(function(s){
          var sess = s.val();
          return (sess && sess.etat === "en_cours") ? {slug:slug, sid:actives[slug], sess:sess} : null;
        }).catch(function(){return null;});
      })).then(function(results){
        var valides = results.filter(function(r){return r});
        if(valides.length === 0){
          detacherSession();
          setSession(null); setClasse(null); setEvaluation(null);
          return;
        }
        // Prend la session la plus récente parmi les valides (au cas où il y en aurait plusieurs)
        valides.sort(function(a,b){return (b.sess.date||0) - (a.sess.date||0);});
        var elu = valides[0];
        var classeSlug = elu.slug;
        var sid = elu.sid;

        if(currentSid !== sid){
          detacherSession();
          currentSid = sid;
          currentClasseSlug = classeSlug;
          // Listener live sur la session
          db.ref(DB_ROOT+"/sessions/"+sid).on("value", function(s){
            var sess = s.val();
            if(!sess){ setSession(null); return; }
            var copy = Object.assign({}, sess, {id: sid});
            setSession(copy);
            if(currentEvalId !== sess.evalId){
              if(currentEvalId) db.ref(DB_ROOT+"/evaluations/"+currentEvalId).off();
              currentEvalId = sess.evalId;
              db.ref(DB_ROOT+"/evaluations/"+sess.evalId).on("value", function(e){
                var v = e.val();
                setEvaluation(v ? Object.assign({}, v) : null);
              });
            }
          });
          // Listener sur la classe — fusionne sexes propres à QCM + données /classes mutualisées
          detacherClasseListener = surveillerClassesAvecSexes(function(all){
            setClasse(all[classeSlug] ? Object.assign({}, all[classeSlug]) : null);
          });
        }
      });
    });
    return function(){
      refSessActive.off();
      detacherSession();
    };
  }, []);

  if(!session || !classe || !evaluation){
    return h("div", {className:"board-attente"},
      h("div", {className:"board-titre"}, "📺 Vue tableau"),
      h("div", {className:"board-msg"}, txt("attente_session")),
      h("div", {className:"board-sub"}, "Cette vue se met à jour automatiquement dès qu'une session est lancée depuis le pilotage.")
    );
  }

  var phase = session.phase || "idle";
  // En phase correction, l'index actif est session.correctionIdx (ordre de correction
  // par taux d'erreur décroissant) — pas session.qIdx (qui reste figé sur la dernière
  // question de la phase poser). Sans ce calcul, la VueBoard reste bloquée sur la
  // dernière question posée pendant toute la correction.
  var qIdx = (phase === "correction" && session.correctionIdx != null)
              ? session.correctionIdx
              : session.qIdx;
  var question = (qIdx != null && evaluation.questions) ? evaluation.questions[qIdx] : null;

  // Calcul du chrono restant (commun aux phases reflexion/reponse)
  var resteSec = null;
  if((phase === "reflexion" || phase === "reponse") && session.phaseStart && question){
    var duree = phase === "reflexion"
      ? (getNiveau(question.niveau).chrono || 10)
      : (session.chronoReponse || 5);
    var elapsed = Math.floor((Date.now() - session.phaseStart) / 1000);
    resteSec = Math.max(0, duree - elapsed);
  }

  // Helper : enrobe le contenu principal avec l'aside des élèves (sauf phase idle)
  function withEleves(contenu){
    return h("div", {className:"board-with-aside"},
      h("div", {className:"board-main"}, contenu),
      h(BoardEleves, {classe:classe, session:session, qIdx:qIdx})
    );
  }

  // ─── Phase IDLE / état non couvert : message d'attente sobre ───
  if(phase === "idle" || !question){
    return h("div", {className:"board-active board-idle"},
      h("div", {className:"board-classe"}, classe.nom),
      h("div", {className:"board-titre-eval"}, evaluation.titre),
      h("div", {className:"board-attente-msg"}, "📋 Préparation… La première question va arriver.")
    );
  }

  // ─── Phase RÉFLEXION : énoncé seul, jamais les choix ───
  if(phase === "reflexion"){
    var niv = getNiveau(question.niveau);
    var nbQuestions = evaluation.questions.length;
    return withEleves(h("div", {className:"board-active board-reflexion"},
      h("div", {className:"board-bandeau-haut"},
        h("span", {className:"board-classe-mini"}, classe.nom),
        h("span", {className:"board-niveau-pastille", style:{background:niv.color}}, niv.label),
        h("span", {className:"board-q-count"}, "Question "+(qIdx+1)+" / "+nbQuestions)
      ),
      h("div", {className:"board-enonce-bloc"},
        h("div", {className:"board-enonce"}, question.enonce)
      ),
      h("div", {className:"board-chrono-zone"},
        h("div", {className:"board-chrono-label"},
          h("span", {className:"board-main-anim"}, "✍️"),
          " RÉDIGE TA RÉPONSE EN ENTIER SUR TA FEUILLE"
        ),
        h("div", {className:"board-chrono-cercle"},
          h("svg", {viewBox:"0 0 100 100", className:"board-chrono-svg"},
            h("circle", {cx:50, cy:50, r:46, fill:"none", stroke:"#1E293B", strokeWidth:"6"}),
            h("circle", {cx:50, cy:50, r:46, fill:"none", stroke:niv.color, strokeWidth:"6",
              strokeDasharray:"289",
              strokeDashoffset: 289 * (1 - (resteSec / (niv.chrono || 10))),
              transform:"rotate(-90 50 50)",
              style:{transition:"stroke-dashoffset .25s linear"}})
          ),
          h("div", {className:"board-chrono-texte"}, resteSec != null ? resteSec+"s" : "—")
        ),
        h("div", {className:"board-chrono-sub"}, "Les choix de réponse n'apparaîtront qu'après la réflexion. Note ta réponse en toutes lettres sur ta copie.")
      )
    ));
  }

  // ─── Phase RÉPONSE : énoncé compact + 4 choix lisibles + chrono ───
  if(phase === "reponse"){
    var nivR = getNiveau(question.niveau);
    var nbQuestionsR = evaluation.questions.length;
    // Compteur d'élèves ayant répondu
    var nbEleves = (classe.eleves || []).length;
    var nbAbsents = (session.absents || []).length;
    var nbAttendu = Math.max(0, nbEleves - nbAbsents);
    var repsQ = (session.reponses && session.reponses[qIdx]) || {};
    var nbReponses = Object.keys(repsQ).length;
    var dureeR = session.chronoReponse || 5;
    return withEleves(h("div", {className:"board-active board-reponse"},
      h("div", {className:"board-bandeau-haut"},
        h("span", {className:"board-classe-mini"}, classe.nom),
        h("span", {className:"board-niveau-pastille", style:{background:nivR.color}}, nivR.label),
        h("span", {className:"board-q-count"}, "Question "+(qIdx+1)+" / "+nbQuestionsR),
        h("span", {className:"board-progress"}, "✋ "+nbReponses+" / "+nbAttendu+" ont répondu")
      ),
      h("div", {className:"board-reponse-enonce"}, question.enonce),
      h("div", {className:"board-choix-grille"},
        (question.choix || []).map(function(c, i){
          return h("div", {key:i, className:"board-choix-item"},
            h("span", {className:"board-choix-lettre"}, lettreFromIndex(i)),
            h("span", {className:"board-choix-texte"}, c)
          );
        })
      ),
      h("div", {className:"board-reponse-chrono"},
        h("svg", {viewBox:"0 0 100 100", className:"board-chrono-svg-petit"},
          h("circle", {cx:50, cy:50, r:46, fill:"none", stroke:"#1E293B", strokeWidth:"6"}),
          h("circle", {cx:50, cy:50, r:46, fill:"none", stroke:"#EC4899", strokeWidth:"6",
            strokeDasharray:"289",
            strokeDashoffset: 289 * (1 - (resteSec / dureeR)),
            transform:"rotate(-90 50 50)",
            style:{transition:"stroke-dashoffset .25s linear"}})
        ),
        h("div", {className:"board-chrono-texte-petit"}, resteSec != null ? resteSec+"s" : "—")
      )
    ));
  }

  // ─── Phase ATTENTE : animation ASMR calme + message neutre ───
  if(phase === "attente"){
    var nivA = getNiveau(question.niveau);
    var nbQuestionsA = evaluation.questions.length;
    var nbElevesA = (classe.eleves || []).length;
    var nbAbsentsA = (session.absents || []).length;
    var nbAttenduA = Math.max(0, nbElevesA - nbAbsentsA);
    var repsQA = (session.reponses && session.reponses[qIdx]) || {};
    var nbReponsesA = Object.keys(repsQA).length;
    return withEleves(h("div", {className:"board-active board-attente-anim"},
      h("div", {className:"board-bandeau-haut"},
        h("span", {className:"board-classe-mini"}, classe.nom),
        h("span", {className:"board-niveau-pastille", style:{background:nivA.color}}, nivA.label),
        h("span", {className:"board-q-count"}, "Question "+(qIdx+1)+" / "+nbQuestionsA),
        h("span", {className:"board-progress"}, "📋 "+nbReponsesA+" / "+nbAttenduA+" réponses")
      ),
      // Zone d'animation au centre
      h("div", {className:"board-zone-anim"},
        // Onde sinusoïdale en arrière-plan
        h("svg", {className:"board-onde", viewBox:"0 0 1200 200", preserveAspectRatio:"none"},
          h("path", {d:"M0,100 Q300,40 600,100 T1200,100", fill:"none", stroke:"rgba(168,85,247,.18)", strokeWidth:"2"}),
          h("path", {d:"M0,100 Q300,160 600,100 T1200,100", fill:"none", stroke:"rgba(236,72,153,.14)", strokeWidth:"2"})
        ),
        // Particules flottantes (12 points qui dérivent)
        h("div", {className:"board-particules"},
          [0,1,2,3,4,5,6,7].map(function(i){
            return h("span", {key:i, className:"board-particule particule-"+i});
          })
        ),
        // Bande lumineuse qui glisse
        h("div", {className:"board-bande"}),
        // Orbe central qui pulse
        h("div", {className:"board-orbe-wrap"},
          h("div", {className:"board-orbe board-orbe-3"}),
          h("div", {className:"board-orbe board-orbe-2"}),
          h("div", {className:"board-orbe board-orbe-1"})
        )
      ),
      // Message en bas
      h("div", {className:"board-attente-bas"},
        h("div", {className:"board-attente-titre"}, "📋 Question close"),
        h("div", {className:"board-attente-sub"}, "Les réponses sont enregistrées — la suite arrive.")
      )
    ));
  }

  // ─── Phase CORRECTION : énoncé + choix avec bonnes réponses mises en évidence ───
  // Note : le revealing animé sera développé en Lot 2. Ici, affichage statique.
  if(phase === "correction"){
    var nivC = getNiveau(question.niveau);
    var nbQuestionsC = evaluation.questions.length;
    var bonnes = (question.bonnes || []);
    var revealedB = session.corrRevealed === true;
    return withEleves(h("div", {className:"board-active board-correction"},
      h("div", {className:"board-bandeau-haut"},
        h("span", {className:"board-classe-mini"}, classe.nom),
        h("span", {className:"board-niveau-pastille", style:{background:nivC.color}}, nivC.label),
        h("span", {className:"board-q-count"}, "Correction — Q"+(qIdx+1)+" / "+nbQuestionsC)
      ),
      h("div", {style:{textAlign:"center"}},
        h("span", {className:"board-correction-banner-peda"}, "💡 On corrige d'abord les questions les plus ratées par la classe")
      ),
      h("div", {className:"board-reponse-enonce"}, question.enonce),
      h("div", {className:"board-choix-grille"},
        (question.choix || []).map(function(c, i){
          var estBonne = bonnes.indexOf(i) >= 0;
          var cls = "board-choix-item";
          if(revealedB) cls += " " + (estBonne ? "choix-bon" : "choix-mauvais");
          return h("div", {key:i, className:cls},
            h("span", {className:"board-choix-lettre"}, lettreFromIndex(i)),
            h("span", {className:"board-choix-texte"}, c),
            revealedB && estBonne && h("span", {className:"board-choix-coche"}, "✓")
          );
        })
      ),
      h("div", {className:"board-correction-bas"},
        revealedB
          ? h("span", null, "✅ Bonne"+(bonnes.length>1?"s":"")+" réponse"+(bonnes.length>1?"s":"")+" : "+bonnes.map(function(i){return lettreFromIndex(i)}).join(", "))
          : h("span", {style:{color:"#FFD23F"}}, "💡 Écoute l'explication — la réponse va être révélée.")
      ),
      revealedB && question.explication && h("div", {className:"board-explication"},
        h("div", {className:"board-explication-titre"}, "💡 Explication"),
        h("div", {className:"board-explication-texte"}, question.explication)
      )
    ));
  }

  // Phase AUTOEVAL : grand écran de prompt pour les élèves + compteur de votes
  if(phase === "autoeval"){
    var aevB = session.autoevals || {};
    var nbAuto = Object.keys(aevB).length;
    var nbTotB = evaluation.questions.length;
    var maxPB = calculerMaxPondere(evaluation.questions);
    var distribB = {vert:0, bleu:0, orange:0, rouge:0};
    Object.values(aevB).forEach(function(v){ if(distribB[v]!=null) distribB[v]++; });
    var bV = bornesFourchette("vert", nbTotB);
    var bBl = bornesFourchette("bleu", nbTotB);
    var bOr = bornesFourchette("orange", nbTotB);
    var bRo = bornesFourchette("rouge", nbTotB);
    function fmtBornes(b){
      if(b.inf === b.sup) return b.inf+"";
      return b.inf+"–"+b.sup;
    }
    return withEleves(h("div", {className:"board-active board-autoeval"},
      h("div", {className:"board-autoeval-titre"}, "🎯 Votre estimation"),
      h("div", {className:"board-autoeval-consigne"}, "Combien de bonnes réponses pensez-vous avoir données sur "+nbTotB+" ?"),
      h("div", {className:"board-autoeval-compteur"}, "✋ ", h("strong", null, nbAuto), " élève"+(nbAuto>1?"s ont":" a")+" voté"),
      h("div", {className:"board-autoeval-distrib"},
        h("div", {className:"board-autoeval-cell fourchette-vert"}, h("div", {className:"board-autoeval-emoji"}, "🟢"), h("strong", null, distribB.vert), h("span", null, fmtBornes(bV)+" bonnes")),
        h("div", {className:"board-autoeval-cell fourchette-bleu"}, h("div", {className:"board-autoeval-emoji"}, "🔵"), h("strong", null, distribB.bleu), h("span", null, fmtBornes(bBl)+" bonnes")),
        h("div", {className:"board-autoeval-cell fourchette-orange"}, h("div", {className:"board-autoeval-emoji"}, "🟠"), h("strong", null, distribB.orange), h("span", null, fmtBornes(bOr)+" bonnes")),
        h("div", {className:"board-autoeval-cell fourchette-rouge"}, h("div", {className:"board-autoeval-emoji"}, "🔴"), h("strong", null, distribB.rouge), h("span", null, fmtBornes(bRo)+" bonnes"))
      )
    ));
  }

  // Phase FINIE : récap classe pour projection
  if(phase === "finie"){
    return withEleves(h("div", {className:"board-active board-finie"},
      h("div", {className:"board-finie-emoji"}, "🏁"),
      h("div", {className:"board-finie-titre"}, "Session terminée"),
      h("div", {className:"board-finie-sub"}, classe.nom + " — " + evaluation.titre),
      h("div", {className:"board-finie-msg"}, "Les élèves consultent leur bilan personnel sur leur téléphone.")
    ));
  }

  // Placeholder pour phase non couverte (sécurité)
  return h("div", {className:"board-active"},
    h("div", {className:"board-classe"}, classe.nom+" — "+evaluation.titre),
    h("div", {className:"board-phase"}, "Phase : "+phase+" — Q"+(qIdx != null ? (qIdx+1) : "—")),
    h("div", {style:{marginTop:"2rem",fontSize:"1.2rem",color:"#94A3B8"}}, "(En cours de développement — phase non encore implémentée pour la vue tableau)")
  );
}

// OVERLAY QR PHONE — modale avec QR code, fermeture auto au scan
// ════════════════════════════════════════════════════════════════════
function OverlayQRPhone(p){
  var s1 = useState(function(){
    return "qr_"+Date.now()+"_"+Math.random().toString(36).substr(2,6);
  }), nonce = s1[0];
  var url = window.location.origin + window.location.pathname + "#mode=prof&view=phone&qr=" + nonce;
  var qrImgUrl = "https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=10&data=" + encodeURIComponent(url);

  useEffect(function(){
    // Écoute du scan : VuePhone écrira dans qrScans/{nonce} à son montage
    var ref = db.ref(DB_ROOT+"/qrScans/"+nonce);
    ref.on("value", function(snap){
      if(snap.val()){
        ref.off();
        ref.remove();
        p.onClose();
      }
    });
    return function(){ ref.off(); ref.remove(); };
  }, []);

  return h("div", {className:"modal-back", onClick:function(e){if(e.target.className==="modal-back")p.onClose()}},
    h("div", {className:"modal", style:{maxWidth:"420px",textAlign:"center"}},
      h("button", {className:"modal-close", onClick:p.onClose}, "✕"),
      h("h2", null, "📱 Pilotage mobile"),
      h("p", {style:{marginBottom:"1rem",fontSize:".9rem",color:"var(--gris)"}}, "Scanne avec ton téléphone. La fenêtre se ferme automatiquement."),
      h("img", {src:qrImgUrl, alt:"QR code", style:{display:"block",margin:"0 auto",borderRadius:"8px",width:"280px",height:"280px",background:"#fff"}}),
      h("div", {style:{marginTop:"1rem",fontSize:".7rem",color:"var(--gris)",wordBreak:"break-all",fontFamily:"monospace"}}, url)
    )
  );
}

// VUE TÉLÉPHONE (phone) — pilotage compact mobile
// ════════════════════════════════════════════════════════════════════
function VuePhone(p){
  // Au montage : si l'URL contient ?qr=NONCE, écrire dans Firebase pour fermer la modale côté ordi
  useEffect(function(){
    var params = getURLParams();
    var qr = params.get("qr");
    if(qr){
      db.ref(DB_ROOT+"/qrScans/"+qr).set(firebase.database.ServerValue.TIMESTAMP);
    }
  }, []);

  // Lire toutes les données nécessaires depuis Firebase
  var s1 = useState({}), classes = s1[0], setClasses = s1[1];
  var s2 = useState({}), evals = s2[0], setEvals = s2[1];
  var s3 = useState({}), sessions = s3[0], setSessions = s3[1];
  var s4 = useState({}), sessionActive = s4[0], setSessionActive = s4[1];
  var st = useState(0), tick = st[0], setTick = st[1]; // tick chrono (B-ii)
  var sE = useState(null), eleveAction = sE[0], setEleveAction = sE[1]; // {slug, nom}

  useEffect(function(){
    var detacherClasses = surveillerClassesAvecSexes(setClasses);
    db.ref(DB_ROOT+"/evaluations").on("value", function(s){ setEvals(s.val()||{}); });
    db.ref(DB_ROOT+"/sessions").on("value", function(s){ setSessions(s.val()||{}); });
    db.ref(DB_ROOT+"/sessionActive").on("value", function(s){ setSessionActive(s.val()||{}); });
    return function(){
      if(typeof detacherClasses === "function") detacherClasses();
      db.ref(DB_ROOT+"/evaluations").off();
      db.ref(DB_ROOT+"/sessions").off();
      db.ref(DB_ROOT+"/sessionActive").off();
    };
  }, []);

  // Tick chaque seconde pour rafraîchir l'affichage du chrono (B-ii)
  useEffect(function(){
    var id = setInterval(function(){ setTick(function(t){ return t+1; }); }, 1000);
    return function(){ clearInterval(id); };
  }, []);

  // Trouver la session active (la plus récente s'il y en a plusieurs)
  var activeSession = null;
  var activeClasseSlug = null;
  Object.keys(sessionActive).forEach(function(slug){
    var sid = sessionActive[slug];
    if(!sid || !sessions[sid]) return;
    var sess = Object.assign({id:sid}, sessions[sid]);
    if(sess.lastDisconnect && !sess.repriseConfirmee) return; // ignorer interrompue
    if(!activeSession || (sess.phaseStart||0) > (activeSession.phaseStart||0)){
      activeSession = sess; activeClasseSlug = slug;
    }
  });

  if(!activeSession){
    return h("div", {style:{padding:"2rem",color:"#fff",textAlign:"center",minHeight:"100vh"}},
      h("div", {style:{fontSize:"3rem",marginBottom:"1rem"}}, "📱"),
      h("h2", {style:{marginBottom:".5rem"}}, "Pilotage mobile"),
      h("p", {style:{opacity:.9}}, "Aucune session active. Lance une session depuis l'ordinateur.")
    );
  }

  var classe = classes[activeClasseSlug] || {nom:"?", eleves:[]};
  var ev = evals[activeSession.evalId] || {questions:[], titre:"?"};
  var qIdx = activeSession.qIdx;
  var question = (qIdx != null && qIdx >= 0 && ev.questions) ? ev.questions[qIdx] : null;
  var nextQuestion = (qIdx != null && ev.questions) ? ev.questions[qIdx+1] : null;
  var phase = activeSession.phase || "—";
  var totalQ = (ev.questions || []).length;

  // ─── Actions principales — déléguées à sessActions ───
  function actLancerQ(){ sessActions.lancerQ(activeSession, ev); }
  function actAutoriser(){ sessActions.autoriser(activeSession); }
  function actClore(){ sessActions.clore(activeSession, true); }
  function actTogglePause(){ sessActions.togglePause(activeSession, ev, question); }
  function actPlus5(){ sessActions.ajouterTemps(activeSession, 5); }
  function actRevealer(){ sessActions.revealer(activeSession); }
  function actLancerCorrection(){ sessActions.lancerCorrection(activeSession, ev); }
  function actLancerAutoeval(){ sessActions.lancerAutoeval(activeSession); }
  function actRouvrirTous(){ sessActions.rouvrirPourTous(activeSession); }
  function actRelancerChrono(){ sessActions.relancerChrono(activeSession); }
  function actPlus10(){ sessActions.ajouterTemps(activeSession, 10); }
  function actPlus30(){ sessActions.ajouterTemps(activeSession, 30); }
  function actQPrec(){ if(qIdx > 0) sessActions.allerAQuestion(activeSession, ev, qIdx-1); }
  function actQSuiv(){ if(qIdx != null && qIdx < totalQ-1) sessActions.allerAQuestion(activeSession, ev, qIdx+1); }
  function actCorrSuiv(){
    var ok = sessActions.correctionSuiv(activeSession, ev);
    if(!ok){
      // Dernière Q de correction → phase finie + archivage MJPC
      var reps = activeSession.reponses || {};
      // Reconstruction du dict de réponses pour archiverDansProfilsMJPC
      var reponsesPourArchive = {};
      Object.keys(reps).forEach(function(qi){ reponsesPourArchive[qi] = reps[qi]; });
      archiverDansProfilsMJPC(activeSession, ev, classe, reponsesPourArchive);
      db.ref(DB_ROOT+"/sessions/"+activeSession.id+"/phase").set("finie");
    }
  }
  function actCorrPrec(){ sessActions.correctionPrec(activeSession, ev); }
  function actTerminer(){
    sessActions.terminerSession(activeSession, true, ev);
  }
  function actRouvrirIndiv(slug){
    sessActions.rouvrirIndividuel(activeSession, slug);
    setEleveAction(null);
  }
  function actMarquerDepart(slug){
    sessActions.marquerDepart(activeSession, slug);
    setEleveAction(null);
  }
  function actMarquerRetour(slug){
    sessActions.marquerRetour(activeSession, slug);
    setEleveAction(null);
  }

  // Helper pour styles boutons mobile cohérents
  function phoneBtnStyle(variant, size){
    var pad = size === "large" ? ".85rem" : (size === "small" ? ".5rem" : ".7rem");
    var fs = size === "large" ? "1rem" : (size === "small" ? ".78rem" : ".88rem");
    var base = {padding:pad,border:"none",borderRadius:"10px",color:"#fff",fontWeight:"900",fontSize:fs,cursor:"pointer",fontFamily:"inherit",transition:"transform .1s,opacity .2s"};
    if(variant === "primary") base.background = "linear-gradient(135deg,var(--violet),var(--rose))";
    else if(variant === "turq") base.background = "linear-gradient(135deg,var(--turquoise),var(--bleu))";
    else if(variant === "or") { base.background = "linear-gradient(135deg,var(--jaune),#FF8C42)"; base.color = "var(--noir)"; }
    else if(variant === "rouge") base.background = "linear-gradient(135deg,var(--rouge),#DC2626)";
    else if(variant === "vert") base.background = "linear-gradient(135deg,#22C55E,#16A34A)";
    else if(variant === "jaune") { base.background = "var(--jaune)"; base.color = "var(--noir)"; }
    else { base.background = "rgba(255,255,255,.12)"; base.border = "2px solid rgba(255,255,255,.3)"; }
    return base;
  }
  var lancerLabel = (qIdx == null) ? "🚀 Lancer Q1" : ("🚀 Lancer Q"+(qIdx+2));
  var lancerDisabled = (qIdx != null && qIdx+1 >= totalQ);
  var pauseLabel = activeSession.paused ? "▶️ Reprendre" : "⏸️ Pause";
  // États désactivés selon la phase (B-i)
  var isReflex = (phase === "reflexion");
  var isResp = (phase === "reponse");
  var isActif = isReflex || isResp;
  var hasPaused = !!activeSession.paused;
  var disLancer = lancerDisabled || isActif;
  var disAutor = !isReflex;
  var disClore = !isActif;
  var disPause = !(isActif || hasPaused);
  var disPlus5 = !(isActif || hasPaused);
  var isCorr = (phase === "correction");
  var isAutoeval = (phase === "autoeval");
  var disRevealer = !isCorr || !!activeSession.corrRevealed;
  // En phase correction, la question à afficher (et son explication) est celle en cours
  // de correction (correctionIdx, ordonnée par taux d'erreur décroissant), pas celle qui
  // était posée en dernier (qIdx, qui reste figé sur la dernière de la phase poser).
  // Sorti au scope du composant pour être réutilisé hors de l'IIFE de rendu (notamment
  // pour l'affichage de l'explication ligne ~4146 ; bug : sans ça, l'explication montrée
  // sur le téléphone du prof restait celle de la dernière question posée).
  var qAffichee = isCorr ? (ev.questions && ev.questions[activeSession.correctionIdx]) : question;
  var qAfficheeIdx = isCorr ? activeSession.correctionIdx : qIdx;
  // Chrono restant (B-ii)
  var chronoVisible = isActif || hasPaused;
  var chronoSec = 0;
  if(hasPaused){
    chronoSec = activeSession.paused.remaining || 0;
  } else if(isActif){
    var dur = isReflex
      ? (question ? getNiveau(question.niveau).chrono : 10)
      : (activeSession.chronoReponse || 5);
    var elapsed = Math.floor((Date.now() - activeSession.phaseStart)/1000);
    chronoSec = Math.max(0, dur - elapsed);
  }
  var chronoColor = chronoSec <= 3 ? "var(--rouge)" : (chronoSec <= 5 ? "var(--jaune)" : "#fff");

  return h("div", {style:{padding:".7rem .7rem 0",color:"#fff",height:"100vh",display:"flex",flexDirection:"column",boxSizing:"border-box"}},
    // Bandeau (flex-shrink:0)
    h("div", {style:{background:"rgba(0,0,0,.35)",borderRadius:"10px",padding:".55rem .8rem",marginBottom:".5rem",flexShrink:0}},
      h("div", {style:{fontWeight:"900",fontSize:".95rem"}}, classe.nom),
      h("div", {style:{fontSize:".75rem",opacity:.85}}, ev.titre),
      h("div", {style:{marginTop:".3rem",fontSize:".8rem",fontWeight:"bold"}}, "Phase : "+phase+" — Q "+(qIdx != null ? (qIdx+1) : "—")+"/"+totalQ)
    ),
    // Chrono restant (B-ii)
    chronoVisible && h("div", {style:{background:"rgba(0,0,0,.3)",borderRadius:"10px",padding:".35rem",marginBottom:".5rem",textAlign:"center",flexShrink:0}},
      h("div", {style:{fontSize:"2.4rem",fontWeight:"900",color:chronoColor,lineHeight:"1",fontVariantNumeric:"tabular-nums"}},
        (hasPaused ? "⏸ " : "") + chronoSec + "s"
      )
    ),
    // Q en cours (avec bonne réponse pour rester focus sur le SENS)
    (function(){
      // qAffichee / qAfficheeIdx sont définis au scope du composant (cf. plus haut).
      if(!qAffichee) return null;
      var bonnes = (qAffichee.bonnes||[]).slice().sort();
      var libBonnes = bonnes.map(function(idx){
        var lettre = lettreFromIndex(idx);
        var txt = (qAffichee.choix||[])[idx] || "";
        return lettre+". "+txt;
      });
      return h("div", {style:{background:"rgba(255,255,255,.95)",color:"var(--noir)",borderRadius:"10px",padding:".55rem .8rem",marginBottom:".35rem",flexShrink:0}},
        h("div", {style:{fontWeight:"900",fontSize:".7rem",color:"var(--violet)",letterSpacing:".05em",marginBottom:".15rem"}}, "Q"+(qAfficheeIdx+1)),

// M7 — DICTIONNAIRE DE TEXTES ADRESSÉS À L'ÉLÈVE (point 26)
// ════════════════════════════════════════════════════════════════════
// Critère de tri : ce qui CONSTATE reste en dur, ce qui ANNONCE est éditable.
// Le code porte les valeurs par défaut (l'app vit si Firebase tombe) ; le nœud
// qcm/textes les surcharge. Un champ vide retombe TOUJOURS sur le défaut.
var TEXTES_DEFAUT = {
  attente_session:  "L'évaluation n'a pas encore commencé. Elle s'ouvrira quand nous la lancerons ensemble.",
  attente_correction: "La correction s'ouvrira dans un instant.",
  fin_session:      "C'est terminé. Tes réponses sont enregistrées."
};
var TEXTES_CHAMPS = [
  ["attente_session","Avant le lancement de l'évaluation","Vu par l'élève qui ouvre l'application alors qu'aucune évaluation n'est lancée pour sa classe."],
  ["attente_correction","Avant la correction","Vu quand la phase de réponse est close et que la correction n'est pas encore lancée."],
  ["fin_session","À la fin de l'évaluation","Vu quand tu as terminé la session. Ce texte s'affiche quel que soit le résultat : il parle du travail fait, jamais de la réussite."]
];
var TEXTES_SURCHARGE = {};
function txt(cle, vars){
  var v = TEXTES_SURCHARGE[cle];
  if(typeof v !== "string" || !v.trim()) v = TEXTES_DEFAUT[cle];
  if(typeof v !== "string") return "";
  if(vars){ for(var k in vars){ if(Object.prototype.hasOwnProperty.call(vars,k)) v = v.split("{"+k+"}").join(vars[k]); } }
  return v;
}
function chargerTextes(cb){
  try{
    db.ref(DB_ROOT+"/textes").on("value", function(snap){
      var v = snap.val();
      TEXTES_SURCHARGE = (v && typeof v === "object") ? v : {};
      if(cb) cb();
    }, function(){ TEXTES_SURCHARGE = {}; if(cb) cb(); });
  }catch(e){ TEXTES_SURCHARGE = {}; if(cb) cb(); }
}

function EditeurTextes(){
  var sV = useState(null), vals = sV[0], setVals = sV[1];
  var sM = useState(""), msg = sM[0], setMsg = sM[1];
  useEffect(function(){
    db.ref(DB_ROOT+"/textes").once("value", function(snap){ setVals(snap.val() || {}) }, function(){ setVals({}) });
  }, []);
  function enregistrer(cle, valeur){
    var v = Object.assign({}, vals);
    if(!valeur || !valeur.trim()){ delete v[cle]; } else { v[cle] = valeur; }
    setVals(v);
    db.ref(DB_ROOT+"/textes").set(v)
      .then(function(){ setMsg("Enregistré."); setTimeout(function(){setMsg("")}, 1800); })
      .catch(function(e){ setMsg("Échec de l'enregistrement : " + (e && e.message || "")); });
  }
  if(!vals) return h("div", {className:"card"}, h("h2", null, "💬 Ce que lisent les élèves"), h("p", null, "Chargement…"));
  return h("div", {className:"card"},
    h("h2", null, "💬 Ce que lisent les élèves",
      h(InfoI, null, "Les messages qui CONSTATENT un état ne sont pas modifiables : ils sont vrais dans tous les cas. Seuls les messages qui ANNONCENT quelque chose sont ici, parce qu'eux dépendent de ton organisation.")
    ),
    h("p", {style:{opacity:.85}}, h("strong", null, "Éditeur des messages élève."), " Ces phrases s'affichent sur les tablettes de tes élèves. Modifie-les librement : un champ laissé vide revient au texte d'origine."),
    TEXTES_CHAMPS.map(function(c){
      var cle = c[0], surcharge = vals[cle];
      var courant = (typeof surcharge === "string") ? surcharge : TEXTES_DEFAUT[cle];
      return h("div", {key:cle, style:{marginBottom:"1rem"}},
        h("label", {style:{display:"block", fontWeight:600, marginBottom:".25rem"}}, c[1],
          typeof surcharge === "string" ? h("span", {style:{marginLeft:".5rem", fontSize:".72rem", opacity:.8}}, "modifié") : null),
        h("textarea", {rows:2, defaultValue:courant, style:{width:"100%", fontFamily:"inherit", fontSize:".9rem", padding:".5rem", borderRadius:"8px"},
          onBlur:function(e){ if(e.target.value !== courant) enregistrer(cle, e.target.value); }}),
        h("p", {style:{fontSize:".78rem", opacity:.7, margin:".2rem 0 0"}}, c[2]),
        typeof surcharge === "string" ? h("button", {className:"btn btn-sm btn-ghost", style:{marginTop:".25rem"},
          onClick:function(){ enregistrer(cle, "") }}, "Revenir au texte d'origine") : null
      );
    }),
    msg ? h("p", {style:{fontWeight:600}}, msg) : null
  );
}

// M7 — NAVIGATION DEUX NIVEAUX (structure ; la charte du QCM est intouchée)
// ════════════════════════════════════════════════════════════════════
// Les onglets ne sont pas rouverts : ils sont RANGÉS. Chaque groupe coiffe des
// onglets qui restent les mêmes composants, montés avec les mêmes props.
var NAV2_GROUPES = [
  {id:"pilotage", label:"Pilotage", tabs:[["preparation","📄 Préparation"],["evals","📝 Évaluations"],["pilot","🎯 Pilotage classe"]]},
  {id:"donnees",  label:"Données",  tabs:[["results","📊 Résultats"],["snapshot","💾 Sauvegarde"]]},
  {id:"reglages", label:"Réglages", tabs:[["reglages","⚙️ Réglages"]]}
];
function groupeDeTab(tab){
  for(var i=0;i<NAV2_GROUPES.length;i++){
    var t = NAV2_GROUPES[i].tabs;
    for(var j=0;j<t.length;j++){ if(t[j][0] === tab) return NAV2_GROUPES[i].id; }
  }
  return null;
}
function Nav2(p){
  var courant = null;
  for(var i=0;i<NAV2_GROUPES.length;i++){ if(NAV2_GROUPES[i].id === p.groupe) courant = NAV2_GROUPES[i]; }
  if(!courant) courant = NAV2_GROUPES[0];
  return h("div", {className:"nav2"},
    h("div", {className:"nav2-groupes"},
      NAV2_GROUPES.map(function(g){
        return h("button", {key:g.id, className:"nav2-groupe"+(g.id===p.groupe?" actif":""), onClick:function(){
          p.onGroupe(g.id);
          var dedans = false;
          for(var k=0;k<g.tabs.length;k++){ if(g.tabs[k][0] === p.tab) dedans = true; }
          if(!dedans) p.onTab(g.tabs[0][0]);
        }}, g.label);
      }),
      h("button", {className:"nav2-aide", title:"Aide et nouveautés", onClick:p.onAide}, "?")
    ),
    h("div", {className:"nav2-sous"},
      courant.tabs.length > 1 ? courant.tabs.map(function(t){
        return h("button", {key:t[0], className:"tab "+(p.tab===t[0]?"actif":""), onClick:function(){p.onTab(t[0])}}, t[1]);
      }) : null
    )
  );
}

  useEffect(function(){ publierManifeste(db); }, []);
  useEffect(function(){
    db.ref(DB_ROOT+"/evaluations").on("value", function(snap){ setEvalsPourCloture(snap.val() || {}); });
    return function(){ db.ref(DB_ROOT+"/evaluations").off(); };
  }, []);
  useEffect(function(){ var g = groupeDeTab(tab); if(g && g !== groupe) setGroupe(g); }, [tab]);

        msg += "\n\nC'est fait une seule fois.";
        alert(msg);
      }
    });
  }, []);

  useEffect(function(){
    var refSA = db.ref(DB_ROOT+"/sessionActive");
    var refS = db.ref(DB_ROOT+"/sessions");
    var hSA = refSA.on("value", function(s){ setSessionActive(s.val() || {}); });
    var hS = refS.on("value", function(s){ setSessions(s.val() || {}); });
    // Lecture des classes au format interne (slug → {nom, eleves, …}) pour pouvoir
    // récupérer le nom par classes[classeSlug].nom (cf. menu sessions actives).
    var detacherClasses = surveillerClassesAvecSexes(setClassesData);
    return function(){
      refSA.off("value", hSA);
      refS.off("value", hS);
      if(typeof detacherClasses === "function") detacherClasses();
    };
  }, []);

  // Calcul des sessions actives (test + réelles, hors interrompues)
  var sessionsActives = [];
  Object.keys(sessionActive).forEach(function(classeSlug){

    if(!sid || !sessions[sid]) return;
    var sess = sessions[sid];
    if(sess.lastDisconnect && !sess.repriseConfirmee) return;
    sessionsActives.push({
      classeSlug:classeSlug,
      sid:sid,
      sess:sess,
      isTest:classeSlug === TEST_CLASSE_SLUG,

    cloturerSession(Object.assign({id:s.sid}, s.sess), evalsPourCloture[s.sess.evalId]);

        ),

            onClick:function(){setSessionsMenuOpen(true)},
            title:"Une ou plusieurs sessions sont actuellement en cours quelque part (réelles ou test). Clique pour voir le détail et choisir où aller, ou terminer une session qui traîne."
          },
            h("span", {className:"badge-session-dot"}, "🔴"),
            sessionsActives.length + " session" + (sessionsActives.length>1?"s":"") + " en cours"
          ),
          h("button", {className:"btn-help", onClick:function(){setHelpOpen(true)}, title:"Ouvre le mode d'emploi avec toutes les explications de l'app."}, "📖 Mode d'emploi"),
          h("button", {className:"btn btn-ghost btn-sm", onClick:function(){

            var w = Math.min(1280, screen.width);
            var h = Math.min(800, screen.height);
            window.open(window.location.pathname+"#mode=prof&view=board", "BoardWindow",
              "width="+w+",height="+h+",toolbar=no,menubar=no,location=no,status=no,scrollbars=yes,resizable=yes");
          }, title:"Ouvre la vue tableau dans une NOUVELLE FENÊTRE (pas un onglet) que tu peux glisser sur l'écran qui projette. Utilise W+P en mode \"Étendre\" sur Windows pour avoir un bureau virtuel sur le vidéoprojecteur, puis F11 pour plein écran. Cette vue n'affiche QUE la question (sans contrôles), garantissant que le pilotage ne peut jamais être projeté par erreur."}, "📺 Ouvrir vue tableau"),
          h("button", {className:"btn btn-ghost btn-sm", onClick:function(){setQrOpen(true)}, title:"Affiche un QR code à scanner avec ton téléphone pour piloter la classe à distance (depuis le fond de la salle par exemple). La fenêtre se ferme automatiquement dès que le scan est détecté."}, "📱 QR pilotage"),
          h("button", {className:"btn-test", onClick:function(){setTestMode(true)}, title:"Ouvre un environnement de test isolé : une classe fictive avec 3 élèves simulés et une éval test pré-remplie. Tu pilotes côté prof en haut, et tu vois et contrôles les 3 panneaux élèves en dessous, le tout dans la même fenêtre. Pratique pour découvrir l'app, tester un changement, ou former un collègue. À la sortie, tout est purgé automatiquement."}, "🧪 Mode test",

          ),

// M7 — L'ONGLET CLASSES A ÉTÉ RETIRÉ (décision Paul, 18/07)
// ════════════════════════════════════════════════════════════════════
// L'identité (classes, élèves, sexes) appartient au site MJPC : une app ne la
// gère pas. C'est `ajouterClasse` qui réintroduisait les sexes M/F dans
// /classes après la mutualisation (bug du registre §3). Le geste est remplacé
// par un renvoi vers la console, dans Réglages.
// SAUVÉE de l'ancien composant (utile hors de lui) : deduireNiveauDuNom, la
// fonction recommandée par le plan pour la dette « niveau écrasé » (option B :
// déduire le niveau du nom plutôt que de le stocker).
function deduireNiveauDuNom(nom){
  var m = nom.match(/\b([3-6])\s*[eèEÈ]\b/);
  if(m) return m[1]+"e";
  return "";
}

          ),

                      "version " + versionEval(e)) : null),
                  h("div", {className:"eval-meta"},

// ─────────── Modal Prompt IA ───────────
function ModalPromptIA(p){
  var s1 = useState(PROMPT_IA), prompt = s1[0], setPrompt = s1[1];
  var s2 = useState(false), editing = s2[0], setEditing = s2[1];
  var s3 = useState(PROMPT_IA), draft = s3[0], setDraft = s3[1];
  var s4 = useState(""), msg = s4[0], setMsg = s4[1];

  useEffect(function(){
    db.ref(DB_ROOT+"/settings/promptIa").once("value", function(snap){
      var v = snap.val();
      if(v){ setPrompt(v); setDraft(v); PROMPT_IA = v; }
    });
  }, []);

  function copier(){
    try{
      navigator.clipboard.writeText(prompt);
      setMsg("✅ Prompt copié dans le presse-papiers");
      setTimeout(function(){setMsg("")}, 2500);
    }catch(e){
      setMsg("⚠️ Copie automatique impossible. Sélectionne le texte et copie manuellement.");
    }
  }
  function ouvrirEdition(){
    setDraft(prompt);
    setEditing(true);
    setMsg("");
  }
  function enregistrer(){
    db.ref(DB_ROOT+"/settings/promptIa").set(draft, function(err){
      if(err){ setMsg("❌ Erreur: "+err.message); return; }
      setPrompt(draft);
      PROMPT_IA = draft;
      setEditing(false);
      setMsg("✅ Prompt enregistré. Il sera réutilisé la prochaine fois.");
      setTimeout(function(){setMsg("")}, 3000);
    });
  }
  function restaurerDefaut(){
    if(!confirm("Restaurer le prompt par défaut ? Tes modifications actuelles seront perdues (le prompt enregistré dans Firebase sera écrasé après ton clic sur « Enregistrer »).")) return;
    setDraft(PROMPT_IA_DEFAUT);
  }
  function annuler(){
    setDraft(prompt);
    setEditing(false);
    setMsg("");
  }

  return h("div", {className:"modal-back", onClick:function(e){if(e.target.className==="modal-back")p.onClose()}},
    h("div", {className:"modal", style:{maxWidth:"720px"}},
      h("button", {className:"modal-close", onClick:p.onClose}, "✕"),
      h("h2", null, "🤖 Prompt à coller dans une IA",

      ),
      h("p", {style:{fontSize:".9rem",color:"var(--gris)",marginBottom:".8rem"}},
        "Copie ce prompt et colle-le dans une nouvelle conversation Claude. L'IA te générera un QCM au format JSON que tu pourras coller directement dans le champ « Nouvelle évaluation »."
      ),
      !editing && h("div", {className:"row", style:{gap:".5rem",flexWrap:"wrap"}},
        h("button", {className:"btn btn-primary", onClick:copier, title:"Copie le prompt actuel dans le presse-papiers."}, "📋 Copier le prompt"),
        h("button", {className:"btn btn-ghost", onClick:ouvrirEdition, title:"Ouvre l'éditeur pour modifier le prompt. Les modifications sont enregistrées dans Firebase et réutilisées la prochaine fois."}, "✏️ Modifier le prompt")
      ),
      editing && h("div", null,
        h("textarea", {value:draft, onChange:function(e){setDraft(e.target.value)}, style:{width:"100%",minHeight:"320px",fontFamily:"ui-monospace,monospace",fontSize:".85rem",padding:".7rem",border:"2px solid var(--violet)",borderRadius:"8px"}}),
        h("div", {className:"row", style:{gap:".5rem",flexWrap:"wrap",marginTop:".7rem"}},
          h("button", {className:"btn btn-primary", onClick:enregistrer, title:"Enregistre ce prompt dans Firebase. Il sera réutilisé à chaque ouverture du modal, sur tous les appareils."}, "💾 Enregistrer"),
          h("button", {className:"btn btn-ghost", onClick:annuler, title:"Annule les modifications et revient au prompt enregistré."}, "↩️ Annuler"),
          h("button", {className:"btn btn-ghost", onClick:restaurerDefaut, title:"Remplace le brouillon par le prompt fourni par défaut avec l'app. Tu pourras ensuite cliquer sur « Enregistrer » pour le rendre actif."}, "🔄 Restaurer le prompt par défaut")
        )
      ),

// ─────────── Modal Création / Édition d'évaluation ───────────
function ModalCreerEval(p){
  var s1 = useState(p.evaluation ? JSON.stringify({titre:p.evaluation.titre, questions:p.evaluation.questions}, null, 2) : ""), texte = s1[0], setTexte = s1[1];
  var s2 = useState(p.evaluation ? {titre:p.evaluation.titre, questions:p.evaluation.questions} : null), parsed = s2[0], setParsed = s2[1];
  var s3 = useState(""), parseErr = s3[0], setParseErr = s3[1];

  function tryParse(){
    setParseErr("");
    var r = parseEvaluation(texte);
    if(r.error){ setParseErr(r.error); setParsed(null); return; }
    setParsed(r);
  }

  // Auto-parse à l'ouverture si on édite
  useEffect(function(){
    if(texte && !parsed) tryParse();
  }, []);

  function changerNiveau(qIndex, nivId){
    if(!parsed) return;
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    copy.questions[qIndex] = Object.assign({}, copy.questions[qIndex], {niveau:nivId});
    setParsed(copy);
    setTexte(JSON.stringify({titre:copy.titre, questions:copy.questions}, null, 2));
  }
  function mettreAJour(newParsed){
    setParsed(newParsed);
    setTexte(JSON.stringify({titre:newParsed.titre, questions:newParsed.questions}, null, 2));
    setParseErr("");
  }

  function enregistrer(){
    if(!parsed){ alert("Aucune évaluation valide à enregistrer. Clique sur 'Vérifier le format' d'abord."); return; }
    var id = p.editId || ("eval_" + Date.now());
    var ancienne = p.evaluation || null;
    var versionCourante = versionEval(ancienne);
    // ═══ P2 ② — l'instrument de mesure est versionné ═══
    // Modifier une évaluation qui a déjà servi ne met pas à jour un instrument :
    // cela en crée un NOUVEAU. Les sessions passées gardent leur énoncé figé,
    // et leurs résultats ne se mélangeront jamais avec ceux de la version suivante.
    var aServi = !!(p.editId && evalADesResultats(p.editId, p.sessions || {}));
    var nouvelleVersion = versionCourante;
    if(aServi){
      nouvelleVersion = versionCourante + 1;
      if(!confirm(
        "Cette évaluation a déjà servi en classe.\n\n" +
        "Tes modifications créeront la VERSION " + nouvelleVersion + ".\n\n" +
        "• Les sessions déjà passées gardent l'énoncé et le barème d'origine — leurs résultats ne bougent pas.\n" +
        "• Les résultats de la version " + nouvelleVersion + " ne seront jamais mélangés avec ceux de la version " + versionCourante + ".\n\n" +
        "Enregistrer la version " + nouvelleVersion + " ?"
      )) return;
    }
    var data = {
      titre: parsed.titre,
      questions: parsed.questions,
      version: nouvelleVersion,
      createdAt: ancienne && ancienne.createdAt ? ancienne.createdAt : Date.now(),
      updatedAt: Date.now()
    };
    if(aServi) data.versionPrecedenteLe = Date.now();
    db.ref(DB_ROOT+"/evaluations/"+id).set(data, function(err){
      if(err){ alert("Erreur: "+err.message); return; }
      p.onClose();
    });
  }

  return h("div", {className:"modal-back", onClick:function(e){if(e.target.className==="modal-back")p.onClose()}},
    h("div", {className:"modal"},
      h("button", {className:"modal-close", onClick:p.onClose}, "✕"),
      h("h2", null, p.editId ? "✏️ Modifier l'évaluation" : "➕ Nouvelle évaluation"),
      h("div", {className:"field"},
        h("label", null,
          "Coller le JSON de l'évaluation",
          h(InfoI, null, "Colle ici le JSON généré par l'IA (utilise le bouton « Prompt IA » pour obtenir le format attendu). Tu peux aussi écrire le JSON à la main.")
        ),
        h("textarea", {className:"json", value:texte, onChange:function(e){setTexte(e.target.value)}, placeholder:'{\n  "titre": "Mon évaluation",\n  "questions": [\n    {"enonce":"...","choix":[...],"bonnes":[0],"niveau":"standard"}\n  ]\n}'})
      ),
      h("div", {className:"row"},
        h("button", {className:"btn btn-ghost", onClick:tryParse, title:"Parse le JSON ci-dessus et l'affiche en mode éditable ci-dessous."}, "🔍 Vérifier le format"),
        !parsed && h("button", {className:"btn btn-ghost", onClick:function(){
          var blank = {titre:"Nouvelle évaluation", questions:[{enonce:"", choix:["", ""], bonnes:[], niveau:"standard", explication:""}]};
          mettreAJour(blank);
        }, title:"Crée une évaluation vide pour la construire directement dans l'éditeur visuel ci-dessous (sans passer par l'IA)."}, "✨ Démarrer à blanc")
      ),
      parseErr && h("div", {className:"preview-error"}, "❌ "+parseErr),
      parsed && h(PreviewEval, {parsed:parsed, onChangerNiveau:changerNiveau, onUpdate:mettreAJour}),
      parsed && h("div", {className:"row", style:{marginTop:"1rem"}},
        h("button", {className:"btn btn-primary", onClick:enregistrer}, "💾 Enregistrer l'évaluation")
      )
    )
  );
}

// ─────────── Preview évaluation (éditable in-place) ───────────
function PreviewEval(p){
  var parsed = p.parsed;
  function commit(copy){ p.onUpdate ? p.onUpdate(copy) : null; }
  function modifTitre(v){ commit(Object.assign({}, parsed, {titre:v})); }
  function modifQ(qi, modif){
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    copy.questions[qi] = Object.assign({}, copy.questions[qi], modif);
    commit(copy);
  }
  function modifChoix(qi, ci, val){
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var q = Object.assign({}, copy.questions[qi]);
    q.choix = q.choix.slice();
    q.choix[ci] = val;
    copy.questions[qi] = q;
    commit(copy);
  }
  function toggleBonne(qi, ci){
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var q = Object.assign({}, copy.questions[qi]);
    var bonnes = (q.bonnes || []).slice();
    var idx = bonnes.indexOf(ci);
    if(idx >= 0) bonnes.splice(idx, 1);
    else bonnes.push(ci);
    bonnes.sort(function(a,b){return a-b});
    q.bonnes = bonnes;
    copy.questions[qi] = q;
    commit(copy);
  }
  function ajouterChoix(qi){
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var q = Object.assign({}, copy.questions[qi]);
    q.choix = (q.choix || []).slice();
    q.choix.push("");
    copy.questions[qi] = q;
    commit(copy);
  }
  function suppChoix(qi, ci){
    if((parsed.questions[qi].choix || []).length <= 2){ alert("Au moins 2 choix obligatoires par question."); return; }
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var q = Object.assign({}, copy.questions[qi]);
    q.choix = q.choix.slice();
    q.choix.splice(ci, 1);
    q.bonnes = (q.bonnes || []).filter(function(x){return x !== ci}).map(function(x){return x > ci ? x-1 : x});
    copy.questions[qi] = q;
    commit(copy);
  }
  function suppQ(qi){
    if(!confirm("Supprimer la question Q"+(qi+1)+" ? Cette action ne peut pas être annulée (sauf si tu n'enregistres pas l'évaluation).")) return;
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    copy.questions.splice(qi, 1);
    commit(copy);
  }
  function modifMode(v){ commit(Object.assign({}, parsed, {mode: (v === "partiel") ? "partiel" : "strict"})); }
  function ajouterQ(){
    var copy = Object.assign({}, parsed);
    copy.questions = (copy.questions || []).slice();
    copy.questions.push({enonce:"", choix:["", ""], bonnes:[], niveau:"standard", explication:""});
    commit(copy);
  }
  function deplacerQ(qi, dir){
    var nv = qi + dir;
    if(nv < 0 || nv >= parsed.questions.length) return;
    var copy = Object.assign({}, parsed);
    copy.questions = copy.questions.slice();
    var tmp = copy.questions[nv];
    copy.questions[nv] = copy.questions[qi];
    copy.questions[qi] = tmp;
    commit(copy);
  }

  var modeActuel = modeEval(parsed);
  return h("div", {className:"preview"},
    h("div", {className:"preview-titre-row"},
      h("input", {className:"preview-titre-input", value:parsed.titre || "", onChange:function(e){modifTitre(e.target.value)}, placeholder:"Titre de l'évaluation"}),

    ),
    h("div", {className:"preview-mode-row", style:{marginBottom:".8rem",padding:".7rem .9rem",background:"#FFF9E6",border:"2px solid #FFD23F",borderRadius:"10px"}},
      h("div", {style:{fontWeight:900,fontSize:".9rem",color:"#8B6914",marginBottom:".4rem"}}, "📊 Mode de scoring",
        h(InfoI, null, "Définit comment l'app comptabilise les réponses sur toutes les questions de cette éval. Le mode est annoncé aux élèves au début de l'évaluation, avec une explication adaptée. Une question vaut toujours autant de points qu'elle compte de bonnes cases (Q à 1 bonne = 1 pt, Q à 3 bonnes = 3 pts).")
      ),
      h("div", {style:{display:"flex",gap:".5rem",flexWrap:"wrap"}},
        h("label", {style:{flex:"1 1 auto",minWidth:"180px",cursor:"pointer",padding:".5rem .7rem",border:"2px solid "+(modeActuel==="strict"?"var(--violet)":"var(--bordure)"),borderRadius:"8px",background:modeActuel==="strict"?"rgba(106,76,224,.08)":"#fff",display:"flex",alignItems:"center",gap:".5rem",fontSize:".85rem",fontWeight:600}},
          h("input", {type:"radio", name:"eval-mode", value:"strict", checked:modeActuel==="strict", onChange:function(){modifMode("strict")}}),
          h("span", null, "🎯 Tout ou rien",
            h("div", {style:{fontSize:".72rem",color:"var(--gris)",fontWeight:400,marginTop:".15rem"}}, "Réponse exacte = max ; sinon 0")
          )
        ),
        h("label", {style:{flex:"1 1 auto",minWidth:"180px",cursor:"pointer",padding:".5rem .7rem",border:"2px solid "+(modeActuel==="partiel"?"var(--violet)":"var(--bordure)"),borderRadius:"8px",background:modeActuel==="partiel"?"rgba(106,76,224,.08)":"#fff",display:"flex",alignItems:"center",gap:".5rem",fontSize:".85rem",fontWeight:600}},
          h("input", {type:"radio", name:"eval-mode", value:"partiel", checked:modeActuel==="partiel", onChange:function(){modifMode("partiel")}}),

      h(InfoI, null, "Édition in-place : tu modifies chaque question directement dans cette zone (énoncé, choix, bonnes réponses, niveau, explication). Le JSON ci-dessus est mis à jour automatiquement. Tu peux aussi modifier le JSON directement et cliquer sur « Vérifier le format » pour rebasculer en mode visuel.")
    ),

// ─────────── Feuille d'impression ───────────
function FeuilleImpression(p){
  var ev = p.evaluation;
  useEffect(function(){
    // Activer le mode impression : masque le panneau prof, ne laisse que la feuille visible
    document.body.classList.add("impression-active");
    // Lancer l'impression après render
    var t = setTimeout(function(){
      window.print();
    }, 300);
    return function(){
      clearTimeout(t);
      document.body.classList.remove("impression-active");
    };
  }, []);

  var contenu = h(React.Fragment, null,
    h("button", {className:"btn-fermer-impression no-print", onClick:p.onClose}, "✕ Fermer"),
    h("div", {className:"feuille-impression visible"},
      h("div", {className:"feuille-header"},
        h("h1", null, ev.titre),
        h("div", {className:"ligne-info"},
          h("div", {className:"champ"},
            h("strong", null, "Nom :"),
            h("div", {className:"blanc"})
          ),
          h("div", {className:"champ"},
            h("strong", null, "Classe :"),
            h("div", {className:"blanc"})
          ),
          h("div", {className:"champ"},
            h("strong", null, "Date :"),
            h("div", {className:"blanc"})
          )
        )
      ),
      ev.questions.map(function(q, i){
        var niv = getNiveau(q.niveau);
        return h("div", {key:i, className:"feuille-q"},
          h("div", {className:"feuille-q-top"},
            h("div", {className:"feuille-q-num"}, "Question "+(i+1)),
            h("div", {className:"feuille-q-niv", style:{background:niv.color}, title:niv.label})
          ),
          h("div", {className:"feuille-q-enonce"}, q.enonce),
          h("div", {className:"feuille-cadre"}, "Rédige ta réponse en entier ici."),
          h("div", {className:"feuille-lettres"},
            q.choix.map(function(_, j){
              return h("span", {key:j}, lettreFromIndex(j));
            })
          )
        );
      })
    )
  );
  // Rendu via Portal pour sortir du panneau prof
  return ReactDOM.createPortal(contenu, document.body);
}

// ─────────── Onglet Pilotage classe ───────────
function OngletPilotage(){
  var s1 = useState({}), classes = s1[0], setClasses = s1[1];
  var s2 = useState({}), evals = s2[0], setEvals = s2[1];
  var s3 = useState(""), classeSlug = s3[0], setClasseSlug = s3[1];
  var s4 = useState(""), evalId = s4[0], setEvalId = s4[1];
  var s5 = useState(null), session = s5[0], setSession = s5[1];
  var s6 = useState({}), allSessions = s6[0], setAllSessions = s6[1];
  var s7 = useState(false), checkinOpen = s7[0], setCheckinOpen = s7[1];
  var s8 = useState({}), absentsCheck = s8[0], setAbsentsCheck = s8[1]; // {slug: true} pour absents
  var s9 = useState(null), sessionInterrompue = s9[0], setSessionInterrompue = s9[1];

  useEffect(function(){
    var detacherClasses = surveillerClassesAvecSexes(setClasses);
    db.ref(DB_ROOT+"/evaluations").on("value", function(s){ setEvals(s.val()||{}) });
    db.ref(DB_ROOT+"/sessions").on("value", function(s){ setAllSessions(s.val()||{}) });
    return function(){
      if(typeof detacherClasses === "function") detacherClasses();
      db.ref(DB_ROOT+"/evaluations").off();
      db.ref(DB_ROOT+"/sessions").off();
    };
  }, []);

  // Surveille la session active de la classe
  useEffect(function(){
    if(!classeSlug){ setSession(null); setSessionInterrompue(null); return; }
    db.ref(DB_ROOT+"/sessionActive/"+classeSlug).on("value", function(snap){
      var sid = snap.val();
      if(!sid){ setSession(null); setSessionInterrompue(null); return; }
      db.ref(DB_ROOT+"/sessions/"+sid).on("value", function(s2){
        var sess = s2.val();
        if(!sess) return;
        sess.id = sid;
        // Si la session a un lastDisconnect ET n'est pas déjà reprise, c'est une session interrompue
        // On affiche la modale de choix au lieu d'ouvrir directement la session
        if(sess.lastDisconnect && !sess.repriseConfirmee){
          setSessionInterrompue(sess);
          setSession(null); // on n'entre PAS dans le pilotage actif tant que choix pas fait
        } else {
          setSessionInterrompue(null);
          setSession(sess);
        }
      });
    });
    return function(){
      db.ref(DB_ROOT+"/sessionActive/"+classeSlug).off();
    };
  }, [classeSlug]);

  // Reprendre une session interrompue : on efface lastDisconnect et on marque repriseConfirmee
  function reprendreSession(){
    if(!sessionInterrompue) return;
    var sid = sessionInterrompue.id;
    var updates = {};
    updates["/sessions/"+sid+"/lastDisconnect"] = null; // efface
    updates["/sessions/"+sid+"/repriseConfirmee"] = Date.now();
    db.ref(DB_ROOT).update(updates, function(err){
      if(err){ alert("Erreur : "+err.message); return; }
      // setSessionInterrompue(null) sera fait par le listener qui détecte la disparition de lastDisconnect
    });
  }

  // Terminer définitivement une session interrompue
  function terminerDefinitivement(){
    if(!sessionInterrompue) return;
    if(!confirm("Terminer définitivement la session ?\n\nLes réponses déjà données restent enregistrées et consultables dans Résultats. Cette action est irréversible.")) return;
    var sid = sessionInterrompue.id;
    // P2 — porte dérobée refermée (audit du 18/07) : une session interrompue que
    // le professeur termine EST une clôture ; ses réponses restent consultables,
    // donc son énoncé doit être figé comme les autres.
    cloturerSession(Object.assign({}, sessionInterrompue, {id:sid}), evals[sessionInterrompue.evalId]);
    var updates = {};
    updates["/sessions/"+sid+"/lastDisconnect"] = null;
    db.ref(DB_ROOT).update(updates, function(err){
      if(err){ alert("Erreur : "+err.message); return; }
      setSessionInterrompue(null);
      setSession(null);
    });
  }

  // Calcule les sessions passées par classe et par évaluation
  function sessionsPourClasse(slug){
    return Object.keys(allSessions)
      .map(function(k){return Object.assign({id:k}, allSessions[k])})
      .filter(function(s){return s.classeSlug === slug});
  }
  function evalDejaPassee(evalSlug, classeSlug){
    return sessionsPourClasse(classeSlug).some(function(s){return s.evalId === evalSlug});
  }

  function lancerSession(){
    if(!classeSlug || !evalId){ alert("Choisis une classe et une évaluation"); return; }
    if(evalDejaPassee(evalId, classeSlug)){
      if(!confirm("⚠️ Cette évaluation a déjà été passée par cette classe.\n\nLancer quand même une nouvelle session ?")) return;
    }
    // Ouvrir la modale de check-in obligatoire avant lancement effectif
    setAbsentsCheck({});
    setCheckinOpen(true);
  }

  function lancerSessionApresCheckin(){
    var sid = "sess_"+Date.now();
    var classe = classes[classeSlug];
    var eleves = (classe && classe.eleves) || [];
    // Liste des slugs absents cochés (filtre pour ne garder que ceux de la classe)
    var absentsList = eleves.map(function(e){return slugify(e.nomComplet)}).filter(function(s){return absentsCheck[s]});
    // Historique de présence : entrée initiale par élève absent
    var presenceHistory = {};
    var now = Date.now();
    absentsList.forEach(function(slug){
      // Clé Firebase friendly avec timestamp
      var k = "h_"+now+"_"+Math.random().toString(36).slice(2,7);
      presenceHistory[slug] = {};
      presenceHistory[slug][k] = {ts:now, etat:"absent"};
    });
    var sess = {
      classeSlug:classeSlug,
      evalId:evalId,
      date:now,
      phase:"idle",
      qIdx:null,
      etat:"en_cours"
    };
    if(absentsList.length > 0){
      sess.absents = absentsList;
      sess.presence_history = presenceHistory;
    }
    db.ref(DB_ROOT+"/sessions/"+sid).set(sess, function(err){
      if(err){ alert("Erreur: "+err.message); return; }
      db.ref(DB_ROOT+"/sessionActive/"+classeSlug).set(sid);
      setCheckinOpen(false);
      setAbsentsCheck({});
    });
  }

  function terminerSession(){
    if(!session) return;
    if(!confirm("Terminer la session ? Les élèves verront un écran de fin.")) return;
    cloturerSession(session, evals[session.evalId]);   // P2 : fige l'énoncé et le barème
  }

  // Modale prioritaire : session interrompue détectée → choix obligatoire avant de continuer
  if(sessionInterrompue){
    var classeSI = classes[classeSlug];
    var evSI = evals[sessionInterrompue.evalId];

      Object.values(sessionInterrompue.reponses).forEach(function(repsQ){
        nbReponsesPartielles += Object.keys(repsQ || {}).length;
      });
    }
    var dateDebut = new Date(sessionInterrompue.date);
    var dateDeco = new Date(sessionInterrompue.lastDisconnect);
    var fmt = function(d){
      var hh = String(d.getHours()).padStart(2,'0');
      var mm = String(d.getMinutes()).padStart(2,'0');
      return d.toLocaleDateString()+" à "+hh+":"+mm;
    };
    return h("div", {className:"checkin-overlay"},
      h("div", {className:"checkin-modal", style:{maxWidth:"600px"}},
        h("div", {className:"checkin-header"},
          h("h3", null, "⚠️ Session interrompue détectée",
            h(InfoI, null, "Cette session a été interrompue brutalement (fermeture d'onglet, plantage navigateur, perte réseau). Tu peux soit la reprendre exactement où elle en était, soit la terminer définitivement. Dans les deux cas, les réponses déjà enregistrées sont conservées.")
          ),
          h("div", {className:"checkin-sub"},
            (classeSI ? classeSI.nom : classeSlug) + (evSI ? " — "+evSI.titre : "")
          )
        ),
        h("div", {style:{padding:"1rem 1.2rem",fontSize:".9rem",color:"var(--noir)"}},
          h("div", {style:{marginBottom:".4rem"}}, "📅 Démarrée le "+fmt(dateDebut)),
          h("div", {style:{marginBottom:".4rem"}}, "🔌 Dernière déconnexion : "+fmt(dateDeco)),
          h("div", {style:{marginBottom:".8rem"}}, "📝 État : phase « "+(sessionInterrompue.phase || "idle")+" »"+(sessionInterrompue.qIdx != null ? " sur Q"+(sessionInterrompue.qIdx+1) : "")+", "+nbReponsesPartielles+" réponse"+(nbReponsesPartielles>1?"s":"")+" enregistrée"+(nbReponsesPartielles>1?"s":"")),
          h("div", {style:{padding:".7rem",background:"#FEF3C7",borderRadius:"8px",fontSize:".85rem",color:"#78350F",marginTop:".5rem"}},
            h("strong", null, "🔄 Reprendre"), " : tu retrouves la session telle quelle, le pilotage reprend là où il s'était arrêté. Les élèves peuvent se reconnecter et retrouver l'état."
          ),
          h("div", {style:{padding:".7rem",background:"#FEE2E2",borderRadius:"8px",fontSize:".85rem",color:"#7F1D1D",marginTop:".5rem"}},
            h("strong", null, "🛑 Terminer définitivement"), " : la session est close. Les "+nbReponsesPartielles+" réponse"+(nbReponsesPartielles>1?"s":"")+" reste"+(nbReponsesPartielles===1?"":"nt")+" enregistrée"+(nbReponsesPartielles>1?"s":"")+" et consultable"+(nbReponsesPartielles>1?"s":"")+" dans Résultats. Tu pourras lancer une nouvelle session ensuite. Action irréversible."
          )
        ),
        h("div", {className:"checkin-actions"},
          h("button", {className:"btn btn-rouge btn-sm", onClick:terminerDefinitivement, title:"Marque la session comme terminée. Les réponses partielles restent enregistrées dans Résultats. Tu pourras lancer une nouvelle session pour cette classe ensuite."}, "🛑 Terminer définitivement"),
          h("button", {className:"btn btn-primary", onClick:reprendreSession, title:"Reprend la session là où elle s'était arrêtée. Toutes les réponses enregistrées sont conservées. Le pilotage reprend immédiatement."}, "🔄 Reprendre la session")
        )
      )
    );
  }

  if(!session){
    var sessionsClasse = classeSlug ? sessionsPourClasse(classeSlug) : [];
    sessionsClasse.sort(function(a,b){return (b.date||0)-(a.date||0)});
    return h("div", null,
      h("div", {className:"card"},
        h("h2", null, "🎯 Lancer une nouvelle session",
          h(InfoI, null, "Une session = une instance d'évaluation pour une classe à une date donnée. Tu choisis la classe et l'évaluation, puis tu démarres. Les élèves connectés à cette classe basculent automatiquement sur l'éval lancée.")
        ),
        h("div", {className:"field"},
          h("label", null, "Classe",
            h(InfoI, null, "Choisis la classe qui va passer l'évaluation. Tu peux passer la même évaluation à plusieurs classes différentes (Banksy puis Pythagore par exemple).")
          ),
          h("select", {value:classeSlug, onChange:function(e){setClasseSlug(e.target.value);setEvalId("")}},
            h("option", {value:""}, "— Choisir —"),
            Object.keys(classes).filter(function(k){return !estClasseInterneObj(classes[k])}).map(function(k){
              return h("option", {key:k, value:k}, classes[k].nom + " ("+(classes[k].eleves||[]).length+" élèves)");

        h("div", {className:"field"},
          h("label", null, "Évaluation",
            classeSlug && h(InfoI, null, "Les évaluations marquées 🔁 ont déjà été passées par cette classe. Tu peux quand même la relancer (par exemple pour rattraper des absents) — un avertissement te sera demandé.")
          ),
          h("select", {value:evalId, onChange:function(e){setEvalId(e.target.value)}},
            h("option", {value:""}, "— Choisir —"),
            Object.keys(evals).filter(function(k){return k.charAt(0) !== "_"}).map(function(k){
              var deja = classeSlug ? evalDejaPassee(k, classeSlug) : false;
              return h("option", {key:k, value:k},
                (deja ? "🔁 " : "") + evals[k].titre + " ("+(evals[k].questions||[]).length+" questions)"

                ),

              ),

                  return h("div", {

                      setAbsentsCheck(n);
                    }
                  },
                    h("span", {className:"checkin-checkbox"}, coche ? "🚫" : "✓"),
                    h("span", {className:"checkin-nom"}, e.nomComplet)
                  );
                })
              ),
              h("div", {className:"checkin-summary"},
                nbAbsents === 0
                  ? "✅ Tout le monde présent"
                  : "🚫 "+nbAbsents+" absent"+(nbAbsents>1?"s":"")+" sur "+eleves.length
              ),
              h("div", {className:"checkin-actions"},
                h("button", {className:"btn btn-ghost", onClick:function(){setCheckinOpen(false);setAbsentsCheck({})}}, "Annuler"),
                h("button", {className:"btn btn-ghost", onClick:function(){setAbsentsCheck({})}, title:"Décocher tout : aucun absent"}, "Tout le monde présent"),
                h("button", {className:"btn btn-primary", onClick:lancerSessionApresCheckin, title:"Démarrer la session avec les absents marqués"}, "🚀 Lancer la session")
              )
            )
          );
        })()
      ),
      classeSlug && sessionsClasse.length > 0 && h("div", {className:"card"},
        h("h2", null, "📚 Sessions précédentes — "+(classes[classeSlug] ? classes[classeSlug].nom : ""),
          h(InfoI, null, "Liste de toutes les sessions déjà passées par cette classe. Tu peux relancer une évaluation déjà passée (utile pour faire un rattrapage avec un élève absent, par exemple) ou consulter le bilan classe d'une session terminée.")
        ),
        h("div", {className:"results-eval-list"},
          sessionsClasse.map(function(s){
            var ev = evalDeSession(s, evals);   // P2
            return h("div", {key:s.id, className:"results-eval-row", style:{cursor:"default"}},
              h("div", null,
                h("div", {className:"titre"}, ev ? ev.titre : "(évaluation supprimée)"),
                h("div", {className:"meta"},
                  new Date(s.date||0).toLocaleString("fr-FR") + " · " +
                  (s.etat === "terminee" ? "✅ terminée" : (s.etat === "en_cours" ? "🟢 en cours" : s.etat))
                )
              ),
              h("div", null, s.etat === "terminee" ? "" : "🟢")
            );
          })
        )
      )
    );
  }

  var classe = classes[session.classeSlug];
  var evaluation = evals[session.evalId];
  if(!classe || !evaluation){
    return h("div", {className:"card"}, h("p", null, "Chargement..."));
  }

  return h(SessionLive, {session:session, classe:classe, evaluation:evaluation, onTerminer:terminerSession});
}

// ─────────── Éditeur des durées des niveaux (settings globaux) ───────────
function NiveauxEditor(){
  var s1 = useState(NIVEAUX.map(function(n){return n.chrono})), durees = s1[0], setDurees = s1[1];
  var s2 = useState(false), saved = s2[0], setSaved = s2[1];

  function setDuree(i, v){
    var newD = durees.slice();
    if(v === "") newD[i] = "";
    else newD[i] = parseInt(v) || "";
    setDurees(newD);
    setSaved(false);
  }
  function blurDuree(i){
    var v = parseInt(durees[i]);
    if(!v || v < 1) {
      var newD = durees.slice();
      newD[i] = 1;
      setDurees(newD);
    } else if(v > 120){
      var newD = durees.slice();
      newD[i] = 120;
      setDurees(newD);
    }
  }
  function sauvegarder(){
    // Sauvegarde dans Firebase
    var data = NIVEAUX.map(function(n, i){
      return {id:n.id, chrono:durees[i]};
    });
    db.ref(DB_ROOT+"/settings/niveaux").set(data, function(err){
      if(err){ alert("Erreur : "+err.message); return; }
      // MAJ NIVEAUX en mémoire
      durees.forEach(function(d, i){ NIVEAUX[i].chrono = d; });
      setSaved(true);
      setTimeout(function(){setSaved(false)}, 2000);
    });
  }
  function reinitialiser(){
    if(!confirm("Réinitialiser les durées par défaut (5/10/15/20s) ?")) return;
    var defaults = NIVEAUX_DEFAULT.map(function(n){return n.chrono});
    setDurees(defaults);
    var data = NIVEAUX_DEFAULT.map(function(n){
      return {id:n.id, chrono:n.chrono};
    });
    db.ref(DB_ROOT+"/settings/niveaux").set(data, function(){
      defaults.forEach(function(d, i){ NIVEAUX[i].chrono = d; });
      setSaved(true);
      setTimeout(function(){setSaved(false)}, 2000);
    });
  }
  var modifie = NIVEAUX.some(function(n, i){return durees[i] !== n.chrono});

  return h("details", {className:"niveaux-editor"},
    h("summary", null,
      "⚙️ Durées des niveaux ",
      h("span", {style:{fontWeight:400,color:"var(--gris)",fontSize:".82rem"}},
        "(actuellement : "+NIVEAUX.map(function(n){return n.label.charAt(0)+" "+n.chrono+"s"}).join(" · ")+")"
      ),
      h(InfoI, null, "Modifie ici la durée du chrono de RÉFLEXION pour chaque niveau de difficulté. Les valeurs sont sauvegardées globalement et s'appliquent à toutes les évaluations futures.")
    ),
    h("div", {className:"niveaux-editor-body"},
      h("p", {style:{fontSize:".82rem",color:"var(--gris)",marginBottom:".6rem"}},
        "Ces durées s'appliquent à toutes les évaluations. Modifier ici, c'est mettre à jour la durée du chrono de réflexion pour ce niveau partout."
      ),
      h("div", {className:"niveaux-editor-grid"},
        NIVEAUX.map(function(n, i){
          return h("div", {key:n.id, className:"niveaux-editor-item"},
            h("span", {className:"niv-pastille niv-"+n.id, style:{cursor:"default"}}, n.label),
            h("input", {
              type:"number", min:1, max:120,
              value:durees[i],
              onChange:function(e){setDuree(i, e.target.value)},
              onBlur:function(){blurDuree(i)},
              title:"Durée en secondes pour le niveau "+n.label+" (1 à 120)."
            }),
            h("span", {style:{fontSize:".78rem",color:"var(--gris)"}}, "sec.")
          );
        })
      ),
      h("div", {className:"row", style:{marginTop:".6rem"}},
        h("button", {className:"btn btn-primary btn-sm", onClick:sauvegarder, disabled:!modifie, title:"Sauvegarde les nouvelles durées globalement (toutes évaluations confondues)."}, saved ? "✅ Sauvegardé" : "💾 Sauvegarder"),
        h("button", {className:"btn btn-ghost btn-sm", onClick:reinitialiser, title:"Réinitialiser aux valeurs par défaut (5/10/15/20s)."}, "🔄 Par défaut")
      )
    )
  );
}
