      const chosen = q.multi ? (Array.isArray(a)?a:[]) : (a!=null?[a]:[]);
      root.querySelectorAll(`.opt[data-q="${q.id}"]`).forEach(el=>{
        el.classList.remove("right","wrong"); const ci=+el.dataset.c;

  }
  // génère le verdict (réussite → fiche 4D ; échec → réorientation), réutilisé par submit et par la reprise
  function paintVerdict(s, r){
    const v=root.querySelector(".verdict-box"); if(!v) return;
    // triptyque d'items : réussis (entiers) / à revoir (tentés mais pas parfaits) / non tentés
    const porte = r.porte!=null?r.porte:(r.good||0);
    const ptot  = r.porteTotal!=null?r.porteTotal:(r.total||0);
    const tentes= r.tentes!=null?r.tentes:ptot;
    const reussis=porte, aRevoir=Math.max(0,tentes-porte), nonTentes=Math.max(0,ptot-tentes);
    const score3=`<div class="score3"><span class="s3 ok"><b>${reussis}</b> réussis</span><span class="s3 mid"><b>${aRevoir}</b> à revoir</span><span class="s3 none"><b>${nonTentes}</b> non tentés</span></div>`;
    if(r.passed){
      const mir=(laneIdOf()==='__mirror'); const corr=s.corrige||[];
      const acDone=engine.autocorrDone(s.id);
      const f4dOn = lsGet("wt_fiche4d")==='1';   // fiche4D désactivée par défaut (toggle réglages) — la trace est désormais tissée dans le bilan
      // Checkpoint 2 : tant que l'autocorrection n'est pas faite (ou en cours, P._acPhase), on corrige avant le bilan.
      if(corr.length && (!acDone || P._acPhase)){
        let h=`<div class="verdict pass"><div class="vh">Porte franchie</div>${score3}
          <p>Avant de continuer, corrige ton travail : compare ce que tu as écrit au corrigé, question par question.</p></div>`;
        v.innerHTML=h+autocorrHTML(s, mir); return;
      }
      const stars=engine.starsOf(s.id);
      // Checkpoint 3 : bilan tissé + case « j'ai écrit mon bilan ». La séance n'est terminée qu'une fois la case cochée.
      if(!engine.bilanEcritDe(s.id)){
        let h=`<div class="verdict pass"><div class="vh">Ton bilan</div>${score3}
          <p>Dernière étape avant la suite : lis ce bilan, puis écris-le sur ton cahier.</p></div>`;
        v.innerHTML=h+bilanTisseHTML(s, mir)+(f4dOn?fiche4d(s):''); return;
      }
      const nx=engine.suggestNext(s.id), next=nx?engine.seance(nx):null;
      let h=`<div class="verdict pass"><div class="vh">Réussi</div>${score3}
        <p>Séance terminée.${stars!==null?` Autonomie : ${stars}★ ${stars<3?'(aide utilisée)':'(sans aide)'}.`:''}</p>`;
      if(next) h+=`<p><b>Conseil :</b> « ${esc(next.titre)} ». Tu fais comme tu veux.</p>`;
      else h+=`<p>Dernière séance. Chapitre terminé.</p>`;
      const parfait = ptot>0 && porte>=ptot;     // déjà tout juste → rien à améliorer
      if(!mir && !parfait && !s.sommative){
        if(APP.classeEnCours(P.classeSeg)) h+=`<p class="replay-note">Tu pourras revenir <b>viser le sans-faute</b> chez toi, en dehors du temps de classe.</p>`;
        else h+=`<div class="actions"><span></span><button class="btn ghost" title="Refaire le QCM à blanc pour viser le sans-faute — ta réussite reste acquise" onclick="APP.panel('${laneIdOf()}').replay()">↻ Viser le sans-faute</button></div>`;
      }
      v.innerHTML=h+`</div>`+bilanTisseHTML(s, mir)+(f4dOn?fiche4d(s):'');
    } else {
      const t=engine.diagnose(s.id);
      let h=`<div class="verdict fail"><div class="vh">Pas encore</div>${score3}
        <p>Il te faut au moins ${s.evaluation.seuil} réussis pour débloquer la correction.</p>`;
      if(t) h+=`<div class="warn" style="margin-top:6px">↩ Fais d'abord « ${esc(t.titre)} » : tu as sauté une étape qui prépare celle-ci. Reviens ensuite, ça passera.</div>
        <div class="actions"><span></span><button class="btn fire" onclick="APP.panel('${laneIdOf()}').goto('${t.id}')">« ${esc(t.titre)} »</button></div>`;
      else h+=`<div class="actions"><span></span><button class="btn ghost" title="Effacer cette tentative et recommencer le QCM" onclick="APP.panel('${laneIdOf()}').retry()">Réessayer</button></div>`;
      v.innerHTML=h+`</div>`;
    }
  }
  function nonQcmHTML(s,lane){ const others=s.evaluation.items.filter(i=>i.type!=="qcm"); if(!others.length) return "";
    const st=engine.snapshot().state[s.id];

  P.submitProf=function(itemId){ const ta=root.querySelector(`[data-prof="${itemId}"]`); if(!ta)return;

  P.pick=function(qid,ci,multi){ if(multi){ const a=Array.isArray(P.answers[qid])?P.answers[qid].slice():[];
      const k=a.indexOf(ci); if(k>=0) a.splice(k,1); else a.push(ci); P.answers[qid]=a; }
    else P.answers[qid]=ci; };
  P.setReg=function(itemId, gi, val){ if(!Array.isArray(P.answers[itemId])) P.answers[itemId]=[]; P.answers[itemId][gi]=val; };
  P.setPair=function(itemId, i, val){ if(!Array.isArray(P.answers[itemId])) P.answers[itemId]=[]; P.answers[itemId][i]=(val===''?null:+val); };

    if(k>=0) a.splice(k,1); else a.push(wi); P.answers[itemId]=a; P.refreshReg(itemId); };
  P.setShort=function(itemId, val){ P.answers[itemId]=val; };
  P.setVF=function(itemId, field, val){ const cur=(P.answers[itemId]&&typeof P.answers[itemId]==='object'&&!Array.isArray(P.answers[itemId]))?P.answers[itemId]:{};
    cur[field]=val; P.answers[itemId]=cur; if(field==='vf') P.refreshReg(itemId); };   // refresh sur V/F (pas sur la preuve, pour garder le focus)
  P.setClass=function(itemId, i, val){ if(!Array.isArray(P.answers[itemId])) P.answers[itemId]=[]; P.answers[itemId][i]=val; };
  P.refreshReg=function(itemId){ const it=engine.seance(P.current).evaluation.items.find(x=>x.id===itemId); if(!it||!EVAL_TYPES[it.type]) return;

    const n=(it.elements||[]).length; let order=(Array.isArray(P.answers[itemId])&&P.answers[itemId].length===n)?P.answers[itemId].slice():seededOrder(n, itemId);
    const j=pos+dir; if(j<0||j>=n) return; const t=order[pos]; order[pos]=order[j]; order[j]=t; P.answers[itemId]=order; P.refreshReg(itemId); };
  P.openAide=function(aideId){ const s=engine.seance(P.current); if(!s) return;
    engine.useAide(s.id, aideId);

    else if(P.tabCur==='c') fillC();          // sécurité si le bloc n'est pas dans le DOM courant

  };
  function fiche4d(s){ const f=s.fiche4d; if(!f) return "";

        <div class="lc"><div class="in">${esc(L.contenu)}`;

  // ── Checkpoint 2 : écran d'autocorrection par critères (élève) ──────────────
  // Retrouve l'énoncé de chaque question du carnet (pour situer chaque ligne d'autocorrection).
  function _qEnonces(s){ const map={}; const c=s.corps&&s.corps.consigne;
    const blocs = Array.isArray(c)?c:(typeof c==='string'?parseLegacy(c):[]);
    (blocs||[]).forEach(b=>{ if(b && b.type==='question' && b.n!=null) map[b.n]=b.texte||''; });
    return map; }
  // ro = lecture seule (miroir prof : reflète les positions de l'élève, sans agir).
  function autocorrHTML(s, ro){ const corr=s.corrige||[]; if(!corr.length) return "";
    const lane=laneIdOf(), data=engine.autocorrData(s.id), enon=_qEnonces(s);
    const choix=(n,ci,val)=>`<span class="ac-choix">`
      +`<button class="ac-b ok${val==='ok'?' on':''}" ${ro?'disabled':''} onclick="APP.panel('${lane}').setAutoCrit(${n},${ci},'ok')">✓ réussi</button>`
      +`<button class="ac-b rev${val==='revoir'?' on':''}" ${ro?'disabled':''} onclick="APP.panel('${lane}').setAutoCrit(${n},${ci},'revoir')">à revoir</button></span>`;
    let h=`<div class="autocorr"><div class="ac-head">Corrige ton travail</div>`
      +`<p class="ac-intro">Compare ce que tu as écrit sur ton cahier au corrigé, question par question. Marque ce que tu as réussi et ce qui reste à revoir — honnêtement&nbsp;: c'est pour toi.</p>`;
    corr.forEach(c=>{ const arr=data[c.n]||[]; const crits=(Array.isArray(c.criteres)&&c.criteres.length)?c.criteres:null;
      h+=`<div class="ac-q"><div class="ac-qn">Question ${esc(String(c.n))}${enon[c.n]?' — '+esc(enon[c.n]):''}</div>`
        +`<div class="ac-ref">${esc(c.r||'')}</div>`;
      if(crits) crits.forEach((ct,ci)=>{ h+=`<div class="ac-crit"><span class="ac-ct">${esc(ct)}</span>${choix(c.n,ci,arr[ci])}</div>`; });
      else h+=`<div class="ac-crit"><span class="ac-ct">As-tu su répondre à cette question&nbsp;?</span>${choix(c.n,0,arr[0])}</div>`;
      h+=`</div>`; });
    const done=engine.autocorrDone(s.id);
    if(!ro) h+=`<div class="actions"><span class="d">${done?'Tu peux valider.':'Positionne chaque ligne pour continuer.'}</span>`
      +`<button class="btn primary" ${done?'':'disabled'} onclick="APP.panel('${lane}').validateAutocorr()">Valider ma correction</button></div>`;
    return h+`</div>`;
  }
  P.setAutoCrit=function(n,ci,val){ const s=engine.seance(P.current); if(!s) return;
    engine.setAutoCrit(s.id,n,ci,val); P._acPhase=true; renderEval(); };   // reste sur l'autocorrection le temps de tout positionner
  P.validateAutocorr=function(){ const s=engine.seance(P.current); if(!s) return;
    if(!engine.autocorrDone(s.id)){ toast("Positionne chaque ligne avant de valider."); return; }
    P._acPhase=false; renderEval();
    // signal prof : incohérence (tout déclaré réussi alors que le QCM accroche) — émis ou effacé selon le cas
    const chap=CHAPTER.meta.id||"chapitre", sig=engine.autocorrSignal(s.id);
    store.save("signaux/"+chap+"/"+engine.studentId+"/incoherence", (sig&&sig.incoherent)?{ seance:s.titre, nom:P.name, classeSeg:P.classeSeg||'', raison:sig.raison||'', ts:Date.now() }:null);
    const v=root.querySelector(".verdict-box"); if(v){ const rect=v.getBoundingClientRect(); sparkle(rect.left+rect.width/2, rect.top+20); }
    toast("Correction validée."); };
  // rouvre l'autocorrection (même déjà validée) : pour l'élève via le bouton « Revoir ma correction », pour le prof via un ordre à distance
  P.reopenAutocorr=function(seanceId){ const id=seanceId||P.current; const s=engine.seance(id); if(!s) return;
    P.screen='seance'; P.current=id; P.expanded=true; renderSeance();   // renderSeance remet _acPhase à false…
    P._acPhase=true; P.tab('e');                                         // … donc on force la phase APRÈS, puis on ouvre l'évaluation (→ autocorrection)

  // ── Checkpoint 3 : bilan tissé — DEUX temps explicites pour l'élève :
  //   (1) la leçon, commune à toute la classe, qu'il RECOPIE ; (2) son bilan personnel, reflet de SON
  //   QCM + SA correction, qu'il REFORMULE avec ses mots. On pointe les CONTENUS, jamais les scores.
  function bilanTisseHTML(s, ro){ const d=engine.bilanData(s.id); const lane=laneIdOf();
    // bloc 1 — la leçon à recopier (invariable)
    const lecon = d.acquis
      ? `<div class="bt-bloc bt-copy"><div class="bt-bloc-h">✍️ À recopier — la leçon</div><div class="bt-bloc-c">${esc(d.acquis)}</div></div>`
      : '';
    // bloc 2 — bilan personnel : contenus compris (QCM réussis) / à revoir (QCM ratés + critères de l'autocorrection)
    const comprisHTML = d.compris && d.compris.length
      ? `<div class="bt-sub">Ce que tu as compris :</div><ul class="bt-list">`
        + d.compris.map(c=>`<li>${esc(c.enonce)}${c.bonne?` → <b>${esc(c.bonne)}</b>`:''} <span class="bt-q">(Q${c.n})</span></li>`).join('')

    const rien = (!comprisHTML && !revoirHTML) ? `<p class="d">Termine le QCM et la correction pour voir ton bilan personnel.</p>` : '';
    const alerte = (d.signal && d.signal.incoherent)
      ? `<p class="bt-alert">Tu as coché toutes tes réponses comme réussies, mais une question du QCM est encore fausse : vérifie le point « à revoir » ci-dessus avant de conclure.</p>` : '';

    const revoir = ro ? '' : `<div class="bt-revoir"><button class="btn link" onclick="APP.panel('${lane}').reopenAutocorr()">↻ Revoir ma correction</button></div>`;

      +`<p class="bt-intro">Ton bilan a <b>deux parties</b>. D'abord tu <b>recopies la leçon</b> (la même pour toute la classe). Ensuite tu écris, <b>avec tes mots</b>, ton bilan personnel : ce que tu as compris et ce qu'il te reste à travailler. Écris <b>les deux</b> sur ton cahier.</p>`

  // re-jeu d'une séance DÉJÀ RÉUSSIE (viser le sans-faute) — la porte reste acquise, le diagnostic intact ; on ne garde que le meilleur.
  //   Réservé au hors-classe ET aux séances formatives (pas de re-jeu d'une évaluation notée).
  P.replay=function(){ const s=engine.seance(P.current); if(!s) return;
    if(s.sommative){ toast("Cette séance est une évaluation notée : elle ne se refait pas."); return; }
    if(APP.classeEnCours(P.classeSeg)){ toast("Pendant le cours, on avance. Tu pourras refaire cette séance chez toi, plus tard."); return; }
    P._replay=true; P.answers={}; P.tab('e'); toast("Refais le QCM à blanc — vise le sans-faute. Ce que tu avais déjà est gardé."); };
  // nouvelle tentative : on récupère les réponses précédentes, on efface la soumission, puis on réaffiche l'éval éditable
  P.retry=function(){ const s=engine.seance(P.current); if(!s) return;
    const prev=((engine.snapshot().state[s.id]||{}).qcm||{}).answers||{};

  P.goto=function(id){ P.screen="map"; renderMap(); setTimeout(()=>askConfirm(id),150); };

  function laneIdOf(){ return APP.laneIdFor(P); }

/* ─────────────────────────── §G · SHELL (écran scindé + boot) ──────────*/
const LETTERS=["A","B","C","D"];
// panneau inerte : renvoyé quand un handler vise une lane absente (ex. clic résiduel) → aucun crash
const NULLPANEL = { toMap(){}, tab(){}, pick(){}, openAide(){}, submit(){}, retry(){}, submitProf(){}, saveLibre(){}, goto(){}, render(){}, gtool(){}, gtap(){}, markQ(){}, iAmHere(){}, refreshChrono(){}, checkIdle(){}, closeDico(){}, openGlossaire(){}, glossToggle(){}, glossRemove(){}, setReg(){}, reorder(){}, refreshReg(){}, setPair(){}, toggleRep(){}, setShort(){}, setVF(){}, setClass(){}, setLock(){}, showRecap(){}, closeRecap(){}, expand(){}, goEval(){}, reduce(){}, switchMode(){}, replay(){}, reflectCours(){}, openHelp(){}, setAutoCrit(){}, validateAutocorr(){}, setBilanEcrit(){}, reopenAutocorr(){} };
const APP = {
  panels:{}, tableSize:2, testMode:false, _classeFiltre:null,   // _classeFiltre : null=classe en cours (auto), ''=toutes, 'seg'=une classe
  _sessions:{}, _control:{}, _signaux:{}, _unsubs:[], _hb:null, _tick:null,
  laneIdFor(p){ if(p && p._mirrorLane) return p._mirrorLane; for(const k in this.panels){ if(this.panels[k]===p) return k; } return null; },
  panel(id){ if(id==="__mirror") return (typeof MIRROR!=="undefined" && MIRROR._pilot) || NULLPANEL; return this.panels[id] || NULLPANEL; },
  // qui occupe la séance id PARMI LES AUTRES ÉLÈVES DE LA MÊME TABLETTE (lanes locales) uniquement.
  // L'exclusivité ne joue JAMAIS entre tablettes : sinon une séance prise par un élève bloquerait
  // toute la classe (et tout le monde finirait poussé vers la convergence). Entre postes, séances partagées.
  occupant(id, exceptKey){
    const self=this.panels[exceptKey], selfSeg=self?self.classeSeg:null;
    for(const k in this.panels){ if(k===exceptKey) continue; const p=this.panels[k];
      if(p && p.classeSeg===selfSeg && ((p.screen==="seance" && p.current===id) || p._entering===id)) return p.name; }
    return null;
  },
  syncMaps(){ for(const k in this.panels){ const p=this.panels[k]; if(p && p.screen==="map") p.render(); } },
  // DETTE (clignotement) corrigée : le battement de présence réécrit sessions ~1×/s. On ne redessine
  // les cartes QUE si la répartition réelle a changé (qui est présent, sur quelle séance) — pas à chaque
  // simple mise à jour de lastSeen. Les appels LOCAUX (toMap, resetLane…) passent par syncMaps() direct.
  _sessSig(){ const S=this._sessions||{}, now=Date.now();
    return Object.keys(S).sort().map(uid=>{ const s=S[uid]||{};
      return uid+':'+(s.classeSeg||'')+':'+(s.current||'')+':'+((now-(s.lastSeen||0))<PRESENCE_MS?1:0); }).join('|'); },
  syncMapsIfChanged(){ const sig=this._sessSig(); if(sig===this._lastSessSig) return; this._lastSessSig=sig; this.syncMaps(); },
  // re-partage de l'espace : une lane en mode papier + vue compacte rétrécit ; agrandie ou en mode app, elle reprend sa part (50/50)
  relayout(){ for(const k in this.panels){ const p=this.panels[k]; const lane=$("lane"+k); if(!lane) continue;
    const reduced = !!(p && p.mode==='papier' && p.screen==='seance' && !p.expanded);
    lane.classList.toggle('reduced', reduced); } },
  setTableSize(n){ this.tableSize=Math.max(1,Math.min(LETTERS.length,n|0)); lsSet("wt_seats", this.tableSize); this.boot(); },
  toggleHelp(key){ const el=$("help"+key); if(el) el.classList.toggle("open"); },
  toggleTest(){ this.testMode=!this.testMode;
    this.purgeTest(); this.boot(); },                          // purge à l'entrée comme à la sortie
  purgeTest(){ const chap=CHAPTER.meta.id||"chapitre";                  // efface les résidus testA/B/C
    ['A','B','C'].forEach(k=>{ store.save("sessions/"+chap+"/test"+k, null); store.save("progress/"+chap+"/test"+k, null); }); },
  resetLane(key){ const p=this.panels[key]; if(!p)return; p.engine.reset(); p.screen="map"; p.render(); this.syncMaps();
    toast("Poste réinitialisé."); },
  forcePass(key){ const p=this.panels[key]; if(!p)return;
    const id=(p.screen==="seance"&&p.current)?p.current:p.engine.globalSuggestion();
    if(!id){ toast("Rien à réussir."); return; }
    p.engine.forcePass(id); p.screen="map"; p.render(); this.syncMaps(); toast("Étape « "+p.engine.seance(id).titre+" » réussie (test)."); },
  setTestMode(key, mode){ const p=this.panels[key]; if(!p) return; p.mode=mode; p.expanded=false; p.modeSwitched=false; this.beat(key);
    const lane=$("lane"+key);
    if(lane){ lane.querySelectorAll('.tmode .tm').forEach(b=>b.classList.toggle('on', b.dataset.m===mode));   // marque le mode actif
      const badge=lane.querySelector('.lanehead .badge'); if(badge) badge.textContent='TEST · '+(mode==='papier'?'papier':mode==='deux'?'app+papier':'app'); }
    if(p.render) p.render();
    toast("Poste "+key+" : mode "+(mode==='papier'?'papier (suivi allégé)':mode==='deux'?'app + papier':'app (suivi complet)')+"."); },
  repartition(N){ N=Math.max(0,N|0);
    if(N<2) return { tables:N?[N]:[], total:N?1:0, cheminsRequis:2 };
    const t3=(N%2===1)?1:0; const t2=(N-(t3?3:0))/2;
    const tables=[]; for(let i=0;i<t2;i++) tables.push(2); if(t3) tables.push(3);
    return { tables, total:tables.length, cheminsRequis: t3?3:2 }; },

  /* ── Présence temps réel (lastSeen 30 s, seuil 60 s) + déconnexion fin de séance (logoutEpoch, par classe) ── */
  startPresence(){
    this._unsubs.forEach(u=>{ try{u();}catch(e){} }); this._unsubs=[];
    if(this._hb) clearInterval(this._hb); if(this._tick) clearInterval(this._tick);
    const chap=CHAPTER.meta.id||"chapitre";
    this._unsubs.push(store.subscribe("appVersion", v=>{ this._appVersion=v||''; this.onAppVersion(this._appVersion); }));   // mise à jour auto
    // DETTE (clignotement carte) : redessine toutes les cartes à CHAQUE écriture sessions ; en classe (~28 présences) ≈ 1 redessin/s → l'animation d'entrée se rejoue et gêne le clic.
    // À traiter en fin de chantier : ne syncMaps que si la signature des occupants change + ne pas rejouer l'animation sur rafraîchissement (idéal : maj non destructive des seuls badges).
    this._unsubs.push(store.subscribe("sessions/"+chap, v=>{ this._sessions=v||{}; this.syncMapsIfChanged();
      if(PROF.authed && PROF.tab==="suivi") PROF.render(); }));
    this._unsubs.push(store.subscribe("signaux/"+chap, v=>{ this._signaux=v||{};   // bilans écrits à relire (signal rouge)
      if(PROF.authed) PROF.render(); }));
    this._unsubs.push(store.subscribe("control/"+chap, v=>{ this._control=v||{};
      Object.keys(this.panels).forEach(k=>{ const p=this.panels[k]; if(!p||!p.epoch||!p.engine) return;
        const ctl=this._control[p.engine.studentId]||{};
        const segCtl=(this._control||{})[p.classeSeg]||{};
        // 1) FIGER (gel des chronos + verrouillage) — gel de CLASSE (segCtl) ou blocage CIBLÉ d'un élève (ctl) : le plus récent s'applique
        const fz=[segCtl.freeze, ctl.freeze].filter(Boolean).sort((a,b)=>(b.epoch||0)-(a.epoch||0))[0];
        if(fz && fz.epoch>(p._fzEpoch||0) && fz.epoch>=p.epoch){ p._fzEpoch=fz.epoch;
          if(p.screen==='seance' && p.current){ if(fz.gel) p.engine.freeze(p.current); else p.engine.resume(p.current); }
          if(typeof p.setLock==='function') p.setLock(!!fz.lock);
          if(p.refreshChrono) p.refreshChrono(); }
        // 2) déconnexion (classe ou élève)
        const le=Math.max(segCtl.logoutEpoch||0, ctl.logoutEpoch||0);
        if(le && p.epoch<le){ this.kick(k); return; }
        // pilotage : on n'applique que les ordres POSTÉRIEURS à la connexion de cet écran (un ordre resté en base ne se rejoue pas à la reconnexion)
        if(ctl.act && ctl.act.ts>(p._actTs||0) && ctl.act.ts>=p.epoch){ p._actTs=ctl.act.ts; this.applyAct(k, ctl.act); }
        else if(ctl.act && ctl.act.ts>(p._actTs||0)) p._actTs=ctl.act.ts;     // ordre ancien : on l'absorbe sans l'exécuter
        if(ctl.gest && ctl.gest.ts>(p._gestTs||0) && ctl.gest.ts>=p.epoch){ p._gestTs=ctl.gest.ts; this.applyGeste(k, ctl.gest); }
        else if(ctl.gest && ctl.gest.ts>(p._gestTs||0)) p._gestTs=ctl.gest.ts;
        if(p.reflectCours) p.reflectCours(); }); }));   // (dé)montre le bouton « viser le sans-faute » selon que la classe est en séance
    this.beatAll(); this._hb=setInterval(()=>this.beatAll(),30000);
    this._tick=setInterval(()=>{ if(PROF.authed && PROF.tab==="suivi") PROF.render(); },15000);
  },
  // rejoue sur le panneau de l'élève l'action que le prof a déclenchée en cliquant dans le miroir
  applyAct(key, act){ const p=this.panels[key]; if(!p||!p.engine||!act) return;
    const allow={goto:1,pick:1,submit:1,retry:1,openAide:1,submitProf:1,saveLibre:1,tab:1,toMap:1,openHelp:1,reopenAutocorr:1};
    if(!allow[act.m] || typeof p[act.m]!=='function') return;
    try{ p[act.m].apply(p, act.a||[]); }catch(e){}
    this.beat(key);
  },
  // applique un geste piloté (surligner/gomme en plage, relier en paire, étiquette) envoyé par le prof
  applyGeste(key, g){ const p=this.panels[key]; if(!p||!p.engine||!g) return;
    const id=g.seance; if(!p.engine.seance(id)) return;
    const words = Array.isArray(g.words) ? g.words : (typeof g.tok==='number' ? [g.tok] : []);
    if(g.tool==='gomme'){ words.forEach(w=>p.engine.clearMark(id,g.supIdx,w,true)); p.engine.flush(); }
    else if(g.tool==='relier'){ if(typeof g.a==='number' && typeof g.b==='number') p.engine.addLink(id,g.supIdx,g.a,g.b); }
    else if(g.tool==='label'){ const t=words[0];
      if(t!=null){ if(g.label && !p.engine.geste(id,g.supIdx).marks[t]) p.engine.paintMark(id,g.supIdx,t,'j',true); p.engine.setLabel(id,g.supIdx,t,g.label||''); } }
    else { words.forEach(w=>p.engine.paintMark(id,g.supIdx,w,g.tool||'j',true)); p.engine.flush(); }
    if(p.screen==="seance" && p.current===id && p.tabCur!=='e') p.tab('c');   // rafraîchir si l'élève regarde ce texte
    this.beat(key);
  },
  beatAll(){ for(const k in this.panels) if(this.panels[k]) this.beat(k); },
  tickChronos(){ for(const k in this.panels){ const p=this.panels[k]; if(!p) continue; if(p.refreshChrono) p.refreshChrono(); if(p.checkIdle) p.checkIdle(); }
    if(typeof MIRROR!=="undefined" && MIRROR._panel && MIRROR._panel.refreshChrono) MIRROR._panel.refreshChrono();
    this.checkCours(); },
  beat(key){ const p=this.panels[key]; if(!p||!p.engine) return;
    const chap=CHAPTER.meta.id||"chapitre";
    store.save("sessions/"+chap+"/"+p.engine.studentId, { name:p.name, classe:p.classe||"", classeSeg:p.classeSeg||"libre",
      idx:p.idx||0, mode:p.mode||'app', modeSwitched:!!p.modeSwitched, lastSeen:Date.now(), current:(p.screen==="seance"?p.current:(p._entering||null)), tab:(p.tabCur||'c'), epoch:p.epoch||0 }); },
  endSessionFor(classeSeg){ const chap=CHAPTER.meta.id||"chapitre";
    const node=Object.assign({}, (this._control||{})[classeSeg]||{}); node.logoutEpoch=Date.now();   // merge : ne pas écraser un freeze en cours
    store.save("control/"+chap+"/"+classeSeg, node); },
  // classes (segments) actuellement présentes, d'après les sessions vivantes
  presentSegs(){ const now=Date.now();
    return [...new Set(Object.values(this._sessions||{}).filter(s=>s && (now-(s.lastSeen||0))<PRESENCE_MS).map(s=>s.classeSeg).filter(Boolean))]; },
  // FIGER : gel des chronos / verrouillage / déconnexion, par coches — appliqué à toutes les classes présentes
  // gèle DIRECTEMENT en base les chronos de tous les élèves d'une classe (marche même déconnectés) — borné à leur dernière présence
  freezeProgress(seg){ const chap=CHAPTER.meta.id||"chapitre";
    store.once("progress/"+chap, prog=>{ prog=prog||{};
      Object.keys(prog).forEach(uid=>{ if(uid.indexOf('__')>0 && uid.split('__')[0]===seg && !isTestUid(uid)){
        const last=(this._sessions[uid]||{}).lastSeen||0;
        try{ const eng=createEngine(CHAPTER, store, uid, 0); eng.hydrate(prog[uid]); eng.freezeAll(last||Date.now()); }catch(_){} } });
      if(typeof DASH!=='undefined' && DASH._open) setTimeout(()=>DASH.render(), 250); }); },
  // FIGER une note sommative côté prof : la note vit dans un NŒUD SÉPARÉ (sommatif/{chap}/{uid}/{sid}), hors de progress/.
  //   L'élève n'écrit jamais ce nœud (son moteur ne connaît que progress/), donc rien ne peut écraser une note validée — quoi qu'il fasse ensuite.
  figerSommatifFor(uid, sid){ const chap=CHAPTER.meta.id||"chapitre";
    store.once("progress/"+chap, prog=>{ prog=prog||{}; if(!prog[uid]){ toast("Aucune progression pour cet élève."); return; }
      let r=null; try{ const eng=createEngine(CHAPTER, MIRROR.roStore, uid, 0); eng.hydrate(prog[uid]); r=eng.noteSommative(sid); }catch(_){}
      if(!r || !r.repondu){ toast("L'élève n'a pas encore passé le QCM de cette séance."); return; }
      store.save("sommatif/"+chap+"/"+uid+"/"+sid, { note:r.note, bareme:r.bareme, ts:Date.now() });
      toast("Note validée : "+r.note+" / "+r.bareme+"."); }); },
  defigerSommatifFor(uid, sid){ const chap=CHAPTER.meta.id||"chapitre";
    store.save("sommatif/"+chap+"/"+uid+"/"+sid, null); toast("Note rouverte."); },
  freezeSessions(opt){ const chap=CHAPTER.meta.id||"chapitre";
    const f=this.classeFiltreSeg();                         // la classe affichée (sélecteur) ; sinon les présents
    const segs = f ? [f] : this.presentSegs();
    if(!segs.length){ toast("Choisis d'abord la classe à figer dans le menu « Classe affichée » en haut."); return; }
    const ts=Date.now();
    segs.forEach(seg=>{
      if(opt.gel) this.freezeProgress(seg);                 // gel DIRECT en base : arrête les chronos même si la classe est déconnectée
      const node=Object.assign({}, (this._control||{})[seg]||{}); node.freeze={ epoch:ts, gel:!!opt.gel, lock:!!opt.lock };
      if(opt.logout) node.logoutEpoch=ts; store.save("control/"+chap+"/"+seg, node); });   // signal pour les éventuels connectés (verrou + réactivité)
    if(opt.logout) segs.forEach(seg=>{ const nom=(this.knownClasses().find(c=>c.seg===seg)||{}).nom||seg;
      setTimeout(()=>this.archiveSession(seg, nom, true), 1500); });
    const parts=[]; if(opt.gel) parts.push("chronos gelés"); if(opt.lock) parts.push("écrans verrouillés"); if(opt.logout) parts.push("élèves déconnectés, session archivée");
    toast("Séance figée — "+(parts.join(", ")||"aucune option")+"."); },
  // REPRENDRE : lève le gel et le verrou (les chronos repartent là où ils s'étaient arrêtés)
  resumeSessions(){ const chap=CHAPTER.meta.id||"chapitre"; const segs=this.presentSegs();
    const ts=Date.now();
    segs.forEach(seg=>{ const node=Object.assign({}, (this._control||{})[seg]||{}); node.freeze={ epoch:ts, gel:false, lock:false };
      store.save("control/"+chap+"/"+seg, node); });
    toast("Reprise — chronos relancés."); },
  /* ── SÉANCE EN COURS (drapeau partagé control/{chap}/{seg}/cours = {debut, fin}) ──
     Sert deux usages : (1) le minuteur prof (alerte T-5min puis clôture à T=fin) ; (2) plus tard, le verrou de re-jeu côté élève
     (« ma classe est en cours → je ne peux pas refaire une séance déjà réussie »). La clôture reste un GESTE explicite du prof. */
  coursDe(seg){ return (this._control && this._control[seg] && this._control[seg].cours) || null; },
  classeEnCours(seg){ return !!this.coursDe(seg); },   // séance lancée et non clôturée → re-jeu fermé pour cette classe
  openHelpFor(uid){ const chap=CHAPTER.meta.id||"chapitre";   // ouvre l'aide « ? » directement sur l'écran de l'élève (l'élève a levé la main)
    store.save("control/"+chap+"/"+uid+"/act", { m:'openHelp', a:[], ts:Date.now() }); },
  // renvoie l'élève sur son autocorrection (à distance) — utile quand le prof voit qu'il s'est sur-évalué sans rien corriger au cahier
  renvoyerAutocorr(uid, seanceId){ const chap=CHAPTER.meta.id||"chapitre";
    store.save("control/"+chap+"/"+uid+"/act", { m:'reopenAutocorr', a:[seanceId||null], ts:Date.now() });
    toast("Renvoyé à l'autocorrection."); },
  lancerCours(seg, finTs){ const chap=CHAPTER.meta.id||"chapitre";
    const node=Object.assign({}, (this._control||{})[seg]||{});
    node.cours={ debut:Date.now(), fin:finTs };
    delete node.logoutEpoch;                                   // nouvelle séance : annule une déconnexion précédente (sinon kick au retour)
    node.freeze={ epoch:Date.now(), gel:false, lock:false };   // relance les chronos des déjà-connectés
    if(this._coursAlerted) delete this._coursAlerted[seg];      // réarme les alertes du minuteur
    store.save("control/"+chap+"/"+seg, node); },
  cloturerCours(seg){ const chap=CHAPTER.meta.id||"chapitre"; const ts=Date.now();
    this.freezeProgress(seg);                                  // gèle les chronos en base (même élèves déconnectés)
    const node=Object.assign({}, (this._control||{})[seg]||{}); node.freeze={ epoch:ts, gel:true, lock:false };
    node.logoutEpoch=ts; delete node.cours;                    // déconnecte + éteint le drapeau « en cours »
    store.save("control/"+chap+"/"+seg, node);
    if(this._coursAlerted) delete this._coursAlerted[seg];
    const nom=(this.knownClasses().find(c=>c.seg===seg)||{}).nom||seg;
    setTimeout(()=>this.archiveSession(seg, nom, true), 1500); },     // instantané de fin de cours + nettoyage du suivi
  prolongerCours(seg, minutes){ const c=this.coursDe(seg); if(!c) return; const chap=CHAPTER.meta.id||"chapitre";
    const node=Object.assign({}, (this._control||{})[seg]||{}); node.cours=Object.assign({}, c, { fin:c.fin+(minutes||10)*60000 });
    if(this._coursAlerted) delete this._coursAlerted[seg];      // réarme l'alerte sur la nouvelle fin
    store.save("control/"+chap+"/"+seg, node); },
  // minuteur prof : alerte 5 min avant la fin, puis modale de clôture à l'heure de fin (flags anti-répétition par classe)
  checkCours(){ if(typeof PROF==='undefined' || (!PROF.authed && !lsGet("wt_prof_poste")) || !this._control) return;
    this._coursAlerted=this._coursAlerted||{}; const now=Date.now();
    Object.keys(this._control).forEach(seg=>{ const c=((this._control||{})[seg]||{}).cours; if(!c||!c.fin) return;
      const nom=(this.knownClasses().find(x=>x.seg===seg)||{}).nom||seg;
      if(now>=c.fin-300000 && now<c.fin && this._coursAlerted[seg]!=='5' && this._coursAlerted[seg]!=='fin'){
        this._coursAlerted[seg]='5'; toast("⏰ "+nom+" — la séance se termine dans 5 minutes."); }
      if(now>=c.fin && this._coursAlerted[seg]!=='fin'){ this._coursAlerted[seg]='fin'; PROF.coursFinModal(seg, nom); }
    }); },
  // ── TODO — PILOTAGE EN CLASSE (chantiers à venir, volontairement non codés) ───────────────
  // Gros potentiel, mais désactivé par défaut pour ne pas surcharger l'usage tant que l'app n'est
  // pas maîtrisée. Deux fonctionnalités sont préparées ici ; il ne manque que l'émetteur/le geste,
  // le récepteur étant déjà en place via la file de signaux et le canal control/act.
  //
  //  1) MAIN LEVÉE (✋) — l'élève signale qu'il a besoin d'aide.
  //     • Récepteur : DÉJÀ prêt. signauxList() + sigMeta gèrent le type 'aide' ; il s'afficherait
  //       dans le panneau Signaux comme les bilans/incohérences.
  //     • À brancher : un bouton élève « J'ai besoin d'aide » (près du helpFAB ou dans la séance),
  //       gardé par un flag (ex. lsGet('wt_mainlevee')==='1'), qui écrit :
  //         store.save("signaux/"+chap+"/"+studentId+"/aide", { seance, nom, classeSeg, ts });
  //       Le prof « ✓ vu » l'efface, ou rebondit sur APP.openHelpFor(uid) (déjà existant) pour
  //       ouvrir l'aide à distance sur l'écran de l'élève.
  //
  //  2) RAPPEL — le prof pousse un mot court sur l'écran d'un élève (« reprends la consigne »…).
  //     • Canal : DÉJÀ prêt. control/{chap}/{uid}/act route les ordres (cf. applyAct). Émettre :
  //         store.save("control/"+chap+"/"+uid+"/act", { m:'rappel', a:[texte], ts:Date.now() });
  //     • À brancher : un bouton « Rappel » dans le Suivi (elevePopup) avec messages pré-écrits,
  //       gardé par lsGet('wt_rappel')==='1' ; et un cas 'rappel' dans applyAct() côté élève qui
  //       affiche un bandeau/toast non bloquant. Penser au respect de p.epoch (ne pas rejouer un
  //       ordre ancien à la reconnexion), comme pour les autres actes.
  // ──────────────────────────────────────────────────────────────────────────────────────────
  // file de signaux (Lot 4) : liste plate des événements qui demandent l'attention du prof, tous types confondus
  signauxList(){ const out=[]; const S=this._signaux||{};
    Object.keys(S).forEach(uid=>{ if(!this.testMode && isTestUid(uid)) return; const node=S[uid]||{};
      ['bilan','incoherence','aide'].forEach(type=>{ if(node[type]) out.push(Object.assign({uid, type}, node[type])); }); });
    return out.sort((a,b)=>(a.ts||0)-(b.ts||0)); },
  // ── Filtre de classe (suivi / tableau de bord / bilan) : par défaut la classe en cours, sélecteur pour consulter les autres ──
  knownClasses(){ const m={};
    if(typeof CLASSES==='object' && CLASSES) Object.keys(CLASSES).forEach(cl=>{ m[sanId(cl)]=cl; });
    Object.values(this._sessions||{}).forEach(s=>{ if(s && s.classe) m[sanId(s.classe)]=s.classe; });
    return Object.keys(m).map(seg=>({seg, nom:m[seg]})).sort((a,b)=>a.nom.localeCompare(b.nom)); },
  activeClasseSeg(){
    if(this._control){ for(const seg in this._control){ if(seg.indexOf('__')<0 && this._control[seg] && this._control[seg].cours) return seg; } }   // priorité : la classe en séance
    const now=Date.now();
    const segs=[...new Set(Object.values(this._sessions||{}).filter(s=>s && (now-(s.lastSeen||0))<PRESENCE_MS && s.classe).map(s=>sanId(s.classe)))];
    return segs[0]||''; },
  classeFiltreSeg(){ return (this._classeFiltre==null) ? this.activeClasseSeg() : this._classeFiltre; },   // '' = aucune restriction
  setClasseFiltre(v){ this._classeFiltre=(v==='__auto')?null:v;
    if(typeof DASH!=='undefined' && DASH._open) DASH.render();
    if(typeof PROF!=='undefined' && PROF.authed) PROF.render(); },
  classeMatchNom(classe){ const f=this.classeFiltreSeg(); return !f || sanId(classe||'')===f; },
  classeSelectHTML(noToutes){ const auto=(this._classeFiltre==null), cur=this._classeFiltre;
    const opt=(val,lab,sel)=>'<option value="'+val+'"'+(sel?' selected':'')+'>'+lab+'</option>';
    const opts=[ opt('__auto','Classe en cours (auto)', auto) ]
      .concat(noToutes?[]:[ opt('','Toutes les classes', !auto&&cur==='') ])
      .concat(this.knownClasses().map(c=>opt(c.seg, esc(c.nom), !auto&&cur===c.seg)));
    return '<div class="prof-row" style="margin-bottom:10px"><label class="d">Classe affichée&nbsp;: '

  // ── Archive de session : instantané de la classe à la fin du cours (état complet de chaque élève) ──

/* ── MIROIR : reproduit fidèlement l'écran d'un élève (lecture seule, temps réel) ──
   Réutilise le moteur + le Panel, hydratés depuis la progression de l'élève ; suit son écran courant

const MIRROR = {

  roStore:{ save(){}, load(){return null;}, once(k,cb){cb(null);}, subscribe(){return ()=>{};} },
  open(uid){

    $("mirrorTitle").textContent = "Écran de "+name;
    $("mirrorOverlay").classList.add("show");
    this._engine = createEngine(CHAPTER, this.roStore, uid, this._sess.idx||0);
    this._panel  = Panel(this._engine, $("mirrorBody"), name);
    this._panel._mirrorLane="__mirror";                                          // les clics du miroir passent par APP.panel('__mirror') = proxy de pilotage
    this._unsubs.push(store.subscribe("progress/"+chap+"/"+uid, snap=>{ if(!this._engine) return; this._engine.hydrate(snap||{}); this._apply(); }));
    this._unsubs.push(store.subscribe("sessions/"+chap+"/"+uid, sess=>{ if(!this._panel) return; this._sess=sess||{}; this._apply(); }));
    this._renderCtrl();
    this.attachSwipe();
    this._apply();
  },
  // plus de bandeau de boutons : le pilotage se fait en cliquant DANS l'écran. Juste une indication.
  _renderCtrl(){ const el=$("mirrorCtrl"); if(!el) return;
    el.innerHTML='<span class="d" style="margin:0">Tu pilotes l\'écran ci-dessus : clique dedans (carte, onglets, réponses, aides). Pour les gestes, choisis un outil dans la barre puis <b>balaye</b> les mots sur l\'écran de l\'élève (relier/étiquette : tape les mots).</span>'; },
  // proxy : chaque méthode appelée par un clic dans le miroir est rejouée sur la tablette de l'élève
  _pilot:{
    goto(id){ MIRROR.act('goto',[id]); },
    pick(qid,ci,multi){ MIRROR.act('pick',[qid,ci,multi]); },
    submit(){ MIRROR.act('submit',[]); },
    retry(){ MIRROR.act('retry',[]); },
    openAide(id){ MIRROR.act('openAide',[id]); },
    submitProf(id){ MIRROR.act('submitProf',[id]); },
    saveLibre(id,txt){ MIRROR.act('saveLibre',[id,txt]); },

    toMap(){ MIRROR.act('toMap',[]); },
    gtool(tool){ if(MIRROR._panel){ MIRROR._panel._tool=(MIRROR._panel._tool===tool)?null:tool; MIRROR._panel._linkPending=null; MIRROR._panel.tab('c'); } },   // choix d'outil : local au prof
    // le prof observe, il ne répond pas à la place de l'élève : ces gestes sont neutralisés dans le miroir
    markQ(){}, setReg(){}, reorder(){}, refreshReg(){}, setPair(){}, toggleRep(){}, setShort(){}, setVF(){}, setClass(){}, expand(){}, goEval(){}, reduce(){}, switchMode(){}, replay(){}, reflectCours(){}, openHelp(){}, setAutoCrit(){}, validateAutocorr(){}, setBilanEcrit(){}, reopenAutocorr(){},
    openGlossaire(){}, glossToggle(){}, glossRemove(){}, closeDico(){},
    render(){}
  },
  act(m, a){ if(!this._uid) return; const chap=CHAPTER.meta.id||"chapitre";
    store.save("control/"+chap+"/"+this._uid+"/act", { m, a:a||[], ts:Date.now() }); },
  // envoie un geste à appliquer chez l'élève : plage de mots (surligner/gomme), paire (relier) ou étiquette
  sendGest(obj){ if(!this._uid) return; const chap=CHAPTER.meta.id||"chapitre";

  // — capture du balayage sur l'écran de contrôle (rejoué chez l'élève) —
  _wordAt(x,y){ const host=$("mirrorBody"); const el=document.elementFromPoint(x,y); if(!el||!el.closest) return null;
    const t=el.closest('.tok'); if(!t||!host.contains(t)) return null; return { zone:t.dataset.z, wi:+t.dataset.i, el:t }; },
  _tipColor(el,tool){ ['hl-j','hl-v','hl-r','hl-b'].forEach(c=>el.classList.remove(c)); if(['j','v','r','b'].includes(tool)) el.classList.add('hl-'+tool); },
  attachSwipe(){ const host=$("mirrorBody"); if(!host||host._wired) return; host._wired=true; const M=this;

  _apply(){ const p=this._panel; if(!p||!this._engine) return;

  },

"               (elements dans le BON ordre ; l'élève les reçoit mélangés.)\n"+
'  paires     { "id":"p1","type":"paires","enonce":"Associe","paires":[{"g":"Cosette","d":"l\'enfant"},{"g":"Javert","d":"le policier"}] }\n'+
'  reperage   { "id":"r1","type":"reperage","enonce":"Relève les verbes","texte":"Cosette *balaie* et *lave*." }\n'+
"               (entoure d'astérisques *les mots* à repérer.)\n"+
'  court      { "id":"c1","type":"court","question":"","reponses":["réponse","variante acceptée"] }\n'+
'  vraifaux   { "id":"v1","type":"vraifaux","enonce":"affirmation","vrai":true,"preuves":["mot-clé attendu dans la justification"] }\n'+
"               (preuves facultatif : si présent, la justification de l'élève doit contenir un mot-clé.)\n"+
'  classement { "id":"k1","type":"classement","enonce":"Classe","paires":[{"g":"lion","d":"animal"},{"g":"rose","d":"plante"}] }\n'+
"               (g = élément, d = sa catégorie ; les catégories sont déduites des d.)\n"+
"  Garde au moins 1 QCM par séance (la « porte »). Mélange les types selon l'objectif.\n\n"+
"RÈGLE DURÉE (dureeEstimee, en minutes) : NE l'invente pas. Estime-la à partir de repères explicites —\n"+
"lecture ≈ 130 mots/min en 4e, copie/écriture ≈ 12 mots/min, +réflexion (question simple ≈ 1–2 min,\n"+
"analyse ≈ 3–5 min), +évaluation. Additionne lecture des supports + écriture attendue + réflexion + éval,\n"+
"explique brièvement ce calcul AVANT le JSON, puis mets le total arrondi dans dureeEstimee. Je l'ajusterai.\n\n"+
"Règles : chaque séance avec une carte {x,y} distincte ; au moins une séance de convergence ; vocabulaire de la classe visée.\n"+
"CHEMINS IDÉAUX : demande-moi l'effectif. Les élèves travaillent par tables de 2, avec UN groupe de 3 si\n"+
"l'effectif est impair. Fournis 3 chemins si une table de 3 existe, sinon 2 ; DÉCALÉS en canon (carré latin)\n"+
"pour qu'à chaque étape les élèves d'une table soient sur des séances différentes ; chaque chemin parcourt\n"+
"TOUS les socles puis finit par la convergence. Conséquence : les socles doivent être AUTONOMES (aucune phrase\n"+
"du type « comme on l'a vu à la séance précédente »), puisqu'un socle peut être abordé en 1re ou en dernière position.\n"+
"Une fois le chapitre produit, je peux te redemander d'AJOUTER ou de remplacer les items d'une séance précise sans tout régénérer.";

function validateChapter(o){
  if(!o || typeof o!=="object") return "ce n'est pas un objet";
  if(!o.meta || !o.meta.titre) return "meta.titre manquant";
  if(!Array.isArray(o.seances) || !o.seances.length) return "aucune séance";
  for(const s of o.seances){
    if(!s.id || !s.titre) return "une séance sans id/titre";
    if(!s.carte || typeof s.carte.x!=="number" || typeof s.carte.y!=="number") return "carte {x,y} manquante sur "+(s.id||"?");
    if(!s.aretes) return "aretes manquantes sur "+s.id;
    if(!s.evaluation || !Array.isArray(s.evaluation.items)) return "evaluation.items manquant sur "+s.id;
  }
  return null;
}
function loadChapter(obj){
  const err=validateChapter(obj);
  if(err){ toast("JSON refusé : "+err); return false; }
  if(!obj.reglages) obj.reglages={reorientation:"immediate",confirmationSaut:true,exclusiviteSeance:true};
  if(obj.reglages.exclusiviteSeance===undefined) obj.reglages.exclusiviteSeance=true;
  if(obj.reglages.afficherNote===undefined) obj.reglages.afficherNote=false;   // note MASQUÉE par défaut : ne s'affiche que si le prof l'active
  obj.seances.forEach(s=>{ if(!s.aretes) s.aretes={conseillee:null,prerequis:null};
    if(!Array.isArray(s.aides)) s.aides=[];
    if(!s.corps) s.corps={consigne:"",supports:[]};
    if(!Array.isArray(s.corps.supports)) s.corps.supports=[];
    if(!s.rn) s.rn="";
    if(!s.carte || typeof s.carte.x!=="number") s.carte={x:50,y:50};
    if(!s.fiche4d) s.fiche4d={titre:"Correction",layers:[]};
    if(!Array.isArray(s.fiche4d.layers)) s.fiche4d.layers=[];
    if(!s.evaluation) s.evaluation={seuil:1,items:[]};
    if(s.sommative===undefined) s.sommative=false;   // une convergence naît formative ; notée seulement par geste explicite du prof
    if(!Array.isArray(s.evaluation.items)) s.evaluation.items=[];
    s.evaluation.items.forEach(it=>{
      if(typeof it.points!=="number" || it.points<0) it.points=1;   // barème par item (défaut 1) — sert la note sommative (N5)
      if(it.type==="qcm"){
      if(!Array.isArray(it.choix)||it.choix.length<2) it.choix=(it.choix||[]).concat(["",""]).slice(0,Math.max(2,(it.choix||[]).length));
      if(!Array.isArray(it.bonnes)||!it.bonnes.length) it.bonnes=[0]; } });
    const nq=s.evaluation.items.filter(i=>i.type==="qcm").length;
    if(typeof s.evaluation.seuil!=="number" || s.evaluation.seuil<1) s.evaluation.seuil=Math.min(2,Math.max(1,nq||1));
    if(nq>0 && s.evaluation.seuil>nq) s.evaluation.seuil=nq;
  });
  if(!obj.meta.id) obj.meta.id="ch"+String(Date.now()).slice(-5);
  CHAPTER=obj;
  chaptersStore.saveOne(obj.meta.id, obj); LIBRARY[obj.meta.id]=JSON.parse(JSON.stringify(obj));
  $("chapTitle").textContent=obj.meta.titre; setAccentForLevel(obj.meta.niveau);
  if(PROF.authed){ PROF.tab="creation"; PROF.render(); }
  toast("Chapitre ajouté à la bibliothèque : "+obj.meta.titre+" — pense à l'activer."); return true;
}

  refreshPreview(){ const o=this._prtRead(); this._prtOpt=o; const fr=$("prtFrame"); if(!fr) return;

    fr.onload=()=>this.countSheets(); fr.srcdoc=html; },
  countSheets(){ const fr=$("prtFrame"), out=$("prtSheets"); if(!fr||!out) return;

  chapterPrintHTML(scope, opt, preview){ const m=CHAPTER.meta;

  /* ── onglet SUIVI (présence groupée par classe, multi-poste) ── */
  suiviBody(){
    const sess=APP._sessions||{}; const all=[];
    Object.keys(sess).forEach(uid=>{ if(!APP.testMode && isTestUid(uid)) return; const s=Object.assign({_uid:uid}, sess[uid]||{});
      s.classe=s.classe||"(sans classe)"; s.classeSeg=s.classeSeg||sanId(s.classe); all.push(s); });
    Object.keys(APP.panels).forEach(k=>{ const p=APP.panels[k]; if(!p||!p.engine) return; const uid=p.engine.studentId; if(!APP.testMode && isTestUid(uid)) return;
      if(all.some(s=>s._uid===uid)) return;
      all.push({ _uid:uid, name:p.name, classe:p.classe||"(sans classe)", classeSeg:p.classeSeg||sanId(p.classe||''), lastSeen:Date.now(), current:(p.screen==="seance"?p.current:null) }); });
    const now=Date.now(); const present=s=>now-(s.lastSeen||0)<PRESENCE_MS;
    // UNE classe à la fois : celle pilotée (auto = classe en séance) ou celle choisie au sélecteur.
    const segAff = APP.classeFiltreSeg() || APP.activeClasseSeg();
    const nomAff = segAff ? ((APP.knownClasses().find(c=>c.seg===segAff)||{}).nom || segAff) : '';
    const dansClasse = all.filter(s=> s.classeSeg===segAff && present(s));
    // « Ailleurs » : connectés d'une AUTRE classe — donc hors de la séance en cours (un seul cours à la fois). Étude, maison, autre niveau.
    const ailleurs   = all.filter(s=> s.classeSeg!==segAff && present(s));
    const fz=this._fz||(this._fz={gel:true,lock:false,logout:false});

    let coursBox='';
    if(segAff){ const c=APP.coursDe(segAff);
      if(c && c.fin){ const f=new Date(c.fin); const hhmm=String(f.getHours()).padStart(2,'0')+'h'+String(f.getMinutes()).padStart(2,'0');
        const reste=Math.round((c.fin-now)/60000);
        coursBox=`<div class="prof-sec cours-sec on"><h4>● Séance en cours — ${esc(nomAff)}</h4>
          <div class="d">Fin prévue à <b>${hhmm}</b>${reste>0?' (dans '+reste+' min)':' — dépassée'}. Alerte 5 min avant la fin. Pendant la séance, tes élèves ne peuvent pas refaire chez eux une séance déjà réussie.</div>
          <div class="prof-row"><button class="btn fire" onclick="PROF.cloturerCours('${segAff}')">■ Clôturer la séance</button>
            <button class="btn ghost" onclick="APP.prolongerCours('${segAff}',10);PROF.render()">+10 min</button></div></div>`;
      } else {
        coursBox=`<div class="prof-sec cours-sec"><h4>▶ Lancer la séance — ${esc(nomAff)}</h4>

    const sigCls = APP.signauxList().filter(x=> !segAff || x.classeSeg===segAff);

                      incoherence:{ic:'⚠', lab:'s\'est sur-évalué', act:'écart entre QCM et autocorrection'},

    const signauxBox = sigCls.length ? `<div class="prof-sec signaux-sec"><h4>Signaux <span class="meta">· ${sigCls.length}</span></h4>

    return APP.classeSelectHTML(true)
      + `<div class="prof-row" style="margin-bottom:10px"><button class="btn primary" onclick="DASH.open()">⛶ Tableau de bord plein écran</button></div>`

  },
  signalVu(uid, type){ const chap=CHAPTER.meta.id||"chapitre"; store.save("signaux/"+chap+"/"+uid+"/"+type, null); toast("Signal traité."); if(this.authed) this.render(); },
  endSessionFor(seg, label){ APP.endSessionFor(seg); toast("Classe « "+label+" » déconnectée."); this.render(); },
  doFreeze(){ const o=this._fz||{gel:true,lock:false,logout:false};

  doResume(){ APP.resumeSessions(); this.render(); },
  // overlay flottant indépendant du panneau (s'affiche même panneau fermé) — réutilisé pour lancer et pour la fin de séance
  _modalOpen(html){ let ov=$("coursOverlay");
    if(!ov){ ov=document.createElement('div'); ov.id='coursOverlay'; ov.className='app-modal-ov'; document.body.appendChild(ov);
      ov.onclick=e=>{ if(e.target===ov) PROF._modalClose(); }; }   // clic en dehors de la boîte → fermer
    ov.innerHTML='<div class="app-modal-box">'+html+'</div>'; ov.classList.add('show'); return ov; },
  _modalClose(){ const ov=$("coursOverlay"); if(ov) ov.classList.remove('show'); },
  lancerCoursModal(seg){ const nom=(APP.knownClasses().find(c=>c.seg===seg)||{}).nom||seg;
    const d=new Date(Date.now()+55*60000); const hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
    this._modalOpen(`<h3>Lancer la séance — ${esc(nom)}</h3>
      <p class="d">À quelle heure se termine le cours ? Je t'alerterai 5 minutes avant, puis je t'amènerai à la clôture.</p>
      <div class="prof-row" style="align-items:center"><label class="d">Fin&nbsp;: <input type="time" id="coursFin" class="txtin" value="${hh}:${mm}" style="margin-left:6px"></label></div>

      <div class="app-modal-foot"><button class="btn ghost" onclick="PROF._modalClose()">Annuler</button>
        <button class="btn primary" onclick="PROF.doLancerCours('${seg}')">▶ Lancer</button></div>`); },
  setFinRel(min){ const d=new Date(Date.now()+min*60000); const el=$("coursFin"); if(el) el.value=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); },
  doLancerCours(seg){ const v=($("coursFin")||{}).value||""; const m=/^(\d{1,2}):(\d{2})$/.exec(v);
    if(!m){ toast("Indique une heure de fin valide."); return; }
    const now=new Date(); const fin=new Date(now); fin.setHours(+m[1], +m[2], 0, 0);
    if(fin.getTime()<=now.getTime()){ toast("L'heure de fin doit être après l'heure actuelle."); return; }
    APP.lancerCours(seg, fin.getTime()); this._modalClose();
    const nom=(APP.knownClasses().find(c=>c.seg===seg)||{}).nom||seg;
    toast("Séance lancée pour "+nom+" — fin à "+m[1].padStart(2,'0')+"h"+m[2]+"."); this.render(); },
  // double confirmation : on montre où en est la classe, on rassure (tout est sauvegardé), PUIS on clôture sur geste explicite
  cloturerCours(seg){ const chap=CHAPTER.meta.id||"chapitre"; const nom=(APP.knownClasses().find(c=>c.seg===seg)||{}).nom||seg;
    this._modalOpen(`<h3>Clôturer la séance — ${esc(nom)} ?</h3><p class="d">Lecture de l'état de la classe…</p>`);
    store.once("progress/"+chap, prog=>{ prog=prog||{}; const total=(CHAPTER.seances||[]).length;
      // état par élève : nombre de séances terminées sur le total (lecture seule, n'écrit rien)
      const lignes=Object.keys(prog).filter(uid=>APP.testMode||!isTestUid(uid)).filter(uid=>{
          const c=(prog[uid]&&prog[uid].classe)||''; return c?sanId(c)===seg:uid.indexOf(seg+'__')===0; })
        .map(uid=>{ let faites=0,n=(prog[uid]||{}).name||uid.split('__').pop();
          try{ let e=(typeof DASH!=='undefined'&&DASH._open)?DASH._engines[uid]:null;     // réutilise le moteur déjà construit si le tableau de bord est ouvert
            if(!e){ e=createEngine(CHAPTER, MIRROR.roStore, uid, 0); e.hydrate(prog[uid]); }
            faites=(e.bilan().faites||[]).length; }catch(_){}
          return { n, faites }; })
        .sort((a,b)=>a.n.localeCompare(b.n));
      const corps = lignes.length
        ? `<div class="clot-recap">${lignes.map(l=>`<div class="clot-row"><span>${esc(l.n)}</span><span class="meta">${l.faites}/${total} séances</span></div>`).join('')}</div>`
        : `<p class="d">Aucune progression enregistrée pour cette classe.</p>`;
      this._modalOpen(`<h3>Clôturer la séance — ${esc(nom)} ?</h3>
        <p class="d">Voici où en est la classe. Tu peux clôturer en toute sécurité&nbsp;: <b>tout est déjà sauvegardé</b> au fil de l'eau. Tu retrouveras l'état exact en rouvrant la session, ou en consultant l'archive figée à cet instant.</p>
        ${corps}
        <div class="app-modal-foot"><button class="btn ghost" onclick="PROF._modalClose()">Annuler</button>
          <button class="btn fire" onclick="PROF.doCloturerCours('${seg}')">■ Clôturer définitivement</button></div>`); }); },
  doCloturerCours(seg){ APP.cloturerCours(seg); this._modalClose(); toast("Séance clôturée et archivée."); this.render(); },
  // modale déclenchée automatiquement à l'heure de fin (peut surgir panneau fermé)
  coursFinModal(seg, nom){ this._modalOpen(`<h3>⏰ Séance terminée — ${esc(nom||'')}</h3>
      <p class="d">L'heure de fin est atteinte. Clôture la séance (gel des chronos, déconnexion, archive), ou prolonge si tu débordes. Rien n'est clôturé automatiquement — c'est toujours toi qui décides.</p>
      <div class="app-modal-foot"><button class="btn ghost" onclick="PROF._modalClose()">Plus tard</button>
        <button class="btn ghost" onclick="APP.prolongerCours('${seg}',10);PROF._modalClose();if(PROF.authed)PROF.render()">+10 min</button>
        <button class="btn fire" onclick="PROF.cloturerCours('${seg}')">■ Clôturer la séance</button></div>`); },
  kickStudent(uid, name){ APP.endSessionForUid(uid); toast(name+" déconnecté."); this.render(); },
  resetStudent(uid, name){ if(typeof confirm==="function" && !confirm("Réinitialiser la progression de "+name+" ?\nL'élève repartira de zéro et sera déconnecté.")) return;
    APP.resetProgressFor(uid); toast("Progression de "+name+" réinitialisée."); this.render(); },
  suiviRowAilleurs(s){
    const age = s ? Date.now()-(s.lastSeen||0) : Infinity;
    const dot = age<60000?"🟢":(age<300000?"🟠":"⚪");
    // élève potentiellement sur un autre chapitre/niveau : pas de titre de séance (il serait faux), pas de miroir (il suppose le chapitre courant)
    const ou = (s && s.current) ? "en séance" : "sur la carte";
    return `<div class="r"><span title="${age<60000?'actif':(age<300000?'en pause':'hors ligne')}">${dot}</span><span>${esc(s.name||s._uid)}</span>
      <span class="meta" style="margin-left:8px;color:var(--gold2)">${esc(s.classe||'')}</span>
      <span class="meta" style="margin-left:auto">${ou}</span></div>`;
  },
  // carte dépliable à 3 crans : aperçu → détail → tout (+ actions). Remplace l'ancienne ligne + popup.
  suiviCard(s){ const uid=s._uid, depth=this._depth[uid]||0;
    const age=Date.now()-(s.lastSeen||0);
    const dot=age<60000?"🟢":(age<300000?"🟠":"⚪");
    const mode={app:'📱 tablette', deux:'📱✏️ les deux', papier:'✏️ papier'}[s.mode||'app']||'';
    const where=(s&&s.current)?((CHAPTER.seances.find(x=>x.id===s.current)||{}).titre||s.current):"sur la carte";
    const sig=(APP._signaux||{})[uid]||{}; const flag=(sig.bilan||sig.incoherence||sig.aide)?'<span class="sui-flag" title="signal en attente">●</span>':'';
    let h=`<div class="sui-card d${depth}">
      <div class="sui-head" onclick="PROF.cycleCard('${esc(uid)}')">
        <span title="${age<60000?'actif':(age<300000?'en pause':'hors ligne')}">${dot}</span>
        <span class="sui-mode" title="Mode de travail déclaré">${mode}</span>
        <span class="sui-nom">${esc(s.name||uid)}</span>${flag}
        <span class="meta" style="margin-left:auto">${esc(where)}</span>
        <span class="sui-chev">${depth?'▾':'▸'}</span></div>`;
    if(depth>=1) h+=this.cardDetail(uid, s, depth);
    return h+`</div>`;
  },
  cardDetail(uid, s, depth){ const eng=this.engineFor(uid);
    if(!eng) return `<div class="sui-body"><div class="d">Pas encore de progression enregistrée.</div></div>`;
    const b=eng.bilan(), total=(CHAPTER.seances||[]).length, ck=ok=>ok?'✓':'⋯';
    let h=`<div class="sui-body"><div class="sui-stats"><span>${b.faites.length}/${total} faites</span>`
      +`<span>autonomie ${b.autonomie.note}/${b.autonomie.sur}</span>`
      +(b.qcm?`<span>QCM ${b.qcm.sur20}/20</span>`:'')+`</div>`;
    if(s.current){ const ps=(b.parSeance||[]).find(x=>x.id===s.current);
      if(ps) h+=`<div class="sui-cp">« ${esc(ps.titre)} » — QCM ${ck(ps.passed)} · correction ${ck(ps.autocorrFait)} · bilan ${ck(ps.bilanEcrit)}</div>`; }
    const sig=(APP._signaux||{})[uid]||{}, st=[];
    if(sig.bilan)st.push('📝 bilan à relire'); if(sig.incoherence)st.push('⚠ s\'est sur-évalué'); if(sig.aide)st.push('✋ demande de l\'aide');
    if(st.length) h+=`<div class="sui-sig">${st.join(' · ')}</div>`;
    if(depth>=2){
      const rows=(b.parSeance||[]).map(ps=>{ const mark=ps.statut==='done'?'✓':(ps.statut==='wip'?'…':'·');
        const inc=ps.autocorrSignal&&ps.autocorrSignal.incoherent?' ⚠':'';
        return `<div class="sui-prow"><span>${mark} ${esc(ps.titre)}</span><span class="meta">${ps.qcm?ps.qcm.good+'/'+ps.qcm.total:''}${ps.etoiles!=null?' · '+ps.etoiles+'★':''}${inc}</span></div>`; }).join('');
      const bloque=((((APP._control||{})[uid]||{}).freeze)||{}).gel;
      const nm=(s.name||uid).replace(/'/g,"\\'");
      h+=`<div class="sui-all">${rows}</div>
        <div class="sui-actions">
          <button class="btn ghost" onclick="event.stopPropagation();PROF.close();MIRROR.open('${esc(uid)}')">👁 écran</button>
          <button class="btn ghost" onclick="event.stopPropagation();APP.openHelpFor('${esc(uid)}');toast('Aide ouverte sur son écran.')">❓ aide</button>
          <button class="btn ghost" onclick="event.stopPropagation();APP.renvoyerAutocorr('${esc(uid)}','${esc(s.current||'')}')">↻ autocorrection</button>
          ${bloque
            ? `<button class="btn ghost" onclick="event.stopPropagation();PROF.debloquer('${esc(uid)}','${esc(nm)}')">▶ débloquer</button>`
            : `<button class="btn fire" onclick="event.stopPropagation();PROF.bloquer('${esc(uid)}','${esc(nm)}')">⛔ bloquer</button>`}
          <button class="btn ghost" onclick="event.stopPropagation();PROF.resetStudent('${esc(uid)}','${esc(nm)}')">↺ réinit.</button>
          <button class="btn ghost" onclick="event.stopPropagation();PROF.kickStudent('${esc(uid)}','${esc(nm)}')">⏏ déconnecter</button>
        </div>`;
    }
    return h+`</div>`;
  },
  // blocage CIBLÉ d'un seul élève (chrono gelé + écran verrouillé), via control/{chap}/{uid} — distinct du gel de toute la classe
  bloquer(uid, nom){ const chap=CHAPTER.meta.id||"chapitre"; const node=Object.assign({}, (APP._control||{})[uid]||{});
    node.freeze={ epoch:Date.now(), gel:true, lock:true }; store.save("control/"+chap+"/"+uid, node);
    toast((nom||'Élève')+" bloqué : chrono gelé, écran verrouillé."); if(this.authed) this.render(); },
  debloquer(uid, nom){ const chap=CHAPTER.meta.id||"chapitre"; const node=Object.assign({}, (APP._control||{})[uid]||{});
    node.freeze={ epoch:Date.now(), gel:false, lock:false }; store.save("control/"+chap+"/"+uid, node);
    toast((nom||'Élève')+" débloqué."); if(this.authed) this.render(); },
  // popup d'actions sur un élève (l'élève lève la main : on tape son nom)
  elevePopup(uid, nom){ this._modalOpen(`<h3>${esc(nom)}</h3>
      <p class="d">Que veux-tu faire pour cet élève&nbsp;?</p>

        <button class="btn ghost" onclick="PROF._modalClose();MIRROR.open('${esc(uid)}')">👁 Voir son écran en direct</button>

        <button class="btn ghost" onclick="PROF._modalClose();PROF.resetStudent('${esc(uid)}','${esc(nom)}')">↺ Réinitialiser sa progression</button>
        <button class="btn ghost" onclick="PROF._modalClose();PROF.kickStudent('${esc(uid)}','${esc(nom)}')">⏏ Déconnecter</button>
      </div>
      <div class="app-modal-foot"><button class="btn ghost" onclick="PROF._modalClose()">Fermer</button></div>`); },

  /* ── onglet BILAN ── */
  /* ── onglet BILAN : agrège TOUTE la classe depuis Firebase (lecture unique de progress/{chap}),
     complété par les élèves connectés localement. Fonctionne depuis le poste prof, sans élève local. ── */
  _bilans:null,
  bilanBody(){
    if(this._bilans==null){ this._bilans="loading"; this.loadBilans();
      return `<div class="prof-sec"><h4>Bilans de la classe</h4><div class="d">Lecture des progressions…</div></div>`; }
    if(this._bilans==="loading") return `<div class="prof-sec"><h4>Bilans de la classe</h4><div class="d">Lecture des progressions…</div></div>`;
    if(!this._bilans.length) return `<div class="prof-sec"><h4>Bilans de la classe</h4>
        <div class="d">Aucune progression enregistrée pour ce chapitre.</div>
        <div class="prof-row"><button class="btn ghost" onclick="PROF.refreshBilans()">↻ Rafraîchir</button></div></div>`;
    const byClass={}; this._bilans.forEach(x=>{ (byClass[x.classe]=byClass[x.classe]||[]).push(x); });
    const clsAff=Object.keys(byClass).filter(cl=>APP.classeMatchNom(cl)).sort();
    const groups=clsAff.map(cl=>{ const seg=sanId(cl);
      const rows=byClass[cl].sort((a,b)=>a.nom.localeCompare(b.nom)).map(x=>{ const b=x.bilan;
        return `<div class="r"><span>${esc(x.nom)}</span>
          <span class="meta">${b.faites.length}/${CHAPTER.seances.length} faites · autonomie ${b.autonomie.note}/${b.autonomie.sur} · QCM ${b.qcm?b.qcm.sur20+'/20':'—'}</span>
          <span style="margin-left:auto;display:flex;gap:6px">
            <button class="btn ghost" title="Imprimer ce bilan" onclick="PROF.printBilan('${esc(x.uid)}')">🖨</button>
            <button class="btn ghost" title="Archiver vers le profil MJPC" onclick="PROF.archiveBilan('${esc(x.uid)}')">📥</button>
            <button class="btn ghost" title="Supprimer ce bilan (efface la progression sur ce chapitre)" onclick="PROF.deleteBilan('${esc(x.uid)}','${esc((x.nom||'').replace(/'/g,"\\'"))}')">🗑</button></span></div>`; }).join("");
      return `<div class="prof-sec"><h4>${esc(cl)} <span class="meta">· ${byClass[cl].length} élève(s)</span></h4>
          <div class="prof-list">${rows}</div>
          <div class="prof-row"><button class="btn primary" onclick="PROF.exportEDClass('${seg}','${esc(cl)}')">Autonomie → École Directe (${esc(cl)})</button></div>
          <pre class="prof-pre" id="edOut-${seg}" style="margin-top:8px;display:none"></pre></div>`;
    }).join("");
    return APP.classeSelectHTML()
      + (groups || `<div class="prof-sec"><div class="d">Aucun bilan pour la classe affichée — change le filtre ci-dessus.</div></div>`)
      + `<div class="prof-row"><button class="btn ghost" onclick="PROF.refreshBilans()">↻ Rafraîchir</button></div>`;
  },
  loadBilans(){ const chap=CHAPTER.meta.id||"chapitre"; const map={};
    // 1) élèves connectés localement (ex. mode test, ou poste partagé) — bilan live
    Object.keys(APP.panels).forEach(k=>{ const p=APP.panels[k]; if(!p||!p.engine) return; if(!APP.testMode && isTestUid(p.engine.studentId)) return;
      map[p.engine.studentId]={ uid:p.engine.studentId, classe:p.classe||"(sans classe)", nom:p.name, bilan:p.engine.bilan() }; });
    // 2) agrégat Firebase : toutes les tablettes. On croise le roster des classes pour retrouver les noms lisibles.
    store.once("progress/"+chap, prog=>{ setTimeout(()=>{ prog=prog||{};
      Object.keys(CLASSES).forEach(cl=>{ extractEleves(CLASSES[cl],[]).forEach(nom=>{ const uid=uidOf(cl,nom);
        if(prog[uid] && !map[uid]){ const e=createEngine(CHAPTER, MIRROR.roStore, uid, 0); e.hydrate(prog[uid]);
          map[uid]={ uid, classe:cl, nom, bilan:e.bilan() }; } }); });
      this._bilans=Object.values(map); if(this.authed && this.tab==="bilan") this.render();
    },0); });
  },
  refreshBilans(){ this._bilans=null; this.render(); },
  /* ── onglet ARCHIVES : instantanés de fin de cours, rejouables en tableau de bord figé ── */
  _archives:null,
  archivesBody(){
    if(this._archives==null){ this._archives="loading"; this.loadArchives();
      return `<div class="prof-sec"><h4>Archives de session</h4><div class="d">Lecture des archives…</div></div>`; }

  reglagesBody(){ const c=CHAPTER;

        <div class="prof-row" style="justify-content:space-between"><span class="d" style="margin:0">💬 <b>Rappel</b> — pousser un mot court sur l'écran d'un élève</span><button class="btn ghost todo-off" disabled>à venir</button></div></div>

  // réinjecte un snapshot nettoyé : réécrit chaque branche de données, SAUF /classes (racine partagée avec les autres apps MJPC)
  importSnapshot(){ const i=document.createElement("input"); i.type="file"; i.accept=".json,application/json";
    i.onchange=()=>{ const f=i.files[0]; if(!f) return; const r=new FileReader();
      r.onload=()=>{ let snap; try{ snap=JSON.parse(r.result); }catch(e){ toast("Fichier illisible."); return; }
        if(!snap || !snap.firebase){ toast("Ce fichier n'est pas un snapshot complet."); return; }
        const chap=CHAPTER.meta.id||"chapitre";
        const branches=Object.keys(snap.firebase).filter(b=>b!=="classes");   // jamais /classes (partagé)
        const nb=(snap.firebase["progress/"+chap] && Object.keys(snap.firebase["progress/"+chap]).length)||0;
        if(typeof confirm==="function" && !confirm("Réinjecter ce snapshot ?\nLes progressions, sessions, contrôle et archives actuels seront REMPLACÉS par ceux du fichier ("+nb+" élèves). Les classes partagées ne sont pas touchées.")) return;
        branches.forEach(b=>{ try{ store.save(b, snap.firebase[b]); }catch(e){} });
        toast("Snapshot réinjecté. Recharge la page pour repartir sur cette base.");
      };
      r.readAsText(f); };
    i.click(); },
  setReo(m){ CHAPTER.reglages.reorientation=m; this.touch(); this.render(); toast("Réorientation : "+m); },
  // publication d'une mise à jour : on sonde le serveur, on ne publie (et donc ne rafraîchit les élèves) QUE lorsqu'il sert la nouvelle version
  publishUpdate(){ this._pubState='polling'; this._pubMsg=''; this.render();
    const base=location.pathname, current=APP._appVersion||'';
    let lastSeen=null, hits=0, tries=0;
    const poll=()=>{ if(this._pubState!=='polling') return; tries++;
      fetch(base+'?_='+Date.now(), {cache:'no-store'}).then(r=>r.text()).then(html=>{
        const m=html.match(/name=["']app-version["'][^>]*content=["']([^"']+)["']/i) || html.match(/content=["']([^"']+)["'][^>]*name=["']app-version["']/i);
        const remote=m?m[1]:null;
        if(remote && remote!==current){ if(remote===lastSeen) hits++; else { hits=1; lastSeen=remote; }
          if(hits>=2){ store.save("appVersion", remote); this._pubState='done';
            this._pubMsg='Publié ('+remote+'). Les élèves vont se rafraîchir automatiquement.'; this.render(); return; } }
        else { hits=0; lastSeen=remote; }
        if(tries>=18){ this._pubState='timeout'; this._pubMsg='Le serveur sert encore l\'ancienne version ('+(remote||'?')+'). Attends une minute et réessaie.'; this.render(); return; }
        setTimeout(poll, 10000);
      }).catch(()=>{ if(tries>=18){ this._pubState='timeout'; this._pubMsg='Impossible de joindre le serveur — réessaie.'; this.render(); } else setTimeout(poll, 10000); }); };
    poll(); },
  cancelPublish(){ this._pubState=null; this._pubMsg='Publication annulée.'; this.render(); },
  resetVersion(){ store.save("appVersion", APP_VERSION); if(typeof APP!=='undefined' && APP._hideUpdateBanner) APP._hideUpdateBanner();
    this._pubMsg="Suivi de version réaligné sur ce fichier ("+APP_VERSION+")."; this.render(); toast("Version publiée alignée."); },
  // Snapshot COMPLET : chapitre + tout l'état Firebase (progressions, sessions, contrôle, archives) → fichier à transmettre pour diagnostic
  exportSnapshot(){ const chap=CHAPTER.meta.id||"chapitre";
    const snap={ exportedAt:new Date().toISOString(), appVersion:APP_VERSION, chapitre:chap, chapter:CHAPTER, firebase:{} };
    const branches=["progress/"+chap, "sessions/"+chap, "control/"+chap, "archives/"+chap, "appVersion", "classes"];
    let pending=branches.length; toast("Capture en cours…");
    const done=()=>{ if(--pending>0) return;
      try{ const blob=new Blob([JSON.stringify(snap,null,2)],{type:"application/json"});
        const url=URL.createObjectURL(blob); const a=document.createElement("a");
        a.href=url; a.download="worktrack-snapshot-"+chap+"-"+new Date().toISOString().slice(0,16).replace(/[:T]/g,"")+".json";
        document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),2000);
        toast("Snapshot complet téléchargé."); }catch(e){ toast("Échec de l'export."); } };
    branches.forEach(b=>{ try{ store.once(b, v=>{ snap.firebase[b]=(v||null); done(); }); }catch(_){ snap.firebase[b]=null; done(); } }); },
  toggleConfirm(){ CHAPTER.reglages.confirmationSaut=!CHAPTER.reglages.confirmationSaut; this.touch(); this.render(); },

    if(typeof MIRROR!=='undefined' && MIRROR._panel && MIRROR._panel.render) MIRROR._panel.render();
    APP.syncMaps();
    toast("Note de l'élève : "+(!shown?"affichée":"masquée")); },

  /* ── Éditeur visuel des séances ── */
  seance(id){ return CHAPTER.seances.find(s=>s.id===id); },
  genId(prefix,arr){ let n=1; const ids=arr.map(x=>x.id); while(ids.includes(prefix+n)) n++; return prefix+n; },

        <div class="prof-row"><button class="btn primary" onclick="PROF.addSeance()">+ Ajouter une séance</button></div></div>
      <div class="prof-sec"><h4>Chemins idéaux (un par élève d'une table, décalés en canon)</h4>
        <div class="d">Chaque chemin doit lister toutes les séances une seule fois. Les élèves d'une table suivent des chemins différents pour ne jamais se croiser.</div>
        ${this.cheminsReco()}
        ${chemins||'<div class="d">Aucun chemin — l\'app suivra l\'ordre des séances.</div>'}
        <div class="prof-row"><button class="btn ghost" onclick="PROF.addChemin()">+ chemin</button></div></div>
      <div class="prof-row"><button class="btn ghost" onclick="PROF.apply()">Appliquer à l'app</button></div>`; },
  // recommandation fondée sur les VRAIES classes du niveau du chapitre (plus de « répartition » abstraite)
  cheminsReco(){ const niv=CHAPTER.meta.niveau; const cls=Object.keys(CLASSES).filter(cn=>niveauOf(cn)===niv);
    const has=(CHAPTER.cheminsIdeaux||[]).length;
    if(!cls.length) return `<div class="d">Aucune classe ${esc(niv||'')} connue — crée tes classes pour dimensionner les chemins.</div>`;
    const lignes=cls.map(cn=>{ const n=extractEleves(CLASSES[cn],[]).length; const req=APP.repartition(n).cheminsRequis;
      return `${esc(cn)} : ${n} élève(s) → ${req} chemin(s)`; });
    const reqMax=Math.max(...cls.map(cn=>APP.repartition(extractEleves(CLASSES[cn],[]).length).cheminsRequis));
    return `<div class="d" style="border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px">
      <b>D'après tes classes ${esc(niv||'')} :</b><br>${lignes.join("<br>")}<br>
      → prévois <b>${reqMax}</b> chemin(s) ; le chapitre en fournit ${has}${has<reqMax?' <span style="color:var(--fire2)">⚠️ à compléter</span>':' ✓'}.</div>`; },
  setCheminPos(ci,pos,id){ const ch=CHAPTER.cheminsIdeaux[ci]; while(ch.length<CHAPTER.seances.length) ch.push(null); ch[pos]=id; this.touch(); },
  addChemin(){ CHAPTER.cheminsIdeaux=CHAPTER.cheminsIdeaux||[]; CHAPTER.cheminsIdeaux.push(CHAPTER.seances.map(s=>s.id)); this.touch(); this.editor(); },

  setBlock(id,bi,k,v){ const b=this._blocks(id)[bi]; if(b) b[k]=v; this.touch(); },
  setBlockType(id,bi,t){ const a=this._blocks(id), b=a[bi]; if(!b) return; const merged=Object.assign(blockDefaults(t), {type:t});
    (CONSIGNE_TYPES[t].fields||[]).forEach(f=>{ if(b[f.k]!=null) merged[f.k]=b[f.k]; }); a[bi]=merged; this.renumber(id); this.touch(); this.editSeance(id); },
  addBlock(id,t){ this._blocks(id).push(blockDefaults(t)); this.renumber(id); this.touch(); this.editSeance(id); },
  delBlock(id,bi){ this._blocks(id).splice(bi,1); this.renumber(id); this.touch(); this.editSeance(id); },
  moveBlock(id,bi,d){ const a=this._blocks(id), j=bi+d; if(j<0||j>=a.length) return; const t=a[bi]; a[bi]=a[j]; a[j]=t; this.renumber(id); this.touch(); this.editSeance(id); },
  dupBlock(id,bi){ const a=this._blocks(id); a.splice(bi+1,0,JSON.parse(JSON.stringify(a[bi]))); this.renumber(id); this.touch(); this.editSeance(id); },
  setComplLine(id,bi,li,v){ const b=this._blocks(id)[bi]; b.completer=b.completer||[]; b.completer[li]=v; this.touch(); },
  addComplLine(id,bi){ const b=this._blocks(id)[bi]; b.completer=b.completer||[]; b.completer.push(''); this.touch(); this.editSeance(id); },
  delComplLine(id,bi,li){ const b=this._blocks(id)[bi]; (b.completer||[]).splice(li,1); if(b.completer && !b.completer.length) delete b.completer; this.touch(); this.editSeance(id); },
  convertConsigne(id){ const s=this.seance(id); s.corps.consigne=parseLegacy(s.corps.consigne); this.renumber(id); this.touch(); this.editSeance(id); },
  setCarte(id,axis,v){ this.seance(id).carte[axis]=Math.max(0,Math.min(100,Number(v)||0)); this.touch(); },
  setDuree(id,v){ const n=Math.max(0,Number(v)||0); if(n) this.seance(id).dureeEstimee=n; else delete this.seance(id).dureeEstimee; this.touch(); },
  setArete(id,which,v){ this.seance(id).aretes[which]=v||null; this.touch(); },
  setSeuil(id,v){ const ev=this.seance(id).evaluation; const nq=ev.items.filter(isAutoItem).length||1;
    ev.seuil=Math.max(1,Math.min(nq,Number(v)||1)); this.touch(); this.editSeance(id); },
  setQ(id,qid,f,v){ this.seance(id).evaluation.items.find(x=>x.id===qid)[f]=v; this.touch(); },
  setPoints(id,itemId,v){ const it=this.seance(id).evaluation.items.find(x=>x.id===itemId); if(!it) return;
    const n=parseFloat(v); it.points=(isFinite(n)&&n>=0)?n:1; this.touch(); },
  toggleSommative(id){ const s=this.seance(id); s.sommative=!s.sommative; this.touch(); this.editSeance(id);
    toast("Convergence : "+(s.sommative?"notée (sommative)":"formative (entraînement)")); },
  _evItem(id,itemId){ return this.seance(id).evaluation.items.find(x=>x.id===itemId); },
  setItemList(id,itemId,field,li,v){ const it=this._evItem(id,itemId); it[field]=it[field]||[]; it[field][li]=v; this.touch(); },
  addItemList(id,itemId,field){ const it=this._evItem(id,itemId); it[field]=it[field]||[]; it[field].push(''); this.touch(); this.editSeance(id); },
  delItemList(id,itemId,field,li){ const it=this._evItem(id,itemId); (it[field]||[]).splice(li,1); this.touch(); this.editSeance(id); },
  moveItemList(id,itemId,field,li,dir){ const it=this._evItem(id,itemId), a=it[field]||[], j=li+dir; if(j<0||j>=a.length) return; const t=a[li]; a[li]=a[j]; a[j]=t; this.touch(); this.editSeance(id); },
  setPairCell(id,itemId,pi,side,v){ const it=this._evItem(id,itemId); it.paires=it.paires||[]; it.paires[pi]=it.paires[pi]||{g:'',d:''}; it.paires[pi][side]=v; this.touch(); },
  addPair(id,itemId){ const it=this._evItem(id,itemId); it.paires=it.paires||[]; it.paires.push({g:'',d:''}); this.touch(); this.editSeance(id); },
  delPair(id,itemId,pi){ const it=this._evItem(id,itemId); (it.paires||[]).splice(pi,1); this.touch(); this.editSeance(id); },
  setChoix(id,qid,ci,v){ this.seance(id).evaluation.items.find(x=>x.id===qid).choix[ci]=v; this.touch(); },
  setBonne(id,qid,ci){ this.seance(id).evaluation.items.find(x=>x.id===qid).bonnes=[ci]; this.touch(); },
  toggleBonne(id,qid,ci,on){ const q=this.seance(id).evaluation.items.find(x=>x.id===qid); q.bonnes=q.bonnes||[];
    const k=q.bonnes.indexOf(ci); if(on){ if(k<0) q.bonnes.push(ci); } else if(k>=0) q.bonnes.splice(k,1);
    q.bonnes.sort((a,b)=>a-b); this.touch(); },
  setMulti(id,qid,on){ const q=this.seance(id).evaluation.items.find(x=>x.id===qid); q.multi=!!on;
    if(!on && q.bonnes.length>1) q.bonnes=[q.bonnes[0]]; if(!q.bonnes.length) q.bonnes=[0]; this.touch(); this.editSeance(id); },
  addChoix(id,qid){ this.seance(id).evaluation.items.find(x=>x.id===qid).choix.push(""); this.touch(); this.editSeance(id); },
  delChoix(id,qid,ci){ const q=this.seance(id).evaluation.items.find(x=>x.id===qid); if(q.choix.length<=2){toast("2 choix minimum.");return;}
    q.choix.splice(ci,1); q.bonnes=(q.bonnes||[]).filter(b=>b!==ci).map(b=>b>ci?b-1:b); if(!q.bonnes.length) q.bonnes=[0];
    this.touch(); this.editSeance(id); },
  addItem(id,type){ const ev=this.seance(id).evaluation; const pfx={qcm:"q",prof:"p",libre:"l",renvoi:"r"}[type]||type.charAt(0);
    const base = type==="qcm" ? {type:"qcm",enonce:"",choix:["",""],bonnes:[0]}
      : EVAL_TYPES[type] ? Object.assign({type}, EVAL_TYPES[type].defaults())
      : type==="prof" ? {type:"prof",question:"",criteres:""}
      : type==="libre" ? {type:"libre",question:""}
      : {type:"renvoi",app:"",ref:""};
    ev.items.push(Object.assign({id:this.genId(pfx,ev.items), points:1}, base)); this.touch(); this.editSeance(id); },
  delItem(id,itemId){ const ev=this.seance(id).evaluation; const it=ev.items.find(x=>x.id===itemId);
    if(it && it.type==="qcm" && ev.items.filter(i=>i.type==="qcm").length<=1){ toast("1 QCM minimum (la porte)."); return; }
    ev.items=ev.items.filter(x=>x.id!==itemId);
    const nq=ev.items.filter(isAutoItem).length; if(ev.seuil>nq) ev.seuil=Math.max(1,nq); this.touch(); this.editSeance(id); },
  addSupport(id){ const s=this.seance(id); s.corps.supports=s.corps.supports||[]; s.corps.supports.push({type:"texte",contenu:""}); this.touch(); this.editSeance(id); },
  setSupport(id,xi,f,v){ this.seance(id).corps.supports[xi][f]=v; this.touch(); if(f==='type') this.editSeance(id); },
  delSupport(id,xi){ this.seance(id).corps.supports.splice(xi,1); this.touch(); this.editSeance(id); },
  addAide(id){ const s=this.seance(id); s.aides=s.aides||[]; s.aides.push({id:this.genId("a",s.aides),cible:"seance",paliers:[""]}); this.touch(); this.editSeance(id); },
  delAide(id,aid){ const s=this.seance(id); s.aides=s.aides.filter(a=>a.id!==aid); this.touch(); this.editSeance(id); },
  setPaliers(id,aid,v){ this.seance(id).aides.find(x=>x.id===aid).paliers=v.split("\n").map(p=>p.trim()).filter(Boolean); this.touch(); },
  addLayer(id){ const f=this.seance(id).fiche4d; f.layers=f.layers||[]; f.layers.push({ic:"•",titre:"",type:"texte",contenu:""}); this.touch(); this.editSeance(id); },
  setLayer(id,li,f,v){ this.seance(id).fiche4d.layers[li][f]=v; this.touch(); },
  delLayer(id,li){ this.seance(id).fiche4d.layers.splice(li,1); this.touch(); this.editSeance(id); },
  apply(){ const err=validateChapter(CHAPTER); this.saveCurrent(); APP.onLibraryUpdate();
    toast(err?("Enregistré (incomplet : "+err+")"):"Enregistré et propagé aux tablettes."); }
};

loadClasses();
// souscription au nœud commun /classes (live en Firebase ; immédiat en mémoire)
classesStore.subscribe(m=>{ CLASSES=m||{};
  if(PROF.authed && PROF.tab==="classes") PROF.render();
  APP.refreshLogins();
});
// classe de démonstration : UNIQUEMENT en local (jamais écrite dans le /classes réel sous Firebase)
if(!MJPC.USE_FIREBASE && !lsGet("mjpc:classes:init") && !Object.keys(CLASSES).length){
  CLASSES["4e Banksy"] = ["BERNARD Emma","DUPONT Marie","LEROY Hugo","MARTIN Lucas","MOREAU Léa","PETIT Thomas"];
  persistClasses();
}
if(!MJPC.USE_FIREBASE) lsSet("mjpc:classes:init", 1);

// — Bibliothèque de chapitres : on amorce avec la graine, puis Firebase complète/remplace en direct —
LIBRARY = { [CHAPTER_SEED.meta.id]: JSON.parse(JSON.stringify(CHAPTER_SEED)) };
chaptersStore.subscribe(v=>{ const fb=v||{};
  // la graine reste disponible tant qu'aucune version Firebase ne porte le même id
  LIBRARY = Object.assign({ [CHAPTER_SEED.meta.id]: JSON.parse(JSON.stringify(CHAPTER_SEED)) }, fb);
  APP.onLibraryUpdate();   // propage aux postes élèves ; le panneau prof se rafraîchit sur action (pas sur sa propre écriture)
});
activeStore.subscribe(v=>{ ACTIVE=v||{}; APP.onLibraryUpdate(); });

APP.boot();
</script>
