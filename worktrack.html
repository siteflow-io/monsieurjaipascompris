  /* ── onglet RÉGLAGES ── */
  reglagesBody(){ const c=CHAPTER;
    return `<div class="prof-sec"><h4>Réorientation sur échec</h4>
        <div class="prof-row">
          <button class="btn ghost" onclick="PROF.setReo('immediate')" ${c.reglages.reorientation==='immediate'?'style="border-color:var(--gold-deep);color:var(--gold)"':''}>prérequis immédiat</button>
          <button class="btn ghost" onclick="PROF.setReo('root')" ${c.reglages.reorientation==='root'?'style="border-color:var(--gold-deep);color:var(--gold)"':''}>racine</button></div></div>
      <div class="prof-sec"><h4>Double confirmation</h4>
        <div class="prof-row"><button class="btn ghost" onclick="PROF.toggleConfirm()">${c.reglages.confirmationSaut?'activée':'désactivée'}</button></div></div>
      <div class="prof-sec"><h4>Une seule fois la même séance</h4>
        <div class="d">Empêche deux élèves de la même table de faire la même séance au même moment (anti-copiage).</div>
        <div class="prof-row"><button class="btn ghost" onclick="PROF.toggleExcl()">${c.reglages.exclusiviteSeance?'activé — séance verrouillée si occupée':'désactivé — séances libres'}</button></div></div>
      <div class="prof-sec"><h4>Élèves à ce poste</h4>
        <div class="d">Nombre de moitiés d'écran sur cette tablette/cet ordi (le chapitre doit fournir autant de chemins idéaux).</div>
        <div class="prof-row">
          <button class="btn ghost" onclick="APP.setTableSize(2);PROF.render()" ${APP.tableSize===2?'style="border-color:var(--gold-deep);color:var(--gold)"':''}>2 élèves</button>
          <button class="btn ghost" onclick="APP.setTableSize(3);PROF.render()" ${APP.tableSize===3?'style="border-color:var(--gold-deep);color:var(--gold)"':''}>3 élèves</button>
          <span class="d" style="margin:0">chemins disponibles : ${(c.cheminsIdeaux||[]).length}${(c.cheminsIdeaux||[]).length<APP.tableSize?' ⚠️ insuffisant':''}</span></div></div>
      <div class="prof-sec"><h4>Répartition de la classe</h4>
        <div class="d">Tables de 2, avec un groupe de 3 si l'effectif est impair. En déduit le nombre de chemins idéaux à prévoir dans le JSON.</div>
        <div class="prof-row">Effectif <input class="txtin" style="width:64px" type="number" id="effectif" value="24" oninput="PROF.calcRepartition()"></div>
        <div id="repOut" class="d" style="margin-top:4px">${this.repText(24)}</div></div>
      <div class="prof-sec"><h4>Mode TEST</h4>
        <div class="d">Bascule les postes en élève « bac à sable » (données séparées des vrais élèves), avec réinitialisation et réussite forcée pour parcourir vite un chapitre.</div>
        <div class="prof-row"><button class="btn ghost" onclick="APP.toggleTest();PROF.render()">${APP.testMode?'activé — postes en test':'désactivé'}</button></div></div>`; },
  repText(N){ const r=APP.repartition(N);
    const t2=r.tables.filter(t=>t===2).length, t3=r.tables.filter(t=>t===3).length;
    const has=(CHAPTER.cheminsIdeaux||[]).length;
    return `${r.total} table(s) : ${t2} de 2${t3?` + ${t3} de 3`:''}. Chemins idéaux requis : <b>${r.cheminsRequis}</b> — `
      +`le chapitre en fournit ${has}${has<r.cheminsRequis?' <span style="color:var(--fire2)">⚠️ à compléter</span>':' ✓'}.`; },
  calcRepartition(){ const N=Number(($("effectif")||{}).value)||0; const out=$("repOut"); if(out) out.innerHTML=this.repText(N); },
  setReo(m){ CHAPTER.reglages.reorientation=m; this.render(); toast("Réorientation : "+m); },
  toggleConfirm(){ CHAPTER.reglages.confirmationSaut=!CHAPTER.reglages.confirmationSaut; this.render(); },
  toggleExcl(){ CHAPTER.reglages.exclusiviteSeance=!CHAPTER.reglages.exclusiviteSeance;
    this.render(); APP.syncMaps(); toast("Exclusivité de séance : "+(CHAPTER.reglages.exclusiviteSeance?"activée":"désactivée")); },

  /* ── Éditeur visuel des séances ── */
  seance(id){ return CHAPTER.seances.find(s=>s.id===id); },
  genId(prefix,arr){ let n=1; const ids=arr.map(x=>x.id); while(ids.includes(prefix+n)) n++; return prefix+n; },
  editor(){ const list=CHAPTER.seances.map(s=>`<div class="r"><span class="id">${s.rn||s.id}</span><span>${esc(s.titre)}</span>
      <span class="meta"><button class="btn ghost" onclick="PROF.editSeance('${s.id}')">éditer</button>
      <button class="btn ghost" onclick="PROF.delSeance('${s.id}')">suppr.</button></span></div>`).join("");
    const seances=CHAPTER.seances, ids=seances.map(s=>s.id);
    const optS=sel=>seances.map(o=>`<option value="${o.id}" ${sel===o.id?'selected':''}>${esc(o.rn||o.id)}</option>`).join("");
    const chemins=(CHAPTER.cheminsIdeaux||[]).map((ch,ci)=>{
      const complet=ch.length===ids.length && ids.every(id=>ch.includes(id)) && new Set(ch).size===ch.length;
      const cells=seances.map((_,pos)=>`<select onchange="PROF.setCheminPos(${ci},${pos},this.value)">${optS(ch[pos])}</select>`).join(" → ");
      return `<div class="prof-sec" style="padding:8px 10px"><div class="prof-row"><b>Chemin ${LETTERS[ci]||ci+1}</b>
          <span class="d" style="margin:0 0 0 8px">${complet?'✓ complet':'⚠️ doit lister chaque séance une fois'}</span>
          <button class="btn ghost" style="margin-left:auto" onclick="PROF.delChemin(${ci})">×</button></div>
        <div class="prof-row" style="flex-wrap:wrap;gap:4px">${cells}</div></div>`; }).join("");
    $("profModal").innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0">Éditeur — séances</h3><button class="btn ghost" onclick="PROF.render()">← Retour</button></div>
      <div class="prof-sec"><div class="prof-list">${list}</div>
        <div class="prof-row"><button class="btn primary" onclick="PROF.addSeance()">+ Ajouter une séance</button></div></div>
      <div class="prof-sec"><h4>Chemins idéaux (un par élève d'une table, décalés en canon)</h4>
        <div class="d">Chaque chemin doit lister toutes les séances une seule fois. Les élèves d'une table suivent des chemins différents pour ne jamais se croiser.</div>
        ${chemins||'<div class="d">Aucun chemin — l\'app suivra l\'ordre des séances.</div>'}
        <div class="prof-row"><button class="btn ghost" onclick="PROF.addChemin()">+ chemin</button></div></div>
      <div class="prof-row"><button class="btn ghost" onclick="PROF.apply()">Appliquer à l'app</button></div>`; },
  setCheminPos(ci,pos,id){ const ch=CHAPTER.cheminsIdeaux[ci]; while(ch.length<CHAPTER.seances.length) ch.push(null); ch[pos]=id; },
  addChemin(){ CHAPTER.cheminsIdeaux=CHAPTER.cheminsIdeaux||[]; CHAPTER.cheminsIdeaux.push(CHAPTER.seances.map(s=>s.id)); this.editor(); },
  delChemin(ci){ CHAPTER.cheminsIdeaux.splice(ci,1); this.editor(); },
  addSeance(){ const id=this.genId("S",CHAPTER.seances);
    CHAPTER.seances.push({ id, titre:"Nouvelle séance", ville:"", rn:String(CHAPTER.seances.length+1),
      carte:{x:50,y:50}, niveauEntonnoir:"socle", aretes:{conseillee:null,prerequis:null},
      objectif:"", corps:{consigne:"",supports:[]}, aides:[],
      evaluation:{seuil:2, items:[{id:"q1",type:"qcm",enonce:"",choix:["",""],bonnes:[0]}]},
      fiche4d:{titre:"Correction",layers:[]} });
    this.editSeance(id); },
  delSeance(id){ if(CHAPTER.seances.length<=1){toast("Au moins une séance.");return;}
    CHAPTER.seances=CHAPTER.seances.filter(s=>s.id!==id);
    CHAPTER.seances.forEach(s=>{ if(s.aretes.conseillee===id)s.aretes.conseillee=null; if(s.aretes.prerequis===id)s.aretes.prerequis=null; });
    this.editor(); },
  editSeance(id){ const s=this.seance(id), others=CHAPTER.seances.filter(x=>x.id!==id);
    const opt=sel=>`<option value="">—</option>`+others.map(o=>`<option value="${o.id}" ${sel===o.id?'selected':''}>${esc(o.titre)}</option>`).join("");
    const qcm=s.evaluation.items.filter(i=>i.type==="qcm").map((q,qi)=>{
      const choix=q.choix.map((c,ci)=>`<div class="prof-row" style="gap:6px">
        <input type="radio" name="b-${q.id}" ${q.bonnes[0]===ci?'checked':''} onchange="PROF.setBonne('${id}','${q.id}',${ci})">
        <input class="txtin" style="flex:1" value="${esc(c)}" oninput="PROF.setChoix('${id}','${q.id}',${ci},this.value)">
        <button class="btn ghost" onclick="PROF.delChoix('${id}','${q.id}',${ci})">×</button></div>`).join("");
      return `<div class="prof-sec"><div class="prof-row"><b>Q${qi+1}</b>
          <button class="btn ghost" style="margin-left:auto" onclick="PROF.delItem('${id}','${q.id}')">suppr.</button></div>
        <input class="txtin" style="width:100%" placeholder="énoncé" value="${esc(q.enonce)}" oninput="PROF.setQ('${id}','${q.id}','enonce',this.value)">
        <div style="margin-top:6px">${choix}</div>
        <div class="prof-row"><button class="btn ghost" onclick="PROF.addChoix('${id}','${q.id}')">+ choix</button></div></div>`;
    }).join("");
    const aides=(s.aides||[]).map(a=>`<div class="prof-sec"><div class="prof-row"><b>Aide ${a.id}</b>
        <button class="btn ghost" style="margin-left:auto" onclick="PROF.delAide('${id}','${a.id}')">suppr.</button></div>
        <textarea class="txtin" style="width:100%;min-height:54px" placeholder="un palier par ligne" oninput="PROF.setPaliers('${id}','${a.id}',this.value)">${esc((a.paliers||[]).join("\n"))}</textarea></div>`).join("");
    const layers=(s.fiche4d.layers||[]).map((L,li)=>`<div class="prof-row" style="gap:6px">
        <input class="txtin" style="width:46px" value="${esc(L.ic||'')}" oninput="PROF.setLayer('${id}',${li},'ic',this.value)">
        <input class="txtin" style="flex:1" placeholder="titre" value="${esc(L.titre||'')}" oninput="PROF.setLayer('${id}',${li},'titre',this.value)">
        <button class="btn ghost" onclick="PROF.delLayer('${id}',${li})">×</button></div>
        <textarea class="txtin" style="width:100%;min-height:46px;margin-top:4px" placeholder="contenu" oninput="PROF.setLayer('${id}',${li},'contenu',this.value)">${esc(L.contenu||'')}</textarea>`).join("");
    const supports=(s.corps.supports||[]).map((x,xi)=>`<div class="prof-sec" style="padding:8px 10px">
        <div class="prof-row" style="gap:6px"><select onchange="PROF.setSupport('${id}',${xi},'type',this.value)">
          ${["texte","renvoiLivre","lien","image","audio"].map(t=>`<option value="${t}" ${x.type===t?'selected':''}>${t}</option>`).join("")}</select>
          <button class="btn ghost" style="margin-left:auto" onclick="PROF.delSupport('${id}',${xi})">×</button></div>
        <input class="txtin" style="width:100%;margin-top:4px" placeholder="contenu (texte, url, ou détail)" value="${esc(x.contenu||'')}" oninput="PROF.setSupport('${id}',${xi},'contenu',this.value)">
        <div class="prof-row" style="gap:6px;margin-top:4px"><input class="txtin" style="flex:1" placeholder="source" value="${esc(x.source||'')}" oninput="PROF.setSupport('${id}',${xi},'source',this.value)">
          <input class="txtin" style="width:74px" placeholder="pages" value="${esc(x.pages||'')}" oninput="PROF.setSupport('${id}',${xi},'pages',this.value)">
          <input class="txtin" style="flex:1" placeholder="légende" value="${esc(x.legende||'')}" oninput="PROF.setSupport('${id}',${xi},'legende',this.value)"></div></div>`).join("");
    const otherItems=s.evaluation.items.filter(i=>i.type!=="qcm").map(it=>{
      const head=`<div class="prof-row"><b>${it.type}</b><button class="btn ghost" style="margin-left:auto" onclick="PROF.delItem('${id}','${it.id}')">suppr.</button></div>`;
      if(it.type==="prof") return `<div class="prof-sec">${head}
        <textarea class="txtin" style="width:100%;min-height:46px" placeholder="question rédigée" oninput="PROF.setQ('${id}','${it.id}','question',this.value)">${esc(it.question||'')}</textarea>
        <input class="txtin" style="width:100%;margin-top:4px" placeholder="critères de validation (pour toi)" value="${esc(it.criteres||'')}" oninput="PROF.setQ('${id}','${it.id}','criteres',this.value)"></div>`;
      if(it.type==="libre") return `<div class="prof-sec">${head}
        <textarea class="txtin" style="width:100%;min-height:46px" placeholder="question libre" oninput="PROF.setQ('${id}','${it.id}','question',this.value)">${esc(it.question||'')}</textarea></div>`;
      return `<div class="prof-sec">${head}
        <div class="prof-row" style="gap:6px"><input class="txtin" style="flex:1" placeholder="app (ex. etude_texte)" value="${esc(it.app||'')}" oninput="PROF.setQ('${id}','${it.id}','app',this.value)">
          <input class="txtin" style="flex:1" placeholder="référence" value="${esc(it.ref||'')}" oninput="PROF.setQ('${id}','${it.id}','ref',this.value)"></div></div>`;
    }).join("");
    $("profModal").innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3 style="margin:0">Séance ${esc(s.id)}</h3><button class="btn ghost" onclick="PROF.editor()">← Séances</button></div>
      <div class="prof-sec"><h4>Identité</h4>
        <div class="prof-row"><input class="txtin" style="flex:1" placeholder="titre" value="${esc(s.titre)}" oninput="PROF.setField('${id}','titre',this.value)">
          <input class="txtin" style="width:110px" placeholder="ville" value="${esc(s.ville||'')}" oninput="PROF.setField('${id}','ville',this.value)">
          <input class="txtin" style="width:54px" placeholder="n°" value="${esc(s.rn||'')}" oninput="PROF.setField('${id}','rn',this.value)"></div>
        <div class="prof-row">Type
          <select onchange="PROF.setField('${id}','niveauEntonnoir',this.value)">
            <option value="socle" ${s.niveauEntonnoir==='socle'?'selected':''}>socle</option>
            <option value="convergence" ${s.niveauEntonnoir==='convergence'?'selected':''}>convergence</option></select>
          carte x<input class="txtin" style="width:54px" type="number" value="${s.carte.x}" oninput="PROF.setCarte('${id}','x',this.value)">
          y<input class="txtin" style="width:54px" type="number" value="${s.carte.y}" oninput="PROF.setCarte('${id}','y',this.value)"></div>
        <div class="prof-row">conseillée→<select onchange="PROF.setArete('${id}','conseillee',this.value)">${opt(s.aretes.conseillee)}</select>
          prérequis→<select onchange="PROF.setArete('${id}','prerequis',this.value)">${opt(s.aretes.prerequis)}</select></div></div>
      <div class="prof-sec"><h4>Objectif & consigne</h4>
        <input class="txtin" style="width:100%" placeholder="objectif" value="${esc(s.objectif||'')}" oninput="PROF.setField('${id}','objectif',this.value)">
        <textarea class="txtin" style="width:100%;min-height:54px;margin-top:6px" placeholder="consigne" oninput="PROF.setConsigne('${id}',this.value)">${esc(s.corps.consigne||'')}</textarea></div>
      <div class="prof-sec"><h4>Supports à lire</h4>${supports}
        <div class="prof-row"><button class="btn ghost" onclick="PROF.addSupport('${id}')">+ support</button></div></div>
      <div class="prof-sec"><h4>QCM — seuil <input class="txtin" style="width:48px" type="number" value="${s.evaluation.seuil}" onchange="PROF.setSeuil('${id}',this.value)"></h4>
        ${qcm}<div class="prof-row"><button class="btn ghost" onclick="PROF.addItem('${id}','qcm')">+ QCM</button></div></div>
      <div class="prof-sec"><h4>Autres items (corrigés par le prof, libres, renvois)</h4>${otherItems}
        <div class="prof-row"><button class="btn ghost" onclick="PROF.addItem('${id}','prof')">+ prof</button>
          <button class="btn ghost" onclick="PROF.addItem('${id}','libre')">+ libre</button>
          <button class="btn ghost" onclick="PROF.addItem('${id}','renvoi')">+ renvoi</button></div></div>
      <div class="prof-sec"><h4>Aides (chacune coûte une étoile)</h4>${aides}
        <div class="prof-row"><button class="btn ghost" onclick="PROF.addAide('${id}')">+ aide</button></div></div>
      <div class="prof-sec"><h4>Fiche 4D</h4>${layers}
        <div class="prof-row"><button class="btn ghost" onclick="PROF.addLayer('${id}')">+ couche</button></div></div>
      <div class="prof-row"><button class="btn primary" onclick="PROF.apply()">Appliquer à l'app</button></div>`; },
  setField(id,f,v){ this.seance(id)[f]=v; },
  setConsigne(id,v){ this.seance(id).corps.consigne=v; },
  setCarte(id,axis,v){ this.seance(id).carte[axis]=Math.max(0,Math.min(100,Number(v)||0)); },
  setArete(id,which,v){ this.seance(id).aretes[which]=v||null; },
  setSeuil(id,v){ this.seance(id).evaluation.seuil=Math.max(1,Number(v)||1); },
  setQ(id,qid,f,v){ this.seance(id).evaluation.items.find(x=>x.id===qid)[f]=v; },
  setChoix(id,qid,ci,v){ this.seance(id).evaluation.items.find(x=>x.id===qid).choix[ci]=v; },
  setBonne(id,qid,ci){ this.seance(id).evaluation.items.find(x=>x.id===qid).bonnes=[ci]; },
  addChoix(id,qid){ this.seance(id).evaluation.items.find(x=>x.id===qid).choix.push(""); this.editSeance(id); },
  delChoix(id,qid,ci){ const q=this.seance(id).evaluation.items.find(x=>x.id===qid); if(q.choix.length<=2){toast("2 choix minimum.");return;}
    q.choix.splice(ci,1); if(q.bonnes[0]>=q.choix.length) q.bonnes=[0]; this.editSeance(id); },
  addItem(id,type){ const ev=this.seance(id).evaluation; const pfx={qcm:"q",prof:"p",libre:"l",renvoi:"r"}[type]||"i";
    const base = type==="qcm" ? {type:"qcm",enonce:"",choix:["",""],bonnes:[0]}
      : type==="prof" ? {type:"prof",question:"",criteres:""}
      : type==="libre" ? {type:"libre",question:""}
      : {type:"renvoi",app:"",ref:""};
    ev.items.push(Object.assign({id:this.genId(pfx,ev.items)}, base)); this.editSeance(id); },
  delItem(id,itemId){ const ev=this.seance(id).evaluation; const it=ev.items.find(x=>x.id===itemId);
    if(it && it.type==="qcm" && ev.items.filter(i=>i.type==="qcm").length<=1){ toast("1 QCM minimum (la porte)."); return; }
    ev.items=ev.items.filter(x=>x.id!==itemId);
    const nq=ev.items.filter(i=>i.type==="qcm").length; if(ev.seuil>nq) ev.seuil=Math.max(1,nq); this.editSeance(id); },
  addSupport(id){ const s=this.seance(id); s.corps.supports=s.corps.supports||[]; s.corps.supports.push({type:"texte",contenu:""}); this.editSeance(id); },
  setSupport(id,xi,f,v){ this.seance(id).corps.supports[xi][f]=v; },
  delSupport(id,xi){ this.seance(id).corps.supports.splice(xi,1); this.editSeance(id); },
  addAide(id){ const s=this.seance(id); s.aides=s.aides||[]; s.aides.push({id:this.genId("a",s.aides),cible:"seance",paliers:[""]}); this.editSeance(id); },
  delAide(id,aid){ const s=this.seance(id); s.aides=s.aides.filter(a=>a.id!==aid); this.editSeance(id); },
  setPaliers(id,aid,v){ this.seance(id).aides.find(x=>x.id===aid).paliers=v.split("\n").map(p=>p.trim()).filter(Boolean); },
  addLayer(id){ const f=this.seance(id).fiche4d; f.layers=f.layers||[]; f.layers.push({ic:"•",titre:"",type:"texte",contenu:""}); this.editSeance(id); },
  setLayer(id,li,f,v){ this.seance(id).fiche4d.layers[li][f]=v; },
  delLayer(id,li){ this.seance(id).fiche4d.layers.splice(li,1); this.editSeance(id); },
  apply(){ const err=validateChapter(CHAPTER); if(err){toast("Incomplet : "+err);return;} APP.boot(); toast("Appliqué à l'app."); }
};

loadClasses();
// souscription au nœud commun /classes (live en Firebase ; immédiat en mémoire)
classesStore.subscribe(m=>{ CLASSES=m||{};
  if(PROF.authed && PROF.tab==="classes") PROF.render();
  if(APP._needsRoster && CHAPTER.meta.classe && CLASSES[CHAPTER.meta.classe]){ APP._needsRoster=false; APP.boot(); }
});
// classe de démonstration : UNIQUEMENT en local (jamais écrite dans le /classes réel sous Firebase)
if(!MJPC.USE_FIREBASE && !lsGet("mjpc:classes:init") && !Object.keys(CLASSES).length){
  CLASSES["4e Banksy"] = ["BERNARD Emma","DUPONT Marie","LEROY Hugo","MARTIN Lucas","MOREAU Léa","PETIT Thomas"];
  persistClasses();
}
if(!MJPC.USE_FIREBASE) lsSet("mjpc:classes:init", 1);
APP.boot();
</script>
</body>
</html>
