lor:var(--accent);font-family:\"Carlito\",sans-serif;font-weight:700;font-size:10pt;}\n  ol.q ol{padding-left:1.2em;margin:.2em 0;list-style:lower-alpha;}\n  .quoteline{font-style:italic;}\n  .redac{border:1px solid var(--line);border-left:5px solid var(--accent2);border-radius:6px;padding:.5em .8em;margin:.5em 0;}\n  .redac .tt{font-family:\"Carlito\",sans-serif;font-weight:800;color:var(--accent);}\n  table.bareme,table.score{border-collapse:collapse;width:100%;font-family:\"Carlito\",sans-serif;font-size:11pt;margin:.3em 0;}\n  table.bareme th,table.bareme td,table.score th,table.score td{border:1px solid var(--line);padding:5px 9px;text-align:left;}\n  table.bareme th,table.score th{background:var(--accent);color:#fff;}\n  table.bareme td.p,table.score td.p,table.score td.s{text-align:right;white-space:nowrap;}\n  table.score td.s{width:90px;} table.score tr.sub td{background:var(--soft);font-weight:700;}\n  table.score tr.tot td{background:#eef3ee;font-weight:800;}\n  .cor h2{font-family:\"Carlito\",sans-serif;font-size:12pt;color:var(--vert);margin:.5em 0 .15em;border-bottom:1.5px solid var(--vert);padding-bottom:1px;}\n  .cor p{font-size:11.5pt;line-height:1.45;margin:.25em 0;} .cor .pts{color:#888;font-family:\"Carlito\",sans-serif;font-weight:700;font-size:9.5pt;}\n  .consigne{font-family:\"Carlito\",sans-serif;font-size:11.5pt;color:#444;background:var(--soft);border-left:3px solid var(--accent2);padding:.4em .7em;border-radius:5px;margin:.3em 0 .6em;}\n  h2.sec{font-family:\"Carlito\",sans-serif;font-size:13pt;color:var(--accent);margin:.6em 0 .25em;border-bottom:2px solid var(--accent);padding-bottom:2px;}\n  .crit{font-family:\"Carlito\",sans-serif;font-size:11.5pt;line-height:1.6;}\n  .crit .ck{display:inline-block;width:14px;height:14px;border:1.6px solid #888;border-radius:3px;vertical-align:-2px;margin-right:7px;}\n  .crit .grp{font-weight:700;color:var(--accent);margin-top:.35em;}\n  .nuance{font-family:\"Carlito\",sans-serif;font-size:10.5pt;color:#7a5b00;background:#fdf8ec;border:1px dashed #e0c277;border-radius:6px;padding:.4em .7em;margin:.3em 0;line-height:1.4;}\n  .nuance b{color:#9a6b00;}\n  .lvl{display:flex;align-items:flex-start;gap:8px;border:1px solid var(--line);border-left-width:7px;border-radius:6px;padding:6px 10px;margin:5px 0;font-family:\"Carlito\",sans-serif;font-size:11pt;}\n  .lvl .ck{flex:0 0 auto;width:15px;height:15px;border:1.6px solid #888;border-radius:3px;margin-top:2px;}\n  .lvl.r{border-left-color:#c0392b;} .lvl.j{border-left-color:#d39a00;} .lvl.b{border-left-color:#2f6fb0;} .lvl.v{border-left-color:#2e7d4f;}\n  .wl{border-bottom:1px solid #c4c4bd;height:28px;}\n\n</style>\n</head>\n<body>\n<section class=\"page\">\n<div class=\"kicker\">Diplôme national du brevet · Entraînement</div><h1>Compréhension &amp; grammaire</h1><div class=\"subtitle\">Partie 1 de l'épreuve de français — d'après le sujet officiel 2023 (Métropole)</div><hr class=\"hr\"><div class=\"meta-ex\"><b>Sur 50 points.</b> Compréhension et compétences d'interprétation (32 pts) · Grammaire et compétences linguistiques (18 pts). &nbsp; Dictionnaire interdit.</div><span class=\"part\">A. Texte littéraire</span><div class=\"chapeau\">Dans son autobiographie, Aurore Dupin (qui écrit sous le nom de George Sand) raconte son enfance. Elle grandit entourée d'Hippolyte, son demi-frère, et d'Ursule, la fille d'une servante.</div><div class=\"txt\"><div class=\"tl\"><span class=\"ln\">1</span><span class=\"lc\">Nous avions trouvé un jeu qui passionnait nos imaginations. Il s'agissait de passer la</span></div><div class=\"tl\"><span class=\"ln\">2</span><span class=\"lc\">rivière. La rivière était dessinée sur le carreau<sup>1</sup> avec de la craie et faisait mille</span></div><div class=\"tl\"><span class=\"ln\">3</span><span class=\"lc\">détours dans cette grande chambre. En de certains endroits elle était fort profonde, il</span></div><div class=\"tl\"><span class=\"ln\">4</span><span class=\"lc\">fallait trouver l'endroit guéable<sup>2</sup> et ne pas se tromper. Hippolyte s'était déjà noyé</span></div><div class=\"tl\"><span class=\"ln\">5</span><span class=\"lc\">plusieurs fois, nous l'aidions à se retirer des grands trous où il tombait toujours, car</span></div><div class=\"tl\"><span class=\"ln\">6</span><span class=\"lc\">il faisait le rôle du maladroit ou de l'homme ivre, et il nageait à sec sur le carreau en</span></div><div class=\"tl\"><span class=\"ln\">7</span><span class=\"lc\">se débattant et en se lamentant. Pour les enfants ces jeux-là sont tout un drame, toute</span></div><div class=\"tl\"><span class=\"ln\">8</span><span class=\"lc\">une fiction scénique, parfois tout un roman, tout un poème, tout un voyage, qu'ils miment</span></div><div class=\"tl\"><span class=\"ln\">9</span><span class=\"lc\">et rêvent durant des heures entières, et dont l'illusion les gagne et les saisit</span></div><div class=\"tl\"><span class=\"ln\">10</span><span class=\"lc\">véritablement. Pour mon compte, il ne me fallait pas cinq minutes pour m'y plonger de si</span></div><div class=\"tl\"><span class=\"ln\">11</span><span class=\"lc\">bonne foi, que je perdais la notion de la réalité, et je croyais voir les arbres, les</span></div><div class=\"tl\"><span class=\"ln\">12</span><span class=\"lc\">eaux, les rochers, une vaste campagne, et le ciel tantôt clair, tantôt chargé de nuages</span></div><div class=\"tl\"><span class=\"ln\">13</span><span class=\"lc\">qui allaient crever et augmenter le danger de passer la rivière. Dans quel vaste espace</span></div><div class=\"tl\"><span class=\"ln\">14</span><span class=\"lc\">les enfants croient agir, quand ils vont ainsi de la table au lit et de la cheminée à la</span></div><div class=\"tl\"><span class=\"ln\">15</span><span class=\"lc rag\">porte !</span></div></div><div class=\"foot\"><span>Compréhension — Français</span><span>sujet · page 1</span></div>\n</section>\n<section class=\"page\">\n<div class=\"txt\"><div class=\"tl\"><span class=\"ln\">16</span><span class=\"lc\">Nous arrivâmes, Ursule et moi, au bord de notre rivière, dans un endroit où l'herbe était</span></div><div class=\"tl\"><span class=\"ln\">17</span><span class=\"lc\">fine et le sable doux. Elle le tâta d'abord, et puis elle m'appela en me disant : « Vous</span></div><div class=\"tl\"><span class=\"ln\">18</span><span class=\"lc\">pouvez vous y risquer, vous n'en aurez guère plus haut que les genoux. » Les enfants</span></div><div class=\"tl\"><span class=\"ln\">19</span><span class=\"lc\">s'appellent vous dans ces sortes de mimodrames<sup>3</sup>. Ils ne croiraient pas jouer une scène</span></div><div class=\"tl\"><span class=\"ln\">20</span><span class=\"lc\">s'ils se tutoyaient comme à l'ordinaire. Ils représentent toujours certains personnages</span></div><div class=\"tl\"><span class=\"ln\">21</span><span class=\"lc\">qui expriment des caractères, et ils suivent très bien la première donnée. Ils ont même</span></div><div class=\"tl\"><span class=\"ln\">22</span><span class=\"lc\">des dialogues très vrais et que des acteurs de profession seraient bien embarrassés</span></div><div class=\"tl\"><span class=\"ln\">23</span><span class=\"lc rag\">d'improviser sur la scène avec tant d'à-propos et de fécondité<sup>4</sup>.</span></div><div class=\"tl\"><span class=\"ln\">24</span><span class=\"lc\">Sur l'invitation d'Ursule, je lui observai que<sup>5</sup>, puisque l'eau était basse, nous pouvions</span></div><div class=\"tl\"><span class=\"ln\">25</span><span class=\"lc\">bien passer sans nous mouiller ; il ne s'agissait que de relever un peu nos jupes et</span></div><div class=\"tl\"><span class=\"ln\">26</span><span class=\"lc\">d'ôter nos chaussures. « Mais, dit-elle, si nous rencontrons des écrevisses, elles nous</span></div><div class=\"tl\"><span class=\"ln\">27</span><span class=\"lc\">mangeront les pieds. – C'est égal, lui dis-je ; il ne faut pas mouiller nos souliers, nous</span></div><div class=\"tl\"><span class=\"ln\">28</span><span class=\"lc rag\">devons les ménager<sup>6</sup>, car nous avons encore bien du chemin à faire. »</span></div><div class=\"tl\"><span class=\"ln\">29</span><span class=\"lc\">À peine fus-je déchaussée, que le froid du carreau me fit l'effet de l'eau véritable, et</span></div><div class=\"tl\"><span class=\"ln\">30</span><span class=\"lc\">nous voilà, Ursule et moi, pataugeant dans le ruisseau. Pour ajouter à l'illusion</span></div><div class=\"tl\"><span class=\"ln\">31</span><span class=\"lc\">générale, Hippolyte imagina de prendre le pot à l'eau et de le verser par terre, imitant</span></div><div class=\"tl\"><span class=\"ln\">32</span><span class=\"lc\">ainsi un torrent et une cascade. Cela nous sembla délirant d'invention. Nos rires et nos</span></div><div class=\"tl\"><span class=\"ln\">33</span><span class=\"lc\">cris attirèrent enfin l'attention de ma mère. Elle nous regarda, et nous vit tous les</span></div><div class=\"tl\"><span class=\"ln\">34</span><span class=\"lc\">trois, pieds et jambes nus, barbotant dans un cloaque<sup>7</sup>, car le carreau avait déteint, et</span></div><div class=\"tl\"><span class=\"ln\">35</span><span class=\"lc\">notre fleuve était fort peu limpide. Alors elle se fâcha tout de bon, surtout contre moi,</span></div><div class=\"tl\"><span class=\"ln\">36</span><span class=\"lc\">qui étais déjà enrhumée ; elle me prit par le bras, m'appliqua une correction manuelle</span></div><div class=\"tl\"><span class=\"ln\">37</span><span class=\"lc\">assez accentuée, et, m'ayant rechaussée elle-même, en me grondant beaucoup, elle chassa</span></div><div class=\"tl\"><span class=\"ln\">38</span><span class=\"lc\">Hippolyte dans sa chambre, et nous mit en pénitence<sup>8</sup>, Ursule et moi, chacune dans un coin.</span></div><div class=\"tl\"><span class=\"ln\">39</span><span class=\"lc\">Tel fut le dénouement imprévu et dramatique de notre représentation, et la toile tomba sur</span></div><div class=\"tl\"><span class=\"ln\">40</span><span class=\"lc rag\">des larmes et des cris véritables.</span></div></div><div class=\"src\">George Sand [pseudonyme d'Aurore Dupin], <i>Histoire de ma vie</i>, 2ᵉ partie, chap. 15, 1855.</div><div class=\"notes\"><b>1.</b> sur le carreau : sur le carrelage. &nbsp; <b>2.</b> guéable : que l'on peut traverser sans perdre pied. &nbsp; <b>3.</b> mimodrame : pièce de théâtre sans paroles. &nbsp; <b>4.</b> fécondité : inventivité. &nbsp; <b>5.</b> je lui observai que : je lui fis remarquer que. &nbsp; <b>6.</b> ménager : prendre soin de. &nbsp; <b>7.</b> cloaque : égout. &nbsp; <b>8.</b> mettre en pénitence : punir.</div><div class=\"img-desc\"><b>Document B — Robert Doisneau, <i>La ronde des pompons</i>, 1955.</b><br><i>(Photographie en noir et blanc — à projeter, ou à voir sur le sujet officiel.)</i> Dans une cour, de jeunes écoliers vêtus en petits marins, béret à pompon sur la tête, jouent autour d'un grand dessin tracé à la craie sur le sol : on y devine la mer et un bateau. Les enfants évitent soigneusement de marcher sur le décor, comme s'il était réel.</div><div class=\"foot\"><span>Compréhension — Français</span><span>sujet · page 2</span></div>\n</section>\n<section class=\"page\">\n<span class=\"part\">I. Compréhension et compétences d'interprétation (32 points)</span><ol class=\"q\"><li>À la ligne 1, qui désigne le pronom « nous » ? <span class=\"pts\">(2 pts)</span></li><li>Où se passe la scène ? Comment expliquez-vous la présence d'une rivière dans ce lieu ? Justifiez votre réponse en citant le texte. <span class=\"pts\">(5 pts)</span></li><li>« l'illusion les gagne et les saisit véritablement » (ligne 9). Relevez dans le texte trois éléments qui montrent que l'illusion « gagne » et « saisit véritablement » les enfants. <span class=\"pts\">(6 pts)</span></li><li>Le jeu des enfants et sa comparaison : <ol><li>À quoi le jeu est-il comparé tout au long du texte ? Pour le prouver, relevez au moins quatre mots d'un même champ lexical. <span class=\"pts\">(3 pts)</span></li><li>Identifiez au moins trois moments du récit qui montrent que cette comparaison organise le jeu des enfants. <span class=\"pts\">(3 pts)</span></li></ol></li><li>Quelles réflexions sur l'enfance le récit de cet épisode inspire-t-il à la narratrice ? Deux éléments sont attendus ; justifiez en citant des passages précis. <span class=\"pts\">(5 pts)</span></li><li>Document B. Pourquoi cette photographie pourrait-elle illustrer le texte ? Développez deux arguments, chacun justifié par une citation du texte. <span class=\"pts\">(8 pts)</span></li></ol><span class=\"part\">II. Grammaire et compétences linguistiques (18 points)</span><ol class=\"q\" start=\"7\"><li>« <u>En de certains endroits</u> elle était <u>fort profonde</u>. » (ligne 3) <ol><li>Donnez la fonction grammaticale de chaque groupe de mots souligné. <span class=\"pts\">(1 pt)</span></li><li>Justifiez votre analyse du premier groupe souligné en précisant les manipulations utilisées. <span class=\"pts\">(2 pts)</span></li></ol></li><li>« Si nous rencontrons des écrevisses, elles nous mangeront les pieds. » (ligne 26) <ol><li>Recopiez la phrase en mettant la proposition subordonnée entre crochets et en entourant le mot subordonnant. <span class=\"pts\">(1 pt)</span></li><li>Précisez la fonction grammaticale de cette subordonnée. <span class=\"pts\">(1 pt)</span></li></ol></li><li>« Tel fut le <u>dénouement</u> imprévu et dramatique de notre représentation. » (ligne 39) <ol><li>Identifiez et nommez les trois éléments qui composent le mot souligné. <span class=\"pts\">(1,5 pt)</span></li><li>Expliquez le sens de ce mot à partir de ces éléments et à l'aide du texte. <span class=\"pts\">(1,5 pt)</span></li></ol></li><li>Réécrivez le passage suivant (lignes 4 à 7) en remplaçant « Hippolyte » par « ils ». Vous ne modifierez pas le groupe « le rôle du maladroit ou de l'homme ivre ». <span class=\"pts\">(10 pts)</span><div class=\"quoteline\">« Hippolyte s'était déjà noyé plusieurs fois, nous l'aidions à se retirer des grands trous où il tombait toujours, car il faisait le rôle du maladroit ou de l'homme ivre, et il nageait à sec sur le carreau en se débattant et en se lamentant. »</div></li></ol><div class=\"foot\"><span>Compréhension — Français</span><span>sujet · page 3</span></div>\n</section>\n</body></html>", "di": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Dictée — Français</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24em;font-weight:700;display:flex;align-items:baseline;gap:.45em;}\n  h2 .n{display:inline-block;min-width:1.2em;height:1.2em;line-height:1.2em;text-align:center;\n        background:var(--a mily:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n\n</style>\n</head>\n<body><section class=\"page\">\n  <div class=\"kicker\">Révisions Brevet 2026 · Compréhension — Fiche C1</div>\n  <h1>Je me corrige</h1>\n  <div class=\"subtitle\">Bien répondre à une question</div>\n  <hr class=\"hr\">\n  <div class=\"consigne\"><b>1.</b> Je remplis cette page <b>seul</b>, sans regarder le corrigé. &nbsp;<b>2.</b> Je découvre le corrigé (juste après). &nbsp;<b>3.</b> Je reviens ici et j'<b>affine</b> au stylo d'une autre couleur.<br>Pas besoin que ma formulation soit identique : ce qui compte, c'est que ma réponse remplisse les critères.</div>\n  <div class=\"task\">La tâche : je réponds à une question sur le texte (ici : le sentiment de Lucien, une figure, puis une interprétation).</div>\n  <h2 class=\"sec\">Mes critères de réussite (je coche ce que ma réponse contient)</h2>\n  <div class=\"crit\"><div><span class=\"ck\"></span>J'ai repris les mots de la question dans ma réponse (je ne réponds pas à côté).</div><div><span class=\"ck\"></span>J'ai répondu à TOUTES les parties de la question.</div><div><span class=\"ck\"></span>J'ai expliqué ma réponse (je ne me contente pas de recopier le texte).</div><div><span class=\"ck\"></span>J'ai appuyé ma réponse sur une citation du texte, entre guillemets — même quand la question ne le demande pas.</div></div>\n  <div class=\"nuance\"><b>Mais</b> : une citation n'est pas une réponse — je l'introduis et je l'explique ; et je cite <b>court</b>, juste le mot ou le groupe de mots utile, jamais une phrase entière.</div>\n  <h2 class=\"sec\">Je compare avec des réponses-repères</h2>\n  <div class=\"ex good\"><span class=\"tag\">&#10003; Réponse satisfaisante</span>Lucien éprouve la solitude. On le voit quand « le quai était vide » (l. 2) : personne n'est venu l'accueillir à son retour.</div>\n  <div class=\"ex weak\"><span class=\"tag\">&#9888; Réponse insuffisante</span>« Le quai était vide. »<span class=\"why\"><b>Ce qui manque :</b> c'est une citation livrée toute seule : elle ne nomme pas le sentiment et n'explique rien. La citation appuie la réponse, elle ne la remplace pas.</span></div>\n  <h2 class=\"sec\">Je me situe</h2>\n  <div class=\"lvl r\"><span class=\"ck\"></span><span>Je réponds à côté, ou je recopie le texte sans répondre.</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je réponds, mais sans citer ou sans tout traiter.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>Je réponds, je cite et j'explique ; j'oublie parfois une partie de la question.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Je réponds à tout, je cite court et j'explique à chaque fois.</span></div>\n  <h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2>\n  <div class=\"wl\"></div><div class=\"wl\"></div>\n  <div class=\"foot\"><span>Compréhension — Fiche C1 — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n<section class=\"page\"><div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Révisions Brevet 2026</div><h1>Corrigé — Fiche C1</h1><div class=\"subtitle\">Bien répondre à une question · réponses attendues (type 3e)</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 1</span><p><strong>a.</strong> Passage à citer : « attendaient sans un mot » (l. 2). &nbsp; <strong>b.</strong> Cela montre que les blessés sont trop épuisés ou trop marqués pour parler : ils subissent en silence.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (réponse incomplète) —</b> répondre « ils sont fatigués » sans citer, ou recopier la citation sans dire ce qu'elle montre. La citation seule ne suffit pas.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 2</span><p class=\"model\"><span class=\"g\">1. Sentiment —</span> Lucien éprouve la solitude et la déception : « Le quai était vide » / « Il resta seul avec sa valise » (l. 2-3).</p><p class=\"model\"><span class=\"g\">2. Figure —</span> « vide comme un champ après la bataille » = <strong>comparaison</strong> (mot-outil « comme »). Effet : le quai désert est rapproché d'un champ de bataille ravagé ; le retour est vide, marqué par la guerre.</p><p class=\"model\"><span class=\"g\">3. Interprétation —</span> Le retour des soldats n'est pas toujours une fête : beaucoup reviennent seuls, dans l'indifférence, encore marqués par ce qu'ils ont vécu.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (paraphrase) —</b> pour l'interprétation, répéter que Lucien est seul : c'est l'idée du texte, pas une réflexion plus générale. (Et pour la figure : ne pas donner l'effet = réponse incomplète.)</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 3</span><p class=\"model\"><span class=\"g\">1. Sentiment —</span> La désolation, la perte : « n'était plus qu'un tas de pierres noircies » (l. 1) ou « la porte de sa maison disparue » (l. 3). Le vieil homme a perdu son foyer.</p><p class=\"model\"><span class=\"g\">2. Figure —</span> « Le silence pesait comme une pierre » = <strong>comparaison</strong> (mot-outil « comme »). Effet : le silence devient lourd, écrasant, presque matériel ; il rend palpable le vide.</p><p class=\"model\"><span class=\"g\">3. Deux éléments —</span> La guerre détruit (1) les lieux (« un tas de pierres noircies », « la porte de sa maison disparue ») ; (2) la vie d'avant et les repères du quotidien.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (réponse incomplète) —</b> ne donner qu'un seul élément à la question 3 (on en demande deux), ou recopier toute la phrase au lieu d'un groupe de mots précis.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Ce que je dois retrouver dans chaque réponse</span><p class=\"model\"><span class=\"g\">Je repère —</span> une réponse claire, qui reprend les mots de la question.</p><p class=\"model\"><span class=\"g\">Je cite —</span> un mot ou un groupe de mots court, entre guillemets, avec la ligne.</p><p class=\"model\"><span class=\"g\">J'explique —</span> ce que le passage montre (le sens, l'effet) ; et je réponds à toutes les parties.</p></div><div class=\"foot\"><span>Corrigé — Bien répondre à une question</span><span>Fiche C1</span></div></section>\n</body></html>", "c2": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Compréhension C2</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:re et 2026 · Compréhension — Fiche C2</div>\n  <h1>Je me corrige</h1>\n  <div class=\"subtitle\">Interpréter : la question d'ouverture</div>\n  <hr class=\"hr\">\n  <div class=\"consigne\"><b>1.</b> Je remplis cette page <b>seul</b>, sans regarder le corrigé. &nbsp;<b>2.</b> Je découvre le corrigé (juste après). &nbsp;<b>3.</b> Je reviens ici et j'<b>affine</b> au stylo d'une autre couleur.<br>Pas besoin que ma formulation soit identique : ce qui compte, c'est que ma réponse remplisse les critères.</div>\n  <div class=\"task\">La tâche : à partir du texte (le grand-père et sa médaille), j'écris deux réflexions sur la mémoire, justifiées.</div>\n  <h2 class=\"sec\">Mes critères de réussite (je coche ce que ma réponse contient)</h2>\n  <div class=\"crit\"><div><span class=\"ck\"></span>J'ai dégagé une idée générale sur la mémoire (un sens), pas seulement un détail de l'histoire.</div><div><span class=\"ck\"></span>J'ai expliqué ce que la citation montre (j'ai relié la citation à mon idée).</div><div><span class=\"ck\"></span>J'ai bien proposé DEUX réflexions différentes.</div><div><span class=\"ck\"></span>Chaque réflexion est rédigée en plusieurs phrases (idée &rarr; citation &rarr; explication).</div><div><span class=\"ck\"></span>J'ai appuyé ma réponse sur une citation du texte, entre guillemets — même quand la question ne le demande pas.</div></div>\n  <div class=\"nuance\"><b>Mais</b> : une citation n'est pas une réponse — je l'introduis et je l'explique ; et je cite <b>court</b>, juste le mot ou le groupe de mots utile, jamais une phrase entière.</div>\n  <h2 class=\"sec\">Je compare avec des réponses-repères</h2>\n  <div class=\"ex good\"><span class=\"tag\">&#10003; Réponse satisfaisante</span>Ce texte montre que la mémoire de la guerre reste douloureuse et intime. En effet, le grand-père « ne racontait jamais rien » mais sortait sa médaille en silence. Cela prouve qu'il garde un souvenir qu'il ne parvient pas à partager.</div>\n  <div class=\"ex weak\"><span class=\"tag\">&#9888; Réponse insuffisante</span>Le grand-père est triste à cause de la guerre.<span class=\"why\"><b>Ce qui manque :</b> une seule phrase, aucune citation, aucune idée générale sur la mémoire, et rien n'est expliqué : c'est un résumé, pas une interprétation.</span></div>\n  <h2 class=\"sec\">Je me situe</h2>\n  <div class=\"lvl r\"><span class=\"ck\"></span><span>Je raconte le texte, mais je n'en dégage pas d'idée.</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je propose une idée, mais sans citation ou sans l'expliquer.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>J'interprète et je justifie avec une citation ; il me manque parfois la 2e réflexion ou une explication.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Je propose deux interprétations justifiées et clairement expliquées.</span></div>\n  <h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2>\n  <div class=\"wl\"></div><div class=\"wl\"></div>\n  <div class=\"foot\"><span>Compréhension — Fiche C2 — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n<section class=\"page\"><div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Révisions Brevet 2026</div><h1>Corrigé — Fiche C2</h1><div class=\"subtitle\">Interpréter : la question d'ouverture · réponses attendues (type 3e)</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 1</span><p class=\"model\"><span class=\"g\">Réflexion —</span> l'attente des familles est faite d'espoir et de peur ; chacune espère reconnaître un proche. Le texte montre une attente silencieuse et douloureuse. Citation : « Chacune cherchait un visage » (l. 2).</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (paraphrase) —</b> redire « les femmes regardaient les trains » sans en tirer d'idée plus générale.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (hors sujet) —</b> parler de la guerre en général sans relier au texte ni citer.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 2</span><p class=\"model\"><span class=\"g\">Réflexion —</span> la mémoire s'efface vite : on honore les morts, mais le temps fait oublier qui ils étaient. Le souvenir gravé ne suffit pas à les garder vivants. Citation : « plus personne ne sut qui ils avaient été » (l. 2).</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (contresens) —</b> comprendre que les noms ont disparu de la plaque (c'est le souvenir des personnes qui s'efface, pas la plaque).</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 3</span><p class=\"model\"><span class=\"g\">Réflexion —</span> beaucoup de soldats reviennent et se taisent : ils gardent la guerre en eux sans pouvoir la dire. Le silence est une autre façon de porter ce qu'on a vécu. Citation : « n'en parla plus jamais » (l. 1).</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (incomplète) —</b> donner l'idée sans la justifier par une citation.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Ce que je dois retrouver dans chaque réponse</span><p class=\"model\"><span class=\"g\">Je pars du texte —</span> Je repère l'idée précise que le passage donne.</p><p class=\"model\"><span class=\"g\">Je vais plus loin —</span> Je dis une idée plus générale que ce passage fait penser.</p><p class=\"model\"><span class=\"g\">Je justifie —</span> Je cite un mot ou un groupe de mots du texte qui appuie mon idée.</p></div><div class=\"foot\"><span>Corrigé — Interpréter : la question d'ouverture</span><span>Fiche C2</span></div></section>\n</body></html>", "c3": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Compréhension C3</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24em;font-weight:700;display:flex;align-items:baseline;gap:.45em;}\n  h2 .n{display:inline-block;min-width:1.2 tu-head .h{text-align:center;padding:.32em 0;border-left:1px solid #ffffff55;line-height:1.05;}\n  .situ-head .h .chip{display:inline-block;width:.66em;height:.66em;border-radius:50%;margin-right:.2em;vertical-align:-1px;border:1px solid #ffffffaa;}\n  .situ-row{border-top:1px solid var(--line);}\n  .situ-row:nth-child(even){background:#eef2f7;}\n  .situ-q{padding:.36em .6em;font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n\n</style>\n</head>\n<body><section class=\"page\">\n  <div class=\"kicker\">Révisions Brevet 2026 · Compréhension — Fiche C3</div>\n  <h1>Je me corrige</h1>\n  <div class=\"subtitle\">Sentiments & motivations d'un personnage</div>\n  <hr class=\"hr\">\n  <div class=\"consigne\"><b>1.</b> Je remplis cette page <b>seul</b>, sans regarder le corrigé. &nbsp;<b>2.</b> Je découvre le corrigé (juste après). &nbsp;<b>3.</b> Je reviens ici et j'<b>affine</b> au stylo d'une autre couleur.<br>Pas besoin que ma formulation soit identique : ce qui compte, c'est que ma réponse remplisse les critères.</div>\n  <div class=\"task\">La tâche : je dis ce qu'un personnage ressent et pourquoi il agit (ici : la mère sur le quai de la gare).</div>\n  <h2 class=\"sec\">Mes critères de réussite (je coche ce que ma réponse contient)</h2>\n  <div class=\"crit\"><div><span class=\"ck\"></span>J'ai nommé un sentiment précis (pas seulement « content » ou « triste »).</div><div><span class=\"ck\"></span>J'ai expliqué la motivation : pourquoi le personnage agit ainsi.</div><div><span class=\"ck\"></span>J'ai relié le sentiment à un indice du texte (un mot, un geste).</div><div><span class=\"ck\"></span>J'ai appuyé ma réponse sur une citation du texte, entre guillemets — même quand la question ne le demande pas.</div></div>\n  <div class=\"nuance\"><b>Mais</b> : une citation n'est pas une réponse — je l'introduis et je l'explique ; et je cite <b>court</b>, juste le mot ou le groupe de mots utile, jamais une phrase entière.</div>\n  <h2 class=\"sec\">Je compare avec des réponses-repères</h2>\n  <div class=\"ex good\"><span class=\"tag\">&#10003; Réponse satisfaisante</span>La mère cache son chagrin. Elle « se détourna pour qu'il ne vît pas son visage » (l. 1) : elle ne veut pas que son fils la voie pleurer et lui laisse du courage.</div>\n  <div class=\"ex weak\"><span class=\"tag\">&#9888; Réponse insuffisante</span>La mère est triste.<span class=\"why\"><b>Ce qui manque :</b> le sentiment est vague, il n'est ni justifié par le texte ni expliqué (pourquoi se détourne-t-elle ?).</span></div>\n  <h2 class=\"sec\">Je me situe</h2>\n  <div class=\"lvl r\"><span class=\"ck\"></span><span>Je devine un sentiment, sans le justifier.</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je nomme un sentiment, mais je n'explique pas la motivation.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>Je nomme et je justifie ; l'explication de la motivation reste parfois courte.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Je nomme un sentiment précis, je le justifie et j'explique la motivation.</span></div>\n  <h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2>\n  <div class=\"wl\"></div><div class=\"wl\"></div>\n  <div class=\"foot\"><span>Compréhension — Fiche C3 — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n<section class=\"page\"><div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Révisions Brevet 2026</div><h1>Corrigé — Fiche C3</h1><div class=\"subtitle\">Sentiments &amp; motivations d'un personnage · réponses attendues (type 3e)</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 1</span><p class=\"model\"><span class=\"g\">Sentiment —</span> la peur (« ses jambes trembler »).</p><p class=\"model\"><span class=\"g\">Motivation —</span> le courage et le sens du devoir : il avance malgré sa peur (« mais il avança le premier »).</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (contresens) —</b> dire qu'il est courageux et n'a pas peur : le texte dit bien qu'il a peur, mais qu'il avance quand même.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 2</span><p class=\"model\"><span class=\"g\">Sentiment —</span> le manque, l'attachement, l'espoir de revoir l'absent.</p><p class=\"model\"><span class=\"g\">Motivation —</span> garder un lien avec celui qui est parti. Citation : « relisait chaque soir la dernière lettre ».</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (incomplète) —</b> ne donner que le sentiment sans dire la motivation (la question demande les deux).</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 3</span><p class=\"model\"><span class=\"g\">Sentiment —</span> le choc, la douleur, la perte. Citation : « laissa tomber son sac et resta longtemps sans bouger ».</p><p class=\"model\"><span class=\"g\">Ce que montre l'immobilité —</span> il est sidéré, écrasé par ce qu'il découvre.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (style oral) —</b> écrire « il est trop choqué, du coup il bouge plus » : je rédige en langage correct.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Ce que je dois retrouver dans chaque réponse</span><p class=\"model\"><span class=\"g\">Je nomme le sentiment —</span> Je trouve un mot précis (pas seulement « content » ou « triste »).</p><p class=\"model\"><span class=\"g\">J'explique la motivation —</span> Je dis pourquoi le personnage agit ainsi.</p><p class=\"model\"><span class=\"g\">Je justifie —</span> Je cite un mot, une parole ou un geste du texte.</p></div><div class=\"foot\"><span>Corrigé — Sentiments &amp; motivations d'un personnage</span><span>Fiche C3</span></div></section>\n</body></html>", "c4": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Compréhension C4</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin: 92b;} .lvl.j{border-left-color:#d39a00;} .lvl.b{border-left-color:#2f6fb0;} .lvl.v{border-left-color:#2e7d4f;}\n  .wl{border-bottom:1px solid #c4c4bd;height:28px;}\n\n\n/* --- CSS corrigé --- */\n\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24em;font-weight:700;display:flex;align-items:baseline;gap:.45em;}\n  h2 .n{display:inline-block;min-width:1.2em;height:1.2em;line-height:1.2em;text-align:center;\n        background:var(--accent);color:#fff;border-radius:50%;font-size:12pt;flex:none;}\n  p{margin:.3em 0;}\n  .lead{margin:.15em 0 .35em;}\n  strong{color:var(--accent);}\n  em{color:#333;}\n  .quote{font-style:italic;background:var(--soft);border-left:3px solid var(--accent >La tâche : je dégage un trait de caractère et je le prouve (ici : le caporal Vasseur).</div>\n  <h2 class=\"sec\">Mes critères de réussite (je coche ce que ma réponse contient)</h2>\n  <div class=\"crit\"><div><span class=\"ck\"></span>J'ai nommé un trait de caractère (moral, pas une description physique).</div><div><span class=\"ck\"></span>J'ai relié ce trait à une action précise du personnage.</div><div><span class=\"ck\"></span>J'ai expliqué en quoi cette action prouve ce trait.</div><div><span class=\"ck\"></span>J'ai appuyé ma réponse sur une citation du texte, entre guillemets — même quand la question ne le demande pas.</div></div>\n  <div class=\"nuance\"><b>Mais</b> : une citation n'est pas une réponse — je l'introduis et je l'explique ; et je cite <b>court</b>, juste le mot ou le groupe de mots utile, jamais une phrase entière.</div>\n  <h2 class=\"sec\">Je compare avec des réponses-repères</h2>\n  <div class=\"ex good\"><span class=\"tag\">&#10003; Réponse satisfaisante</span>Le caporal Vasseur est courageux. Il « était retourné dans la grange en flammes » en portant deux enfants (l. 1-2) : il a risqué sa vie pour les sauver alors que les autres avaient fui.</div>\n  <div class=\"ex weak\"><span class=\"tag\">&#9888; Réponse insuffisante</span>Il est gentil.<span class=\"why\"><b>Ce qui manque :</b> le trait est vague, rattaché à aucune action du texte et non expliqué.</span></div>\n  <h2 class=\"sec\">Je me situe</h2>\n  <div class=\"lvl r\"><span class=\"ck\"></span><span>Je décris le physique au lieu du caractère.</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je nomme un trait, mais sans le prouver par le texte.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>Je nomme un trait et je le rattache au texte ; l'explication manque parfois.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Je nomme un trait moral, je le prouve par une action et je l'explique.</span></div>\n  <h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2>\n  <div class=\"wl\"></div><div class=\"wl\"></div>\n  <div class=\"foot\"><span>Compréhension — Fiche C4 — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n<section class=\"page\"><div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Révisions Brevet 2026</div><h1>Corrigé — Fiche C4</h1><div class=\"subtitle\">Le portrait moral, justifié · réponses attendues (type 3e)</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 1</span><p class=\"model\"><span class=\"g\">Trait —</span> la générosité (ou le dévouement). Action : « gardait la plus petite part pour lui et donnait le reste à ses hommes ». Il se prive pour les autres.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (hors sujet) —</b> décrire son physique ou son grade au lieu de son caractère.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 2</span><p class=\"model\"><span class=\"g\">Trait —</span> la loyauté, la fidélité (et le courage). Action : « il préféra se taire pour ne pas dénoncer son camarade ». Il accepte d'être accusé à tort plutôt que de trahir.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (contresens) —</b> croire qu'il se tait par peur : il se tait pour protéger son camarade.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 3</span><p class=\"model\"><span class=\"g\">Trait —</span> la lâcheté. Action : « il trouvait toujours une raison de rester en arrière » dès que le danger approchait : il évite le risque.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (incomplète) —</b> nommer « lâcheté » sans citer l'action qui le prouve.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Ce que je dois retrouver dans chaque réponse</span><p class=\"model\"><span class=\"g\">Je nomme un trait moral —</span> Courage, générosité, lâcheté, fierté… (pas « grand » ni « fort »).</p><p class=\"model\"><span class=\"g\">Je le rattache à une action —</span> Je montre ce que le personnage fait dans le texte.</p><p class=\"model\"><span class=\"g\">J'explique —</span> Je dis en quoi cette action prouve ce trait.</p></div><div class=\"foot\"><span>Corrigé — Le portrait moral, justifié</span><span>Fiche C4</span></div></section>\n</body></html>", "c5": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Compréhension C5</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06 entique : ce qui compte, c'est que ma réponse remplisse les critères.</div>\n  <div class=\"task\">La tâche : je dis ce que deux personnages ont en commun (ici : le soldat allemand et le soldat français).</div>\n  <h2 class=\"sec\">Mes critères de réussite (je coche ce que ma réponse contient)</h2>\n  <div class=\"crit\"><div><span class=\"ck\"></span>Je suis allé au-delà de l'évident (pas seulement « ils sont au même endroit »).</div><div><span class=\"ck\"></span>J'ai donné DEUX points communs (la question en demande deux).</div><div><span class=\"ck\"></span>J'ai expliqué le lien (en quoi ils se ressemblent vraiment).</div><div><span class=\"ck\"></span>J'ai appuyé ma réponse sur une citation du texte, entre guillemets — même quand la question ne le demande pas.</div></div>\n  <div class=\"nuance\"><b>Mais</b> : une citation n'est pas une réponse — je l'introduis et je l'explique ; et je cite <b>court</b>, juste le mot ou le groupe de mots utile, jamais une phrase entière.</div>\n  <h2 class=\"sec\">Je compare avec des réponses-repères</h2>\n  <div class=\"ex good\"><span class=\"tag\">&#10003; Réponse satisfaisante</span>Tous deux souffrent de la même manière : ils sont « blessés dans le même trou d'obus » (l. 1). Et tous deux gardent un être cher : « la photo qu'il gardait sur son cœur » (l. 2). Au-delà de l'ennemi, ce sont deux hommes semblables.</div>\n  <div class=\"ex weak\"><span class=\"tag\">&#9888; Réponse insuffisante</span>Ils sont tous les deux blessés.<span class=\"why\"><b>Ce qui manque :</b> un seul point commun, le plus évident, sans citation ni explication ; la question en demandait deux.</span></div>\n  <h2 class=\"sec\">Je me situe</h2>\n  <div class=\"lvl r\"><span class=\"ck\"></span><span>Je donne seulement le point évident (le lieu).</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je trouve un point, mais un seul, ou sans le citer.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>Je donne deux points et je cite ; l'explication du lien reste parfois courte.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Je donne deux points non évidents, cités et expliqués.</span></div>\n  <h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2>\n  <div class=\"wl\"></div><div class=\"wl\"></div>\n  <div class=\"foot\"><span>Compréhension — Fiche C5 — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n<section class=\"page\"><div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Révisions Brevet 2026</div><h1>Corrigé — Fiche C5</h1><div class=\"subtitle\">Personnages &amp; relations · réponses attendues (type 3e)</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 1</span><p class=\"model\"><span class=\"g\">Point commun —</span> la même douleur de mère : toutes deux pleurent un fils mort à la guerre, « un fils qui ne reviendrait pas ». Au-delà des camps, le deuil est le même.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (hors sujet) —</b> opposer les deux mères (française/allemande) au lieu de montrer ce qui les rapproche.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 2</span><p class=\"model\"><span class=\"g\">Point 1 —</span> l'entraide : « ils partagèrent le pain ». <span class=\"g\">Point 2 —</span> l'accueil, l'humanité : « dormirent sous le même toit », malgré la différence de langue.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (incomplète) —</b> ne donner qu'un seul point alors qu'on peut en trouver deux.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 3</span><p class=\"model\"><span class=\"g\">Point commun —</span> la guerre les laisse tous deux vaincus : vainqueur ou vaincu, ils rentrent « les mains vides, le regard éteint ». La guerre ne fait que des perdants.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (contresens) —</b> croire que le vainqueur, lui, rentre heureux : le texte les rapproche, « tous deux ».</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Ce que je dois retrouver dans chaque réponse</span><p class=\"model\"><span class=\"g\">Je cherche plus loin —</span> Je dépasse l'évident (« ils sont au même endroit »).</p><p class=\"model\"><span class=\"g\">Je donne deux points —</span> La question en demande deux : j'en trouve deux.</p><p class=\"model\"><span class=\"g\">Je justifie chacun —</span> Je cite et j'explique le lien pour chaque point.</p></div><div class=\"foot\"><span>Corrigé — Personnages &amp; relations</span><span>Fiche C5</span></div></section>\n</body></html>", "c6": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Compréhension C6</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:   <hr class=\"hr\">\n  <div class=\"consigne\"><b>1.</b> Je remplis cette page <b>seul</b>, sans regarder le corrigé. &nbsp;<b>2.</b> Je découvre le corrigé (juste après). &nbsp;<b>3.</b> Je reviens ici et j'<b>affine</b> au stylo d'une autre couleur.<br>Pas besoin que ma formulation soit identique : ce qui compte, c'est que ma réponse remplisse les critères.</div>\n  <div class=\"task\">La tâche : je repère une figure de style et je dis ce qu'elle fait voir (ici : personnification, gradation).</div>\n  <h2 class=\"sec\">Mes critères de réussite (je coche ce que ma réponse contient)</h2>\n  <div class=\"crit\"><div><span class=\"ck\"></span>J'ai nommé correctement la figure (comparaison, métaphore, personnification, gradation…).</div><div><span class=\"ck\"></span>J'ai cité l'image (les mots exacts qui la forment).</div><div><span class=\"ck\"></span>J'ai expliqué l'effet : ce que la figure fait ressentir ou voir.</div><div><span class=\"ck\"></span>J'ai appuyé ma réponse sur une citation du texte, entre guillemets — même quand la question ne le demande pas.</div></div>\n  <div class=\"nuance\"><b>Mais</b> : une citation n'est pas une réponse — je l'introduis et je l'explique ; et je cite <b>court</b>, juste le mot ou le groupe de mots utile, jamais une phrase entière.</div>\n  <h2 class=\"sec\">Je compare avec des réponses-repères</h2>\n  <div class=\"ex good\"><span class=\"tag\">&#10003; Réponse satisfaisante</span>« Le canon ne dormait jamais » (l. 1) est une personnification : le canon agit comme un être vivant qui veille, ce qui montre une guerre sans répit, angoissante.</div>\n  <div class=\"ex weak\"><span class=\"tag\">&#9888; Réponse insuffisante</span>C'est une personnification.<span class=\"why\"><b>Ce qui manque :</b> la figure est nommée, mais ni citée ni expliquée : nommer ne suffit pas, il faut dire ce qu'elle fait voir.</span></div>\n  <h2 class=\"sec\">Je me situe</h2>\n  <div class=\"lvl r\"><span class=\"ck\"></span><span>Je ne reconnais pas la figure, ou je la nomme au hasard.</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je nomme la figure, mais je ne l'explique pas.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>Je nomme et je cite ; l'effet est parfois peu développé.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Je nomme, je cite et j'explique l'effet précisément.</span></div>\n  <h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2>\n  <div class=\"wl\"></div><div class=\"wl\"></div>\n  <div class=\"foot\"><span>Compréhension — Fiche C6 — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n<section class=\"page\"><div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Révisions Brevet 2026</div><h1>Corrigé — Fiche C6</h1><div class=\"subtitle\">Les figures de style · réponses attendues (type 3e)</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 1</span><p class=\"model\"><span class=\"g\">a. —</span> <strong>personnification</strong> : « le canon ne dormait jamais ». Le canon agit comme un être vivant ; effet : la guerre ne s'arrête jamais, elle est sans répit.</p><p class=\"model\"><span class=\"g\">b. —</span> <strong>gradation</strong> : « grandissait, montait, l'envahissait ». Les verbes montent en intensité ; effet : la peur devient totale, elle envahit tout.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (incomplète) —</b> nommer la figure sans en dire l'effet.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 2</span><p class=\"model\"><span class=\"g\">Figure —</span> <strong>hyperbole</strong> : « des milliers de cris » (exagération). Effet : montrer l'ampleur de la souffrance, le nombre immense de soldats qui souffrent.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (contresens) —</b> prendre « des milliers » au sens exact : c'est une exagération, pas un chiffre réel.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 3</span><p class=\"model\"><span class=\"g\">Figure —</span> <strong>antithèse</strong> : « la mort » opposée à « la vie ». Effet : le contraste brutal montre que la mort et la vie se côtoient sur le champ de bataille.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (paraphrase) —</b> redire « il y a la mort et la vie » sans nommer l'antithèse ni dire l'effet.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Ce que je dois retrouver dans chaque réponse</span><p class=\"model\"><span class=\"g\">Je nomme la figure —</span> Comparaison, métaphore, personnification, gradation…</p><p class=\"model\"><span class=\"g\">Je cite l'image —</span> Je recopie les mots exacts qui forment la figure.</p><p class=\"model\"><span class=\"g\">Je dis l'effet —</span> Je dis ce que la figure fait voir ou ressentir.</p></div><div class=\"foot\"><span>Corrigé — Les figures de style</span><span>Fiche C6</span></div></section>\n</body></html>", "c7": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Compréhension C7</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-siz amily:\"Carlito\",sans-serif;font-weight:700;color:var(--accent);}\n  ul.tight{margin:.22em 0;padding-left:1.2em;}\n  ul.tight li{margin:.14em 0;}\n  .ex{border:1.4px solid var(--line);border-radius:8px;padding:.42em .7em;margin:.4em 0;}\n  .ex-head{font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--rouge);text-transform:uppercase;\n           letter-spacing:.03em;font-size:12pt;margin:0 0 .2em;}\n  .cahier{font-family:\"Carlito\",sans-serif;font-size:12pt;color:var(--accent2);font-style:italic;margin:.3em 0 0;text-align:right;}\n  .pen{font-size:12pt;color:#777;font-style:italic;}\n  .foot{position:absolute;left:18mm;right:18mm;bottom:7mm;display:flex;justify-content:space-between;\n        font-family:\"Carlito\",sans-serif;font-size:12pt;color:#8a8a82;border-top:1px solid var(--line);padding-top:1.6mm;}\n  /* self-eval grid (checkboxes) */\n  .leg{font-size:12pt;color:#444;margin:.12em 0 .3em;line-height:1.25;}\n  .situ{border:1.6px solid var(--accent);border-radius:8px;overflow:hidden;}\n  .situ-head,.situ-row{display:grid;grid-template-columns:1fr 17mm 17mm 17mm 17mm;align-items:center;}\n  .situ-head{background:var(--accent);color:#fff;font-family:\"Carlito\",sans-serif;font-weight:700;font-size:12pt;}\n  .situ-head .h{text-align:center;padding:.32em 0;border-left:1px solid #ffffff55;line-height:1.05;}\n  .situ-head .h .chip{display:inline-block;width:.66em;height:.66em;border-radius:50%;margin-right:.2em;vertical-align:-1px;border:1px solid #ffffffaa;}\n  .situ-row{border-top:1px solid var(--line);}\n  .situ-row:nth-child(even){background:#eef2f7;}\n  .situ-q{padding:.36em .6em;font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n\n</style>\n</head>\n<body><section class=\"page\">\n  <div class=\"kicker\">Révisions Brevet 2026 · Compréhension — Fiche C7</div>\n  <h1>Je me corrige</h1>\n  <div class=\"subtitle\">Image & lien texte-image</div>\n  <hr class=\"hr\">\n  <div class=\"consigne\"><b>1.</b> Je remplis cette page <b>seul</b>, sans regarder le corrigé. &nbsp;<b>2.</b> Je découvre le corrigé (juste après). &nbsp;<b>3.</b> Je reviens ici et j'<b>affine</b> au stylo d'une autre couleur.<br>Pas besoin que ma formulation soit identique : ce qui compte, c'est que ma réponse remplisse les critères.</div>\n  <div class=\"task\">La tâche : je décris une image, je l'interprète, puis je la relie au texte (ici : la route dans le brouillard).</div>\n  <h2 class=\"sec\">Mes critères de réussite (je coche ce que ma réponse contient)</h2>\n  <div class=\"crit\"><div><span class=\"ck\"></span>J'ai d'abord décrit ce que je vois (sans encore interpréter).</div><div><span class=\"ck\"></span>J'ai interprété : ce que l'image veut faire ressentir.</div><div><span class=\"ck\"></span>J'ai donné DEUX points de lien (un détail de l'image relié à un élément ou une citation du texte).</div><div><span class=\"ck\"></span>J'ai appuyé ma réponse sur une citation du texte, entre guillemets — même quand la question ne le demande pas.</div></div>\n  <div class=\"nuance\"><b>Mais</b> : une citation n'est pas une réponse — je l'introduis et je l'explique ; et je cite <b>court</b>, juste le mot ou le groupe de mots utile, jamais une phrase entière.</div>\n  <h2 class=\"sec\">Je compare avec des réponses-repères</h2>\n  <div class=\"ex good\"><span class=\"tag\">&#10003; Réponse satisfaisante</span>L'image montre un homme minuscule, seul, sur une route qui se perd dans le brouillard. Elle fait ressentir la solitude et l'incertitude. Elle rejoint le texte sur deux points : l'homme seul fait écho à « Il marchait seul » ; le brouillard prolonge « un silence plus lourd que tout ».</div>\n  <div class=\"ex weak\"><span class=\"tag\">&#9888; Réponse insuffisante</span>L'image montre un soldat, ça va avec le texte.<span class=\"why\"><b>Ce qui manque :</b> l'image n'est pas vraiment décrite, il n'y a pas d'interprétation, et un seul lien vague (« ça va avec ») sans détail précis ni citation.</span></div>\n  <h2 class=\"sec\">Je me situe</h2>\n  <div class=\"lvl r\"><span class=\"ck\"></span><span>Je décris seulement, ou je dis juste « ça va ensemble ».</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je décris et j'interprète, mais sans relier précisément au texte.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>Je relie l'image au texte ; il me manque parfois le 2e point.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Je décris, j'interprète et je donne deux liens précis (image + texte).</span></div>\n  <h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2>\n  <div class=\"wl\"></div><div class=\"wl\"></div>\n  <div class=\"foot\"><span>Compréhension — Fiche C7 — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n<section class=\"page\"><div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Révisions Brevet 2026</div><h1>Corrigé — Fiche C7</h1><div class=\"subtitle\">Analyse d'image &amp; lien texte-image · réponses attendues (type 3e)</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 1</span><p class=\"model\"><span class=\"g\">Je décris —</span> une photo déchirée et une médaille posées sur une table.</p><p class=\"model\"><span class=\"g\">J'interprète —</span> la perte d'un être cher et le souvenir qu'on en garde.</p><p class=\"model\"><span class=\"g\">Lien (2 points) —</span> la photo déchirée fait écho à la disparition du fils ; la médaille rejoint l'hommage, « un nom sur le monument ».</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (incomplète) —</b> ne donner qu'un seul lien, ou décrire l'image sans la relier au texte.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 2</span><p class=\"model\"><span class=\"g\">Je décris —</span> des enfants jouent devant un mur criblé de balles.</p><p class=\"model\"><span class=\"g\">J'interprète —</span> la vie qui repart malgré les traces de la guerre.</p><p class=\"model\"><span class=\"g\">Lien (2 points) —</span> les enfants qui jouent illustrent « la vie reprenait » ; le mur criblé de balles montre « les traces de la guerre ».</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (hors sujet) —</b> seulement décrire les enfants sans relier au texte ni interpréter le contraste.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Je m'entraîne · 3</span><p class=\"model\"><span class=\"g\">Je décris —</span> une fleur seule au milieu des barbelés.</p><p class=\"model\"><span class=\"g\">J'interprète —</span> l'espoir, la vie qui résiste à la violence.</p><p class=\"model\"><span class=\"g\">Lien —</span> la fleur qui pousse illustre « quelque chose résistait encore » ; les barbelés rappellent la guerre.</p><p style=\"font-family:Carlito;font-size:10pt;color:#b07d00;background:#fdf8ec;border-radius:5px;padding:.28em .55em;margin:.3em 0 0;\"><b>Réponse insuffisante (contresens) —</b> comprendre que la fleur est morte : au contraire, elle « a poussé », elle résiste.</p></div><div class=\"box\" style=\"border-left:4px solid var(--vert);margin:.35em 0;\"><span class=\"tag\" style=\"background:var(--vert)\">Ce que je dois retrouver dans chaque réponse</span><p class=\"model\"><span class=\"g\">Je décris —</span> Je dis ce que je vois (sans encore interpréter).</p><p class=\"model\"><span class=\"g\">J'interprète —</span> Je dis ce que l'image fait ressentir.</p><p class=\"model\"><span class=\"g\">Je relie au texte —</span> Je rapproche un détail de l'image d'un mot du texte (deux points).</p></div><div class=\"foot\"><span>Corrigé — Analyse d'image &amp; lien texte-image</span><span>Fiche C7</span></div></section>\n</body></html>", "al": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Analyse logique</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);
