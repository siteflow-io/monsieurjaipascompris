<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ateliers Révisions Brevet — Console</title>
<style>
  :root{
    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0; --soft:#eef2f7; --line:#cfd4da;
    --pasfait:#cfd5dc; --partiel:#e0a100; --fait:#2e7d4f; --paper:#fff;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#e9ebef;color:var(--ink);
    font-family:"Carlito","Segoe UI","DejaVu Sans",system-ui,sans-serif;}
  .wrap{max-width:none;width:100%;margin:0;padding:14px 20px 30px;}
  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px;}
  .ttl{font-size:24px;font-weight:800;color:var(--accent);line-height:1.1;}
  .sub{font-size:14px;color:#5a626c;margin-top:2px;}
  .tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  button{font-family:inherit;font-size:14px;border:1px solid var(--line);background:#fff;color:var(--ink);
    border-radius:8px;padding:7px 12px;cursor:pointer;font-weight:600;}
  button:hover{background:var(--soft);}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  button.primary:hover{background:#16314f;}
  .modebar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:6px 2px 12px;}
  .modebar .ml{font-weight:700;color:var(--accent);}
  .legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:13px;color:#5a626c;}
  .legend .lg{display:inline-flex;align-items:center;gap:6px;}
  .sw{width:18px;height:18px;border-radius:4px;border:1.5px solid #b8c0c9;display:inline-block;}
  .sw.pf{background:var(--pasfait);} .sw.pa{background:var(--partiel);border-color:var(--partiel);}
  .sw.fa{background:var(--fait);border-color:var(--fait);}
  .legend b{color:var(--accent);}
  /* table */
  .scroll{max-height:72vh;overflow:auto;border:1px solid var(--line);border-radius:12px;background:#fff;}
  table{border-collapse:separate;border-spacing:0;width:100%;}
  th,td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);}
  thead th{position:sticky;top:0;z-index:5;background:var(--accent);color:#fff;padding:8px;font-size:14px;vertical-align:bottom;text-align:center;}
  thead th.elev{left:0;z-index:7;text-align:left;min-width:210px;}
  th.at{min-width:122px;max-width:175px;position:relative;}
  th.at .nm{font-weight:800;line-height:1.12;display:block;cursor:pointer;text-decoration:underline;text-decoration-color:#6f8bb0;}
  th.at .nm:hover{color:#dfe8f5;}
  th.at .meta{font-weight:600;font-size:12px;opacity:.85;display:block;margin-top:2px;}
  th.at .all{margin-top:5px;}
  th.at .all a{color:#dfe8f5;font-size:12px;text-decoration:underline;cursor:pointer;font-weight:600;}
  th.at .edit{position:absolute;top:4px;right:5px;}
  th.at .edit span{cursor:pointer;color:#cdd9ea;font-size:13px;}
  th.at .edit span:hover{color:#fff;}
  tbody td{padding:0;text-align:center;height:38px;}
  tbody td.name{position:sticky;left:0;background:#fff;z-index:3;text-align:left;padding:6px 10px;font-weight:600;}
  tbody tr:nth-child(even) td.name, tbody tr:nth-child(even) td{background:#f6f8fb;}
  tbody td.cell{cursor:pointer;-webkit-user-select:none;user-select:none;}
  .mk{display:inline-block;width:24px;height:24px;border:2px solid #c2c9d1;border-radius:5px;background:#fff;
      vertical-align:middle;position:relative;line-height:22px;font-weight:800;color:#fff;font-size:14px;}
  td.cell.s1 .mk{background:var(--pasfait);border-color:#aab2bc;}
  td.cell.s2 .mk{background:var(--partiel);border-color:var(--partiel);}
  td.cell.s2 .mk::after{content:"½";}
  td.cell.s3 .mk{background:var(--fait);border-color:var(--fait);}
  td.cell.s3 .mk::after{content:"✓";}
  td.cell.s1{background:#f1f3f6 !important;} td.cell.s2{background:#fdf4df !important;} td.cell.s3{background:#eaf5ee !important;}
  td.cell.on .mk{background:var(--accent);border-color:var(--accent);}
  td.cell.on .mk::after{content:"✓";}
  td.cell.on{background:#e9eef5 !important;}
  .rownum{color:#9aa3ad;font-weight:700;font-size:12px;margin-right:7px;}
  tfoot td{position:sticky;bottom:0;z-index:4;background:#f0f3f7;padding:7px 6px;text-align:center;border-top:2px solid var(--accent);}
  tfoot td.elev{left:0;z-index:6;text-align:right;font-weight:700;color:var(--accent);}
  .cnt{font-size:20px;font-weight:800;color:var(--accent);line-height:1;}
  .cnt small{display:block;font-size:11px;font-weight:600;color:#5a626c;margin-top:2px;}
  tfoot button.print{margin-top:5px;width:100%;font-size:13px;padding:6px 4px;}
  tfoot button.print.corr{background:#eaf3ec;border-color:#bcd9c6;color:#1f5e3a;margin-top:4px;}
  tfoot button.print.corr:hover{background:#dcebe0;}
  .pvtoggle{display:flex;gap:0;}
  .pvtoggle button{border-radius:0;border-right:0;}
  .pvtoggle button:first-child{border-radius:8px 0 0 8px;}
  .pvtoggle button:last-child{border-radius:0 8px 8px 0;border-right:1px solid var(--line);}
  .pvtoggle button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  /* modal + preview */
  .modal{position:fixed;inset:0;background:#0009;display:none;align-items:center;justify-content:center;z-index:50;}
  .modal.open{display:flex;}
  .card{background:#fff;border-radius:12px;padding:18px 20px;max-width:520px;width:92%;max-height:86vh;overflow:auto;}
  .card h3{margin:.1em 0 .5em;color:var(--accent);}
  .field{display:block;margin:8px 0;font-size:14px;}
  .field input{width:100%;padding:8px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:14px;}
  .listedit{margin:8px 0;max-height:230px;overflow:auto;border:1px solid var(--line);border-radius:8px;}
  .listedit .li{display:flex;align-items:center;gap:8px;padding:5px 8px;border-bottom:1px solid var(--line);}
  .listedit .li input{flex:1;border:none;font-family:inherit;font-size:14px;padding:3px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;}
  .preview{background:#fff;border-radius:12px;width:min(820px,95vw);max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
  .preview .pvhead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);}
  .preview .pvhead .t{font-weight:800;color:var(--accent);}
  .preview iframe{border:0;width:100%;height:80vh;background:#525659;}
  .preview .pvfoot{padding:8px 12px;color:#5a626c;font-size:13px;border-top:1px solid var(--line);}
  /* print bordereau */
  #printArea{display:none;}
  @media print{ body *{visibility:hidden;} #printArea,#printArea *{visibility:visible;}
    #printArea{display:block;position:absolute;left:0;top:0;width:100%;} @page{size:A4;margin:18mm 16mm;} }
  #printArea{font-family:"Caladea","Bitstream Charter",Georgia,serif;color:#000;}
  #printArea .pk{font-family:"Carlito",sans-serif;font-size:12pt;letter-spacing:.12em;text-transform:uppercase;color:#1d3c61;font-weight:700;}
  #printArea h1{font-size:22pt;margin:.1em 0 .15em;}
  #printArea .pmeta{font-size:12pt;margin:.1em 0;font-family:"Carlito",sans-serif;}
  #printArea .pn{font-weight:800;color:#1d3c61;}
  #printArea hr{border:0;border-top:2px solid #1d3c61;margin:.4em 0 .7em;}
  #printArea ol{font-size:12pt;line-height:1.7;columns:2;column-gap:24mm;padding-left:1.4em;}
  #printArea li{break-inside:avoid;}
  #printArea .box{display:inline-block;width:4mm;height:4mm;border:1.4px solid #555;margin-right:7px;vertical-align:-1px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <div class="ttl">Ateliers Révisions Brevet</div>
      <div class="sub">3e · M. Meney · <span id="today"></span></div>
    </div>
    <div class="tools">
      <button onclick="addAtelier()">+ Atelier</button>
      <button onclick="openStudents()">Élèves</button>
      <button onclick="exportJSON()">Exporter (JSON)</button>
      <button onclick="document.getElementById('importFile').click()">Importer (JSON)</button>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importJSON(this)">
      <button onclick="resetAll()">Réinitialiser</button>
    </div>
  </header>

  <div class="modebar">
    <span class="ml">Mode :</span>
    <div class="pvtoggle">
      <button id="mode_imp" onclick="setMode('imp')">🖨 Impression</button>
      <button id="mode_suivi" onclick="setMode('suivi')">✓ Suivi</button>
    </div>
    <span class="legend" id="legend"></span>
  </div>

  <div class="scroll">
    <table id="grid">
      <thead><tr id="head"></tr></thead>
      <tbody id="body"></tbody>
      <tfoot><tr id="foot"></tr></tfoot>
    </table>
  </div>
</div>

<!-- Modal élèves -->
<div class="modal" id="mStudents"><div class="card">
  <h3>Élèves de la classe</h3>
  <div class="listedit" id="studentList"></div>
  <div style="display:flex;gap:8px;"><span class="field" style="flex:1"><input id="newStudent" placeholder="NOM Prénom" onkeydown="if(event.key==='Enter')addStudent()"></span>
  <button class="primary" onclick="addStudent()">Ajouter</button></div>
  <div class="modal-actions"><button class="primary" onclick="closeModal('mStudents')">Fermer</button></div>
</div></div>

<!-- Modal atelier -->
<div class="modal" id="mAtelier"><div class="card">
  <h3 id="atTitle">Atelier</h3>
  <label class="field">Nom de l'atelier<input id="atNom" placeholder="ex. Compréhension — Fiche C3"></label>
  <label class="field">Précision (facultatif)<input id="atMeta" placeholder="ex. 2 pages A4"></label>
  <label class="field">Document à imprimer (nom du fichier, si pas de fiche embarquée)<input id="atDoc" placeholder="ex. Fiche_C3.pdf"></label>
  <div class="modal-actions">
    <button onclick="deleteAtelier()" id="atDel" style="margin-right:auto;color:#b00;">Supprimer</button>
    <button onclick="closeModal('mAtelier')">Annuler</button>
    <button class="primary" onclick="saveAtelier()">Enregistrer</button>
  </div>
</div></div>

<!-- Preview fiche -->
<div class="modal" id="mPreview"><div class="preview">
  <div class="pvhead"><span class="t" id="pvTitle">Fiche</span>
    <span class="pvtoggle"><button id="bView_f" onclick="setView('fiche')">Fiche</button><button id="bView_c" onclick="setView('corrige')">Correction</button></span>
    <span><button class="primary" onclick="printCurrent()">Imprimer</button>
    <button onclick="closeModal('mPreview')">Fermer</button></span></div>
  <iframe id="pvFrame" title="Aperçu"></iframe>
  <div class="pvfoot" id="pvFoot"></div>
</div></div>

<div id="printArea"></div>
<iframe id="printFrame" style="position:fixed;width:0;height:0;border:0;left:-9999px;"></iframe>

<script>
"use strict";
/* fiches embarquées (injectées au build) */
var EMBED={"c1": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Fiche C1 — Bien répondre à une question sur un texte</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24em;font-weight:700;display:flex;align-items:baseline;gap:.45em;}\n  h2 .n{display:inline-block;min-width:1.2em;height:1.2em;line-height:1.2em;text-align:center;\n        background:var(--accent);color:#fff;border-radius:50%;font-size:12pt;flex:none;}\n  p{margin:.3em 0;}\n  .lead{margin:.15em 0 .35em;}\n  strong{color:var(--accent);}\n  em{color:#333;}\n  .quote{font-style:italic;background:var(--soft);border-left:3px solid var(--accent2);padding:.4em .7em;margin:.4em 0;}\n  .gestes{display:flex;flex-direction:column;gap:.32em;margin:.32em 0 .12em;}\n  .geste{display:flex;gap:.65em;align-items:flex-start;border:1.4px solid var(--line);border-radius:8px;padding:.36em .6em;}\n  .geste .num{font-family:\"Carlito\",sans-serif;font-weight:700;color:#fff;background:var(--accent);\n        width:1.7em;height:1.7em;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:12pt;}\n  .geste .verb{font-family:\"Carlito\",sans-serif;font-weight:700;text-transform:uppercase;color:var(--accent);letter-spacing:.03em;}\n  .geste .txt{margin:.06em 0 0;}\n  .maxim{background:var(--accent);color:#fff;padding:.38em .8em;border-radius:8px;margin:.4em 0;\n         font-family:\"Carlito\",sans-serif;font-weight:700;font-size:13pt;line-height:1.28;}\n  .box{border:1.4px solid var(--line);border-radius:8px;padding:.45em .7em;margin:.4em 0;}\n  .box.tinted{background:var(--soft);}\n  .box .tag{display:inline-block;font-size:12pt;font-weight:700;text-transform:uppercase;letter-spacing:.04em;\n            color:#fff;background:var(--accent2);border-radius:4px;padding:.05em .55em;margin-bottom:.28em;}\n  .model p{margin:.2em 0;}\n  .model .g{font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--accent);}\n  ul.tight{margin:.22em 0;padding-left:1.2em;}\n  ul.tight li{margin:.14em 0;}\n  .ex{border:1.4px solid var(--line);border-radius:8px;padding:.42em .7em;margin:.4em 0;}\n  .ex-head{font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--rouge);text-transform:uppercase;\n           letter-spacing:.03em;font-size:12pt;margin:0 0 .2em;}\n  .cahier{font-family:\"Carlito\",sans-serif;font-size:12pt;color:var(--accent2);font-style:italic;margin:.3em 0 0;text-align:right;}\n  .pen{font-size:12pt;color:#777;font-style:italic;}\n  .foot{position:absolute;left:18mm;right:18mm;bottom:7mm;display:flex;justify-content:space-between;\n        font-family:\"Carlito\",sans-serif;font-size:12pt;color:#8a8a82;border-top:1px solid var(--line);padding-top:1.6mm;}\n  /* self-eval grid (checkboxes) */\n  .leg{font-size:12pt;color:#444;margin:.12em 0 .3em;line-height:1.25;}\n  .situ{border:1.6px solid var(--accent);border-radius:8px;overflow:hidden;}\n  .situ-head,.situ-row{display:grid;grid-template-columns:1fr 17mm 17mm 17mm 17mm;align-items:center;}\n  .situ-head{background:var(--accent);color:#fff;font-family:\"Carlito\",sans-serif;font-weight:700;font-size:12pt;}\n  .situ-head .h{text-align:center;padding:.32em 0;border-left:1px solid #ffffff55;line-height:1.05;}\n  .situ-head .h .chip{display:inline-block;width:.66em;height:.66em;border-radius:50%;margin-right:.2em;vertical-align:-1px;border:1px solid #ffffffaa;}\n  .situ-row{border-top:1px solid var(--line);}\n  .situ-row:nth-child(even){background:#eef2f7;}\n  .situ-q{padding:.36em .6em;font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n  .aubrevet{font-family:\"Carlito\",sans-serif;font-size:12.5pt;color:#1d3c61;background:#eef3f8;border:1.5px solid #2f6fb0;border-radius:8px;padding:.5em .8em;margin:.35em 0 .45em;line-height:1.35;}  .aubrevet b{color:#2f6fb0;}\n  .aubrevet{font-family:\"Carlito\",sans-serif;font-size:12.5pt;color:#1d3c61;background:#eef3f8;border:1.5px solid #2f6fb0;border-radius:8px;padding:.5em .8em;margin:.35em 0 .45em;line-height:1.35;}  .aubrevet b{color:#2f6fb0;}\n  .aubrevet{font-family:\"Carlito\",sans-serif;font-size:12.5pt;color:#1d3c61;background:#eef3f8;border:1.5px solid #2f6fb0;border-radius:8px;padding:.5em .8em;margin:.35em 0 .45em;line-height:1.35;}  .aubrevet b{color:#2f6fb0;}\n</style>\n</head>\n<body>\n<section class=\"page\">\n  <div class=\"kicker\">Révisions Brevet 2026 · Compréhension</div>\n  <h1>Bien répondre à une question sur un texte</h1>\n  <div class=\"subtitle\">Fiche C1 · Compréhension &amp; interprétation</div>\n  <hr class=\"hr\">\n  <div class=\"aubrevet\"><b>Au brevet —</b> à chaque question de compréhension, je dois répondre clairement, prouver avec le texte (citation) et expliquer.</div>\n  <div class=\"cahier-rule\">Je lis cette fiche et je m'entraîne. J'écris toutes mes réponses <strong>dans mon cahier</strong>.</div>\n  <div class=\"gestes\">\n    <div class=\"geste\"><div class=\"num\">1</div><div><span class=\"verb\">Je repère</span><p class=\"txt\">Je dis l'idée que le texte donne. C'est ma réponse à la question.</p></div></div>\n    <div class=\"geste\"><div class=\"num\">2</div><div><span class=\"verb\">Je cite</span><p class=\"txt\">Je recopie entre guillemets le mot ou le groupe de mots qui le prouve, avec le numéro de ligne.</p></div></div>\n    <div class=\"geste\"><div class=\"num\">3</div><div><span class=\"verb\">J'explique</span><p class=\"txt\">Je dis ce que ce passage montre : l'effet, le sens, pourquoi il répond à la question.</p></div></div>\n  </div>\n  <div class=\"maxim\">Une réponse sans citation, c'est une affirmation que rien ne prouve.</div>\n  <div class=\"box model\">\n    <span class=\"tag\">Le modèle</span>\n    <p class=\"quote\">Le vieux Firmin n'ouvrait plus la bouche. Depuis le retour du front, il passait ses journées assis devant la fenêtre, à regarder la pluie tomber sur le jardin abandonné. <span class=\"pen\">(l. 1-2)</span></p>\n    <p><em>Question : que ressent Firmin depuis son retour ?</em></p>\n    <p class=\"model\"><span class=\"g\">Je repère —</span> Firmin est replié sur lui-même, comme absent au monde.</p>\n    <p class=\"model\"><span class=\"g\">Je cite —</span> « n'ouvrait plus la bouche », « assis devant la fenêtre » (l. 1-2).</p>\n    <p class=\"model\"><span class=\"g\">J'explique —</span> le silence et l'immobilité montrent qu'il est marqué par la guerre, coupé des autres.</p>\n  </div>\n  <h2><span class=\"n\">A</span> Citer : le geste qui rapporte le plus de points</h2>\n  <p>C'est là qu'on perd le plus de points : on trouve l'idée, mais on oublie de la <strong>prouver avec le texte</strong>.</p>\n  <ul class=\"tight\">\n    <li>Je mets le passage entre guillemets : <strong>«&nbsp;…&nbsp;»</strong>, et je recopie <strong>exactement</strong> les mots, sans les déformer.</li>\n    <li>J'indique la ligne : <em>(l. 4)</em> ou <em>(l. 7 à 9)</em>.</li>\n    <li>Je cite <strong>court</strong> : un mot ou un groupe de mots précis suffit, jamais toute la phrase.</li>\n    <li><strong>Une citation ne remplace pas la réponse</strong> : je dis d'abord l'idée, je cite ensuite, puis j'explique.</li>\n  </ul>\n  <p style=\"margin-top:.2em;\"><strong>À éviter :</strong> donner l'idée sans citer · citer une phrase entière · poser une citation sans rien en dire.</p>\n  <div class=\"ex\">\n    <div class=\"ex-head\">Je m'entraîne · 1</div>\n    <p class=\"quote\">La salle sentait l'éther. Sur les lits alignés, des hommes au visage bandé attendaient sans un mot. Marthe allait de l'un à l'autre, posant une main légère sur chaque front. <span class=\"pen\">(l. 1-3)</span></p>\n    <p><strong>a.</strong> Quel passage montre que les blessés ne communiquent pas ? Recopie-le entre guillemets, avec la ligne.&nbsp;&nbsp;<strong>b.</strong> Explique en une phrase ce que ce passage montre sur leur état.</p>\n    <p class=\"cahier\">→ Je réponds dans mon cahier.</p>\n  </div>\n  <div class=\"foot\"><span>Bien répondre à une question sur un texte</span><span>Fiche C1 · page 1</span></div>\n</section><section class=\"page\">\n  <h2><span class=\"n\">B</span> Comprendre la consigne, puis aller plus loin</h2>\n  <p style=\"margin:.15em 0 .1em;\"><strong>1. Je décode le verbe de la consigne.</strong> Chaque verbe demande un geste précis :</p>\n  <ul class=\"tight\">\n    <li><strong>Relever / Citer</strong> : recopier exactement les mots du texte, entre guillemets.</li>\n    <li><strong>Justifier</strong> : prouver ma réponse par une citation.</li>\n    <li><strong>Expliquer</strong> : dire ce que le passage montre, son sens ou son effet.</li>\n    <li><strong>Interpréter</strong> : partir du texte pour aller vers une idée plus générale.</li>\n    <li><strong>Nommer / Identifier</strong> : donner le terme exact (la figure, la classe grammaticale…).</li>\n  </ul>\n  <p style=\"margin:.3em 0 .1em;\"><strong>2. Expliquer une figure de style.</strong> Je la <strong>nomme</strong>, je <strong>cite</strong> l'image, et je dis son <strong>effet</strong>.</p>\n  <ul class=\"tight\">\n    <li><strong>Comparaison</strong> : deux choses rapprochées par un mot-outil (<em>comme, tel, pareil à</em>).</li>\n    <li><strong>Métaphore</strong> : un rapprochement entre deux choses, mais sans mot-outil.</li>\n    <li><strong>Personnification</strong> : une chose ou une idée qui agit comme un être vivant.</li>\n    <li><strong>Hyperbole</strong> : une exagération.</li>\n    <li><strong>Énumération</strong> : une liste qui accumule pour insister ; <strong>gradation</strong> quand elle monte en intensité.</li>\n    <li><strong>Antithèse</strong> : deux mots ou deux idées opposés, rapprochés.</li>\n  </ul>\n  <div class=\"box model\">\n    <span class=\"tag\">Le modèle — expliquer une figure</span>\n    <p class=\"quote\">Les obus tombaient comme une pluie de fer. <span class=\"pen\">(l. 3)</span></p>\n    <p class=\"model\"><span class=\"g\">Je nomme —</span> une comparaison (mot-outil « comme »).</p>\n    <p class=\"model\"><span class=\"g\">Je cite —</span> « comme une pluie de fer » (l. 3).</p>\n    <p class=\"model\"><span class=\"g\">J'explique —</span> l'image rend le bombardement continu et impossible à éviter, comme une averse qui n'en finit pas.</p>\n  </div>\n  <p style=\"margin:.3em 0 .1em;\"><strong>3. Interpréter (la question d'ouverture).</strong> Quand on demande « <em>quelle réflexion ce texte peut-il inspirer&nbsp;?</em> », je pars du texte mais je vais vers une idée <strong>plus générale</strong> (sur l'être humain, la guerre, la mémoire). Je ne répète pas le texte.</p>\n  <div class=\"box model\">\n    <span class=\"tag\">Le modèle — interpréter</span>\n    <p class=\"quote\">Le soldat rentra, mais plus personne ne l'attendait. Il s'assit sur sa valise et regarda longtemps la maison fermée. <span class=\"pen\">(l. 1-2)</span></p>\n    <p><em>Question : quelle réflexion sur le retour des soldats ce passage peut-il inspirer ?</em></p>\n    <p class=\"model\"><span class=\"g\">Je pars du texte —</span> le soldat revient, mais « plus personne ne l'attendait ».</p>\n    <p class=\"model\"><span class=\"g\">Je vais vers une idée générale —</span> la guerre ne s'arrête pas au retour : beaucoup de soldats rentrent seuls, oubliés, et doivent réapprendre à vivre.</p>\n  </div>\n  <p style=\"margin:.3em 0 .1em;\"><strong>4. Répondre à TOUT.</strong> Si la question demande « <em>deux éléments</em> » ou « <em>deux arguments</em> », j'en donne <strong>deux</strong>, et je cite pour <strong>chacun</strong>. Une moitié de réponse = une moitié des points.</p>\n  <div class=\"foot\"><span>Bien répondre à une question sur un texte</span><span>Fiche C1 · page 2</span></div>\n</section><section class=\"page\">\n  <h2><span class=\"n\">!</span> Les erreurs qui coûtent cher (et leur nom)</h2>\n  <ul class=\"tight\">\n    <li><strong>Hors sujet</strong> : je réponds à côté de la question.</li>\n    <li><strong>Contresens</strong> : j'ai compris le texte à l'envers.</li>\n    <li><strong>Réponse incomplète</strong> : il manque une partie (je n'ai pas tout dit).</li>\n    <li><strong>Réponses mélangées</strong> : je mets plusieurs idées en désordre.</li>\n    <li><strong>Phrase sans verbe</strong> : ma phrase n'a pas de verbe.</li>\n    <li><strong>Style oral</strong> : j'écris comme je parle (« y a », « du coup », « trop bien »…).</li>\n    <li><strong>Paraphrase</strong> : je recopie le texte au lieu d'expliquer.</li>\n  </ul>\n    <h2><span class=\"n\">C</span> Je m'entraîne en condition</h2>\n  <div class=\"ex\">\n    <div class=\"ex-head\">Je m'entraîne · 2</div>\n    <p class=\"quote\" style=\"margin-top:0;\">Quand le train s'arrêta, Lucien ne reconnut personne. Le quai était vide comme un champ après la bataille. Il resta seul avec sa valise, au milieu d'un silence plus lourd que tout ce qu'il avait connu là-bas. <span class=\"pen\">(l. 1-3)</span></p>\n    <p><strong>1.</strong> Quel sentiment éprouve Lucien à son arrivée ? <em>Justifie par une citation.</em></p>\n    <p><strong>2.</strong> « vide comme un champ après la bataille » : quelle figure de style, et quel est son effet ?</p>\n    <p><strong>3.</strong> Quelle réflexion sur le retour des soldats ce passage peut-il inspirer ?</p>\n    <p class=\"cahier\">→ Je réponds dans mon cahier.</p>\n  </div>\n  <div class=\"ex\">\n    <div class=\"ex-head\">Je m'entraîne · 3</div>\n    <p class=\"quote\" style=\"margin-top:0;\">Au matin, le village n'était plus qu'un tas de pierres noircies. Le silence pesait comme une pierre sur les ruines. Un vieil homme cherchait, parmi les décombres, la porte de sa maison disparue. <span class=\"pen\">(l. 1-3)</span></p>\n    <p><strong>1.</strong> Quel sentiment domine ce passage ? <em>Justifie par une citation.</em></p>\n    <p><strong>2.</strong> « Le silence pesait comme une pierre » : quelle figure de style, et quel est son effet ?</p>\n    <p><strong>3.</strong> Que montre ce passage sur ce que la guerre détruit ? <em>(deux éléments)</em></p>\n    <p class=\"cahier\">→ Je réponds dans mon cahier.</p>\n  </div>\n  <h2><span class=\"n\">&#10003;</span> Je me situe</h2>\n  <p style=\"margin:.05em 0 .1em;\">Pour chaque savoir-faire, je coche la case qui me correspond.</p>\n  <div class=\"leg\">Vert : je le fais seul, à chaque fois — Bleu : presque toujours — Jaune : parfois, j'oublie — Rouge : pas encore.</div>\n  <div class=\"situ\">\n    <div class=\"situ-head\"><div class=\"situ-q\" style=\"background:none;color:#fff;\">Mon savoir-faire</div>\n      <div class=\"h\"><span class=\"chip chip-v\"></span>Vert</div><div class=\"h\"><span class=\"chip chip-b\"></span>Bleu</div><div class=\"h\"><span class=\"chip chip-j\"></span>Jaune</div><div class=\"h\"><span class=\"chip chip-r\"></span>Rouge</div></div>\n    <div class=\"situ-row\"><div class=\"situ-q\">Je repère l'idée que la question demande.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div>\n    <div class=\"situ-row\"><div class=\"situ-q\">Je cite le texte (court, entre guillemets) pour prouver ma réponse.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div>\n    <div class=\"situ-row\"><div class=\"situ-q\">J'explique ou j'interprète (je ne répète pas seulement le texte).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div>\n    <div class=\"situ-row\"><div class=\"situ-q\">Je nomme une figure de style et je dis son effet.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div>\n    <div class=\"situ-row\"><div class=\"situ-q\">Je réponds à tout ce qui est demandé.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div>\n  </div>\n  <p class=\"note-app\">Au bilan, on reporte la classe sur le tableau de suivi projeté.</p>\n  <div class=\"foot\"><span>Bien répondre à une question sur un texte</span><span>Fiche C1 · page 3</span></div>\n</section>\n</body>\n</html>", "c2": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Fiche C2 — Interpréter : la question d'ouverture</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24em;font-weight:700;display:flex;align-items:baseline;gap:.45em;}\n  h2 .n{display:inline-block;min-width:1.2em;height:1.2em;line-height:1.2em;text-align:center;\n        background:var(--accent);color:#fff;border-radius:50%;font-size:12pt;flex:none;}\n  p{margin:.3em 0;}\n  .lead{margin:.15em 0 .35em;}\n  strong{color:var(--accent);}\n  em{color:#333;}\n  .quote{font-style:italic;background:var(--soft);border-left:3px solid var(--accent2);padding:.4em .7em;margin:.4em 0;}\n  .gestes{display:flex;flex-direction:column;gap:.32em;margin:.32em 0 .12em;}\n  .geste{display:flex;gap:.65em;align-items:flex-start;border:1.4px solid var(--line);border-radius:8px;padding:.36em .6em;}\n  .geste .num{font-family:\"Carlito\",sans-serif;font-weight:700;color:#fff;background:var(--accent);\n        width:1.7em;height:1.7em;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:12pt;}\n  .geste .verb{font-family:\"Carlito\",sans-serif;font-weight:700;text-transform:uppercase;color:var(--accent);letter-spacing:.03em;}\n  .geste .txt{margin:.06em 0 0;}\n  .maxim{background:var(--accent);color:#fff;padding:.38em .8em;border-radius:8px;margin:.4em 0;\n         font-family:\"Carlito\",sans-serif;font-weight:700;font-size:13pt;line-height:1.28;}\n  .box{border:1.4px solid var(--line);border-radius:8px;padding:.45em .7em;margin:.4em 0;}\n  .box.tinted{background:var(--soft);}\n  .box .tag{display:inline-block;font-size:12pt;font-weight:700;text-transform:uppercase;letter-spacing:.04em;\n            color:#fff;background:var(--accent2);border-radius:4px;padding:.05em .55em;margin-bottom:.28em;}\n  .model p{margin:.2em 0;}\n  .model .g{font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--accent);}\n  ul.tight{margin:.22em 0;padding-left:1.2em;}\n  ul.tight li{margin:.14em 0;}\n  .ex{border:1.4px solid var(--line);border-radius:8px;padding:.42em .7em;margin:.4em 0;}\n  .ex-head{font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--rouge);text-transform:uppercase;\n           letter-spacing:.03em;font-size:12pt;margin:0 0 .2em;}\n  .cahier{font-family:\"Carlito\",sans-serif;font-size:12pt;color:var(--accent2);font-style:italic;margin:.3em 0 0;text-align:right;}\n  .pen{font-size:12pt;color:#777;font-style:italic;}\n  .foot{position:absolute;left:18mm;right:18mm;bottom:7mm;display:flex;justify-content:space-between;\n        font-family:\"Carlito\",sans-serif;font-size:12pt;color:#8a8a82;border-top:1px solid var(--line);padding-top:1.6mm;}\n  /* self-eval grid (checkboxes) */\n  .leg{font-size:12pt;color:#444;margin:.12em 0 .3em;line-height:1.25;}\n  .situ{border:1.6px solid var(--accent);border-radius:8px;overflow:hidden;}\n  .situ-head,.situ-row{display:grid;grid-template-columns:1fr 17mm 17mm 17mm 17mm;align-items:center;}\n  .situ-head{background:var(--accent);color:#fff;font-family:\"Carlito\",sans-serif;font-weight:700;font-size:12pt;}\n  .situ-head .h{text-align:center;padding:.32em 0;border-left:1px solid #ffffff55;line-height:1.05;}\n  .situ-head .h .chip{display:inline-block;width:.66em;height:.66em;border-radius:50%;margin-right:.2em;vertical-align:-1px;border:1px solid #ffffffaa;}\n  .situ-row{border-top:1px solid var(--line);}\n  .situ-row:nth-child(even){background:#eef2f7;}\n  .situ-q{padding:.36em .6em;font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n  .aubrevet{font-family:\"Carlito\",sans-serif;font-size:12.5pt;color:#1d3c61;background:#eef3f8;border:1.5px solid #2f6fb0;border-radius:8px;padding:.5em .8em;margin:.35em 0 .45em;line-height:1.35;}  .aubrevet b{color:#2f6fb0;}\n</style>\n</head>\n<body>\n<section class=\"page\"><div class=\"kicker\">Révisions Brevet 2026 · Compréhension</div><h1>Interpréter : la question d'ouverture</h1><div class=\"subtitle\">Fiche C2 · Compréhension &amp; interprétation</div><hr class=\"hr\"><div class=\"aubrevet\"><b>Au brevet —</b> c'est la dernière question de la compréhension : « Quelle réflexion ce texte peut-il inspirer ? ». Je pars du texte pour aller vers une idée plus générale.</div><div class=\"cahier-rule\">Je lis cette fiche et je m'entraîne. J'écris toutes mes réponses <strong>dans mon cahier</strong>.</div><p class=\"lead\">Je pars du texte, mais je vais vers une idée <strong>plus générale</strong> (sur l'être humain, la guerre, la mémoire). Attention : je ne répète pas le texte, et je ne pars pas trop loin de lui.</p><div class=\"gestes\"><div class=\"geste\"><div class=\"num\">1</div><div><span class=\"verb\">Je pars du texte</span><p class=\"txt\">Je repère l'idée précise que le passage donne.</p></div></div><div class=\"geste\"><div class=\"num\">2</div><div><span class=\"verb\">Je vais plus loin</span><p class=\"txt\">Je dis une idée plus générale que ce passage fait penser.</p></div></div><div class=\"geste\"><div class=\"num\">3</div><div><span class=\"verb\">Je justifie</span><p class=\"txt\">Je cite un mot ou un groupe de mots du texte qui appuie mon idée.</p></div></div></div><div class=\"maxim\">Interpréter, c'est partir du texte pour dire quelque chose de plus grand — sans jamais le quitter.</div><div class=\"box model\"><span class=\"tag\">Le modèle</span><p class=\"quote\">Des années après la guerre, le grand-père ne racontait jamais rien. Mais chaque 11 novembre, il sortait sa vieille médaille et la regardait en silence. <span class=\"pen\">(l. 1-2)</span></p><p class=\"model\"><span class=\"g\">Je pars du texte —</span> le grand-père « ne racontait jamais rien », mais il garde et regarde sa médaille.</p><p class=\"model\"><span class=\"g\">Je vais plus loin —</span> la mémoire de la guerre reste douloureuse et intime : on garde des souvenirs qu'on ne peut pas dire.</p><p class=\"model\"><span class=\"g\">Je justifie —</span> « ne racontait jamais rien », « la regardait en silence » (l. 1-2).</p></div><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 1</div><p class=\"quote\" style=\"margin-top:0;\">Sur le quai, les femmes regardaient passer les trains de blessés sans oser leur faire signe. Chacune cherchait un visage. <span class=\"pen\">(l. 1-2)</span></p><p><strong>1.</strong> Quelle idée précise donne ce passage ?</p><p><strong>2.</strong> Vers quelle idée plus générale peux-tu aller ?</p><p><strong>3.</strong> Quelle citation appuie ton idée ?</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Interpréter : la question d'ouverture</span><span>Fiche C2 · page 1</span></div></section><section class=\"page\"><h2><span class=\"n\">B</span> Du texte à l'idée générale</h2><p style=\"margin:.15em 0 .1em;\">Pour élargir, je me pose une question simple : <em>qu'est-ce que ce passage dit de plus grand ?</em></p><ul class=\"tight\"><li>sur <strong>l'être humain</strong> (ses peurs, son courage, ses espoirs) ;</li><li>sur la <strong>guerre</strong> (ce qu'elle détruit, ce qu'elle laisse) ;</li><li>sur la <strong>mémoire</strong> (se souvenir, oublier, transmettre).</li></ul><p style=\"margin:.3em 0 .1em;\">Deux pièges à éviter : <strong>répéter le texte</strong> (paraphrase) au lieu d'en tirer une idée, et partir <strong>trop loin du texte</strong> (hors sujet). Mon idée doit toujours rester accrochée à une citation.</p><div class=\"box model\"><span class=\"tag\">Le modèle — aller trop loin ? </span><p class=\"quote\">« La guerre, c'est mal. » <span class=\"pen\">(idée trop vague)</span></p><p class=\"model\"><span class=\"g\">Mieux —</span> Je relie au texte et je précise : la guerre continue après les combats, dans le silence de ceux qui reviennent.</p></div><div class=\"box model\"><span class=\"tag\">Le modèle — garder le souvenir</span><p class=\"quote\">On ne parlait jamais de l'oncle mort à la guerre ; seule sa photo restait sur la cheminée. <span class=\"pen\">(l. 4)</span></p><p class=\"model\"><span class=\"g\">Je vais plus loin —</span> on garde le souvenir des morts même sans en parler : le silence aussi est une façon de se souvenir.</p><p class=\"model\"><span class=\"g\">Je justifie —</span> « seule sa photo restait sur la cheminée » (l. 4).</p></div><h2><span class=\"n\">C</span> Je m'entraîne</h2><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 2</div><p class=\"quote\" style=\"margin-top:0;\">On grava leurs noms sur une plaque de pierre, au milieu du village. Bientôt, plus personne ne sut qui ils avaient été. <span class=\"pen\">(l. 1-2)</span></p><p><strong>1.</strong> Quelle idée précise donne ce passage ?</p><p><strong>2.</strong> Vers quelle idée plus générale peux-tu aller ?</p><p><strong>3.</strong> Quelle citation appuie ton idée ?</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Interpréter : la question d'ouverture</span><span>Fiche C2 · page 2</span></div></section><section class=\"page\"><h2><span class=\"n\">!</span> Les erreurs qui coûtent cher (et leur nom)</h2><ul class=\"tight\"><li><strong>Hors sujet</strong> : je réponds à côté de la question.</li><li><strong>Contresens</strong> : j'ai compris le texte à l'envers.</li><li><strong>Réponse incomplète</strong> : il manque une partie (je n'ai pas tout dit).</li><li><strong>Réponses mélangées</strong> : je mets plusieurs idées en désordre.</li><li><strong>Phrase sans verbe</strong> : ma phrase n'a pas de verbe.</li><li><strong>Style oral</strong> : j'écris comme je parle (« y a », « du coup », « trop bien »…).</li><li><strong>Paraphrase</strong> : je recopie le texte au lieu d'expliquer.</li></ul><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 3</div><p class=\"quote\" style=\"margin-top:0;\">Le soldat rangea ses médailles dans un tiroir et n'en parla plus jamais. <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Quelle idée précise donne ce passage ?</p><p><strong>2.</strong> Vers quelle idée plus générale peux-tu aller ?</p><p><strong>3.</strong> Quelle citation appuie ton idée ?</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><h2><span class=\"n\">&#10003;</span> Je me situe</h2><p style=\"margin:.05em 0 .1em;\">Pour chaque savoir-faire, je coche la case qui me correspond.</p><div class=\"leg\">Vert : je le fais seul, à chaque fois — Bleu : presque toujours — Jaune : parfois, j'oublie — Rouge : pas encore.</div><div class=\"situ\"><div class=\"situ-head\"><div class=\"situ-q\" style=\"background:none;color:#fff;\">Mon savoir-faire</div><div class=\"h\"><span class=\"chip chip-v\"></span>Vert</div><div class=\"h\"><span class=\"chip chip-b\"></span>Bleu</div><div class=\"h\"><span class=\"chip chip-j\"></span>Jaune</div><div class=\"h\"><span class=\"chip chip-r\"></span>Rouge</div></div><div class=\"situ-row\"><div class=\"situ-q\">Je repère l'idée précise du passage.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je vais vers une idée plus générale (sans répéter le texte).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je justifie mon idée par une citation.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je reste accroché au texte (pas de hors sujet).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div></div><p class=\"note-app\">Au bilan, on reporte la classe sur le tableau de suivi projeté.</p><div class=\"foot\"><span>Interpréter : la question d'ouverture</span><span>Fiche C2 · page 3</span></div></section>\n</body></html>", "c3": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Fiche C2 — Interpréter : la question d'ouverture</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;c
