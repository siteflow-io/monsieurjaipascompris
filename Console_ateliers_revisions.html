if;font-weight:700;color:var(--rouge);text-transform:uppercase;\n           letter-spacing:.03em;font-size:12pt;margin:0 0 .2em;}\n  .cahier{font-family:\"Carlito\",sans-serif;font-size:12pt;color:var(--accent2);font-style:italic;margin:.3em 0 0;text-align:right;}\n  .pen{font-size:12pt;color:#777;font-style:italic;}\n  .foot{position:absolute;left:18mm;right:18mm;bottom:7mm;display:flex;justify-content:space-between;\n        font-family:\"Carlito\",sans-serif;font-size:12pt;color:#8a8a82;border-top:1px solid var(--line);padding-top:1.6mm;}\n  /* self-eval grid (checkboxes) */\n  .leg{font-size:12pt;color:#444;margin:.12em 0 .3em;line-height:1.25;}\n  .situ{border:1.6px solid var(--accent);border-radius:8px;overflow:hidden;}\n  .situ-head,.situ-row{display:grid;grid-template-columns:1fr 17mm 17mm 17mm 17mm;align-items:center;}\n  .situ-head{background:var(--accent);color:#fff;font-family:\"Carlito\",sans-serif;font-weight:700;font-size:12pt;}\n  .situ-head .h{text-align:center;padding:.32em 0;border-left:1px solid #ffffff55;line-height:1.05;}\n  .situ-head .h .chip{display:inline-block;width:.66em;height:.66em;border-radius:50%;margin-right:.2em;vertical-align:-1px;border:1px solid #ffffffaa;}\n  .situ-row{border-top:1px solid var(--line);}\n  .situ-row:nth-child(even){background:#eef2f7;}\n  .situ-q{padding:.36em .6em;font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n  .aubrevet{font-family:\"Carlito\",sans-serif;font-size:12.5pt;color:#1d3c61;background:#eef3f8;border:1.5px solid #2f6fb0;border-radius:8px;padding:.5em .8em;margin:.35em 0 .45em;line-height:1.35;}  .aubrevet b{color:#2f6fb0;}\n</style>\n</head>\n<body>\n<section class=\"page\"><div class=\"kicker\">Révisions Brevet 2026 · Compréhension</div><h1>Sentiments &amp; motivations d'un personnage</h1><div class=\"subtitle\">Fiche C3 · Compréhension &amp; interprétation</div><hr class=\"hr\"><div class=\"aubrevet\"><b>Au brevet —</b> quand une question demande ce qu'un personnage ressent (son sentiment) et pourquoi il agit (sa motivation).</div><div class=\"cahier-rule\">Je lis cette fiche et je m'entraîne. J'écris toutes mes réponses <strong>dans mon cahier</strong>.</div><p class=\"lead\">On me demande ce qu'un personnage <strong>ressent</strong> (son sentiment) et <strong>pourquoi il agit</strong> (sa motivation). Je le prouve avec un mot ou un geste du texte.</p><div class=\"gestes\"><div class=\"geste\"><div class=\"num\">1</div><div><span class=\"verb\">Je nomme le sentiment</span><p class=\"txt\">Je trouve un mot précis (pas seulement « content » ou « triste »).</p></div></div><div class=\"geste\"><div class=\"num\">2</div><div><span class=\"verb\">J'explique la motivation</span><p class=\"txt\">Je dis pourquoi le personnage agit ainsi.</p></div></div><div class=\"geste\"><div class=\"num\">3</div><div><span class=\"verb\">Je justifie</span><p class=\"txt\">Je cite un mot, une parole ou un geste du texte.</p></div></div></div><div class=\"maxim\">Un sentiment précis + un indice du texte = une réponse juste.</div><div class=\"box model\"><span class=\"tag\">Le modèle</span><p class=\"quote\">Avant de monter dans le train, la mère embrassa son fils trop vite, puis se détourna pour qu'il ne vît pas son visage. <span class=\"pen\">(l. 1-2)</span></p><p class=\"model\"><span class=\"g\">Sentiment —</span> la mère cache son chagrin, son émotion.</p><p class=\"model\"><span class=\"g\">Motivation —</span> elle se détourne pour que son fils ne la voie pas pleurer et garde du courage.</p><p class=\"model\"><span class=\"g\">Je justifie —</span> « se détourna pour qu'il ne vît pas son visage » (l. 1-2).</p></div><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 1</div><p class=\"quote\" style=\"margin-top:0;\">Quand le clairon sonna, le jeune soldat sentit ses jambes trembler, mais il avança le premier. <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Quel sentiment précis ?</p><p><strong>2.</strong> Quelle motivation (pourquoi il agit) ?</p><p><strong>3.</strong> Quelle citation le prouve ?</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Sentiments &amp; motivations d'un personnage</span><span>Fiche C3 · page 1</span></div></section><section class=\"page\"><h2><span class=\"n\">B</span> Sentiment ou motivation ? Le bon vocabulaire</h2><p style=\"margin:.15em 0 .1em;\"><strong>Le sentiment</strong>, c'est ce que le personnage <em>ressent</em> ; <strong>la motivation</strong>, c'est ce qui le <em>pousse à agir</em>.</p><ul class=\"tight\"><li>Sentiments : la peur, la colère, le chagrin, la honte, la fierté, le soulagement, l'espoir…</li><li>Motivations : par devoir, par amour, pour protéger quelqu'un, par peur, par honneur…</li></ul><p style=\"margin:.3em 0 .1em;\">Je vise un mot <strong>précis</strong> : « content » ou « triste » est trop vague. Et j'évite le <strong>contresens</strong> : je vérifie que le texte dit bien ce sentiment-là.</p><div class=\"box model\"><span class=\"tag\">Le modèle — un sentiment caché</span><p class=\"quote\">Lorsqu'on prononça le nom de son frère parmi les disparus, Jean ne dit rien. Il serra seulement les poings, si fort que ses ongles marquèrent ses paumes. <span class=\"pen\">(l. 1-2)</span></p><p class=\"model\"><span class=\"g\">Sentiment —</span> une douleur retenue, une colère contenue (Jean souffre sans le montrer).</p><p class=\"model\"><span class=\"g\">Je justifie —</span> « Il serra seulement les poings, si fort que ses ongles marquèrent ses paumes » (l. 2).</p></div><div class=\"box model\"><span class=\"tag\">Le modèle — la motivation</span><p class=\"quote\">Il donna son pain au plus jeune et dit qu'il n'avait pas faim. <span class=\"pen\">(l. 3)</span></p><p class=\"model\"><span class=\"g\">Sentiment —</span> l'inquiétude pour le plus jeune, la bonté.</p><p class=\"model\"><span class=\"g\">Motivation —</span> il se prive pour le nourrir ; il ment (« n'avait pas faim ») pour qu'il accepte.</p></div><h2><span class=\"n\">C</span> Je m'entraîne</h2><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 2</div><p class=\"quote\" style=\"margin-top:0;\">Elle relisait chaque soir la dernière lettre, puis la rangeait avec soin sous son oreiller. <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Quel sentiment précis ?</p><p><strong>2.</strong> Quelle motivation (pourquoi il agit) ?</p><p><strong>3.</strong> Quelle citation le prouve ?</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Sentiments &amp; motivations d'un personnage</span><span>Fiche C3 · page 2</span></div></section><section class=\"page\"><h2><span class=\"n\">!</span> Les erreurs qui coûtent cher (et leur nom)</h2><ul class=\"tight\"><li><strong>Hors sujet</strong> : je réponds à côté de la question.</li><li><strong>Contresens</strong> : j'ai compris le texte à l'envers.</li><li><strong>Réponse incomplète</strong> : il manque une partie (je n'ai pas tout dit).</li><li><strong>Réponses mélangées</strong> : je mets plusieurs idées en désordre.</li><li><strong>Phrase sans verbe</strong> : ma phrase n'a pas de verbe.</li><li><strong>Style oral</strong> : j'écris comme je parle (« y a », « du coup », « trop bien »…).</li><li><strong>Paraphrase</strong> : je recopie le texte au lieu d'expliquer.</li></ul><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 3</div><p class=\"quote\" style=\"margin-top:0;\">En reconnaissant son village détruit, le soldat laissa tomber son sac et resta longtemps sans bouger. <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Quel sentiment précis ?</p><p><strong>2.</strong> Quelle motivation (pourquoi il agit) ?</p><p><strong>3.</strong> Quelle citation le prouve ?</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><h2><span class=\"n\">&#10003;</span> Je me situe</h2><p style=\"margin:.05em 0 .1em;\">Pour chaque savoir-faire, je coche la case qui me correspond.</p><div class=\"leg\">Vert : je le fais seul, à chaque fois — Bleu : presque toujours — Jaune : parfois, j'oublie — Rouge : pas encore.</div><div class=\"situ\"><div class=\"situ-head\"><div class=\"situ-q\" style=\"background:none;color:#fff;\">Mon savoir-faire</div><div class=\"h\"><span class=\"chip chip-v\"></span>Vert</div><div class=\"h\"><span class=\"chip chip-b\"></span>Bleu</div><div class=\"h\"><span class=\"chip chip-j\"></span>Jaune</div><div class=\"h\"><span class=\"chip chip-r\"></span>Rouge</div></div><div class=\"situ-row\"><div class=\"situ-q\">Je nomme un sentiment précis.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">J'explique la motivation (pourquoi il agit).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je justifie par un mot ou un geste du texte.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">J'évite le contresens (le texte dit bien ce sentiment).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div></div><p class=\"note-app\">Au bilan, on reporte la classe sur le tableau de suivi projeté.</p><div class=\"foot\"><span>Sentiments &amp; motivations d'un personnage</span><span>Fiche C3 · page 3</span></div></section>\n</body></html>", "c4": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Fiche C2 — Interpréter : la question d'ouverture</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24em;font-weight:700;display:flex;align-items:baseline;gap:.45em;}\n  h2 .n{display:inline-block;min-width:1.2em;height:1.2em;line-height:1.2em;text-align:center;\n        background:var(--accent);color:#fff;border-radius:50%;font-size:12pt;flex:none;}\n  p{margin:.3em 0;}\n  .lead{margin:.15em 0 .35em;}\n  strong{color:var(--accent);}\n  em{color:#333;}\n  .quote{font-style:italic;background:var(--soft);border-left:3px solid var(--accent2);padding:.4em .7em;margin:.4em 0;}\n  .gestes{display:flex;flex-direction:column;gap:.32em;margin:.32em 0 .12em;}\n  .geste{display:flex;gap:.65em;align-items:flex-start;border:1.4px solid var(--line);border-radius:8px;padding:.36em .6em;}\n  .geste .num{font-family:\"Carlito\",sans-serif;font-weight:700;color:#fff;background:var(--accent);\n        width:1.7em;height:1.7em;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:12pt;}\n  .geste .verb{font-family:\"Carlito\",sans-serif;font-weight:700;text-transform:uppercase;color:var(--accent);letter-spacing:.03em;}\n  .geste .txt{margin:.06em 0 0;}\n  .maxim{background:var(--accent);color:#fff;padding:.38em .8em;border-radius:8px;margin:.4em 0;\n         font-family:\"Carlito\",sans-serif;font-weight:700;font-size:13pt;line-height:1.28;}\n  .box{border:1.4px solid var(--line);border-radius:8px;padding:.45em .7em;margin:.4em 0;}\n  .box.tinted{background:var(--soft);}\n  .box .tag{display:inline-block;font-size:12pt;font-weight:700;text-transform:uppercase;letter-spacing:.04em;\n            color:#fff;background:var(--accent2);border-radius:4px;padding:.05em .55em;margin-bottom:.28em;}\n  .model p{margin:.2em 0;}\n  .model .g{font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--accent);}\n  ul.tight{margin:.22em 0;padding-left:1.2em;}\n  ul.tight li{margin:.14em 0;}\n  .ex{border:1.4px solid var(--line);border-radius:8px;padding:.42em .7em;margin:.4em 0;}\n  .ex-head{font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--rouge);text-transform:uppercase;\n           letter-spacing:.03em;font-size:12pt;margin:0 0 .2em;}\n  .cahier{font-family:\"Carlito\",sans-serif;font-size:12pt;color:var(--accent2);font-style:italic;margin:.3em 0 0;text-align:right;}\n  .pen{font-size:12pt;color:#777;font-style:italic;}\n  .foot{position:absolute;left:18mm;right:18mm;bottom:7mm;display:flex;justify-content:space-between;\n        font-family:\"Carlito\",sans-serif;font-size:12pt;color:#8a8a82;border-top:1px solid var(--line);padding-top:1.6mm;}\n  /* self-eval grid (checkboxes) */\n  .leg{font-size:12pt;color:#444;margin:.12em 0 .3em;line-height:1.25;}\n  .situ{border:1.6px solid var(--accent);border-radius:8px;overflow:hidden;}\n  .situ-head,.situ-row{display:grid;grid-template-columns:1fr 17mm 17mm 17mm 17mm;align-items:center;}\n  .situ-head{background:var(--accent);color:#fff;font-family:\"Carlito\",sans-serif;font-weight:700;font-size:12pt;}\n  .situ-head .h{text-align:center;padding:.32em 0;border-left:1px solid #ffffff55;line-height:1.05;}\n  .situ-head .h .chip{display:inline-block;width:.66em;height:.66em;border-radius:50%;margin-right:.2em;vertical-align:-1px;border:1px solid #ffffffaa;}\n  .situ-row{border-top:1px solid var(--line);}\n  .situ-row:nth-child(even){background:#eef2f7;}\n  .situ-q{padding:.36em .6em;font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n  .aubrevet{font-family:\"Carlito\",sans-serif;font-size:12.5pt;color:#1d3c61;background:#eef3f8;border:1.5px solid #2f6fb0;border-radius:8px;padding:.5em .8em;margin:.35em 0 .45em;line-height:1.35;}  .aubrevet b{color:#2f6fb0;}\n</style>\n</head>\n<body>\n<section class=\"page\"><div class=\"kicker\">Révisions Brevet 2026 · Compréhension</div><h1>Le portrait moral, justifié</h1><div class=\"subtitle\">Fiche C4 · Compréhension &amp; interprétation</div><hr class=\"hr\"><div class=\"aubrevet\"><b>Au brevet —</b> quand une question demande un trait de caractère d'un personnage (courage, lâcheté, générosité…) et de le prouver par le texte.</div><div class=\"cahier-rule\">Je lis cette fiche et je m'entraîne. J'écris toutes mes réponses <strong>dans mon cahier</strong>.</div><p class=\"lead\">On me demande un <strong>trait de caractère</strong> d'un personnage (un trait <em>moral</em>, pas physique) et je dois le <strong>prouver</strong> par une action du texte.</p><div class=\"gestes\"><div class=\"geste\"><div class=\"num\">1</div><div><span class=\"verb\">Je nomme un trait moral</span><p class=\"txt\">Courage, générosité, lâcheté, fierté… (pas « grand » ni « fort »).</p></div></div><div class=\"geste\"><div class=\"num\">2</div><div><span class=\"verb\">Je le rattache à une action</span><p class=\"txt\">Je montre ce que le personnage fait dans le texte.</p></div></div><div class=\"geste\"><div class=\"num\">3</div><div><span class=\"verb\">J'explique</span><p class=\"txt\">Je dis en quoi cette action prouve ce trait.</p></div></div></div><div class=\"maxim\">Un trait de caractère se prouve par un acte, pas par une description.</div><div class=\"box model\"><span class=\"tag\">Le modèle</span><p class=\"quote\">Le vieux médecin n'avait pas dormi depuis trois nuits. Pourtant, quand on amena le dernier blessé, il retira sa blouse pour le couvrir. <span class=\"pen\">(l. 1-2)</span></p><p class=\"model\"><span class=\"g\">Trait moral —</span> le dévouement (il pense aux autres avant lui).</p><p class=\"model\"><span class=\"g\">Action —</span> « il retira sa blouse pour le couvrir » (l. 2), alors qu'il est épuisé.</p><p class=\"model\"><span class=\"g\">J'explique —</span> il se prive pour soulager un blessé : il se dévoue jusqu'au bout.</p></div><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 1</div><p class=\"quote\" style=\"margin-top:0;\">Le sergent gardait toujours la plus petite part pour lui et donnait le reste à ses hommes. <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Quel trait moral ?</p><p><strong>2.</strong> Quelle action le prouve ?</p><p><strong>3.</strong> Explique en quoi l'action prouve le trait.</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Le portrait moral, justifié</span><span>Fiche C4 · page 1</span></div></section><section class=\"page\"><h2><span class=\"n\">B</span> Un trait moral, pas physique — le bon vocabulaire</h2><p style=\"margin:.15em 0 .1em;\">Le <strong>physique</strong> décrit le corps (grand, fort, âgé). Le <strong>moral</strong> décrit le caractère :</p><ul class=\"tight\"><li>des qualités : le courage, la générosité, le dévouement, la fidélité, la patience ;</li><li>des défauts : la lâcheté, l'égoïsme, l'orgueil, la cruauté.</li></ul><p style=\"margin:.3em 0 .1em;\">Je choisis l'action qui <strong>prouve</strong> vraiment le trait, et je l'explique. Donner un trait sans le prouver = <strong>réponse incomplète</strong>.</p><div class=\"box model\"><span class=\"tag\">Le modèle — prouver le trait</span><p class=\"quote\">Tous avaient fui devant l'incendie. Seul le caporal Vasseur était retourné dans la grange en flammes, et il en était ressorti en portant deux enfants. <span class=\"pen\">(l. 1-2)</span></p><p class=\"model\"><span class=\"g\">Trait moral —</span> le courage.</p><p class=\"model\"><span class=\"g\">Action + explication —</span> il « était retourné dans la grange en flammes » pour sauver deux enfants : il risque sa vie pour les autres, alors que tous ont fui.</p></div><div class=\"box model\"><span class=\"tag\">Le modèle — un défaut</span><p class=\"quote\">Quand il fallut désigner un volontaire, il baissa les yeux et recula d'un pas. <span class=\"pen\">(l. 3)</span></p><p class=\"model\"><span class=\"g\">Trait moral —</span> la lâcheté.</p><p class=\"model\"><span class=\"g\">Action + explication —</span> « il baissa les yeux et recula d'un pas » : il évite le danger et la responsabilité.</p></div><h2><span class=\"n\">C</span> Je m'entraîne</h2><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 2</div><p class=\"quote\" style=\"margin-top:0;\">Quand on l'accusa à tort, il préféra se taire pour ne pas dénoncer son camarade. <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Quel trait moral ?</p><p><strong>2.</strong> Quelle action le prouve ?</p><p><strong>3.</strong> Explique en quoi l'action prouve le trait.</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Le portrait moral, justifié</span><span>Fiche C4 · page 2</span></div></section><section class=\"page\"><h2><span class=\"n\">!</span> Les erreurs qui coûtent cher (et leur nom)</h2><ul class=\"tight\"><li><strong>Hors sujet</strong> : je réponds à côté de la question.</li><li><strong>Contresens</strong> : j'ai compris le texte à l'envers.</li><li><strong>Réponse incomplète</strong> : il manque une partie (je n'ai pas tout dit).</li><li><strong>Réponses mélangées</strong> : je mets plusieurs idées en désordre.</li><li><strong>Phrase sans verbe</strong> : ma phrase n'a pas de verbe.</li><li><strong>Style oral</strong> : j'écris comme je parle (« y a », « du coup », « trop bien »…).</li><li><strong>Paraphrase</strong> : je recopie le texte au lieu d'expliquer.</li></ul><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 3</div><p class=\"quote\" style=\"margin-top:0;\">Dès que le danger approchait, il trouvait toujours une raison de rester en arrière. <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Quel trait moral ?</p><p><strong>2.</strong> Quelle action le prouve ?</p><p><strong>3.</strong> Explique en quoi l'action prouve le trait.</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><h2><span class=\"n\">&#10003;</span> Je me situe</h2><p style=\"margin:.05em 0 .1em;\">Pour chaque savoir-faire, je coche la case qui me correspond.</p><div class=\"leg\">Vert : je le fais seul, à chaque fois — Bleu : presque toujours — Jaune : parfois, j'oublie — Rouge : pas encore.</div><div class=\"situ\"><div class=\"situ-head\"><div class=\"situ-q\" style=\"background:none;color:#fff;\">Mon savoir-faire</div><div class=\"h\"><span class=\"chip chip-v\"></span>Vert</div><div class=\"h\"><span class=\"chip chip-b\"></span>Bleu</div><div class=\"h\"><span class=\"chip chip-j\"></span>Jaune</div><div class=\"h\"><span class=\"chip chip-r\"></span>Rouge</div></div><div class=\"situ-row\"><div class=\"situ-q\">Je nomme un trait moral (pas physique).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je le rattache à une action du texte.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">J'explique en quoi l'action prouve le trait.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je cite pour appuyer ma réponse.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div></div><p class=\"note-app\">Au bilan, on reporte la classe sur le tableau de suivi projeté.</p><div class=\"foot\"><span>Le portrait moral, justifié</span><span>Fiche C4 · page 3</span></div></section>\n</body></html>", "c5": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Fiche C2 — Interpréter : la question d'ouverture</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24em;font-weight:700;display:flex;align-items:baseline;gap:.45em;}\n  h2 .n{display:inline-block;min-width:1.2em;height:1.2em;line-height:1.2em;text-align:center;\n        background:var(--accent);color:#fff;border-radius:50%;font-size:12pt;flex:none;}\n  p{margin:.3em 0;}\n  .lead{margin:.15em 0 .35em;}\n  strong{color:var(--accent);}\n  em{color:#333;}\n  .quote{font-style:italic;background:var(--soft);border-left:3px solid var(--accent2);padding:.4em .7em;margin:.4em 0;}\n  .gestes{display:flex;flex-direction:column;gap:.32em;margin:.32em 0 .12em;}\n  .geste{display:flex;gap:.65em;align-items:flex-start;border:1.4px solid var(--line);border-radius:8px;padding:.36em .6em;}\n  .geste .num{font-family:\"Carlito\",sans-serif;font-weight:700;color:#fff;background:var(--accent);\n        width:1.7em;height:1.7em;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;font-size:12pt;}\n  .geste .verb{font-family:\"Carlito\",sans-serif;font-weight:700;text-transform:uppercase;color:var(--accent);letter-spacing:.03em;}\n  .geste .txt{margin:.06em 0 0;}\n  .maxim{background:var(--accent);color:#fff;padding:.38em .8em;border-radius:8px;margin:.4em 0;\n         font-family:\"Carlito\",sans-serif;font-weight:700;font-size:13pt;line-height:1.28;}\n  .box{border:1.4px solid var(--line);border-radius:8px;padding:.45em .7em;margin:.4em 0;}\n  .box.tinted{background:var(--soft);}\n  .box .tag{display:inline-block;font-size:12pt;font-weight:700;text-transform:uppercase;letter-spacing:.04em;\n            color:#fff;background:var(--accent2);border-radius:4px;padding:.05em .55em;margin-bottom:.28em;}\n  .model p{margin:.2em 0;}\n  .model .g{font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--accent);}\n  ul.tight{margin:.22em 0;padding-left:1.2em;}\n  ul.tight li{margin:.14em 0;}\n  .ex{border:1.4px solid var(--line);border-radius:8px;padding:.42em .7em;margin:.4em 0;}\n  .ex-head{font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--rouge);text-transform:uppercase;\n           letter-spacing:.03em;font-size:12pt;margin:0 0 .2em;}\n  .cahier{font-family:\"Carlito\",sans-serif;font-size:12pt;color:var(--accent2);font-style:italic;margin:.3em 0 0;text-align:right;}\n  .pen{font-size:12pt;color:#777;font-style:italic;}\n  .foot{position:absolute;left:18mm;right:18mm;bottom:7mm;display:flex;justify-content:space-between;\n        font-family:\"Carlito\",sans-serif;font-size:12pt;color:#8a8a82;border-top:1px solid var(--line);padding-top:1.6mm;}\n  /* self-eval grid (checkboxes) */\n  .leg{font-size:12pt;color:#444;margin:.12em 0 .3em;line-height:1.25;}\n  .situ{border:1.6px solid var(--accent);border-radius:8px;overflow:hidden;}\n  .situ-head,.situ-row{display:grid;grid-template-columns:1fr 17mm 17mm 17mm 17mm;align-items:center;}\n  .situ-head{background:var(--accent);color:#fff;font-family:\"Carlito\",sans-serif;font-weight:700;font-size:12pt;}\n  .situ-head .h{text-align:center;padding:.32em 0;border-left:1px solid #ffffff55;line-height:1.05;}\n  .situ-head .h .chip{display:inline-block;width:.66em;height:.66em;border-radius:50%;margin-right:.2em;vertical-align:-1px;border:1px solid #ffffffaa;}\n  .situ-row{border-top:1px solid var(--line);}\n  .situ-row:nth-child(even){background:#eef2f7;}\n  .situ-q{padding:.36em .6em;font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n  .aubrevet{font-family:\"Carlito\",sans-serif;font-size:12.5pt;color:#1d3c61;background:#eef3f8;border:1.5px solid #2f6fb0;border-radius:8px;padding:.5em .8em;margin:.35em 0 .45em;line-height:1.35;}  .aubrevet b{color:#2f6fb0;}\n</style>\n</head>\n<body>\n<section class=\"page\"><div class=\"kicker\">Révisions Brevet 2026 · Compréhension</div><h1>Personnages &amp; relations</h1><div class=\"subtitle\">Fiche C5 · Compréhension &amp; interprétation</div><hr class=\"hr\"><div class=\"aubrevet\"><b>Au brevet —</b> quand une question demande ce que deux personnages ont en commun, ou le lien qui les unit.</div><div class=\"cahier-rule\">Je lis cette fiche et je m'entraîne. J'écris toutes mes réponses <strong>dans mon cahier</strong>.</div><p class=\"lead\">On me demande ce que <strong>deux personnages ont en commun</strong>. Je vais <strong>au-delà de l'évident</strong> et je donne <strong>deux</strong> points, justifiés.</p><div class=\"gestes\"><div class=\"geste\"><div class=\"num\">1</div><div><span class=\"verb\">Je cherche plus loin</span><p class=\"txt\">Je dépasse l'évident (« ils sont au même endroit »).</p></div></div><div class=\"geste\"><div class=\"num\">2</div><div><span class=\"verb\">Je donne deux points</span><p class=\"txt\">La question en demande deux : j'en trouve deux.</p></div></div><div class=\"geste\"><div class=\"num\">3</div><div><span class=\"verb\">Je justifie chacun</span><p class=\"txt\">Je cite et j'explique le lien pour chaque point.</p></div></div></div><div class=\"maxim\">Le premier point est souvent évident ; le deuxième fait la différence.</div><div class=\"box model\"><span class=\"tag\">Le modèle</span><p class=\"quote\">À l'hôpital, le jeune Lucien et le vieux Firmin ne se parlaient pas. Mais chaque soir, tous deux fixaient la porte, guettant une visite qui ne venait jamais. <span class=\"pen\">(l. 1-2)</span></p><p class=\"model\"><span class=\"g\">Point commun —</span> tous deux attendent une visite qui ne vient pas : ils sont seuls, oubliés.</p><p class=\"model\"><span class=\"g\">Je justifie —</span> « tous deux fixaient la porte », « une visite qui ne venait jamais » (l. 2).</p><p class=\"model\"><span class=\"g\">Le lien —</span> malgré leur différence d'âge, ils partagent la même solitude.</p></div><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 1</div><p class=\"quote\" style=\"margin-top:0;\">La mère française et la mère allemande pleuraient, chacune de son côté de la frontière, un fils qui ne reviendrait pas. <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Qu'ont-ils en commun (au-delà de l'évident) ?</p><p><strong>2.</strong> Quelle(s) citation(s) le prouve(nt) ?</p><p><strong>3.</strong> Explique le lien profond.</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Personnages &amp; relations</span><span>Fiche C5 · page 1</span></div></section><section class=\"page\"><h2><span class=\"n\">B</span> Creuser le lien, et tout dire</h2><p style=\"margin:.15em 0 .1em;\">L'évident saute aux yeux (même lieu, même camp). Le <strong>vrai</strong> lien est plus profond :</p><ul class=\"tight\"><li>la même <strong>souffrance</strong> ou la même peur ;</li><li>le même <strong>espoir</strong>, le même manque ;</li><li>la même <strong>humanité</strong>, par-delà les différences (l'âge, le camp, la langue).</li></ul><p style=\"margin:.3em 0 .1em;\">Si la question demande <strong>deux</strong> points et que je n'en donne qu'un, c'est une <strong>réponse incomplète</strong> : la moitié des points.</p><div class=\"box model\"><span class=\"tag\">Le modèle — deux points</span><p class=\"quote\">Le soldat allemand et le soldat français, blessés dans le même trou d'obus, partagèrent leur eau sans un mot. Au matin, chacun montra à l'autre la photo qu'il gardait sur son cœur. <span class=\"pen\">(l. 1-2)</span></p><p class=\"model\"><span class=\"g\">Point 1 —</span> la même souffrance : « blessés dans le même trou d'obus ».</p><p class=\"model\"><span class=\"g\">Point 2 —</span> chacun garde un être cher : « la photo qu'il gardait sur son cœur ».</p><p class=\"model\"><span class=\"g\">Le lien —</span> au-delà de l'ennemi, ce sont deux hommes semblables.</p></div><div class=\"box model\"><span class=\"tag\">Le modèle — tout perdre ensemble</span><p class=\"quote\">La veuve du village et la petite orpheline n'avaient plus personne ; elles finirent par vivre ensemble. <span class=\"pen\">(l. 4)</span></p><p class=\"model\"><span class=\"g\">Point commun —</span> toutes deux ont tout perdu : la même solitude les rapproche.</p><p class=\"model\"><span class=\"g\">Le lien —</span> elles se soutiennent et se tiennent compagnie : « elles finirent par vivre ensemble ».</p></div><h2><span class=\"n\">C</span> Je m'entraîne</h2><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 2</div><p class=\"quote\" style=\"margin-top:0;\">Le vieux paysan et le jeune réfugié n'avaient pas la même langue. Pourtant, ils partagèrent le pain et dormirent sous le même toit. <span class=\"pen\">(l. 1-2)</span></p><p><strong>1.</strong> Qu'ont-ils en commun (au-delà de l'évident) ?</p><p><strong>2.</strong> Quelle(s) citation(s) le prouve(nt) ?</p><p><strong>3.</strong> Explique le lien profond.</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Personnages &amp; relations</span><span>Fiche C5 · page 2</span></div></section><section class=\"page\"><h2><span class=\"n\">!</span> Les erreurs qui coûtent cher (et leur nom)</h2><ul class=\"tight\"><li><strong>Hors sujet</strong> : je réponds à côté de la question.</li><li><strong>Contresens</strong> : j'ai compris le texte à l'envers.</li><li><strong>Réponse incomplète</strong> : il manque une partie (je n'ai pas tout dit).</li><li><strong>Réponses mélangées</strong> : je mets plusieurs idées en désordre.</li><li><strong>Phrase sans verbe</strong> : ma phrase n'a pas de verbe.</li><li><strong>Style oral</strong> : j'écris comme je parle (« y a », « du coup », « trop bien »…).</li><li><strong>Paraphrase</strong> : je recopie le texte au lieu d'expliquer.</li></ul><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 3</div><p class=\"quote\" style=\"margin-top:0;\">L'un avait gagné la guerre, l'autre l'avait perdue. Mais tous deux rentraient chez eux les mains vides, le regard éteint. <span class=\"pen\">(l. 1-2)</span></p><p><strong>1.</strong> Qu'ont-ils en commun (au-delà de l'évident) ?</p><p><strong>2.</strong> Quelle(s) citation(s) le prouve(nt) ?</p><p><strong>3.</strong> Explique le lien profond.</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><h2><span class=\"n\">&#10003;</span> Je me situe</h2><p style=\"margin:.05em 0 .1em;\">Pour chaque savoir-faire, je coche la case qui me correspond.</p><div class=\"leg\">Vert : je le fais seul, à chaque fois — Bleu : presque toujours — Jaune : parfois, j'oublie — Rouge : pas encore.</div><div class=\"situ\"><div class=\"situ-head\"><div class=\"situ-q\" style=\"background:none;color:#fff;\">Mon savoir-faire</div><div class=\"h\"><span class=\"chip chip-v\"></span>Vert</div><div class=\"h\"><span class=\"chip chip-b\"></span>Bleu</div><div class=\"h\"><span class=\"chip chip-j\"></span>Jaune</div><div class=\"h\"><span class=\"chip chip-r\"></span>Rouge</div></div><div class=\"situ-row\"><div class=\"situ-q\">Je dépasse l'évident.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je donne deux points communs.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je justifie chaque point par une citation.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">J'explique le lien (pas seulement « ils se ressemblent »).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div></div><p class=\"note-app\">Au bilan, on reporte la classe sur le tableau de suivi projeté.</p><div class=\"foot\"><span>Personnages &amp; relations</span><span>Fiche C5 · page 3</span></div></section>\n</body></html>", "c6": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Fiche C2 — Interpréter : la question d'ouverture</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24em;font-weight:700;display:flex;align-items:baseline;gap:.45em;}\n  h2 .n{display:inline-block;min-width:1.2em;height:1.2em;line-height:1.2em;text-align pt;color:var(--accent2);font-style:italic;margin:.3em 0 0;text-align:right;}\n  .pen{font-size:12pt;color:#777;font-style:italic;}\n  .foot{position:absolute;left:18mm;right:18mm;bottom:7mm;display:flex;justify-content:space-between;\n        font-family:\"Carlito\",sans-serif;font-size:12pt;color:#8a8a82;border-top:1px solid var(--line);padding-top:1.6mm;}\n  /* self-eval grid (checkboxes) */\n  .leg{font-size:12pt;color:#444;margin:.12em 0 .3em;line-height:1.25;}\n  .situ{border:1.6px solid var(--accent);border-radius:8px;overflow:hidden;}\n  .situ-head,.situ-row{display:grid;grid-template-columns:1fr 17mm 17mm 17mm 17mm;align-items:center;}\n  .situ-head{background:var(--accent);color:#fff;font-family:\"Carlito\",sans-serif;font-weight:700;font-size:12pt;}\n  .situ-head .h{text-align:center;padding:.32em 0;border-left:1px solid #ffffff55;line-height:1.05;}\n  .situ-head .h .chip{display:inline-block;width:.66em;height:.66em;border-radius:50%;margin-right:.2em;vertical-align:-1px;border:1px solid #ffffffaa;}\n  .situ-row{border-top:1px solid var(--line);}\n  .situ-row:nth-child(even){background:#eef2f7;}\n  .situ-q{padding:.36em .6em;font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n  .aubrevet{font-family:\"Carlito\",sans-serif;font-size:12.5pt;color:#1d3c61;background:#eef3f8;border:1.5px solid #2f6fb0;border-radius:8px;padding:.5em .8em;margin:.35em 0 .45em;line-height:1.35;}  .aubrevet b{color:#2f6fb0;}\n</style>\n</head>\n<body>\n<section class=\"page\"><div class=\"kicker\">Révisions Brevet 2026 · Compréhension</div><h1>Les figures de style</h1><div class=\"subtitle\">Fiche C6 · Compréhension &amp; interprétation</div><hr class=\"hr\"><div class=\"aubrevet\"><b>Au brevet —</b> quand une question demande de repérer une figure de style (comparaison, métaphore, personnification…) et d'expliquer son effet.</div><div class=\"cahier-rule\">Je lis cette fiche et je m'entraîne. J'écris toutes mes réponses <strong>dans mon cahier</strong>.</div><p class=\"lead\">On me demande de repérer une <strong>figure de style</strong>. Je la <strong>nomme</strong>, je <strong>cite</strong> l'image, et je dis son <strong>effet</strong> (ce qu'elle fait voir ou ressentir).</p><div class=\"gestes\"><div class=\"geste\"><div class=\"num\">1</div><div><span class=\"verb\">Je nomme la figure</span><p class=\"txt\">Comparaison, métaphore, personnification, gradation…</p></div></div><div class=\"geste\"><div class=\"num\">2</div><div><span class=\"verb\">Je cite l'image</span><p class=\"txt\">Je recopie les mots exacts qui forment la figure.</p></div></div><div class=\"geste\"><div class=\"num\">3</div><div><span class=\"verb\">Je dis l'effet</span><p class=\"txt\">Je dis ce que la figure fait voir ou ressentir.</p></div></div></div><div class=\"maxim\">Nommer ne suffit pas : je cite l'image et je dis ce qu'elle fait voir.</div><div class=\"box model\"><span class=\"tag\">Le modèle</span><p class=\"quote\">Les obus tombaient comme une pluie de fer. <span class=\"pen\">(l. 3)</span></p><p class=\"model\"><span class=\"g\">Je nomme —</span> une comparaison (mot-outil « comme »).</p><p class=\"model\"><span class=\"g\">Je cite —</span> « comme une pluie de fer » (l. 3).</p><p class=\"model\"><span class=\"g\">L'effet —</span> l'image rend le bombardement continu et impossible à éviter, comme une averse qui n'en finit pas.</p></div><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 1</div><p class=\"quote\" style=\"margin-top:0;\">a. La nuit, le canon ne dormait jamais.&nbsp;&nbsp;b. Sa peur grandissait, montait, l'envahissait tout entier. <span class=\"pen\">(l. 4-5)</span></p><p><strong>1.</strong> Quelle figure de style ?</p><p><strong>2.</strong> Cite les mots qui la forment.</p><p><strong>3.</strong> Quel est son effet ?</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Les figures de style</span><span>Fiche C6 · page 1</span></div></section><section class=\"page\"><h2><span class=\"n\">B</span> Les figures à connaître</h2><ul class=\"tight\"><li><strong>Comparaison</strong> : deux choses rapprochées par un mot-outil (<em>comme, tel, pareil à</em>).</li><li><strong>Métaphore</strong> : un rapprochement entre deux choses, mais <strong>sans</strong> mot-outil.</li><li><strong>Personnification</strong> : une chose ou une idée qui agit comme un être vivant.</li><li><strong>Hyperbole</strong> : une exagération.</li><li><strong>Énumération</strong> : une liste qui accumule ; <strong>gradation</strong> quand elle monte en intensité.</li><li><strong>Antithèse</strong> : deux mots ou deux idées opposés, rapprochés.</li><li><strong>Répétition</strong> : un mot répété pour insister.</li></ul><p style=\"margin:.3em 0 .1em;\">Le piège le plus fréquent : <strong>nommer</strong> la figure mais oublier l'<strong>effet</strong> (réponse incomplète). Autre piège : se tromper de figure (comparaison ou métaphore ? il faut chercher le mot-outil).</p><div class=\"box model\"><span class=\"tag\">Le modèle — métaphore</span><p class=\"quote\">Le champ de bataille n'était plus qu'un océan de boue. <span class=\"pen\">(l. 2)</span></p><p class=\"model\"><span class=\"g\">Je nomme —</span> une métaphore (pas de mot-outil : on dit que le champ <em>est</em> un océan).</p><p class=\"model\"><span class=\"g\">L'effet —</span> l'image montre l'immensité et le danger : on s'enfonce dans la boue comme on se noie.</p></div><div class=\"box model\"><span class=\"tag\">Le modèle — personnification</span><p class=\"quote\">Le vent hurlait dans les tranchées. <span class=\"pen\">(l. 6)</span></p><p class=\"model\"><span class=\"g\">Je nomme —</span> une personnification : « le vent hurlait » (le vent agit comme un être vivant).</p><p class=\"model\"><span class=\"g\">L'effet —</span> le décor devient menaçant, vivant, hostile : la nature semble souffrir avec les soldats.</p></div><h2><span class=\"n\">C</span> Je m'entraîne</h2><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 2</div><p class=\"quote\" style=\"margin-top:0;\">Des milliers de cris montaient des tranchées. <span class=\"pen\">(l. 2)</span></p><p><strong>1.</strong> Quelle figure de style ?</p><p><strong>2.</strong> Cite les mots qui la forment.</p><p><strong>3.</strong> Quel est son effet ?</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Les figures de style</span><span>Fiche C6 · page 2</span></div></section><section class=\"page\"><h2><span class=\"n\">!</span> Les erreurs qui coûtent cher (et leur nom)</h2><ul class=\"tight\"><li><strong>Hors sujet</strong> : je réponds à côté de la question.</li><li><strong>Contresens</strong> : j'ai compris le texte à l'envers.</li><li><strong>Réponse incomplète</strong> : il manque une partie (je n'ai pas tout dit).</li><li><strong>Réponses mélangées</strong> : je mets plusieurs idées en désordre.</li><li><strong>Phrase sans verbe</strong> : ma phrase n'a pas de verbe.</li><li><strong>Style oral</strong> : j'écris comme je parle (« y a », « du coup », « trop bien »…).</li><li><strong>Paraphrase</strong> : je recopie le texte au lieu d'expliquer.</li></ul><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 3</div><p class=\"quote\" style=\"margin-top:0;\">Ici, la mort ; là, la vie qui s'accrochait encore. <span class=\"pen\">(l. 3)</span></p><p><strong>1.</strong> Quelle figure de style ?</p><p><strong>2.</strong> Cite les mots qui la forment.</p><p><strong>3.</strong> Quel est son effet ?</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><h2><span class=\"n\">&#10003;</span> Je me situe</h2><p style=\"margin:.05em 0 .1em;\">Pour chaque savoir-faire, je coche la case qui me correspond.</p><div class=\"leg\">Vert : je le fais seul, à chaque fois — Bleu : presque toujours — Jaune : parfois, j'oublie — Rouge : pas encore.</div><div class=\"situ\"><div class=\"situ-head\"><div class=\"situ-q\" style=\"background:none;color:#fff;\">Mon savoir-faire</div><div class=\"h\"><span class=\"chip chip-v\"></span>Vert</div><div class=\"h\"><span class=\"chip chip-b\"></span>Bleu</div><div class=\"h\"><span class=\"chip chip-j\"></span>Jaune</div><div class=\"h\"><span class=\"chip chip-r\"></span>Rouge</div></div><div class=\"situ-row\"><div class=\"situ-q\">Je nomme correctement la figure.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je cite l'image (les mots exacts).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je dis l'effet (ce que ça fait voir ou ressentir).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je ne confonds pas comparaison et métaphore (mot-outil ou non).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div></div><p class=\"note-app\">Au bilan, on reporte la classe sur le tableau de suivi projeté.</p><div class=\"foot\"><span>Les figures de style</span><span>Fiche C6 · page 3</span></div></section>\n</body></html>", "c7": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Fiche C2 — Interpréter : la question d'ouverture</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24em;font-weight:700;display:flex;align-items:baseline;gap:.45em;}\n  h2 .n{display:inline-block;min-width:1.2em;height:1.2em;line-height:1.2em;text-align:center;\n        background:var(--accent);color:#fff;border-radius:50%;font-size:12pt;flex:none;}\n  p{margin:.3em 0;}\n  .lead{margin:.15em 0 .35em absolute;left:18mm;right:18mm;bottom:7mm;display:flex;justify-content:space-between;\n        font-family:\"Carlito\",sans-serif;font-size:12pt;color:#8a8a82;border-top:1px solid var(--line);padding-top:1.6mm;}\n  /* self-eval grid (checkboxes) */\n  .leg{font-size:12pt;color:#444;margin:.12em 0 .3em;line-height:1.25;}\n  .situ{border:1.6px solid var(--accent);border-radius:8px;overflow:hidden;}\n  .situ-head,.situ-row{display:grid;grid-template-columns:1fr 17mm 17mm 17mm 17mm;align-items:center;}\n  .situ-head{background:var(--accent);color:#fff;font-family:\"Carlito\",sans-serif;font-weight:700;font-size:12pt;}\n  .situ-head .h{text-align:center;padding:.32em 0;border-left:1px solid #ffffff55;line-height:1.05;}\n  .situ-head .h .chip{display:inline-block;width:.66em;height:.66em;border-radius:50%;margin-right:.2em;vertical-align:-1px;border:1px solid #ffffffaa;}\n  .situ-row{border-top:1px solid var(--line);}\n  .situ-row:nth-child(even){background:#eef2f7;}\n  .situ-q{padding:.36em .6em;font-family:\"Carlito\",sans-serif;font-weight:700;color:var(--ink);font-size:12pt;line-height:1.15;}\n  .chk{display:flex;justify-content:center;align-items:center;border-left:1px solid var(--line);padding:.36em 0;}\n  .box-sq{width:6mm;height:6mm;border:1.8px solid #555;border-radius:1.5px;background:#fff;}\n  .chip-v{background:var(--vert);} .chip-b{background:var(--bleu);} .chip-j{background:var(--jaune);} .chip-r{background:var(--rouge);}\n  .note-app{font-size:12pt;color:#555;font-style:italic;margin-top:.4em;}\n  .aubrevet{font-family:\"Carlito\",sans-serif;font-size:12.5pt;color:#1d3c61;background:#eef3f8;border:1.5px solid #2f6fb0;border-radius:8px;padding:.5em .8em;margin:.35em 0 .45em;line-height:1.35;}  .aubrevet b{color:#2f6fb0;}\n</style>\n</head>\n<body>\n<section class=\"page\"><div class=\"kicker\">Révisions Brevet 2026 · Compréhension</div><h1>Analyse d'image &amp; lien texte-image</h1><div class=\"subtitle\">Fiche C7 · Compréhension &amp; interprétation</div><hr class=\"hr\"><div class=\"aubrevet\"><b>Au brevet —</b> quand le sujet propose une image (le Document B) : je dois la décrire, l'interpréter, puis la relier au texte.</div><div class=\"cahier-rule\">Je lis cette fiche et je m'entraîne. J'écris toutes mes réponses <strong>dans mon cahier</strong>.</div><p class=\"lead\">On me demande de <strong>décrire</strong> une image, de l'<strong>interpréter</strong>, puis de la <strong>relier au texte</strong>. Un bon lien rapproche un détail de l'image et un mot précis du texte.</p><div class=\"gestes\"><div class=\"geste\"><div class=\"num\">1</div><div><span class=\"verb\">Je décris</span><p class=\"txt\">Je dis ce que je vois (sans encore interpréter).</p></div></div><div class=\"geste\"><div class=\"num\">2</div><div><span class=\"verb\">J'interprète</span><p class=\"txt\">Je dis ce que l'image fait ressentir.</p></div></div><div class=\"geste\"><div class=\"num\">3</div><div><span class=\"verb\">Je relie au texte</span><p class=\"txt\">Je rapproche un détail de l'image d'un mot du texte (deux points).</p></div></div></div><div class=\"maxim\">Un bon lien rapproche un détail de l'image et un mot précis du texte.</div><div class=\"box model\"><span class=\"tag\">Le modèle</span><p class=\"quote\">Image : un soldat de dos, seul, regarde un champ creusé de cratères ; au fond, un village en ruines.<br>Texte : « Il marchait seul sur la route, au milieu d'un silence plus lourd que tout. » <span class=\"pen\">(l. 1)</span></p><p class=\"model\"><span class=\"g\">Je décris —</span> un soldat seul, de dos, devant un paysage détruit.</p><p class=\"model\"><span class=\"g\">J'interprète —</span> l'image fait ressentir la solitude et la désolation.</p><p class=\"model\"><span class=\"g\">Je relie (2 points) —</span> le soldat seul fait écho à « Il marchait seul » ; le champ détruit prolonge « un silence plus lourd que tout ».</p></div><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 1</div><p class=\"quote\" style=\"margin-top:0;\">Image : sur une table, une photo déchirée et une médaille.<br>Texte : « De son fils, il ne restait qu'un nom sur le monument. » <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Décris ce que tu vois.</p><p><strong>2.</strong> Interprète (ce que ça fait ressentir).</p><p><strong>3.</strong> Relie au texte : deux points précis.</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Analyse d'image &amp; lien texte-image</span><span>Fiche C7 · page 1</span></div></section><section class=\"page\"><h2><span class=\"n\">B</span> Réussir le lien, et tout dire</h2><p style=\"margin:.15em 0 .1em;\">Je ne confonds pas <strong>décrire</strong> (ce que je vois) et <strong>interpréter</strong> (ce que ça veut dire). Puis je fais le lien :</p><ul class=\"tight\"><li>je choisis un <strong>détail précis</strong> de l'image (pas « l'image est triste ») ;</li><li>je le rapproche d'un <strong>mot précis</strong> du texte (une citation) ;</li><li>je donne <strong>deux</strong> liens si la question le demande.</li></ul><p style=\"margin:.3em 0 .1em;\">Un seul lien vague (« ça va ensemble ») = <strong>réponse incomplète</strong>. Décrire sans interpréter = <strong>hors sujet</strong> partiel.</p><div class=\"box model\"><span class=\"tag\">Le modèle — un lien précis</span><p class=\"quote\">Image : une vieille femme seule à une fenêtre regarde une rue vide sous la pluie.<br>Texte : « Elle attendait depuis quatre ans une lettre qui n'arrivait pas. » <span class=\"pen\">(l. 1)</span></p><p class=\"model\"><span class=\"g\">Lien —</span> la femme seule à la fenêtre fait écho à l'attente du texte ; la rue vide sous la pluie prolonge « une lettre qui n'arrivait pas » : l'absence et la tristesse.</p></div><div class=\"box model\"><span class=\"tag\">Le modèle — un objet qui parle</span><p class=\"quote\">Image : un casque abandonné posé sur une tombe de terre.<br>Texte : « On l'enterra là où il était tombé. » <span class=\"pen\">(l. 5)</span></p><p class=\"model\"><span class=\"g\">Lien —</span> le casque rappelle le soldat mort ; la tombe de terre prolonge « On l'enterra là où il était tombé » : l'hommage rendu sur le lieu même de sa mort.</p></div><h2><span class=\"n\">C</span> Je m'entraîne</h2><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 2</div><p class=\"quote\" style=\"margin-top:0;\">Image : des enfants jouent à la marelle sur une place, devant un mur criblé de balles.<br>Texte : « La vie reprenait, malgré les traces de la guerre. » <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Décris ce que tu vois.</p><p><strong>2.</strong> Interprète (ce que ça fait ressentir).</p><p><strong>3.</strong> Relie au texte : deux points précis.</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><div class=\"foot\"><span>Analyse d'image &amp; lien texte-image</span><span>Fiche C7 · page 2</span></div></section><section class=\"page\"><h2><span class=\"n\">!</span> Les erreurs qui coûtent cher (et leur nom)</h2><ul class=\"tight\"><li><strong>Hors sujet</strong> : je réponds à côté de la question.</li><li><strong>Contresens</strong> : j'ai compris le texte à l'envers.</li><li><strong>Réponse incomplète</strong> : il manque une partie (je n'ai pas tout dit).</li><li><strong>Réponses mélangées</strong> : je mets plusieurs idées en désordre.</li><li><strong>Phrase sans verbe</strong> : ma phrase n'a pas de verbe.</li><li><strong>Style oral</strong> : j'écris comme je parle (« y a », « du coup », « trop bien »…).</li><li><strong>Paraphrase</strong> : je recopie le texte au lieu d'expliquer.</li></ul><div class=\"ex\"><div class=\"ex-head\">Je m'entraîne · 3</div><p class=\"quote\" style=\"margin-top:0;\">Image : une seule fleur a poussé au milieu d'un champ de barbelés.<br>Texte : « Même là, quelque chose résistait encore. » <span class=\"pen\">(l. 1)</span></p><p><strong>1.</strong> Décris ce que tu vois.</p><p><strong>2.</strong> Interprète (ce que ça fait ressentir).</p><p><strong>3.</strong> Relie au texte : deux points précis.</p><p class=\"cahier\">→ Je réponds dans mon cahier.</p></div><h2><span class=\"n\">&#10003;</span> Je me situe</h2><p style=\"margin:.05em 0 .1em;\">Pour chaque savoir-faire, je coche la case qui me correspond.</p><div class=\"leg\">Vert : je le fais seul, à chaque fois — Bleu : presque toujours — Jaune : parfois, j'oublie — Rouge : pas encore.</div><div class=\"situ\"><div class=\"situ-head\"><div class=\"situ-q\" style=\"background:none;color:#fff;\">Mon savoir-faire</div><div class=\"h\"><span class=\"chip chip-v\"></span>Vert</div><div class=\"h\"><span class=\"chip chip-b\"></span>Bleu</div><div class=\"h\"><span class=\"chip chip-j\"></span>Jaune</div><div class=\"h\"><span class=\"chip chip-r\"></span>Rouge</div></div><div class=\"situ-row\"><div class=\"situ-q\">Je décris ce que je vois.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">J'interprète (ce que l'image fait ressentir).</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je relie un détail de l'image à un mot du texte.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div></div><div class=\"situ-row\"><div class=\"situ-q\">Je donne deux liens quand on me le demande.</div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div class=\"chk\"><span class=\"box-sq\"></span></div><div uotidien)</span><div class=\"qsent\">Je ne comprends pas toujours ce que les adultes attendent de nous.</div></div>\n<div class=\"qitem\"><span class=\"theme\">Tes projets (quotidien)</span><div class=\"qsent\">Ce à quoi tu rêves vraiment demande beaucoup d'efforts.</div></div>\n<div class=\"qitem\"><span class=\"theme\">La lecture (littéraire)</span><div class=\"qsent\">Je sais que le livre que tu lis raconte une guerre que personne n'oubliera.</div></div>\n</div><div class=\"foot\"><span>Analyse logique — Repérage</span><span>page 1</span></div>\n</section>\n<section class=\"page\">\n<div class=\"plist\" style=\"counter-reset:ph 5\"><div class=\"qitem\"><span class=\"theme\">Le récit d'aventure (littéraire)</span><div class=\"qsent\">Le héros comprend qu'il doit fuir avant que l'orage qui gronde n'éclate.</div></div>\n<div class=\"qitem\"><span class=\"theme\">Un auteur (littéraire)</span><div class=\"qsent\">L'auteur dont les livres que nous étudions sont célèbres viendra au collège.</div></div>\n<div class=\"qitem\"><span class=\"theme\">Le sport (quotidien)</span><div class=\"qsent\">Si tu veux que tes efforts paient, entraîne-toi avec ceux qui te motivent.</div></div>\n<div class=\"qitem\"><span class=\"theme\">Le progrès — Kaizen (mixte)</span><div class=\"qsent\">Comme chacun sait que le progrès qu'on espère exige de la patience, il faut persévérer.</div></div>\n</div><div class=\"foot\"><span>Analyse logique — Repérage</span><span>page 2</span></div>\n</section>\n<section class=\"page\">\n<span class=\"theme\">Lecture / Series (mixte) — une seule phrase, dix propositions</span><div style=\"font-size:15pt;line-height:3.2;margin-top:22px;\"><b style=\"font-family:Carlito;color:var(--accent)\">10.</b>&nbsp; Quand les vacances arriveront, je lirai le roman que ma sœur m'a offert, car je crois qu'il raconte l'histoire d'un héros qui affronte mille dangers ; ensuite je regarderai la série que tout le monde adore, bien qu'elle trahisse ce que l'auteur avait imaginé.</div><div class=\"foot\"><span>Analyse logique — Repérage</span><span>page 3</span></div>\n</section>\n<section class=\"page\">\n<span class=\"phase\">Phase 2 — Construction</span><div class=\"consigne\">Construis une phrase qui respecte la structure imposée, puis fais l'analyse logique en dessous.</div><div class=\"plist\"><div class=\"citem\"><span class=\"struct\">PP + PSR (qui)</span> &nbsp;<span class=\"cth\">— ton sport ou ton loisir</span><div class=\"wl\"></div><div class=\"wl\"></div></div><div class=\"citem\"><span class=\"struct\">PP + PSCc contenant une PSR (enchâssement)</span> &nbsp;<span class=\"cth\">— un livre que tu connais</span><div class=\"wl\"></div><div class=\"wl\"></div></div><div class=\"citem\"><span class=\"struct\">DPP + PSR (dont) + FPP</span> &nbsp;<span class=\"cth\">— un objet de ton quotidien</span><div class=\"wl\"></div><div class=\"wl\"></div></div><div class=\"citem\"><span class=\"struct\">Une phrase avec « ce que » ou « ce à quoi »</span> &nbsp;<span class=\"cth\">— tes projets, tes goûts</span><div class=\"wl\"></div><div class=\"wl\"></div></div><div class=\"citem\"><span class=\"struct\">PP + PSCci d'opposition (« bien que »)</span> &nbsp;<span class=\"cth\">— les écrans ou les réseaux</span><div class=\"wl\"></div><div class=\"wl\"></div></div><div class=\"citem\"><span class=\"struct\">Une phrase à trois subordonnées de ton choix</span> &nbsp;<span class=\"cth\">— thème libre</span><div class=\"wl\"></div><div class=\"wl\"></div></div></div><div class=\"foot\"><span>Analyse logique — Construction</span><span>page 4</span></div>\n</section>\n<section class=\"page\">\n<span class=\"phase\">Bilan — Paragraphe argumentatif</span><div class=\"consigne\">Sujet : vaut-il mieux découvrir une histoire en lisant le livre, ou en regardant son adaptation (film ou série) ?</div><p style=\"font-size:12pt;margin:.1em 0 .4em;\">Rédige un <b>paragraphe argumenté</b> (8 à 12 lignes). Emploie <b>volontairement</b> des subordonnées et des connecteurs logiques. <u>Souligne</u> les connecteurs que tu utilises et <b>entoure</b> une subordonnée de ton choix.</p><div class=\"cth\" style=\"font-weight:700;color:var(--accent);font-size:12pt;margin-bottom:2px;\">Ma palette de connecteurs :</div><table class=\"conn\"><tr><th>Relation</th><th>Coordination (CDC)</th><th>Subordination (CDS → PSCci)</th></tr><tr><td class=\"rel\">Cause</td><td class=\"cdc2\">car</td><td class=\"cds\">parce que, puisque, comme</td></tr><tr><td class=\"rel\">Conséquence</td><td class=\"cdc2\">donc, c'est pourquoi</td><td class=\"cds\">si bien que, de sorte que</td></tr><tr><td class=\"rel\">Opposition / concession</td><td class=\"cdc2\">mais</td><td class=\"cds\">alors que, bien que, même si</td></tr><tr><td class=\"rel\">Condition</td><td class=\"cdc2\">—</td><td class=\"cds\">si, à condition que</td></tr><tr><td class=\"rel\">But</td><td class=\"cdc2\">—</td><td class=\"cds\">pour que, afin que</td></tr><tr><td class=\"rel\">Addition / ordre</td><td class=\"cdc2\">et, de plus, d'abord, ensuite, enfin</td><td class=\"cds\">—</td></tr></table><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"foot\"><span>Analyse logique — Bilan</span><span>page 5</span></div>\n</section>\n</body></html>", "br": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Compréhension — Français (sujet)</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;
