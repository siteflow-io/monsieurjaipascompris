<td class=\"ph\">7. Un auteur</td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td></tr><tr><td class=\"ph\">8. Le sport</td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td></tr><tr><td class=\"ph\">9. Kaizen</td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td></tr><tr><td class=\"ph\">10. Le texte (5 phrases)</td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td><td class=\"mark\"></td></tr></table>\n  <h2 class=\"sec\">Là où je me trompe le plus souvent (je coche)</h2>\n  <div class=\"diag\"><div><span class=\"ck\"></span>Je ne compte pas le bon nombre de propositions (il y en a une par verbe conjugué).</div><div><span class=\"ck\"></span>Je confonds « que » pronom relatif (PR) et « que » conjonction de subordination (CDS).</div><div><span class=\"ck\"></span>Je place mal mes crochets quand une subordonnée est enchâssée dans une autre.</div><div><span class=\"ck\"></span>Je confonds PSR, PSCc et PSCci.</div><div><span class=\"ck\"></span>J'oublie de couper la principale (DPP / FPP) quand une subordonnée s'enchâsse.</div><div><span class=\"ck\"></span>J'oublie d'encadrer l'antécédent ou le verbe complété, ou je trace mal la flèche.</div></div>\n  <h2 class=\"sec\">Je me situe</h2>\n  <div class=\"situe\"><div class=\"lvl r\"><span class=\"ck\"></span><span>Je trouve les verbes conjugués, mais je me perds dès qu'il y a des subordonnées.</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je délimite les propositions ; je confonds encore certains types (PSR / PSCc / PSCci).</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>J'analyse juste, sauf les cas difficiles (enchâssements, « ce que / ce à quoi »).</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>J'analyse finement, enchâssements et cas limites compris.</span></div></div>\n  <h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2>\n  <div class=\"wl\"></div><div class=\"wl\"></div>\n  <div class=\"foot\"><span>Analyse logique — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n<section class=\"page\">\n<div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Analyse logique</div><h1>Corrigé — Atelier</h1><div class=\"subtitle\">crochets emboîtés (enchâssements) · flèche au-dessus · étiquette en dessous</div><hr class=\"hr\" style=\"background:var(--vert)\"><span class=\"phase\" style=\"background:var(--vert)\">Phase 1 — Repérage</span><div class=\"leg\"><span class=\"c\"><span class=\"dot\" style=\"background:#111\"></span>VC souligné</span><span class=\"c\"><span class=\"dot\" style=\"background:#1d5fbf\"></span>MS (bleu)</span><span class=\"c\"><span class=\"dot\" style=\"background:#c0392b\"></span>PS (rouge)</span><span class=\"c\"><span class=\"dot\" style=\"background:#1f7a3d\"></span>PP + antécédent/VCP (vert)</span></div><div class=\"plist\"><div class=\"cana\"><span class=\"ctheme\">Le téléphone (quotidien)</span><div class=\"arows\"><b>que</b> → sais (CDS) · <b>que</b> → message (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span>Tu <span class=\"ante\"><span class=\"vc\">sais</span></span><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">PP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> le <span class=\"ante\">message</span> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> je t'<span class=\"vc\">ai envoyé</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> <span class=\"vc\">était</span> important<span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCc</sub></div></div><div class=\"cana\"><span class=\"ctheme\">Le héros du récit (littéraire)</span><div class=\"arows\"><b>à qui</b> → homme (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span>L'<span class=\"ante\">homme</span><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">DPP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">à qui</span> le héros se <span class=\"vc\">confie</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> <span class=\"brk bpp\">[</span>le <span class=\"vc\">trahira</span> bientôt<span class=\"brk bpp\">]</span><sub class=\"lab bpp\">FPP</sub></div></div><div class=\"cana\"><span class=\"ctheme\">Les réseaux (quotidien)</span><div class=\"arows\"><b>que</b> → ce (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span>Je ne <span class=\"vc\">comprends</span> pas toujours <span class=\"ante\">ce</span><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">PP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> les adultes <span class=\"vc\">attendent</span> de nous<span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub></div></div><div class=\"cana\"><span class=\"ctheme\">Tes projets (quotidien)</span><div class=\"arows\"><b>à quoi</b> → ce (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span><span class=\"ante\">Ce</span><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">DPP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">à quoi</span> tu <span class=\"vc\">rêves</span> vraiment<span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> <span class=\"brk bpp\">[</span><span class=\"vc\">demande</span> beaucoup d'efforts<span class=\"brk bpp\">]</span><sub class=\"lab bpp\">FPP</sub></div></div></div><div class=\"foot\"><span>Corrigé — Analyse logique</span><span>page 1</span></div>\n</section>\n<section class=\"page\">\n<div class=\"plist\" style=\"counter-reset:ph 4\"><div class=\"cana\"><span class=\"ctheme\">La lecture (littéraire)</span><div class=\"arows\"><b>que</b> → sais (CDS) · <b>que</b> → livre (PR) · <b>que</b> → guerre (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span>Je <span class=\"ante\"><span class=\"vc\">sais</span></span><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">PP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> le <span class=\"ante\">livre</span> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> tu <span class=\"vc\">lis</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> <span class=\"vc\">raconte</span> une <span class=\"ante\">guerre</span> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> personne n'<span class=\"vc\">oubliera</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCc</sub></div></div><div class=\"cana\"><span class=\"ctheme\">Le récit d'aventure (littéraire)</span><div class=\"arows\"><b>qu'</b> → comprend (CDS) · <b>avant que</b> → fuir (temps) · <b>qui</b> → orage (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span>Le héros <span class=\"ante\"><span class=\"vc\">comprend</span></span><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">PP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">qu'</span>il <span class=\"vc\">doit</span> fuir <span class=\"brk bps\">[</span><span class=\"ms\">avant que</span> l'<span class=\"ante\">orage</span> <span class=\"brk bps\">[</span><span class=\"ms\">qui</span> <span class=\"vc\">gronde</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> n'<span class=\"vc\">éclate</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCci</sub><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCc</sub></div></div><div class=\"cana\"><span class=\"ctheme\">Un auteur (littéraire)</span><div class=\"arows\"><b>dont</b> → auteur (PR) · <b>que</b> → livres (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span>L'<span class=\"ante\">auteur</span><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">DPP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">dont</span> les <span class=\"ante\">livres</span> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> nous <span class=\"vc\">étudions</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> <span class=\"vc\">sont</span> célèbres<span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> <span class=\"brk bpp\">[</span><span class=\"vc\">viendra</span> au collège<span class=\"brk bpp\">]</span><sub class=\"lab bpp\">FPP</sub></div></div></div><div class=\"foot\"><span>Corrigé — Analyse logique</span><span>page 2</span></div>\n</section>\n<section class=\"page\">\n<div class=\"plist\" style=\"counter-reset:ph 7\"><div class=\"cana\"><span class=\"ctheme\">Le sport (quotidien)</span><div class=\"arows\"><b>Si</b> → entraîne (condition) · <b>que</b> → veux (CDS) · <b>qui</b> → ceux (PR)</div><div class=\"sent\"><span class=\"brk bps\">[</span><span class=\"ms\">Si</span> tu <span class=\"ante\"><span class=\"vc\">veux</span></span> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> tes efforts <span class=\"vc\">paient</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCc</sub><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCci</sub> <span class=\"brk bpp\">[</span><span class=\"ante\"><span class=\"vc\">entraîne</span></span>-toi avec <span class=\"ante\">ceux</span> <span class=\"brk bps\">[</span><span class=\"ms\">qui</span> te <span class=\"vc\">motivent</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">PP</sub></div></div><div class=\"cana\"><span class=\"ctheme\">Le progrès — Kaizen (mixte)</span><div class=\"arows\"><b>Comme</b> → faut (cause) · <b>que</b> → sait (CDS) · <b>qu'</b> → progrès (PR)</div><div class=\"sent\"><span class=\"brk bps\">[</span><span class=\"ms\">Comme</span> chacun <span class=\"ante\"><span class=\"vc\">sait</span></span> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> le <span class=\"ante\">progrès</span> <span class=\"brk bps\">[</span><span class=\"ms\">qu'</span>on <span class=\"vc\">espère</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> <span class=\"vc\">exige</span> de la patience<span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCc</sub><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCci</sub> <span class=\"brk bpp\">[</span>il <span class=\"ante\"><span class=\"vc\">faut</span></span> persévérer<span class=\"brk bpp\">]</span><sub class=\"lab bpp\">PP</sub></div></div></div><div style=\"font-family:Carlito;font-weight:700;color:var(--accent);margin:.5em 0 .2em;\">10. Texte — <span style=\"font-weight:400;font-style:italic;color:#8a8a82;\">Été / Lecture / Adaptation (mixte)</span></div><div class=\"cana sub\"><div class=\"arows\"></div><div class=\"sent\"><span class=\"brk bpi\">[</span>L'été <span class=\"vc\">approche</span> enfin<span class=\"brk bpi\">]</span><sub class=\"lab bpi\">PI</sub></div></div><div class=\"cana sub\"><div class=\"arows\"><b>que</b> → crois (CDS) · <b>que</b> → livre (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span>Je <span class=\"ante\"><span class=\"vc\">crois</span></span><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">PP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> le <span class=\"ante\">livre</span> <span class=\"brk bps\">[</span><span class=\"ms\">que</span> ma sœur m'<span class=\"vc\">a offert</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> me <span class=\"vc\">plaira</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCc</sub></div></div><div class=\"cana sub\"><div class=\"arows\"><b>qui</b> → Ce (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span><span class=\"ante\">Ce</span><span class=\"brk bpp\">]</span><sub class=\"lab bpp\">DPP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">qui</span> me <span class=\"vc\">plaît</span> dans ce roman<span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> <span class=\"brk bpp\">[</span>c'<span class=\"vc\">est</span> son héros<span class=\"brk bpp\">]</span><sub class=\"lab bpp\">FPP</sub></div></div><div class=\"cana sub\"><div class=\"arows\"><b>parce que</b> → lirai (cause) · <b>qu'</b> → histoire (PR)</div><div class=\"sent\"><span class=\"brk bpp\">[</span>Je le <span class=\"ante\"><span class=\"vc\">lirai</span></span> vite<span class=\"brk bpp\">]</span><sub class=\"lab bpp\">PP</sub> <span class=\"brk bps\">[</span><span class=\"ms\">parce que</span> l'<span class=\"ante\">histoire</span> <span class=\"brk bps\">[</span><span class=\"ms\">qu'</span>il <span class=\"vc\">raconte</span><span class=\"brk bps\">]</span><sub class=\"lab bps\">PSR</sub> <span class=\"vc\">est</span> passionnante<span class=\"brk bps\">]</span><sub class=\"lab bps\">PSCci</sub></div></div><div class=\"cana sub\"><div class=\"arows\"></div><div class=\"sent\"><span class=\"brk bpi\">[</span>Ensuite je <span class=\"vc\">verrai</span> l'adaptation<span class=\"brk bpi\">]</span><sub class=\"lab bpi\">PI</sub> <span class=\"cdc\">mais</span> <span class=\"brk bpi\">[</span>je <span class=\"vc\">préférerai</span> sûrement le livre<span class=\"brk bpi\">]</span><sub class=\"lab bpi\">PI</sub></div></div><div class=\"foot\"><span>Corrigé — Analyse logique</span><span>page 3</span></div>\n</section>\n<section class=\"page\">\n<span class=\"phase\" style=\"background:var(--vert)\">Phase 2 — Construction</span><p style=\"font-size:11.5pt;color:#555;margin:.1em 0 .5em;\">Réponses ouvertes — exemples possibles :</p><div class=\"plist\"><div class=\"citem\" style=\"margin-bottom:10px\"><span class=\"struct\" style=\"color:var(--vert)\">PP + PSR (qui)</span><div style=\"font-size:13pt;margin-top:3px;\">Je pratique un sport qui demande de l'endurance.</div></div><div class=\"citem\" style=\"margin-bottom:10px\"><span class=\"struct\" style=\"color:var(--vert)\">PP + PSCc contenant une PSR</span><div style=\"font-size:13pt;margin-top:3px;\">Je trouve que le film que tu as choisi est trop long.</div></div><div class=\"citem\" style=\"margin-bottom:10px\"><span class=\"struct\" style=\"color:var(--vert)\">DPP + PSR (dont) + FPP</span><div style=\"font-size:13pt;margin-top:3px;\">Le vélo dont je me sers chaque jour est tout neuf.</div></div><div class=\"citem\" style=\"margin-bottom:10px\"><span class=\"struct\" style=\"color:var(--vert)\">« ce que » / « ce à quoi »</span><div style=\"font-size:13pt;margin-top:3px;\">Ce à quoi je tiens le plus, c'est mon temps libre.</div></div><div class=\"citem\" style=\"margin-bottom:10px\"><span class=\"struct\" style=\"color:var(--vert)\">PP + PSCci d'opposition</span><div style=\"font-size:13pt;margin-top:3px;\">Bien que les écrans soient pratiques, ils font perdre du temps.</div></div><div class=\"citem\" style=\"margin-bottom:10px\"><span class=\"struct\" style=\"color:var(--vert)\">Trois subordonnées</span><div style=\"font-size:13pt;margin-top:3px;\">Le roman que j'ai lu raconte une histoire qui prouve que le courage paie.</div></div></div><div class=\"foot\"><span>Corrigé — Construction</span><span>page 4</span></div>\n</section>\n<section class=\"page\">\n<span class=\"phase\" style=\"background:var(--vert)\">Bilan — Paragraphe argumentatif (modèle)</span><p style=\"font-size:11.5pt;color:#555;margin:.1em 0 .5em;\">Connecteurs en bleu.</p><div style=\"font-size:12.5pt;line-height:1.5;\">À mon avis, il vaut mieux découvrir d'abord une histoire en lisant le livre. <span style=\"color:#1d5fbf;font-weight:700;\">D'abord</span>, le roman laisse le lecteur imaginer les personnages, <span style=\"color:#1d5fbf;font-weight:700;\">alors que</span> le film impose une image toute faite. <span style=\"color:#1d5fbf;font-weight:700;\">De plus</span>, le livre donne accès aux pensées des héros, <span style=\"color:#1d5fbf;font-weight:700;\">si bien que</span> l'on comprend mieux leurs choix. <span style=\"color:#1d5fbf;font-weight:700;\">Bien que</span> l'adaptation soit plus rapide, elle supprime souvent des passages importants. <span style=\"color:#1d5fbf;font-weight:700;\">Cependant</span>, regarder le film après la lecture reste utile, <span style=\"color:#1d5fbf;font-weight:700;\">car</span> on peut comparer les deux versions. <span style=\"color:#1d5fbf;font-weight:700;\">C'est pourquoi</span> je conseille de lire le livre, <span style=\"color:#1d5fbf;font-weight:700;\">puis</span> de voir l'adaptation.</div><p style=\"font-family:Carlito;font-size:11pt;color:#444;margin-top:.6em;\"><b>Subordonnées et relations employées :</b> « alors que » (opposition), « si bien que » (conséquence), « bien que » (concession) ; « car » (cause, coordination) ; organisateurs « d'abord / de plus / cependant / c'est pourquoi / puis ».</p><div class=\"foot\"><span>Corrigé — Bilan</span><span>page 5</span></div>\n</section>\n</body></html>", "br": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Compréhension</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;backgr tr><tr><td>2. Lieu + rivière (avec citation)</td><td class=\"p\">5</td><td class=\"s\"></td></tr><tr><td>3. Trois éléments de l'illusion</td><td class=\"p\">6</td><td class=\"s\"></td></tr><tr><td>4a. Comparaison + champ lexical</td><td class=\"p\">3</td><td class=\"s\"></td></tr><tr><td>4b. Trois moments</td><td class=\"p\">3</td><td class=\"s\"></td></tr><tr><td>5. Deux réflexions justifiées</td><td class=\"p\">5</td><td class=\"s\"></td></tr><tr><td>6. Image : deux arguments cités</td><td class=\"p\">8</td><td class=\"s\"></td></tr><tr class=\"sub\"><td>Grammaire et compétences linguistiques</td><td class=\"p\">18</td><td class=\"s\"></td></tr><tr><td>7. Fonctions + justification</td><td class=\"p\">3</td><td class=\"s\"></td></tr><tr><td>8. Subordonnée + fonction</td><td class=\"p\">2</td><td class=\"s\"></td></tr><tr><td>9. Mot « dénouement »</td><td class=\"p\">3</td><td class=\"s\"></td></tr><tr><td>10. Réécriture</td><td class=\"p\">10</td><td class=\"s\"></td></tr><tr class=\"tot\"><td>Total</td><td class=\"p\">50</td><td class=\"s\"></td></tr></table><h2 class=\"sec\">Critères pour les questions ouvertes (2, 5, 6)</h2><div class=\"crit\"><div><span class=\"ck\"></span>J'ai répondu à la question posée (pas à côté).</div><div><span class=\"ck\"></span>J'ai appuyé ma réponse sur une citation du texte, entre guillemets.</div><div><span class=\"ck\"></span>J'ai expliqué la citation (je n'ai pas seulement recopié).</div><div><span class=\"ck\"></span>Quand on demande deux éléments (Q5) ou deux arguments (Q6), j'en ai donné deux.</div></div><div class=\"nuance\"><b>La citation</b> compte presque toujours, même si la question ne la demande pas. <b>Mais</b> une citation n'est pas une réponse : je l'introduis et je l'explique, et je cite <b>court</b> — le mot ou le groupe utile, jamais une phrase entière.</div><h2 class=\"sec\">Je me situe</h2><div class=\"lvl r\"><span class=\"ck\"></span><span>Je réponds aux questions faciles, mais je perds beaucoup de points en interprétation et en grammaire.</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je traite la plupart des questions ; il me manque souvent les citations, ou la réécriture est fausse.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>J'ai un bon total ; je perds encore des points sur les questions ouvertes ou la réécriture.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Je réussis l'ensemble : compréhension citée, grammaire juste, réécriture exacte.</span></div><h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"foot\"><span>Compréhension — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n\n<section class=\"page\">\n<div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Compréhension</div><h1>Corrigé &amp; barème</h1><div class=\"subtitle\">George Sand, <i>Histoire de ma vie</i> — partie 1 (/50)</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"cor\"><h2>I. Compréhension et interprétation (32 pts)</h2><p><b>1.</b> « nous » désigne les <b>trois enfants</b> : Aurore (la narratrice), son demi-frère Hippolyte et Ursule. <span class=\"pts\">(2 pts)</span></p><p><b>2.</b> La scène se passe dans une « grande chambre ». La rivière n'est pas réelle : c'est un décor de jeu, « dessinée sur le carreau avec de la craie ». Les enfants l'imaginent pour jouer à « passer la rivière ». <span class=\"pts\">(5 pts)</span></p><p><b>3.</b> Trois éléments : « m'y plonger de si bonne foi » ; « je perdais la notion de la réalité » ; « je croyais voir les arbres, les eaux, les rochers ». <span class=\"pts\">(6 pts)</span></p><p><b>4a.</b> Le jeu est comparé à une véritable <b>traversée de rivière</b>. Champ lexical de l'eau : « rivière », « profonde », « guéable », « noyé », « grands trous », « nageait », « ruisseau », « torrent », « cascade », « fleuve » (quatre suffisent). <span class=\"pts\">(3 pts)</span></p><p><b>4b.</b> Trois moments : l'arrivée « au bord de notre rivière » ; le test du gué (« Vous pouvez vous y risquer… ») ; le fait de « patauger dans le ruisseau », Hippolyte versant le pot à l'eau pour imiter « un torrent et une cascade ». <span class=\"pts\">(3 pts)</span></p><p><b>5.</b> Deux réflexions : (1) l'imagination de l'enfant est si forte qu'il croit vraiment à son jeu (« l'illusion les gagne et les saisit véritablement ») ; (2) le jeu enfantin est une vraie création, « tout un drame, […] tout un roman, tout un poème », que les enfants « miment et rêvent ». <span class=\"pts\">(5 pts)</span></p><p><b>6.</b> (1) La photo montre des enfants pris par leur jeu, comme la narratrice dont le jeu « passionnait nos imaginations ». (2) Le décor (mer, bateau) est tracé à la craie sur le sol, comme la rivière « dessinée sur le carreau avec de la craie » ; déguisés, les enfants « représentent toujours certains personnages ». <span class=\"pts\">(8 pts)</span></p></div><div class=\"foot\"><span>Corrigé — Compréhension</span><span>corrigé · page 1</span></div>\n</section>\n<section class=\"page\">\n<div class=\"cor\"><h2>II. Grammaire et compétences linguistiques (18 pts)</h2><p><b>7a.</b> « En de certains endroits » = <b>complément circonstanciel de lieu</b>. « fort profonde » = <b>attribut du sujet</b> (sujet « elle » = la rivière). <span class=\"pts\">(1 pt)</span></p><p><b>7b.</b> C'est un CC car il est <b>supprimable</b> et <b>déplaçable</b> sans rendre la phrase incorrecte (« elle était fort profonde en de certains endroits ») et il répond à « où ? ». <span class=\"pts\">(2 pts)</span></p><p><b>8a.</b> « [Si nous rencontrons des écrevisses], elles nous mangeront les pieds. » — subordonnant entouré : <b>Si</b>. <span class=\"pts\">(1 pt)</span></p><p><b>8b.</b> Subordonnée <b>circonstancielle de condition</b> (hypothétique). <span class=\"pts\">(1 pt)</span></p><p><b>9a.</b> préfixe <b>dé-</b> + radical <b>nou(e)</b> + suffixe <b>-ment</b>. <span class=\"pts\">(1,5 pt)</span></p><p><b>9b.</b> « dé- » = défaire ; « noue » = nœud ; « -ment » = résultat d'une action. Le dénouement est l'action de <b>dénouer</b> : la fin qui résout l'histoire — ici la fin brutale du jeu. <span class=\"pts\">(1,5 pt)</span></p><p><b>10.</b> « <b>Ils s'étaient</b> déjà <b>noyés</b> plusieurs fois, nous <b>les</b> aidions à se retirer des grands trous où <b>ils tombaient</b> toujours, car <b>ils faisaient</b> le rôle du maladroit ou de l'homme ivre, et <b>ils nageaient</b> à sec sur le carreau en se débattant et en se lamentant. » <span class=\"pts\">(10 pts)</span></p><table class=\"bareme\"><tr><th>Partie</th><th>Points</th></tr><tr><td>Compréhension et interprétation</td><td class=\"p\">/ 32</td></tr><tr><td>Grammaire et compétences linguistiques</td><td class=\"p\">/ 18</td></tr><tr><td><b>Total</b></td><td class=\"p\"><b>/ 50</b></td></tr></table></div><div class=\"foot\"><span>Corrigé — Compréhension</span><span>corrigé · page 2</span></div>\n</section>\n</body></html>", "di": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Dictée</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 td class=\"s\"></td></tr><tr><td>Accord dans le groupe nominal (déterminant, nom, adjectif)</td><td class=\"s\"></td></tr><tr><td>Homophones grammaticaux (a / à, et / est, on / ont, ce / se, où / ou…)</td><td class=\"s\"></td></tr><tr><td>Participes passés (étant, faite, servi, disparu…)</td><td class=\"s\"></td></tr><tr><td>Orthographe d'usage (lettres muettes, mots difficiles)</td><td class=\"s\"></td></tr><tr><td>Ponctuation et majuscules</td><td class=\"s\"></td></tr><tr class=\"tot\"><td>Total d'erreurs</td><td class=\"s\"></td></tr></table><h2 class=\"sec\">Je me situe</h2><div class=\"lvl r\"><span class=\"ck\"></span><span>Plus de 8 erreurs : je revois surtout les accords et les homophones.</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>De 4 à 8 erreurs : je progresse ; je cible les types d'erreurs les plus fréquents chez moi.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>De 1 à 3 erreurs : c'est solide ; je traque les dernières étourderies à la relecture.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Aucune erreur : maîtrisé.</span></div><h2 class=\"sec\">Les mots que je dois revoir&nbsp;:</h2><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"foot\"><span>Dictée — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n\n<section class=\"page\">\n<div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Dictée</div><h1>Le texte de la dictée</h1><div class=\"subtitle\">à lire (par le professeur) puis à comparer mot à mot</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"cor\"><p style=\"font-style:italic;line-height:1.6;font-size:12pt;\">Je me souviens d'un jour d'automne où, le dîner étant servi, la nuit s'était faite dans la chambre. Ma cousine et moi nous poursuivions l'une l'autre à travers les arbres, c'est-à-dire sous les plis du rideau. L'appartement avait disparu à nos yeux et nous étions véritablement dans un sombre paysage à l'entrée de la nuit. On nous appelait pour dîner et nous n'entendions rien. Ma mère vint me prendre dans ses bras pour me porter à table et je me rappellerai toujours mon étonnement en voyant les objets réels qui m'environnaient. Je sortais d'une hallucination complète et il me coûtait d'en sortir si brusquement.</p><p style=\"text-align:right;font-style:italic;\">D'après George Sand, <i>Histoire de ma vie</i>, 1855.</p></div><div class=\"foot\"><span>Corrigé — Dictée</span><span>corrigé</span></div>\n</section>\n</body></html>", "rd": "<!doctype html>\n<html lang=\"fr\">\n<head>\n<meta charset=\"utf-8\">\n<title>Correction — Rédaction</title>\n<style>\n  :root{\n    --ink:#1b1b1b; --accent:#1d3c61; --accent2:#2f6fb0;\n    --paper:#ffffff; --soft:#f1f1ee; --line:#c9c9c2; --rule:#1d3c61;\n    --vert:#2e7d4f; --bleu:#2f6fb0; --jaune:#d39a00; --rouge:#c0392b;\n  }\n  *{box-sizing:border-box;}\n  @page{ size:A4; margin:0; }\n  html,body{margin:0;padding:0;background:#d8d8d4;}\n  body{font-family:\"Caladea\",\"Bitstream Charter\",Georgia,serif;color:var(--ink);font-size:12pt;line-height:1.3;}\n  .page{position:relative;width:210mm;height:297mm;background:var(--paper);\n        padding:14mm 18mm 12mm;overflow:hidden;page-break-after:always;}\n  .page:last-child{page-break-after:auto;}\n  h1,h2,h3,.ui,.kicker,.tag,.cahier,.leg{font-family:\"Carlito\",\"DejaVu Sans\",sans-serif;}\n  .kicker{font-size:12pt;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:700;}\n  h1{font-size:23pt;line-height:1.06;margin:.08em 0 .1em;color:var(--ink);font-weight:700;}\n  .subtitle{font-size:12pt;color:#555;margin:0 0 .3em;font-family:\"Carlito\",sans-serif;}\n  .hr{height:3px;background:var(--rule);border:0;margin:.2em 0 .5em;}\n  .cahier-rule{font-family:\"Carlito\",sans-serif;font-size:12pt;color:#444;background:var(--soft);\n        border-left:3px solid var(--accent2);padding:.35em .6em;border-radius:5px;margin:.3em 0 .5em;}\n  h2{font-size:15pt;color:var(--accent);margin:.5em 0 .24e 1.6px solid #888;border-radius:3px;vertical-align:-2px;margin-right:7px;}\n  .crit .grp{font-weight:700;color:var(--accent);margin-top:.35em;}\n  .nuance{font-family:\"Carlito\",sans-serif;font-size:10.5pt;color:#7a5b00;background:#fdf8ec;border:1px dashed #e0c277;border-radius:6px;padding:.4em .7em;margin:.3em 0;line-height:1.4;}\n  .nuance b{color:#9a6b00;}\n  .lvl{display:flex;align-items:flex-start;gap:8px;border:1px solid var(--line);border-left-width:7px;border-radius:6px;padding:6px 10px;margin:5px 0;font-family:\"Carlito\",sans-serif;font-size:11pt;}\n  .lvl .ck{flex:0 0 auto;width:15px;height:15px;border:1.6px solid #888;border-radius:3px;margin-top:2px;}\n  .lvl.r{border-left-color:#c0392b;} .lvl.j{border-left-color:#d39a00;} .lvl.b{border-left-color:#2f6fb0;} .lvl.v{border-left-color:#2e7d4f;}\n  .wl{border-bottom:1px solid #c4c4bd;height:28px;}\n\n\n</style>\n</head>\n<body>\n<section class=\"page\">\n<div class=\"kicker\">Rédaction · Je me corrige</div><h1>Je me corrige</h1><div class=\"subtitle\">autocorrection détaillée — rédaction</div><hr class=\"hr\"><div class=\"consigne\"><b>1.</b> Je relis ma rédaction <b>seul</b> et je coche les critères remplis. &nbsp;<b>2.</b> Je lis les attendus (juste après). &nbsp;<b>3.</b> Je reviens ici et j'<b>affine</b> d'une autre couleur.</div><h2 class=\"sec\">Mes critères de réussite (je coche ce que ma copie contient)</h2><div class=\"crit\"><div class=\"grp\">Sujet d'imagination</div><div><span class=\"ck\"></span>J'ai écrit à la première personne, sur un jeu qui devient une aventure imaginaire.</div><div><span class=\"ck\"></span>J'ai mis des descriptions et exprimé des sentiments / sensations.</div><div><span class=\"ck\"></span>Mon récit est progressif, en paragraphes, aux temps du récit.</div><div class=\"grp\">Sujet de réflexion</div><div><span class=\"ck\"></span>J'ai répondu clairement à la question (pourquoi écrire sur soi).</div><div><span class=\"ck\"></span>J'ai développé des arguments, illustrés par des exemples d'œuvres.</div><div><span class=\"ck\"></span>J'ai organisé : introduction, paragraphes, conclusion, connecteurs.</div><div class=\"grp\">Dans les deux cas</div><div><span class=\"ck\"></span>J'ai relu mon orthographe, ma syntaxe et ma ponctuation.</div><div><span class=\"ck\"></span>J'ai écrit assez (environ deux pages).</div></div><div class=\"nuance\">Dans le sujet de réflexion, <b>un exemple</b> (œuvre, film) renforce beaucoup un argument ; mais l'exemple ne remplace pas l'argument : je dis d'abord <b>l'idée</b>, puis je l'illustre.</div><h2 class=\"sec\">Je me situe</h2><div class=\"lvl r\"><span class=\"ck\"></span><span>J'ai du mal à tenir le sujet ou à dépasser quelques lignes.</span></div><div class=\"lvl j\"><span class=\"ck\"></span><span>Je traite le sujet, mais le récit / l'argumentation manque de développement ou d'organisation.</span></div><div class=\"lvl b\"><span class=\"ck\"></span><span>Mon texte est construit et développé ; la langue ou les exemples sont encore à soigner.</span></div><div class=\"lvl v\"><span class=\"ck\"></span><span>Texte développé, organisé, riche, et une langue maîtrisée.</span></div><h2 class=\"sec\">Avant le brevet, je revois&nbsp;:</h2><div class=\"wl\"></div><div class=\"wl\"></div><div class=\"foot\"><span>Rédaction — Je me corrige</span><span>autocorrection</span></div>\n</section>\n\n\n<section class=\"page\">\n<div class=\"kicker\" style=\"color:var(--vert)\">Corrigé · Rédaction</div><h1>Attendus &amp; barème</h1><div class=\"subtitle\">ce que le correcteur valorise (/40)</div><hr class=\"hr\" style=\"background:var(--vert)\"><div class=\"cor\"><h2>Sujet d'imagination</h2><p>Récit à la <b>1ʳᵉ personne</b>, centré sur un jeu qui devient peu à peu une aventure imaginaire. <b>Descriptions</b> et expression des <b>sentiments / sensations</b>. Récit <b>progressif et cohérent</b>, en paragraphes, aux temps du récit (imparfait / passé simple). Langue correcte. <span class=\"pts\">(/40)</span></p><h2>Sujet de réflexion</h2><p>Réponse claire à la question (<b>pourquoi écrire sur soi</b> : garder la mémoire, mieux se comprendre, témoigner, transmettre, se justifier…). <b>Arguments développés</b>, illustrés par des <b>exemples d'œuvres</b> (livres, films…). Organisation : introduction, paragraphes, conclusion ; <b>connecteurs logiques</b>. <span class=\"pts\">(/40)</span></p><h2>Dans les deux cas</h2><p>La copie est notée aussi sur la <b>maîtrise de la langue</b> : orthographe, syntaxe, ponctuation, richesse du vocabulaire.</p></div><div class=\"foot\"><span>Corrigé — Rédaction</span><span>attendus</span></div>\n</section>\n</body></html>"};

    var big = mode==="imp" ? countImp(a.id) : countSuivi(a.id,3);
    var line1 = mode==="imp" ? (ready?"fiche prête":(a.doc?esc(a.doc):"doc à venir")) : "faits";
    var line2 = mode==="imp" ? ("pas fait "+countSuivi(a.id,1)+" \u00b7 fait "+countSuivi(a.id,3)) : ("pas fait "+countSuivi(a.id,1)+" \u00b7 partiel "+countSuivi(a.id,2));
    foot.children[i+1].innerHTML="<div class='cnt'>"+big+"<small>"+line1+"</small><small>"+line2+"</small></div>"+
      "<button class='print primary' onclick=\"printAtelier('"+a.id+"')\">Imprimer</button>"+
      (hasCorr?"<button class='print corr' onclick=\"printCorrige('"+a.id+"')\">Correction</button>":"");
  });
}
function toggleCol(aid){
  var assigned=0;for(var si=0;si<students.length;si++){if(imp[key(si,aid)])assigned++;}
  var fill=(assigned<students.length);
  for(var s2=0;s2<students.length;s2++){ if(fill)imp[key(s2,aid)]=1; else delete imp[key(s2,aid)]; }
  save(); render();
}

/* aperçu + impression */
var current=null;
function previewFiche(aid){
  current=aid;
  var a=ateliers.find(function(x){return x.id===aid;});
  document.getElementById("pvTitle").textContent=a.nom;
  document.getElementById("bView_c").style.display=EMBEDC[aid]?"":"none";
  setView("fiche");
  openModal("mPreview");
}
function setView(v){
  if(v==="corrige" && !EMBEDC[current]) return;
  currentView=v;
  var frame=document.getElementById("pvFrame");
  var a=ateliers.find(function(x){return x.id===current;});
  if(v==="fiche"){
    if(EMBED[current]){ frame.srcdoc=EMBED[current]; document.getElementById("pvFoot").textContent="Aperçu fidèle à l'impression."; }
    else { frame.srcdoc="<body style='font-family:sans-serif;padding:30px;color:#444'><h2>Document à venir</h2><p>Aucune fiche embarquée"+(a.doc?(" (document prévu : <b>"+esc(a.doc)+"</b>)"):"")+". Le bouton Imprimer sortira le bordereau (liste + quantité).</p></body>";
      document.getElementById("pvFoot").textContent="Pas de fiche embarquée — Imprimer = bordereau."; }
  } else {
    frame.srcdoc=EMBEDC[current]; document.getElementById("pvFoot").textContent="Correction : l'élève fait d'abord son autocorrection (page 1), puis découvre le corrigé.";
  }
  document.getElementById("bView_f").classList.toggle("on",v==="fiche");
  document.getElementById("bView_c").classList.toggle("on",v==="corrige");
}
function printCurrent(){ if(!current)return; if(currentView==="corrige")printCorrige(current); else printAtelier(current); }
function printViaFrame(html){ var f=document.getElementById("printFrame"); f.onload=function(){try{f.contentWindow.focus();f.contentWindow.print();}catch(e){alert("Impression impossible : "+e);}}; f.srcdoc=html; }
function printAtelier(aid){ if(EMBED[aid])printViaFrame(EMBED[aid]); else printBordereau(aid); }
function printCorrige(aid){ if(EMBEDC[aid])printViaFrame(EMBEDC[aid]); else alert("Pas de corrigé pour cet atelier."); }
function printBordereau(aid){
  var a=ateliers.find(function(x){return x.id===aid;});
  var noms=[];for(var si=0;si<students.length;si++){if(imp[key(si,aid)])noms.push(students[si]);}
  var d=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
  var lis=noms.map(function(nm){return "<li><span class='box'></span>"+esc(nm)+"</li>";}).join("")||"<li>(aucun élève coché)</li>";
  document.getElementById("printArea").innerHTML="<div class='pk'>Atelier révisions brevet</div><h1>"+esc(a.nom)+"</h1>"+
    "<div class='pmeta'>"+(a.meta?esc(a.meta)+" · ":"")+d+"</div>"+
    "<div class='pmeta'>Document à imprimer : <span class='pn'>"+(a.doc?esc(a.doc):"—")+"</span></div>"+
    "<div class='pmeta'>Exemplaires à prévoir : <span class='pn'>"+noms.length+"</span></div>"+
    "<hr><div class='pmeta' style='font-weight:700'>Élèves de l'atelier :</div><ol>"+lis+"</ol>";
  window.print();
}

/* ateliers */
var editingId=null;
function addAtelier(){editingId=null;document.getElementById("atTitle").textContent="Nouvel atelier";
  document.getElementById("atNom").value="";document.getElementById("atMeta").value="";document.getElementById("atDoc").value="";
  document.getElementById("atDel").style.display="none";openModal("mAtelier");}
function editAtelier(id){var a=ateliers.find(function(x){return x.id===id;});editingId=id;
  document.getElementById("atTitle").textContent="Modifier l'atelier";
  document.getElementById("atNom").value=a.nom;document.getElementById("atMeta").value=a.meta||"";document.getElementById("atDoc").value=a.doc||"";
  document.getElementById("atDel").style.display="inline-block";openModal("mAtelier");}
function saveAtelier(){var nom=document.getElementById("atNom").value.trim();if(!nom){alert("Donne un nom.");return;}
  var meta=document.getElementById("atMeta").value.trim();var doc=document.getElementById("atDoc").value.trim();
  if(editingId){var a=ateliers.find(function(x){return x.id===editingId;});a.nom=nom;a.meta=meta;a.doc=doc;}
  else{ateliers.push({id:"a"+Date.now(),nom:nom,meta:meta,doc:doc});}
  save();closeModal("mAtelier");render();}
function deleteAtelier(){if(!editingId)return;if(!confirm("Supprimer cet atelier ?"))return;
  ateliers=ateliers.filter(function(x){return x.id!==editingId;});
  Object.keys(imp).forEach(function(k){if(k.split("__")[1]===editingId)delete imp[k];});
  Object.keys(suivi).forEach(function(k){if(k.split("__")[1]===editingId)delete suivi[k];});
  save();closeModal("mAtelier");render();}

/* élèves */
function openStudents(){renderStudentList();openModal("mStudents");}
function renderStudentList(){var box=document.getElementById("studentList");box.innerHTML="";
  students.forEach(function(nm,si){var d=document.createElement("div");d.className="li";
    d.innerHTML="<input value=\""+esc(nm)+"\" onchange=\"renameStudent("+si+",this.value)\"><button onclick=\"removeStudent("+si+")\">✕</button>";
    box.appendChild(d);});}
function addStudent(){var v=document.getElementById("newStudent").value.trim();if(!v)return;students.push(v);
  document.getElementById("newStudent").value="";save();renderStudentList();render();}
function renameStudent(si,v){v=v.trim();if(v){students[si]=v;save();render();}}
function removeStudent(si){if(!confirm("Retirer "+students[si]+" ?"))return;
  function shift(o){var n={};Object.keys(o).forEach(function(k){var p=k.split("__");var idx=+p[0];if(idx===si)return;var ni=idx>si?idx-1:idx;n[ni+"__"+p[1]]=o[k];});return n;}
  imp=shift(imp); suivi=shift(suivi);
  students.splice(si,1);save();renderStudentList();render();}

/* JSON */
function exportJSON(){
  var data={v:3,date:new Date().toISOString(),students:students,
    ateliers:ateliers.map(function(a){return {id:a.id,nom:a.nom,meta:a.meta,doc:a.doc};}),imp:imp,suivi:suivi};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);var a=document.createElement("a");
  a.href=url;a.download="ateliers_revisions_"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
}
function importJSON(input){var file=input.files[0];if(!file)return;var r=new FileReader();
  r.onload=function(){try{var d=JSON.parse(r.result);
    if(d.students)students=d.students; if(d.ateliers)ateliers=d.ateliers;
    if(d.imp)imp=d.imp; if(d.suivi)suivi=d.suivi;
    if(d.st&&!d.suivi){ suivi={}; imp={}; for(var k in d.st){ suivi[k]=d.st[k]; if(d.st[k]===1)imp[k]=1; } }
    save();render();alert("Import réussi.");}catch(e){alert("Fichier invalide : "+e);} input.value="";};
  r.readAsText(file);}

function openModal(id){document.getElementById(id).classList.add("open");}
function closeModal(id){document.getElementById(id).classList.remove("open");}
function resetAll(){if(!confirm("Tout réinitialiser (élèves, ateliers, états) ?"))return;
  students=DEFAULT_STUDENTS.slice();ateliers=DEFAULT_ATELIERS.slice();imp={};suivi={};save();render();}

document.addEventListener("mouseup",function(){
  if(painting){
    if(!dragMoved&&startCell){
      if(mode==="imp"){ setImp(startCell.si,startCell.aid,startCell.el, imp[key(startCell.si,startCell.aid)]?0:1); }
      else { cycleSuivi(startCell.si,startCell.aid,startCell.el); }
    } else if(dragMoved && mode==="imp"){ save(); refreshFoot(); }
    painting=false;startCell=null;dragPath=[];
  }
});
read();render();
</script>
