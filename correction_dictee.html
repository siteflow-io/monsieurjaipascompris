// ─── COMPOSANT ÉLÈVE : RÉALISATION DES EXERCICES ─────────────────────
function ExercicesEleve(p){
  var sExo = useState(null), exercices = sExo[0], setExercices = sExo[1];
  var sHtml = useState(null), exHtml = sHtml[0], setExHtml = sHtml[1];
  var sLoad = useState(true), loading = sLoad[0], setLoading = sLoad[1];
  var sLoadH = useState(true), loadingH = sLoadH[0], setLoadingH = sLoadH[1];
  var sCur = useState({type:null,idx:0,itemIdx:0}), cur = sCur[0], setCur = sCur[1];
  var sAnsw = useState({}), answers = sAnsw[0], setAnswers = sAnsw[1];
  var sRes = useState({}), results = sRes[0], setResults = sRes[1];
  var sValid = useState(null), validated = sValid[0], setValidated = sValid[1];

  React.useEffect(function(){
    var ref = db.ref("correction_dictee/"+p.dicteeId+"/exercices");
    ref.on("value", function(snap){setExercices(snap.val()||null);setLoading(false)});
    var refH = db.ref("correction_dictee/"+p.dicteeId+"/exercices_html");
    refH.on("value", function(snap){setExHtml(snap.val()||null);setLoadingH(false)});
    // Charger les résultats existants pour cet élève
    var refR = db.ref("correction_dictee/"+p.dicteeId+"/exercices_results/"+san(p.eleve));
    refR.once("value").then(function(snap){
      var v = snap.val();
      if(v){
        setResults(v);
        if(v.answers)setAnswers(v.answers);
      }
    });
    return function(){ref.off();refH.off()};
  }, [p.dicteeId, p.eleve]);

  function saveResult(updated){
    db.ref("correction_dictee/"+p.dicteeId+"/exercices_results/"+san(p.eleve)).set(updated);
  }

  if(loading||loadingH)return h("div",{className:"card"},"Chargement\u2026");

  // Cas 1 : HTML monolithique uploadé → on le sert dans un iframe plein écran
  if(exHtml&&exHtml.content){
    return h("div",{style:{display:"flex",flexDirection:"column",height:"calc(100vh - 40px)"}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"10px 14px",background:"var(--card)",borderRadius:8,marginBottom:8,flexWrap:"wrap"}},
        h("div",null,
          h("strong",{style:{fontSize:"1rem"}},"\ud83c\udfaf Tes exercices personnalis\u00e9s"),
          h("div",{style:{fontSize:".78rem",color:"var(--muted)"}},"Fais-les sur ton cahier d\u2019abord pour r\u00e9fl\u00e9chir, puis viens taper tes r\u00e9ponses (si l\u2019exercice est interactif).")
        ),
        p.onBack&&h("button",{className:"btn-sm btn-ghost",onClick:p.onBack},"\u2190 Retour \u00e0 la correction")
      ),
      h("iframe",{srcDoc:exHtml.content,style:{flex:1,width:"100%",border:"1px solid var(--border)",borderRadius:8,background:"#fff",minHeight:500},sandbox:"allow-same-origin allow-scripts allow-forms"})
    );
  }

  // Cas 2 : JSON interactif injecté (système ExercicesEleve normal)
  if(!exercices){
    return h("div",{className:"card",style:{textAlign:"center",padding:30}},
      h("div",{style:{fontSize:"2rem",marginBottom:8}},"\ud83d\udcd6"),
      h("p",null,"Aucun exercice n'a encore \u00e9t\u00e9 mis en place pour cette dict\u00e9e."),
      p.onBack&&h("button",{className:"btn btn-ghost",onClick:p.onBack,style:{marginTop:10}},"\u2190 Retour")
    );
  }

  var bundle = exGetForEleve(exercices, p.eleve);
  var totalExos = bundle.classe.length + bundle.personnels.length;
  if(totalExos===0){
    return h("div",{className:"card",style:{textAlign:"center",padding:30}},
      h("div",{style:{fontSize:"2rem",marginBottom:8}},"\u2728"),
      h("p",null,"Aucun exercice ne t'a \u00e9t\u00e9 attribu\u00e9."),
      p.onBack&&h("button",{className:"btn btn-ghost",onClick:p.onBack,style:{marginTop:10}},"\u2190 Retour")
    );
  }

  // Liste d'exos
  if(!cur.type){
    function exStatus(typeKey, idx){
      var r = (results[typeKey]||{})[idx];
      if(!r||!r.items)return null;
      var ok = r.items.filter(function(x){return x===true}).length;
      var tot = r.items.length;
      return {ok:ok, tot:tot, done:r.completed===true};
    }
    // Calcul global : tous les exos sont-ils terminés ?
    var allExos = bundle.personnels.concat(bundle.classe);
    var allDone = allExos.length > 0 && allExos.every(function(ex, gIdx){
      var type = gIdx < bundle.personnels.length ? "personnels" : "classe";
      var idx = gIdx < bundle.personnels.length ? gIdx : gIdx - bundle.personnels.length;
      var st = exStatus(type, idx);
      return st && st.done;
    });
    // Score global (uniquement sur qcm/trous/reecriture, donc auto-corrigeables)
    var totalOk = 0, totalAuto = 0, totalSaisi = 0;
    ["personnels","classe"].forEach(function(typeKey){
      var pool = typeKey === "personnels" ? bundle.personnels : bundle.classe;
      pool.forEach(function(ex, idx){
        var items = toArr(ex.items||[]);
        var r = (results[typeKey]||{})[idx];
        if(!r || !r.items) return;
        items.forEach(function(it, i){
          var typeIt = it && it.type;
          if(typeIt === "ecriture" || typeIt === "copie"){
            if(r.items[i] === true || r.items[i] === false) totalSaisi++;
          } else if(typeIt === "qcm" || typeIt === "trous" || typeIt === "reecriture"){
            totalAuto++;
            if(r.items[i] === true) totalOk++;
          }
        });
      });
    });
    // ─── TODO ressenti élève ───────────────────────────────────────────────────────
    // À implémenter dans une future itération : zone d'écriture libre en bas de la
    // liste d'exercices, pour que l'élève écrive son ressenti scolaire sur la dictée
    // (s'est-il bien préparé ? quelles erreurs aurait-il pu éviter ? que ne refera-t-il
    // pas ? ce qu'il a compris ?). Stocker dans Firebase à :
    //   correction_dictee/{dicteeId}/exercices_results/{eleveKey}/ressenti
    //   (champ texte libre, mis à jour à chaque modification, visible côté prof
    //   dans la modale détail élève de l'onglet Suivi)
    // Idéalement avec autosave silencieux (debounce 1s).
    // ─────────────────────────────────────────────────────────────────────────────────
    return h("div",{className:"fade-up"},
      // ─── ÉCRAN DE FIN : visible uniquement quand tous les exos sont done ───
      allDone && h("div",{className:"card",style:{textAlign:"center",border:"2px solid var(--green)",background:"rgba(72,160,87,.06)"}},
        h("div",{style:{fontSize:"2.4rem",marginBottom:8}},"\ud83c\udf89"),
        h("h2",{style:{margin:"0 0 6px",color:"#1b6a30"}},"Bravo, tu as termin\u00e9 tous tes exercices !"),
        totalAuto > 0 && h("p",{style:{fontSize:"1.05rem",margin:"8px 0",fontWeight:600}},"Score auto-corrig\u00e9 : "+totalOk+" / "+totalAuto+" bonnes r\u00e9ponses"),
        totalSaisi > 0 && h("p",{style:{fontSize:".88rem",color:"var(--muted)",margin:"4px 0",fontStyle:"italic"}},totalSaisi+" exercice"+(totalSaisi>1?"s":"")+" de production (\u00e9criture / copie) enregistr\u00e9"+(totalSaisi>1?"s":"")+", \u00e0 corriger par le professeur."),
        p.onBack && h("button",{className:"btn btn-primary",style:{marginTop:14},onClick:p.onBack},"\u2190 Quitter")
      ),
      h("div",{className:"card",style:{textAlign:"center"}},
        h("h2",{style:{margin:"0 0 6px"}},"\ud83c\udfaf Tes exercices"),
        h("p",{style:{color:"var(--muted)",margin:0,fontSize:".9rem"}},"Tu dois d'abord les faire sur ton cahier, puis venir taper tes r\u00e9ponses ici pour corriger.")
      ),
      bundle.personnels.length>0&&h("div",{className:"card"},
        h("h3",{style:{marginTop:0}},"\ud83d\udc64 Exercices pour toi"),
        bundle.personnels.map(function(ex,i){
          var st = exStatus("personnels",i);
          return h("button",{key:i,onClick:function(){setCur({type:"personnels",idx:i,itemIdx:0});setValidated(null)},
            style:{display:"block",width:"100%",textAlign:"left",padding:"12px 14px",margin:"6px 0",border:"1.5px solid "+(st&&st.done?"var(--green)":"var(--border)"),borderRadius:10,background:st&&st.done?"rgba(72,160,87,.08)":"var(--card)",cursor:"pointer",fontFamily:"inherit"}},
            h("div",{style:{fontWeight:700}},(st&&st.done?"\u2705 ":"")+(ex.titre||"Exercice "+(i+1))),
            h("div",{style:{fontSize:".82rem",color:"var(--muted)",marginTop:4}},
              toArr(ex.items).length+" item"+(toArr(ex.items).length>1?"s":"")+
              (st?" \u00b7 "+st.ok+"/"+st.tot+" r\u00e9ussi"+(st.ok>1?"s":""):"")
            )
          );
        })
      ),
      bundle.classe.length>0&&h("div",{className:"card"},
        h("h3",{style:{marginTop:0}},"\ud83d\udc65 Exercices pour la classe"),
        bundle.classe.map(function(ex,i){
          var st = exStatus("classe",i);
          return h("button",{key:i,onClick:function(){setCur({type:"classe",idx:i,itemIdx:0});setValidated(null)},
            style:{display:"block",width:"100%",textAlign:"left",padding:"12px 14px",margin:"6px 0",border:"1.5px solid "+(st&&st.done?"var(--green)":"var(--border)"),borderRadius:10,background:st&&st.done?"rgba(72,160,87,.08)":"var(--card)",cursor:"pointer",fontFamily:"inherit"}},
            h("div",{style:{fontWeight:700}},(st&&st.done?"\u2705 ":"")+(ex.titre||"Exercice "+(i+1))),
            h("div",{style:{fontSize:".82rem",color:"var(--muted)",marginTop:4}},toArr(ex.items).length+" item"+(toArr(ex.items).length>1?"s":"")+(st?" \u00b7 "+st.ok+"/"+st.tot+" r\u00e9ussi"+(st.ok>1?"s":""):""))
          );
        })
      ),
      p.onBack&&h("div",{style:{textAlign:"center",marginTop:14}},
        h("button",{className:"btn btn-ghost",onClick:p.onBack},"\u2190 Retour")
      )
    );
  }

  // Vue d'un exercice
  var pool = cur.type==="classe"?bundle.classe:bundle.personnels;
  var ex = pool[cur.idx];
  if(!ex)return h("div",null,"Exercice introuvable");
  var items = toArr(ex.items||[]);
  var item = items[cur.itemIdx];
  var ansKey = cur.type+"_"+cur.idx+"_"+cur.itemIdx;
  var userAns = answers[ansKey];

  function setAnswer(v){
    var na = Object.assign({},answers);
    na[ansKey] = v;
    setAnswers(na);
  }

  function validateItem(){
    var check = exCheckItem(item, userAns);
    setValidated(check);
    // Persist : on enregistre item par item
    var nr = JSON.parse(JSON.stringify(results||{}));
    if(!nr[cur.type])nr[cur.type]={};
    if(!nr[cur.type][cur.idx])nr[cur.type][cur.idx]={items:[],completed:false};
    // Aligne le tableau d'items
    while(nr[cur.type][cur.idx].items.length<items.length)nr[cur.type][cur.idx].items.push(null);
    nr[cur.type][cur.idx].items[cur.itemIdx] = check.ok;
    // Tracking essais : nb tentatives par item (non rétroactif, démarre avec ce code)
    nr[cur.type][cur.idx].attempts = nr[cur.type][cur.idx].attempts || [];
    while(nr[cur.type][cur.idx].attempts.length<items.length)nr[cur.type][cur.idx].attempts.push(0);
    nr[cur.type][cur.idx].attempts[cur.itemIdx] = (nr[cur.type][cur.idx].attempts[cur.itemIdx] || 0) + 1;
    // Marquer complete si tous les items validés
    if(nr[cur.type][cur.idx].items.every(function(x){return x===true||x===false})){
      nr[cur.type][cur.idx].completed = true;
    }
    nr.answers = Object.assign({}, answers);
    nr.answers[ansKey] = userAns;
    nr.lastUpdate = Date.now();
    setResults(nr);
    saveResult(nr);
  }

  function nextItem(){
    setValidated(null);
    if(cur.itemIdx<items.length-1){
      setCur(Object.assign({},cur,{itemIdx:cur.itemIdx+1}));
    } else {
      // Fin de l'exercice : retour à la liste
      setCur({type:null,idx:0,itemIdx:0});
    }
  }

  function prevItem(){
    setValidated(null);
    if(cur.itemIdx>0)setCur(Object.assign({},cur,{itemIdx:cur.itemIdx-1}));
  }

  function backToList(){
    setCur({type:null,idx:0,itemIdx:0});
    setValidated(null);
  }

  // Rendu d'un item selon son type
  function renderItem(){
    if(item.type==="qcm"){
      return h("div",null,
        item.enonce&&h("div",{style:{fontSize:".88rem",color:"var(--muted)",marginBottom:8}},item.enonce),
        item.phrase&&h("div",{style:{fontSize:"1.05rem",marginBottom:14,padding:"10px 14px",background:"var(--card2)",borderRadius:8}},item.phrase),
        h("div",{style:{display:"flex",flexDirection:"column",gap:8}},

            return h("button",{key:i,disabled:validated!==null,onClick:function(){setAnswer(i)},
              style:{textAlign:"left",padding:"12px 16px",border:"2px solid "+(selected?"var(--primary)":"var(--border)"),borderRadius:10,background:selected?"rgba(43,108,203,.08)":"var(--card)",cursor:validated?"default":"pointer",fontFamily:"inherit",fontSize:"1rem"}},
              String.fromCharCode(65+i)+". "+prop
            );
          })
        )
      );
    }
    if(item.type==="trous"){
      var segments = item.segments||[];
      var trouIdx = -1;
      var userArr = Array.isArray(userAns)?userAns:[];
      function setTrou(idx, val){
        var na = userArr.slice();
        while(na.length<=idx)na.push("");
        na[idx] = val;
        setAnswer(na);
      }
      return h("div",null,
        item.enonce&&h("div",{style:{fontSize:".88rem",color:"var(--muted)",marginBottom:8}},item.enonce),
        h("div",{style:{fontSize:"1.05rem",lineHeight:2,padding:"10px 14px",background:"var(--card2)",borderRadius:8}},
          segments.map(function(seg,i){
            if(seg===null){
              trouIdx++;
              var ti = trouIdx;
              var det = validated?validated.details[ti]:null;
              return h("input",{key:i,type:"text",value:userArr[ti]||"",
                onChange:function(e){setTrou(ti,e.target.value)},disabled:validated!==null,
                style:{display:"inline-block",width:"110px",margin:"0 4px",padding:"4px 8px",fontSize:"1rem",border:"2px solid "+(det===true?"var(--green)":det===false?"var(--coral)":"var(--primary)"),borderRadius:6,background:det===true?"rgba(72,160,87,.1)":det===false?"rgba(197,48,48,.1)":"var(--card)",fontFamily:"inherit"}});
            }
            return h("span",{key:i},seg);
          })
        ),
        validated&&validated.details.some(function(d){return d===false})&&h("div",{style:{marginTop:10,padding:"10px 14px",background:"rgba(72,160,87,.12)",borderRadius:8,fontSize:".9rem"}},
          h("b",null,"Corrig\u00e9 : "),
          (item.reponses||[]).map(function(r,i){return (i>0?" \u00b7 ":"")+r}).join("")
        )
      );
    }
    if(item.type==="reecriture"){
      return h("div",null,
        item.enonce&&h("div",{style:{fontSize:".88rem",color:"var(--muted)",marginBottom:8}},item.enonce),
        item.phrase&&h("div",{style:{fontSize:"1.05rem",marginBottom:10,padding:"10px 14px",background:"var(--card2)",borderRadius:8,fontStyle:"italic"}},item.phrase),
        h("textarea",{value:userAns||"",onChange:function(e){setAnswer(e.target.value)},disabled:validated!==null,
          placeholder:"Ta r\u00e9\u00e9criture...",
          style:{width:"100%",minHeight:80,padding:"10px 14px",fontSize:"1rem",border:"2px solid "+(validated?(validated.ok?"var(--green)":"var(--coral)"):"var(--primary)"),borderRadius:8,background:validated?(validated.ok?"rgba(72,160,87,.06)":"rgba(197,48,48,.06)"):"var(--card)",fontFamily:"inherit",resize:"vertical"}}),
        validated&&!validated.ok&&h("div",{style:{marginTop:10,padding:"10px 14px",background:"rgba(72,160,87,.12)",borderRadius:8,fontSize:".9rem"}},
          h("b",null,"Corrig\u00e9 : "),item.reponse_exacte)
      );
    }
    if(item.type==="copie"){
      return h("div",null,
        item.enonce&&h("div",{style:{fontSize:".88rem",color:"var(--muted)",marginBottom:8}},item.enonce),
        h("div",{style:{fontSize:"1rem",marginBottom:10,padding:"10px 14px",background:"#fef8ec",border:"1px solid #c8a951",borderRadius:8,fontStyle:"italic"}},
          h("b",{style:{fontStyle:"normal"}},"\u00c0 recopier : "),"\u00ab "+(item.phrase||"")+" \u00bb"
        ),
        h("textarea",{value:userAns||"",onChange:function(e){setAnswer(e.target.value)},disabled:validated!==null,
          placeholder:"Recopie la phrase ci-dessus en faisant attention\u2026",
          style:{width:"100%",minHeight:60,padding:"10px 14px",fontSize:"1rem",border:"2px solid "+(validated?(validated.ok?"var(--green)":"var(--coral)"):"var(--primary)"),borderRadius:8,background:validated?(validated.ok?"rgba(72,160,87,.06)":"rgba(197,48,48,.06)"):"var(--card)",fontFamily:"inherit",resize:"vertical"}}),
        validated&&!validated.ok&&h("div",{style:{marginTop:10,padding:"10px 14px",background:"rgba(72,160,87,.12)",borderRadius:8,fontSize:".9rem"}},
          h("b",null,"Phrase exacte attendue : "),item.phrase)
      );
    }
    if(item.type==="ecriture"){
      var criteres = Array.isArray(item.criteres)?item.criteres:[];

      if(nG>0)rows.push(["#c53030","G \u2014 Grammaire",nG,"\u22121",tG]);
      if(nL>0)rows.push(["#2b6cb0","L \u2014 Lexique",nL,"\u22120,5",tL]);
      if(nM>0)rows.push(["#7c3aed","\u2205 \u2014 Mots manquants",nM,"\u22121",tM]);
      if(nP>0)rows.push(["#2b6cb0","P \u2014 Ponctuation manquante",nP,"\u22120,5",tP]);
      if(nI>0)rows.push(["#975a16","? \u2014 Illisible",nI,"\u22121",tI]);
      if(nX>0)rows.push(["#2563eb","+ \u2014 Mots en trop",nX,"\u22120,5",tX]);
      if(nA>0)rows.push(["#b7791f","\u26a0 \u2014 Attention graphie",nA,"0","0 (sign. sans p\u00e9nalit\u00e9)"]);
      if(rows.length===0)return null;
      return h("div",{className:"card",style:{marginBottom:14}},
        h("div",{style:{fontSize:".78rem",color:"var(--muted)",marginBottom:10,fontWeight:600,textTransform:"uppercase"}},"D\u00e9tail de ta note de dict\u00e9e"),
        h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:".9rem"}},
          h("thead",null,h("tr",{style:{borderBottom:"1.5px solid var(--border)"}},
            h("th",{style:{textAlign:"left",padding:"6px 4px",fontWeight:600,color:"var(--text-sub)",fontSize:".8rem"}},"Type d\u2019erreur"),
            h("th",{style:{textAlign:"center",padding:"6px 4px",fontWeight:600,color:"var(--text-sub)",fontSize:".8rem"}},"Nombre"),
            h("th",{style:{textAlign:"center",padding:"6px 4px",fontWeight:600,color:"var(--text-sub)",fontSize:".8rem"}},"Co\u00fbt"),
            h("th",{style:{textAlign:"right",padding:"6px 4px",fontWeight:600,color:"var(--text-sub)",fontSize:".8rem"}},"Total")
          )),
          h("tbody",null,rows.map(function(r,ri){
            return h("tr",{key:"row"+ri,style:{borderBottom:"1px solid var(--border)"}},
              h("td",{style:{padding:"6px 4px",color:r[0],fontWeight:600}},r[1]),
              h("td",{style:{padding:"6px 4px",textAlign:"center"}},r[2]),
              h("td",{style:{padding:"6px 4px",textAlign:"center",color:"var(--text-sub)"}},r[3]),
              h("td",{style:{padding:"6px 4px",textAlign:"right",fontWeight:600,color:r[0]}},typeof r[4]==="number"?(r[4]>0?"\u2212"+r[4].toString().replace(".",",")+" pt"+(r[4]>1?"s":""):"0"):r[4])
            );
          })),
          h("tfoot",null,h("tr",{style:{borderTop:"1.5px solid var(--border)"}},
            h("td",{colSpan:3,style:{padding:"8px 4px",fontWeight:700,textAlign:"right"}},"Total des p\u00e9nalit\u00e9s : "),
            h("td",{style:{padding:"8px 4px",fontWeight:800,textAlign:"right",color:noteColor(noteDictee,d.base),fontSize:"1.05rem"}},total>0?"\u2212"+total.toString().replace(".",",")+" pt"+(total>1?"s":""):"0")
          ),h("tr",null,
            h("td",{colSpan:3,style:{padding:"6px 4px",fontWeight:700,textAlign:"right"}},"Note finale : "),
            h("td",{style:{padding:"6px 4px",fontWeight:800,textAlign:"right",color:noteColor(noteDictee,d.base),fontSize:"1.1rem"}},noteDictee+"/"+d.base)
          ))
        )
      );
    })(),
    // Consigne
    h("div",{style:{padding:"12px 16px",background:"var(--primary-light)",borderRadius:10,marginBottom:14,borderLeft:"4px solid var(--primary)"}},
      h("p",{style:{fontWeight:700,marginBottom:4,fontSize:".95rem"}},"\u270d\ufe0f Maintenant, corrige sur ta copie au stylo vert."),
      h("p",{style:{fontSize:".88rem",color:"var(--text-sub)"}},"Pour chaque erreur, \u00e9cris la bonne orthographe et note le type d\u2019erreur (G = grammaire, L = lexique).")
    ),
    // Texte corrigé — copie annotée
    h("div",{className:"card",style:{marginBottom:14}},
      h("div",{style:{fontSize:".78rem",color:"var(--muted)",marginBottom:8,fontWeight:600,textTransform:"uppercase"}},"Ta dict\u00e9e corrig\u00e9e"),
      h("div",{style:{lineHeight:3.2,fontSize:"1rem"}},
        tokens.reduce(function(acc,w,ti){
          // Insert extras AVANT ce token (à afterIdx = ti-1)
          if(extraMapEleve[ti-1])extraMapEleve[ti-1].forEach(function(ex){
            acc.push(h("span",{key:"rex"+ti+"_"+ex.gi,style:{textDecoration:"line-through",color:"#2563eb",fontSize:".88rem",opacity:.7,padding:"2px 5px",borderRadius:4,border:"1px dashed #2563eb55",margin:"0 2px"},title:"Mot en trop dans ta copie \u2014 \u22120,5 pt"},ex.word));
            acc.push(h("span",{key:"rex"+ti+"_"+ex.gi+"_sp"}," "));
          });
          var ev=errMap[ti];
          var nextW=tokens[ti+1]||"";
          var sp=tokSp(w,nextW);
          if(!ev){acc.push(h("span",{key:"t"+ti},w+sp));return acc}
          // Type A : mot en clair, soulignement ondulé ambre
          if(ev.type==="A"){
            acc.push(h("span",{key:"t"+ti,style:{position:"relative",display:"inline",whiteSpace:"nowrap"}},
              h("span",{style:{textDecoration:"underline wavy #b7791f",textUnderlineOffset:"3px",color:"#1a1a1a"},title:"Attention \u00e0 ta graphie \u2014 aucun point retir\u00e9"},ev.word),
              h("span",{style:{position:"absolute",left:"50%",transform:"translateX(-50%)",top:"100%",fontSize:".65rem",fontWeight:700,color:"#b7791f",whiteSpace:"nowrap"}},"\u26a0"),
              sp
            ));
            return acc;
          }
          var color=ev.type==="G"?"#c53030":"#2b6cb0";
          var isOublie=(ev.type==="M"||ev.type==="P");
          acc.push(h("span",{key:"t"+ti,style:{position:"relative",display:"inline",whiteSpace:"nowrap"}},
            h("span",{style:{fontWeight:700,color:color,borderBottom:"2px solid "+color,padding:"1px 4px",borderRadius:4}},ev.word),
            h("span",{style:{position:"absolute",left:"50%",transform:"translateX(-50%)",top:"100%",fontSize:".65rem",fontWeight:700,color:color,whiteSpace:"nowrap"}},ev.type),
            isOublie&&h("span",{style:{position:"absolute",left:"50%",transform:"translateX(-50%)",top:"calc(100% + 12px)",fontSize:".6rem",color:"#7c3aed",fontStyle:"italic",whiteSpace:"nowrap"}},"(oubli\u00e9)"),
            !isOublie&&ev.fautif&&h("span",{style:{position:"absolute",left:"50%",transform:"translateX(-50%)",top:"calc(100% + 12px)",fontSize:".6rem",color:"#999",textDecoration:"line-through",whiteSpace:"nowrap"}},ev.fautif),
            sp
          ));
          return acc;
        },[]).concat(
          extraMapEleve[tokens.length-1]?extraMapEleve[tokens.length-1].map(function(ex){
            return h("span",{key:"rexend"+ex.gi,style:{textDecoration:"line-through",color:"#2563eb",fontSize:".88rem",opacity:.7,padding:"2px 5px",borderRadius:4,border:"1px dashed #2563eb55",margin:"0 2px"},title:"Mot en trop dans ta copie \u2014 \u22120,5 pt"},ex.word)
          }):[]
        )
      )
    ),
    // Commentaires grammaticaux
    h("div",{className:"card"},
      h("div",{style:{fontSize:".78rem",color:"var(--muted)",marginBottom:10,fontWeight:600,textTransform:"uppercase"}},"Analyse de tes erreurs"),
      errors.map(function(err,i){
        var typeColor=err.type==="G"?"#c53030":err.type==="L"?"#2b6cb0":err.type==="M"?"#7c3aed":err.type==="P"?"#2b6cb0":err.type==="A"?"#b7791f":"#975a16";
        var typeBg=err.type==="G"?"rgba(197,48,48,.1)":err.type==="L"?"rgba(43,108,203,.1)":err.type==="M"?"rgba(124,58,237,.1)":err.type==="P"?"rgba(43,108,203,.1)":err.type==="A"?"rgba(183,121,31,.1)":"rgba(151,90,22,.1)";
        var typeLabel=err.type==="G"?"Grammaire":err.type==="L"?"Lexique":err.type==="M"?"Manquant":err.type==="P"?"Ponctuation":err.type==="A"?"Attention graphie":"Illisible";
        return h("div",{key:"gc"+i,style:{padding:"10px 0",borderBottom:i<errors.length-1?"1px solid var(--border)":"none"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
            h("span",{style:{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".78rem",fontWeight:700,flexShrink:0,
              background:typeBg,color:typeColor}},i+1),
            h("span",{style:{fontWeight:700,fontSize:".95rem"}},"\u00ab "+err.word+" \u00bb"),
            h("span",{style:{fontSize:".8rem",padding:"2px 8px",borderRadius:6,fontWeight:600,
              background:typeBg,color:typeColor}},typeLabel)
          ),
          h("p",{style:{fontSize:".88rem",color:"#555",lineHeight:1.6,marginLeft:32}},gramComment(err))
        )
      }),
      extras.length>0&&extras.map(function(ex,i){
        return h("div",{key:"gex"+i,style:{padding:"10px 0",borderBottom:i<extras.length-1?"1px solid var(--border)":"none",borderTop:i===0?"1px solid var(--border)":"none",marginTop:i===0?6:0}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
            h("span",{style:{width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".78rem",fontWeight:700,flexShrink:0,
              background:"rgba(37,99,235,.1)",color:"#2563eb"}},"+"),
            h("span",{style:{fontWeight:700,fontSize:".95rem",textDecoration:"line-through",color:"#2563eb"}},"\u00ab "+ex.word+" \u00bb"),
            h("span",{style:{fontSize:".8rem",padding:"2px 8px",borderRadius:6,fontWeight:600,background:"rgba(37,99,235,.08)",color:"#2563eb"}},"Mot en trop")
          ),
          h("p",{style:{fontSize:".88rem",color:"#555",lineHeight:1.6,marginLeft:32}},"Ce mot \u00e9tait dans ta copie mais ne devait pas y \u00eatre. \u00c9coute bien le rythme de la dict\u00e9e et n\u2019ajoute pas de mots que tu crois deviner.")
        );
      })
    ),
    // Boutons
    h("div",{style:{display:"flex",gap:8,marginTop:12,justifyContent:"center",paddingBottom:30,flexWrap:"wrap"}},
      h("button",{className:"btn btn-ghost",onClick:p.onBack},"\u2190 Retour"),
      p.onExercices&&h("button",{className:"btn btn-primary",onClick:p.onExercices,title:"Passe \u00e0 tes exercices personnalis\u00e9s"},"\ud83c\udfaf Mes exercices"),
      d.key==="meney_monsieur"&&h("button",{className:"btn-sm btn-ghost",style:{color:"var(--coral)",borderColor:"rgba(197,48,48,.2)"},onClick:function(){
        if(confirm("Recommencer la correction ? Ta progression sera effac\u00e9e.")){
          db.ref("correction_dictee/"+d.dictee.id+"/autocorrection/"+d.key).remove();
          setAttempts({});setResults({});setHistory({});setFinished(false);
          setQuizShown(false);setQuizDone(false);setQuizQ(null);
        }
      }},"\u21bb Recommencer")
    )
  );

  // Quiz interstitiel
  if(outOfPoints&&!quizDone){
    if(!quizShown) return h("div",{className:"container fade-up",style:{paddingTop:40,textAlign:"center"}},
      h("div",{className:"card"},
        h("h2",null,"Tu as utilis\u00e9 tes 5 points"),
        h("p",{className:"subtitle"},"R\u00e9ponds \u00e0 une question pour continuer la correction."),
        h("button",{className:"btn btn-primary",onClick:showQuiz},"Voir la question")
      )
    );
    // Show quiz question
    return h("div",{className:"container fade-up",style:{paddingTop:40}},
      h("div",{className:"card"},
        h("h2",null,"Question de grammaire"),
        h("p",{style:{fontSize:"1.05rem",marginBottom:16,lineHeight:1.6}},quizQ.q),
        h("div",{style:{display:"flex",flexDirection:"column",gap:8}},
          quizQ.choices.map(function(c,i){return h("button",{key:i,className:"btn btn-ghost",style:{textAlign:"left",padding:"12px 16px"},onClick:function(){answerQuiz(i)}},c)})
        )
      )
    );
  }

  // After quiz: show rule then continue
  if(outOfPoints&&quizDone&&quizQ){
    return h("div",{className:"container fade-up",style:{paddingTop:40}},
      h("div",{className:"card"},
        h("h2",null,"R\u00e8gle \u00e0 retenir"),
        h("p",{style:{fontSize:"1rem",lineHeight:1.7,marginBottom:16,padding:"12px",background:"var(--card2)",borderRadius:10}},quizQ.rule),
        h("button",{className:"btn btn-primary",onClick:function(){setQuizQ(null);setQuizShown(false)}},
          "Continuer la correction"+(nSolved<totalErrors?" ("+(totalErrors-nSolved)+" restante"+(totalErrors-nSolved>1?"s":"")+")" :"")
        )
      )
    );
  }

  return h("div",{className:"container fade-up"},
    // Idle warning
    idleWarning&&h("div",{style:{position:"fixed",top:0,left:0,right:0,zIndex:400,padding:"14px 20px",background:"#c53030",color:"#fff",textAlign:"center",fontWeight:700,fontSize:"1.1rem",boxShadow:"0 4px 20px rgba(197,48,48,.4)",animation:"fadeUp .3s ease"},onClick:function(){recordAction()}},
      "\u26a0\ufe0f Reprends le travail ! Clique ici pour continuer."
    ),
    // Header sticky
    h("div",{className:"score-bar"},
      h("div",{className:"score-val",style:{color:noteColor(score,5)}},score),
      h("div",{style:{flex:1}},
        h("div",{className:"score-eleve"},d.eleve),
        h("div",{className:"score-info"},
          "/5 \u00b7 ",nSolved+"/"+totalErrors+" corrig\u00e9"+(nSolved>1?"s":""),
          " \u00b7 ",wrongAttempts+" essai"+(wrongAttempts>1?"s":"")+" rat\u00e9"+(wrongAttempts>1?"s":"")
        ),
        h("div",{className:"progress-wrap"},h("div",{className:"progress-fill",style:{width:(totalErrors?Math.round(nSolved/totalErrors*100):0)+"%"}}))
      ),
      h("div",{style:{display:"flex",flexDirection:"column",gap:4}},
        h("button",{className:"btn-sm btn-ghost",style:{fontSize:".8rem",padding:"4px 10px"},onClick:p.onBack},"\u2190"),
        h("button",{className:"btn-sm btn-ghost",style:{fontSize:".7rem",padding:"3px 8px",color:"var(--primary)"},onClick:function(){window.location.reload()}},"\ud83d\udd04",ifo("Recharge la page. Clique ici quand le professeur te le demande.",{below:true,right:true}))
      )
    ),
    // Text with masked words
    h("div",{className:"card"},
      h("p",{style:{fontSize:".82rem",color:"var(--muted)",marginBottom:8}},"Clique sur un mot masqu\u00e9 pour le corriger. Note de d\u00e9part : 5 pts, chaque essai rat\u00e9 co\u00fbte 0.25 pt."),
      (function(){
        var nA=errors.filter(function(e){return e&&e.type==="A"}).length;
        if(extras.length===0&&nA===0)return null;
        return h("div",{style:{marginBottom:10,padding:"10px 14px",background:"rgba(37,99,235,.05)",border:"1.5px solid rgba(37,99,235,.2)",borderRadius:8,fontSize:".85rem",lineHeight:1.6}},
          extras.length>0&&h("div",{style:{color:"#2563eb",fontWeight:600}},
            "\ud83d\udccc "+extras.length+" mot"+(extras.length>1?"s":"")+" en trop dans ta copie (barr\u00e9"+(extras.length>1?"s":"")+" en bleu dans le texte) \u2014 \u22120,5 pt chacun"
          ),
          nA>0&&h("div",{style:{color:"#b7791f",fontWeight:600,marginTop:extras.length>0?6:0}},
            "\u26a0 "+nA+" mot"+(nA>1?"s":"")+" o\u00f9 ton prof a sign\u00e9 ta graphie (soulign\u00e9"+(nA>1?"s":"")+" en orange) \u2014 aucun point retir\u00e9, mais soigne le trac\u00e9"
          )
        );
      })(),
      h("div",{className:"word-grid"},
        tokens.reduce(function(acc,w,i){
          // Insert extras before this token
          if(extraMapEleve[i-1])extraMapEleve[i-1].forEach(function(ex){
            acc.push(h("span",{key:"ex"+i+"_"+ex.gi,style:{textDecoration:"line-through",color:"#2563eb",fontSize:".85rem",opacity:.6,padding:"2px 4px",borderRadius:4,border:"1px dashed #2563eb33"}},ex.word))
          });
          var err=errMap[i];
          if(!err){
            var isP=isPunct(w);
            acc.push(h("span",{key:"w"+i,className:"word-btn"+(isP?" punct":""),style:{cursor:"default"}},w));
            return acc;
          }
          // Type A : signalement de graphie, affiché en clair, non cliquable, ne compte pas dans la note
          if(err.type==="A"){
            acc.push(h("span",{key:"w"+i,className:"word-btn err-a",style:{cursor:"default"},title:"Ton prof a sign\u00e9 ta graphie ici. Aucun point retir\u00e9."},w,h("sub",{style:{fontSize:8,marginLeft:2}},"\u26a0")));
            return acc;
          }
          var solved=results[err.errIdx];
          var isActive=activeErr===err.errIdx;
          if(solved){
            acc.push(h("span",{key:"w"+i,className:"word-btn",style:{color:"var(--green)",fontWeight:700,borderBottom:"2px solid var(--green)"}},err.word," \u2713"));
            return acc;
          }
          // Masked word — clickable
          var typeCls=err.type==="G"?"err-g":err.type==="L"?"err-l":err.type==="M"?"err-m":err.type==="P"?"err-p":"err-i";
          var blanks="";for(var j=0;j<w.length;j++)blanks+="\u2022";
          if(err.type==="M")blanks="____";
          if(err.type==="P")blanks="\u2022";
          acc.push(h("span",{key:"w"+i,className:"word-btn "+typeCls+(isActive?" last-touched":""),
            style:{cursor:"pointer",filter:isActive?"none":"blur(3px)",transition:"filter 0.2s"},
            onClick:function(){recordAction();setActiveErr(err.errIdx);setInputVal("");setFeedback(null)}},
            blanks,h("sub",{style:{fontSize:8,marginLeft:2}},err.type)
          ));
          return acc;
        },[]).concat(
          extraMapEleve[tokens.length-1]?extraMapEleve[tokens.length-1].map(function(ex){
            return h("span",{key:"exend"+ex.gi,style:{textDecoration:"line-through",color:"#2563eb",fontSize:".85rem",opacity:.6,padding:"2px 4px",borderRadius:4,border:"1px dashed #2563eb33"}},ex.word)
          }):[]
        )
      )
    ),
    // Active error input
    activeErr!==null&&h("div",{className:"popup-overlay",style:{alignItems:"flex-start",paddingTop:"25vh"},onClick:function(){setActiveErr(null);setInputVal("");setFeedback(null)}},
      h("div",{style:{background:"var(--card)",borderRadius:16,padding:"18px 20px",maxWidth:360,width:"100%",boxShadow:"0 12px 40px rgba(0,0,0,.2)",position:"relative"},onClick:function(e){e.stopPropagation()}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10}},
          h("span",{className:"badge badge-"+(errors[activeErr].type==="G"?"g":"l"),style:{fontSize:".85rem",padding:"3px 10px"}},errors[activeErr].type),
          h("span",{style:{fontWeight:600,fontSize:".95rem"}},"Erreur n\u00b0"+(activeErr+1)),
          (attempts[activeErr]||0)>0&&h("span",{style:{fontSize:".78rem",color:"var(--muted)",marginLeft:"auto"}},(attempts[activeErr]||0)+" essai"+(((attempts[activeErr]||0)>1)?"s":""))
        ),
        h("div",{style:{display:"flex",gap:8}},
          h("input",{ref:inputRef,value:inputVal,onChange:function(e){setInputVal(e.target.value)},
            placeholder:"Tape le mot correct\u2026",
            style:{flex:1,padding:"10px 12px",fontSize:"1rem",borderColor:feedback?feedback.correct?"var(--green)":"var(--coral)":"var(--border)",background:feedback?feedback.correct?"var(--green-light)":"var(--coral-light)":"var(--card)",borderRadius:10},
            onKeyDown:function(e){if(e.key==="Enter")tryAnswer()}}),
          h("button",{className:"btn-sm btn-primary",style:{padding:"10px 16px"},onClick:tryAnswer},"\u2713")
        ),
        feedback&&h("div",{style:{marginTop:8,fontSize:".88rem",fontWeight:600,color:feedback.correct?"var(--green)":"var(--coral)",textAlign:"center"}},
          feedback.correct?"\u2713 Correct ! \u00ab "+feedback.answer+" \u00bb":"\u2717 R\u00e9essaie !"
        )
      )
    )
  );
}
</script>
</body>
</html>
