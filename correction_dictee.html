// ═══ CORRECTION D'UN ÉLÈVE ═══
function RapideGlobal(p){
  var data=p.data,tokens=data.tokens,corr=p.corrections,abs=p.absents||{};
  var eleves=(data.eleves||[]).filter(function(e){return!abs[san(e)]});
  // Find uncorrected students
  var uncorrected=eleves.filter(function(e){return!corr[san(e)]});
  var allStudents=eleves.slice();

  var s1=useState(0),studentIdx=s1[0],setStudentIdx=s1[1];
  var s2=useState(0),wordIdx=s2[0],setWordIdx=s2[1];
  var s3=useState([]),errors=s3[0],setErrors=s3[1];
  var s4=useState([]),extras=s4[0],setExtras=s4[1];
  var s5=useState(null),flashType=s5[0],setFlashType=s5[1];
  var s6=useState(null),askFautif=s6[0],setAskFautif=s6[1];
  var s7=useState(""),fautifVal=s7[0],setFautifVal=s7[1];
  var s8=useState("uncorrected"),listMode=s8[0],setListMode=s8[1];
  var fautifRef=React.useRef(null);
  React.useEffect(function(){if(askFautif&&fautifRef.current)fautifRef.current.focus()},[askFautif]);

  var list=listMode==="uncorrected"?uncorrected:allStudents;
  var curEleve=list[studentIdx];
  var wordTokens=tokens.map(function(t,i){return{text:t,idx:i}});
  var curWord=wordIdx<wordTokens.length?wordTokens[wordIdx]:null;
  var pctWord=Math.round(wordIdx/wordTokens.length*100);
  var sc=computeNote(errors,extras,data.base);

  function markError(type){
    if(type==="G"||type==="L"){setAskFautif(type);setFautifVal("");return}
    // P, A, M, I : pas de transcription demandée, ajouter direct
    var wt=wordTokens[wordIdx];if(!wt)return;
    var ne=errors.filter(function(e){return e.idx!==wt.idx});
    ne.push({idx:wt.idx,type:type,word:wt.text});
    setErrors(ne);
    setFlashType(type);setTimeout(function(){setFlashType(null)},400);
    setWordIdx(wordIdx+1);
  }
  function confirmFautif(overrideVal){
    var wt=wordTokens[wordIdx];if(!wt)return;
    var vv=overrideVal!==undefined?overrideVal:fautifVal;
    var ne=errors.filter(function(e){return e.idx!==wt.idx});
    var errObj={idx:wt.idx,type:askFautif,word:wt.text};
    if(vv.trim())errObj.fautif=vv.trim();
    ne.push(errObj);setErrors(ne);
    setAskFautif(null);setFautifVal("");
    setFlashType(askFautif);setTimeout(function(){setFlashType(null)},400);
    setWordIdx(wordIdx+1);
  }
  function skipWord(){
    var wt=wordTokens[wordIdx];if(!wt)return;
    setWordIdx(wordIdx+1);
  }
  function goBack(){if(wordIdx>0)setWordIdx(wordIdx-1)}
  function saveAndNext(){
    if(!curEleve)return;
    p.onSave(san(curEleve),errors,extras);
    setErrors([]);setExtras([]);setWordIdx(0);
    if(studentIdx<list.length-1)setStudentIdx(studentIdx+1);
    else setStudentIdx(list.length);
  }

  React.useEffect(function(){
    if(askFautif)return;
    function onKey(e){
      if(e.key==="g"||e.key==="G"){e.preventDefault();markError("G")}
      else if(e.key==="l"||e.key==="L"){e.preventDefault();markError("L")}
      else if(e.key==="/"||e.key==="M"||e.key==="m"){e.preventDefault();
        var wt2=wordTokens[wordIdx];if(wt2){
          var ne2=errors.filter(function(e2){return e2.idx!==wt2.idx});
          ne2.push({idx:wt2.idx,type:"M",word:wt2.text});setErrors(ne2);
          setFlashType("M");setTimeout(function(){setFlashType(null)},400);setWordIdx(wordIdx+1);
        }
      }
      else if(e.key==="?"||e.key==="I"||e.key==="i"){e.preventDefault();
        var wt3=wordTokens[wordIdx];if(wt3){
          var ne3=errors.filter(function(e3){return e3.idx!==wt3.idx});
          ne3.push({idx:wt3.idx,type:"I",word:wt3.text});setErrors(ne3);
          setFlashType("I");setTimeout(function(){setFlashType(null)},400);setWordIdx(wordIdx+1);
        }
      }
      else if(e.key==="p"||e.key==="P"){
        var wtp=wordTokens[wordIdx];
        if(wtp&&isPunct(wtp.text)){
          e.preventDefault();
          var nep=errors.filter(function(e2){return e2.idx!==wtp.idx});
          nep.push({idx:wtp.idx,type:"P",word:wtp.text});setErrors(nep);
          setFlashType("P");setTimeout(function(){setFlashType(null)},400);setWordIdx(wordIdx+1);
        }
      }
      else if(e.key==="a"||e.key==="A"){e.preventDefault();
        var wta=wordTokens[wordIdx];if(wta){
          var nea=errors.filter(function(e2){return e2.idx!==wta.idx});
          nea.push({idx:wta.idx,type:"A",word:wta.text});setErrors(nea);
          setFlashType("A");setTimeout(function(){setFlashType(null)},400);setWordIdx(wordIdx+1);
        }
      }
      else if(e.key===" "||e.key==="Enter"){e.preventDefault();skipWord()}
      else if(e.key==="Backspace"){e.preventDefault();goBack()}
    }
    window.addEventListener("keydown",onKey);
    return function(){window.removeEventListener("keydown",onKey)};
  });

  if(!list.length) return h("div",{className:"card",style:{textAlign:"center",padding:30}},h("p",null,"\u2705 Tous les \u00e9l\u00e8ves sont corrig\u00e9s."));
  if(studentIdx>=list.length) return h("div",{className:"card",style:{textAlign:"center",padding:30}},
    h("div",{style:{fontSize:"2rem",marginBottom:8}},"\u2705"),
    h("p",{style:{fontWeight:700}},"Correction rapide termin\u00e9e !"),
    h("p",{style:{color:"var(--text-sub)"}},list.length+" \u00e9l\u00e8ve"+(list.length>1?"s":"")+" corrig\u00e9"+(list.length>1?"s":"")),
    h("button",{className:"btn btn-ghost",style:{marginTop:12},onClick:function(){setStudentIdx(0);setWordIdx(0);setErrors([]);setExtras([])}},"\u21bb Recommencer")
  );

  var ctxStart=Math.max(0,wordIdx-3);
  var ctxEnd=Math.min(wordTokens.length,wordIdx+4);
  var wordDone=wordIdx>=wordTokens.length;

  return h("div",{style:{maxWidth:480,margin:"0 auto"}},
    // Header
    h("div",{className:"score-bar"},
      h("div",{className:"score-val",style:{color:noteColor(sc.note,data.base)}},sc.note),
      h("div",{style:{flex:1}},
        h("div",{className:"score-eleve"},curEleve+" ("+(studentIdx+1)+"/"+list.length+")"),
        h("div",{style:{fontSize:".82rem",color:"var(--muted)"}},errors.length+" err."),
        h("div",{style:{height:4,background:"#e5e3dd",borderRadius:2,marginTop:4,overflow:"hidden"}},
          h("div",{style:{height:"100%",background:"var(--primary)",borderRadius:2,width:pctWord+"%",transition:"width .3s"}}))
      )
    ),
    h("div",{style:{display:"flex",gap:6,marginBottom:10}},
      h("button",{className:"btn-sm "+(listMode==="uncorrected"?"btn-primary":"btn-ghost"),onClick:function(){setListMode("uncorrected");setStudentIdx(0);setWordIdx(0);setErrors([])}},"Non corrig\u00e9s ("+uncorrected.length+")"),
      h("button",{className:"btn-sm "+(listMode==="all"?"btn-primary":"btn-ghost"),onClick:function(){setListMode("all");setStudentIdx(0);setWordIdx(0);setErrors([])}},"Tous ("+allStudents.length+")")
    ),
    // Contexte
    h("div",{style:{textAlign:"center",padding:"8px 0",fontSize:".85rem",color:"var(--muted)",lineHeight:1.8}},
      wordTokens.slice(ctxStart,ctxEnd).map(function(wt,ci){
        var realI=ctxStart+ci;var isCur=realI===wordIdx;
        var isErr=errors.find(function(e){return e.idx===wt.idx});
        return h("span",{key:ci,style:{fontWeight:isCur?800:400,color:isCur?"var(--text)":isErr?"#c53030":"var(--muted)",fontSize:isCur?"1.1rem":".85rem",margin:"0 3px",textDecoration:isErr?"underline":"none"}},wt.text)
      })
    ),
    wordDone?
      h("div",{className:"card",style:{textAlign:"center",padding:30}},
        h("div",{style:{fontSize:"1.5rem",marginBottom:8}},"\u2705"),
        h("div",{style:{fontWeight:700,marginBottom:4}},curEleve+" : "+sc.note+"/"+data.base),
        h("div",{style:{fontSize:".9rem",color:"var(--text-sub)",marginBottom:14}},errors.length+" erreur"+(errors.length>1?"s":"")),
        h("div",{style:{display:"flex",gap:8,justifyContent:"center"}},
          h("button",{className:"btn btn-primary",onClick:saveAndNext},"Enregistrer \u2192 suivant"),
          h("button",{className:"btn btn-ghost",onClick:function(){setWordIdx(0)}},"\u21bb Relire")
        )
      ):
      h("div",null,
        h("div",{className:"card",style:{padding:0,overflow:"hidden"}},
          h("div",{className:"fast-word",style:{color:flashType==="G"?"#c53030":flashType==="L"?"#2b6cb0":flashType==="M"?"#975a16":flashType==="I"?"#7c3aed":"var(--text)"}},curWord?curWord.text:""),
          h("div",{style:{padding:"8px 16px",fontSize:".78rem",color:"var(--muted)",textAlign:"center",background:"var(--card2)"}},"Mot "+(wordIdx+1)+"/"+wordTokens.length)
        ),
        // Popup saisie mot fautif
        askFautif&&h("div",{style:{padding:"12px 14px",background:"var(--primary-light)",borderRadius:10,marginTop:10,border:"1.5px solid var(--primary)"}},
          h("div",{style:{fontSize:".85rem",color:"var(--text-sub)",marginBottom:6}},"Qu\u2019a \u00e9crit l\u2019\u00e9l\u00e8ve ? (facultatif)"),
          h("div",{style:{display:"flex",gap:8}},
            h("input",{ref:fautifRef,value:fautifVal,onChange:function(e){setFautifVal(e.target.value)},placeholder:"Mot fautif...",style:{flex:1,padding:"10px 12px",fontSize:"1rem",borderRadius:10,border:"1.5px solid var(--border)"},onKeyDown:function(e){if(e.key==="Enter"){e.preventDefault();e.stopPropagation();confirmFautif()}}}),
            h("button",{className:"btn-sm btn-primary",onClick:function(e){e.stopPropagation();confirmFautif()}},"\u2713"),
            h("button",{className:"btn-sm btn-ghost",onClick:function(e){e.stopPropagation();confirmFautif("")}},"Passer")
          )
        ),
        !askFautif&&h("div",{className:"fast-btns"},
          h("button",{className:"fast-btn fast-ok",onClick:skipWord},"\u2192 Correct"),
          h("button",{className:"fast-btn fast-g",onClick:function(){markError("G")}},"G Grammaire"),
          h("button",{className:"fast-btn fast-l",onClick:function(){markError("L")}},"L Lexique"),
          (function(){
            var wtCur=wordTokens[wordIdx];
            if(wtCur&&isPunct(wtCur.text)){
              return h("button",{className:"fast-btn fast-p",onClick:function(){markError("P")}},"\u00b7 Ponct. manqu.");
            }
            return h("button",{className:"fast-btn fast-m",onClick:function(){var wt4=wordTokens[wordIdx];if(wt4){setErrors(errors.filter(function(e){return e.idx!==wt4.idx}).concat([{idx:wt4.idx,type:"M",word:wt4.text}]));setFlashType("M");setTimeout(function(){setFlashType(null)},400);setWordIdx(wordIdx+1)}}},"\u2205 Manquant");
          })(),
          h("button",{className:"fast-btn fast-i",onClick:function(){var wt5=wordTokens[wordIdx];if(wt5){setErrors(errors.filter(function(e){return e.idx!==wt5.idx}).concat([{idx:wt5.idx,type:"I",word:wt5.text}]));setFlashType("I");setTimeout(function(){setFlashType(null)},400);setWordIdx(wordIdx+1)}}},"? Illisible"),
          h("button",{className:"fast-btn fast-a",onClick:function(){markError("A")}},"\u26a0 Attention")

var PROMPT_IA_BANQUE_DEFAUT = "Tu es un professeur de fran\u00e7ais expert en didactique. Je te fournis ci-dessous le JSON d'une dict\u00e9e corrig\u00e9e pour ma classe : texte, \u00e9l\u00e8ves, erreurs commises par chacun avec leur type (G=grammaire, L=lexique, M=mot manquant, P=ponctuation manquante, I=illisible, A=attention).\n\nObjectif : produire un document HTML autonome (1 seul fichier, design soign\u00e9 mais sobre, lisible pour des coll\u00e9giens) contenant DEUX SETS d'exercices :\n\n=== SET 1 \u2014 EXERCICES POUR LA CLASSE ENTI\u00c8RE ===\nAnalyse les erreurs les plus fr\u00e9quentes (au moins 3 \u00e9l\u00e8ves concern\u00e9s). Pour chaque difficult\u00e9 collective d\u00e9tect\u00e9e :\n- Un rappel de r\u00e8gle concis (max 4 lignes)\n- 3 \u00e0 5 exercices cibl\u00e9s (difficult\u00e9 croissante : reconnaissance > application > r\u00e9investissement)\n- Corrig\u00e9s en fin de section (ou en <details>)\n\n=== SET 2 \u2014 EXERCICES PERSONNALIS\u00c9S PAR \u00c9L\u00c8VE ===\nPour chaque \u00e9l\u00e8ve ayant fait au moins 3 erreurs, une mini-page personnelle avec son pr\u00e9nom en titre :\n- R\u00e9cap visuel de ses 3 difficult\u00e9s principales (avec exemples tir\u00e9s de SA dict\u00e9e)\n- 5 \u00e0 8 exercices cibl\u00e9s sur SES erreurs (pas celles des autres)\n- Corrig\u00e9s en fin de section\n\n=== CONTRAINTES TECHNIQUES ===\n- HTML5 valide, autonome (CSS + JS inline, aucune d\u00e9pendance externe)\n- Imprimable : @media print propre, sauts de page entre sections\n- Typographie agr\u00e9able (system font stack, EB Garamond via Google Fonts en option)\n- Sommaire en haut avec ancres vers les sections\n- Pas de tableaux d\u00e9coratifs, pas d'images\n- Niveau de langue adapt\u00e9 au niveau scolaire du JSON\n- Palette : G=rouge, L=bleu, M=ocre, P=bleu, I=violet, A=orange\n\n=== \u00c9VOLUTION FUTURE ===\n\u00c0 terme, cette m\u00eame requ\u00eate devra pouvoir g\u00e9n\u00e9rer un JSON injectable dans l'app de dict\u00e9e. Pense la structure HTML pour qu'elle puisse \u00eatre convertie facilement en donn\u00e9es structur\u00e9es (un exercice = un objet avec type, \u00e9nonc\u00e9, items, correction).\n\n=== JSON DE LA DICT\u00c9E ===\n{{JSON_DICTEE}}";

function buildDicteeJSON(data, corrections, absents){
  absents = absents || {};
  var prenomOnly = function(n){var p=n.split(/\s+/);return p.length>1?p[p.length-1]:n};
  var out = {
    dictee: {
      titre: data.title || "",
      classe: data.classe || "",
      niveau: data.niveau || "",
      base: data.base || 20,
      competences: toArr(data.competences) || [],
      texte: data.text || ""
    },
    eleves: [],
    bilan_classe: {effectif: 0, corriges: 0, moyenne: null, mediane: null, mots_les_plus_echoues: []}
  };
  var notes = [];
  var wordFreq = {};
  data.eleves.forEach(function(e){
    var k = san(e);
    if (absents[k]) return;
    var c = corrections[k];
    var elObj = {prenom: prenomOnly(e), nom_complet: e, corrige: !!c};
    if (c) {
      elObj.note = c.note;
      elObj.compteurs = c.counts || {};
      elObj.erreurs = toArr(c.errors).map(function(err){
        var o = {position: err.idx, mot_correct: err.word || null, type: err.type};
        if (err.fautif) o.mot_ecrit_par_eleve = err.fautif;
        return o;
      });
      elObj.mots_ajoutes_en_trop = toArr(c.extras).map(function(ex){return ex.word});
      notes.push(c.note);
      toArr(c.errors).forEach(function(err){
        var w = err.word || "?";
        if (!wordFreq[w]) wordFreq[w] = {mot: w, total: 0, par_type: {}, eleves_concernes: []};
        wordFreq[w].total++;
        wordFreq[w].par_type[err.type] = (wordFreq[w].par_type[err.type] || 0) + 1;
        wordFreq[w].eleves_concernes.push(prenomOnly(e));
      });
    }
    out.eleves.push(elObj);
  });
  out.bilan_classe.effectif = out.eleves.length;
  out.bilan_classe.corriges = notes.length;
  if (notes.length) {
    out.bilan_classe.moyenne = Math.round(notes.reduce(function(a,b){return a+b},0) / notes.length * 10) / 10;
    var s = notes.slice().sort(function(a,b){return a-b}), m = Math.floor(s.length/2);
    out.bilan_classe.mediane = s.length % 2 ? s[m] : Math.round((s[m-1]+s[m])*5)/10;
  }
  out.bilan_classe.mots_les_plus_echoues = Object.values(wordFreq).sort(function(a,b){return b.total-a.total}).slice(0, 20);
  return out;
}

function Suivi(p){
  var data=p.data,abs=p.absents||{};
  var s1=useState({}),autoCorr=s1[0],setAutoCorr=s1[1];
  var s2=useState(null),selectedEleve=s2[0],setSelectedEleve=s2[1];
  var sQs=useState(""),suiviQuery=sQs[0],setSuiviQuery=sQs[1];
  var s3=useState(0),tick=s3[0],setTick=s3[1];
  // Exercices : pour la colonne "exos" du tableau + la vue détail dans la modale
  var sEx=useState(null), exercices=sEx[0], setExercices=sEx[1];
  var sExR=useState({}), exResults=sExR[0], setExResults=sExR[1];
  var NOW=Date.now();
  var RECENT=60*1000;

  // Force re-render every 15s to update statuses
  useEffect(function(){
    var t=setInterval(function(){setTick(function(n){return n+1})},15000);
    return function(){clearInterval(t)};
  },[]);

  useEffect(function(){
    var ref=db.ref("correction_dictee/"+p.dicteeId+"/autocorrection");
    function onData(snap){setAutoCorr(snap.val()||{})}
    ref.on("value",onData);
    var refE=db.ref("correction_dictee/"+p.dicteeId+"/exercices");
    function onEx(snap){setExercices(snap.val()||null)}
    refE.on("value",onEx);
    var refR=db.ref("correction_dictee/"+p.dicteeId+"/exercices_results");
    function onR(snap){setExResults(snap.val()||{})}
    refR.on("value",onR);
    return function(){ref.off("value",onData);refE.off("value",onEx);refR.off("value",onR)};
  },[p.dicteeId]);

  // Helper : calcule les stats exos pour un élève (rétroactif, lit Firebase)
  function statsExos(eleveName){
    if(!exercices)return{hasExos:false,totalExos:0,exosDone:0,totalAuto:0,okAuto:0,totalLibres:0,saisiesLibres:0,totalAttempts:0,wrongAttempts:0};
    var bundle=exGetForEleve(exercices,eleveName);
    var allExos=bundle.personnels.concat(bundle.classe);
    if(allExos.length===0)return{hasExos:false,totalExos:0,exosDone:0,totalAuto:0,okAuto:0,totalLibres:0,saisiesLibres:0,totalAttempts:0,wrongAttempts:0};
    var eleveKey=san(eleveName);
    var er=(exResults||{})[eleveKey];
    var exosDone=0,totalAuto=0,okAuto=0,totalLibres=0,saisiesLibres=0,totalAttempts=0,wrongAttempts=0;
    ["personnels","classe"].forEach(function(typeKey){
      var pool=typeKey==="personnels"?bundle.personnels:bundle.classe;
      pool.forEach(function(ex,exIdx){
        var items=(ex.items||[]);
        var r=er&&er[typeKey]&&er[typeKey][exIdx];
        if(r&&r.completed)exosDone++;
        items.forEach(function(it,itIdx){
          if(!it)return;
          var attempts=r&&r.attempts&&r.attempts[itIdx]?r.attempts[itIdx]:0;
          if(attempts>0)totalAttempts+=attempts;
          if(it.type==="copie"||it.type==="ecriture"){
            totalLibres++;
            var ansK=typeKey+"_"+exIdx+"_"+itIdx;
            var ans=er&&er.answers&&er.answers[ansK];
            if(ans&&String(ans).trim())saisiesLibres++;
          }else if(it.type==="qcm"||it.type==="trous"||it.type==="reecriture"){
            totalAuto++;
            if(r&&r.items&&r.items[itIdx]===true){okAuto++;wrongAttempts+=Math.max(0,attempts-1)}
            else if(attempts>0){wrongAttempts+=attempts}
          }
        });
      });
    });
    return{hasExos:true,totalExos:allExos.length,exosDone:exosDone,totalAuto:totalAuto,okAuto:okAuto,totalLibres:totalLibres,saisiesLibres:saisiesLibres,totalAttempts:totalAttempts,wrongAttempts:wrongAttempts};
  }

  var eleves=data.eleves.filter(function(e){return!abs[san(e)]});
  var classKeys=data.eleves.map(san);
  var testKeys=[];
  Object.keys(autoCorr).forEach(function(k){if(classKeys.indexOf(k)===-1){eleves.push(k.toUpperCase().replace(/_/g," ")+" (TEST)");testKeys.push(k)}});

  var rows=eleves.map(function(e){
    var isTest=e.indexOf("(TEST)")>=0;
    var k;
    if(isTest){var testIdx=eleves.filter(function(x){return x.indexOf("(TEST)")>=0}).indexOf(e);k=testKeys[testIdx]||san(e.replace(" (TEST)",""))}
    else{k=san(e)}
    var c=p.corrections[k],ac=autoCorr[k];
    var nErr=c?toArr(c.errors).filter(function(e){return e&&e.type!=="A"}).length:0;
    var totalAtt=0,wrongAtt=0;
    if(ac&&ac.attempts){
      var attObj=ac.attempts;
      Object.keys(attObj).forEach(function(ki){
        var n=attObj[ki]||0;totalAtt+=n;

        var fixed=fixLacunesIndices(v.lacunes||[],tokens);
        var changed=fixed.some(function(f,i){var orig=(v.lacunes||[])[i];return orig&&f.tokenIdx!==orig.tokenIdx});
        if(changed){
          var newV=Object.assign({},v,{lacunes:fixed});
          db.ref("correction_dictee/"+dicteeId+"/dictee/amenagee").set(newV);
          setAmen(newV);

  function toggleEnabled(){saveAmen(Object.assign({},amen,{enabled:!amen.enabled}))}
  function setDefaultMode(m){saveAmen(Object.assign({},amen,{defaultMode:m}))}
  function setBase(b){saveAmen(Object.assign({},amen,{base:parseInt(b)||10}))}

  function effectiveLacunes(){return amen&&amen.lacunes?fixLacunesIndices(amen.lacunes,tokens):[]}
  function isLacune(idx){return effectiveLacunes().some(function(l){return l.tokenIdx===idx})}
  function getLacune(idx){return effectiveLacunes().find(function(l){return l.tokenIdx===idx})}
  function addLacune(idx){
    var w=tokens[idx];if(!w||isPunct(w))return;
    // Détection type par GRAMM
    var type="L";
    var distr=suggestDistracteurs(w,2);
    var indice=generateIndice(w,type);
    var raison=generateRaisonnement(w,type);
    var newLac={tokenIdx:idx,word:w,mode:null,type:type,propositions:[w,distr[0],distr[1]],indice:indice,raisonnement:raison};
    var newLacunes=(amen.lacunes||[]).concat([newLac]).sort(function(a,b){return a.tokenIdx-b.tokenIdx});
    saveAmen(Object.assign({},amen,{lacunes:newLacunes}));
    setSelectedTokenIdx(idx);

// ═══ Génère le document HTML imprimable A4 pour la dictée aménagée ═══
function buildAmenageePapierHtml(data,amen,dicteeId){
  var tokens=data.tokens||tokenize(data.text||"");
  var defaultMode=amen.defaultMode||"A";
  var lacunes=fixLacunesIndices(amen.lacunes||[],tokens);
  var lacByIdx={};lacunes.forEach(function(l){lacByIdx[l.tokenIdx]=l});
  var consigne=amen.consigne||generateConsigne(amen);
  var subtitle=competencesSubtitle(data.competences||[]);
  var niveau=(data.niveau||"").toUpperCase();
  var matiere="FRAN\u00c7AIS";
  var headerLine=matiere+(niveau?" \u00b7 "+niveau:"")+" \u00b7 PR\u00c9PARATION \u00c0 LA DICT\u00c9E AM\u00c9NAG\u00c9E";

  function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]})}

  // Construit le texte avec lacunes inline en respectant la règle "pas d'espace avant ponctuation"
  var notesC=[];
  var textHtml="";
  for(var ti=0;ti<tokens.length;ti++){
    var w=tokens[ti];
    var nextW=tokens[ti+1]||"";
    var sp=tokSp(w,nextW);
    var lac=lacByIdx[ti];
    if(!lac){textHtml+=escapeHtml(w)+sp;continue}
    var mode=lac.mode||defaultMode;
    if(mode==="A"){
      var p=lac.propositions||["","",""];
      // Ordre stable pseudo-aléatoire basé sur tokenIdx
      var seed=ti%3;
      var arr=[p[0],p[1],p[2]];
      var shuffled=arr.slice(seed).concat(arr.slice(0,seed));
      textHtml+='<span class="lac lac-A"><span class="props">'+
        '<span class="prop">'+escapeHtml(shuffled[0]||"")+'</span>'+
        '<span class="prop">'+escapeHtml(shuffled[1]||"")+'</span>'+
        '<span class="prop">'+escapeHtml(shuffled[2]||"")+'</span>'+
        '</span><span class="lac-line"></span></span>'+sp;
    } else if(mode==="B"){
      textHtml+='<span class="lac lac-B"><span class="lac-line"></span></span>'+sp;
    } else if(mode==="C"){
      var noteIdx=notesC.length+1;
      notesC.push({num:noteIdx,indice:lac.indice||""});
      textHtml+='<span class="lac lac-C"><span class="lac-line"></span><sup class="note-ref">('+noteIdx+')</sup></span>'+sp;
    }
  }

  var notesHtml="";
  if(notesC.length>0){
    notesHtml='<div class="notes-c"><div class="notes-c-title">Indices</div><ol>';
    notesC.forEach(function(n){
      notesHtml+='<li><strong>('+n.num+')</strong> '+escapeHtml(n.indice)+'</li>';
    });
    notesHtml+='</ol></div>';
  }

  var titre=data.title||"Dict\u00e9e am\u00e9nag\u00e9e";

  return '<!DOCTYPE html>\n<html lang="fr">\n<head>\n<meta charset="UTF-8">\n'+
'<meta name="viewport" content="width=device-width,initial-scale=1">\n'+
'<title>'+escapeHtml(titre)+' \u2014 Version am\u00e9nag\u00e9e</title>\n'+

// Build a standalone HTML document for a single corrected copy (to send to families)
// ═══ HELPERS POUR EXPORT COPIES ═══
function downloadBlob(filename, content, mimeType){
  mimeType = mimeType || "text/html;charset=utf-8";
  var blob = new Blob([content], {type: mimeType});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)}, 100);
}

// Copie robuste vers le presse-papiers avec fallback execCommand
// Retourne une Promise qui résout en true/false selon succès
function copyToClipboard(text){
  return new Promise(function(resolve){
    // Méthode 1 : Clipboard API moderne (HTTPS + permission)
    if(navigator.clipboard && navigator.clipboard.writeText && window.isSecureContext){
      navigator.clipboard.writeText(text).then(function(){resolve(true)}, function(){
        // Si échec, on tente le fallback
        resolve(_legacyCopy(text));
      });
      return;
    }
    // Méthode 2 : fallback execCommand (toujours dispo, mais déprécié)
    resolve(_legacyCopy(text));
  });
}
function _legacyCopy(text){
  try{
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.top = "0"; ta.style.left = "0";
    ta.style.width = "1px"; ta.style.height = "1px";
    ta.style.opacity = "0";
    ta.style.pointerEvents = "none";
    ta.setAttribute("readonly", "");
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    ta.setSelectionRange(0, text.length);
    var ok = document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  } catch(e){
    return false;
  }
}
function sanFilename(s){
  return String(s||"")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9_-]+/g, "_")
    .replace(/^_+|_+$/g, "")
    .toLowerCase()
    .substring(0, 80) || "sans_nom";
}

function buildCopieHtml(data,eleveName,eleveKey,c,ac,dicteeId,options){
  options = options || {};

  var showPoints = options.showPoints !== false;
  var bilanOverride = options.bilanOverride;
  var exercicesUrl = options.exercicesUrl || "";
  var dueDate = options.dueDate || "";

  var code = dicteeId+"-"+eleveKey;
  var errors = toArr(c.errors||[]).filter(function(e){return e!=null});
  var extras = toArr(c.extras||[]).filter(function(e){return e!=null});
  var bilan = (bilanOverride !== undefined) ? bilanOverride : (c.bilanComment || generateBilan(c, data.base));
  var tokens = data.tokens || tokenize(data.text||"");
  var errMap = {}; errors.forEach(function(e){if(e&&e.idx!=null)errMap[e.idx]=e});
  var extraMap = {}; extras.forEach(function(e){if(!extraMap[e.afterIdx])extraMap[e.afterIdx]=[];extraMap[e.afterIdx].push(e)});

  // Récupère ce que l'élève a écrit (transcript prof > historique autocorrection > null)
  function displayTranscript(err, errIdx){
    if (err.fautif) return {text: err.fautif, source: "prof"};
    if (ac && ac.history) {
      var hist = ac.history[errIdx] || ac.history[String(errIdx)];
      if (hist) {
        var entries = toArr(hist);
        if (entries.length > 0) {
          var chain = entries.map(function(e){return typeof e==="object"?e.typed:e}).filter(function(x){return x});
          if (chain.length > 0) return {text: chain[chain.length-1], source: "history"};
        }
      }
    }
    return null;
  }

  function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]})}

  // Barème des points perdus selon le type
  var POINTS = {G:"−1", L:"−0,5", M:"−1", P:"−0,5", I:"−1", A:""};

  // Construction du texte avec spans en couches
  var textHtml = "";
  for (var ti = 0; ti < tokens.length; ti++) {
    var w = tokens[ti];
    // Extras (mots en trop) insérés AVANT le token courant
    if (extraMap[ti-1]) {
      extraMap[ti-1].forEach(function(ex){
        textHtml += '<span class="mot extra-w"><span class="layer-base"><span class="extra-orig">'+escapeHtml(ex.word)+'</span></span><span class="layer-after"><span class="badge badge-extra">+</span><span class="points-perdus">−0,5</span></span></span> ';
      });
    }
    var nextW = tokens[ti+1] || "";
    var sp = tokSp(w, nextW);
    var ev = errMap[ti];
    if (!ev) {
      textHtml += escapeHtml(w) + sp;

    // Mot fautif : on construit toutes les couches, le CSS décidera ce qui s'affiche
    var errIdx = -1;

      if (errors[i] && errors[i].idx === ti) { errIdx = i; break; }
    }
    var typeClass = "type-" + ev.type;
    var disp = displayTranscript(ev, errIdx);
    var origText = (disp && disp.text) ? disp.text : "";  // mode brut = exactement ce que l'élève a écrit ; si pas connu, rien
    var correctText = ev.word;

    // Construction conditionnelle des couches
    var baseHtml = '';
    if (ev.type === "M" || ev.type === "P") {
      // Pour M et P : pas de mot brut, juste la correction en vert si mode=vert
      baseHtml = '<span class="vert">' + escapeHtml(correctText) + '</span>';
    } else {
      baseHtml = '<span class="orig">' + escapeHtml(origText) + '</span>' +
                 '<span class="placeholder"></span>' +
                 '<span class="vert">' + escapeHtml(correctText) + '</span>';
    }
    var topHtml = (ev.type !== "P") ? '<span class="vert-top">' + escapeHtml(correctText) + '</span>' : '';
    var afterHtml = '<span class="vert-after">' + escapeHtml(correctText) + '</span>' +
                    '<span class="badge">' + ev.type + '</span>' +
                    (POINTS[ev.type] ? '<span class="points-perdus">' + POINTS[ev.type] + '</span>' : '');
    var aDataAttr = (ev.type === "A") ? ' data-att="1"' : '';

    textHtml += '<span class="mot faux ' + typeClass + '"' + aDataAttr + '>' +
                '<span class="layer-base">' + baseHtml + '</span>' +
                (topHtml ? '<span class="layer-top">' + topHtml + '</span>' : '') +
                '<span class="layer-after">' + afterHtml + '</span>' +
                '</span>' + sp;
  }
  // Extras après le dernier token
  if (extraMap[tokens.length-1]) {

    });

    var disp = displayTranscript(err, i);

// ═══ MA COPIE (vue épurée pour l'élève — workflow École Directe) ═══
function MaCopie(p){
  var data=p.data;
  var dicteeId=data.dictee.id;
  // Charger les options publiées (mode + toggles tels que le prof a publié)
  var sOpts=useState(null),pubOpts=sOpts[0],setPubOpts=sOpts[1];
  var sPubAt=useState(null),pubAt=sPubAt[0],setPubAt=sPubAt[1];
  var sLoad=useState(true),loading=sLoad[0],setLoading=sLoad[1];
  // Pour le bouton exercices : détecter si la dictée a des exercices
  var sHasJ2=useState(false),hasJ2=sHasJ2[0],setHasJ2=sHasJ2[1];
  var sHasH2=useState(false),hasH2=sHasH2[0],setHasH2=sHasH2[1];
  var hasExos=hasJ2||hasH2;

  React.useEffect(function(){
    var refO=db.ref("correction_dictee/"+dicteeId+"/copyOptions");
    refO.on("value",function(snap){setPubOpts(snap.val()||null);setLoading(false)});
    var refP=db.ref("correction_dictee/"+dicteeId+"/copyPublishedAt");
    refP.on("value",function(snap){setPubAt(snap.val()||null)});
    var refJ=db.ref("correction_dictee/"+dicteeId+"/exercices");
    refJ.on("value",function(snap){setHasJ2(!!snap.val())});
    var refH=db.ref("correction_dictee/"+dicteeId+"/exercices_html");
    refH.on("value",function(snap){setHasH2(!!(snap.val()&&snap.val().content))});
    return function(){refO.off();refP.off();refJ.off();refH.off()};
  },[dicteeId]);

  if(loading)return h("div",{className:"container fade-up",style:{paddingTop:40,textAlign:"center"}},h("p",null,"Chargement\u2026"));

  // Si pas publié → message clair
  if(!pubAt){
    return h("div",{className:"container fade-up",style:{paddingTop:40}},
      h("div",{className:"card",style:{textAlign:"center",padding:30}},
        h("div",{style:{fontSize:"2rem",marginBottom:10}},"\u23f3"),
        h("h2",{style:{marginTop:0}},"Ta correction n\u2019est pas encore consultable"),
        h("p",{style:{color:"var(--muted)"}},"Ton professeur ne l\u2019a pas encore rendue. Reviens un peu plus tard."),
        h("button",{className:"btn btn-ghost",style:{marginTop:14},onClick:p.onLogout},"\u2190 Retour")
      )
    );
  }

  // Reconstruire le HTML de la copie avec les options publiées
  var dictee=data.dictee;
  var corr=dictee.results[data.key];
  var ac=(dictee.autocorrection&&dictee.autocorrection[data.key])||{};
  var opts=pubOpts||{mode:"barre",showOverlay:true,showBadge:true,showPoints:true,linkExercices:true,appUrl:DEFAULT_APP_URL};
  // Préparer dueDate / exercicesUrl si demandé
  var renderOpts={
    mode:opts.mode,
    showOverlay:opts.showOverlay,
    showBadge:opts.showBadge,
    showPoints:opts.showPoints
  };
  if(hasExos&&opts.linkExercices!==false){
    if(opts.dueDate)renderOpts.dueDate=opts.dueDate;
    // Pas besoin de exercicesUrl ici car on a un bouton interne
  }
  var html;
  try {
    html=buildCopieHtml(dictee,data.eleve,data.key,corr,ac,dicteeId,renderOpts);
  } catch(e) {
    return h("div",{className:"container fade-up",style:{paddingTop:40}},
      h("div",{className:"card",style:{textAlign:"center",padding:30}},
        h("h2",null,"\u26a0 Une erreur est survenue"),
        h("p",{style:{color:"var(--muted)",fontSize:".9rem"}},e.message),
        h("button",{className:"btn btn-ghost",style:{marginTop:14},onClick:p.onLogout},"\u2190 Retour")
      )
    );
  }

  // Téléchargement local pour archive
  function telecharger(){
    var filename="dictee_"+sanFilename((dictee.titre||"copie")+"_"+(data.eleve||""))+".html";
    downloadBlob(filename, html);
  }

  return h("div",{style:{display:"flex",flexDirection:"column",minHeight:"100vh"}},
    // Barre de titre simple, sans jargon
    h("div",{style:{padding:"12px 16px",background:"var(--primary)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 8px rgba(0,0,0,.1)"}},
      h("div",null,
        h("div",{style:{fontWeight:700,fontSize:"1.02rem"}},"Ta dict\u00e9e corrig\u00e9e"),
        h("div",{style:{fontSize:".78rem",opacity:.9}},(data.eleve||"")+(dictee.titre?" \u2014 "+dictee.titre:""))
      ),
      h("div",{style:{display:"flex",gap:6,flexWrap:"wrap"}},
        h("button",{onClick:telecharger,title:"Enregistrer cette page pour pouvoir la garder",style:{padding:"6px 12px",background:"rgba(255,255,255,.18)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:6,cursor:"pointer",fontSize:".82rem",fontFamily:"inherit"}},"\u2b07 T\u00e9l\u00e9charger"),
        h("button",{onClick:p.onLogout,title:"Quitter",style:{padding:"6px 12px",background:"rgba(255,255,255,.10)",color:"#fff",border:"1px solid rgba(255,255,255,.2)",borderRadius:6,cursor:"pointer",fontSize:".82rem",fontFamily:"inherit"}},"Quitter")
      )
    ),
    // La copie en iframe (rendu identique à ce que le prof a publié)
    h("iframe",{srcDoc:html,style:{flex:1,width:"100%",border:"none",background:"#faf6ee",minHeight:600},sandbox:""}),
    // Bouton exercices en bas (gros, visible)
    hasExos&&opts.linkExercices!==false&&h("div",{style:{padding:"12px 16px",background:"var(--card2)",borderTop:"1.5px solid var(--border)",display:"flex",justifyContent:"center"}},
      h("button",{onClick:p.onExercices,style:{padding:"12px 24px",background:"var(--green)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:"1rem",fontWeight:700,fontFamily:"inherit",boxShadow:"0 4px 12px rgba(72,160,87,.3)"}},"\ud83c\udfaf Faire mes exercices")
    )
  );
}

// M6bis — Résolution d'une classe du registre insensible à la casse et aux accents.
// (Découverte au test réel : /classes porte "4E BANKSY", les dictées "4e Banksy".)
function classeDuRegistre(nom,source){
  var reg=source||CLASSES||{};
  if(!nom) return undefined;
  if(reg[nom]) return reg[nom];
  var cible=sanMJPC(nom), ks=Object.keys(reg);
  for(var i=0;i<ks.length;i++){ if(sanMJPC(ks[i])===cible) return reg[ks[i]]; }
  return undefined;
}

// M6ter — État d'une dictée pour l'élève. TROIS dimensions se croisent, pas deux :
//   ① la dictée est publiée (config.published)      — filtrée en amont
//   ② la copie est rendue    (copyPublishedAt)      — le professeur a publié les copies
//   ③ le travail de l'élève  (results, autocorrection)
// Tant que ② manque, il n'y a rien à ouvrir et rien à annoncer : ni note, ni « Ouvrir ».
function etatDicteeEleve(d,cle){
  var corr=d.results?d.results[cle]:null;
  if(!corr) return {code:"attente",label:"Pas encore corrig\u00e9e",ouvrable:false,montrerNote:false};
  if(!d.copyPublishedAt) return {code:"nonrendue",label:"Corrig\u00e9e, pas encore rendue",
                                 ouvrable:false,montrerNote:false,date:corr.timestamp||null};
  var ac=(d.autocorrection||{})[cle]||null;
  var total=ac&&typeof ac.total==="number"?ac.total:null;
  var solved=ac&&typeof ac.solved==="number"?ac.solved:0;
  if(total!==null&&total>0&&solved>=total)
    return {code:"terminee",label:"Termin\u00e9e",ouvrable:true,montrerNote:true,date:corr.timestamp||null};
  return {code:"afaire",label:"\u00c0 faire",ouvrable:true,montrerNote:true,date:corr.timestamp||null,
          reste:(total!==null&&total>0)?(total-solved):null};
}

// ═══ APP ÉLÈVE ═══
// M6 — Portail d'identité : code personnel MJPC + nom + prénom (vérifiés contre /codes),
// ou shunt par session MJPC (socle §8) si l'élève est déjà connecté au site.
// Le lien nominatif envoyé aux familles reste fonctionnel : il désigne la copie à ouvrir,
// mais il ne PROUVE plus l'identité — sans session valide, le code est demandé.
function AppEleve(p){
  var s1=useState("login"),screen=s1[0],setScreen=s1[1];
  var s2=useState([]),dictees=s2[0],setDictees=s2[1];
  var s3=useState(""),nomInput=s3[0],setNomInput=s3[1];
  var s4=useState(""),prenomInput=s4[0],setPrenomInput=s4[1];
  var sC=useState(""),codeInput=sC[0],setCodeInput=sC[1];
  var s5=useState(null),eleveData=s5[0],setEleveData=s5[1];
  var s6=useState(""),errMsg=s6[0],setErrMsg=s6[1];
  var s7=useState(null),forcedDicteeId=s7[0],setForcedDicteeId=s7[1];
  var s8=useState(""),dicteeTitle=s8[0],setDicteeTitle=s8[1];
  var sI=useState(null),identite=sI[0],setIdentite=sI[1];        /* {nom, cle} prouvée */
  var sCo=useState(null),codesData=sCo[0],setCodesData=sCo[1];   /* /codes (lecture seule) */
  var sCl=useState(null),classesData=sCl[0],setClassesData=sCl[1];
  var sShunt=useState(false),shuntFait=sShunt[0],setShuntFait=sShunt[1];
  var sAt=useState(null),attente=sAt[0],setAttente=sAt[1];

  var s9=useState(null),autoLoginParams=s9[0],setAutoLoginParams=s9[1];
  var sScrUrl=useState(null),forcedScreenUrl=sScrUrl[0],setForcedScreenUrl=sScrUrl[1];

  // ── Paramètres d'URL : le lien désigne une destination, jamais une identité ──
  useEffect(function(){
    if(typeof URLSearchParams==="undefined")return;
    var params=new URLSearchParams(window.location.search);
    var did=params.get("dictee")||params.get("dicteeId");
    if(did)setForcedDicteeId(did);
    var ek=params.get("eleveKey");
    var sc=params.get("screen");
    if(sc)setForcedScreenUrl(sc);
    if(did&&ek)setAutoLoginParams({dicteeId:did,eleveKey:ek,screen:sc});
  },[]);

  // ── Registres d'identité (lecture seule) ──
  useEffect(function(){
    db.ref("codes").once("value",function(snap){setCodesData(snap.val()||{})},function(){setCodesData({})});
    db.ref("classes").once("value",function(snap){setClassesData(snap.val()||{})},function(){setClassesData({})});
  },[]);

  // ── Dictées disponibles ──
  // La course était le bug : les dictées se construisaient avant l'arrivée du registre,
  // et leur roster restait vide pour toute la session. On attend classesData, et on
  // reconstruit si le registre change.
  useEffect(function(){
    if(!classesData)return;
    db.ref("correction_dictee").once("value",function(snap){
      var val=snap.val()||{};
      var list=Object.keys(val).map(function(id){
        var cfg=val[id].config||{};
        var classeName=cfg.classe||"";
        // Les dictées portent le nom de classe tel qu'il a été saisi ("4e Banksy"),
        // le registre le porte tel qu'il a été importé ("4E BANKSY") : on résout sur
        // la clé canonique, jamais sur la chaîne brute.
        var eleves=extractEleves(classeDuRegistre(classeName,classesData), cfg.eleves);
        return{id:id,title:cfg.title||id,classe:classeName,niveau:cfg.niveau||"",published:cfg.published!==false,
               showNote:cfg.showNote!==false,eleves:eleves,tokens:tokenize(cfg.text||""),base:cfg.base||20,
               results:val[id].results||{},autocorrection:val[id].autocorrection||{},
               copyPublishedAt:val[id].copyPublishedAt||null};
      });
      setDictees(list);
      if(forcedDicteeId){
        var found=list.find(function(d){return d.id===forcedDicteeId});
        if(found)setDicteeTitle(found.title);
      }
    });
  },[forcedDicteeId,classesData]);

  // ── Shunt MJPC (socle §8) : l'élève déjà connecté au site n'a rien à ressaisir ──
  useEffect(function(){
    if(shuntFait||identite||!classesData)return;
    setShuntFait(true);
    var sess=lireSessionMJPC();
    if(!sess||sess.is_prof)return;
    var val=validerEleveMJPC(sess,classesData);
    if(val) setIdentite({nom:val.nom,cle:val.cle,classe:val.classe,via:"session"});
  },[classesData,shuntFait,identite]);

  // ── Les dictées de CET élève (copies existantes, dictées publiées) ──
  // « Mes dictées » = MES dictées, corrigées ou non : toutes celles de ma classe
  // qui sont publiées. Le rattachement se fait par le ROSTER de la dictée (qui couvre
  // la classe et les listes ponctuelles), avec repli sur le nom de classe normalisé.
  function mesDictees(){
    if(!identite)return[];
    return dictees.filter(function(d){
      if(d.published===false)return false;
      var eleves=d.eleves||[];
      for(var i=0;i<eleves.length;i++){ if(san(eleves[i])===identite.cle) return true; }
      if(identite.classe&&d.classe&&sanMJPC(identite.classe)===sanMJPC(d.classe)) return true;
      return !!(d.results&&d.results[identite.cle]);   /* filet : une copie existe */
    });
  }

  function ouvrirDictee(d){
    var corr=d.results?d.results[identite.cle]:null;
    // Pas de copie corrigée : le parcours d'autocorrection se construit sur les erreurs
    // signalées par le professeur — sans elles il n'y a rien à ouvrir. Écran d'attente.
    var et=etatDicteeEleve(d,identite.cle);
    if(!et.ouvrable){setAttente(d);setErrMsg("");setScreen("attente");return}
    var nomRegistre=identite.nom;
    for(var i=0;i<d.eleves.length;i++){ if(san(d.eleves[i])===identite.cle) nomRegistre=d.eleves[i]; }
    setEleveData({eleve:nomRegistre,dictee:d,key:identite.cle,errors:toArr(corr.errors||[]),extras:toArr(corr.extras||[]),note:corr.note,base:d.base});
    setErrMsg("");
    if(forcedScreenUrl==="exercices")setScreen("exercices");
    else if(forcedScreenUrl==="copie")setScreen("copie");
    else setScreen("correction");
  }

  // ── Une fois l'identité prouvée : destination de l'URL, sinon « Mes dictées » ──
  useEffect(function(){
    if(!identite||screen!=="login"||!dictees.length)return;
    var cible=null;
    if(autoLoginParams&&san(autoLoginParams.eleveKey)===identite.cle){
      cible=dictees.find(function(d){return d.id===autoLoginParams.dicteeId});
    } else if(forcedDicteeId){
      cible=dictees.find(function(d){return d.id===forcedDicteeId&&d.results[identite.cle]});
    }
    if(cible) ouvrirDictee(cible);
    else setScreen("mesdictees");
  },[identite,dictees,screen]);

  // ── Vérification du code personnel contre /codes ──
  // Tolère les clés dégradées du registre (dette connue) en retombant sur le champ name.
  function codeAttendu(cle,nomComplet){
    if(!codesData)return null;
    var e=codesData[cle];
    if(typeof e==="string")return e;
    if(e&&e.code)return String(e.code);
    var ks=Object.keys(codesData);
    for(var i=0;i<ks.length;i++){
      var v=codesData[ks[i]];
      if(v&&v.name&&sanMJPC(v.name)===cle) return v.code?String(v.code):null;
      if(sanMJPC(ks[i])===cle) return (typeof v==="string")?v:(v&&v.code?String(v.code):null);
    }
    return null;
  }

  function doLogin(){
    var nom=nomInput.trim().toUpperCase();
    var prenom=prenomInput.trim();
    var code=codeInput.trim();
    if(!nom||!prenom){setErrMsg("Entre ton nom et ton pr\u00e9nom.");return}
    if(!code){setErrMsg("Entre ton code personnel (4 chiffres).");return}

    // Profil de test du professeur — conservé (bac à sable, aucun code requis)
    if(nom==="MENEY"&&prenom.toLowerCase()==="monsieur"){
      var testDict=null;
      for(var ti=0;ti<dictees.length;ti++){if(dictees[ti].tokens.length>0){testDict=dictees[ti];break}}
      if(!testDict){setErrMsg("Aucune dict\u00e9e configur\u00e9e.");return}
      var testErrors=[];var testTokens=testDict.tokens;
      for(var tw=0;tw<testTokens.length&&testErrors.length<5;tw++){
        if(!isPunct(testTokens[tw])&&testTokens[tw].length>2){
          testErrors.push({idx:tw,type:testErrors.length%2===0?"G":"L",word:testTokens[tw]});
        }
      }
      setEleveData({eleve:"MENEY Monsieur",dictee:testDict,key:"meney_monsieur",errors:testErrors,extras:[],note:7.5,base:testDict.base});
      setScreen("correction");return;
    }

    // Le nom doit exister dans un roster (le registre officiel fait foi)
    var registre=classesData||CLASSES||{};
    var rosterComplet=[];
    Object.keys(registre).forEach(function(c){
      extractEleves(registre[c],[]).forEach(function(e){ if(rosterComplet.indexOf(e)<0) rosterComplet.push(e); });
    });
    dictees.forEach(function(d){ (d.eleves||[]).forEach(function(e){ if(rosterComplet.indexOf(e)<0) rosterComplet.push(e); }); });
    var res=resolveEleves(rosterComplet,[{nom:nom,prenom:prenom}]);
    if(res&&res.erreur){setErrMsg("Aucun \u00e9l\u00e8ve \u00e0 ce nom. V\u00e9rifie l\u2019orthographe de ton nom et de ton pr\u00e9nom.");return}
    var moi=res[0];

    var attendu=codeAttendu(moi.cle,moi.nom);
    if(!attendu){setErrMsg("Aucun code n\u2019est enregistr\u00e9 pour toi. Demande \u00e0 ton professeur.");return}
    if(String(code)!==String(attendu)){setErrMsg("Ce code ne correspond pas. V\u00e9rifie tes 4 chiffres.");return}

    setErrMsg("");
    var cls="";
    var kc=Object.keys(registre);
    for(var ci=0;ci<kc.length;ci++){
      var rr=extractEleves(registre[kc[ci]],[]);
      for(var ri=0;ri<rr.length;ri++){ if(san(rr[ri])===moi.cle){cls=kc[ci];break} }
      if(cls)break;
    }
    setIdentite({nom:moi.nom,cle:moi.cle,classe:cls,via:"code"});
  }

  function deconnexion(){
    setIdentite(null);setEleveData(null);setNomInput("");setPrenomInput("");setCodeInput("");
    setErrMsg("");setScreen("login");
  }

  // ── Écran de connexion ──
  if(screen==="login") return h("div",{className:"container fade-up",style:{paddingTop:40}},
    h("div",{className:"card",style:{textAlign:"center"}},
      h("h1",null,dicteeTitle?"Correction : "+dicteeTitle:"Correction de dict\u00e9e"),
      h("p",{className:"subtitle"},"Entre ton code personnel, ton nom et ton pr\u00e9nom."),
      h("div",{style:{maxWidth:340,margin:"0 auto",textAlign:"left"}},
        h("div",{className:"config-field"},h("label",null,"Mon code (4 chiffres)"),
          h("input",{value:codeInput,inputMode:"numeric",maxLength:6,onChange:function(e){setCodeInput(e.target.value)},placeholder:"1234",style:{textAlign:"center",letterSpacing:".3em",fontWeight:700}})),
        h("div",{className:"config-field"},h("label",null,"Nom"),
          h("input",{value:nomInput,onChange:function(e){setNomInput(e.target.value)},placeholder:"DUPONT",style:{textTransform:"uppercase"}})),
        h("div",{className:"config-field"},h("label",null,"Pr\u00e9nom"),
          h("input",{value:prenomInput,onChange:function(e){setPrenomInput(e.target.value)},placeholder:"Marie",onKeyDown:function(e){if(e.key==="Enter")doLogin()}})),
        errMsg&&h("p",{style:{color:"var(--coral)",fontSize:".88rem",marginBottom:8}},errMsg),
        h("button",{className:"btn btn-primary",style:{width:"100%"},onClick:doLogin},"Entrer"),
        h("p",{style:{fontSize:".78rem",color:"var(--muted)",marginTop:10,marginBottom:0}},"Ton code est le m\u00eame que sur le site MJPC. Si tu l\u2019as oubli\u00e9, demande-le \u00e0 ton professeur.")
      )
    ),
    h("button",{className:"btn-sm btn-ghost",style:{marginTop:12},onClick:p.onBack},"\u2190 Retour")
  );

  // ── « Mes dictées » : toutes les dictées de l'élève, corrigées ou non ──
  if(screen==="mesdictees"){
    if(!classesData||!dictees.length) return h("div",{className:"container fade-up",style:{paddingTop:40,textAlign:"center"}},
      h("p",{style:{color:"var(--muted)"}},"Chargement\u2026"));
    var liste=mesDictees();
    return h("div",{className:"container fade-up",style:{paddingTop:30}},
      h("div",{className:"card"},
        h("div",{className:"m6-mobile-col",style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}},
          h("div",null,
            h("h1",{style:{margin:0}},"Mes dict\u00e9es"),
            h("p",{className:"subtitle",style:{marginBottom:0}},identite?identite.nom:"")
          ),
          h("button",{className:"btn-sm btn-ghost",onClick:deconnexion},"Me d\u00e9connecter")
        )
      ),
      h("div",{className:"card"},
        liste.length===0?
          h("p",{style:{color:"var(--text-sub)",margin:0}},"Tu n\u2019as pas encore de dict\u00e9e. Celles de ta classe appara\u00eetront ici."):
          liste.map(function(d){
            var et=etatDicteeEleve(d,identite.cle);
            var c=d.results?d.results[identite.cle]:null;
            return h("div",{key:d.id,className:"m6-mobile-col mesdictees-ligne"+(et.ouvrable?"":" non-ouvrable"),
              style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"11px 14px",
                     border:"1.5px solid var(--border)",borderRadius:10,marginBottom:8,
                     cursor:et.ouvrable?"pointer":"default"},
              onClick:et.ouvrable?function(){ouvrirDictee(d)}:null},
              h("div",null,
                h("div",{style:{fontWeight:600}},d.title),
                h("div",{style:{fontSize:".85rem",color:"var(--text-sub)"}},
                  d.classe,
                  et.date?h("span",null," \u00b7 corrig\u00e9e le "+new Date(et.date).toLocaleDateString("fr-FR")):null
                )
              ),
              h("div",{style:{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}},
                h("span",{className:"etat-dictee etat-"+et.code},et.label),
                (et.montrerNote&&d.showNote!==false&&c&&typeof c.note!=="undefined")?
                  h("span",{style:{fontWeight:700,color:noteColor(c.note,d.base)}},c.note+"/"+d.base):null,
                et.ouvrable?h("span",{style:{color:"var(--primary)",fontWeight:600,fontSize:".9rem"}},"Ouvrir \u2192"):null
              )
            );
          })
      ),
      errMsg&&h("p",{style:{color:"var(--coral)",fontSize:".88rem"}},errMsg)
    );
  }

  // ── Dictée pas encore corrigée : on le dit, on ne fait pas semblant ──
  if(screen==="attente"&&attente){
    return h("div",{className:"container fade-up",style:{paddingTop:30}},
      h("div",{className:"card",style:{textAlign:"center"}},
        h("h1",null,attente.title),
        h("p",{className:"subtitle"},attente.classe),
        h("p",{style:{fontSize:".95rem",color:"var(--text-sub)",maxWidth:420,margin:"0 auto 18px"}},
          identite&&etatDicteeEleve(attente,identite.cle).code==="nonrendue"
            ? "Ta copie est corrig\u00e9e, mais ton professeur ne l\u2019a pas encore rendue. Reviens quand elle sera l\u00e0."
            : "Ta copie n\u2019est pas encore corrig\u00e9e. Quand ton professeur l\u2019aura rendue, tu retrouveras ici tes erreurs \u00e0 revoir."),
        h("button",{className:"btn btn-primary",onClick:function(){setAttente(null);setScreen("mesdictees")}},"\u2190 Mes dict\u00e9es")
      )
    );
  }

  function retourListe(){ setEleveData(null);setAttente(null);setScreen("mesdictees"); }

  if(screen==="correction") return h(EleveCorrection,{data:eleveData,onBack:retourListe,onExercices:function(){setScreen("exercices")}});
  if(screen==="exercices") return h("div",{className:"container fade-up"},
    h(ExercicesEleve,{dicteeId:eleveData.dictee.id,eleve:eleveData.eleve,onBack:function(){
      if(forcedScreenUrl==="copie"||forcedScreenUrl==="exercices"||autoLoginParams)setScreen("copie");
      else setScreen("correction");
    }})
  );
  if(screen==="copie") return h(MaCopie,{data:eleveData,onExercices:function(){setScreen("exercices")},onLogout:retourListe});
  return null;
}

// ═══ CORRECTION ÉLÈVE (module numérique) ═══

// ════════════════════════════════════════════════════════════════════
// MODULE EXERCICES — banque d'exercices personnalisés générée par IA
// Isolé : aucune dépendance avec les composants existants.
// Workflow : prof injecte JSON → élève fait sur papier puis saisit dans
// l'app pour auto-correction → résultats stockés en Firebase.
// ════════════════════════════════════════════════════════════════════

// Prompt IA spécifique à la production de JSON exercices (vs HTML)
// ─── Prompt IA exercices : décomposé en deux zones distinctes ───
// Zone éditable (ce que tu changes pour personnaliser le type d'exos / niveau / thèmes)
var PROMPT_DIRECTIVES_DEFAULT = "Tu es un professeur de fran\u00e7ais expert en didactique. Je te fournis ci-dessous le JSON d'une dict\u00e9e corrig\u00e9e. Tu dois produire un JSON d'exercices personnalis\u00e9s, dans le FORMAT d\u00e9crit plus bas (et rien d'autre, ni HTML, ni commentaire externe).\n\n=== R\u00c8GLES P\u00c9DAGOGIQUES ===\n\n- Exercices_classe : analyse les erreurs faites par AU MOINS 3 \u00e9l\u00e8ves dans le JSON. Pour chaque difficult\u00e9 collective, cr\u00e9e UN exercice avec 4 \u00e0 6 items.\n- Exercices_personnels : pour CHAQUE \u00e9l\u00e8ve ayant fait au moins 3 erreurs, cr\u00e9e 2 \u00e0 4 exercices cibl\u00e9s sur SES erreurs (pas celles des autres). La cl\u00e9 doit \u00eatre le pr\u00e9nom normalis\u00e9 (minuscules, sans accent, espaces remplac\u00e9s par _).\n- ALTERNE les types d'exercices au sein de chaque s\u00e9rie : par exemple un QCM, puis un exo de copie, puis une r\u00e9\u00e9criture, puis un exo d'\u00e9criture libre. Ne fais PAS QUE des QCM \u2014 varie selon ce qui aidera vraiment l'\u00e9l\u00e8ve.\n- Choisis le type d'item selon l'objectif :\n  \u2022 QCM : pour discriminer entre formes proches (homophones, accords ambigus)\n  \u2022 TROUS : pour entra\u00eener un automatisme (conjugaison, terminaison)\n  \u2022 R\u00c9\u00c9CRITURE : pour transformer (changement de temps, de personne, voix active/passive)\n  \u2022 COPIE : pour ancrer l'orthographe lexicale d'un mot/expression difficile (recopier en attention)\n  \u2022 \u00c9CRITURE : pour produire (mobiliser une notion en production libre, faire 2-3 phrases sur consigne)\n- Pour les trous, UN SEUL MOT par null (jamais une expression).\n- Pour reecriture, donne 1 \u00e0 3 variantes accept\u00e9es pour couvrir les flottements normaux (accords libres, ponctuation).\n- Niveau de langue adapt\u00e9 au niveau scolaire indiqu\u00e9 dans le JSON.\n- AUCUN commentaire en dehors du JSON. Le JSON commence par { et se termine par }.";

// Zone fixe (spec technique JSON — modifiable en mode expert si tu veux d'autres types d'items, mais l'app reconnaît officiellement qcm/trous/reecriture)
var PROMPT_FORMAT_DEFAULT = "=== FORMAT JSON DE SORTIE ===\n\n{\n  \"exercices_classe\": [\n    {\n      \"id\": \"ex_classe_1\",\n      \"titre\": \"Titre court\",\n      \"regle\": \"Rappel de r\u00e8gle (max 4 lignes)\",\n      \"items\": [ ... voir types ci-dessous ... ]\n    }\n  ],\n  \"exercices_personnels\": {\n    \"prenom_eleve_normalise\": [ { ... m\u00eame structure ... } ]\n  }\n}\n\n=== TYPES D'ITEMS DISPONIBLES (5 types) ===\n\n1. QCM : un seul bon choix\n{\n  \"type\": \"qcm\",\n  \"enonce\": \"Consigne courte (ex: Choisis la bonne orthographe)\",\n  \"phrase\": \"Phrase avec ___ \u00e0 la place du mot manquant\",\n  \"propositions\": [\"proposition 1\", \"proposition 2\", \"proposition 3\"],\n  \"reponse\": 1\n}\n(reponse = index 0-bas\u00e9 de la bonne proposition)\n\n2. TROUS : phrase \u00e0 trous, un champ par mot\n{\n  \"type\": \"trous\",\n  \"enonce\": \"Compl\u00e8te avec le verbe au bon temps\",\n  \"segments\": [\"Le chat \", null, \" la souris et \", null, \" sur le toit.\"],\n  \"reponses\": [\"attrape\", \"saute\"]\n}\n(segments = tableau alternant cha\u00eenes et null ; null = case \u00e0 remplir ; reponses align\u00e9 sur l'ordre des null. Un null = UN seul mot \u00e0 remplir).\n\n3. R\u00c9\u00c9CRITURE : transformer une phrase\n{\n  \"type\": \"reecriture\",\n  \"enonce\": \"R\u00e9\u00e9cris au pass\u00e9 compos\u00e9\",\n  \"phrase\": \"Phrase de d\u00e9part\",\n  \"reponse_exacte\": \"Phrase attendue\",\n  \"reponses_acceptees\": [\"Variante 1 accept\u00e9e\", \"Variante 2\"]\n}\n(reponses_acceptees facultatif, pour les variantes)\n\n4. COPIE : recopier une phrase en focalisant sur un point pr\u00e9cis\n{\n  \"type\": \"copie\",\n  \"enonce\": \"Recopie cette phrase en faisant bien attention aux accents\",\n  \"phrase\": \"La phrase \u00e0 recopier exactement (souvent contenant le mot/expression cibl\u00e9).\",\n  \"lignes\": 2\n}\n(lignes = nombre de lignes blanches pour la recopie, par d\u00e9faut 2)\n\n5. \u00c9CRITURE : production \u00e9crite libre avec crit\u00e8res\n{\n  \"type\": \"ecriture\",\n  \"enonce\": \"\u00c9cris 3 phrases utilisant les pronoms relatifs lequel et laquelle\",\n  \"criteres\": [\"Au moins 3 phrases\", \"Utiliser lequel et laquelle\", \"Sujet libre\"],\n  \"lignes\": 5\n}\n(criteres = liste de points \u00e0 respecter ; lignes = nombre de lignes blanches pour \u00e9crire)\n\nN.B. : qcm/trous/reecriture sont auto-corrig\u00e9s c\u00f4t\u00e9 \u00e9l\u00e8ve dans l'app. copie/ecriture sont saisis en texte libre c\u00f4t\u00e9 \u00e9l\u00e8ve, et corrig\u00e9s manuellement par le prof.\n\n=== JSON DE LA DICT\u00c9E ===\n{{JSON_DICTEE}}";

// Concatène directives + format en respectant {{DIRECTIVES}} et {{FORMAT}} si présents dans un prompt legacy
function assemblePrompt(directives, format){
  return (directives||PROMPT_DIRECTIVES_DEFAULT) + "\n\n" + (format||PROMPT_FORMAT_DEFAULT);
}


// Normalise une réponse pour comparaison (minuscule, sans accent, espaces réduits, ponctuation finale optionnelle)
function exNormalize(s){
  if(s==null)return "";
  return String(s).trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[\u2019\u2018\u0027\u0060]/g,"'")
    .replace(/\s+/g," ")
    .replace(/[.!?\u2026]+$/,"");
}

// Vérifie si une réponse élève correspond à l'attendu (pour reecriture et trous)
function exCheck(userAnswer, expected, accepted){
  var na = exNormalize(userAnswer);
  if(na===exNormalize(expected))return true;
  if(Array.isArray(accepted)){
    for(var i=0;i<accepted.length;i++){
      if(na===exNormalize(accepted[i]))return true;
    }
  }
  return false;
}

// Vérifie un item complet : retourne {ok:bool, details:[bool,bool,...]}
function exCheckItem(item, userInput){
  if(!item)return{ok:false,details:[]};
  if(item.type==="qcm"){
    var ok = (parseInt(userInput,10)===item.reponse);
    return {ok:ok, details:[ok]};
  }
  if(item.type==="trous"){
    var reps = item.reponses||[];
    var inputs = userInput||[];
    var details = reps.map(function(r,i){
      return exCheck(inputs[i]||"", r, null);
    });
    return {ok:details.every(function(d){return d}), details:details};
  }
  if(item.type==="reecriture"){
    var ok = exCheck(userInput||"", item.reponse_exacte, item.reponses_acceptees);
    return {ok:ok, details:[ok]};
  }
  if(item.type==="copie"){
    // Comparaison stricte sur le texte recopié (normalisation espaces + casse douce)
    var attendu = String(item.phrase||"").trim().replace(/\s+/g," ");
    var saisi = String(userInput||"").trim().replace(/\s+/g," ");
    var ok = (attendu === saisi);
    return {ok:ok, details:[ok], attendu:attendu};
  }
  if(item.type==="ecriture"){
    // Production libre : pas d'auto-correction. On marque "saisi" si non vide.
    var saisi = String(userInput||"").trim();
    var ok = (saisi.length > 0);
    return {ok:ok, details:[ok], libre:true};
  }
  return {ok:false, details:[]};
}

// Normalise un prénom pour matcher avec les clés exercices_personnels
function exKeyForEleve(eleveName){
  if(!eleveName)return "";
  var parts = eleveName.split(/\s+/);
  var prenom = parts.length>1 ? parts[parts.length-1] : eleveName;
  return exNormalize(prenom).replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");
}

// Récupère les exercices applicables à un élève (classe + personnels)
function exGetForEleve(exercicesData, eleveName){
  if(!exercicesData)return{classe:[], personnels:[]};
  var classe = toArr(exercicesData.exercices_classe||[]);
  var key = exKeyForEleve(eleveName);
  var personnels = (exercicesData.exercices_personnels && exercicesData.exercices_personnels[key]) || [];
  personnels = toArr(personnels);
  return {classe:classe, personnels:personnels};
}

  var sProdQuery = useState(""); var prodQuery = sProdQuery[0], setProdQuery = sProdQuery[1];
  var sProdExpanded = useState({}); var prodExpanded = sProdExpanded[0], setProdExpanded = sProdExpanded[1];

  React.useEffect(function(){

  // Listener : statuts des élèves dans autocorrection (pour détecter ceux qui ont fini)
  React.useEffect(function(){
    var refAc = db.ref("correction_dictee/"+p.dicteeId+"/autocorrection");
    function onAc(snap){
      var v = snap.val() || {};
      var done = {};
      Object.keys(v).forEach(function(k){
        if(!v[k]) return;
        // Détection multi-critères :
        // 1. status === "done" (idéal — nouveau code)
        // 2. solved >= total et total > 0 (rattrape les anciens "active"/"offline" qui ont en fait fini)
        var hasDoneStatus = v[k].status === "done";
        var solved = v[k].solved || 0, total = v[k].total || 0;

    var elevesLocal = sortElevesByNom((p && p.data && p.data.eleves) || []);

        var found = null;

  // ─── Génère une fiche d'exercices imprimable depuis le JSON pour un élève ───
  function ficheJsonHtmlPourEleve(eleveName){
    // escapeHtml local (la version globale est définie dans d'autres scopes uniquement)
    function escapeHtml(s){
      return String(s==null?"":s).replace(/[&<>"']/g, function(c){
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
      });
    }
    var ex = exGetForEleve(exercices, eleveName);
    var classe = ex.classe || [];
    var perso = ex.personnels || [];
    if(perso.length===0 && classe.length===0)return null;
    function renderItem(item, idx){
      if(!item || !item.type)return '';
      var enonce = item.enonce ? '<div class="enonce">'+escapeHtml(item.enonce)+'</div>' : '';
      if(item.type==="qcm"){
        // Escape AVANT le replace pour éviter d'injecter du HTML non escapé si la phrase contient < > & "
        var phrase = escapeHtml(item.phrase||"").replace(/___/g,'<span class="trou">_____</span>');
        // QCM en grille 2 colonnes (gain de place majeur)
        var props = (item.propositions||[]).map(function(p,i){
          var letters="ABCDEFGH";
          return '<div class="qcm-prop"><span class="qcm-letter">'+letters[i]+'.</span> <span class="qcm-box">\u25a1</span> '+escapeHtml(p)+'</div>';
        }).join("");
        return '<div class="item"><div class="item-num">'+(idx+1)+'.</div><div class="item-body">'+enonce+'<div class="qcm-phrase">'+phrase+'</div><div class="qcm-props">'+props+'</div></div></div>';
      }
      if(item.type==="trous"){
        var segs = item.segments||[];
        // Si pas de segments OU aucun null dans segments → fallback : afficher la phrase + une ligne de réponse
        var hasBlank = segs.some(function(s){return s===null});
        if(segs.length===0 || !hasBlank){
          var phrase = item.phrase || segs.filter(function(s){return s!==null}).map(function(s){return String(s||"")}).join("");
          return '<div class="item"><div class="item-num">'+(idx+1)+'.</div><div class="item-body">'+enonce+
            '<div class="item-reponse-libre">'+escapeHtml(phrase)+' <span class="ligne-reponse">__________________</span></div></div></div>';
        }
        var phraseHtml = segs.map(function(s){
          if(s===null)return '<span class="trou-input">__________</span>';
          return escapeHtml(String(s||""));
        }).join("");
        return '<div class="item"><div class="item-num">'+(idx+1)+'.</div><div class="item-body">'+enonce+'<div class="trous-phrase">'+phraseHtml+'</div></div></div>';
      }
      if(item.type==="reecriture"){
        return '<div class="item"><div class="item-num">'+(idx+1)+'.</div><div class="item-body">'+enonce+
          '<div class="reec-phrase"><strong>'+escapeHtml(item.phrase||"")+'</strong></div>'+
          '<div class="reec-ligne">\u2192 ____________________________________________________________</div>'+
          '<div class="reec-ligne reec-ligne-2">____________________________________________________________</div></div></div>';
      }
      // COPIE : phrase source bien visible + N lignes blanches pour recopier (par défaut 2)
      if(item.type==="copie"){
        var nLignesC = parseInt(item.lignes,10);
        if(!nLignesC || nLignesC < 1) nLignesC = 2;
        var lignesC = "";
        for(var lc=0; lc<nLignesC; lc++){
          lignesC += '<div class="copie-ligne">____________________________________________________________</div>';
        }
        return '<div class="item"><div class="item-num">'+(idx+1)+'.</div><div class="item-body">'+enonce+
          '<div class="copie-source"><strong>\u00ab '+escapeHtml(item.phrase||"")+' \u00bb</strong></div>'+
          lignesC+'</div></div>';
      }
      // ECRITURE : énoncé + critères en liste + N lignes blanches pour écrire (par défaut 5)
      if(item.type==="ecriture"){
        var nLignesE = parseInt(item.lignes,10);
        if(!nLignesE || nLignesE < 1) nLignesE = 5;
        var lignesE = "";
        for(var le=0; le<nLignesE; le++){
          lignesE += '<div class="ecriture-ligne">____________________________________________________________</div>';
        }
        var criteres = "";
        if(Array.isArray(item.criteres) && item.criteres.length > 0){
          criteres = '<ul class="ecriture-criteres">'+item.criteres.map(function(c){
            return '<li>'+escapeHtml(String(c||""))+'</li>';
          }).join("")+'</ul>';
        }
        return '<div class="item"><div class="item-num">'+(idx+1)+'.</div><div class="item-body">'+enonce+
          criteres + lignesE +
          '</div></div>';
      }
      // Fallback pour tout autre type d'item : énoncé + phrase + ligne de réponse
      if(item.enonce || item.phrase){
        var phr = item.phrase || "";
        return '<div class="item"><div class="item-num">'+(idx+1)+'.</div><div class="item-body">'+enonce+
          (phr ? '<div class="qcm-phrase">'+escapeHtml(phr)+'</div>' : '')+
          '<div class="item-reponse-libre"><span class="ligne-reponse">________________________________</span></div></div></div>';
      }
      return '';
    }
    function renderEx(exo){
      var titre = exo.titre ? '<div class="ex-titre">'+escapeHtml(exo.titre)+'</div>' : '';
      var regle = exo.regle ? '<div class="ex-regle">'+escapeHtml(exo.regle)+'</div>' : '';
      var items = exo.items || [];
      // Si tous les items partagent le MÊME énoncé, on l'affiche une seule fois en tête (gain de place)
      var commonEnonce = null;
      if(items.length>1){
        var first = items[0] && items[0].enonce;
        if(first && items.every(function(it){return it && it.enonce === first})){
          commonEnonce = first;
        }
      }
      var consigne = commonEnonce ? '<div class="consigne">'+escapeHtml(commonEnonce)+'</div>' : '';
      var itemsHtml = items.map(function(it, idx){
        // Si énoncé commun retiré, on passe à renderItem un item sans enonce
        if(commonEnonce){
          var clean = Object.assign({}, it);
          delete clean.enonce;
          return renderItem(clean, idx);
        }
        return renderItem(it, idx);
      }).join("");
      return '<div class="exercice">'+titre+regle+consigne+itemsHtml+'</div>';
    }
    var perHtml = perso.length>0 ? '<section class="section-perso"><h2>\ud83c\udfaf Pour toi</h2>'+perso.map(renderEx).join("")+'</section>' : '';
    var clHtml = classe.length>0 ? '<section class="section-classe"><h2>\ud83d\udcdd Pour la classe</h2>'+classe.map(renderEx).join("")+'</section>' : '';
    var titreDictee = (p.data&&p.data.title)?p.data.title:"";
    // Wrapper <table> avec thead répété : seul mécanisme CSS fiable pour répéter un en-tête sur chaque page imprimée
    var phHtml = '<div class="print-header"><span class="ph-eleve">'+escapeHtml(eleveName)+'</span>'+(titreDictee?'<span class="ph-dictee">'+escapeHtml(titreDictee)+'</span>':'')+'</div>';
    var mainHeader = '<header class="fiche-header"><div class="eleve-nom">'+escapeHtml(eleveName)+'</div>'+(titreDictee?'<div class="dictee-titre">'+escapeHtml(titreDictee)+'</div>':'')+'</header>';
    return '<table class="fiche-eleve">'+
      '<thead><tr><td>'+phHtml+'</td></tr></thead>'+
      '<tbody><tr><td>'+mainHeader+perHtml+clHtml+'</td></tr></tbody>'+
      '</table>';

  // ─── Impression rapide pour les élèves sélectionnés ────────────
  function trouverSectionEleve(doc, eleveName, eleveKey){
    // Essaie plusieurs conventions de structure HTML possibles
    var sels = [
      '[data-eleve="'+eleveName+'"]',
      '[data-eleve-key="'+eleveKey+'"]',
      '[data-name="'+eleveName+'"]',
      '#eleve-'+eleveKey,
      '#exos-'+eleveKey,
      '#fiche-'+eleveKey,
      '#'+eleveKey,
      '.eleve-'+eleveKey,
      '.fiche-'+eleveKey
    ];
    for(var i=0;i<sels.length;i++){
      try{
        var el=doc.querySelector(sels[i]);
        if(el)return el;
      }catch(e){}
    }
    // Fallback : chercher un titre h1/h2/h3 contenant le nom de l'élève
    var hs=doc.querySelectorAll("h1, h2, h3, h4, .eleve, .nom-eleve, .fiche, section, article");
    for(var j=0;j<hs.length;j++){
      var txt=(hs[j].textContent||"").trim();
      if(txt&&txt.indexOf(eleveName)>=0&&txt.length<200){
        // C'est probablement un titre/section. Remonter à l'ancêtre logique (section/article/div parent)
        var parent=hs[j];
        while(parent&&parent.parentElement&&parent.parentElement.tagName&&!/^(SECTION|ARTICLE|MAIN|BODY)$/i.test(parent.tagName)){
          if(parent.tagName==="DIV"&&parent.children.length>1)break;
          parent=parent.parentElement;
        }
        return parent||hs[j];
      }
    }
    return null;
  }

  function _imprimerSelectionImpl(){
    setImpMsg("");
    var hasJsonExos = exercices && (exercices.exercices_classe || exercices.exercices_personnels);
    var hasHtmlExos = exHtml && exHtml.content;
    if(!hasJsonExos && !hasHtmlExos){
      setImpMsg("\u274c Aucun exercice disponible (ni JSON ni HTML).");
      setTimeout(function(){setImpMsg("")},3000);return;
    }
    var selectedNames=Object.keys(selImp).filter(function(k){return selImp[k]});
    if(selectedNames.length===0){setImpMsg("\u274c Coche au moins un \u00e9l\u00e8ve.");setTimeout(function(){setImpMsg("")},3000);return}

    // ─── BRANCHE JSON : génération à la volée d'une fiche imprimable par élève ───
    if(hasJsonExos){
      var fiches=[];
      var notFoundJ=[];
      selectedNames.forEach(function(name){
        var fiche = ficheJsonHtmlPourEleve(name);
        if(fiche)fiches.push(fiche);
        else notFoundJ.push(name);
      });
      if(fiches.length===0){
        setImpMsg("\u274c Aucun exercice trouv\u00e9 pour les \u00e9l\u00e8ves coch\u00e9s : "+notFoundJ.join(", ")+". Ils n\u2019ont peut-\u00eatre pas d\u2019exercices personnels (moins de 3 erreurs ?).");
        return;
      }
      if(notFoundJ.length>0){
        setImpMsg("\u274c Aucune fiche pour : "+notFoundJ.join(", ")+" (pas d\u2019exercices personnels). Aucune impression.");
        return;
      }
      var bodyJ = fiches.join("\n");
      var printHtmlJ = '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Exercices \u00e0 imprimer</title>'+styleImpressionJson()+'</head><body>'+bodyJ+'</body></html>';
      // Affiche dans une overlay (pas de window.open qui peut être bloqué)
      setImpPrintHtml(printHtmlJ);
      setImpMsg("\u2705 "+fiches.length+" fiche(s) pr\u00eate(s). Clique sur \ud83d\udda8 Imprimer en haut.");
      setTimeout(function(){setImpMsg("")},6000);
      return;
    }

    // ─── BRANCHE HTML : détection de sections dans le HTML uploadé ───
    // Parse le HTML d'exercices dans un DOM temporaire
    var parser=new DOMParser();
    var doc=parser.parseFromString(exHtml.content,"text/html");
    // Pour chaque élève sélectionné, trouve sa section
    var sections=[];
    var notFound=[];
    selectedNames.forEach(function(name){
      var key=san(name);
      var sec=trouverSectionEleve(doc,name,key);
      if(sec)sections.push({name:name,html:sec.outerHTML});
      else notFound.push(name);
    });
    // Récupérer head (CSS + meta) pour conserver la mise en forme
    var head=doc.head?doc.head.innerHTML:"";
    var bodyClasses=doc.body?doc.body.className:"";
    // Refus net si aucune section n'est identifiable : pas de fallback caché
    if(sections.length===0){
      setImpMsg("\u274c Aucune section \u00e9l\u00e8ve d\u00e9tect\u00e9e dans le HTML. V\u00e9rifie qu\u2019il contient des marqueurs reconnaissables (ex. data-eleve=\"NOM Pr\u00e9nom\", id=\"eleve-NOM_Prenom\", ou un titre h1\u2013h4 contenant le nom).");
      return;
    }
    // Si certains élèves cochés n'ont pas de section trouvée, on refuse aussi : pas d'impression partielle silencieuse
    if(notFound.length>0){
      setImpMsg("\u274c Section non trouv\u00e9e pour : "+notFound.join(", ")+". Aucune impression. V\u00e9rifie les marqueurs dans le HTML.");
      return;
    }
    // OK : tous les élèves cochés ont une section identifiée
    var body=sections.map(function(s,i){
      return '<div class="mjpc-print-section" style="page-break-after:always;'+(i===sections.length-1?'page-break-after:auto;':'')+'">'+s.html+'</div>';
    }).join("\n");
    var printHtml='<!DOCTYPE html><html lang="fr"><head>'+head+'<style>@media print{.mjpc-print-section{page-break-after:always}.mjpc-print-section:last-child{page-break-after:auto}}</style></head><body class="'+bodyClasses+'">'+body+'</body></html>';
    // Affiche dans une overlay (pas de window.open qui peut être bloqué)
    setImpPrintHtml(printHtml);
    setImpMsg("\u2705 "+sections.length+" fiche(s) pr\u00eate(s). Clique sur \ud83d\udda8 Imprimer en haut.");
    setTimeout(function(){setImpMsg("")},6000);
  }

  function injecter(){
    setErrMsg("");
    var parsed;
    try{ parsed = JSON.parse(jsonInput); }
    catch(e){ setErrMsg("JSON invalide : "+e.message); return; }
    // Validation structurelle minimale
    if(!parsed || typeof parsed!=="object"){setErrMsg("Le JSON doit \u00eatre un objet.");return}
    if(!Array.isArray(parsed.exercices_classe)){setErrMsg("Champ 'exercices_classe' manquant ou invalide (doit \u00eatre un tableau).");return}
    if(!parsed.exercices_personnels || typeof parsed.exercices_personnels!=="object"){setErrMsg("Champ 'exercices_personnels' manquant ou invalide (doit \u00eatre un objet).");return}
    // Validation des types d'items
    function validateItems(items, ctx){
      if(!Array.isArray(items))return ctx+" : items doit \u00eatre un tableau";
      for(var i=0;i<items.length;i++){
        var it = items[i];
        if(!it||!it.type)return ctx+" item "+i+" : type manquant";
        if(it.type==="qcm"){
          if(!Array.isArray(it.propositions)||it.propositions.length<2)return ctx+" item "+i+" : propositions manquantes";
          if(typeof it.reponse!=="number")return ctx+" item "+i+" : reponse (index) manquant";
        } else if(it.type==="trous"){
          if(!Array.isArray(it.segments))return ctx+" item "+i+" : segments manquants";
          if(!Array.isArray(it.reponses))return ctx+" item "+i+" : reponses manquantes";
          var nullCount = it.segments.filter(function(s){return s===null}).length;
          if(nullCount!==it.reponses.length)return ctx+" item "+i+" : "+nullCount+" trous mais "+it.reponses.length+" r\u00e9ponses";
        } else if(it.type==="reecriture"){
          if(!it.reponse_exacte)return ctx+" item "+i+" : reponse_exacte manquante";
        } else {
          return ctx+" item "+i+" : type inconnu '"+it.type+"' (attendu qcm/trous/reecriture)";
        }
      }
      return null;
    }
    for(var i=0;i<parsed.exercices_classe.length;i++){
      var ex = parsed.exercices_classe[i];
      var err = validateItems(ex.items, "Exercice classe '"+(ex.titre||ex.id||i)+"'");
      if(err){setErrMsg(err);return}
    }
    var pk = Object.keys(parsed.exercices_personnels);
    for(var j=0;j<pk.length;j++){
      var exs = parsed.exercices_personnels[pk[j]];
      if(!Array.isArray(exs))continue;
      for(var k=0;k<exs.length;k++){
        var err2 = validateItems(exs[k].items, "Exercice perso '"+pk[j]+"' #"+k);
        if(err2){setErrMsg(err2);return}
      }
    }
    // OK, on enregistre
    db.ref("correction_dictee/"+p.dicteeId+"/exercices").set(parsed).then(function(){
      setMsg("\u2705 Exercices inject\u00e9s avec succ\u00e8s");
      setJsonInput("");setShowInject(false);
      setTimeout(function(){setMsg("")},3000);
    }).catch(function(e){setErrMsg("Erreur Firebase : "+e.message)});
  }

      setMsg(ok ? "\u2705 Prompt + JSON copi\u00e9s" : "\u274c Copie \u00e9chou\u00e9e \u2014 s\u00e9lectionne le texte dans l\u2019aper\u00e7u et fais Ctrl+C");
