// ═══ Génère le document HTML imprimable A4 pour la dictée aménagée ═══
function buildAmenageePapierHtml(data,amen,dicteeId){
  var tokens=data.tokens||tokenize(data.text||"");
  var defaultMode=amen.defaultMode||"A";
  var lacunes=fixLacunesIndices(amen.lacunes||[],tokens);
  var lacByIdx={};lacunes.forEach(function(l){lacByIdx[l.tokenIdx]=l});
  var consigne=amen.consigne||generateConsigne(amen);
  var subtitle=competencesSubtitle(data.competences||[]);
  var niveau=(data.niveau||"").toUpperCase();
  var matiere="FRAN\u00c7AIS";
  var headerLine=matiere+(niveau?" \u00b7 "+niveau:"")+" \u00b7 PR\u00c9PARATION \u00c0 LA DICT\u00c9E AM\u00c9NAG\u00c9E";

  function escapeHtml(s){return String(s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]})}

  // Construit le texte avec lacunes inline en respectant la règle "pas d'espace avant ponctuation"
  var notesC=[];
  var textHtml="";
  for(var ti=0;ti<tokens.length;ti++){
    var w=tokens[ti];
    var nextW=tokens[ti+1]||"";
    var sp=tokSp(w,nextW);
    var lac=lacByIdx[ti];
    if(!lac){textHtml+=escapeHtml(w)+sp;continue}
    var mode=lac.mode||defaultMode;
    if(mode==="A"){
      var p=lac.propositions||["","",""];
      // Ordre stable pseudo-aléatoire basé sur tokenIdx
      var seed=ti%3;
      var arr=[p[0],p[1],p[2]];
      var shuffled=arr.slice(seed).concat(arr.slice(0,seed));
      textHtml+='<span class="lac lac-A"><span class="props">'+
        '<span class="prop">'+escapeHtml(shuffled[0]||"")+'</span>'+
        '<span class="prop">'+escapeHtml(shuffled[1]||"")+'</span>'+
        '<span class="prop">'+escapeHtml(shuffled[2]||"")+'</span>'+
        '</span><span class="lac-line"></span></span>'+sp;
    } else if(mode==="B"){
      textHtml+='<span class="lac lac-B"><span class="lac-line"></span></span>'+sp;
    } else if(mode==="C"){
      var noteIdx=notesC.length+1;
      notesC.push({num:noteIdx,indice:lac.indice||""});
      textHtml+='<span class="lac lac-C"><span class="lac-line"></span><sup class="note-ref">('+noteIdx+')</sup></span>'+sp;
    }
  }

  var notesHtml="";
  if(notesC.length>0){
    notesHtml='<div class="notes-c"><div class="notes-c-title">Indices</div><ol>';
    notesC.forEach(function(n){
      notesHtml+='<li><strong>('+n.num+')</strong> '+escapeHtml(n.indice)+'</li>';
    });
    notesHtml+='</ol></div>';
  }

  var titre=data.title||"Dict\u00e9e am\u00e9nag\u00e9e";

  return '<!DOCTYPE html>\n<html lang="fr">\n<head>\n<meta charset="UTF-8">\n'+
'<meta name="viewport" content="width=device-width,initial-scale=1">\n'+
'<title>'+escapeHtml(titre)+' \u2014 Version am\u00e9nag\u00e9e</title>\n'+
'<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">\n'+
'<style>\n'+
'@page{size:A4;margin:16mm 18mm}\n'+
'*{box-sizing:border-box}\n'+
'body{font-family:"EB Garamond","Crimson Pro",Georgia,serif;max-width:780px;margin:0 auto;padding:18px 22px;color:#1f1b16;background:#faf6ee;line-height:1.55;font-size:12pt}\n'+
'.eyebrow{font-family:"EB Garamond",Georgia,serif;font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:#7a6a52;margin-bottom:4px;font-weight:500}\n'+
'.titre-h1{font-family:"EB Garamond",Georgia,serif;font-size:2.1rem;font-weight:700;letter-spacing:-.01em;color:#1f1b16;margin:0 0 6px 0;line-height:1.1}\n'+
'.sous-titre{font-family:"EB Garamond",Georgia,serif;font-size:.95rem;color:#5a4f3d;font-style:italic;margin-bottom:18px;font-weight:400}\n'+
'.fields-row{display:flex;gap:32px;margin:14px 0 22px 0;font-size:.95rem;align-items:flex-end}\n'+
'.field{display:flex;align-items:baseline;gap:8px}\n'+
'.field label{font-weight:600;color:#1f1b16;flex-shrink:0}\n'+
'.field .line{flex:1;min-width:140px;border-bottom:1px solid #8a7960;height:1.2em;display:inline-block}\n'+
'.consigne-box{background:#f0e7d4;border-radius:6px;padding:14px 18px;font-size:.95rem;color:#3d3424;line-height:1.55;margin:18px 0 24px 0;border:none}\n'+
'.consigne-box strong{font-weight:700;color:#1f1b16}\n'+
'.texte{font-size:1.05rem;line-height:2.4;text-align:left;margin-top:14px}\n'+
'.lac{display:inline-block;vertical-align:baseline;margin:0 3px;position:relative}\n'+
'.lac-line{display:inline-block;border-bottom:1.4px solid #1f1b16;min-width:92px;height:1em;vertical-align:baseline}\n'+
'.lac-A .props{display:block;text-align:center;font-size:.72em;line-height:1.2;white-space:nowrap;margin-bottom:1px;color:#3d3424}\n'+
'.lac-A .props .prop{display:block;font-style:normal}\n'+
'.lac-A .lac-line{min-width:104px}\n'+
'.lac-C .note-ref{font-size:.7em;font-weight:600;color:#5a4f3d;vertical-align:super;margin-left:2px}\n'+
'.notes-c{margin-top:22px;padding:12px 16px 14px 16px;border:1px solid #c9b78d;border-radius:6px;background:#f6efde;font-size:.88rem;line-height:1.55}\n'+
'.notes-c-title{font-weight:700;color:#5a4f3d;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}\n'+
'.notes-c ol{margin:0;padding-left:0;list-style:none}\n'+
'.notes-c li{margin-bottom:5px;padding-left:0}\n'+
'.notes-c li strong{color:#5a4f3d;margin-right:6px}\n'+
'.footer{margin-top:24px;padding-top:10px;border-top:1px solid #d3c5a2;text-align:center;font-size:.7rem;color:#9b8a6e;font-family:"EB Garamond",serif;letter-spacing:.04em}\n'+
'@media print{body{background:#faf6ee;padding:0}.lac-line{border-bottom-color:#000}}\n'+
'</style>\n</head>\n<body>\n'+
'<div class="eyebrow">'+escapeHtml(headerLine)+'</div>\n'+
'<h1 class="titre-h1">'+escapeHtml(titre)+'</h1>\n'+
(subtitle?'<div class="sous-titre">'+escapeHtml(subtitle)+'</div>\n':'')+

function downloadBlob(filename, content, mimeType){
  mimeType = mimeType || "text/html;charset=utf-8";
  var blob = new Blob([content], {type: mimeType});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)}, 100);
}
function sanFilename(s){
  return String(s||"")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-zA-Z0-9_-]+/g, "_")
    .replace(/^_+|_+$/g, "")
    .toLowerCase()
    .substring(0, 80) || "sans_nom";
}
function getCopyOptions(){
  try{
    var v = localStorage.getItem("mjpc_copy_options");
    if(v){var o = JSON.parse(v); if(o&&typeof o==="object")return o;}

  return {mode:"barre", showOverlay:true, showBadge:true, showPoints:true};
}

  var tokens = data.tokens || tokenize(data.text||"");

// ═══ APP ÉLÈVE ═══
function AppEleve(p){
  var s1=useState("login"),screen=s1[0],setScreen=s1[1];
  var s2=useState([]),dictees=s2[0],setDictees=s2[1];
  var s3=useState(""),nomInput=s3[0],setNomInput=s3[1];
  var s4=useState(""),prenomInput=s4[0],setPrenomInput=s4[1];
  var s5=useState(null),eleveData=s5[0],setEleveData=s5[1];
  var s6=useState(""),errMsg=s6[0],setErrMsg=s6[1];
  var s7=useState(null),forcedDicteeId=s7[0],setForcedDicteeId=s7[1];
  var s8=useState(""),dicteeTitle=s8[0],setDicteeTitle=s8[1];

  // Check URL param for specific dictee
  useEffect(function(){
    var params=new URLSearchParams(window.location.search);
    var did=params.get("dictee");
    if(did)setForcedDicteeId(did);
  },[]);

  // Load available dictees
  useEffect(function(){
    db.ref("correction_dictee").once("value",function(snap){
      var val=snap.val()||{};
      var list=Object.keys(val).map(function(id){
        var cfg=val[id].config||{};
        var classeName=cfg.classe||"";
        var fbEleves=CLASSES[classeName];
        var eleves=fbEleves&&fbEleves.length>0?fbEleves:(cfg.eleves||[]);
        return{id:id,title:cfg.title||id,classe:classeName,eleves:eleves,tokens:tokenize(cfg.text||""),base:cfg.base||20,results:val[id].results||{}};
      });
      setDictees(list);
      // If forced dictee, get its title
      if(forcedDicteeId){
        var found=list.find(function(d){return d.id===forcedDicteeId});
        if(found)setDicteeTitle(found.title);
      }
    });
  },[forcedDicteeId]);

  function doLogin(){
    var nom=nomInput.trim().toUpperCase();
    var prenom=prenomInput.trim();
    if(!nom||!prenom){setErrMsg("Entre ton nom et ton pr\u00e9nom.");return}
    // Profil test : Monsieur MENEY — génère des erreurs fictives sur la première dictée disponible
    if(nom==="MENEY"&&prenom.toLowerCase()==="monsieur"){
      var testDict=null;
      for(var ti=0;ti<dictees.length;ti++){if(dictees[ti].tokens.length>0){testDict=dictees[ti];break}}
      if(!testDict){setErrMsg("Aucune dict\u00e9e configur\u00e9e.");return}
      var testErrors=[];var testTokens=testDict.tokens;
      // Marquer quelques mots comme erreurs pour le test
      for(var tw=0;tw<testTokens.length&&testErrors.length<5;tw++){
        if(!isPunct(testTokens[tw])&&testTokens[tw].length>2){
          testErrors.push({idx:tw,type:testErrors.length%2===0?"G":"L",word:testTokens[tw]});
        }
      }
      setEleveData({eleve:"MENEY Monsieur",dictee:testDict,key:"meney_monsieur",errors:testErrors,extras:[],note:7.5,base:testDict.base});
      setScreen("correction");return;
    }
    var full=null,dictee=null,key=null;
    // Search in forced dictee or all dictees
    var searchList=forcedDicteeId?dictees.filter(function(d){return d.id===forcedDicteeId}):dictees;
    for(var i=0;i<searchList.length;i++){
      var d=searchList[i];
      for(var j=0;j<d.eleves.length;j++){
        var e=d.eleves[j];
        var parts=e.split(" ");
        var enom=parts.slice(0,-1).join(" ").toUpperCase();
        var eprenom=parts[parts.length-1];
        if(enom===nom&&eprenom.toLowerCase()===prenom.toLowerCase()){
          var k=san(e);
          if(d.results[k]){
            full=e;dictee=d;key=k;break;
          }
        }
      }
      if(full)break;
    }
    if(!full){setErrMsg("Aucune dict\u00e9e trouv\u00e9e pour "+nom+" "+prenom+". V\u00e9rifie l\u2019orthographe.");return}
    var corr=dictee.results[key];
    var errors=toArr(corr.errors||[]);
    var extras=toArr(corr.extras||[]);
    setEleveData({eleve:full,dictee:dictee,key:key,errors:errors,extras:extras,note:corr.note,base:dictee.base});
    setScreen("correction");
  }

  if(screen==="login") return h("div",{className:"container fade-up",style:{paddingTop:40}},
    h("div",{className:"card",style:{textAlign:"center"}},
      h("h1",null,dicteeTitle?"Correction : "+dicteeTitle:"Correction de dict\u00e9e"),
      h("p",{className:"subtitle"},dicteeTitle?"Entre ton nom et ton pr\u00e9nom pour acc\u00e9der \u00e0 ta copie.":"Connecte-toi pour corriger tes erreurs et gagner des points."),
      h("div",{style:{maxWidth:340,margin:"0 auto"}},
        h("div",{className:"config-field"},h("label",null,"Nom"),h("input",{value:nomInput,onChange:function(e){setNomInput(e.target.value)},placeholder:"DUPONT",style:{textTransform:"uppercase"}})),
        h("div",{className:"config-field"},h("label",null,"Pr\u00e9nom"),h("input",{value:prenomInput,onChange:function(e){setPrenomInput(e.target.value)},placeholder:"Marie",onKeyDown:function(e){if(e.key==="Enter")doLogin()}})),
        errMsg&&h("p",{style:{color:"var(--coral)",fontSize:".88rem",marginBottom:8}},errMsg),
        h("button",{className:"btn btn-primary",onClick:doLogin},"Acc\u00e9der \u00e0 ma dict\u00e9e")
      )
    ),
    h("button",{className:"btn-sm btn-ghost",style:{marginTop:12},onClick:p.onBack},"\u2190 Retour")
  );

  if(screen==="correction") return h(EleveCorrection,{data:eleveData,onBack:function(){setScreen("login");setEleveData(null)},onExercices:function(){setScreen("exercices")}});
  if(screen==="exercices") return h("div",{className:"container fade-up"},
    h(ExercicesEleve,{dicteeId:eleveData.dictee.id,eleve:eleveData.eleve,onBack:function(){setScreen("correction")}})
  );
  return null;
}

// ═══ CORRECTION ÉLÈVE (module numérique) ═══

// ════════════════════════════════════════════════════════════════════
// MODULE EXERCICES — banque d'exercices personnalisés générée par IA
// Isolé : aucune dépendance avec les composants existants.
// Workflow : prof injecte JSON → élève fait sur papier puis saisit dans
// l'app pour auto-correction → résultats stockés en Firebase.
// ════════════════════════════════════════════════════════════════════

// Prompt IA spécifique à la production de JSON exercices (vs HTML)
var PROMPT_IA_EXERCICES_JSON = "Tu es un professeur de fran\u00e7ais expert en didactique. Je te fournis ci-dessous le JSON d'une dict\u00e9e corrig\u00e9e. Tu dois produire un JSON d'exercices personnalis\u00e9s, dans le FORMAT STRICT d\u00e9crit ci-dessous (et rien d'autre, ni HTML, ni commentaire externe).\n\n=== FORMAT JSON DE SORTIE (STRICT) ===\n\n{\n  \"exercices_classe\": [\n    {\n      \"id\": \"ex_classe_1\",\n      \"titre\": \"Titre court\",\n      \"regle\": \"Rappel de r\u00e8gle (max 4 lignes)\",\n      \"items\": [ ... voir types ci-dessous ... ]\n    }\n  ],\n  \"exercices_personnels\": {\n    \"prenom_eleve_normalise\": [ { ... m\u00eame structure ... } ]\n  }\n}\n\n=== TYPES D'ITEMS AUTORIS\u00c9S (3 SEULEMENT) ===\n\n1. QCM : un seul bon choix\n{\n  \"type\": \"qcm\",\n  \"enonce\": \"Consigne courte (ex: Choisis la bonne orthographe)\",\n  \"phrase\": \"Phrase avec ___ \u00e0 la place du mot manquant\",\n  \"propositions\": [\"proposition 1\", \"proposition 2\", \"proposition 3\"],\n  \"reponse\": 1\n}\n(reponse = index 0-bas\u00e9 de la bonne proposition)\n\n2. TROUS : phrase \u00e0 trous, un champ par mot (PAS de saisie libre invariable)\n{\n  \"type\": \"trous\",\n  \"enonce\": \"Compl\u00e8te avec le verbe au bon temps\",\n  \"segments\": [\"Le chat \", null, \" la souris et \", null, \" sur le toit.\"],\n  \"reponses\": [\"attrape\", \"saute\"]\n}\n(segments = tableau alternant cha\u00eenes et null ; null = case \u00e0 remplir ; reponses align\u00e9 sur l'ordre des null. Un null = UN seul mot \u00e0 remplir, pas une expression).\n\n3. R\u00c9\u00c9CRITURE : transformer une phrase\n{\n  \"type\": \"reecriture\",\n  \"enonce\": \"R\u00e9\u00e9cris au pass\u00e9 compos\u00e9\",\n  \"phrase\": \"Phrase de d\u00e9part\",\n  \"reponse_exacte\": \"Phrase attendue\",\n  \"reponses_acceptees\": [\"Variante 1 accept\u00e9e\", \"Variante 2\"]\n}\n(reponses_acceptees facultatif, pour les variantes type accord ou ponctuation finale optionnelle)\n\n=== R\u00c8GLES IMP\u00c9RATIVES ===\n\n- Exercices_classe : analyse les erreurs faites par AU MOINS 3 \u00e9l\u00e8ves dans le JSON. Pour chaque difficult\u00e9 collective, cr\u00e9e UN exercice avec 4 \u00e0 6 items.\n- Exercices_personnels : pour CHAQUE \u00e9l\u00e8ve ayant fait au moins 3 erreurs, cr\u00e9e 1 \u00e0 3 exercices cibl\u00e9s sur SES erreurs (pas celles des autres). La cl\u00e9 doit \u00eatre le pr\u00e9nom normalis\u00e9 (minuscules, sans accent, espaces remplac\u00e9s par _).\n- Privil\u00e9gie les items \"trous\" et \"qcm\" (auto-corrigeables sans ambigu\u00eft\u00e9). Utilise \"reecriture\" seulement si pertinent (transformation, conjugaison).\n- Pour les trous, UN SEUL MOT par null (jamais une expression).\n- Pour reecriture, donne 1 \u00e0 3 variantes accept\u00e9es pour couvrir les flottements normaux (accords libres, ponctuation).\n- Niveau de langue adapt\u00e9 au niveau scolaire indiqu\u00e9 dans le JSON.\n- AUCUN commentaire en dehors du JSON. Le JSON commence par { et se termine par }.\n\n=== JSON DE LA DICT\u00c9E ===\n{{JSON_DICTEE}}";

// Normalise une réponse pour comparaison (minuscule, sans accent, espaces réduits, ponctuation finale optionnelle)
function exNormalize(s){
  if(s==null)return "";
  return String(s).trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[\u2019\u2018\u0027\u0060]/g,"'")
    .replace(/\s+/g," ")
    .replace(/[.!?\u2026]+$/,"");
}

// Vérifie si une réponse élève correspond à l'attendu (pour reecriture et trous)
function exCheck(userAnswer, expected, accepted){
  var na = exNormalize(userAnswer);
  if(na===exNormalize(expected))return true;
  if(Array.isArray(accepted)){
    for(var i=0;i<accepted.length;i++){
      if(na===exNormalize(accepted[i]))return true;
    }
  }
  return false;
}

// Vérifie un item complet : retourne {ok:bool, details:[bool,bool,...]}
function exCheckItem(item, userInput){
  if(!item)return{ok:false,details:[]};
  if(item.type==="qcm"){
    var ok = (parseInt(userInput,10)===item.reponse);
    return {ok:ok, details:[ok]};
  }
  if(item.type==="trous"){
    var reps = item.reponses||[];
    var inputs = userInput||[];
    var details = reps.map(function(r,i){
      return exCheck(inputs[i]||"", r, null);
    });
    return {ok:details.every(function(d){return d}), details:details};
  }
  if(item.type==="reecriture"){
    var ok = exCheck(userInput||"", item.reponse_exacte, item.reponses_acceptees);
    return {ok:ok, details:[ok]};
  }
  return {ok:false, details:[]};
}

// Normalise un prénom pour matcher avec les clés exercices_personnels
function exKeyForEleve(eleveName){
  if(!eleveName)return "";
  var parts = eleveName.split(/\s+/);
  var prenom = parts.length>1 ? parts[parts.length-1] : eleveName;
  return exNormalize(prenom).replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");
}

// Récupère les exercices applicables à un élève (classe + personnels)
function exGetForEleve(exercicesData, eleveName){
  if(!exercicesData)return{classe:[], personnels:[]};
  var classe = toArr(exercicesData.exercices_classe||[]);
  var key = exKeyForEleve(eleveName);
  var personnels = (exercicesData.exercices_personnels && exercicesData.exercices_personnels[key]) || [];
  personnels = toArr(personnels);
  return {classe:classe, personnels:personnels};
}

      if(!Array.isArray(items))return ctx+" : items doit \u00eatre un tableau";
      for(var i=0;i<items.length;i++){
        var it = items[i];
        if(!it||!it.type)return ctx+" item "+i+" : type manquant";
        if(it.type==="qcm"){
          if(!Array.isArray(it.propositions)||it.propositions.length<2)return ctx+" item "+i+" : propositions manquantes";

        } else if(it.type==="trous"){
          if(!Array.isArray(it.segments))return ctx+" item "+i+" : segments manquants";
          if(!Array.isArray(it.reponses))return ctx+" item "+i+" : reponses manquantes";
          var nullCount = it.segments.filter(function(s){return s===null}).length;
          if(nullCount!==it.reponses.length)return ctx+" item "+i+" : "+nullCount+" trous mais "+it.reponses.length+" r\u00e9ponses";
        } else if(it.type==="reecriture"){
          if(!it.reponse_exacte)return ctx+" item "+i+" : reponse_exacte manquante";
        } else {
          return ctx+" item "+i+" : type inconnu '"+it.type+"' (attendu qcm/trous/reecriture)";
        }
      }
      return null;
    }
    for(var i=0;i<parsed.exercices_classe.length;i++){
      var ex = parsed.exercices_classe[i];
      var err = validateItems(ex.items, "Exercice classe '"+(ex.titre||ex.id||i)+"'");
      if(err){setErrMsg(err);return}
    }
    var pk = Object.keys(parsed.exercices_personnels);

        var err2 = validateItems(exs[k].items, "Exercice perso '"+pk[j]+"' #"+k);

      }

      setMsg("\u2705 Exercices inject\u00e9s avec succ\u00e8s");

    }).catch(function(e){setErrMsg("Erreur Firebase : "+e.message)});

    db.ref("correction_dictee/"+p.dicteeId+"/exercices_results").remove();

    setTimeout(function(){setMsg("")},3000);

      h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
        h("button",{className:"btn-sm btn-ghost",onClick:function(){setShowPrompt(true)},title:"Voir le prompt IA pour g\u00e9n\u00e9rer un JSON d'exercices"},"\ud83e\udd16 Prompt IA"),
        h("button",{className:"btn btn-primary",onClick:function(){setShowInject(true);setErrMsg("")},title:"Coller un JSON g\u00e9n\u00e9r\u00e9 par l'IA"},"\ud83d\udce5 Injecter un JSON"),
        exercices&&h("button",{className:"btn-sm",onClick:supprimer,style:{background:"rgba(197,48,48,.1)",color:"#c53030"},title:"Supprimer la banque actuelle et tous les r\u00e9sultats"},"\u2715 Supprimer")
      )
    ),
    showPrompt&&h(PromptIaExoModal,{data:data,corrections:p.corrections,absents:p.absents,onClose:function(){setShowPrompt(false)}}),
    msg&&h("div",{style:{padding:"10px 14px",background:"rgba(72,160,87,.15)",color:"#1b6a30",borderRadius:8,marginBottom:10,fontWeight:600}},msg),
    showInject&&h("div",{className:"card",style:{border:"2px solid var(--primary)",marginBottom:12}},

  var normCompare=function(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[\u2019\u2018\u0027\u0060\u00b4]/g,"'")};

            onKeyDown:function(e){if(e.key==="Enter")tryAnswer()}}),
          h("button",{className:"btn-sm btn-primary",style:{padding:"10px 16px"},onClick:tryAnswer},"\u2713")
        ),
        feedback&&h("div",{style:{marginTop:8,fontSize:".88rem",fontWeight:600,color:feedback.correct?"var(--green)":"var(--coral)",textAlign:"center"}},
          feedback.correct?"\u2713 Correct ! \u00ab "+feedback.answer+" \u00bb":"\u2717 R\u00e9essaie !"
        )
      )
    )
  );
}
</script>
</body>
</html>
