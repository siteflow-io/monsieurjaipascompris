<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Correction dictée</title>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fafaf8;--card:#fff;--card2:#f5f4f0;--text:#1a1a1a;--text-sub:#6b6b6b;--muted:#999;
  --border:#e5e3de;--primary:#2563eb;--primary-light:rgba(37,99,235,0.08);
  --coral:#c53030;--coral-light:rgba(197,48,48,0.08);
  --green:#276749;--green-light:rgba(39,103,73,0.08);
  --orange:#975a16;--orange-light:rgba(151,90,22,0.08);
  --lexique:#2B6CB0;--lexique-light:rgba(43,108,203,0.08);
  --absent:#7c3aed;--absent-light:rgba(124,58,237,0.08);
  --amber:#b7791f;--amber-light:rgba(183,121,31,0.08);
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Literata',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:760px;margin:0 auto;padding:20px 16px 80px}
.container-wide{max-width:1300px;margin:0 auto;padding:20px 16px 80px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow)}
h1{font-size:1.5rem;font-weight:700;margin-bottom:4px}
h2{font-size:1.2rem;font-weight:700;margin-bottom:8px}
.subtitle{font-size:.92rem;color:var(--text-sub);margin-bottom:16px}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:1rem;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--text-sub)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-sm{display:inline-block;width:auto;padding:8px 16px;font-size:.9rem;border-radius:10px}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{flex:1}
select,input,textarea{font-family:inherit;font-size:1rem;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;width:100%;outline:none;background:var(--card);color:var(--text)}
select:focus,input:focus,textarea:focus{border-color:var(--primary)}
textarea{resize:vertical;min-height:120px}
.fade-up{animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
/* Statut "terminé" : pulsation douce une seule fois au passage à done, puis état stable avec liseré vert à gauche */
@keyframes done-pulse{
  0%{box-shadow:inset 4px 0 0 var(--green), 0 0 0 0 rgba(72,160,87,.5)}
  50%{box-shadow:inset 4px 0 0 var(--green), 0 0 0 6px rgba(72,160,87,0)}
  100%{box-shadow:inset 4px 0 0 var(--green), 0 0 0 0 rgba(72,160,87,0)}
}
.blink-done{
  box-shadow:inset 4px 0 0 var(--green);
  animation:done-pulse 2s ease-out 2;  /* pulse 2 fois (4s total) puis se calme */
}
.fast-word{font-size:2.2rem;font-weight:800;text-align:center;padding:30px 20px;min-height:120px;display:flex;align-items:center;justify-content:center;animation:fadeUp .2s ease}
.fast-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.fast-btn{padding:18px 10px;border-radius:14px;font-size:1.1rem;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.fast-ok{background:#e8f5e9;color:#276749;font-size:1.3rem}.fast-ok:active{background:#c8e6c9}
.fast-g{background:rgba(197,48,48,.08);color:#c53030}.fast-g:active{background:rgba(197,48,48,.2)}
.fast-l{background:rgba(43,108,203,.08);color:#2b6cb0}.fast-l:active{background:rgba(43,108,203,.2)}
.fast-m{background:rgba(151,90,22,.08);color:#975a16}.fast-m:active{background:rgba(151,90,22,.2)}
.fast-i{background:rgba(124,58,237,.08);color:#7c3aed}.fast-i:active{background:rgba(124,58,237,.2)}
.fast-p{background:rgba(43,108,203,.08);color:#2b6cb0}.fast-p:active{background:rgba(43,108,203,.2)}
.fast-a{background:rgba(183,121,31,.08);color:#b7791f}.fast-a:active{background:rgba(183,121,31,.2)}
/* ═══ CSS dictée aménagée ═══ */
.pap-badge{display:inline-block;padding:1px 6px;background:#e0f2fe;color:#0369a1;border-radius:6px;font-size:.65rem;font-weight:700;margin-left:4px;letter-spacing:.03em}
.lacune-hl{background:rgba(252,211,77,.35);padding:1px 4px;border-radius:3px;border-bottom:2px dashed #b45309}
.lacune-hl-active{background:rgba(252,211,77,.7);outline:2px solid #b45309;outline-offset:2px}
.amenagee-card{background:rgba(252,211,77,.04);border:1.5px solid rgba(180,83,9,.2)}
.lacune-tile{padding:8px 10px;border:1.5px solid #ddd;border-radius:8px;background:#fff;margin-bottom:6px;cursor:pointer;transition:all .15s}
.lacune-tile:hover{border-color:#b45309;background:#fef9ec}
.lacune-tile.selected{border-color:#b45309;background:rgba(252,211,77,.15);border-width:2px}
.lacune-prop{display:inline-block;padding:2px 8px;margin:2px;border-radius:6px;background:#f3f4f6;font-size:.85rem;font-family:Georgia,serif}
.lacune-prop.correct{background:rgba(39,103,73,.12);color:#276749;font-weight:600}
.lacune-prop.distract{background:#fafaf0;color:#666}
.mode-pill{display:inline-block;padding:1px 8px;border-radius:6px;font-size:.7rem;font-weight:700;margin-left:6px}
.mode-A{background:rgba(43,108,203,.12);color:#2b6cb0}
.mode-B{background:rgba(124,58,237,.12);color:#7c3aed}
.mode-C{background:rgba(183,121,31,.12);color:#b7791f}
.fast-flash{animation:fastFlash .4s ease}
@keyframes fastFlash{0%{transform:scale(1)}30%{transform:scale(1.1)}100%{transform:scale(1)}}
.tooltip-wrap{position:relative;cursor:help}
.tooltip-wrap .tooltip-content{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 12px;border-radius:8px;font-size:.8rem;white-space:pre-line;z-index:100;min-width:140px;max-width:min(280px,calc(100vw - 32px));box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;line-height:1.5;margin-bottom:6px}
.tooltip-wrap:hover .tooltip-content,.tooltip-wrap:focus .tooltip-content,.tooltip-wrap:active .tooltip-content,.tooltip-wrap:focus-within .tooltip-content{display:block}
.tooltip-wrap.tip-right .tooltip-content{left:auto;right:0;transform:none}
.tooltip-wrap.tip-left .tooltip-content{left:0;right:auto;transform:none}
.tooltip-wrap.tip-below .tooltip-content{bottom:auto;top:100%;margin-bottom:0;margin-top:6px}
/* Score bar */
.score-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card2);border-radius:12px;margin-bottom:14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.score-val{font-size:1.8rem;font-weight:700;min-width:60px;text-align:center}
.score-info{flex:1;font-size:.88rem;color:var(--text-sub);line-height:1.8}
.score-eleve{font-size:1rem;font-weight:700;color:var(--text)}
/* Word grid */
.word-grid{line-height:2.2;padding:8px 0;position:relative}
.word-line-pulse{position:absolute;left:-6px;right:-6px;background:rgba(37,99,235,.10);border-radius:6px;pointer-events:none;z-index:0;transition:top .25s ease,height .25s ease;animation:linePulse 2s ease-in-out infinite}
@keyframes linePulse{0%,100%{background:rgba(37,99,235,.08)}50%{background:rgba(37,99,235,.20)}}
.word-grid>.word-btn,.word-grid>.extra-word,.word-grid>.insert-zone{position:relative;z-index:1}
.word-btn{display:inline-block;padding:4px 6px;margin:3px 1px;border-radius:6px;font-size:1.1rem;line-height:1.5;cursor:pointer;border:2px solid transparent;background:transparent;color:var(--text);font-family:inherit;font-weight:400;transition:all .15s}
.word-btn:hover{background:rgba(0,0,0,.04)}
.word-btn.punct{padding:1px 2px;margin:0;font-size:.95rem}
.word-btn.err-g{border-color:var(--coral);background:var(--coral-light);color:var(--coral);font-weight:600}
.word-btn.err-l{border-color:var(--lexique);background:var(--lexique-light);color:var(--lexique);font-weight:600}
.word-btn.err-m{border-color:var(--absent);background:var(--absent-light);color:var(--absent);font-weight:600;text-decoration:line-through}
.word-btn.err-i{border-color:var(--orange);background:var(--orange-light);color:var(--orange);font-weight:600;font-style:italic}
.word-btn.err-p{border-color:var(--lexique);background:var(--lexique-light);color:var(--lexique);font-weight:600;font-style:italic}
.word-btn.err-a{border-color:var(--amber);background:var(--amber-light);color:var(--amber);font-weight:600;text-decoration:underline wavy var(--amber)}
.word-btn.last-touched{box-shadow:0 0 0 3px rgba(37,99,235,0.35);transform:scale(1.05)}
.insert-zone{display:inline-block;width:12px;height:18px;cursor:pointer;vertical-align:middle;position:relative;opacity:0;transition:opacity .15s;margin:0 -1px}
.insert-zone:hover{opacity:1!important}
.word-grid:hover .insert-zone{opacity:.25}
.insert-zone::after{content:'+';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--primary);background:var(--primary-light);border-radius:3px}
.extra-word{display:inline-flex;align-items:center;gap:2px;padding:3px 7px;margin:3px 1px;border-radius:6px;font-size:.92rem;background:rgba(37,99,235,.08);border:2px dashed var(--primary);color:var(--primary);font-weight:600;cursor:pointer}
.extra-word:hover{background:rgba(37,99,235,.15);text-decoration:line-through}
/* Popup */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.popup-box{background:var(--card);border-radius:18px;padding:28px;max-width:380px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.18);text-align:center}
.popup-word{font-size:1.3rem;font-weight:700;margin-bottom:6px}
.popup-hint{font-size:.88rem;color:var(--muted);margin-bottom:16px}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.popup-btn{padding:14px 8px;border-radius:14px;border:2.5px solid transparent;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .15s}
.popup-btn-g{background:var(--coral-light);color:var(--coral);border-color:rgba(197,48,48,.2)}
.popup-btn-g:hover{background:var(--coral);color:#fff}
.popup-btn-l{background:var(--lexique-light);color:var(--lexique);border-color:rgba(43,108,203,.2)}
.popup-btn-l:hover{background:var(--lexique);color:#fff}
.popup-btn-m{background:var(--absent-light);color:var(--absent);border-color:rgba(124,58,237,.2)}
.popup-btn-m:hover{background:var(--absent);color:#fff}
.popup-btn-i{background:var(--orange-light);color:var(--orange);border-color:rgba(151,90,22,.2)}
.popup-btn-i:hover{background:var(--orange);color:#fff}
.popup-btn-p{background:var(--lexique-light);color:var(--lexique);border-color:rgba(43,108,203,.2)}
.popup-btn-p:hover{background:var(--lexique);color:#fff}
.popup-btn-a{background:var(--amber-light);color:var(--amber);border-color:rgba(183,121,31,.2)}
.popup-btn-a:hover{background:var(--amber);color:#fff}
.popup-cancel{margin-top:14px;font-size:.88rem;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit}
.popup-cancel:hover{color:var(--text)}
/* Eleve grid */
.eleve-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.eleve-card{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.eleve-card:hover{border-color:var(--primary);background:var(--primary-light)}
.eleve-card.done{border-color:var(--green);background:var(--green-light)}
.eleve-card.absent{opacity:.45;border-style:dashed;pointer-events:none;cursor:default}
.eleve-name{font-weight:600;font-size:.92rem}
.eleve-note{font-size:.85rem;font-weight:700}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:10px;border:none;background:transparent;font-family:inherit;font-size:.92rem;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.tab.active{background:var(--primary);color:#fff}
/* ── M6 : navigation deux niveaux (Pilotage / Données / Réglages + ?) ── */
.nav2{margin-bottom:16px}
.nav2-groupes{display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-bottom:1.5px solid var(--border);padding-bottom:8px;margin-bottom:8px}
.nav2-groupe{padding:8px 16px;border-radius:10px 10px 0 0;border:none;background:transparent;font-family:inherit;font-size:.95rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
.nav2-groupe:hover{color:var(--text)}
.nav2-groupe.active{background:var(--card2);color:var(--text)}
.nav2-sous{display:flex;gap:4px;flex-wrap:wrap;min-height:34px}
.nav2-aide{margin-left:auto;width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);color:var(--text-sub);font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;flex-shrink:0}
.nav2-aide:hover{border-color:var(--primary);color:var(--primary)}
.etat-dictee{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:600;white-space:nowrap}
.etat-attente{background:var(--card2);color:var(--text-sub);border:1px solid var(--border)}
.etat-afaire{background:var(--primary-light);color:var(--primary);border:1px solid var(--primary)}
.etat-nonrendue{background:var(--card2);color:var(--text-sub);border:1px dashed var(--border)}
.mesdictees-ligne.non-ouvrable{opacity:.72}
.mesdictees-ligne.non-ouvrable:hover{border-color:var(--border)}
.etat-terminee{background:var(--card2);color:var(--text-sub);border:1px solid var(--border);opacity:.85}
.mesdictees-ligne:hover{border-color:var(--primary)}
.version-pill{display:inline-block;padding:2px 9px;border-radius:20px;background:var(--card2);border:1px solid var(--border);color:var(--muted);font-size:.7rem;font-weight:600;letter-spacing:.02em;user-select:none}
/* Modale d'aide */
.m6-modal-fond{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:2000;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.m6-modal{background:var(--card);border-radius:14px;border:1.5px solid var(--border);max-width:620px;width:100%;padding:22px 24px;box-shadow:0 12px 40px rgba(0,0,0,.18)}
.m6-modal h2{margin-top:0}
.m6-modal h3{font-size:.95rem;margin:18px 0 6px}
.m6-modal p,.m6-modal li{font-size:.9rem;color:var(--text-sub);line-height:1.55}
/* ── M6 : responsive mobile (390 px) ── */
@media (max-width:480px){
  .nav2-groupes{gap:4px;padding-bottom:6px}
  .nav2-groupe{padding:7px 11px;font-size:.88rem;flex:1 1 auto}
  .nav2-sous{gap:3px}
  .tab{padding:6px 11px;font-size:.85rem}
  .nav2-aide{width:28px;height:28px;font-size:.88rem}
  .m6-modal{padding:16px 15px;border-radius:12px}
  .m6-mobile-col{flex-direction:column!important;align-items:stretch!important}
}
/* Bilan table */
.bilan-table{width:100%;border-collapse:collapse;font-size:.86rem}
.bilan-table th{text-align:left;padding:6px 8px;border-bottom:2px solid var(--border);font-weight:600;color:var(--text-sub)}
.bilan-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.bilan-table tr:hover{background:var(--card2)}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.78rem;font-weight:600;margin-right:2px}
.badge-g{background:var(--coral-light);color:var(--coral)}
.badge-l{background:var(--lexique-light);color:var(--lexique)}
.badge-m{background:var(--absent-light);color:var(--absent)}
.badge-i{background:var(--orange-light);color:var(--orange)}
.badge-p{background:var(--lexique-light);color:var(--lexique)}
.badge-a{background:var(--amber-light);color:var(--amber)}
.badge-x{background:var(--primary-light);color:var(--primary)}
.config-field{margin-bottom:14px}
.config-field label{display:block;font-size:.85rem;font-weight:600;color:var(--text-sub);margin-bottom:4px}
/* Progress bar */
.progress-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.info-i{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.06);color:var(--muted);font-size:.7rem;font-weight:700;cursor:help;margin-left:4px;position:relative;font-style:italic;flex-shrink:0;user-select:none;font-family:Georgia,serif}
.info-i:hover,.info-i:focus{background:rgba(37,99,235,.1);color:#2563eb}
.info-i .info-tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 12px;border-radius:8px;font-size:.78rem;font-weight:400;font-style:normal;white-space:normal;width:max-content;max-width:min(260px,calc(100vw - 32px));z-index:200;box-shadow:0 4px 16px rgba(0,0,0,.3);line-height:1.5;text-align:left;pointer-events:none}
.info-i.tip-right .info-tip{left:auto;right:0;transform:none}
.info-i.tip-left .info-tip{left:0;right:auto;transform:none}
.info-i.tip-below .info-tip{bottom:auto;top:calc(100% + 6px)}
.info-i:hover .info-tip,.info-i:focus .info-tip,.info-i:active .info-tip{display:block}
</style>
</head>

<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script>
var h=React.createElement,useState=React.useState,useEffect=React.useEffect;
firebase.initializeApp({apiKey:"AIzaSyD2ZcVITz80UTUZWiWmTg13PGLyPNMV6MY",authDomain:"mjpc-hub.firebaseapp.com",databaseURL:"https://mjpc-hub-default-rtdb.europe-west1.firebasedatabase.app",projectId:"mjpc-hub",storageBucket:"mjpc-hub.firebasestorage.app",messagingSenderId:"1037162673483",appId:"1:1037162673483:web:19b61a10dd7a1c21d9a4ce"});
var db=firebase.database();
function san(n){return sanMJPC(n)} /* alias historique → clé canonique MJPC-CORE */
var TYPE_COST={G:1,L:0.5,M:1,I:1,X:0.5,P:0.5,A:0};
var CLASSES={};
// Load classes from Firebase
db.ref("classes").once("value",function(snap){
  var val=snap.val();
  if(val) CLASSES=val;
});
// Extraction robuste des élèves d'une classe — gère plusieurs formats Firebase :
//  - array de strings : ["NOM Prenom", ...]
//  - objet {eleves: [...]} : structure MJPC v2
//  - map {id: {nom, prenom}} : structure MJPC v3
//  - map {id: "NOM Prenom"} : format intermédiaire
//  - fallback : eleves du config de la dictée
// ─── Recherche/tri des élèves (unifié pour tous les onglets) ───────────
function getEleveNomPrenom(name){
  if(!name)return{nom:"",prenom:""};
  var parts=String(name).trim().split(/\s+/);
  return{nom:parts[0]||"", prenom:parts.slice(1).join(" ")||""};
}
function sortElevesByNom(eleves){
  return(eleves||[]).slice().sort(function(a,b){
    return getEleveNomPrenom(a).nom.localeCompare(getEleveNomPrenom(b).nom,"fr",{sensitivity:"base"});
  });
}
function matchEleveInitials(eleveName, query){
  if(!query||!query.trim())return true;
  var np=getEleveNomPrenom(eleveName);
  var nomU=np.nom.toUpperCase(),prenomU=np.prenom.toUpperCase();
  var n1=nomU.charAt(0),p1=prenomU.charAt(0);
  var q=query.trim().toUpperCase().replace(/\s+/g,"");
  // Match exact 2 lettres : NOM+PRENOM ou PRENOM+NOM
  if(q.length===2){
    if((n1+p1)===q||(p1+n1)===q)return true;
  }
  // Match préfixe sur nom ou prénom
  if(nomU.indexOf(q)===0||prenomU.indexOf(q)===0)return true;
  // Match contient (au milieu)
  if(nomU.indexOf(q)>=0||prenomU.indexOf(q)>=0)return true;
  return false;
}

// ── 1. Identité élève : clé canonique ──
// "CLÉMENT Noé" → "clement_noe". Déterministe, recalculable, lisible.
function sanMJPC(s){
  return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
}

// ── 2. Identité classe : la clé du hub EST l'identifiant ──
// Décision du 14/07/2026 : aucune app ne transforme le nom de classe.
// La clé de /classes (ex. "4E BANKSY") est l'unique étiquette de rangement.
function cleClasse(nom){ return String(nom||"").trim(); }

// ── 3. Classes de test (bac à sable) : convention unique "_test_<app>" ──
// Préfixe "_" = classe interne : jamais montrée aux élèves, jamais archivée
// dans les profils, nettoyable sans risque. "CLASSE TEST" et "_TEST" sont
// reconnues comme héritage le temps de leur nettoyage (dette B).
function classeTestId(){ return "_test_"+MJPC_APP.id; }
function estClasseInterne(nom){ return !!nom && String(nom).charAt(0)==="_"; }
function estClasseTest(nom){
  return estClasseInterne(nom) || nom==="CLASSE TEST"; // héritage toléré en lecture
}

// ── 4. Lecture robuste d'un roster : extractEleves ──
// Tolère les 3 formats rencontrés dans les données réelles :
//   liste ["NOM Prénom", …] · objet indexé {0:…, archivee:…} ·
//   objet {nom, eleves:[{nomComplet}|{nom,prenom}|{name}|"…"]}
function extractEleves(fbClasse, cfgEleves){
  cfgEleves = cfgEleves || [];
  var META={niveau:1,annee:1,id:1,title:1,nom:1,archivee:1,couleur:1,cree_le:1,published:1,eleves:1};
  function clean(a){return (a||[]).filter(function(x){return x&&typeof x==="string"&&x.trim();});}
  function nomDe(v){
    if(typeof v==="string") return v;
    if(v&&typeof v==="object"){
      if(v.nomComplet) return v.nomComplet;
      if(v.nom&&v.prenom) return String(v.nom).toUpperCase()+" "+v.prenom;
      if(v.name) return v.name;
    }
    return null;
  }
  if(Array.isArray(fbClasse)){ var a=clean(fbClasse.map(nomDe)); if(a.length) return a; }
  if(fbClasse&&typeof fbClasse==="object"&&!Array.isArray(fbClasse)){
    if(Array.isArray(fbClasse.eleves)){ var e=clean(fbClasse.eleves.map(nomDe)); if(e.length) return e; }
    var names=clean(Object.keys(fbClasse).filter(function(k){return !META[k]&&k.charAt(0)!=="_";}).map(function(k){return nomDe(fbClasse[k]);}));
    if(names.length) return names;
  }
  return clean(cfgEleves.map(nomDe));
}

// ── 5. Écriture NON destructive d'une classe : ecrireClasse ──
// Remplace UNIQUEMENT la liste d'élèves ; préserve toute métadonnée existante
// (archivee, niveau, couleur, …) ; normalise au format canonique
// {eleves:["NOM Prénom",…], …métadonnées} : les élèves-objets ({nomComplet},
// {nom,prenom}, {name}) sont ramenés à la chaîne, les résidus indexés {0:…} purgés.
// meta (optionnel) : métadonnées à poser/mettre à jour (ex. {niveau:"4e"}) —
// appliquées PAR-DESSUS l'existant, jamais en le remplaçant.
// Transaction Firebase : atomique, idempotente, sûre en concurrence.
function ecrireClasse(db, nomClasse, eleves, meta, cb){
  if(typeof meta==="function"){ cb=meta; meta=null; }
  var nom=cleClasse(nomClasse);
  if(!nom){ if(cb) cb(new Error("Nom de classe vide")); return; }
  function nomDe(v){
    if(typeof v==="string") return v.trim();
    if(v&&typeof v==="object"){
      if(v.nomComplet) return String(v.nomComplet).trim();
      if(v.nom&&v.prenom) return String(v.nom).toUpperCase()+" "+String(v.prenom).trim();
      if(v.name) return String(v.name).trim();
    }
    return null;
  }
  var propres=(eleves||[]).map(nomDe).filter(function(e){return e&&typeof e==="string";});
  db.ref("classes/"+nom).transaction(function(cur){
    var out={eleves:propres};
    if(cur&&typeof cur==="object"&&!Array.isArray(cur)){
      for(var k in cur){
        if(k==="eleves") continue;          // remplacée
        if(/^\d+$/.test(k)) continue;       // résidu indexé : purgé (les élèves vivent dans .eleves)
        out[k]=cur[k];                      // métadonnée : préservée
      }
    }
    if(meta&&typeof meta==="object"){ for(var m in meta){ if(meta[m]!==undefined) out[m]=meta[m]; } }
    if(out.archivee===undefined) out.archivee=false;
    return out;
  }, function(err, committed){ if(cb) cb(err||null, committed); });
}

// ── 7. Identification nominative : le portail commun (logique) ──
// Toute identification produit des élèves SINGULIERS (clé canonique), que le
// travail soit individuel ou en groupe. Le groupe est un contenant, pas une identité.
// resolveEleves(roster, saisies) → [{nom, cle}] ou {erreur}
//   roster  : liste des noms de la classe (extractEleves)
//   saisies : ["DUPONT Marie", …] (chips) ou [{nom:"DUPONT",prenom:"Marie"}] (champs)
function resolveEleves(roster, saisies){
  var res=[], vus={};
  for(var i=0;i<(saisies||[]).length;i++){
    var s=saisies[i], trouve=null;
    if(typeof s==="string"){
      for(var j=0;j<roster.length;j++){ if(roster[j]===s){trouve=roster[j];break;} }
      if(!trouve){ var k=sanMJPC(s); for(j=0;j<roster.length;j++){ if(sanMJPC(roster[j])===k){trouve=roster[j];break;} } }
    } else if(s&&s.nom&&s.prenom){
      var nomU=String(s.nom).trim().toUpperCase(), preL=String(s.prenom).trim().toLowerCase();
      for(j=0;j<roster.length;j++){
        var parts=roster[j].split(" ");
        var rNom=parts.slice(0,-1).join(" ").toUpperCase(), rPre=(parts[parts.length-1]||"").toLowerCase();
        if(rNom===nomU&&rPre===preL){trouve=roster[j];break;}
      }
    }
    if(!trouve) return {erreur:"\u00c9l\u00e8ve introuvable : "+(typeof s==="string"?s:(s.nom+" "+s.prenom))+". V\u00e9rifie l'orthographe."};
    var cle=sanMJPC(trouve);
    if(vus[cle]) return {erreur:"\u00c9l\u00e8ve s\u00e9lectionn\u00e9 deux fois : "+trouve};
    vus[cle]=1; res.push({nom:trouve, cle:cle});
  }
  if(!res.length) return {erreur:"Aucun \u00e9l\u00e8ve identifi\u00e9."};
  return res;
}

// ── 8. Manifeste (vue projetée, ADDITIVE) ──
// Les constantes en dur dans l'app restent la source de vérité ; le manifeste
// n'est qu'une photographie publiée pour MJPC. Incapable de diverger : republiée
// à chaque chargement prof.
function publierManifeste(db){
  try{
    db.ref("manifestes/"+MJPC_APP.id).set({
      version: MJPC_CORE_VERSION,
      app: MJPC_APP,
      manifeste: MJPC_MANIFESTE||{},
      purge: MJPC_PURGE||{preserver:[],purger:[]},
      publie_le: Date.now()
    });
  }catch(e){ /* le manifeste ne doit jamais casser l'app */ }
}

// ── 8. Session partagée MJPC : l'app reconnaît qui est déjà connecté au site ──
// Le site MJPC écrit 'mjpc_eleve' (sessionStorage + localStorage, même origine).
// L'app la LIT ; elle ne l'écrit jamais. Validité : 12 h par défaut (une journée
// de cours). Une session invalide ou périmée → null → portail natif de l'app.
function lireSessionMJPC(ttlMs){
  var ttl = ttlMs || 12*3600*1000;
  var brut = null;
  try{ brut = sessionStorage.getItem("mjpc_eleve") || localStorage.getItem("mjpc_eleve"); }catch(e){}
  if(!brut) return null;
  var s; try{ s = JSON.parse(brut); }catch(e){ return null; }
  if(!s || typeof s!=="object") return null;
  if(!s.ts || (Date.now()-s.ts) > ttl) return null;          /* périmée */
  if(s.is_prof===true) return {is_prof:true, display:s.display||"Professeur", ts:s.ts};
  var nom = s.display || ((s.nom||"")+" "+(s.prenom||"")).trim();
  if(!nom || !s.classe) return null;
  return {is_prof:false, nom:nom, classe:s.classe, ts:s.ts};
}
// La session dit « CLÉMENT Noé, 4e Hugo » — l'app VÉRIFIE contre le registre
// officiel (/classes) avant d'ouvrir : classe existante, élève au registre.
// Rend l'identité résolue {nom (celui du registre), classe, cle} ou null.
function validerEleveMJPC(session, classesData){
  if(!session || session.is_prof) return null;
  var cl = (classesData||{})[session.classe];
  if(!cl || (cl&&cl.archivee)) return null;
  var roster = extractEleves(cl, []);
  var cible = sanMJPC(session.nom);
  for(var i=0;i<roster.length;i++){
    if(sanMJPC(roster[i])===cible) return {nom:roster[i], classe:session.classe, cle:cible};
  }
  return null;
}

function tokenize(text){if(!text)return[];var t=[],re=/(\s+)|([.,;:!?\u2026\u00ab\u00bb\u201c\u201d()\-\u2013\u2014]+)|([^\s.,;:!?\u2026\u00ab\u00bb\u201c\u201d()'\u2019\-\u2013\u2014]+['\u2019]?)/g,m;while((m=re.exec(text))!==null){if(!m[1])t.push(m[2]||m[3])}return t}
function isPunct(w){return/^[.,;:!?\u2026\u00ab\u00bb\u201c\u201d\u2018\u2019()\-\u2013\u2014]+$/.test(w)}
// Espacement entre token courant et suivant — règles françaises :
// pas d'espace avant ponctuation, pas d'espace après un mot finissant par apostrophe
function tokSp(curW,nextW){if(!nextW)return "";if(isPunct(nextW))return "";if(/['\u2019]$/.test(curW))return "";return " "}
function computeNote(errors,extras,base){
  errors=errors||[];extras=extras||[];base=base||20;
  var ded=0;errors.forEach(function(e){ded+=(TYPE_COST[e.type]||0)});extras.forEach(function(){ded+=TYPE_COST.X});
  var counts={G:0,L:0,M:0,I:0,P:0,A:0,X:extras.length};errors.forEach(function(e){counts[e.type]=(counts[e.type]||0)+1});
  return{note:Math.round(Math.max(0,base-ded)*10)/10,deduction:Math.round(ded*10)/10,counts:counts,total:errors.length+extras.length}
}

    if(inv[cl]&&tl===inv[cl])return{code:"G-ACC",rule:"Singulier attendu : « "+c+" »."};
    return null}},
  // ── Participe passé : -é / -ée / -és / -ées ──
  {name:"pp_accord", test:function(c,t){var cl=c.toLowerCase(),tl=t.toLowerCase();
    var ppForms=[[/é$/,/ée$/,"fém."],[/é$/,/és$/,"masc.pl."],[/é$/,/ées$/,"fém.pl."],
      [/ée$/,/é$/,"masc.sing."],[/és$/,/é$/,"masc.sing."],[/ées$/,/é$/,"masc.sing."],
      [/ée$/,/és$/,"masc.pl."],[/és$/,/ée$/,"fém.sing."],[/ée$/,/ées$/,"fém.pl."],
      [/ées$/,/ée$/,"fém.sing."],[/ées$/,/és$/,"masc.pl."],[/és$/,/ées$/,"fém.pl."],
      [/i$/,/ie$/,"fém."],[/i$/,/is$/,"masc.pl."],[/i$/,/ies$/,"fém.pl."],
      [/is$/,/i$/,"masc.sing."],[/ie$/,/i$/,"masc.sing."],
      [/u$/,/ue$/,"fém."],[/u$/,/us$/,"masc.pl."],[/u$/,/ues$/,"fém.pl."],
      [/us$/,/u$/,"masc.sing."],[/ue$/,/u$/,"masc.sing."]];
    for(var i=0;i<ppForms.length;i++){
      var f=ppForms[i];
      if(f[0].test(cl)&&f[1].test(tl)){
        var base1=cl.replace(f[0],""),base2=tl.replace(f[1],"");
        if(base1===base2&&base1.length>1)return{code:"G-PP",rule:"Accord du participe passé : « "+c+" » attendu ("+f[2]+" incorrect)."};
      }
    }return null}},
  // ── Accord adjectif : détection de différences de marques de genre/nombre ──
  {name:"adj_accord", test:function(c,t){var cl=c.toLowerCase(),tl=t.toLowerCase();
    // -eux/-euse/-euses/-eux
    if(cl.match(/euse$/)&&tl===cl.replace(/euse$/,"eux"))return{code:"G-ACC",rule:"Accord au féminin manquant : « "+c+" » (fém. de "+tl+")."};
    if(cl.match(/eux$/)&&tl===cl.replace(/eux$/,"euse"))return{code:"G-ACC",rule:"Masculin attendu : « "+c+" »."};
    // -if/-ive
    if(cl.match(/ive$/)&&tl===cl.replace(/ive$/,"if"))return{code:"G-ACC",rule:"Accord au féminin manquant : « "+c+" » (fém. de "+tl+")."};
    if(cl.match(/if$/)&&tl===cl.replace(/if$/,"ive"))return{code:"G-ACC",rule:"Masculin attendu : « "+c+" »."};
    // -eux/-euses
    if(cl.match(/euses$/)&&tl===cl.replace(/euses$/,"eux"))return{code:"G-ACC",rule:"Accord fém. pluriel manquant : « "+c+" »."};
    // -el/-elle
    if(cl.match(/elle$/)&&tl===cl.replace(/elle$/,"el"))return{code:"G-ACC",rule:"Accord au féminin manquant : « "+c+" » (doublement de consonne)."};
    if(cl.match(/el$/)&&tl===cl.replace(/el$/,"elle"))return{code:"G-ACC",rule:"Masculin attendu : « "+c+" »."};
    // -en/-enne
    if(cl.match(/enne$/)&&tl===cl.replace(/enne$/,"en"))return{code:"G-ACC",rule:"Accord au féminin manquant : « "+c+" » (doublement de consonne)."};
    // -on/-onne
    if(cl.match(/onne$/)&&tl===cl.replace(/onne$/,"on"))return{code:"G-ACC",rule:"Accord au féminin manquant : « "+c+" » (doublement de consonne)."};
    // -er/-ère
    if(cl.match(/ère$/)&&tl===cl.replace(/ère$/,"er"))return{code:"G-ACC",rule:"Accord au féminin manquant : « "+c+" »."};
    if(cl.match(/er$/)&&tl===cl.replace(/er$/,"ère"))return{code:"G-ACC",rule:"Masculin attendu : « "+c+" »."};
    // -eur/-euse (adjectifs)
    if(cl.match(/euse$/)&&tl===cl.replace(/euse$/,"eur"))return{code:"G-ACC",rule:"Accord au féminin manquant : « "+c+" »."};
    // -teur/-trice
    if(cl.match(/trice$/)&&tl===cl.replace(/trice$/,"teur"))return{code:"G-ACC",rule:"Accord au féminin manquant : « "+c+" »."};
    return null}},
  // ── Accord sujet-verbe : -e/-es/-ent (présent) ──
  {name:"sv_present", test:function(c,t){var cl=c.toLowerCase(),tl=t.toLowerCase();
    if(cl.match(/ent$/)&&tl===cl.replace(/ent$/,"e")&&cl.length>4)return{code:"G-ACC",rule:"Accord sujet-verbe : 3e pers. pluriel (-ent) attendu."};
    if(cl.match(/e$/)&&!cl.match(/ent$/)&&tl===cl+"nt"&&cl.length>3)return{code:"G-ACC",rule:"Accord sujet-verbe : singulier (-e) attendu, pas pluriel (-ent)."};
    return null}},
  // ── Couleurs invariables ──
  {name:"couleur_inv", test:function(c,t){var cl=c.toLowerCase(),tl=t.toLowerCase();
    var inv=["marron","orange","cerise","crème","turquoise","kaki","olive"];
    if(inv.indexOf(cl)>=0&&(tl===cl+"s"||tl===cl+"e"||tl===cl+"es"))
      return{code:"G-ACC",rule:"Adjectif de couleur invariable : « "+c+" » ne s'accorde pas."};
    return null}}
];

// Analyse un texte et retourne les pièges
GRAMM.analyseTexte = function(texte) {
  var mots = texte.split(/\s+/).map(function(m) {
    return m.replace(/^[.,;:!?"«»()]+/, "").replace(/[.,;:!?"«»()]+$/, "");
  }).filter(function(m) { return m.length > 0; });
  var pieges = [];
  var seen = {};
  mots.forEach(function(mot, idx) {
    var low = mot.toLowerCase();
    if (seen[low]) return;
    if (GRAMM.HOMOPHONES[low]) {
      var h = GRAMM.HOMOPHONES[low];
      pieges.push({mot:mot,index:idx,type:"homophone",group:h.group,code:"G-HOM",
        rule:h.rule,confusions:Object.keys(h.confusions)});
      seen[low] = true;
    }
    if (!seen[low]) {
      for (var ti=0;ti<GRAMM.TERMINAISONS.length;ti++) {
        var term=GRAMM.TERMINAISONS[ti];
        if (low.length > term.src.length + 1 && low.substring(low.length-term.src.length) === term.src) {
          pieges.push({mot:mot,index:idx,type:"terminaison",code:term.alts[0].code,
            rule:term.alts[0].rule,confusions:[]});
          seen[low] = true;
          break;
        }
      }
    }
    if (GRAMM.DOUBLES_CONSONNES[low] && !seen[low]) {
      pieges.push({mot:mot,index:idx,type:"orthographe",code:"L-ORT",
        rule:"Double consonne : « "+mot+" » s'écrit avec -"+GRAMM.DOUBLES_CONSONNES[low]+"-.",confusions:[]});
      seen[low] = true;
    }
    if (GRAMM.INVARIABLES.indexOf(low) >= 0 && !seen[low]) {
      pieges.push({mot:mot,index:idx,type:"invariable",code:"G-INV",
        rule:"« "+mot+" » est un mot invariable.",confusions:[]});
      seen[low] = true;
    }
  });
  return pieges;
};

// Classification enrichie d'une erreur
GRAMM.classify = function(typed, correct) {
  var tl = typed.toLowerCase(), cl = correct.toLowerCase();
  if (tl === cl) return null;
  // 1) Homophones
  var hRef = GRAMM.HOMOPHONES[cl];
  if (hRef && hRef.confusions[tl]) return {code:hRef.confusions[tl], rule:hRef.rule};
  // Aussi chercher en sens inverse
  var hTyp = GRAMM.HOMOPHONES[tl];
  if (hTyp && hTyp.confusions[cl]) return {code:"G-HOM", rule:hTyp.rule};
  // 2) Terminaisons verbales
  for (var ti=0;ti<GRAMM.TERMINAISONS.length;ti++) {
    var term = GRAMM.TERMINAISONS[ti];
    if (cl.length > term.src.length && cl.substring(cl.length-term.src.length) === term.src) {
      var base = cl.substring(0, cl.length-term.src.length);
      for (var ai=0;ai<term.alts.length;ai++) {
        var alt = term.alts[ai];
        if (tl === base + alt.t) return {code:alt.code, rule:alt.rule};
      }
    }
  }
  // 3) Accords
  for (var i=0;i<GRAMM.ACCORDS.length;i++) {
    var r = GRAMM.ACCORDS[i].test(correct, typed);
    if (r) return r;
  }
  // 4) Doubles consonnes
  if (GRAMM.DOUBLES_CONSONNES[cl]) {
    var dc = GRAMM.DOUBLES_CONSONNES[cl];
    if (typeof dc==="string"&&dc.length===2) {
      var single=dc[0];
      if(cl.replace(dc,single)===tl) return{code:"L-ORT",rule:"Double consonne manquante : « "+correct+" » → -"+dc+"-."};
      if(tl.replace(single,dc)===cl) return{code:"L-ORT",rule:"Double consonne en trop ou manquante sur « "+correct+" »."};
    }
  }
  // 5) Accent manquant/erroné
  var clNorm=cl.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  var tlNorm=tl.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  if(clNorm===tlNorm&&tl!==cl) return{code:"L-ACC",rule:"Accent manquant ou erroné sur « "+correct+" »."};
  return null;
};


// ═══ SNAPSHOT TOOL ═══
// Export: télécharge un JSON avec toutes les données Firebase
// Import: réinjecte un snapshot dans Firebase
// Intégrable dans n'importe quelle app via un bouton prof

function snapshotExport(dbRef, filename) {
  // dbRef = Firebase ref path string, e.g. "correction_dictee" or "reecriture_bb4e"
  var ref = firebase.database().ref(dbRef);
  ref.once("value", function(snap) {
    var data = snap.val();
    if (!data) { alert("Aucune donnée à exporter."); return; }
    var payload = {
      _meta: {
        source: dbRef,
        exportedAt: new Date().toISOString(),
        exportedBy: "snapshot_tool",
        version: 1
      },
      data: data
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = (filename || dbRef.replace(/\//g, "_")) + "_" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  });
}

function snapshotImport(dbRef, file, onDone) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var payload = JSON.parse(e.target.result);
      var data = payload.data || payload; // Support both wrapped and raw
      if (!confirm("⚠️ Écraser toutes les données de '" + dbRef + "' avec le snapshot du " + (payload._meta ? payload._meta.exportedAt : "?") + " ?")) return;
      firebase.database().ref(dbRef).set(data, function(err) {
        if (err) { alert("Erreur: " + err.message); }
        else { alert("✅ Snapshot importé avec succès."); if (onDone) onDone(); }
      });
    } catch (ex) { alert("Fichier invalide: " + ex.message); }
  };
  reader.readAsText(file);
}

// Render a snapshot panel (React h() compatible)
function renderSnapshotPanel(h, dbRef, label) {
  var fileInputId = "snapshot-import-" + dbRef.replace(/\//g, "-");
  return h("div", { style: { display: "flex", gap: 8, marginTop: 8, flexWrap: "wrap" } },
    h("button", { className: "btn-sm btn-ghost", onClick: function() { snapshotExport(dbRef, label); } }, "📥 Exporter snapshot"),
    h("button", { className: "btn-sm btn-ghost", onClick: function() { document.getElementById(fileInputId).click(); } }, "📤 Importer snapshot"),
    h("input", { id: fileInputId, type: "file", accept: ".json", style: { display: "none" }, onChange: function(e) {
      if (e.target.files[0]) snapshotImport(dbRef, e.target.files[0], function() { window.location.reload(); });
      e.target.value = "";
    }})
  );
}

function ifo(text,opts){var cls="info-i";if(opts){if(opts.right)cls+=" tip-right";if(opts.left)cls+=" tip-left";if(opts.below)cls+=" tip-below"}return h("span",{className:cls,tabIndex:0},"i",h("span",{className:"info-tip"},text))}

// Generate grammatical comment for an error (used by both EleveCorrection final recap and Copies tab)
function gramComment(err){

  if(t==="P") return "Ponctuation manquante \u2014 un signe ( . , ; : ? ! ) a \u00e9t\u00e9 oubli\u00e9. Relis en marquant les pauses : virgule pour une courte pause, point pour une fin de phrase, deux-points pour annoncer.";
  if(t==="I") return "Mot illisible \u2014 soigne ton \u00e9criture pour que chaque lettre soit identifiable. Forme bien les boucles (l, b, h) et les jambages (g, j, p).";
  if(t==="A") return "Attention \u00e0 ta graphie \u2014 ce mot est \u00e0 la limite de la lisibilit\u00e9. Pas de point retir\u00e9 ici, mais soigne le trac\u00e9 \u00e0 l\u2019avenir : un autre correcteur pourrait le compter illisible.";
  var wl=w.toLowerCase();
  var notes=[];
  if(t==="G"){
    var homophones={
      "a":"a (verbe avoir) \u2260 \u00e0 (pr\u00e9position). Remplace par \u00ab avait \u00bb : si \u00e7a fonctionne, c\u2019est \u00ab a \u00bb.",

      "est":"est (verbe \u00eatre) \u2260 et (conjonction). Remplace par \u00ab \u00e9tait \u00bb.",
      "et":"et (conjonction = aussi) \u2260 est (verbe \u00eatre). On ne peut pas dire \u00ab \u00e9tait \u00bb \u00e0 la place.",
      "ont":"ont (verbe avoir, 3e pers. pl.) \u2260 on (pronom = quelqu\u2019un). Remplace par \u00ab avaient \u00bb.",
      "on":"on (pronom sujet = quelqu\u2019un) \u2260 ont (verbe avoir). \u00ab On \u00bb est toujours sujet.",
      "sont":"sont (verbe \u00eatre, 3e pers. pl.) \u2260 son (possessif). Remplace par \u00ab \u00e9taient \u00bb.",
      "son":"son (possessif = le sien) \u2260 sont (verbe \u00eatre). Remplace par \u00ab mon \u00bb ou \u00ab ton \u00bb.",
      "ses":"ses (possessif pl. = les siens) \u2260 ces (d\u00e9monstratif). Remplace par \u00ab mes \u00bb.",
      "ces":"ces (d\u00e9monstratif = ceux-l\u00e0) \u2260 ses (possessif). Remplace par \u00ab mes \u00bb : si \u00e7a fonctionne, c\u2019est \u00ab ses \u00bb.",
      "ce":"ce (d\u00e9monstratif) \u2260 se (r\u00e9fl\u00e9chi). \u00ab Ce \u00bb accompagne un nom ou \u00ab que/qui \u00bb.",
      "se":"se (pronom r\u00e9fl\u00e9chi) \u2260 ce (d\u00e9monstratif). \u00ab Se \u00bb pr\u00e9c\u00e8de toujours un verbe pronominal.",
      "ou":"ou (alternative = ou bien) \u2260 o\u00f9 (lieu/temps). Remplace par \u00ab ou bien \u00bb.",
      "o\u00f9":"o\u00f9 (lieu ou temps) \u2260 ou (alternative). Si tu peux dire \u00ab \u00e0 quel endroit \u00bb, c\u2019est \u00ab o\u00f9 \u00bb.",
      "la":"la (article/pronom) \u2260 l\u00e0 (lieu) \u2260 l\u2019a (l\u2019+avoir).",
      "l\u00e0":"l\u00e0 (lieu = ici) \u2260 la (article/pronom).",
      "leur":"leur (pronom invariable devant verbe) \u2260 leurs (possessif pl. devant nom).",
      "leurs":"leurs (possessif pl. devant nom) \u2260 leur (pronom invariable devant verbe).",
      "ma":"ma (possessif f\u00e9m.) \u2260 m\u2019a (me+avoir). Remplace par \u00ab m\u2019avait \u00bb.",
      "ta":"ta (possessif f\u00e9m.) \u2260 t\u2019a (te+avoir). Remplace par \u00ab t\u2019avait \u00bb.",
      "mes":"mes (possessif) \u2260 mais (opposition). Remplace par \u00ab cependant \u00bb.",
      "mais":"mais (= cependant) \u2260 mes (possessif). Remplace par \u00ab cependant \u00bb.",
      "peu":"peu (= pas beaucoup) \u2260 peut (pouvoir). Remplace par \u00ab pouvait \u00bb.",
      "peut":"peut (pouvoir, 3e sg.) \u2260 peu (= pas beaucoup). Remplace par \u00ab pouvait \u00bb.",
      "ni":"ni (conjonction : ni\u2026 ni\u2026) \u2260 n\u2019y (ne+y, lieu). V\u00e9rifie si c\u2019est une n\u00e9gation de lieu.",
      "sans":"sans (pr\u00e9position = absence) \u2260 s\u2019en (pronom+en) \u2260 sang \u2260 cent.",
      "si":"si (condition) \u2260 s\u2019y (se+y). \u00ab S\u2019y \u00bb pr\u00e9c\u00e8de un verbe pronominal.",
      "quand":"quand (= lorsque) \u2260 quant (\u00e0) (= en ce qui concerne) \u2260 qu\u2019en."
    };
    if(homophones[wl]) notes.push(homophones[wl]);

    else if(/ent$/.test(wl)&&!homophones[wl]) notes.push("Terminaison en -ent \u2014 marque du pluriel verbal (3e pl.). V\u00e9rifie le sujet.");
    if(/(é|ée|és|ées)$/.test(wl)) notes.push("Participe en -\u00e9 \u2014 avec \u00eatre : accord sujet. Avec avoir : accord COD ant\u00e9pos\u00e9. Seul : accord comme adjectif.");
    else if(/(i|ie|is|ies)$/.test(wl)&&wl.length>3) notes.push("Participe en -i \u2014 m\u00eame r\u00e8gle : \u00eatre \u2192 sujet, avoir \u2192 COD ant\u00e9pos\u00e9.");
    else if(/(u|ue|us|ues)$/.test(wl)&&wl.length>3) notes.push("Participe en -u \u2014 m\u00eame r\u00e8gle d\u2019accord.");
    if(/^(les|des|aux|mes|tes|nos|vos|leurs|ces|ses|quelques|plusieurs)$/i.test(wl)) notes.push("D\u00e9terminant pluriel \u2014 le nom et l\u2019adjectif qui suivent doivent \u00eatre au pluriel.");
    else if(/^(le|la|un|une|du|au|mon|ton|sa|ma|ta|ce|cette)$/i.test(wl)) notes.push("D\u00e9terminant singulier \u2014 v\u00e9rifie le genre et le nombre du nom qui suit.");
    if(/er$/.test(wl)&&wl.length>3) notes.push("Infinitif en -er \u2014 v\u00e9rifie que ce n\u2019est pas un participe (-\u00e9). Astuce : remplace par \u00ab mordre/mordu \u00bb.");
    if(notes.length===0) notes.push("Erreur de grammaire \u2014 v\u00e9rifie les accords (sujet-verbe, d\u00e9terminant-nom-adjectif) et la conjugaison.");
  }
  if(t==="L"){
    if(/(mm|nn|ll|ss|tt|pp|ff|rr|cc)/.test(wl)) notes.push("Double consonne dans \u00ab "+w+" \u00bb \u2014 retiens si le mot double cette consonne. Pense \u00e0 la famille de mots.");
    if(/[\u00e0\u00e2]/.test(wl)) notes.push("Accent sur le \u00ab a \u00bb \u2014 ne confonds pas a/\u00e0/\u00e2. Le circonflexe est souvent un ancien \u00ab s \u00bb (h\u00f4pital \u2192 hospital).");
    if(/[\u00e9\u00e8]/.test(wl)) notes.push("Accent aigu (\u00e9) ou grave (\u00e8) \u2014 aigu = ferm\u00e9 [\u00e9], grave = ouvert [\u00e8]. En fin de mot : -\u00e9 (pass\u00e9), -\u00e8s (apr\u00e8s).");
    if(/[\u00ea\u00eb]/.test(wl)) notes.push("Accent circonflexe (\u00ea) ou tr\u00e9ma (\u00eb) \u2014 le tr\u00e9ma s\u00e9pare les voyelles (No\u00ebl).");
    if(/\u00e7/.test(wl)) notes.push("C\u00e9dille (\u00e7) \u2014 devant a, o, u pour garder le son [s] : fa\u00e7on, re\u00e7u, gar\u00e7on.");
    if(/(tion|sion|xion)$/.test(wl)) notes.push("Suffixe -tion/-sion/-xion \u2014 noms f\u00e9minins. Famille : connecter \u2192 connexion.");
    if(/(ment)$/.test(wl)) notes.push("Suffixe -ment (adverbe) \u2014 adjectif f\u00e9minin + -ment : douce \u2192 doucement. Sauf -amment/-emment.");
    if(/(eur|eux|euse)$/.test(wl)) notes.push("Suffixe -eur/-eux/-euse \u2014 famille de mots : chaleur \u2192 chaleureux.");
    if(/(ence|ance)$/.test(wl)) notes.push("Suffixe -ence/-ance \u2014 pas de r\u00e8gle simple, \u00e0 m\u00e9moriser : diff\u00e9rence, puissance.");
    if(/(ph)/.test(wl)) notes.push("Groupe \u00ab ph \u00bb = [f] \u2014 mot d\u2019origine grecque (philosophie, pharmacie).");
    if(wl.length>7) notes.push("Mot long \u2014 d\u00e9compose en syllabes : "+w.replace(/(.{3})/g,"$1\u00b7").replace(/\u00b7$/,"")+".");
    if(notes.length===0){
      if(err.fautif&&typeof GRAMM!=="undefined"&&GRAMM.classify){
        var classif=GRAMM.classify(err.fautif,w);
        if(classif)notes.push(classif.rule);
      }
      if(notes.length===0) notes.push("Orthographe lexicale \u2014 ce mot est \u00e0 m\u00e9moriser. \u00c9cris-le trois fois pour le retenir.");
    }
  }
  return notes.join(" | ");
}

// Generate auto-bilan général for a corrected copy (returns 3-4 lines of text)
function generateBilan(corr,base){
  if(!corr||!corr.errors){return ""}
  var counts=corr.counts||{G:0,L:0,M:0,I:0,P:0,A:0,X:0};
  var nG=counts.G||0,nL=counts.L||0,nM=counts.M||0,nP=counts.P||0,nI=counts.I||0,nA=counts.A||0,nX=counts.X||0;
  var total=nG+nL+nM+nP+nI+nX;
  var note=corr.note;
  var ratio=note/base;
  var lines=[];
  // Ouverture selon le score
  if(ratio>=.9)lines.push("Tr\u00e8s belle dict\u00e9e, qui refl\u00e8te une ma\u00eetrise solide.");
  else if(ratio>=.75)lines.push("Bonne dict\u00e9e, avec quelques points isol\u00e9s \u00e0 surveiller.");
  else if(ratio>=.55)lines.push("Dict\u00e9e correcte, mais plusieurs domaines demandent encore de l\u2019attention.");
  else if(ratio>=.35)lines.push("Dict\u00e9e fragile. Il faut consolider les bases avant la prochaine \u00e9valuation.");
  else lines.push("Dict\u00e9e difficile. Reprends les r\u00e8gles essentielles point par point.");
  // Diagnostic — domaine dominant
  var problemes=[];
  if(nG>=3)problemes.push("la grammaire (accords, homophones, conjugaison)");
  if(nL>=3)problemes.push("l\u2019orthographe lexicale (accents, doubles consonnes, suffixes)");
  if(nM>=2)problemes.push("l\u2019attention aux mots de la dict\u00e9e (oublis r\u00e9p\u00e9t\u00e9s)");
  if(nP>=2)problemes.push("la ponctuation");
  if(nI>=2)problemes.push("la lisibilit\u00e9 de l\u2019\u00e9criture");
  if(problemes.length>0)lines.push("Points \u00e0 travailler : "+problemes.join(", ")+".");
  else if(total>0)lines.push("Quelques erreurs isol\u00e9es, sans difficult\u00e9 dominante \u2014 reste vigilant.");
  // Conseil cibl\u00e9
  if(nG>nL&&nG>=3)lines.push("Conseil : avant de finaliser, relis chaque phrase en rep\u00e9rant le sujet, le verbe et leurs accords.");
  else if(nL>nG&&nL>=3)lines.push("Conseil : prends le temps de retrouver chaque mot dans sa famille avant d\u2019\u00e9crire (ex. long \u2192 longueur).");
  else if(nA>0&&nI===0)lines.push("Bon \u00e0 savoir : la graphie est sur le fil par moments. Soigne le trac\u00e9 pour ne pas perdre de points la prochaine fois.");
  else if(nI>=2)lines.push("Conseil : ralentis ton \u00e9criture et forme bien chaque lettre (boucles, jambages).");
  else if(nX>=2)lines.push("Conseil : suis le rythme de la dict\u00e9e et n\u2019ajoute pas de mots que tu crois deviner.");
  return lines.join(" ");
}

// Détermine si un élève est aménagé (compose registre classe + override par dictée)
// dicteeAmenages: {eleveKey: bool} — override Firebase /correction_dictee/{id}/amenages
// classeAmenages: {eleveKey: bool} — registre persistant /classes_amenages/{classe}
function isEleveAmenage(eleveKey,dicteeAmenages,classeAmenages){
  if(!eleveKey)return false;
  // Override par dictée a priorité : si défini (true ou false), on suit
  if(dicteeAmenages&&dicteeAmenages[eleveKey]!==undefined)return !!dicteeAmenages[eleveKey];
  // Sinon, suit le registre classe
  return !!(classeAmenages&&classeAmenages[eleveKey]);
}

// Génère 2 distracteurs orthographiques plausibles pour un mot correct
// Stratégie : permutations d'accents, doublement/dé-doublement de consonnes,
// terminaisons confondables (-é/-er/-ai), élision a/à, etc.
function suggestDistracteurs(mot,count){
  if(!mot||typeof mot!=="string")return ["",""];
  count=count||2;
  var w=mot,wl=mot.toLowerCase();
  var cands=[];
  // 1. Permutations d'accents
  cands.push(w.replace(/é/g,"è"));
  cands.push(w.replace(/è/g,"é"));
  cands.push(w.replace(/à/g,"a"));
  cands.push(w.replace(/â/g,"a"));
  cands.push(w.replace(/ê/g,"é"));
  cands.push(w.replace(/î/g,"i"));
  cands.push(w.replace(/ô/g,"o"));
  cands.push(w.replace(/û/g,"u"));
  cands.push(w.replace(/ç/g,"c"));
  // Sans accent du tout
  if(/[éèêëàâîïôûùç]/i.test(w))cands.push(w.normalize("NFD").replace(/[\u0300-\u036f]/g,""));
  // 2. Doublement/dé-doublement de consonnes
  var doublable=/(mm|nn|ll|ss|tt|pp|ff|rr|cc|dd|bb|gg)/i;
  var m=w.match(doublable);
  if(m){cands.push(w.replace(m[0],m[0].charAt(0)))} // dé-doubler
  // Doublement spéculatif sur consonnes simples au milieu
  var single=/([^aeiouy])([aeiouy])([aeiouy]?[^aeiouy])/i;
  var sm=w.match(single);
  if(sm){cands.push(w.replace(sm[0],sm[1]+sm[1]+sm[2]+(sm[3]||"")))} // doubler
  // 3. Terminaisons verbales (é / er / ait / ais)
  if(/é$/i.test(w)){cands.push(w.slice(0,-1)+"er");cands.push(w.slice(0,-1)+"ait");cands.push(w.slice(0,-1)+"ai")}
  else if(/er$/i.test(w)){cands.push(w.slice(0,-2)+"é");cands.push(w.slice(0,-2)+"ait")}
  else if(/ait$/i.test(w)){cands.push(w.slice(0,-3)+"é");cands.push(w.slice(0,-3)+"er")}
  else if(/ais$/i.test(w)){cands.push(w.slice(0,-3)+"ait");cands.push(w.slice(0,-3)+"é")}
  else if(/ée$/i.test(w)){cands.push(w.slice(0,-1));cands.push(w.slice(0,-2)+"ée".replace("é","è"))}
  // 4. Pluriels (-s / -x / aucun)
  if(/s$/i.test(w)&&w.length>2){cands.push(w.slice(0,-1));cands.push(w.slice(0,-1)+"x")}
  // 5. Homophones courants
  var homophones={"a":["à"],"à":["a"],"est":["et","ait"],"et":["est"],"ont":["on","ons"],"on":["ont"],
    "son":["sont"],"sont":["son"],"ses":["ces","c'est"],"ces":["ses"],"ce":["se"],"se":["ce"],
    "ou":["où"],"où":["ou"],"la":["là","l'a"],"là":["la"],"leur":["leurs"],"leurs":["leur"],
    "peu":["peut"],"peut":["peu"],"mais":["mes","met"],"mes":["mais"],"quand":["quant","qu'en"]};
  if(homophones[wl])homophones[wl].forEach(function(h){cands.push(h)});
  // Filtrer : dédupliquer + retirer le mot correct
  var seen={};seen[w]=true;
  var out=[];
  cands.forEach(function(c){if(c&&c!==w&&!seen[c]){seen[c]=true;out.push(c)}});
  while(out.length<count){out.push("")} // Garantit le minimum
  return out.slice(0,count);
}

// Génère une question / indice grammatical à partir du mot correct et du type
function generateIndice(mot,type){
  if(!mot)return "";
  var wl=mot.toLowerCase();
  if(type==="G"){
    if(/(ais|ait|aient|ions|iez|ais$)$/.test(wl))return "Quelle est la personne du verbe ? Quelle est la terminaison de l'imparfait ?";
    if(/èrent$/.test(wl))return "Passé simple ou imparfait ?";
    if(/(é|ée|és|ées)$/.test(wl))return "Participe passé : avec quel auxiliaire (être / avoir / aucun) ? Accord avec quoi ?";
    if(/er$/.test(wl)&&wl.length>3)return "Infinitif (-er) ou participe (-é) ? Astuce : remplace par « mordre » ou « mordu ».";
    if(["a","à"].indexOf(wl)>=0)return "« a » verbe avoir ou « à » préposition ? Remplace par « avait ».";
    if(["et","est"].indexOf(wl)>=0)return "« et » conjonction ou « est » verbe être ? Remplace par « était ».";
    if(["on","ont"].indexOf(wl)>=0)return "« on » pronom ou « ont » verbe avoir ? Remplace par « avaient ».";
    if(["son","sont"].indexOf(wl)>=0)return "« son » possessif ou « sont » verbe être ? Remplace par « étaient ».";
    if(["ses","ces"].indexOf(wl)>=0)return "« ses » possessif (les siens) ou « ces » démonstratif (ceux-là) ?";
    if(["ce","se"].indexOf(wl)>=0)return "« ce » démonstratif (devant nom) ou « se » réfléchi (devant verbe) ?";
    if(["ou","où"].indexOf(wl)>=0)return "« ou » alternative ou « où » lieu / temps ? Remplace par « ou bien ».";
    if(["leur","leurs"].indexOf(wl)>=0)return "« leur » devant verbe (invariable) ou « leurs » devant nom (pluriel) ?";
    if(["peu","peut"].indexOf(wl)>=0)return "« peu » adverbe (= pas beaucoup) ou « peut » verbe (= pouvoir) ?";
    if(/^(les|des|aux|mes|tes|nos|vos|leurs|ces|ses)$/i.test(wl))return "Déterminant pluriel : qu'est-ce qui s'accorde avec lui ?";
    return "Quel accord ? Cherche le sujet du verbe ou le nom auquel l'adjectif se rapporte.";
  }
  if(type==="L"){
    if(/(mm|nn|ll|ss|tt|pp|ff|rr|cc)/.test(wl))return "Une ou deux consonnes au milieu ? Pense à un mot de la même famille.";
    if(/[éèêë]/.test(wl))return "Quel accent sur le « e » ? Aigu (é = fermé), grave (è = ouvert), circonflexe (ê).";
    if(/[àâ]/.test(wl))return "« a » sans accent, « à » préposition, ou « â » avec circonflexe ?";
    if(/ç/.test(wl))return "Cédille ou non ? Le « c » se prononce-t-il [s] ou [k] ici ?";
    if(/(tion|sion|xion)$/.test(wl))return "Suffixe -tion / -sion / -xion ? Pense à la famille (connecter → connexion).";
    if(/(ment)$/.test(wl))return "Adverbe en -ment : à partir de quel adjectif ?";
    if(/ph/.test(wl))return "Le son [f] s'écrit-il avec « f » ou avec « ph » (origine grecque) ?";
    return "Souviens-toi de l'orthographe de ce mot. Y a-t-il un piège connu ?";
  }
  return "Réfléchis bien à ce mot.";
}

// Génère un raisonnement guidé en 3 étapes pour aider l'élève à trouver
function generateRaisonnement(mot,type){
  if(!mot)return [];
  var wl=mot.toLowerCase();
  var steps=[];
  if(type==="G"){
    if(["a","à"].indexOf(wl)>=0){
      steps.push("Étape 1 : lis la phrase à voix haute.");
      steps.push("Étape 2 : essaie de remplacer le mot par « avait ».");
      steps.push("Étape 3 : si la phrase a du sens → c'est « a » (verbe avoir). Sinon → c'est « à » (préposition).");
      return steps;
    }
    if(["et","est"].indexOf(wl)>=0){
      steps.push("Étape 1 : lis la phrase à voix haute.");
      steps.push("Étape 2 : essaie de remplacer par « était ».");
      steps.push("Étape 3 : si ça marche → c'est « est » (verbe être). Sinon → c'est « et » (= et puis).");
      return steps;
    }
    if(["on","ont"].indexOf(wl)>=0){
      steps.push("Étape 1 : essaie de remplacer par « quelqu'un » ou « il ».");
      steps.push("Étape 2 : si ça marche → c'est « on » (pronom sujet).");
      steps.push("Étape 3 : sinon, essaie « avaient » → si ça marche, c'est « ont » (verbe avoir).");
      return steps;
    }
    if(["son","sont"].indexOf(wl)>=0){
      steps.push("Étape 1 : essaie de remplacer par « étaient ».");
      steps.push("Étape 2 : si ça marche → c'est « sont » (verbe être).");
      steps.push("Étape 3 : sinon, essaie « mon » ou « ton » → si ça marche, c'est « son » (possessif).");
      return steps;
    }
    if(["ses","ces"].indexOf(wl)>=0){
      steps.push("Étape 1 : essaie de remplacer par « mes » (les miens).");
      steps.push("Étape 2 : si ça marche → c'est « ses » (les siens).");
      steps.push("Étape 3 : sinon, c'est « ces » (= ceux-là).");
      return steps;
    }
    if(["ou","où"].indexOf(wl)>=0){
      steps.push("Étape 1 : essaie de remplacer par « ou bien ».");
      steps.push("Étape 2 : si ça marche → c'est « ou » (alternative).");
      steps.push("Étape 3 : sinon → c'est « où » (lieu ou temps).");
      return steps;
    }
    if(["leur","leurs"].indexOf(wl)>=0){
      steps.push("Étape 1 : regarde le mot juste après.");
      steps.push("Étape 2 : si c'est un VERBE → « leur » (invariable).");
      steps.push("Étape 3 : si c'est un NOM → « leur » si le nom est singulier, « leurs » si pluriel.");
      return steps;
    }
    if(/(é|ée|és|ées)$/.test(wl)){
      steps.push("Étape 1 : trouve l'auxiliaire (être / avoir / aucun).");
      steps.push("Étape 2 : avec ÊTRE → accord avec le sujet (genre + nombre).");
      steps.push("Étape 3 : avec AVOIR → accord avec le COD si placé AVANT ; seul (sans auxiliaire) → accord comme adjectif.");
      return steps;
    }
    if(/(ais|ait|aient|ions|iez)$/.test(wl)){
      steps.push("Étape 1 : trouve le sujet du verbe.");
      steps.push("Étape 2 : c'est de l'imparfait : je -ais, tu -ais, il -ait, nous -ions, vous -iez, ils -aient.");
      steps.push("Étape 3 : applique la terminaison qui correspond au sujet.");
      return steps;
    }
    if(/er$/.test(wl)){
      steps.push("Étape 1 : remplace mentalement le verbe par « mordre ».");
      steps.push("Étape 2 : si la phrase marche avec « mordre » → infinitif → -er.");
      steps.push("Étape 3 : si elle marche avec « mordu » → participe passé → -é.");
      return steps;
    }
    steps.push("Étape 1 : identifie la nature du mot (verbe, nom, adjectif, déterminant).");
    steps.push("Étape 2 : trouve avec quel mot il s'accorde (sujet pour un verbe, nom pour un adjectif).");
    steps.push("Étape 3 : applique la règle d'accord en genre et en nombre.");
    return steps;
  }
  if(type==="L"){
    if(/(mm|nn|ll|ss|tt|pp|ff|rr|cc)/.test(wl)){
      steps.push("Étape 1 : pense à un mot de la même famille (ex. courrier → courriel).");
      steps.push("Étape 2 : la consonne est-elle doublée dans la famille ?");
      steps.push("Étape 3 : applique le doublement (ou non) au mot que tu écris.");
      return steps;
    }
    if(/[éèêë]/.test(wl)){
      steps.push("Étape 1 : prononce la syllabe à voix haute.");
      steps.push("Étape 2 : son [é] fermé → accent aigu (é). Son [è] ouvert → accent grave (è).");
      steps.push("Étape 3 : circonflexe (ê) sur certains mots à mémoriser (fenêtre, tête).");
      return steps;
    }
    if(/(tion|sion|xion)$/.test(wl)){
      steps.push("Étape 1 : trouve le verbe d'où vient le mot (action → agir, connexion → connecter).");
      steps.push("Étape 2 : -tion si verbe en -ter / -ger. -sion si verbe en -dre. -xion si verbe en -cter.");
      steps.push("Étape 3 : applique le suffixe correspondant.");
      return steps;
    }
    if(/ph/.test(wl)){
      steps.push("Étape 1 : le mot vient-il du grec ? (philosophie, pharmacie, téléphone).");
      steps.push("Étape 2 : si oui → le [f] s'écrit « ph ».");
      steps.push("Étape 3 : sinon → le [f] s'écrit avec un « f ».");
      return steps;
    }
    steps.push("Étape 1 : prononce le mot lentement, syllabe par syllabe.");
    steps.push("Étape 2 : repère les pièges (consonnes doublées, accents, lettres muettes).");
    steps.push("Étape 3 : si tu hésites, pense à un mot de la même famille.");
    return steps;
  }
  steps.push("Réfléchis bien au mot. Décompose-le en syllabes.");
  return steps;
}

// Map les codes compétences vers leur libellé court pour le sous-titre pédagogique
function competenceLabel(code){
  var m={
    "D1.1 Orthographe grammaticale":"Orthographe grammaticale",
    "D1.2 Orthographe lexicale":"Orthographe lexicale",
    "D1.3 Conjugaison":"Conjugaison",
    "D1.4 Accords (sujet-verbe, déterminant-nom-adjectif)":"Accords",
    "D1.5 Homophones grammaticaux":"Homophones grammaticaux",
    "D1.6 Ponctuation":"Ponctuation",
    "D2.1 Connaître et appliquer les règles d’orthographe":"Règles d’orthographe",
    "D2.2 Rédiger un texte correct":"Rédaction correcte",
    "D2.3 Enrichir son vocabulaire":"Vocabulaire"
  };
  return m[code]||code;
}
function competencesSubtitle(competences){
  if(!competences||!competences.length)return "";
  return competences.map(competenceLabel).join(" \u00b7 ");
}

// Corrige les indices de lacunes après un éventuel changement de tokenisation.
// Si tokens[lac.tokenIdx] != mot attendu (lac.word ou lac.propositions[0]),
// cherche la prochaine occurrence du mot non-encore-affectée.
function fixLacunesIndices(lacunes,tokens){
  if(!lacunes||!lacunes.length||!tokens)return lacunes||[];
  // Trier par tokenIdx pour respecter l'ordre original
  var sorted=lacunes.slice().sort(function(a,b){return (a.tokenIdx||0)-(b.tokenIdx||0)});
  var used={};
  return sorted.map(function(l){
    var expected=l.word||(l.propositions&&l.propositions[0]);
    if(!expected)return l;
    // Si l'indice stocké pointe sur le bon mot, on garde
    if(tokens[l.tokenIdx]===expected&&!used[l.tokenIdx]){used[l.tokenIdx]=true;return l}
    // Sinon, on cherche la prochaine occurrence non utilisée
    for(var i=0;i<tokens.length;i++){
      if(tokens[i]===expected&&!used[i]){used[i]=true;return Object.assign({},l,{tokenIdx:i,word:expected})}
    }
    return l; // mot introuvable, on laisse tel quel
  });
}

// Génère la consigne par défaut selon les modes présents dans les lacunes
function generateConsigne(amen){
  if(!amen||!amen.lacunes||!amen.lacunes.length)return "";
  var defaultMode=amen.defaultMode||"A";
  var modes={};
  amen.lacunes.forEach(function(l){modes[l.mode||defaultMode]=true});
  var hasA=modes.A,hasB=modes.B,hasC=modes.C;
  if(hasA&&!hasB&&!hasC)return "Compl\u00e8te chaque blanc en entourant la proposition correcte parmi celles propos\u00e9es au-dessus.";
  if(hasB&&!hasA&&!hasC)return "Compl\u00e8te chaque blanc en \u00e9crivant le mot manquant sur les pointill\u00e9s.";

// ═══ TTS (Web Speech API) — lecture audio pour mode rapide ═══
// Inspiré de etude_dugain.html : lecture asservie à la navigation,
// interruption immédiate à tout changement de mot.

// Dictionnaire de prononciation pour la ponctuation
var SPEECH_PUNCT={
  ".":"point","\u2026":"points de suspension","...":"points de suspension",
  ",":"virgule",";":"point virgule",":":"deux points",
  "?":"point d'interrogation","!":"point d'exclamation",
  "\u00ab":"ouvrir les guillemets","\u00bb":"fermer les guillemets",
  "\u201c":"ouvrir les guillemets","\u201d":"fermer les guillemets",
  "(":"parenthèse ouvrante",")":"parenthèse fermante",
  "-":"tiret","\u2013":"tiret","\u2014":"tiret",
  "'":"apostrophe","\u2019":"apostrophe"
};
function speechText(word){
  if(!word)return "";
  // Pour un token de ponctuation pure, lit son nom
  if(SPEECH_PUNCT[word])return SPEECH_PUNCT[word];
  // Pour un mot finissant par apostrophe (qu', l', s'…), enlève l'apostrophe pour la lecture
  // (l'apostrophe sera prononcée naturellement par le moteur français en attaque du mot suivant)
  return word.replace(/['\u2019]$/, "");
}
// Sélection de voix : voix locale UNIQUEMENT (les voix réseau type "Google français"
// causent un lag réseau de 200-500ms à chaque mot). Préférence : Hortense > Julie > autre locale.
var _frenchVoice=null;
function _selectFrenchVoice(){
  if(!('speechSynthesis' in window))return;
  var voices=window.speechSynthesis.getVoices();
  if(!voices||!voices.length){_frenchVoice=null;return}
  var french=voices.filter(function(v){return v.lang&&v.lang.startsWith("fr")});
  var locals=french.filter(function(v){return v.localService});
  // Préférence par nom (Hortense est généralement la plus rapide à démarrer sous Windows)
  var prefer=["Hortense","Julie","Paul","Microsoft"];
  for(var i=0;i<prefer.length;i++){
    var found=locals.find(function(v){return v.name.indexOf(prefer[i])>=0});
    if(found){_frenchVoice=found;return}
  }
  _frenchVoice=locals[0]||null; // toujours une voix locale, jamais réseau
}
if('speechSynthesis' in window){
  _selectFrenchVoice();
  window.speechSynthesis.addEventListener("voiceschanged",_selectFrenchVoice);
}
// Permet à l'utilisateur de surcharger via le curseur de réactivité (rate)
function getSpeechRate(){try{var r=parseFloat(localStorage.getItem("mjpc_speech_rate"));return(r>=.5&&r<=4)?r:1.15}catch(e){return 1.15}}
function setSpeechRate(r){try{localStorage.setItem("mjpc_speech_rate",String(r))}catch(e){}}
function speakWord(word){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  var txt=speechText(word);if(!txt)return;
  var u=new SpeechSynthesisUtterance(txt);
  u.lang="fr-FR";u.rate=getSpeechRate();u.pitch=1.0;u.volume=1.0;
  if(_frenchVoice)u.voice=_frenchVoice;
  window.speechSynthesis.speak(u);
}
function stopSpeech(){if('speechSynthesis' in window)window.speechSynthesis.cancel()}
// Persistance du toggle audio (localStorage)
function getSpeechEnabled(){try{return localStorage.getItem("mjpc_speech_fastmode")!=="0"}catch(e){return true}}
function setSpeechEnabled(v){try{localStorage.setItem("mjpc_speech_fastmode",v?"1":"0")}catch(e){}}

// ═══ ÉCRAN CORRECTION ═══
function CorrScreen(p){
  var data=p.data,s1=useState("correct"),tab=s1[0],setTab=s1[1];
  // M6 — navigation deux niveaux : le groupe coiffe l'onglet, sans rien rouvrir.
  var sG=useState("pilotage"),groupe=sG[0],setGroupe=sG[1];
  var sH=useState(false),showAide=sH[0],setShowAide=sH[1];
  useEffect(function(){ var g=groupeDeTab(tab); if(g&&g!==groupe) setGroupe(g); },[tab]);
  var s2=useState(null),cur=s2[0],setCur=s2[1];
  var s3=useState(null),msg=s3[0],setMsg=s3[1];
  var sQ=useState(""),eleveQuery=sQ[0],setEleveQuery=sQ[1];
  // Aménagée : registre par classe + override par dictée
  var sA1=useState({}),amenagesDictee=sA1[0],setAmenagesDictee=sA1[1];
  var sA2=useState({}),classeAmenages=sA2[0],setClasseAmenages=sA2[1];
  var sA3=useState(null),ctxMenu=sA3[0],setCtxMenu=sA3[1]; // {x,y,eleveKey,name}
  useEffect(function(){
    var r1=db.ref("correction_dictee/"+p.dicteeId+"/amenages");
    function f1(s){setAmenagesDictee(s.val()||{})}r1.on("value",f1);
    var classe=data.classe||"_default";
    var r2=db.ref("classes_amenages/"+classe);
    function f2(s){setClasseAmenages(s.val()||{})}r2.on("value",f2);
    return function(){r1.off("value",f1);r2.off("value",f2)};
  },[p.dicteeId,data.classe]);
  function toggleAmenageDictee(eleveKey){
    var cur=amenagesDictee[eleveKey];
    var path="correction_dictee/"+p.dicteeId+"/amenages/"+eleveKey;
    // Logique override : si elem dans registre classe → on stocke false pour le retirer ici ; sinon true
    var inReg=!!classeAmenages[eleveKey];
    if(cur===undefined){
      // Aucun override : on en ajoute un (inverse du registre)
      db.ref(path).set(!inReg);
    } else {
      // Override existant : on bascule
      if((cur&&!inReg)||(!cur&&inReg)){
        // L'override correspond à l'inverse du registre → suppression (retour au registre)
        db.ref(path).remove();
      } else {
        db.ref(path).set(!cur);
      }
    }
    setCtxMenu(null);
  }
  function toggleAmenageClasse(eleveKey){
    var cur=!!classeAmenages[eleveKey];
    var classe=data.classe||"_default";
    var path="classes_amenages/"+classe+"/"+eleveKey;
    if(cur)db.ref(path).remove();else db.ref(path).set(true);
    setCtxMenu(null);
  }
  useEffect(function(){
    function onKey(e){
      var t=e.target&&e.target.tagName;
      if(t==="INPUT"||t==="TEXTAREA"||t==="SELECT")return;
      if(e.shiftKey&&(e.key==="R"||e.key==="r")&&tab==="correct"&&cur){
        e.preventDefault();setTab("rapide");
      }
    }
    window.addEventListener("keydown",onKey);
    return function(){window.removeEventListener("keydown",onKey)};
  },[tab,cur]);
  var nAbs=Object.keys(p.absents||{}).length;
  var nTotal=data.eleves.length-nAbs;
  var nDone=data.eleves.filter(function(e){var k=san(e);return!p.absents[k]&&p.corrections[k]}).length;
  var pct=nTotal?Math.round(nDone/nTotal*100):0;

  if(cur&&tab==="correct") {
    var curKey=san(cur);
    var curIsAmen=isEleveAmenage(curKey,amenagesDictee,classeAmenages);
    var dAmen=data.amenagee&&data.amenagee.enabled?data.amenagee:null;
    var effectiveBase=(curIsAmen&&dAmen)?(dAmen.base||10):data.base;
    return h(CorrEleve,{key:curKey,data:data,eleve:cur,
    existing:p.corrections[curKey]||null,
    corrections:p.corrections,
    absents:p.absents,
    amenagee:dAmen,
    isAmen:curIsAmen,
    effectiveBase:effectiveBase,
    onSwitchEleve:function(name){setCur(name)},
    onTransfer:function(targetName,mode){
      var sek=san(cur),tek=san(targetName);
      if(sek===tek)return;
      var sCorr=p.corrections[sek];
      var tCorr=p.corrections[tek];
      if(!sCorr)return;
      var newCorr=Object.assign({},p.corrections);
      var dRef="correction_dictee/"+p.dicteeId;
      if(mode==="swap"&&tCorr){
        newCorr[tek]=Object.assign({},sCorr,{timestamp:Date.now()});
        newCorr[sek]=Object.assign({},tCorr,{timestamp:Date.now()});
        db.ref(dRef+"/results/"+tek).set(newCorr[tek]);
        db.ref(dRef+"/results/"+sek).set(newCorr[sek]);
      } else {
        newCorr[tek]=Object.assign({},sCorr,{timestamp:Date.now()});
        delete newCorr[sek];
        db.ref(dRef+"/results/"+tek).set(newCorr[tek]);
        db.ref(dRef+"/results/"+sek).remove();
      }
      db.ref(dRef+"/autocorrection/"+tek).remove();
      db.ref(dRef+"/autocorrection/"+sek).remove();
      p.onResetCorrections(newCorr);
      setCur(null);
      setMsg("\u21ad "+(mode==="swap"?"\u00c9chang\u00e9 avec ":mode==="replace"?"Remplac\u00e9 sur ":"Transf\u00e9r\u00e9 vers ")+targetName.split(" ").pop());
      setTimeout(function(){setMsg(null)},3000);
    },
    onSave:function(err,ext){
      p.onSave(san(cur),err,ext);
      var keys=data.eleves.map(san),ci=data.eleves.indexOf(cur),next=null;
      for(var i=1;i<data.eleves.length;i++){var ni=(ci+i)%data.eleves.length;if(!p.corrections[keys[ni]]&&!p.absents[keys[ni]]){next=data.eleves[ni];break}}
      setMsg("\u2705 "+cur.split(" ").pop()+(next?" \u2192 "+next.split(" ").pop():" \u2014 termin\u00e9 !"));
      setTimeout(function(){setMsg(null)},2500);setCur(next);
    },
    onReset:function(){
      var k=san(cur);
      db.ref("correction_dictee/"+p.dicteeId+"/results/"+k).remove();
      db.ref("correction_dictee/"+p.dicteeId+"/autocorrection/"+k).remove();
      var c=Object.assign({},p.corrections);delete c[k];p.onResetCorrections(c);
      setCur(null);
      setMsg("\u21bb "+cur.split(" ").pop()+" r\u00e9initialis\u00e9");setTimeout(function(){setMsg(null)},2000);
    },
    onAutoSave:function(err,ext,fastIdxVal){
      // Sauvegarde silencieuse + persistance fastIdx via save()
      p.onSave(curKey,err,ext,fastIdxVal);
    },
    onCancel:function(){setCur(null)}
  });
  }

  // Largeur étendue pour TOUS les onglets prof (besoin de place pour tableaux, panneaux, etc.)
  return h("div",{className:"container-wide fade-up"},
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}},
      h("div",null,h("h1",null,data.title),
        h("p",{className:"subtitle"},data.classe+" \u00b7 "+nDone+"/"+nTotal+(nAbs?" ("+nAbs+" abs.)":"")+" \u00b7 "+pct+"%"),
        h("div",{className:"progress-wrap"},h("div",{className:"progress-fill",style:{width:pct+"%"}}))
      ),
      h("div",{style:{display:"flex",gap:8}},
        h("button",{className:"btn-sm btn-ghost",onClick:function(){
          // Recalculate all scores with new apostrophe normalization
          var normC=function(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[\u2019\u2018\u0027\u0060\u00b4]/g,"'")};
          var dicteeRef="correction_dictee/"+p.dicteeId;
          db.ref(dicteeRef).once("value",function(snap){
            var val=snap.val()||{};
            var acData=val.autocorrection||{};
            var nFixed=0;
            Object.keys(acData).forEach(function(ek){
              var ac=acData[ek];if(!ac||!ac.history)return;
              var errs=toArr(ac.errorRefs||[]);
              if(errs.length===0)return;
              var changed=false;
              var newResults=ac.results?JSON.parse(JSON.stringify(ac.results)):{};
              var newAttempts=ac.attempts?JSON.parse(JSON.stringify(ac.attempts)):{};
              errs.forEach(function(err,ei){
                var k=String(ei);
                var hist=ac.history?ac.history[k]||ac.history[ei]:null;
                if(!hist)return;
                var entries=toArr(hist);
                if(entries.length===0)return;
                var wasCorrect=newResults[k]||newResults[ei];
                if(wasCorrect)return;
                for(var hi=0;hi<entries.length;hi++){
                  var typed=typeof entries[hi]==="object"?entries[hi].typed:entries[hi];
                  if(typed&&normC(String(typed))===normC(String(err.word))){
                    newResults[k]=true;newAttempts[k]=hi+1;changed=true;break;
                  }
                }
              });
              if(changed){
                var wrong=0;
                Object.keys(newAttempts).forEach(function(k2){var n=newAttempts[k2]||0;if(newResults[String(k2)]||newResults[Number(k2)])wrong+=(n-1);else wrong+=n});
                var sc=Math.max(0,5-wrong*0.25);
                var nOk=Object.keys(newResults).filter(function(k2){return newResults[k2]}).length;
                db.ref(dicteeRef+"/autocorrection/"+ek+"/results").set(newResults);
                db.ref(dicteeRef+"/autocorrection/"+ek+"/attempts").set(newAttempts);
                db.ref(dicteeRef+"/autocorrection/"+ek+"/score").set(Math.round(sc*100)/100);
                db.ref(dicteeRef+"/autocorrection/"+ek+"/solved").set(nOk);
                nFixed++;
              }
            });
            alert(nFixed+" \u00e9l\u00e8ve"+(nFixed>1?"s":"")+" recalcul\u00e9"+(nFixed>1?"s":"")+".");
          });
        }},"\ud83d\udd04 Recalculer",ifo("V\u00e9rifie tous les essais des \u00e9l\u00e8ves et corrige les erreurs de comptage (probl\u00e8mes d\u2019apostrophe par exemple).",{below:true})),
