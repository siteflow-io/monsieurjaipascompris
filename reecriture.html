// MJPC-CORE v1.1.0 (2026-07-14) — socle commun de l'écosystème MJPC
// Bloc versionné, IDENTIQUE dans chaque app. Ne jamais le modifier localement :
// toute évolution passe par une nouvelle version diffusée partout.
// Seul le bloc « DÉCLARATION DE L'APP » (MJPC_APP / MJPC_MANIFESTE / MJPC_PURGE)
// est propre à chaque app — il se remplit, il ne se réécrit pas.
// Dépendances : firebase 8.x (db = firebase.database()) déjà initialisé par l'app.
// ═══════════════════════════════════════════════════════════════════════════

// ── DÉCLARATION DE L'APP (à remplir par app — exemple ci-dessous) ──
// var MJPC_APP = {
//   id: "correction_dictee",          // identifiant technique (anglais/ascii)
//   nom: "Correction de dictée",      // libellé lisible
//   contenant: "aucun"                // "aucun" | "binome" | "groupe" | "classe"
// };                                  // = l'élève travaille seul / à 2-3 / en groupe / classe entière
// var MJPC_MANIFESTE = { notions: [], noeuds: [] };   // vocabulaire + nœuds Firebase de l'app (vue projetée)
// var MJPC_PURGE = { preserver: [], purger: [] };     // contrat de purge : chemins à garder / à effacer au reset

// ── 1. Identité élève : clé canonique ──
// "CLÉMENT Noé" → "clement_noe". Déterministe, recalculable, lisible.
function sanMJPC(s){
  return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"");
}

// ── 2. Identité classe : la clé du hub EST l'identifiant ──
// Décision du 14/07/2026 : aucune app ne transforme le nom de classe.
// La clé de /classes (ex. "4E BANKSY") est l'unique étiquette de rangement.
function cleClasse(nom){ return String(nom||"").trim(); }

// ── 3. Classes de test (bac à sable) : convention unique "_test_<app>" ──
// Préfixe "_" = classe interne : jamais montrée aux élèves, jamais archivée
// dans les profils, nettoyable sans risque. "CLASSE TEST" et "_TEST" sont
// reconnues comme héritage le temps de leur nettoyage (dette B).
function classeTestId(){ return "_test_"+MJPC_APP.id; }
function estClasseInterne(nom){ return !!nom && String(nom).charAt(0)==="_"; }
function estClasseTest(nom){
  return estClasseInterne(nom) || nom==="CLASSE TEST"; // héritage toléré en lecture
}

// ── 4. Lecture robuste d'un roster : extractEleves ──
// Tolère les 3 formats rencontrés dans les données réelles :
//   liste ["NOM Prénom", …] · objet indexé {0:…, archivee:…} ·
//   objet {nom, eleves:[{nomComplet}|{nom,prenom}|{name}|"…"]}
function extractEleves(fbClasse, cfgEleves){
  cfgEleves = cfgEleves || [];
  var META={niveau:1,annee:1,id:1,title:1,nom:1,archivee:1,couleur:1,cree_le:1,published:1,eleves:1};
  function clean(a){return (a||[]).filter(function(x){return x&&typeof x==="string"&&x.trim();});}
  function nomDe(v){
    if(typeof v==="string") return v;
    if(v&&typeof v==="object"){
      if(v.nomComplet) return v.nomComplet;
      if(v.nom&&v.prenom) return String(v.nom).toUpperCase()+" "+v.prenom;
      if(v.name) return v.name;
    }
    return null;
  }
  if(Array.isArray(fbClasse)){ var a=clean(fbClasse.map(nomDe)); if(a.length) return a; }
  if(fbClasse&&typeof fbClasse==="object"&&!Array.isArray(fbClasse)){
    if(Array.isArray(fbClasse.eleves)){ var e=clean(fbClasse.eleves.map(nomDe)); if(e.length) return e; }
    var names=clean(Object.keys(fbClasse).filter(function(k){return !META[k]&&k.charAt(0)!=="_";}).map(function(k){return nomDe(fbClasse[k]);}));
    if(names.length) return names;
  }
  return clean(cfgEleves.map(nomDe));
}

// ── 5. Écriture NON destructive d'une classe : ecrireClasse ──
// Remplace UNIQUEMENT la liste d'élèves ; préserve toute métadonnée existante
// (archivee, niveau, couleur, …) ; normalise au format canonique
// {eleves:["NOM Prénom",…], …métadonnées} : les élèves-objets ({nomComplet},
// {nom,prenom}, {name}) sont ramenés à la chaîne, les résidus indexés {0:…} purgés.
// meta (optionnel) : métadonnées à poser/mettre à jour (ex. {niveau:"4e"}) —
// appliquées PAR-DESSUS l'existant, jamais en le remplaçant.
// Transaction Firebase : atomique, idempotente, sûre en concurrence.
function ecrireClasse(db, nomClasse, eleves, meta, cb){
  if(typeof meta==="function"){ cb=meta; meta=null; }
  var nom=cleClasse(nomClasse);
  if(!nom){ if(cb) cb(new Error("Nom de classe vide")); return; }
  function nomDe(v){
    if(typeof v==="string") return v.trim();
    if(v&&typeof v==="object"){
      if(v.nomComplet) return String(v.nomComplet).trim();
      if(v.nom&&v.prenom) return String(v.nom).toUpperCase()+" "+String(v.prenom).trim();
      if(v.name) return String(v.name).trim();
    }
    return null;
  }
  var propres=(eleves||[]).map(nomDe).filter(function(e){return e&&typeof e==="string";});
  db.ref("classes/"+nom).transaction(function(cur){
    var out={eleves:propres};
    if(cur&&typeof cur==="object"&&!Array.isArray(cur)){
      for(var k in cur){
        if(k==="eleves") continue;          // remplacée
        if(/^\d+$/.test(k)) continue;       // résidu indexé : purgé (les élèves vivent dans .eleves)
        out[k]=cur[k];                      // métadonnée : préservée
      }
    }
    if(meta&&typeof meta==="object"){ for(var m in meta){ if(meta[m]!==undefined) out[m]=meta[m]; } }
    if(out.archivee===undefined) out.archivee=false;
    return out;
  }, function(err, committed){ if(cb) cb(err||null, committed); });
}

// ── 6. Suppression d'élève : INTERDITE hors MJPC ──
// Une seule logique de suppression, dans la console MJPC (archive avant tout).
// Les apps remplacent leurs boutons de suppression par ce renvoi.
var MJPC_URL="https://siteflow-io.github.io/monsieurjaipascompris/index.html";
function renvoyerVersMJPC(motif){
  var msg="La gestion des \u00e9l\u00e8ves (ajout, retrait, archivage) se fait dans MJPC, pour que rien ne se perde."
        +(motif?"\n\n("+motif+")":"");
  if(typeof window!=="undefined"&&window.confirm(msg+"\n\nOuvrir MJPC ?")){ window.open(MJPC_URL,"_blank"); }
}

// ── 7. Identification nominative : le portail commun (logique) ──
// Toute identification produit des élèves SINGULIERS (clé canonique), que le
// travail soit individuel ou en groupe. Le groupe est un contenant, pas une identité.
// resolveEleves(roster, saisies) → [{nom, cle}] ou {erreur}
//   roster  : liste des noms de la classe (extractEleves)
//   saisies : ["DUPONT Marie", …] (chips) ou [{nom:"DUPONT",prenom:"Marie"}] (champs)
function resolveEleves(roster, saisies){
  var res=[], vus={};
  for(var i=0;i<(saisies||[]).length;i++){
    var s=saisies[i], trouve=null;
    if(typeof s==="string"){
      for(var j=0;j<roster.length;j++){ if(roster[j]===s){trouve=roster[j];break;} }
      if(!trouve){ var k=sanMJPC(s); for(j=0;j<roster.length;j++){ if(sanMJPC(roster[j])===k){trouve=roster[j];break;} } }
    } else if(s&&s.nom&&s.prenom){
      var nomU=String(s.nom).trim().toUpperCase(), preL=String(s.prenom).trim().toLowerCase();
      for(j=0;j<roster.length;j++){
        var parts=roster[j].split(" ");
        var rNom=parts.slice(0,-1).join(" ").toUpperCase(), rPre=(parts[parts.length-1]||"").toLowerCase();
        if(rNom===nomU&&rPre===preL){trouve=roster[j];break;}
      }
    }
    if(!trouve) return {erreur:"\u00c9l\u00e8ve introuvable : "+(typeof s==="string"?s:(s.nom+" "+s.prenom))+". V\u00e9rifie l'orthographe."};
    var cle=sanMJPC(trouve);
    if(vus[cle]) return {erreur:"\u00c9l\u00e8ve s\u00e9lectionn\u00e9 deux fois : "+trouve};

// de cours). Une session invalide ou périmée → null → portail natif de l'app.
function lireSessionMJPC(ttlMs){

  var brut = null;
  try{ brut = sessionStorage.getItem("mjpc_eleve") || localStorage.getItem("mjpc_eleve"); }catch(e){}

  if(!s.ts || (Date.now()-s.ts) > ttl) return null;          /* périmée */
  if(s.is_prof===true) return {is_prof:true, display:s.display||"Professeur", ts:s.ts};
  var nom = s.display || ((s.nom||"")+" "+(s.prenom||"")).trim();

// ═══ CALCUL DE NOTE — RÉÉCRITURE ═══
// Format des données stockées dans reecritures/{id}/corrections/{eleveKey} :
//   errors: tableau d'erreurs
//     - type "modif" : modification attendue ratée
//       { type:"modif", modifIdx:0, bareme:1, fautif:"etait" (facultatif) }
//     - type "copie" : mot/ponctuation hors modif, mal recopié ou modifié à tort
//       { type:"copie", idx:25, bareme:0.25, word:"été", fautif:"étais" (facultatif) }
//   extras: tableau de mots/ponctuation en trop insérés
//     - { afterIdx:8, word:",", bareme:0.25 }
//   baremeTotal: note maximale (10 par défaut)
//
// Calcul : note = max(0, baremeTotal − somme(bareme des erreurs et extras))
function computeReecritureNote(errors,extras,baremeTotal){
  errors=errors||[];extras=extras||[];baremeTotal=baremeTotal!=null?baremeTotal:10;
  var ded=0;
  var counts={modif:0,copie:0,extras:extras.length};
  errors.forEach(function(e){ded+=(e.bareme||0);counts[e.type]=(counts[e.type]||0)+1});
  extras.forEach(function(e){ded+=(e.bareme||0.25)});
  return{
    note:Math.round(Math.max(0,baremeTotal-ded)*100)/100,
    deduction:Math.round(ded*100)/100,
    counts:counts,
    total:errors.length+extras.length
  };
}

// ═══ TOKENISATION ET MAPPING — RÉÉCRITURE ═══
// Tokenise un texte en séparant mots, ponctuation et espaces.
// Format : [{type:"word"|"punct"|"space", text:string}, ...]
// Note : l'apostrophe typographique \u2019 et l'apostrophe droite ' sont traitées
// comme ponctuation, donc "s'étaient" produit 3 tokens : "s", "'", "étaient".
function tokenizeForCorrection(text){
  if(!text)return[];
  var t=[],re=/([\s]+)|([.,;:!?\u2026\u00ab\u00bb\u201c\u201d\u2018\u2019\u0027()\-\u2013\u2014]+)|([^\s.,;:!?\u2026\u00ab\u00bb\u201c\u201d\u2018\u2019\u0027()\-\u2013\u2014]+)/g,m;
  while((m=re.exec(text))!==null){
    if(m[1])t.push({type:"space",text:m[1]});
    else if(m[2])t.push({type:"punct",text:m[2]});
    else t.push({type:"word",text:m[3]});
  }
  return t;
}

// Pour chaque mot du split(/\s+/) du texte source, retourne la plage [startIdx, endIdx]
// (inclusive) dans le tableau de tokens produit par tokenizeForCorrection.
// Permet de relier les indices stockés dans modifs[].tokens (split simple) aux tokens
// affichables (qui séparent la ponctuation intra-mot comme l'apostrophe).
function mapSplitWordsToTokens(tokens){
  var wordToTokens=[];
  var curStart=-1;
  for(var i=0;i<tokens.length;i++){
    if(tokens[i].type==="space"){
      if(curStart>=0){wordToTokens.push([curStart,i-1]);curStart=-1}
    } else {
      if(curStart<0)curStart=i;
    }
  }
  if(curStart>=0)wordToTokens.push([curStart,tokens.length-1]);
  return wordToTokens;
}

// Construit un dictionnaire {tokenIdx: {modifIdx, wordIdx, modif}} pour le surlignage.
// modifs : liste de modifications (format passe 1)
// wordToTokens : résultat de mapSplitWordsToTokens
// tokens : résultat de tokenizeForCorrection sur le texte attendu complet
// Règle : seuls les tokens word qui DIFFÈRENT effectivement entre original et attendu
// sont surlignés. Les tokens punct (apostrophes, virgules, etc.) ne sont jamais surlignés.
// Retourne {} si aucune correspondance.
function buildModifMap(modifs,wordToTokens,tokens){
  var map={};
  if(!tokens)tokens=[];
  (modifs||[]).forEach(function(m,modifIdx){
    var attWords=(m.attendu||"").split(/\s+/);
    var origWords=(m.original||"").split(/\s+/);
    (m.tokens||[]).forEach(function(wIdx,localIdx){
      if(!wordToTokens[wIdx])return;
      var range=wordToTokens[wIdx];
      var attWord=attWords[localIdx]||"";
      var origWord=origWords[localIdx]||"";
      // Si mots strictement identiques (casse insensible), ne rien surligner
      if(attWord.toLowerCase()===origWord.toLowerCase())return;
      // Décomposer en sub-tokens pour identifier ceux qui changent vraiment
      var subAtt=tokenizeForCorrection(attWord).filter(function(t){return t.type==="word"});
      var subOrig=tokenizeForCorrection(origWord).filter(function(t){return t.type==="word"});
      var subDiff=[];
      if(subAtt.length===subOrig.length){
        for(var i=0;i<subAtt.length;i++){
          subDiff.push(subAtt[i].text.toLowerCase()!==subOrig[i].text.toLowerCase());
        }
      } else {
        for(var i=0;i<subAtt.length;i++)subDiff.push(true);
      }
      // Parcourir les tokens du texte complet, ne marquer que les word avec subDiff true
      var subWordCount=0;
      for(var k=range[0];k<=range[1];k++){
        if(tokens[k]&&tokens[k].type==="word"){
          if(subDiff[subWordCount]){
            map[k]={modifIdx:modifIdx,wordIdx:wIdx,modif:m};
          }
          subWordCount++;
        }
        // Tokens punct et space ne sont jamais ajoutés au map (donc jamais surlignés en bleu)
      }
    });
  });
  return map;
}

// Export: télécharge un JSON avec toutes les données Firebase
// Import: réinjecte un snapshot dans Firebase
// Intégrable dans n'importe quelle app via un bouton prof

function snapshotExport(dbRef, filename) {
  // dbRef = Firebase ref path string, e.g. "correction_dictee" or "reecriture_bb4e"
  var ref = firebase.database().ref(dbRef);
  ref.once("value", function(snap) {
    var data = snap.val();
    if (!data) { alert("Aucune donnée à exporter."); return; }
    var payload = {
      _meta: {
        source: dbRef,
        exportedAt: new Date().toISOString(),
        exportedBy: "snapshot_tool",
        version: 1
      },
      data: data
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = (filename || dbRef.replace(/\//g, "_")) + "_" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(url);
  });
}

function snapshotImport(dbRef, file, onDone) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var payload = JSON.parse(e.target.result);
      var data = payload.data || payload; // Support both wrapped and raw
      if (!confirm("⚠️ Écraser toutes les données de '" + dbRef + "' avec le snapshot du " + (payload._meta ? payload._meta.exportedAt : "?") + " ?")) return;
      firebase.database().ref(dbRef).set(data, function(err) {
        if (err) { alert("Erreur: " + err.message); }
        else { alert("✅ Snapshot importé avec succès."); if (onDone) onDone(); }
      });
    } catch (ex) { alert("Fichier invalide: " + ex.message); }
  };
  reader.readAsText(file);
}

    h("button", { className: "btn-sm btn-ghost", title:"Réinjecter dans Firebase un fichier JSON précédemment exporté. Attention : écrase les données actuelles.", onClick: function() { document.getElementById(fileInputId).click(); } }, "📤 Importer snapshot"),

// Vérifie si "query" matche les initiales de "eleve" (format NOM Prénom).
// Ex: "DUPONT Marie" matche "DM" ou "MD".
function matchInit(eleve,query){

// === Snapshots (sauvegardes) ===
// Crée un instantané complet d'une réécriture (config, corrections, absents, paquetOrder).
// Limite à 5 snapshots par réécriture : les plus anciens sont supprimés automatiquement.
// label : "manuel" | "auto-quotidien" | "avant-restauration"
function createSnapshot(reecritureId,label){
  if(!reecritureId)return Promise.reject(new Error("reecritureId manquant"));
  return db.ref("reecritures/"+reecritureId).once("value").then(function(snap){
    var data=snap.val()||{};
    // Préparer le payload sans inclure les snapshots eux-mêmes
    var payload={};
    Object.keys(data).forEach(function(k){if(k!=="snapshots")payload[k]=data[k]});
    var ts=Date.now();
    var snapId="snap_"+ts;
    var snapData={createdAt:ts,label:label||"manuel",payload:payload};
    // Purger les anciens snapshots pour ne garder que les 4 plus récents (le nouveau fera 5)
    var existing=data.snapshots||{};
    var existingList=Object.keys(existing).map(function(k){return Object.assign({id:k},existing[k])});
    existingList.sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0)});
    var toDelete=existingList.slice(4); // garder 4 + ajouter 1 = 5
    var updates={};
    updates["snapshots/"+snapId]=snapData;
    toDelete.forEach(function(s){updates["snapshots/"+s.id]=null});
    return db.ref("reecritures/"+reecritureId).update(updates).then(function(){return snapId});
  });
}
// Restaure un snapshot : remplace config/corrections/absents/paquetOrder par les valeurs sauvegardées.
// Crée d'abord un snapshot "avant-restauration" pour pouvoir annuler.
function restoreSnapshot(reecritureId,snapId){
  if(!reecritureId||!snapId)return Promise.reject(new Error("Param\u00e8tres manquants"));
  return db.ref("reecritures/"+reecritureId+"/snapshots/"+snapId).once("value").then(function(snap){
    var snapData=snap.val();
    if(!snapData||!snapData.payload)return Promise.reject(new Error("Snapshot introuvable"));
    var payload=snapData.payload;
    // 1. Créer une sauvegarde de l'état actuel pour annulation possible
    return createSnapshot(reecritureId,"avant-restauration").then(function(){
      // 2. Restaurer les sous-clés une par une (sauf snapshots qui reste intact)
      var ref=db.ref("reecritures/"+reecritureId);
      var keys=["config","corrections","absents","paquetOrder"];
      var promises=keys.map(function(k){
        var val=payload[k];
        if(val===undefined)return ref.child(k).remove();
        return ref.child(k).set(val);
      });
      return Promise.all(promises);
    });
  });
}
// Formate la date d'un snapshot pour affichage
function formatSnapshotDate(ts){
  if(!ts)return "?";
  var d=new Date(ts);
  var now=new Date();
  var sameDay=d.toDateString()===now.toDateString();
  var yest=new Date(now.getTime()-86400000);
  var isYest=d.toDateString()===yest.toDateString();
  var hm=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
  if(sameDay)return "Aujourd'hui "+hm;
  if(isYest)return "Hier "+hm;
  return String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear()+" "+hm;
}

    var nc=note/baremeTotal>=.8?"#276749":note/baremeTotal>=.5?"#975a16":"#c53030";

    // RECTO
    html+='<div class="fiche">';
    html+='<div class="fiche-header"><div><h1>'+(data.title||"R\u00e9\u00e9criture")+'</h1><div class="eleve">'+(data.classe||"")+' &mdash; '+eleve+'</div></div>';
    html+='<div class="note" style="color:'+nc+'">'+note+'<span style="font-size:12pt;font-weight:400;color:#999">/'+baremeTotal+'</span></div></div>';
    html+='<div class="consigne">Les mots soulign\u00e9s contiennent une erreur. Les mots barr\u00e9s ont \u00e9t\u00e9 oubli\u00e9s. Avec un camarade, retrouve la version correcte et \u00e9cris-la au-dessus.</div>';
    html+='<div class="texte">';

    for(var i=0;i<tokens.length;i++){
      // Extras à insérer après le token précédent
      if(extraMap[i-1]){
        extraMap[i-1].forEach(function(ex){
          html+='<span class="extra-signal">&thinsp;[+'+ex.word+']&thinsp;</span>';
        });
      }
      var tok=tokens[i];
      if(tok.type==="space"){html+=tok.text;continue}
      var info=modifMap[i];
      var isInModif=!!info;
      var hasModifErr=isInModif&&modifErrMap[info.modifIdx];
      var hasCopyErr=!isInModif&&copyErrMap[i];
      var hasMissingErr=!isInModif&&missingErrMap[i];

      if(hasModifErr){
        var blanks="";for(var j=0;j<tok.text.length;j++)blanks+="_";
        var bareme=info.modif.bareme||1;
        html+='<span class="trou"><span class="trou-top">'+blanks+'</span><span class="trou-label trou-label-m">M&minus;'+bareme+'</span></span>';
      } else if(hasCopyErr){
        var blanks2="";for(var j=0;j<tok.text.length;j++)blanks2+="_";
        html+='<span class="trou"><span class="trou-top">'+blanks2+'</span><span class="trou-label trou-label-c">C</span></span>';
      } else if(hasMissingErr){
        // Mot manquant : afficher le mot barré pour indiquer qu'il aurait dû être recopié
        html+='<span class="trou-missing">'+tok.text+'</span>';
      } else {
        html+=tok.text;
      }
    }
    // Extras après le dernier token
    if(extraMap[tokens.length-1]){
      extraMap[tokens.length-1].forEach(function(ex){
        html+='<span class="extra-signal">&thinsp;[+'+ex.word+']&thinsp;</span>';
      });
    }

    html+='</div>';
    html+='<div class="summary"><span>'+(co.modif||0)+' modif. rat\u00e9e'+((co.modif||0)>1?"s":"")+' &middot; '+(co.copie||0)+' erreur'+((co.copie||0)>1?"s":"")+' de copie &middot; '+(co.extras||0)+' en trop</span>';
    html+='<strong style="color:'+nc+'">'+note+'/'+baremeTotal+'</strong></div>';
    html+='</div>';

    // VERSO
    html+='<div class="verso">';
    html+='<div class="verso-header"><h1>'+eleve+' &mdash; Correction</h1><div class="info">'+(data.title||"R\u00e9\u00e9criture")+' &middot; '+(data.classe||"")+'</div></div>';
    html+='<div class="verso-title">Corrige tes erreurs</div>';
    html+='<div style="font-size:9pt;color:#777;font-style:italic;margin-bottom:14px">Cherche dans le texte (au recto) la version correcte de chaque erreur. \u00c9cris ta r\u00e9ponse sur la ligne.</div>';

    // Construire la liste triée par ordre d'apparition dans le texte
    var allItems=[];
    errors.filter(function(e){return e.type==="modif"}).forEach(function(err){
      var m=modifs[err.modifIdx];
      if(!m)return;
      var firstTok=(m.tokens||[])[0]||0;
      var firstRange=wordToTokens[firstTok];
      var sortIdx=firstRange?firstRange[0]:firstTok;
      allItems.push({sort:sortIdx,kind:"modif",err:err});
    });
    errors.filter(function(e){return e.type==="copie"}).forEach(function(err){
      allItems.push({sort:err.idx,kind:"copie",err:err});
    });
    errors.filter(function(e){return e.type==="manquant"}).forEach(function(err){
      allItems.push({sort:err.idx,kind:"manquant",err:err});
    });
    extras.forEach(function(ex){
      allItems.push({sort:ex.afterIdx+0.5,kind:"extra",ex:ex});
    });
    allItems.sort(function(a,b){return a.sort-b.sort});

    var n=1;
    allItems.forEach(function(it){
      if(it.kind==="modif"){
        var err=it.err;
        html+='<div class="err-row">';
        html+='<div class="err-num err-num-m">'+n+'</div>';
        html+='<div class="err-body">';
        html+='<div class="err-type err-type-m">Modification rat\u00e9e (&minus;'+(err.bareme||1)+')</div>';
        if(err.fautif){
          html+='<div class="err-hint">Tu avais \u00e9crit &laquo;&nbsp;<span style="text-decoration:line-through">'+err.fautif+'</span>&nbsp;&raquo;. Quelle \u00e9tait la version correcte ?</div>';
        } else {
          html+='<div class="err-hint">Cherche le trou rouge \u00ab M \u00bb correspondant dans le texte. Quelle \u00e9tait la version correcte ?</div>';
        }
        html+='<div class="err-line"></div>';
        html+='</div></div>';
      } else if(it.kind==="copie"){
        var err=it.err;
        html+='<div class="err-row">';
        html+='<div class="err-num err-num-c">'+n+'</div>';
        html+='<div class="err-body">';
        html+='<div class="err-type err-type-c">Erreur de copie (&minus;'+(err.bareme||0.25)+')</div>';
        if(err.fautif){
          html+='<div class="err-hint">Tu avais \u00e9crit &laquo;&nbsp;<span style="text-decoration:line-through">'+err.fautif+'</span>&nbsp;&raquo;. Quel \u00e9tait le mot exact ?</div>';
        } else {
          html+='<div class="err-hint">Cherche le trou ocre \u00ab C \u00bb correspondant dans le texte. Quel \u00e9tait le mot exact ?</div>';
        }
        html+='<div class="err-line"></div>';
        html+='</div></div>';
      } else if(it.kind==="extra"){
        var ex=it.ex;
        html+='<div class="err-row">';
        html+='<div class="err-num err-num-x">'+n+'</div>';
        html+='<div class="err-body">';
        html+='<div class="err-type err-type-x">Mot/ponctuation en trop (&minus;'+(ex.bareme||0.25)+')</div>';
        html+='<div class="err-hint">Tu avais ajout\u00e9 &laquo;&nbsp;<span style="text-decoration:line-through">'+ex.word+'</span>&nbsp;&raquo;. Pourquoi ce mot n\'avait-il pas sa place ici ?</div>';
        html+='<div class="err-line"></div>';
        html+='</div></div>';
      } else if(it.kind==="manquant"){
        var err=it.err;
        html+='<div class="err-row">';
        html+='<div class="err-num err-num-mis">'+n+'</div>';
        html+='<div class="err-body">';
        html+='<div class="err-type err-type-mis">Mot oubli\u00e9 (&minus;'+(err.bareme||0.25)+')</div>';
        html+='<div class="err-hint">Tu avais oubli\u00e9 de recopier un mot du texte. Cherche le mot barr\u00e9 dans le texte (au recto) et retape-le ici.</div>';
        html+='<div class="err-line"></div>';
        html+='</div></div>';
      }
      n++;
    });
    if(n===1){
      html+='<div style="padding:20px;text-align:center;color:#276749;font-size:11pt">\u2705 Aucune erreur. Bravo !</div>';
    }

    html+='<div class="verso-consigne">Avec un camarade, compl\u00e8te chaque ligne en t\'aidant du recto. Si tu s\u00e8ches sur une, marque-la et demande-moi.</div>';
    html+='</div>';
  });

  html+='</body></html>';
  var w=window.open('','_blank');
  if(!w){alert("Le navigateur a bloqu\u00e9 l'ouverture du nouvel onglet. Autorise les popups pour ce site.");return}
  w.document.write(html);
  w.document.close();
}

function AppProf(p){

  var s19=useState(""),consigneInput=s19[0],setConsigneInput=s19[1];
  var s20=useState(""),niveauInput=s20[0],setNiveauInput=s20[1];
  var s3=useState([]),saved=s3[0],setSaved=s3[1];
  var s4=useState(null),currentRee=s4[0],setCurrentRee=s4[1];

  var s10=useState(null),editing=s10[0],setEditing=s10[1];
  var s11=useState({}),editForm=s11[0],setEditForm=s11[1];
  var s12=useState(false),showClassMgr=s12[0],setShowClassMgr=s12[1];
  var s13=useState(""),newClassName=s13[0],setNewClassName=s13[1];
  var s14=useState(""),newClassEleves=s14[0],setNewClassEleves=s14[1];
  var s15=useState({}),absents=s15[0],setAbsents=s15[1];
  var s21=useState(10),baremeTotalInput=s21[0],setBaremeTotalInput=s21[1];
  var s22=useState([]),modifsEdited=s22[0],setModifsEdited=s22[1];
  // Pièges fréquents (erreurs récurrentes des élèves sur ce texte attendu)
  // Stockés en : [{tokenIdx, attendu, fautif}, ...]
  var sp1=useState([]),pieges=sp1[0],setPieges=sp1[1];
  // Popup d'ajout d'un piège : null ou {tokenIdx, attendu}
  var sp2=useState(null),piegePopup=sp2[0],setPiegePopup=sp2[1];
  var sp3=useState(""),piegeFautifInput=sp3[0],setPiegeFautifInput=sp3[1];
  var ssn=useState(false),snapshotsOpen=ssn[0],setSnapshotsOpen=ssn[1];
  // Présence en direct des élèves (heartbeat) : {ek: {lastSeen, name}}
  var spr=useState({}),presence=spr[0],setPresence=spr[1];
  // Tick toutes les 30 s pour rafraîchir l'affichage des badges de présence
  // (sans dépendre d'un changement Firebase entre deux heartbeats)
  var stk=useState(0),presTick=stk[0],setPresTick=stk[1];
  useEffect(function(){
    var iv=setInterval(function(){setPresTick(function(t){return t+1})},30000);
    return function(){clearInterval(iv)};
  },[]);
  // Ref pour bloquer le useEffect de re-détection des modifs juste après loadForEdit
  // (sinon le découpage personnalisé serait écrasé par la détection auto)
  var skipNextDetectRef=React.useRef(false);
  // Toast de notification quand un piège est auto-détecté (chiffre = nb de nouveaux pièges)
  var satp=useState(null),autoPiegeToast=satp[0],setAutoPiegeToast=satp[1];
  useEffect(function(){
    if(autoPiegeToast==null)return;
    var t=setTimeout(function(){setAutoPiegeToast(null)},3500);
    return function(){clearTimeout(t)};
  },[autoPiegeToast]);
  var s23=useState(null),addingModif=s23[0],setAddingModif=s23[1];
  var s24=useState(null),corrEleve=s24[0],setCorrEleve=s24[1];
  var sfc=useState(false),chainActive=sfc[0],setChainActive=sfc[1];
  // Ordre du paquet de copies (liste de noms d'élèves). Permet de corriger dans l'ordre du paquet
  // physique sans avoir à taper les initiales pour chaque copie. Réinitialisé à chaque session.
  var spq=useState([]),paquetOrder=spq[0],setPaquetOrder=spq[1];
  var scm=useState(false),classerOpen=scm[0],setClasserOpen=scm[1];
  var s25=useState({}),corrections=s25[0],setCorrections=s25[1];
  var s26=useState(null),editingModifIdx=s26[0],setEditingModifIdx=s26[1];
  var s27=useState(""),editingModifOrig=s27[0],setEditingModifOrig=s27[1];
  var s28=useState(""),editingModifAtt=s28[0],setEditingModifAtt=s28[1];
  var s29=useState(1),editingModifBareme=s29[0],setEditingModifBareme=s29[1];

  // Re-détection avec merge intelligent : les éditions manuelles (barème, catégorie, modifs ajoutées
  // manuellement) sont préservées quand la paire (original, attendu) d'une modif reste identique.
  // Évite que la frappe dans les champs texte ne réinitialise tout le travail de paramétrage.
  // Le skipNextDetectRef permet de ne PAS re-détecter juste après loadForEdit, pour conserver
  // exactement le découpage personnalisé stocké en base.
  useEffect(function(){
    if(skipNextDetectRef.current){skipNextDetectRef.current=false;return}
    if(!originalInput.trim()||!attenduInput.trim()){setModifsEdited([]);return}
    var next=detectModifs(originalInput.trim(),attenduInput.trim());
    setModifsEdited(function(prev){
      var sig=function(m){return (m.original||"").toLowerCase().trim()+"||"+(m.attendu||"").toLowerCase().trim()};
      var prevBySig={};(prev||[]).forEach(function(p){prevBySig[sig(p)]=p});
      var merged=next.map(function(n){
        var match=prevBySig[sig(n)];
        if(match){
          return Object.assign({},n,{
            bareme:match.bareme!=null?match.bareme:n.bareme,
            categorie:match.categorie||"",
            manual:match.manual||false
          });
        }
        return n;
      });
      // Préserver les modifs ajoutées manuellement qui ne sont pas dans la nouvelle détection
      var mergedSigs={};merged.forEach(function(m){mergedSigs[sig(m)]=true});
      var manualsKept=(prev||[]).filter(function(p){return p.manual&&!mergedSigs[sig(p)]});
      // Renuméroter
      var all=merged.concat(manualsKept);
      all.forEach(function(m,i){m.num=i+1});
      return all;
    });
  },[originalInput,attenduInput]);

  // Nettoyage des pièges si le texte attendu change : on retire les pièges dont le tokenIdx
  // ne correspond plus à un mot, ou dont le mot attendu a changé d'orthographe.
  useEffect(function(){
    var newTokens=tokenizeForCorrection(attenduInput);
    setPieges(function(prev){
      return (prev||[]).filter(function(p){
        var tok=newTokens[p.tokenIdx];
        return tok&&tok.type==="word"&&tok.text===p.attendu;
      });
    });
  },[attenduInput]);

  useEffect(function(){db.ref("classes").on("value",function(snap){CLASSES=snap.val()||{};setClassesLoaded(CLASSES)})},[]);
  useEffect(function(){db.ref("reecritures").once("value",function(snap){
    var val=snap.val()||{};
    setSaved(Object.keys(val).map(function(id){
      var c=val[id].config||{};var cn=c.classe||"";var fbE=CLASSES[cn];
      return{id:id,title:c.title||id,classe:cn,n:extractEleves(fbE,c.eleves||[]).length}
    }))
  })},[classesLoaded]);

  // Auto-detect modifications between original and attendu
  // Stratégie :
  //   1. Détecter les préfixe et suffixe communs (mots identiques au début et à la fin).
  //   2. Si la zone modifiée a la même taille des deux côtés → alignement par position
  //      (plusieurs modifs distinctes possibles).
  //   3. Sinon → modif unique sur toute la zone modifiée.
  // Enrichit chaque modif avec : bareme suggéré (-1, -0,5 ou -0,25 selon répétition),
  // tokens (indices dans le split du texte attendu), repeatCount (pour tooltips).
  function detectModifs(orig,att){
    var norm=function(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[\u2019\u2018\u0027\u0060\u00b4]/g,"\u0027").replace(/[\u2019\u2018'"]/g," ").replace(/[^a-z0-9\s]/g,"").replace(/\s+/g," ").trim()};
    var ow=orig.split(/\s+/),aw=att.split(/\s+/);

    // Préfixe commun
    var prefLen=0;
    while(prefLen<ow.length&&prefLen<aw.length&&norm(ow[prefLen])===norm(aw[prefLen]))prefLen++;
    // Suffixe commun (sans empiéter sur le préfixe)
    var sufLen=0;
    while(sufLen<ow.length-prefLen&&sufLen<aw.length-prefLen
          &&norm(ow[ow.length-1-sufLen])===norm(aw[aw.length-1-sufLen]))sufLen++;

    var owMidLen=ow.length-prefLen-sufLen;
    var awMidLen=aw.length-prefLen-sufLen;
    if(owMidLen===0&&awMidLen===0)return [];

    var modifs=[],num=0,seen={};

    if(owMidLen===awMidLen){
      // Tailles égales dans la zone → alignement par position (peut produire plusieurs modifs)
      var i=prefLen,maxI=prefLen+owMidLen;
      while(i<maxI){
        if(norm(ow[i])!==norm(aw[i])){
          var start=i;
          while(i<maxI&&norm(ow[i])!==norm(aw[i]))i++;
          num++;
          var origStr=ow.slice(start,i).join(" ");
          var attStr=aw.slice(start,i).join(" ");
          var key=norm(origStr)+"||"+norm(attStr);
          var prevCount=seen[key]||0;
          var suggBareme=prevCount===0?1:prevCount===1?0.5:0.25;
          seen[key]=prevCount+1;
          var tokens=[];for(var j=start;j<i;j++)tokens.push(j);
          modifs.push({num:num,original:origStr,attendu:attStr,categorie:"",bareme:suggBareme,tokens:tokens,repeatCount:prevCount});
        } else {i++}
      }
    } else {
      // Tailles différentes → modif unique sur toute la zone modifiée
      var origStr2=ow.slice(prefLen,prefLen+owMidLen).join(" ");
      var attStr2=aw.slice(prefLen,prefLen+awMidLen).join(" ");
      var tokens2=[];for(var j=prefLen;j<prefLen+awMidLen;j++)tokens2.push(j);
      modifs.push({num:1,original:origStr2,attendu:attStr2,categorie:"",bareme:1,tokens:tokens2,repeatCount:0});
    }

    return modifs;
  }

  function createForClasse(){
    if(!classeInput||!titleInput.trim()||!originalInput.trim()||!attenduInput.trim())return;
    var modifs=modifsEdited;
    if(modifs.length===0){alert("Aucune modification d\u00e9tect\u00e9e entre le texte original et le texte attendu.");return}
    // Mode édition : conserver l'id existant pour préserver les corrections/absents
    var id=editing||(sanId(titleInput)+"-"+sanId(classeInput));
    // Si édition et que des corrections existent, prévenir Paul du risque d'incohérence
    if(editing){
      var hasCorrections=Object.keys(corrections||{}).length>0;
      if(hasCorrections){
        if(!confirm("Cette r\u00e9\u00e9criture a d\u00e9j\u00e0 des corrections enregistr\u00e9es.\n\nSi tu modifies les textes ou les modifications, les corrections existantes peuvent devenir incoh\u00e9rentes (mots/positions qui ne correspondent plus).\n\nConfirmer la mise \u00e0 jour ?")){return}
      }
    }
    // Nettoyer les pièges dont le mot attendu ne correspond plus au texte (si modifié)
    var attTokens=tokenizeForCorrection(attenduInput.trim());
    var cleanPieges=(pieges||[]).filter(function(pg){
      var tok=attTokens[pg.tokenIdx];
      return tok&&tok.type==="word"&&tok.text===pg.attendu;
    });
    var cfg={
      title:titleInput.trim(),classe:classeInput,niveau:niveauInput||"",published:true,
      original:originalInput.trim(),attendu:attenduInput.trim(),modifs:modifs,
      consigne:consigneInput.trim()||"",
      baremeTotal:baremeTotalInput,
      pieges:cleanPieges
    };
    // .update() préserve d'autres sous-clés éventuelles ; .set() écrirait à plat
    db.ref("reecritures/"+id+"/config").update(cfg);

  // Détection automatique des erreurs récurrentes (sur ≥2 élèves) → ajout aux pièges fréquents.

  //   - copie : le tokenIdx du mot erroné
  //   - modif : le 1er token du 1er mot modifié de la modif (représentatif)
  function autoDetectPieges(currentKey,currentErrors){
    if(!currentRee||!currentRee.attendu)return;
    var existingPieges=toArr(currentRee.pieges||[]);
    var attTokens=tokenizeForCorrection(currentRee.attendu);
    var wordToTokensMap=mapSplitWordsToTokens(attTokens);
    var modifs=toArr(currentRee.modifs||[]);
    var newPieges=[];

    function tryAddPiege(tokenIdx,attendu,fautif){
      // Existe déjà (existant ou nouveau) ?
      var pgExists=existingPieges.some(function(p){return p.tokenIdx===tokenIdx&&p.fautif===fautif})

      if(pgExists)return;
      newPieges.push({tokenIdx:tokenIdx,attendu:attendu,fautif:fautif});
    }

    currentErrors.forEach(function(err){
      var fautif=(err.fautif||"").trim();
      if(!fautif)return;

      // === Erreur de copie ===
      if(err.type==="copie"&&err.idx!=null){
        var tok=attTokens[err.idx];
        if(!tok||tok.type!=="word")return;
        // Un autre élève a-t-il la même erreur ?
        var hasOther=false;
        Object.keys(corrections||{}).forEach(function(k){
          if(k===currentKey)return;
          var corr=corrections[k];
          if(!corr||!corr.errors)return;
          toArr(corr.errors).forEach(function(e){
            if(e.type==="copie"&&e.idx===err.idx&&(e.fautif||"").trim()===fautif)hasOther=true;
          });
        });
        if(hasOther)tryAddPiege(err.idx,tok.text,fautif);
      }

      // === Modif ratée ===
      if(err.type==="modif"&&err.modifIdx!=null){
        var modif=modifs[err.modifIdx];
        if(!modif||!modif.tokens||modif.tokens.length===0)return;
        var wordIdx=modif.tokens[0]; // 1er mot modifié
        var tokenRange=wordToTokensMap[wordIdx];
        if(!tokenRange)return;
        var representativeIdx=tokenRange[0]; // 1er token du 1er mot
        var tokM=attTokens[representativeIdx];
        if(!tokM||tokM.type!=="word")return;
        // Un autre élève a-t-il la même modif ratée avec le même fautif ?
        var hasOtherM=false;
        Object.keys(corrections||{}).forEach(function(k){
          if(k===currentKey)return;
          var corr=corrections[k];
          if(!corr||!corr.errors)return;
          toArr(corr.errors).forEach(function(e){
            if(e.type==="modif"&&e.modifIdx===err.modifIdx&&(e.fautif||"").trim()===fautif)hasOtherM=true;
          });
        });
        if(hasOtherM)tryAddPiege(representativeIdx,tokM.text,fautif);
      }
    });

    var allPieges=sortPiegesByPosition(existingPieges.concat(newPieges));
    db.ref("reecritures/"+currentId+"/config/pieges").set(allPieges);
    setCurrentRee(Object.assign({},currentRee,{pieges:allPieges}));
    // Notification visuelle (toast qui s'estompe)
    setAutoPiegeToast(newPieges.length);
  }

      // Si eleveNames omis, imprime tous les élèves corrigés
      var names=eleveNames||(currentRee.eleves||[]).filter(function(e){var k=san(e);return !absents[k]&&!!corrections[k]});
      if(names.length===0){alert("Aucune correction \u00e0 imprimer.");return}
      generateFichesReecriture(currentRee,corrections,names);
    },
    onOpenEleve:function(name){setCorrEleve(name);setScreen("correction")}
  }),
    classerOpen&&h(ClasserPaquet,{
      eleves:currentRee.eleves||[],
      absents:absents,
      corrections:corrections,
      initialOrder:paquetOrder,
      onCancel:function(){setClasserOpen(false)},
      onSave:function(newOrder){
        setPaquetOrder(newOrder);
        // Persister dans Firebase pour retrouver l'ordre au prochain chargement
        if(currentId)db.ref("reecritures/"+currentId+"/paquetOrder").set(newOrder);
        setClasserOpen(false);
      }
    }),
    snapshotsOpen&&h(SnapshotsModal,{
      reecritureId:currentId,
      onClose:function(){setSnapshotsOpen(false)},
      onRestored:function(){
        // Recharger après restauration
        if(currentId)setTimeout(function(){load(currentId)},800);
      }
    })
  );
  if(screen==="correction"&&currentRee){
    // Liste des élèves non absents
    var elevesCorr=(currentRee.eleves||[]).filter(function(e){return !absents[san(e)]});
    if(!corrEleve){
      // Grille
      return h(BilanReecriture,{
        data:currentRee,corrections:corrections,absents:absents,
        onOpenEleve:function(name){setCorrEleve(name)},
        onBack:function(){setScreen("suivi")}
      });
    }
    // Écran de correction pour un élève
    // Navigation : si un paquet est classé ET l'élève courant en fait partie, suivre l'ordre du paquet ;
    // sinon retomber sur l'ordre alphabétique de la classe (élevesCorr).
    var validPaquetNav=paquetOrder.filter(function(e){return elevesCorr.indexOf(e)!==-1});
    var navList=elevesCorr;
    var idxInPaq=validPaquetNav.indexOf(corrEleve);
    if(validPaquetNav.length>0&&idxInPaq!==-1)navList=validPaquetNav;
    var idx=navList.indexOf(corrEleve);
    var prevEleve=idx>0?navList[idx-1]:null;
    var nextEleve=idx>=0&&idx<navList.length-1?navList[idx+1]:null;
    var ek=san(corrEleve);
    var existing=corrections[ek]?{errors:toArr(corrections[ek].errors),extras:toArr(corrections[ek].extras)}:null;
    return h(React.Fragment,null,
      autoPiegeToast!=null&&h("div",{key:"toast-"+autoPiegeToast,style:{position:"fixed",top:20,left:"50%",zIndex:500,padding:"12px 20px",background:"#fff7ed",border:"1.5px solid #fb923c",borderRadius:10,boxShadow:"0 8px 24px rgba(0,0,0,.15)",fontWeight:600,color:"#c2410c",fontSize:".95rem",animation:"toastFade 3.5s ease-in-out forwards",pointerEvents:"none"}},
        "\ud83c\udfaf "+autoPiegeToast+" nouveau pi\u00e8ge"+(autoPiegeToast>1?"s":"")+" auto-d\u00e9tect\u00e9"+(autoPiegeToast>1?"s":"")
      ),
      h(CorrEleveReecriture,{
      key:ek,// remount on switch
      data:{reecriture:currentRee},
      eleve:corrEleve,
      eleves:elevesCorr,
      existing:existing,
      corrections:corrections,
      startFast:false,
      startChainActive:chainActive,
      onAutoSave:function(errors,extras){
        // Sauvegarde silencieuse sans changer d'élève — protège contre pertes (crash, fermeture onglet)
        saveCorrection(corrEleve,errors,extras);
      },
      onAddPiege:function(newPiege){
        // Ajoute un piège à la config Firebase + au state local (currentRee.pieges)
        var current=toArr(currentRee.pieges||[]);
        var updated=sortPiegesByPosition(current.concat([newPiege]));
        db.ref("reecritures/"+currentId+"/config/pieges").set(updated);
        setCurrentRee(Object.assign({},currentRee,{pieges:updated}));
      },
      onSave:function(errors,extras){
        saveCorrection(corrEleve,errors,extras);
        if(chainActive){
          // Si un paquet est classé, suivre l'ordre du paquet (filtré sur les élèves de la classe actuelle)
          var nextInChain=null;
          var validPaquet=paquetOrder.filter(function(e){return elevesCorr.indexOf(e)!==-1});
          if(validPaquet.length>0){
            var idxP=validPaquet.indexOf(corrEleve);
            if(idxP>=0){
              for(var p=idxP+1;p<validPaquet.length;p++){
                var pk=san(validPaquet[p]);
                if(!corrections[pk]&&!absents[pk]){nextInChain=validPaquet[p];break}
              }
            }
          } else {
            // Sans paquet : ordre alphabétique
            var idx2=elevesCorr.indexOf(corrEleve);
            for(var i=idx2+1;i<elevesCorr.length;i++){
              var nk=san(elevesCorr[i]);
              if(!corrections[nk]){nextInChain=elevesCorr[i];break}
            }
          }
          if(nextInChain)setCorrEleve(nextInChain);
          else {setCorrEleve(null);setChainActive(false);alert("\u2705 Tout corrig\u00e9 !")}
        } else {
          if(nextEleve)setCorrEleve(nextEleve);else setCorrEleve(null);
        }
      },
      onCancel:function(){setCorrEleve(null);setChainActive(false)},
      onPrev:prevEleve?function(){setCorrEleve(prevEleve)}:null,
      onNext:nextEleve?function(){setCorrEleve(nextEleve)}:null,
      onSwitchEleve:function(name){setCorrEleve(name)},
      onTransfer:function(targetName,mode){
        var sek=san(corrEleve),tek=san(targetName);
        if(sek===tek)return;
        var sCorr=corrections[sek];
        var tCorr=corrections[tek];
        if(!sCorr)return;
        var dRef="reecritures/"+currentId;
        var nc=Object.assign({},corrections);
        // Préparer les nouveaux objets (sans autocorrection : elle deviendrait incohérente)
        var srcClean=Object.assign({},sCorr);delete srcClean.autoCorrection;
        if(mode==="swap"&&tCorr){
          var dstClean=Object.assign({},tCorr);delete dstClean.autoCorrection;
          nc[tek]=Object.assign({},srcClean,{timestamp:Date.now()});
          nc[sek]=Object.assign({},dstClean,{timestamp:Date.now()});
          db.ref(dRef+"/corrections/"+tek).set(nc[tek]);
          db.ref(dRef+"/corrections/"+sek).set(nc[sek]);
        } else {
          // replace ou transfer : src devient vierge, dst prend la correction de src
          nc[tek]=Object.assign({},srcClean,{timestamp:Date.now()});
          delete nc[sek];
          db.ref(dRef+"/corrections/"+tek).set(nc[tek]);
          db.ref(dRef+"/corrections/"+sek).remove();
        }
        setCorrections(nc);
        // Aller vers l'élève destinataire pour vérification
        setCorrEleve(targetName);
      }
    }));
  }
  return null;
}

// ═══ SUIVI — RÉÉCRITURE ═══
// Vue globale prof : statut de chaque élève (corrigé / en autocorrection / terminé / absent),
// stats classe, accès rapide à la correction et à l'absence.
// Props : data (currentRee), corrections, absents, onBack, onGoToCorrection, onToggleAbsent, onOpenEleve
// Modal pour renseigner l'ordre des copies dans le paquet (avant de lancer "Tout corriger").
// L'enseignant saisit les initiales successives de chaque copie du paquet.
// Réduit le besoin de chercher la bonne copie élève par élève dans la zone initiales.
function ClasserPaquet(p){
  var allEleves=p.eleves||[];
  var absents=p.absents||{};
  var corrections=p.corrections||{};
  var sq=useState(""),query=sq[0],setQuery=sq[1];
  var so=useState(p.initialOrder||[]),order=so[0],setOrder=so[1];
  var matches=query?allEleves.filter(function(e){
    if(order.indexOf(e)!==-1)return false; // déjà classée
    return matchInit(e,query);
  }):[];

  function addEleve(name){
    setOrder(order.concat([name]));
    setQuery("");
    // Refocus l'input après ajout
    setTimeout(function(){var el=document.getElementById("classer-input");if(el)el.focus()},10);
  }
  function removeAt(idx){
    var no=order.slice();no.splice(idx,1);setOrder(no);
  }
  function moveUp(idx){
    if(idx===0)return;
    var no=order.slice();var tmp=no[idx-1];no[idx-1]=no[idx];no[idx]=tmp;setOrder(no);
  }
  function moveDown(idx){
    if(idx===order.length-1)return;
    var no=order.slice();var tmp=no[idx+1];no[idx+1]=no[idx];no[idx]=tmp;setOrder(no);
  }

  return h("div",{className:"popup-overlay",onClick:p.onCancel},
    h("div",{onClick:function(e){e.stopPropagation()},style:{background:"var(--card)",borderRadius:14,padding:"20px",maxWidth:520,width:"94%",boxShadow:"0 12px 40px rgba(0,0,0,.2)",maxHeight:"90vh",overflow:"auto"}},

          ifo("Saisis les initiales de chaque copie du paquet, dans l'ordre o\u00f9 elles sont rang\u00e9es sur ton bureau. Quand tu lances \"Tout corriger\", l'app suivra cet ordre.",{left:true,below:true})),
        h("button",{onClick:p.onCancel,title:"Fermer sans enregistrer les changements.",
          style:{padding:"4px 10px",fontSize:".82rem",borderRadius:6,border:"1.5px solid rgba(0,0,0,.1)",background:"#fff",color:"var(--text-sub)",cursor:"pointer",fontFamily:"inherit"}},"\u2715")
      ),
      h("p",{style:{fontSize:".85rem",color:"var(--muted)",lineHeight:1.5,marginBottom:12}},
        "Prends ton paquet de copies, et pour chaque copie en partant du dessus, tape les initiales de l'\u00e9l\u00e8ve (ex : ",h("strong",null,"DM")," pour DUPONT Marie). Appuie sur Entr\u00e9e pour valider et passer \u00e0 la suivante."
      ),
      h("input",{id:"classer-input",value:query,onChange:function(e){setQuery(e.target.value)},
        autoFocus:true,
        placeholder:"Initiales de la copie du dessus (ex : DM)\u2026",
        title:"Tape les initiales de la copie courante du paquet. \u00c9chap pour fermer.",
        style:{width:"100%",padding:"10px 14px",fontSize:"1rem",borderRadius:10,border:"1.5px solid var(--border)",textTransform:"uppercase",fontWeight:600,marginBottom:6,fontFamily:"inherit",boxSizing:"border-box"},
        onKeyDown:function(e){
          if(e.key==="Escape"){e.preventDefault();p.onCancel()}
          if(e.key==="Enter"&&matches.length===1){e.preventDefault();addEleve(matches[0])}
        }}),
      query&&matches.length===0&&h("div",{style:{padding:"8px 12px",background:"var(--card2)",borderRadius:6,fontSize:".82rem",color:"var(--muted)",marginBottom:10}},"Aucun \u00e9l\u00e8ve correspondant (ou d\u00e9j\u00e0 class\u00e9)."),
      matches.length>0&&h("div",{style:{marginBottom:10,maxHeight:160,overflow:"auto"}},
        matches.slice(0,8).map(function(name){
          var k=san(name);
          var status=absents[k]?"\ud83d\udeab absent":corrections[k]?"\u2705 d\u00e9j\u00e0 corrig\u00e9":"";
          return h("div",{key:name,onClick:function(){addEleve(name)},
            title:"Ajouter "+name+" \u00e0 l'ordre du paquet.",
            style:{padding:"8px 12px",cursor:"pointer",fontSize:".92rem",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}},
            h("span",{style:{fontWeight:600}},name),

          );
        })
      ),
      h("div",{style:{marginTop:12,marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("strong",{style:{fontSize:".88rem"}},"Ordre du paquet : ",h("span",{style:{color:"var(--primary)"}},order.length+" copie"+(order.length>1?"s":""))),
        order.length>0&&h("button",{onClick:function(){if(confirm("Vider toute la liste ?"))setOrder([])},
          title:"Effacer tout l'ordre saisi et recommencer.",

      ),

        h("div",{style:{padding:"14px",textAlign:"center",color:"var(--muted)",fontSize:".88rem",fontStyle:"italic",background:"var(--card2)",borderRadius:8}},"Pas encore d'ordre saisi. Commence par taper les initiales de la 1\u00e8re copie du paquet ci-dessus.")

            return h("div",{key:name,style:{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",border:"1px solid var(--border)",borderRadius:6,marginBottom:4,background:"var(--card2)"}},

              h("span",{style:{flex:1,fontSize:".9rem",fontWeight:600}},name),
              h("span",{style:{fontSize:".72rem",color:statusColor,fontWeight:600}},status),

              h("button",{onClick:function(){moveDown(i)},disabled:i===order.length-1,
                title:"Descendre cette copie d'une position.",
                style:{padding:"2px 6px",fontSize:".78rem",borderRadius:4,border:"1px solid var(--border)",background:"#fff",cursor:i===order.length-1?"not-allowed":"pointer",opacity:i===order.length-1?.4:1,fontFamily:"inherit"}},"\u2193"),
              h("button",{onClick:function(){removeAt(i)},
                title:"Retirer "+name+" de l'ordre du paquet.",
                style:{padding:"2px 6px",fontSize:".78rem",borderRadius:4,border:"1px solid var(--coral)",background:"#fff",color:"var(--coral)",cursor:"pointer",fontFamily:"inherit"}},"\u2715")
            );
          })
        ),
      h("div",{style:{marginTop:14,display:"flex",gap:8,justifyContent:"flex-end"}},
        h("button",{onClick:p.onCancel,title:"Fermer sans enregistrer les modifications.",
          style:{padding:"8px 14px",fontSize:".88rem",fontWeight:600,borderRadius:8,border:"1.5px solid rgba(0,0,0,.1)",background:"#fff",color:"var(--text-sub)",cursor:"pointer",fontFamily:"inherit"}},"Annuler"),

      )

// Modal pour gérer les snapshots (instantanés) d'une réécriture.
// Permet de créer manuellement, restaurer, ou supprimer un snapshot.
function SnapshotsModal(p){
  var ss=useState([]),snapshots=ss[0],setSnapshots=ss[1];
  var sl=useState(true),loading=sl[0],setLoading=sl[1];
  var sb=useState(""),busy=sb[0],setBusy=sb[1];
  var sm=useState(""),message=sm[0],setMessage=sm[1];

  // Charger les snapshots existants
  function refresh(){
    setLoading(true);
    db.ref("reecritures/"+p.reecritureId+"/snapshots").once("value").then(function(snap){
      var val=snap.val()||{};
      var arr=Object.keys(val).map(function(k){return Object.assign({id:k},val[k])});
      arr.sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0)});
      setSnapshots(arr);setLoading(false);
    });
  }
  useEffect(refresh,[]);

  function doCreate(){
    setBusy("create");setMessage("");
    createSnapshot(p.reecritureId,"manuel").then(function(){
      setMessage("\u2713 Instantan\u00e9 cr\u00e9\u00e9");setBusy("");refresh();
      setTimeout(function(){setMessage("")},2500);
    }).catch(function(err){setMessage("Erreur : "+err.message);setBusy("")});
  }
  function doRestore(s){
    if(!confirm("Restaurer cet instantan\u00e9 du "+formatSnapshotDate(s.createdAt)+" ?\n\nL'\u00e9tat actuel sera automatiquement sauvegard\u00e9 avant restauration."))return;
    setBusy("restore-"+s.id);setMessage("");
    restoreSnapshot(p.reecritureId,s.id).then(function(){
      setMessage("\u2713 Restauration termin\u00e9e. Recharge la r\u00e9\u00e9criture pour voir les changements.");setBusy("");refresh();
      if(p.onRestored)p.onRestored();
    }).catch(function(err){setMessage("Erreur : "+err.message);setBusy("")});
  }
  function doDelete(s){
    if(!confirm("Supprimer d\u00e9finitivement l'instantan\u00e9 du "+formatSnapshotDate(s.createdAt)+" ?"))return;
    setBusy("del-"+s.id);
    db.ref("reecritures/"+p.reecritureId+"/snapshots/"+s.id).remove().then(function(){
      setBusy("");refresh();
    });
  }

  function labelChip(s){
    var color={"manuel":"#2563eb","auto-quotidien":"#15803d","avant-restauration":"#c2410c"}[s.label]||"#666";
    var bg={"manuel":"#dbeafe","auto-quotidien":"#dcfce7","avant-restauration":"#fff7ed"}[s.label]||"#eee";
    var label={"manuel":"Manuel","auto-quotidien":"Auto-quotidien","avant-restauration":"Avant-restauration"}[s.label]||s.label;
    return h("span",{style:{fontSize:".72rem",fontWeight:600,padding:"2px 8px",borderRadius:6,background:bg,color:color}},label);
  }
  function countCorr(s){
    if(!s.payload||!s.payload.corrections)return 0;
    return Object.keys(s.payload.corrections).length;
  }

  return h("div",{className:"popup-overlay",onClick:p.onClose},
    h("div",{onClick:function(e){e.stopPropagation()},style:{background:"var(--card)",borderRadius:14,padding:"20px",maxWidth:560,width:"94%",boxShadow:"0 12px 40px rgba(0,0,0,.2)",maxHeight:"90vh",overflow:"auto"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        h("h3",{style:{margin:0,fontSize:"1.05rem"}},"\ud83d\udcbe Sauvegardes",
          ifo("Chaque instantan\u00e9 contient tout l'\u00e9tat de la r\u00e9\u00e9criture (textes, corrections, absents, pi\u00e8ges, paquet). Maximum 5 par r\u00e9\u00e9criture : les plus anciens sont supprim\u00e9s automatiquement. Un instantan\u00e9 auto-quotidien est cr\u00e9\u00e9 au chargement si le dernier date de plus de 24 h.",{left:true,below:true})),
        h("button",{onClick:p.onClose,title:"Fermer.",
          style:{padding:"4px 10px",fontSize:".82rem",borderRadius:6,border:"1.5px solid rgba(0,0,0,.1)",background:"#fff",color:"var(--text-sub)",cursor:"pointer",fontFamily:"inherit"}},"\u2715")
      ),
      h("p",{style:{fontSize:".85rem",color:"var(--muted)",lineHeight:1.5,marginBottom:14}},
        "Les instantan\u00e9s te permettent de revenir \u00e0 un \u00e9tat ant\u00e9rieur en cas d'\u00e9crasement involontaire. Limite : 5 par r\u00e9\u00e9criture (purge automatique des plus anciens)."
      ),
      h("button",{onClick:doCreate,disabled:busy==="create",
        title:"Cr\u00e9er un nouvel instantan\u00e9 imm\u00e9diatement, contenant l'\u00e9tat actuel complet de cette r\u00e9\u00e9criture.",
        style:{width:"100%",padding:"10px 14px",fontSize:".95rem",fontWeight:700,borderRadius:8,border:"none",background:busy==="create"?"rgba(37,99,235,.5)":"var(--primary)",color:"#fff",cursor:busy==="create"?"wait":"pointer",fontFamily:"inherit",marginBottom:14}},
        busy==="create"?"\u2026 Cr\u00e9ation":"\u2795 Cr\u00e9er un instantan\u00e9 maintenant"),
      message&&h("div",{style:{padding:"8px 12px",background:message.indexOf("Erreur")===0?"rgba(197,48,48,.1)":"rgba(39,103,73,.1)",color:message.indexOf("Erreur")===0?"#c53030":"#276749",borderRadius:6,fontSize:".85rem",marginBottom:10}},message),
      loading?
        h("div",{style:{textAlign:"center",padding:24,color:"var(--muted)"}},"\u2026 Chargement")
        :snapshots.length===0?
          h("div",{style:{padding:"18px",textAlign:"center",color:"var(--muted)",fontSize:".88rem",fontStyle:"italic",background:"var(--card2)",borderRadius:8}},"Aucun instantan\u00e9 pour le moment. Cr\u00e9es-en un avec le bouton ci-dessus.")
          :
          snapshots.map(function(s){
            return h("div",{key:s.id,style:{padding:"12px 14px",border:"1.5px solid var(--border)",borderRadius:8,marginBottom:8,background:"var(--card2)"}},
              h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6,gap:8,flexWrap:"wrap"}},
                h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
                  h("strong",{style:{fontSize:".92rem"}},formatSnapshotDate(s.createdAt)),
                  labelChip(s)
                ),
                h("div",{style:{display:"flex",gap:6}},
                  h("button",{onClick:function(){doRestore(s)},disabled:busy==="restore-"+s.id,
                    title:"Restaurer cet instantan\u00e9. L'\u00e9tat actuel sera sauvegard\u00e9 automatiquement avant l'\u00e9crasement.",
                    style:{padding:"5px 10px",fontSize:".78rem",fontWeight:600,borderRadius:6,border:"1.5px solid var(--primary)",background:"transparent",color:"var(--primary)",cursor:"pointer",fontFamily:"inherit"}},
                    busy==="restore-"+s.id?"\u2026":"\u21bb Restaurer"),
                  h("button",{onClick:function(){doDelete(s)},disabled:busy==="del-"+s.id,
                    title:"Supprimer d\u00e9finitivement cet instantan\u00e9.",
                    style:{padding:"5px 10px",fontSize:".78rem",fontWeight:600,borderRadius:6,border:"1.5px solid var(--coral)",background:"transparent",color:"var(--coral)",cursor:"pointer",fontFamily:"inherit"}},
                    "\u2715")
                )
              ),
              h("div",{style:{fontSize:".82rem",color:"var(--muted)"}},countCorr(s)+" correction"+(countCorr(s)>1?"s":"")+" sauvegard\u00e9e"+(countCorr(s)>1?"s":""))
            );
          })
    )
  );
}

function SuiviRee(p){
  var data=p.data,corr=p.corrections||{},abs=p.absents||{};
  var presence=p.presence||{};
  // Le presTick (incrémenté toutes les 30s) force le re-render pour rafraîchir les badges
  // même si la map presence n'a pas changé entre deux heartbeats.
  // (cf. p.presTick utilisé implicitement via re-render parent)
  var baremeTotal=data.baremeTotal!=null?data.baremeTotal:10;
  // Calcule le statut de présence d'un élève à partir de son dernier heartbeat
  function getPresenceStatus(k){
    var pr=presence[k];
    if(!pr||!pr.lastSeen)return null;
    var age=Date.now()-pr.lastSeen;
    if(age<60000)return"online";     // < 1 min : connecté actif

// ═══ BILAN — RÉÉCRITURE ═══
// Grille des élèves d'une réécriture, avec statut (corrigé/non/absent) et note.
// Props : data (avec eleves, modifs, baremeTotal), corrections (dict eleveKey→correction), absents, onOpenEleve(name), onBack
function BilanReecriture(p){
  var data=p.data,corr=p.corrections||{},abs=p.absents||{};
  var baremeTotal=data.baremeTotal!=null?data.baremeTotal:10;
  var modifs=toArr(data.modifs||[]);

  // État pour expansion d'une modif (afficher liste des élèves)
  var sx=useState(null),expandedModif=sx[0],setExpandedModif=sx[1];

  var entries=(data.eleves||[]).filter(function(e){return !abs[san(e)]}).map(function(e){
    var k=san(e),c=corr[k];
    return{name:e,key:k,done:!!c,note:c?c.note:null,counts:c&&c.counts?c.counts:null};
  }).sort(function(a,b){if(a.done!==b.done)return a.done?-1:1;return(a.note||0)-(b.note||0)});
  var done=entries.filter(function(e){return e.done});

  // Stats
  var notes=done.map(function(e){return e.note});
  var avg=notes.length?Math.round(notes.reduce(function(a,n){return a+n},0)/notes.length*10)/10:0;
  function median(arr){
    if(!arr.length)return 0;
    var s=arr.slice().sort(function(a,b){return a-b});
    var m=Math.floor(s.length/2);
    return s.length%2===0?Math.round((s[m-1]+s[m])/2*10)/10:s[m];
  }
  var med=median(notes);
  var mn=notes.length?Math.min.apply(null,notes):0;
  var mx=notes.length?Math.max.apply(null,notes):0;

  // Top modifications les plus échouées
  var modifFailMap={};
  done.forEach(function(e){
    var c=corr[e.key];
    var errs=toArr(c.errors||[]);
    errs.filter(function(err){return err.type==="modif"&&err.modifIdx!=null}).forEach(function(err){
      if(!modifFailMap[err.modifIdx])modifFailMap[err.modifIdx]=[];
      modifFailMap[err.modifIdx].push({name:e.name,fautif:err.fautif||""});
    });
  });
  var topModifs=Object.keys(modifFailMap).map(function(idx){
    var i=parseInt(idx,10);
    return{idx:i,modif:modifs[i],eleves:modifFailMap[idx],count:modifFailMap[idx].length};
  }).filter(function(t){return t.modif}).sort(function(a,b){return b.count-a.count});

  return h("div",{className:"container fade-up"},
    h("div",{className:"card"},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}},
        h("div",null,
          h("h2",{style:{margin:0}},"Correction manuscrite",ifo("Clique sur un \u00e9l\u00e8ve pour saisir ou modifier sa correction. La grille s'enrichit au fur et \u00e0 mesure.",{right:true,below:true})),
          h("div",{style:{fontSize:".82rem",color:"var(--muted)",marginTop:2}},data.title||"R\u00e9\u00e9criture")
        ),
        p.onBack&&h("button",{className:"btn-sm btn-ghost",onClick:p.onBack,title:"Retour \u00e0 la vue d'ensemble (Suivi)."},"\u2190 Retour")
      ),
      h("div",{style:{marginTop:10,display:"flex",gap:14,flexWrap:"wrap",fontSize:".88rem"}},
        h("span",null,"\u2713 ",h("strong",null,done.length+"/"+entries.length)," corrig\u00e9"+(done.length>1?"s":"")),
        done.length>0&&h("span",null,"Moyenne : ",h("strong",{style:{color:noteColor(avg,baremeTotal)}},avg+"/"+baremeTotal),
          ifo("Somme des notes \u00f7 nombre d'\u00e9l\u00e8ves corrig\u00e9s.",{right:true})),
        done.length>0&&h("span",null,"M\u00e9diane : ",h("strong",{style:{color:noteColor(med,baremeTotal)}},med+"/"+baremeTotal),
          ifo("Note du milieu : moiti\u00e9 des \u00e9l\u00e8ves au-dessus, moiti\u00e9 en-dessous. Moins influenc\u00e9e par les extr\u00eames que la moyenne.",{right:true})),
        done.length>0&&h("span",{style:{color:"var(--muted)"}},"Min ",h("strong",{style:{color:noteColor(mn,baremeTotal)}},mn)," \u00b7 Max ",h("strong",{style:{color:noteColor(mx,baremeTotal)}},mx))
      )
    ),

    // === Top des modifications les plus échouées ===
    done.length>0&&topModifs.length>0&&h("div",{className:"card"},
      h("h3",{style:{margin:"0 0 10px 0",fontSize:"1rem"}},"\ud83d\udcc9 Modifications les plus rat\u00e9es",

// ═══ CORRECTION PROF — RÉÉCRITURE ═══
// Composant d'écran pour corriger la copie manuscrite d'un élève.
// Props :
//   - data: { reecriture: {id, attendu, modifs, baremeTotal, ...} }
//   - eleve: nom de l'élève (string)
//   - eleves: liste pour recherche par initiales
//   - existing: { errors:[], extras:[] } ou null (chargé depuis Firebase)
//   - onSave(errors, extras): callback validation

  var data=p.data,ree=data.reecriture,modifs=toArr(ree.modifs||[]);

  var s5=useState(0.25),popupBareme=s5[0],setPopupBareme=s5[1];
  var s6=useState(false),insertMode=s6[0],setInsertMode=s6[1];
  var s7=useState(null),insertIdx=s7[0],setInsertIdx=s7[1];
  var s8=useState(""),insertWord=s8[0],setInsertWord=s8[1];
  var s9=useState(0.25),insertBareme=s9[0],setInsertBareme=s9[1];
  var s10=useState(""),searchVal=s10[0],setSearchVal=s10[1];

  var sso=useState(false),showOriginal=sso[0],setShowOriginal=sso[1];

    pushHistory();
    var ne=errors.filter(function(e){return !(e.type==="modif"&&e.modifIdx===modifIdx)});
    var m=modifs[modifIdx];
    var err={type:"modif",modifIdx:modifIdx,bareme:m.bareme||1};

    setErrors(ne);closePopup();
  }
  function clearModifFailed(modifIdx){
    pushHistory();
    var ne=errors.filter(function(e){return !(e.type==="modif"&&e.modifIdx===modifIdx)});
    setErrors(ne);closePopup();
  }
  function markCopyError(tokenIdx,bareme,word,fautif){
    pushHistory();
    var ne=errors.filter(function(e){return !(e.type==="copie"&&e.idx===tokenIdx)});
    var err={type:"copie",idx:tokenIdx,bareme:bareme||0.25,word:word};
    if(fautif&&fautif.trim())err.fautif=fautif.trim();

  }
  function clearCopyError(tokenIdx){
    pushHistory();
    var ne=errors.filter(function(e){return !(e.type==="copie"&&e.idx===tokenIdx)});
    setErrors(ne);closePopup();
  }
  // Marque un mot du texte attendu comme omis par l'élève (mot en moins).
  function markMissing(tokenIdx,bareme,word){
    pushHistory();
    var ne=errors.filter(function(e){return !(e.type==="manquant"&&e.idx===tokenIdx)});
    ne.push({type:"manquant",idx:tokenIdx,bareme:bareme||0.25,word:word});
    setErrors(ne);closePopup();
  }
  function clearMissing(tokenIdx){
    pushHistory();
    var ne=errors.filter(function(e){return !(e.type==="manquant"&&e.idx===tokenIdx)});
    setErrors(ne);closePopup();
  }
  // Applique un piège : déduit l'action selon que le mot est dans une modif (→ modif ratée)

  function applyPiege(piege){
    var ti=piege.tokenIdx;

      var tok=tokens[ti];

  // === Gestion des mots en trop (extras) ===
  // Construction du map : extraMap[afterTokenIdx] = [{word, bareme, gi}]
  var extraMap={};

      h("div",{style:{flex:1,minWidth:0}},
        h("div",{style:{fontWeight:700,fontSize:".95rem",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},p.eleve||"\u00c9l\u00e8ve",

  // Listener temps réel sur la correction prof pour cet élève
  useEffect(function(){

  // Heartbeat : signale au prof que l'élève est connecté (timestamp rafraîchi toutes les 30 s).
  // Le timestamp reste en Firebase à la fermeture : le prof voit "inactif" puis "absent" naturellement.

  useEffect(function(){
    /* M10 — Shunt MJPC (socle \u00a78) : l'\u00e9l\u00e8ve d\u00e9j\u00e0 connect\u00e9 au site n'a rien \u00e0 ressaisir.
       Patron de correction_dictee : garde anti-double, prof exclu, validation contre /classes. */
    if(shuntFait||eleveData||!reecritures.length)return;

  function doLogin(){
    /* M10 (grille pt 7) : entrée unique code + nom + prénom, comme partout.
       PORTE PROF : un code de PROF_CODES ouvre la session prof quels que soient

        var enom=parts.slice(0,-1).join(" ").toUpperCase();
        var eprenom=parts[parts.length-1];

      }
    }

    var rec=(typeof CODES==="object"&&CODES)?CODES[key]:null;
    if(!rec||!rec.code||String(rec.code)!==code){setErrMsg("Ce code ne correspond pas. V\u00e9rifie-le, ou vois avec moi en classe.");return}
    _entrerEleve(full,key,lots);
  }
  function _entrerEleve(full,key,lots){

      h("div",{className:"card"},
        h("h1",null,"Mes r\u00e9\u00e9critures"),

        mesLots.lots.map(function(r){return h("div",{key:r.id,className:"config-field",style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}},

        h("button",{className:"btn-sm btn-ghost",style:{marginTop:12,minHeight:44},onClick:function(){setMesLots(null);setScreen("login")}},"\u2190 Retour")));

    h("div",{className:"card",style:{textAlign:"center"}},
      h("h1",null,"R\u00e9\u00e9criture"),
      h("p",{className:"subtitle"},"Identifie-toi pour retrouver ta r\u00e9\u00e9criture."),
      h("div",{style:{maxWidth:340,margin:"0 auto"}},
        h("div",{className:"config-field"},h("label",null,"Nom"),h("input",{value:nomInput,onChange:function(e){setNomInput(e.target.value)},placeholder:"DUPONT",title:"Ton nom de famille, en MAJUSCULES.",style:{textTransform:"uppercase"}})),
        h("div",{className:"config-field"},h("label",null,"Pr\u00e9nom"),h("input",{value:prenomInput,onChange:function(e){setPrenomInput(e.target.value)},placeholder:"Marie",title:"Ton pr\u00e9nom.",onKeyDown:function(e){if(e.key==="Enter")doLogin()}})),
        h("div",{className:"config-field",style:{position:"relative"}},h("label",null,"Code personnel"),
          h("input",{value:codeInput,type:codeVisible?"text":"password",inputMode:"numeric",maxLength:5,onChange:function(e){setCodeInput(e.target.value)},placeholder:"Code",title:"Ton code personnel MJPC.",autoComplete:"current-password",style:{paddingRight:88},onKeyDown:function(e){if(e.key==="Enter")doLogin()}}),
          h("button",{type:"button","aria-label":codeVisible?"Masquer le code":"Afficher le code",onClick:function(){setCodeVisible(!codeVisible)},style:{position:"absolute",right:4,bottom:2,minHeight:44,minWidth:44,padding:"0 10px",background:"transparent",border:"none",color:"var(--muted)",fontStyle:"italic",cursor:"pointer"}},codeVisible?"Masquer":"Afficher")),
        errMsg&&h("p",{style:{color:"var(--coral)",fontSize:".88rem",marginBottom:8}},errMsg),
        h("button",{className:"btn btn-primary",onClick:doLogin,title:"Acc\u00e9der \u00e0 ta r\u00e9\u00e9criture. Si ta copie est corrig\u00e9e, tu pourras commencer ton autocorrection."},"Acc\u00e9der")
      )

  );

  if(screen==="saisie"){

    // Si le prof a corrigé la copie manuscrite → bilan + autocorrection active
