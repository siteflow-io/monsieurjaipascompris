}

// ═══ AUTOCORRECTION ÉLÈVE — APRÈS CORRECTION PROF ═══
// L'élève corrige une à une ses erreurs (floutées). La note n'est révélée qu'une fois TOUT corrigé.
// Validation stricte sur l'orthographe (pas d'indice), guidée sur la saisie manuscrite
// (apostrophes typographiques/droites, espaces multiples, casse).
// Props :
//   - data: { reecriture, eleve, key, correction:{errors,extras,note,deduction,counts,autoCorrection?} }
//   - onBack: retour vers login
function EleveAutocorrReecriture(p){
  var d=p.data,ree=d.reecriture,corr=d.correction;
  var modifs=toArr(ree.modifs||[]);
  var baremeTotal=ree.baremeTotal!=null?ree.baremeTotal:10;
  var errors=toArr(corr.errors||[]);
  var extras=toArr(corr.extras||[]);

  // Tokenisation et mapping
  var tokens=React.useMemo(function(){return tokenizeForCorrection(ree.attendu||"")},[ree.attendu]);
  var wordToTokens=React.useMemo(function(){return mapSplitWordsToTokens(tokens)},[tokens]);
  var modifMap=React.useMemo(function(){return buildModifMap(modifs,wordToTokens,tokens)},[modifs,wordToTokens,tokens]);

  // Maps d'erreurs et d'extras
  var modifErrMap={},copyErrMap={},missingErrMap={},extraMap={};
  errors.forEach(function(e){
    if(e.type==="modif"&&e.modifIdx!=null)modifErrMap[e.modifIdx]=e;
    else if(e.type==="copie"&&e.idx!=null)copyErrMap[e.idx]=e;
    else if(e.type==="manquant"&&e.idx!=null)missingErrMap[e.idx]=e;
  });
  extras.forEach(function(e,gi){
    var k=e.afterIdx;if(!extraMap[k])extraMap[k]=[];
    extraMap[k].push({word:e.word,bareme:e.bareme,gi:gi});
  });

  // Pour une modif, calcule la chaîne à retaper côté élève : uniquement les sub-tokens word
  // qui changent réellement entre original et attendu, joints par espaces.
  // Ex : "s'était → s'étaient" → "étaient" (le "s" et l'apostrophe ne changent pas).
  // Si les nombres de sub-tokens diffèrent (ajout/suppression), fallback sur attendu complet.
  function extractChangedWords(modif){
    var origToks=tokenizeForCorrection(modif.original||"").filter(function(t){return t.type==="word"});
    var attToks=tokenizeForCorrection(modif.attendu||"").filter(function(t){return t.type==="word"});
    if(origToks.length!==attToks.length)return modif.attendu||"";
    var changed=[];
    for(var i=0;i<attToks.length;i++){
      if(attToks[i].text.toLowerCase()!==origToks[i].text.toLowerCase()){
        changed.push(attToks[i].text);
      }
    }
    return changed.length>0?changed.join(" "):(modif.attendu||"");
  }

  // Liste plate des items à corriger
  var allItems=[];
  errors.forEach(function(e){
    if(e.type==="modif"){
      var m=modifs[e.modifIdx];
      if(m)allItems.push({id:"modif_"+e.modifIdx,type:"modif",modifIdx:e.modifIdx,attendu:extractChangedWords(m),original:m.original,fautif:e.fautif,bareme:e.bareme||1});
    } else if(e.type==="copie"){
      var tok=tokens[e.idx];
      if(tok)allItems.push({id:"copie_"+e.idx,type:"copie",tokenIdx:e.idx,attendu:tok.text,fautif:e.fautif,bareme:e.bareme||0.25});
    } else if(e.type==="manquant"){
      var tokM=tokens[e.idx];
      if(tokM)allItems.push({id:"manquant_"+e.idx,type:"manquant",tokenIdx:e.idx,attendu:tokM.text,bareme:e.bareme||0.25});
    }
  });
  extras.forEach(function(e,gi){
    allItems.push({id:"extra_"+gi,type:"extra",extraIdx:gi,word:e.word,bareme:e.bareme||0.25});
  });

  // État
  var initialCompleted=(corr.autoCorrection&&corr.autoCorrection.completedErrors)||[];
  var initialBilan=(corr.autoCorrection&&corr.autoCorrection.bilan)||{};
  var s1=useState(initialCompleted),completed=s1[0],setCompleted=s1[1];
  var s2=useState(null),popupItem=s2[0],setPopupItem=s2[1];
  var s3=useState(""),popupSaisie=s3[0],setPopupSaisie=s3[1];
  var s4=useState(""),popupHint=s4[0],setPopupHint=s4[1];
  var s5=useState(0),popupAttempts=s5[0],setPopupAttempts=s5[1];
  var sba=useState(initialBilan.appris||""),bilanAppris=sba[0],setBilanAppris=sba[1];
  var sbt=useState(initialBilan.travailler||""),bilanTravailler=sbt[0],setBilanTravailler=sbt[1];
  var sbs=useState("saved"),bilanSaveState=sbs[0],setBilanSaveState=sbs[1]; // "saved" | "saving" | "dirty"
  var bilanTimerRef=React.useRef(null);
  function saveBilanDebounced(appris,travailler){
    setBilanSaveState("dirty");
    if(bilanTimerRef.current)clearTimeout(bilanTimerRef.current);
    bilanTimerRef.current=setTimeout(function(){
      setBilanSaveState("saving");
      db.ref("reecritures/"+ree.id+"/corrections/"+d.key+"/autoCorrection/bilan").set({
        appris:appris,travailler:travailler,updatedAt:Date.now()
      }).then(function(){setBilanSaveState("saved")}).catch(function(){setBilanSaveState("dirty")});
    },800);
  }
  // Idle detection : alerter l'élève s'il reste inactif trop longtemps
  var sid=useState(false),idleWarning=sid[0],setIdleWarning=sid[1];
  var lastActionRef=React.useRef(Date.now());
  function recordAction(){lastActionRef.current=Date.now();if(idleWarning)setIdleWarning(false)}
  useEffect(function(){
    var iv=setInterval(function(){
      // Pas d'idle si tout est déjà corrigé
      if(nbTotal===0||nbDone===nbTotal)return;
      if(Date.now()-lastActionRef.current>120000){setIdleWarning(true)}
    },30000);
    return function(){clearInterval(iv)};
  },[nbDone,nbTotal]);

  var isCompleted=function(id){return completed.indexOf(id)!==-1};
  var nbDone=allItems.filter(function(it){return isCompleted(it.id)}).length;
  var nbTotal=allItems.length;
  var allDone=nbTotal===0||nbDone===nbTotal;

  // Sauvegarde Firebase
  function saveProgress(nc){
    var done=nc.length===nbTotal;
    db.ref("reecritures/"+ree.id+"/corrections/"+d.key+"/autoCorrection").set({
      completedErrors:nc,totalErrors:nbTotal,completed:done,updatedAt:Date.now()
    });
  }
  function markCompleted(id){
    if(isCompleted(id))return;
    var nc=completed.concat([id]);
    setCompleted(nc);saveProgress(nc);
  }

  // Normalisation et validation
  function normManu(s){return (s||"").replace(/[\u2019\u2018\u0060\u00b4]/g,"'").replace(/\s+/g," ").trim()}
  function normCasse(s){return normManu(s).toLowerCase()}
  function diagApostrophe(saisie,attendu){
    var sNoApo=saisie.replace(/[\u2019\u2018\u0060\u00b4'']/g,""),aNoApo=attendu.replace(/[\u2019\u2018\u0060\u00b4'']/g,"");
    if(sNoApo===aNoApo){
      var sCount=(saisie.match(/[\u2019\u2018\u0060\u00b4'']/g)||[]).length;
      var aCount=(attendu.match(/[\u2019\u2018\u0060\u00b4'']/g)||[]).length;
      if(sCount<aCount)return "Apostrophe manquante.";
      if(sCount>aCount)return "Apostrophe en trop.";
      return "V\u00e9rifie ton apostrophe.";
    }
    return null;
  }
  function validateSaisie(saisie,attendu){
    if(saisie===attendu)return{ok:true};
    var nmS=normManu(saisie),nmA=normManu(attendu);
    if(nmS===nmA){
      var apo=diagApostrophe(saisie,attendu);
      if(apo)return{ok:false,hint:apo};
      if(/\s\s/.test(saisie))return{ok:false,hint:"Espace en trop entre deux mots."};
      if(/^\s|\s$/.test(saisie))return{ok:false,hint:"Espace en trop au d\u00e9but ou \u00e0 la fin."};
      return{ok:false,hint:"V\u00e9rifie tes espaces."};
    }
    if(normCasse(saisie)===normCasse(attendu)){
      return{ok:false,hint:"V\u00e9rifie la casse (majuscule/minuscule)."};
    }
    return{ok:false,hint:null};
  }

  function openPopup(item){recordAction();setPopupItem(item);setPopupSaisie("");setPopupHint("");setPopupAttempts(0)}
  function closePopup(){setPopupItem(null);setPopupSaisie("");setPopupHint("");setPopupAttempts(0)}
  function confirmPopup(){
    recordAction();
    if(!popupItem)return;
    if(popupItem.type==="extra"){markCompleted(popupItem.id);closePopup();return}
    var v=validateSaisie(popupSaisie,popupItem.attendu);
    setPopupAttempts(popupAttempts+1);
    if(v.ok){markCompleted(popupItem.id);closePopup()}
    else{setPopupHint(v.hint||"\u2715 R\u00e9essaie.")}
  }

  return h("div",{className:"container fade-up"},
    // Bandeau idle si l'élève reste inactif
    idleWarning&&!allDone&&h("div",{style:{position:"fixed",top:0,left:0,right:0,zIndex:400,padding:"14px 20px",background:"#c53030",color:"#fff",textAlign:"center",fontWeight:700,fontSize:"1.05rem",boxShadow:"0 4px 20px rgba(197,48,48,.4)",cursor:"pointer"},
      title:"Clique ici pour reprendre.",
      onClick:function(){recordAction()}},
      "\u26a0\ufe0f Tu es l\u00e0 ? Reprends la correction de tes erreurs. Clique ici pour continuer."),
    // Header
    h("div",{className:"card",style:{textAlign:"center"}},
      h("h1",{style:{marginBottom:4}},allDone?"\u2705 Autocorrection termin\u00e9e":"Corrige tes erreurs"),
      h("p",{className:"subtitle",style:{marginBottom:12}},d.eleve+" \u2014 "+(ree.title||"")),
      allDone?
        h("div",null,
          h("div",{style:{fontSize:".88rem",color:"var(--muted)",marginBottom:4}},"Ta note"),
          h("div",{style:{fontSize:"3rem",fontWeight:800,color:noteColor(corr.note||0,baremeTotal),lineHeight:1.1}},(corr.note!=null?corr.note:0)+"/"+baremeTotal),
          h("p",{style:{marginTop:10,color:"var(--text-sub)",fontSize:".95rem",lineHeight:1.5}},"Tu as travaill\u00e9 sur toutes tes erreurs. C'est ce travail qui te fait progresser.")
        )
        :
        h("div",null,
          h("p",{style:{fontSize:".95rem",color:"var(--text-sub)",marginBottom:10,lineHeight:1.5}},"Corrige toutes tes erreurs pour d\u00e9couvrir ta note. Clique sur les mots flout\u00e9s."),
          h("div",{style:{display:"inline-block",padding:"8px 18px",borderRadius:24,background:"var(--card2)",fontSize:"1.05rem",fontWeight:700,color:"var(--primary)"}},
            nbDone+" / "+nbTotal+" erreur"+(nbTotal>1?"s":"")+" corrig\u00e9e"+(nbTotal>1?"s":""),
            ifo("Ta note appara\u00eetra quand tu auras corrig\u00e9 toutes tes erreurs. Touche Entr\u00e9e dans le champ de saisie = V\u00e9rifier ta r\u00e9ponse."))
        )
    ),
    // Auto-évaluation à la fin
    allDone&&h("div",{className:"card"},
      h("h3",{style:{margin:"0 0 4px 0",fontSize:"1.05rem"}},"Avant de finir, prends un instant\u2026"),
      h("p",{style:{fontSize:".82rem",color:"var(--muted)",marginBottom:14,fontStyle:"italic"}},"Tes r\u00e9ponses sont enregistr\u00e9es automatiquement. Je pourrai les lire."),
      h("div",{style:{marginBottom:14}},
        h("label",{style:{display:"block",fontWeight:600,fontSize:".95rem",marginBottom:6}},"Qu'est-ce que tu as appris ?"),
        h("textarea",{value:bilanAppris,onChange:function(e){var v=e.target.value;setBilanAppris(v);saveBilanDebounced(v,bilanTravailler)},
          placeholder:"Par exemple : j'ai compris pourquoi le verbe s'accorde au pluriel...",
          title:"\u00c9cris ce que cette correction t'a appris. Tes r\u00e9ponses sont enregistr\u00e9es automatiquement.",
          style:{width:"100%",minHeight:80,padding:"10px 12px",fontSize:".95rem",borderRadius:8,border:"1.5px solid var(--border)",fontFamily:"inherit",boxSizing:"border-box",resize:"vertical"}})
      ),
      h("div",{style:{marginBottom:8}},
        h("label",{style:{display:"block",fontWeight:600,fontSize:".95rem",marginBottom:6}},"Sur quoi vas-tu travailler ?"),
        h("textarea",{value:bilanTravailler,onChange:function(e){var v=e.target.value;setBilanTravailler(v);saveBilanDebounced(bilanAppris,v)},
          placeholder:"Par exemple : je vais relire mes accords avant de rendre mes copies...",
          title:"Ce que tu d\u00e9cides d'am\u00e9liorer la prochaine fois. Tes r\u00e9ponses sont enregistr\u00e9es automatiquement.",
          style:{width:"100%",minHeight:80,padding:"10px 12px",fontSize:".95rem",borderRadius:8,border:"1.5px solid var(--border)",fontFamily:"inherit",boxSizing:"border-box",resize:"vertical"}})
      ),
      h("div",{style:{textAlign:"right",fontSize:".78rem",color:bilanSaveState==="saved"?"#276749":bilanSaveState==="saving"?"var(--muted)":"var(--orange)",fontWeight:600}},
        bilanSaveState==="saved"?"\u2713 Enregistr\u00e9":bilanSaveState==="saving"?"\u2026 Enregistrement":"\u270f Modifi\u00e9, en attente\u2026"
      )
    ),
    // Légende
    !allDone&&nbTotal>0&&h("div",{style:{padding:"10px 12px",background:"var(--card2)",borderRadius:8,marginBottom:8,fontSize:".82rem",color:"var(--text-sub)",lineHeight:1.7}},
      h("div",null,"\u2022 ",h("span",{style:{padding:"1px 5px",background:"rgba(197,48,48,.15)",color:"#c53030",borderRadius:3,fontWeight:600,filter:"blur(2px)"}},"flou rouge")," : modification rat\u00e9e."),
      h("div",null,"\u2022 ",h("span",{style:{padding:"1px 5px",background:"rgba(202,138,4,.18)",color:"#92400e",borderRadius:3,fontWeight:600,filter:"blur(2px)"}},"flou ocre")," : erreur de copie."),
      h("div",null,"\u2022 ",h("span",{style:{padding:"1px 5px",background:"rgba(124,58,237,.18)",color:"#6d28d9",borderRadius:3,fontWeight:600,textDecoration:"line-through"}},"+barr\u00e9 violet")," : mot ou ponctuation en trop.")
    ),

            h("div",{style:{fontSize:".78rem",color:"#6d28d9",fontWeight:700,textTransform:"uppercase",marginBottom:8}},"Mot/ponctuation en trop"),
            h("p",{style:{marginBottom:14,lineHeight:1.6}},"Tu as ajout\u00e9 \u00ab ",h("span",{style:{color:"#6d28d9",fontWeight:700,textDecoration:"line-through"}},popupItem.word)," \u00bb \u00e0 ton texte. Ce mot ne devait pas y \u00eatre."),
            h("div",{style:{display:"flex",gap:6}},
              h("button",{onClick:confirmPopup,

              h("button",{onClick:closePopup,

        ?"Retape la version correcte des mots flout\u00e9s."
        :popupItem.type==="manquant"
          ?"Tu as oubli\u00e9 ce mot. Retape-le pour valider."
          :"Quel \u00e9tait le mot \u00e0 cet endroit dans le texte ?";
      return h("div",{className:"popup-overlay",onClick:closePopup},
        h("div",{onClick:function(e){e.stopPropagation()},style:{background:"var(--card)",borderRadius:14,padding:"22px",maxWidth:440,width:"92%",boxShadow:"0 12px 40px rgba(0,0,0,.2)"}},
          h("div",{style:{fontSize:".78rem",color:typeColor,fontWeight:700,textTransform:"uppercase",marginBottom:6}},typeLabel),
          h("p",{style:{marginBottom:6,lineHeight:1.6,fontWeight:600}},prompt),
          popupItem.type==="modif"&&popupItem.original&&h("p",{style:{marginBottom:6,fontSize:".88rem",color:"var(--muted)"}},"Texte original : \u00ab ",h("span",{style:{fontWeight:600}},popupItem.original)," \u00bb"),
          popupItem.fautif&&h("p",{style:{marginBottom:10,fontSize:".88rem",color:"var(--muted)"}},"Tu avais \u00e9crit : \u00ab ",h("span",{style:{textDecoration:"line-through"}},popupItem.fautif)," \u00bb"),
          h("input",{
            value:popupSaisie,
            onChange:function(e){setPopupSaisie(e.target.value);setPopupHint("")},
            placeholder:"Tape la version correcte\u2026",
            title:"Tape exactement la version attendue. La validation est stricte sur l'orthographe et la grammaire, mais te guide sur les apostrophes, les espaces et les majuscules.",
            autoFocus:true,
            style:{width:"100%",padding:"10px 12px",fontSize:"1.05rem",borderRadius:8,border:"2px solid "+(popupHint?"#c53030":"var(--border)"),boxSizing:"border-box",fontFamily:"inherit"},
            onKeyDown:function(e){if(e.key==="Enter")confirmPopup();if(e.key==="Escape")closePopup()}
          }),
          popupHint&&h("p",{style:{marginTop:8,padding:"6px 10px",background:"rgba(197,48,48,.08)",color:"#c53030",borderRadius:6,fontSize:".85rem",fontWeight:600}},"\u2715 "+popupHint),
          popupAttempts>0&&!popupHint&&h("p",{style:{marginTop:8,fontSize:".82rem",color:"var(--muted)"}},"\u2715 R\u00e9essaie. ("+popupAttempts+" essai"+(popupAttempts>1?"s":"")+")"),
          h("div",{style:{marginTop:14,display:"flex",gap:6}},
            h("button",{onClick:confirmPopup,disabled:!popupSaisie.trim(),
              title:"V\u00e9rifier ta r\u00e9ponse.",
              style:{flex:1,padding:"10px 12px",fontSize:".95rem",fontWeight:700,borderRadius:8,border:"none",
                background:popupSaisie.trim()?"var(--primary)":"rgba(0,0,0,.1)",
                color:"#fff",cursor:popupSaisie.trim()?"pointer":"not-allowed",fontFamily:"inherit"}},"\u2713 V\u00e9rifier"),
            h("button",{onClick:closePopup,
              title:"Fermer cette fen\u00eatre. Tu pourras y revenir plus tard.",
              style:{padding:"10px 12px",fontSize:".88rem",borderRadius:8,border:"1.5px solid rgba(0,0,0,.1)",background:"#fff",color:"var(--text-sub)",cursor:"pointer",fontFamily:"inherit"}},"Plus tard")
          )
        )
      );
    })()
  );
}
