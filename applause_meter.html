<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>L'Applaudimètre — Lecture coévaluée</title>
<style>
:root{
  /* Charte vivante MJPC (reprise QCM) */
  --turquoise:#00BFA6; --jaune:#FFD23F; --rose:#FF3E7F; --violet:#6A4CE0;
  --bleu:#2196F3; --noir:#1A1A2E; --blanc:#FFFFFF; --vert:#22C55E;
  --rouge:#EF4444; --gris:#64748B; --gris-clair:#F1F5F9; --bordure:#E2E8F0;
  /* Barres applaudimètre — gradient « en chemin » → « superbe », jamais punitif */
  --bar-bas:#A7F3D0;   /* vert tendre (ça vient) */
  --bar-mid:#34D399;   /* vert franc */
  --bar-haut:#FFB020;  /* orange chaud */
  --bar-top:#FFD23F;   /* doré (superbe) */
  --radius:16px; --radius-sm:11px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif;background:var(--gris-clair);color:var(--noir);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none}
.wrap{max-width:1100px;margin:0 auto;padding:18px}

/* ---- Accueil ---- */
.accueil{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;text-align:center;padding:24px;background:linear-gradient(160deg,#fff 0%,var(--gris-clair) 100%)}
.accueil h1{font-size:2.4rem;font-weight:900;color:var(--violet);letter-spacing:-.5px}
.accueil .clap{font-size:3.4rem;margin-bottom:-6px}
.accueil .sub{color:var(--gris);font-size:1.05rem;max-width:430px;line-height:1.5}
.btn-accueil{font-size:1.25rem;font-weight:800;padding:18px 30px;border-radius:var(--radius);min-width:280px;color:#fff;box-shadow:0 8px 22px rgba(0,0,0,.12);transition:transform .12s,box-shadow .12s}
.btn-accueil:active{transform:translateY(2px) scale(.99)}
.btn-prof{background:linear-gradient(135deg,var(--violet),#8B6CF0)}
.btn-eleve{background:linear-gradient(135deg,var(--turquoise),#2DD4BF)}
.btn-board{background:linear-gradient(135deg,var(--bleu),#42A5F5)}

/* ---- Header générique ---- */
.hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#fff;border-bottom:2px solid var(--bordure);position:sticky;top:0;z-index:50}
.hdr h2{font-size:1.15rem;font-weight:900;color:var(--violet);flex:1}
.btn-back{background:var(--gris-clair);color:var(--gris);font-weight:700;padding:9px 14px;border-radius:10px;font-size:.9rem}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:800;letter-spacing:.3px}
.badge-test{background:var(--rose);color:#fff}

/* ---- Tooltip prof « i » (parité MJPC) ---- */
.info-i{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;background:var(--violet);color:#fff;font-size:11px;font-weight:700;font-family:Georgia,serif;cursor:help;margin-left:6px;position:relative;vertical-align:middle;outline:none}
.info-i:hover .info-tip,.info-i:focus .info-tip{display:block}
.info-tip{display:none;position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--noir);color:#fff;font-size:12px;font-weight:400;font-family:inherit;padding:9px 11px;border-radius:8px;white-space:normal;width:248px;z-index:1000;pointer-events:none;line-height:1.45;text-align:left;box-shadow:0 6px 18px rgba(0,0,0,.25)}

/* ---- Cartes / champs (panneau prof) ---- */
.card{background:#fff;border-radius:var(--radius);padding:18px;margin:14px 0;border:1px solid var(--bordure);box-shadow:0 2px 10px rgba(0,0,0,.04)}
.card h3{color:var(--violet);font-weight:900;font-size:1.05rem;margin-bottom:10px;display:flex;align-items:center}
.field{margin-bottom:14px}
.field label{display:block;font-weight:700;font-size:.9rem;margin-bottom:6px;color:var(--noir)}
.field input,.field textarea,.field select{width:100%;padding:.7rem .9rem;border:2px solid var(--bordure);border-radius:10px;font-size:.95rem;font-family:inherit;background:#fff;transition:border-color .2s}
.field textarea{min-height:150px;resize:vertical;line-height:1.5}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(106,76,224,.15)}
.btn{padding:13px 18px;border-radius:11px;font-weight:800;font-size:.95rem;color:#fff;transition:transform .1s}
.btn:active{transform:translateY(1px)}
.btn-violet{background:var(--violet)} .btn-turq{background:var(--turquoise)} .btn-bleu{background:var(--bleu)}
.btn-rose{background:var(--rose)} .btn-vert{background:var(--vert)} .btn-gris{background:var(--gris)}
.btn-ghost{background:var(--gris-clair);color:var(--gris)}
.btn-lg{padding:16px 22px;font-size:1.05rem;width:100%}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.tabs{display:flex;gap:8px;padding:12px 18px 0;flex-wrap:wrap}
.tab{padding:10px 16px;border-radius:10px 10px 0 0;font-weight:800;font-size:.92rem;background:var(--gris-clair);color:var(--gris)}
.tab.active{background:#fff;color:var(--violet);box-shadow:0 -2px 8px rgba(0,0,0,.05)}
.muted{color:var(--gris);font-size:.88rem;line-height:1.5}
.pill{display:inline-block;background:var(--gris-clair);border-radius:999px;padding:5px 12px;margin:3px;font-size:.85rem;font-weight:600}
.classe-btn{display:block;width:100%;text-align:left;padding:14px;border-radius:12px;background:var(--gris-clair);color:var(--noir);font-weight:700;font-size:1rem;margin-bottom:8px;border:2px solid transparent}
.classe-btn.sel{border-color:var(--violet);background:rgba(106,76,224,.07)}

/* ---- Réglage curseur (vitesse décroissance) ---- */
.range-row{display:flex;align-items:center;gap:12px}
.range-row input[type=range]{flex:1}
.range-val{font-weight:800;color:var(--violet);min-width:90px;text-align:right;font-size:.9rem}

/* ---- BARRES applaudimètre (board + élève) ---- */
.meter-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:end}
.meter{display:flex;flex-direction:column;align-items:center;gap:8px}
.meter-track{position:relative;width:100%;background:#EEF2F7;border-radius:14px;overflow:hidden;border:2px solid var(--bordure)}
.meter-fill{position:absolute;left:0;right:0;bottom:0;border-radius:0 0 11px 11px;transition:height .18s cubic-bezier(.22,1,.36,1);background:linear-gradient(180deg,var(--bar-top),var(--bar-haut) 40%,var(--bar-mid) 75%,var(--bar-bas))}
.meter-emoji{font-size:1.7rem}
.meter-label{font-weight:800;font-size:.82rem;text-align:center;color:var(--noir);line-height:1.15}
.meter-glow{box-shadow:0 0 26px 4px var(--jaune)}

/* ---- VUE BOARD (projection — très lisible de loin) ---- */
.board{position:relative;overflow:hidden;min-height:100vh;background:linear-gradient(165deg,var(--noir),#2A2A4A);background-size:170% 170%;animation:boardShift 24s ease infinite;color:#fff;display:flex;flex-direction:column;padding:22px 30px}
@keyframes boardShift{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
.board-top{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;margin-bottom:10px}
.board-reader{font-size:3.2rem;font-weight:900;color:var(--jaune);letter-spacing:-1px;text-align:center;line-height:1}
.board-sub{color:#B9C0E0;font-size:1.05rem;font-weight:600}
.board-meters{flex:1;display:flex;justify-content:center;align-items:flex-end;gap:48px;padding:20px 0}
.board .meter{width:170px;max-width:20vw}
.board .meter-track{height:72vh;background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);border-radius:22px}
.board .meter-emoji{font-size:2.6rem}
.board .meter-label{color:#fff;font-size:1.15rem}
.board .meter-pct{font-size:2.1rem;font-weight:900;color:#fff;text-shadow:0 0 12px rgba(255,210,63,.5);font-variant-numeric:tabular-nums;margin-bottom:6px}
.board-count{text-align:center;color:#B9C0E0;font-size:1rem;font-weight:700;padding:8px}
.board-claps{position:fixed;pointer-events:none;font-size:2rem;animation:floatUp 1.1s ease-out forwards}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(.6)}20%{opacity:1}100%{opacity:0;transform:translateY(-120px) scale(1.3)}}
.board-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:#B9C0E0;text-align:center}
.board-empty .big{font-size:4rem}

/* ---- Décor animé du board (subtil : ne distrait pas des 4 barres) ---- */
.board-decor{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.board > *:not(.board-decor){position:relative;z-index:1}
.board-orbe{position:absolute;border-radius:50%;filter:blur(2px);animation:orbePulse 5s ease-in-out infinite}
.board-orbe-1{width:280px;height:280px;top:-60px;left:-40px;background:radial-gradient(circle,rgba(255,210,63,.16),rgba(255,210,63,0))}
.board-orbe-2{width:360px;height:360px;bottom:-90px;right:-60px;background:radial-gradient(circle,rgba(124,92,255,.18),rgba(124,92,255,0));animation-delay:-2s}
.board-orbe-3{width:200px;height:200px;top:38%;left:58%;background:radial-gradient(circle,rgba(255,255,255,.06),rgba(255,255,255,0));animation-delay:-3.5s}
@keyframes orbePulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.15);opacity:1}}
.board-particule{position:absolute;border-radius:50%;width:7px;height:7px;background:radial-gradient(circle,rgba(255,255,255,.6),rgba(255,255,255,0))}
.bp0{top:18%;left:12%;animation:bpFloat 24s ease-in-out infinite}
.bp1{top:65%;left:8%;width:5px;height:5px;animation:bpFloat 28s ease-in-out infinite -3s}
.bp2{top:30%;left:88%;animation:bpFloat 26s ease-in-out infinite -7s}
.bp3{top:76%;left:82%;width:5px;height:5px;animation:bpFloat 25s ease-in-out infinite -2s}
.bp4{top:48%;left:30%;width:9px;height:9px;animation:bpFloat 30s ease-in-out infinite -10s}
.bp5{top:22%;left:66%;animation:bpFloat 27s ease-in-out infinite -5s}
@keyframes bpFloat{0%,100%{transform:translate(0,0);opacity:.35}50%{transform:translate(-18px,-26px);opacity:.6}}

/* pulsation douce des barres hautes (respire au lieu d'un halo figé) */
.board .meter-glow{animation:glowPulse 1.2s ease-in-out infinite}
@keyframes glowPulse{0%,100%{box-shadow:0 0 22px 3px var(--jaune)}50%{box-shadow:0 0 42px 11px var(--jaune)}}

/* pluie de 👏 quand ça applaudit fort */
.board-claps-zone{position:absolute;left:0;right:0;bottom:16%;height:0;pointer-events:none}
.clap-rise{position:absolute;bottom:0;font-size:2.4rem;animation:floatUp 1.2s ease-out forwards}

/* bande discrète des tables actives en direct */
.board-tables{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;padding:2px 0 6px;min-height:24px}
.board-tpill{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:50px;background:rgba(255,255,255,.08);color:#cdd3ee;font-size:.78rem;font-weight:700;border:1px solid rgba(255,255,255,.12);animation:tpillIn .4s ease-out}
.board-tpill .dot{width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 6px #34d399;animation:dotPulse 1.6s ease-in-out infinite}
@keyframes tpillIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ---- VUE ÉLÈVE (tablette tactile) ---- */
.eleve{min-height:100vh;display:flex;flex-direction:column;background:var(--gris-clair)}
.eleve-reader{text-align:center;padding:14px;background:#fff;border-bottom:2px solid var(--bordure)}
.eleve-reader .who{font-size:1.5rem;font-weight:900;color:var(--violet)}
.eleve-reader .lbl{font-size:.82rem;color:var(--gris);font-weight:600}
.clap-grid{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px}
.clap-btn{border-radius:18px;color:#fff;font-weight:800;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden;border:none;transition:transform .08s;user-select:none;min-height:130px}
.clap-btn:active{transform:scale(.97)}
.clap-btn .ce{font-size:2.4rem;z-index:2}
.clap-btn .cl{font-size:1rem;z-index:2;text-align:center;padding:0 8px;text-shadow:0 1px 2px rgba(0,0,0,.25)}
.clap-btn .clap-fill{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.28);transition:height .15s;z-index:1}
.clap-c0{background:linear-gradient(135deg,var(--turquoise),#2DD4BF)}
.clap-c1{background:linear-gradient(135deg,var(--bleu),#42A5F5)}
.clap-c2{background:linear-gradient(135deg,var(--violet),#8B6CF0)}
.clap-c3{background:linear-gradient(135deg,var(--rose),#FF6FA0)}
.compliments-bar{padding:10px 12px;background:#fff;border-top:2px solid var(--bordure)}
.compliments-bar .ttl{font-size:.8rem;font-weight:800;color:var(--gris);margin-bottom:6px}
.comp-chip{display:inline-block;padding:8px 13px;margin:4px;border-radius:999px;background:var(--gris-clair);font-weight:700;font-size:.9rem;border:2px solid transparent}
.comp-chip.on{background:var(--jaune);border-color:var(--bar-haut);color:var(--noir)}
.eleve-wait{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:30px;color:var(--gris)}
.eleve-wait .big{font-size:3.4rem}
.choice-list{display:flex;flex-direction:column;gap:10px;max-width:460px;margin:0 auto;width:100%}
.choice-list .classe-btn{font-size:1.1rem;text-align:center}

/* ---- Modale d'aide (mode d'emploi à sections) ---- */
.help-back{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;display:flex;align-items:flex-start;justify-content:center;padding:3vh 2vw;overflow-y:auto}
.help-modal{background:#fff;border-radius:20px;max-width:760px;width:100%;padding:1.7rem 1.9rem;position:relative;max-height:94vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 4px var(--jaune)}
.help-modal h1{color:var(--violet);font-weight:900;margin-bottom:.3rem;font-size:1.5rem}
.help-modal .subtitle{color:var(--gris);font-size:.92rem;margin-bottom:1.1rem;font-style:italic}
.modal-close{position:absolute;top:14px;right:16px;background:var(--gris-clair);width:36px;height:36px;border-radius:50%;font-size:1.1rem;color:var(--gris);font-weight:800}
.help-section{background:var(--gris-clair);border-radius:14px;margin-bottom:.7rem;border-left:5px solid var(--violet);overflow:hidden}
.help-section-header{padding:.85rem 1rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:900;color:var(--violet);font-size:.98rem;user-select:none}
.help-section-header .arrow{transition:transform .2s;font-size:.8rem}
.help-section.open .help-section-header .arrow{transform:rotate(90deg)}
.help-section-body{display:none;padding:0 1rem 1rem;line-height:1.6;color:var(--noir);font-size:.9rem}
.help-section.open .help-section-body{display:block}
.help-section-body p{margin-bottom:.5rem} .help-section-body strong{color:var(--violet)}
.help-section-body ul{margin:.4rem 0 .7rem 1.3rem} .help-section-body li{margin-bottom:.3rem}
.help-section-body .important{background:#FFF8E1;border-left:3px solid var(--jaune);padding:.55rem .75rem;border-radius:6px;margin:.5rem 0}
.help-fab{position:fixed;bottom:18px;right:18px;background:var(--jaune);color:var(--noir);width:52px;height:52px;border-radius:50%;font-size:1.5rem;font-weight:900;box-shadow:0 6px 18px rgba(0,0,0,.25);z-index:1500;display:flex;align-items:center;justify-content:center}

@media(max-width:600px){
  .accueil h1{font-size:1.9rem} .board-reader{font-size:2.2rem}
  .board-meters{gap:18px} .board .meter{width:21vw} .board .meter-track{height:60vh}
}
</style>
</head>

// ════════════ HELPERS (parité MJPC) ════════════
function san(s){ return String(s||"").replace(/[^a-zA-Z0-9]/g,"_"); }
function slugify(s){
  return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g," ").trim().replace(/\s+/g,"-");
}
function prenom(full){
  if(!full) return "";
  var parts = String(full).trim().split(/\s+/);
  for(var i=parts.length-1;i>=0;i--){
    if(parts[i].length>1 && parts[i]!==parts[i].toUpperCase()) return parts[i];
  }
  return parts[parts.length-1];
}
// Couche défensive Firebase : objet {0:..,1:..} -> array, null -> []
function toArr(v){
  if(v===null||v===undefined) return [];
  if(Array.isArray(v)) return v;
  if(typeof v==="object"){
    var ks=Object.keys(v);
    if(ks.length && ks.every(function(k){return String(parseInt(k,10))===k;}))
      return ks.sort(function(a,b){return a-b;}).map(function(k){return v[k];});
    return Object.keys(v).map(function(k){return v[k];});
  }
  return [v];
}
function reglagesSafe(r){
  r = r || {};
  return {
    nbTables: r.nbTables || NB_TABLES_DEFAUT,
    decay: (r.decay===undefined?REGLAGES_DEFAUT.decay:r.decay),
    boost: (r.boost===undefined?REGLAGES_DEFAUT.boost:r.boost),
    complimentsOn: (r.complimentsOn===undefined?true:!!r.complimentsOn),
    criteres: (toArr(r.criteres).length===4?toArr(r.criteres):CRITERES_DEFAUT),
    compliments: (toArr(r.compliments).length?toArr(r.compliments):COMPLIMENTS_DEFAUT)
  };
}
// Tooltip prof « i »
function ifo(text){ return h("span",{className:"info-i",tabIndex:0},"i",h("span",{className:"info-tip"},text)); }
// Snapshot export/import JSON (parité MJPC)
function snapshotExport(refPath,filename){
  return db.ref(refPath).once("value").then(function(snap){
    var data=snap.val();
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");a.href=url;a.download=filename||(san(refPath)+"_"+Date.now()+".json");a.click();
    URL.revokeObjectURL(url); return data;
  });
}

function OngletPilotage(p){
  var classes=p.classes||{}, session=p.session||{};

  var eleves=classe?toArr(classe.eleves):[];
  // présence : lit live, compte ts récents
  var sl=useState({}), live=sl[0], setLive=sl[1];
  var sq=useState(false), qrOpen=sq[0], setQrOpen=sq[1];
  useEffect(function(){
    var r=db.ref(DB_ROOT+"/live"); var f=r.on("value",function(s){setLive(s.val()||{});});
    return function(){ r.off("value",f); };
  },[]);
  var now=Date.now();
  var presents=Object.keys(live).filter(function(k){return live[k]&&(now-(live[k].ts||0))<6000;}).length;
  var reg=reglagesSafe(session&&session.reglages);
  var ssim=useState(false), simOn=ssim[0], setSimOn=ssim[1];
  useEffect(function(){
    if(!simOn||!p.test) return;                    // ne tourne qu'en mode test

    for(var t=1;t<=nb;t++){ vals[t]=[10+Math.random()*25,10+Math.random()*25,10+Math.random()*25,10+Math.random()*25]; }
    var id=setInterval(function(){
      var now2=Date.now(), updates={};
      for(var t=1;t<=nb;t++){
        for(var c=0;c<4;c++){
          vals[t][c]=Math.min(100, vals[t][c]+Math.random()*10);          // les élèves applaudissent : ça monte
          if(Math.random()<0.18) vals[t][c]=Math.max(0, vals[t][c]-Math.random()*14); // petit relâchement aléatoire
        }

      }
      db.ref(DB_ROOT+"/live").update(updates);

  },[simOn,p.test]);

    db.ref(DB_ROOT+"/live").remove();             // changement de classe : on vide barres + lecteur

      h("h3",null,"Lecteur en cours",ifo("Désigne qui lit à voix haute. Les barres au tableau évaluent CE lecteur. « Lecteur suivant » remet tout à zéro.")),
      h("div",{className:"field"},

            h("p",{className:"muted",style:{marginTop:6}},"Les tables encouragent ce lecteur en direct."))

      h("div",{className:"btn-row",style:{marginTop:12}},

  var sc=useState({}), comps=sc[0], setComps=sc[1];
  var tick=useState(0), setTick=tick[1];
  var scl=useState([]), claps=scl[0], setClaps=scl[1];
  var lvlRef=useRef(0);
  useEffect(function(){
    var r1=db.ref(DB_ROOT+"/session"); var f1=r1.on("value",function(s){setSession(s.val()||{});});
    var r2=db.ref(DB_ROOT+"/live"); var f2=r2.on("value",function(s){setLive(s.val()||{});});
    var r3=db.ref(DB_ROOT+"/compliments"); var f3=r3.on("value",function(s){setComps(s.val()||{});});
    var iv=setInterval(function(){setTick(function(t){return t+1;});},300); // rafraîchit présence/decay visuel
    return function(){ r1.off("value",f1); r2.off("value",f2); r3.off("value",f3); clearInterval(iv); };
  },[]);
  useEffect(function(){                              // pluie de 👏 pilotée par le niveau des barres
    var n=0;
    var ivc=setInterval(function(){
      var lvl=lvlRef.current;
      setClaps(function(prev){
        var t=Date.now();
        var next=prev.filter(function(c){return t-c.born<1200;});
        if(lvl>50) next=next.concat([{id:(++n)+"_"+t, left:8+Math.random()*84, emoji:Math.random()<0.15?"✨":"👏", born:t}]);
        if(lvl>82) next=next.concat([{id:(++n)+"_"+t+"b", left:8+Math.random()*84, emoji:"👏", born:t}]);
        return next;
      });
    },480);
    return function(){ clearInterval(ivc); };
  },[]);
  var reg=reglagesSafe(session&&session.reglages);
  var reader=session&&session.reader;
  var now=Date.now();
  var tables=Object.keys(live).map(function(k){return live[k];}).filter(function(v){return v&&(now-(v.ts||0))<6000;});
  var presents=tables.length;
  // moyenne par critère
  var vals=[0,0,0,0];
  if(presents){
    for(var i=0;i<4;i++){
      var sum=0; tables.forEach(function(t){ sum+=(t["c"+i]||0); }); vals[i]=sum/presents;
    }
  }
  lvlRef.current=Math.max(vals[0],vals[1],vals[2],vals[3]);
  // compliments cochés (les plus fréquents)
  var compArr=reg.compliments.map(function(txt,i){return {txt:txt,n:(comps&&comps[i])||0};}).filter(function(o){return o.n>0;}).sort(function(a,b){return b.n-a.n;});

  return h("div",{className:"board"},
    h("div",{className:"board-decor"},
      h("div",{className:"board-orbe board-orbe-1"}),
      h("div",{className:"board-orbe board-orbe-2"}),
      h("div",{className:"board-orbe board-orbe-3"}),
      h("div",{className:"board-particule bp0"}),
      h("div",{className:"board-particule bp1"}),
      h("div",{className:"board-particule bp2"}),
      h("div",{className:"board-particule bp3"}),
      h("div",{className:"board-particule bp4"}),
      h("div",{className:"board-particule bp5"})),
    !reader
      ? h("div",{className:"board-empty"},
          h("div",{className:"big"},"👏"),
          h("div",{style:{fontSize:"1.6rem",fontWeight:800}},"En attente d'un lecteur…"),
          h("div",null,"Le professeur va désigner qui lit."))
      : h(React.Fragment,null,
          h("div",{className:"board-top"},
            h("div",{className:"board-sub"},"🎤 c'est au tour de"),
            h("div",{className:"board-reader"},prenom(reader))),
          h("div",{className:"board-tables"},
            tables.slice().sort(function(a,b){return (a.table||0)-(b.table||0);}).map(function(t){
              return h("span",{className:"board-tpill",key:t.table||Math.random()},h("span",{className:"dot"}),"T"+(t.table||"?"));
            })),
          h("div",{className:"board-meters"},
            reg.criteres.map(function(c,i){
              var pct=Math.max(0,Math.min(100,vals[i]));
              return h("div",{className:"meter",key:i},
                h("div",{className:"meter-pct"},Math.round(pct)+"%"),
                h("div",{className:"meter-track"+(pct>80?" meter-glow":"")},
                  h("div",{className:"meter-fill",style:{height:pct+"%"}})),
                h("div",{className:"meter-emoji"},c.emoji),
                h("div",{className:"meter-label"},c.label));
            })),
          h("div",{className:"board-count"},
            presents+" / "+reg.nbTables+" tables · ",
            compArr.length? compArr.slice(0,3).map(function(o,i){return h("span",{key:i,className:"pill",style:{background:"rgba(255,210,63,.22)",color:"#fff"}},"💛 "+o.txt);}) : "encourage avec les compliments !"
          ),
          h("div",{className:"board-claps-zone"},
            claps.map(function(c){return h("span",{className:"clap-rise",key:c.id,style:{left:c.left+"%"}},c.emoji);}))));
}

// ════════════ TABLETTE ÉLÈVE ════════════
function AppEleve(p){
  var ss=useState(null), session=ss[0], setSession=ss[1];
  var sc=useState({}), classes=sc[0], setClasses=sc[1];
  var st=useState(""), table=st[0], setTable=st[1];
  var sm=useState(""), moi=sm[0], setMoi=sm[1];
  useEffect(function(){
    var r1=db.ref(DB_ROOT+"/session"); var f1=r1.on("value",function(s){setSession(s.val()||{});});
    var r2=db.ref(DB_ROOT+"/classes"); var f2=r2.on("value",function(s){setClasses(s.val()||{});});
    return function(){ r1.off("value",f1); r2.off("value",f2); };
  },[]);
  var reg=reglagesSafe(session&&session.reglages);
  var slug=session&&session.classeSlug;
  var classe=slug&&classes[slug];
  var eleves=classe?toArr(classe.eleves):[];

  // ---- login : table puis nom ----
  if(!table){
    return h("div",{className:"eleve"},
      h("div",{className:"hdr"},h("button",{className:"btn-back",onClick:p.onBack},"← Accueil"),h("h2",null,"Quelle table ?")),
      h("div",{className:"eleve-wait"},
        h("p",{className:"muted"},"Choisis le numéro de ta table :"),
        h("div",{className:"choice-list"},
          Array.apply(null,{length:reg.nbTables}).map(function(_,i){
            return h("button",{key:i,className:"classe-btn",onClick:function(){setTable("t"+(i+1));}},"Table "+(i+1));
          }))),
      h(HelpFab,{role:"eleve"}));
  }
  if(!moi){
    return h("div",{className:"eleve"},
      h("div",{className:"hdr"},h("button",{className:"btn-back",onClick:function(){setTable("");}},"← Table"),h("h2",null,"Qui évalue ?")),
      h("div",{className:"eleve-wait"},
        !classe ? h("p",{className:"muted"},"Le professeur n'a pas encore choisi de classe. Patiente…")
        : h(React.Fragment,null,
            h("p",{className:"muted"},"Table "+table.slice(1)+" — choisis ton prénom :"),
            h("div",{className:"choice-list"},
              eleves.map(function(nom,i){return h("button",{key:i,className:"classe-btn",onClick:function(){setMoi(nom);}},prenom(nom));})))),
      h(HelpFab,{role:"eleve"}));
  }
  return h(EleveVote,{table:table,moi:moi,session:session,reg:reg,
    onChangeEleve:function(){setMoi("");}, onBack:p.onBack});
}

function EleveVote(p){
  var reg=p.reg, session=p.session||{};
  var reader=session.reader;
  var jeLis = reader && reader===p.moi;
  var valsRef=useRef([0,0,0,0]);
  var pressRef=useRef(null);
  var sd=useState(0), setDraw=sd[1]; // force redraw
  var sComp=useState({}), monComp=sComp[0], setMonComp=sComp[1];
  var lastReaderRef=useRef(reader);

  // reset quand le lecteur change
  useEffect(function(){
    if(lastReaderRef.current!==reader){ valsRef.current=[0,0,0,0]; setMonComp({}); lastReaderRef.current=reader; }
  },[reader]);

  // boucle décroissance + publication présence/valeurs
  useEffect(function(){
    var tableId=p.table;
    var iv=setInterval(function(){
      var dt=0.25;
      var v=valsRef.current.slice();
      for(var i=0;i<4;i++){
        v[i]=v[i]*(1-(reg.decay/100)*dt);
        if(v[i]<0.4) v[i]=0;
      }
      valsRef.current=v;
      // publie (sert aussi de présence via ts)
      db.ref(DB_ROOT+"/live/"+tableId).set({
        table:p.table, nom:p.moi, c0:v[0],c1:v[1],c2:v[2],c3:v[3], ts:Date.now()
      });
      setDraw(function(x){return x+1;});
    },250);
    var ref=db.ref(DB_ROOT+"/live/"+tableId);
    ref.onDisconnect().remove();
    return function(){ clearInterval(iv); ref.remove(); };
  },[p.table,p.moi,reg.decay]);

  function applaudir(i){
    if(jeLis||!reader) return;
    var v=valsRef.current.slice();
    v[i]=Math.min(100, v[i]+reg.boost);
    valsRef.current=v; setDraw(function(x){return x+1;});
  }
  function startPress(i){ applaudir(i); pressRef.current=setInterval(function(){applaudir(i);},220); }
  function stopPress(){ if(pressRef.current){clearInterval(pressRef.current);pressRef.current=null;} }

  function toggleComp(i){
    if(jeLis||!reader) return;
    var nc=Object.assign({},monComp);
    var ref=db.ref(DB_ROOT+"/compliments/"+i);
    if(nc[i]){ delete nc[i]; ref.transaction(function(c){return Math.max(0,(c||0)-1);}); }
    else { nc[i]=1; ref.transaction(function(c){return (c||0)+1;}); }
    setMonComp(nc);
  }

  return h("div",{className:"eleve"},
    h("div",{className:"hdr"},
      h("button",{className:"btn-back",onClick:p.onChangeEleve},"↺ Changer d'élève"),
      h("h2",null,"Table "+p.table.slice(1)+" · "+prenom(p.moi))),
    h("div",{className:"eleve-reader"},
      reader
        ? h(React.Fragment,null,h("div",{className:"lbl"},"on écoute"),h("div",{className:"who"},"🎤 "+prenom(reader)))
        : h("div",{className:"who"},"⏳ attends le prof")),
    jeLis
      ? h("div",{className:"eleve-wait"},h("div",{className:"big"},"🎤"),
          h("div",{style:{fontSize:"1.3rem",fontWeight:800,color:"var(--violet)"}},"C'est à toi de lire !"),
          h("p",{className:"muted"},"Passe la tablette à un camarade de ta table pour qu'il t'encourage."))
      : !reader
        ? h("div",{className:"eleve-wait"},h("div",{className:"big"},"⏳"),h("p",{className:"muted"},"Attends que le professeur désigne un lecteur."))
        : h(React.Fragment,null,
            h("div",{className:"clap-grid"},
              reg.criteres.map(function(c,i){
                var pct=Math.max(0,Math.min(100,valsRef.current[i]));
                return h("button",{key:i,className:"clap-btn clap-c"+i,
                  onPointerDown:function(e){e.preventDefault();startPress(i);},
                  onPointerUp:stopPress, onPointerLeave:stopPress, onPointerCancel:stopPress},
                  h("div",{className:"clap-fill",style:{height:pct+"%"}}),
                  h("span",{className:"ce"},c.emoji),
                  h("span",{className:"cl"},c.label));
              })),
            reg.complimentsOn && h("div",{className:"compliments-bar"},
              h("div",{className:"ttl"},"💛 Un compliment ? (facultatif)"),
              h("div",null, reg.compliments.map(function(txt,i){
                return h("button",{key:i,className:"comp-chip"+(monComp[i]?" on":""),onClick:function(){toggleComp(i);}},txt);
              })))),
    h(HelpFab,{role:"eleve"}));
}

// ════════════ QR PILOTAGE MOBILE ════════════
function OverlayQRPhone(p){
  var s1=useState(function(){return "qr_"+Date.now()+"_"+Math.random().toString(36).substr(2,6);}), nonce=s1[0];
  var url=window.location.origin+window.location.pathname+"?view=phone&qr="+nonce;
  var qrImg="https://api.qrserver.com/v1/create-qr-code/?size=280x280&margin=10&data="+encodeURIComponent(url);
  useEffect(function(){
    var ref=db.ref(DB_ROOT+"/qrScans/"+nonce);
    var f=ref.on("value",function(snap){ if(snap.val()){ ref.off("value",f); ref.remove(); p.onClose(); } });
    return function(){ ref.off("value",f); ref.remove(); };
  },[]);
  return h("div",{className:"help-back",onClick:function(e){if(e.target.className==="help-back")p.onClose();}},
    h("div",{className:"help-modal",style:{maxWidth:420,textAlign:"center"}},
      h("button",{className:"modal-close",onClick:p.onClose},"✕"),
      h("h1",null,"📱 Pilotage mobile"),
      h("p",{className:"subtitle"},"Scanne avec ton téléphone : la fenêtre se ferme dès que le scan est détecté."),
      h("img",{src:qrImg,alt:"QR",style:{display:"block",margin:"0 auto",borderRadius:8,width:280,height:280,background:"#fff"}}),
      h("div",{style:{marginTop:14,fontSize:".7rem",color:"var(--gris)",wordBreak:"break-all",fontFamily:"monospace"}},url)));
}

// Pilotage compact depuis le téléphone du prof (désigner lecteur, suivant, présence)
function VuePhone(p){
  useEffect(function(){
    var qr=new URLSearchParams(window.location.search).get("qr");
    if(qr) db.ref(DB_ROOT+"/qrScans/"+qr).set(firebase.database.ServerValue.TIMESTAMP);
  },[]);
  var ss=useState(null), session=ss[0], setSession=ss[1];
  var sc=useState({}), classes=sc[0], setClasses=sc[1];
  var sl=useState({}), live=sl[0], setLive=sl[1];
  useEffect(function(){
    var r1=db.ref(DB_ROOT+"/session"); var f1=r1.on("value",function(s){setSession(s.val()||{});});
    var r2=db.ref(DB_ROOT+"/classes"); var f2=r2.on("value",function(s){setClasses(s.val()||{});});
    var r3=db.ref(DB_ROOT+"/live"); var f3=r3.on("value",function(s){setLive(s.val()||{});});
    return function(){ r1.off("value",f1); r2.off("value",f2); r3.off("value",f3); };
  },[]);
  session=session||{};
  var reg=reglagesSafe(session.reglages);
  var slug=session.classeSlug, classe=slug&&classes[slug];
  var eleves=classe?toArr(classe.eleves):[];
  var now=Date.now();
  var presents=Object.keys(live).filter(function(k){return live[k]&&(now-(live[k].ts||0))<6000;}).length;
  function setReader(nom){
    db.ref(DB_ROOT+"/live").remove();
    db.ref(DB_ROOT+"/compliments").remove();
    db.ref(DB_ROOT+"/session").update({reader:nom});
  }
  return h("div",null,
    h("div",{className:"hdr"},
      h("button",{className:"btn-back",onClick:p.onBack},"← Accueil"),
      h("h2",null,"📱 Pilotage mobile")),
    h("div",{className:"wrap"},
      h("div",{className:"card"},
        h("h3",null,classe?(classe.nom||slug):"Aucune classe choisie"),
        h("p",{className:"muted"},presents+" / "+reg.nbTables+" tablette(s) connectée(s)")),
      classe
        ? h("div",{className:"card"},
            h("h3",null,"Lecteur en cours"),
            h("div",{className:"field"},
              h("select",{value:session.reader||"",onChange:function(e){setReader(e.target.value);}},
                h("option",{value:""},"— personne ne lit —"),
                eleves.map(function(nom,i){return h("option",{key:i,value:nom},nom);}))),
            session.reader && h("div",{style:{textAlign:"center",fontSize:"1.4rem",fontWeight:900,color:"var(--violet)",margin:"8px 0"}},"🎤 "+session.reader),
            h("div",{className:"btn-row"},
              h("button",{className:"btn btn-violet",style:{flex:1},onClick:function(){
                if(!eleves.length)return; var idx=eleves.indexOf(session.reader); setReader(eleves[(idx+1)%eleves.length]);
              }},"⏭️ Lecteur suivant"),
              session.reader && h("button",{className:"btn btn-ghost",onClick:function(){setReader("");}},"⏹️ Stop")))
        : h("div",{className:"card"},h("p",{className:"muted"},"Choisis d'abord une classe depuis le panneau professeur (sur l'ordinateur)."))),
    h(HelpFab,{role:"prof"}));
}

// ════════════ ROUTEUR ════════════
function CodeGate(p){
  var sc=useState(""), code=sc[0], setCode=sc[1];
  var se=useState(""), err=se[0], setErr=se[1];
  function valider(){
    if(code==="1312"){ try{sessionStorage.setItem("am_auth","1");}catch(e){} p.onOk(); }
    else { setErr("Code incorrect"); setCode(""); }
  }
  return h("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(165deg,#1f1f2e,#2A2A4A)",color:"#fff",padding:"1.5rem"}},
    h("div",{style:{maxWidth:360,width:"100%",background:"rgba(42,42,62,.9)",padding:"1.6rem 1.4rem",borderRadius:14,boxShadow:"0 10px 40px rgba(0,0,0,.35)",border:"1px solid rgba(255,255,255,.08)"}},
      h("div",{style:{fontSize:"1.15rem",fontWeight:700,marginBottom:".5rem"}},"🔒 Accès enseignant"),
      h("div",{style:{fontSize:".88rem",opacity:.72,marginBottom:"1.1rem"}},"Saisis le code pour accéder au pilotage."),
      h("input",{type:"password",inputMode:"numeric",autoFocus:true,value:code,
        onChange:function(e){setCode(e.target.value);setErr("");},
        onKeyDown:function(e){if(e.key==="Enter")valider();},
        style:{width:"100%",padding:".7rem .8rem",fontSize:"1.25rem",borderRadius:8,border:"1px solid #444",background:"#1f1f2e",color:"#fff",textAlign:"center",letterSpacing:".4em",marginBottom:".5rem",boxSizing:"border-box"}}),
      err? h("div",{style:{color:"#ff9090",fontSize:".85rem",marginBottom:".5rem",textAlign:"center"}},err) : null,
      h("div",{style:{display:"flex",gap:".5rem",marginTop:".6rem"}},
        h("button",{className:"btn btn-ghost",onClick:p.onCancel,style:{flex:1}},"Annuler"),
        h("button",{className:"btn btn-primary",onClick:valider,style:{flex:1}},"Valider"))));
}

function App(){
  var sm=useState(null), mode=sm[0], setMode=sm[1];
  var stt=useState(false), test=stt[0], setTest=stt[1];
  var sa=useState(function(){try{return sessionStorage.getItem("am_auth")==="1";}catch(e){return false;}}), auth=sa[0], setAuth=sa[1];
  useEffect(function(){
    var q=new URLSearchParams(window.location.search);
    var md=q.get("mode"), vw=q.get("view");
    if(vw==="board"||md==="board") setMode("board");
    else if(vw==="phone") setMode("phone");
    else if(md==="prof") setMode("prof");
    else if(md==="eleve") setMode("eleve");
  },[]);
  function quitterTest(){
    db.ref(DB_ROOT+"/classes/"+TEST_SLUG).remove();
    db.ref(DB_ROOT+"/live").remove();
    db.ref(DB_ROOT+"/compliments").remove();
    db.ref(DB_ROOT+"/session").update({classeSlug:"", reader:""});
    setTest(false); setMode(null);
  }
  // Gate code 1312 sur tout accès prof/tableau/téléphone (URL directe ou bouton accueil)
  if((mode==="prof"||mode==="board"||mode==="phone") && !auth){
    return h(CodeGate,{onOk:function(){setAuth(true);},onCancel:function(){setMode(null); try{window.history.replaceState({},"",window.location.pathname);}catch(e){}}});
  }
  if(mode==="prof") return h(AppProf,{onBack:function(){setMode(null);},test:test,onQuitTest:quitterTest});
  if(mode==="board") return h(VueBoard,{onBack:function(){setMode(null);}});
  if(mode==="phone") return h(VuePhone,{onBack:function(){setMode(null);}});
  if(mode==="eleve") return h(AppEleve,{onBack:function(){setMode(null);}});
  return h(Accueil,{go:setMode,test:test,onTest:function(){setTest(true);}});
}

function FbBanner(){
  var bad=false;
  try{ var u=(firebase.app().options.databaseURL)||""; if(!u||u.indexOf("REMPLACER")>=0) bad=true; }catch(e){ bad=true; }
  if(!bad) return null;
  return h("div",{style:{position:"fixed",top:0,left:0,right:0,zIndex:3000,background:"var(--rouge)",color:"#fff",padding:"9px 14px",fontSize:".84rem",fontWeight:700,textAlign:"center",lineHeight:1.35}},
    "⚠️ Config Firebase non renseignée — remplace les « REMPLACER… » en haut du fichier (puis déploie sur GitHub Pages). Sans ça, rien ne peut être enregistré.");
}
function Root(){ return h(React.Fragment,null, h(FbBanner), h(App)); }
ReactDOM.createRoot(document.getElementById("root")).render(h(Root));
